body:
  text: 傷寒直指卷一辨平脈法第一經文下初注皆成氏原本茲不著成氏者省文耳問曰脈有陰陽者何謂也答曰凡脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也凡陰病見陽脈者生陽病見陰脈者死內經曰微妙在脈不可不察察之有紀從陰陽始始之有經從五行生茲首論陰陽以脈從陰陽始也陽脈有五陰脈有五以脈從五行生也陽道常饒大浮數動滑五者比之平脈也有餘故謂之陽陰道常乏沉澀弱弦微五者比之平脈也不及故謂之陰傷寒為病邪在表則見陽脈邪在裡則見陰脈陰病見陽脈主生者邪氣自里之表欲汗而解也如厥陰中風脈微浮為欲愈不浮為未愈是也陽病見陰脈主死者邪氣自表入里正虛邪勝如妄言譫語脈沉細者死是也要略曰諸病在外者可治入里即死此之謂也三陽曰陰病陽脈邪氣雖盛而元氣未脫也陽病陰脈邪氣既盛而元氣已脫也此皆初起之陰證陽證脈法非後來自表之裡自里之表之辨若邪氣傳裡焉能復之表而發汗況邪氣入里乃陽證傳陰之常豈可遽斷為死乎惟陽證脈沉則陰脈見矣沉又不數反見微弱方是死脈非元氣脫而何成注未妥健曰成氏以厥陰中風脈微浮欲愈為自里之表者生但此是厥陰帶表之脈非陰證陽脈者比謬矣問曰脈有陽結陰結者何以別之答曰其脈浮而數能食不大便者此為實名曰陽結也期十七日當劇其脈沉而遲不能食身體重大便反硬名曰陰結也期十四日當劇結者氣偏固結陰陽之氣不得而雜之也陰中有陽陽中有陰陰陽相雜以為和不相雜以為結今浮數陽脈也能食不大便裡實也為陽氣固結陰不得而雜之是名陽結沉遲陰脈不能食身體重陰病也陰病見陰脈則當下利反大便硬者為陰氣固結陽不得而雜之是名陰結傷寒之病日傳一經者經盡當愈陽結為火至十七日傳少陰水水能制火火邪解散則愈陰結為水至十四日傳陽明土土能制水水邪解散則愈彼邪氣結甚水不能制火土不能制水故曰劇內經曰一候後則病甚三候後則病危也觀子浮而數能食為脈證俱屬陽故不大便者曰陽結沉而遲不能食體重為脈證俱屬陰故不大便者曰陰結陰病當下利不當結硬故曰反也小柴胡證邪在半表半裡者為陽微結少陰病為純陰結皆可與此互論也問曰病有灑淅惡寒而復發熱者何答曰陰脈不足陽往從之陽脈不足陰往乘之曰何謂陽不足答曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也曰何謂陰不足答曰假令尺脈弱陽氣下陷入陰中則發熱也一陰一陽之謂道偏陰偏陽之謂疾陰偏不足則陽得而從之陽偏不足則陰得而乘之陽不足則陰氣上入陽中為惡寒陰勝則寒矣陰不足則陽氣下陷陰中而發熱陽勝則熱矣兼善此章論傷寒所以然之理非病已發於外而言也凡病傷寒皆因營衛不足是以尺寸之脈微弱外邪因而襲之使陰陽相乘故灑淅惡寒而復發熱也健曰脈有陰陽左右表裡氣血也陰陽脈平則無病不平則邪至而病矣此惡寒發熱而曰陽從陰乘成氏隨文敷衍未究其實也夫灑淅惡寒凜凜然寒之輕者但發熱而無他證似屬半表半裡之柴胡湯證不必拘於脈之上入下陷若認定此二句是內經所謂陽虛則惡寒陰虛則發熱乃論本原而不與受邪關涉矣且此曰辨平脈法蓋言陽脈虛則陰邪易入陰脈虛則陽邪得乘就其脈應有如是發端之病耳陽脈浮陰脈弱者則血虛血虛則筋急也陽為氣陰為血陽脈浮者衛氣強也陰脈弱者營血弱也難經曰氣主煦之血主濡之血虛則不能濡潤故筋急也其脈沉者榮氣微也內經云脈者血之府也脈實則血實脈虛則血虛此其常也脈沉者知榮血內微也觀子傷寒之始邪氣外盛脈不當沉若沉者必榮氣內衰邪陷入而不能鼓也其脈浮而汗出如流珠衛氣衰也針經曰衛氣者所以溫分肉充皮毛肥腠理司開合者也脈浮汗出如流珠者腠理不密開合不司為衛氣衰也浮主候衛沉主候營以浮沉別營衛之衰微理固然矣然衰甚於微於榮言微而衛言衰者以汗出如流珠為陽氣外脫所以衛病甚於榮也榮氣微者加燒針則血流而不行更發熱而躁煩也衛陽榮陰燒針益陽損陰榮氣微者陰虛陰虛則內熱又加燒針以助陽不惟兩熱相合而榮血不行必外發熱內躁煩也不巖流或作留非方其始也雖微而不得不流者燒針以迫之也及其既流也已衰而復行者燒針以竭之也健曰流者行動之稱榮旺則血流行以濡乎四體榮微則血凝泣而少充乎經隊如燒針以持之則血槁而無所行自然發熱躁煩為陰衰陽亢之象矣故凡血虛內熱之人切忌辛溫香燥之藥何況燒針以熱濟熱犯傷寒之誡乎流而不行乃血為熱迫流散而不歸正經故熱作並躁煩也成氏不巖言皆未切泣音澀脈藹藹如車蓋者曰陽結也藹藹如車蓋者大而厭厭聶聶也為陽氣鬱結於外不與陰氣和雜也宇泰按車蓋言浮大即前浮數之陽結也健曰車蓋上滿下空即洪脈帶浮有上無下之象所謂洪大之脈陰必傷而陽自亢凡病得之俱為凶兆傷寒家須防其猝然氣喘之變脈纍纍如循長竿者名曰陰結也纍纍如循長竿者連連而強直也為陰氣鬱結於內不與陽氣和雜也宇泰長竿者緊弦也即前沉遲之陰結也健曰長竿體直似弦纍纍似淚淚兀兀如轉索而弦緊兼之也難經言弦緊俱屬陰脈故曰陰結此陰結乃傷寒之邪結於太陽而為表證宇泰指為即前沉遲之陰結非是然百病不宜弦緊之脈乃木剋土候胃氣受困已乏生機弦而軟其病輕弦而硬其病重緊類乎硬直至如竿豈非陰邪盛極所致須慎重為治脈瞥瞥如羹上肥者陽氣微也輕浮而主陽微也健曰羹上肥無根之極瞥瞥忽見忽無之象已屬死脈矣脈縈縈如蛛絲者陽氣衰也縈縈滯也若縈縈蔥蔥之不利如蛛絲者至細也微為陽微細為陽衰內經曰細則氣少故以至細為陽衰宇泰縈縈收卷也有回旋之義健曰脈若絶若連為縈縈如蛛絲之細已見氣血將絶之象豈特陽衰而然也脈綿綿如瀉漆之絶者亡其血也綿綿連綿而軟也瀉漆之絶者前大而後小也脈陽氣前至陰氣後至故脈前為陽氣後為陰氣前大後小則陽氣有餘陰氣不足故知血亡脈來緩時一止復來者名曰結脈來數時一止復來者名曰促脈陽盛則促陰盛則結此皆病脈脈一息四至曰平一息三至曰遲小快於遲曰緩一息六至曰數時有一止陰陽之氣不得相續陽行也速陰行也緩緩以候陰若陰氣勝而陽不能相續則脈來緩時一止數以候陽若陽氣勝而陰不能相續則脈來數時一止傷寒有結代之脈動而中止不能自還為死脈此促結之脈是陰陽偏勝而時一止即非脫絶而止云此皆病脈宇泰結促代皆動而中止但自還為結促不能自還為代無常數為結促有常數為代結促為病脈代為死脈不可不辨仁齊凡熱極發斑發喘者脈促健曰氣為橐籥血如波瀾氣陽血陰陰陽和平脈來合度陽盛則火亢氣粗而脈促陰盛則寒凝血泣而脈結此本原盛衰之象若傷寒陽盛熱邪結滯氣分經血狂亂而脈數且促陰盛則寒邪結滯血分經氣壅遏而脈緩且結故云病脈宜作兩層看法茲發明之以佐前輩不逮陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒者此三焦傷也動為陰陽相搏方其陰陽相搏而虛者則動陽動為陽虛故汗出陰動為陰虛故發熱也如不汗出發熱而反形冷惡寒者三焦傷也三焦者原氣之別使主行氣於三陽三焦既傷則陽氣不通而微致身冷惡寒也要略曰陽氣不通者身冷經曰陽微則惡寒健曰脈之往來至數俱稱為動靈樞十二中皆有動脈若傷寒陽動應察人迎之表陰動按氣口之裡憑緩急而究寒熱庶無遁情若脈數見於關上上下無頭尾如豆大厥厥動搖者名曰動也脈經云陽出陰入以關為界關為陰陽之中也若數脈見於關上上下無頭尾如豆大厥厥動搖者是陰陽之氣相搏也故名曰動宇泰陽升陰降交通上下往來於尺寸之內沖和安靜烏有所謂動哉惟夫陽欲降而陰逆之陰欲升而陽逆之兩者相搏不得上下鼓擊之勢隆然高起而動脈之形著矣然必見於關上何也關陰陽之中也不於此見而誰見乎安常關位前三分為陽後三分為陰若當陽寸口動而陰靜法當有汗而解素問曰陽加於陰謂之汗是也若當陰連於尺動而陽靜則發熱素問曰尺粗為熱中是也若大汗後形冷惡寒者三焦傷是死證也按陰陽之氣寧謐則實躁動則虛陰動則陽虛故不能衛於膚腠而汗出陰動則陰虛故不能濡於肌肉而發熱仲景云陽微則惡寒陰微則發熱厥厥動搖者自為動搖不與三部相混如人在衆人中不與衆合名之為厥厥也脈陽浮大而濡陰浮大而濡陰脈與陽脈同等者名曰緩也陽脈寸口也陰脈尺中也上下同等無有偏勝者是陰陽之氣和緩非若遲緩之有邪也陰陽偏勝者為結為促陰陽相搏者為動陰陽氣和者為緩學者不可不知也健曰陰陽同等浮大而孺名之曰緩蓋緩為胃氣之脈不主於病是緩而有神也今浮大而濡有類虛脈矣虛合四形浮大遲軟此近似之非阿阿而緩者比脈浮而緊者名曰弦也弦者狀如弓弦按之不移也脈緊者如轉索無常也脈經云弦與緊相類以弦為虛故雖緊如弦而按之不移不移則不足也經曰弦則為減以緊為實是切之如轉索無常而不散要略曰脈緊如轉索無常者有宿食也叔微少陽之氣通於春春脈弦者以應春陽時令之脈也如浮大而弦浮滑而弦浮數而弦皆為陽也若沉數而弦沉澀而弦沉細而弦皆為陰證之脈也仲景脈分陰陽二用之理其義微矣健曰弦主厥陰風木之象仲景以為陰叔和以為陽六經篇又曰尺寸俱弦少陽受病乃半表半裡之診明矣此浮而緊曰弦者當分左表右里浮為風而緊為寒如轉索無常者乃寒邪夾食為患之候也脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精弦則為減減則為寒寒者謂陽氣少也大則為芤芤則為虛虛者謂血少不足也所謂革者言其既寒且虛則氣血改革不循常度男子得之為真陽減而不能內固故主亡血失精婦人得之為陰血虛而不能滋養故主半産漏下健曰易卦革去故也改故從新之謂形弦大而中空似芤如按鼓皮之象夫人氣血充溢六脈阿阿而無他故因於外感內傷以致精神消耗乃現此脈弦為減則陽氣不足而寒大為芤則陰血不足而虛寒虛相搏邪正交侵而有去故之義此為革脈也然亦有暴得此脈而可愈者經曰三部脈革長病得之死猝病得之生不可不知也芤音扣問曰病有戰而汗出因得解者何也答曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也浮為陽緊為陰陰陽爭則戰邪氣將出邪與正爭其人本虛是以發戰正氣勝則戰戰已復熱而大汗出也健曰浮緊是表邪盛於陽分反芤是陰氣虛而不能和陽以作汗當於表劑中投養血之品以和營衛則不戰而汗可出也戰即抖也抖則表氣通而裡氣外越故得汗是正勝邪也如戰而無汗有復戰者有再戰者若終無汗者正衰邪勝難治之證矣若脈浮而數按之不芤此人本不虛若欲自解但汗出不發戰也浮數陽也本實陽勝邪不能與正爭故不發戰也問曰病有不戰而汗出解者何也答曰脈大浮數故知不戰汗出而解也陽勝則熱陰勝則寒陰陽爭則戰脈大浮數皆陽也陽氣全勝陰無所爭何戰之有問曰病有不戰不汗出而解者何也答曰其脈自微此以曾發汗若吐若下若亡血以內無津液此陰陽自和必自愈故不戰不汗出而解也脈微者邪氣微也邪氣已微正氣又弱脈所以微既經發汗吐下亡陽亡血內無津液則不能作汗得陰陽氣和而自愈也海藏戰而後解者太陽也不戰有汗而解者陽明也不戰無汗而解者少陽也欲自解者當先煩乃有汗而解何以知之脈浮故知汗出解也煩熱也邪氣還表則為煩熱汗出而解以脈浮故為邪還表也問曰傷寒三日脈浮散而微病人身涼和者何也答曰此為欲解也解以夜半脈浮而解者濈然汗出也脈數而解者必能食也脈微而解必大汗出也傷寒三日陽去入陰之時病人身熱脈浮數而大邪氣傳也若身涼和脈浮數而微者則邪氣不傳而欲解也解以夜半者陽生於子也脈浮濈然汗出解者邪從外散也脈數能食而解者胃氣和也脈微大汗出而解者邪氣微也宇泰上脈微故不汗出而解此脈微而解必大汗出上以曾經吐下亡血邪正俱衰不能作汗而解此以未經汗下血氣未傷正盛邪衰故大汗出而解問曰脈病欲知愈與未愈者何以別之答曰寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解者此脈陰陽為和平雖劇當愈三部脈均等即正氣已和雖有餘邪何害之有三陽曰三處浮沉遲數同等者非如成云均等也照本部應得脈看如肺脈當浮腎脈當沉之謂也宇泰陰陽偏而為病平而為和故寸關尺脈皆同等為陰陽和平而自愈健曰此當但察其三部同是一脈為和而同等不在浮沉遲數上究凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜此皆愈證也動數之脈邪在陽也變遲者陽邪愈也浮大之脈邪在表也復減小者表邪散也病初躁亂者邪所煩也湯入而安靜者藥勝病是以為愈凡病若發汗若吐若下若亡津液陰陽自和者必自愈重亡津液則不能作汗脈見陰陽自和雖不汗亦自愈矣立夏得洪大脈是其本位其人病身體苦疼重者鬚髮其汗若明日身不疼不重者不須發汗若汗濈濈自出者明日便解矣何以言之立夏得洪大脈是其時脈故使然也四時仿此脈來應時為正氣自固雖外感邪氣但微自汗出而亦解爾內經曰脈得四時之順者病無他觀子四時當令之氣即本臟旺氣也正氣旺邪自不容矣體猶疼重者營衛未和也故一汗即愈不疼重者邪已散也或不汗亦愈或自汗亦愈問曰凡病欲知何時得何時愈答曰假令夜半得病明日日中愈日中得病夜半愈何以言之日中得病夜半愈者以陽得陰則解也夜半得病明日日中愈者以陰得陽則解也日中得病陽受之夜半得病陰受之陽不和得陰則和是解以夜半陰不和得陽則和是解以日中經曰用陽和陰用陰和陽是也寸口脈浮為在表沉為在裡數為在腑遲為在臟假令脈遲此為在臟也經曰諸陽浮數為乘腑諸陰遲澀為乘臟宇泰九難曰數者腑也遲者臟也數則為熱遲則為寒諸陽為熱諸陰為寒故以別知臟腑之病也此傷寒分三陽三陰證之總訣與觀子古人所謂寸口俱通三部而言非僅指關前為寸口脈也趺陽脈浮而澀少陰脈如經也其病在脾法當下利何以知之若脈浮大氣實血虛也今趺陽浮而澀故知脾氣不足胃氣虛也以少陰脈弦而浮才見此為調脈故稱如經也若反滑而數者故知當屎膿也趺陽者胃之脈診得浮而澀者脾胃不足也經曰脈浮而大浮為氣實大為血虛若脈浮大當為氣實血虛此非也今趺陽脈浮而澀浮則胃虛澀則脾寒脾胃虛寒則谷不消而水不別法當下利少陰腎脈也腎為肺之子為肝之母浮為肺脈弦為肝脈少陰脈弦而浮為子母相生故云調脈若滑而數者客熱在下焦使血流腐而為膿故屎膿也損庵趺陽一名衝陽一名會元在腳背上去陷谷三寸乃足陽明先天之動脈也胃者水穀之海五臟六腑之長若胃氣已憊水穀不進穀神已去臟腑無所稟受其脈不動而死也故必診趺陽以察胃氣焉切脈輕重為氣血之分浮而大者輕取有餘重按不足故為氣實血虛之診輕取不大而澀知脾胃氣不足矣不足則轉輸失職而下利見下利屬少陰經曰腎主二便故云少陰如經少陰之脈微細沉緊此以弦而浮為調者最宜活看應弦浮而反滑數所以知其便膿此桃花湯證也少陰動脈在足內踝後跟骨上名曰太溪屎音矢寸口浮而緊浮則為風緊則為寒風則傷衛寒則傷營營衛俱病骨節煩疼當發汗也脈經云風傷陽寒傷陰衛為陽營為陰風為陽寒為陰各從其類而傷也易曰水流濕火就燥者是矣衛得風則熱營得寒則痛營衛俱病故骨節煩疼當與麻黃湯發汗則愈宇泰風陽物也其體在外其傷在衛飄然流行於上者其脈不得不浮也寒陰物也其體在中其傷在營揪然繳急而斂縮者其脈不得不緊也營衛俱病而骨節煩疼當開戶以逐之麻黃湯發汗是也觀子既云風寒營衛兩傷何以不主大青龍蓋證僅骨節煩疼則寒閉腠理為急故單行發汗耳健按上文述趺陽此忽言寸口下節又是趺陽豈非叔和編次失緒非仲景原本明矣趺陽脈遲而緩胃氣如經也趺陽脈浮而數浮則傷胃數則動脾此非本病醫特下之所為也營衛內陷其數先微脈反但浮其人必大便硬氣噫而除何以言之本以脈數動脾其數先微故知脾氣不治大便硬氣噫而除今脈反浮其數改微邪氣獨留心中則飢邪熱不殺穀潮熱發渴數脈當遲緩脈因前後度數如法病者則飢數脈不時則生惡瘡也經常也趺陽之脈以候脾胃故遲緩為常若浮數即為妄下傷動脾胃致邪氣乘虛內陷也蓋因下里虛營衛內陷邪客於脾所為也何以故數則動脾數先微者脾邪先陷於裡也反但浮者胃虛脾熱津液干少大便必硬針經曰脾病則善噫得後與氣則快然如衰故氣噫而除也脾主消磨水穀今邪氣獨留脾氣不治故心中雖飢不能殺穀也脾主為胃行其津液脾為熱爍故潮熱而發渴也趺陽之脈本遲而緩因下後變浮為數營衛內陷數復改微是脈因前後度數本如法但邪熱陷脾而善飢也脈數不時者法當改微而復不微是邪不傳裡但鬱於營衛之中必出自肌皮而生惡瘡也宇泰胃脈遲緩其本也若浮而數則病矣胃氣傷故虛虛故浮脾氣動故躁躁故數知為誤下之故營工之氣脾胃之氣所為也胃傷脾動則內虛營衛之氣乘虛內陷浮數二脈數脈先退而浮脈獨存其人必大便硬氣噫而除也何以言之本以數脈動脾脾雖躁動不能持久故數脈先改而微故知脾氣不治脾不治則孰為津液津液少胃中乾燥故知大便硬脾病善噫得後與氣乃衰故知氣噫而除也本以脈浮傷胃胃傷則止於傷而已故浮脈獨存不與數脈俱退邪氣獨留於脾無與於胃胃中空虛故飢而思食也胃能納脾不能化則食而不消所以然者脾中真火乃能殺穀邪熱不能殺穀也穀不化反增胃中之熱則潮熱而渴勢所必至矣若數不改微而改遲緩病退之後與未病之前一息四至度數如法如是而飢飢而能食食即能化不為患也然數脈不改遲緩非時而見脾氣躁動肌肉必生惡瘡也師曰病人脈微而澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒陰弱則發熱此醫發其汗令陽氣微又大下之令陰氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裡胃中煩熱以陰氣內弱不能勝熱故欲裸其身又陰脈遲澀故知血亡也微為亡陽澀為無血不當汗而強汗之令病氣微陰氣上入陽中則惡寒故曰陽微則惡寒不當下而強下之令陰氣弱陽氣下陷入陰中則發熱故曰陰弱則發熱氣為陽血為陰陽以候氣陰以候血陰脈遲澀為營血不足故知亡血經曰尺脈遲者不可發汗以營氣不足血少故也損庵大發其汗傷陽也宜其脈微而惡寒又數大下之傷陰也宜其脈澀而發熱陰陽兩傷則氣血俱損而首尾獨言亡血下之亡陰不必言汗亦血類故也健曰微澀之脈其人已自氣血兩虛況因大汗大下之後不免乎盛夏惡寒嚴冬惡熱陽微陰弱之體豈能勝冷勝熱哉非是盛夏直延至盛冬也脈浮而大心下硬有熱屬臟者攻之不令發汗浮大之脈當責邪在表若心下反硬者熱已甚而內結也有熱屬臟者謂別無虛寒而但見裡熱臟屬陰為悉在裡故可攻下之不可以脈浮大更與發汗也病源曰熱毒氣乘心心下痞滿宜速下之屬腑者不令溲數溲數則大便硬汗多則熱愈一本有甚字汗少則便難脈遲尚未可攻雖心下硬若無里證但見表證者病尚在陽謂之屬腑當先解表然後攻痞勿以飲結而利小便其溲數大便必硬也經曰小便數者大便必硬謂走其津液也汗多則邪除而熱愈汗少則邪熱不盡又走津液必便難也硬家當下設脈遲則裡氣未實未可攻也三陽曰雖心下硬亦須脈緊有力五六日不大便方可下雖下之亦須大柴胡切不可輕用承氣不然姑守之何也因脈浮大故也雖云屬腑者病已傳裡不當汗矣但比上文入里淺耳成氏不當注解表二字不巖屬腑亦有汗法此以心下硬有熱則非汗之所能除也熱愈作熱愈甚看為是觀子此脈證在兩可疑似之間汗下俱不可輕忽也心下硬似內實可攻然脈浮大且身熱便非必攻之證故必審果下於腑全屬於臟者攻之不可以猶有外熱為之發汗也若猶屬腑在欲結未結之際則無論攻大便不可即利小便亦忌也利小便必溲數溲數則大便轉硬矣且屬臟之可攻不可汗豈獨大汗之其熱愈增即小汗之亦令便難也何也浮大則本氣已虛故發汗則陽虛轉甚利小便則陰虛隨甚況攻下之失當乎然豈特浮大者不可遽攻也浮遲者亦如之遲則均為證似可攻而脈非必攻者也審之法皆未可攻心下硬與腹硬滿不同腹滿邪已結聚成實此但心下硬或緣表邪未悉收斂入胃或緣裡虛所結猶屬微淺曰心下曰反硬自與非下不可者異矣節內從脈浮大有熱說起末復結歸尚未可攻義頗顯然經又云陽明病心下硬滿者攻之利不止死可互證也此所謂腑但取與臟相對而言彼為入里此猶屬外之義非同便硬屬腑之腑也健曰傷寒審經腑而此言臟蓋古文之通稱不可認為真臟之臟夫臟者藏精而不泄者也烏可以攻乎哉雖心下硬而脈浮大有熱豈是驟攻屬腑之證不令溲汗是大法也言脈遲未可攻是矣其或有可攻者須察硬處拒按與否舌現何色若舌焦黑中官實邪窒滯致脈道不利而遲者須急攻之庶無他變脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶浮芤相搏陰陽不諧胃氣獨治鬱而生熱消鑠津液其陽則絶健曰浮陽芤陰是氣血兩虛之象胃者氣血之總司氣血既虛則胃無津液而邪熱愈熾致成陰虛陽亢所謂獨陽不生將自絶矣脈浮而洪身汗如油喘而不休水漿不下體形不仁乍靜乍亂此為命絶也病有不可治者謂邪氣勝於正氣也內經曰大則邪至火則病進脈浮而洪者邪氣勝也身汗如油喘而不休者正氣脫也水漿不下者胃氣盡也形體不仁者營衛絶也不仁痛癢不知也針經曰營衛不行故為不仁邪與正爭則亂安則靜乍靜乍亂正負邪勝也正氣既脫胃氣又盡營衛俱絶邪氣獨勝故死也宇泰火之將滅也必明脈來浮洪湧盛此將去人體之兆再以下文諸證可必命絶矣又未知何臟先受其災若汗出發潤喘而不休者此為肺先絶也肺為氣之主為津液之帥汗出發潤津脫也喘而不休氣脫也陽反獨留形體如煙燻直視搖頭者心絶也肺主氣氣為陽心主血血為陰陽反獨留者身體大熱是血先絶而氣獨在也體如煙燻者身無精華血絶不榮於色也心脈挾咽系目直視者心經絶也頭為諸陽之會搖頭者陰絶而陽無根也卿子論中凡無血血絶字面要看得活謂陰氣先絶可耳文録人死者氣絶耳以簪簪其皮膚血猶然流出可見唇吻反青四肢習者此為肝絶也唇吻者脾之候肝色青肝絶則其色見於所勝之部四肢者脾所主肝主筋肝絶則筋脈引急發於所勝之分習者振動苦搐搦也環口黧黑柔汗發黃者此為脾絶也脾主口唇絶則精華去故環口黧黑柔為陰柔汗冷汗也脾胃津液之本陽氣之宗柔汗發黃者脾絶而陽脫真氣現也溲便遺失狂言目反直視者此為腎絶也腎司開闔禁固便溺溲便遺失者腎絶不能約制也腎藏志狂言者志不守也內經曰狂言失志者死針經五臟之精氣皆上注於目骨之精為瞳子目反直視者腎之精不榮而瞳子不轉也又未知何臟陰陽前絶若陽氣前絶陰氣後竭者其人死身色必青陰氣前絶陽氣後竭者其人死身必赤腋下溫心下熱也陽主熱而色赤陰主寒而色青其人身青則陰未離體故曰陰氣後竭身赤腋下溫心下熱則陽未離體故曰陽氣後竭針經曰人有兩死而無兩生是也寸口浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人即䭇經云脈浮大應發汗若反下之為大逆浮大之脈邪在表也當發其汗若反下之是攻其正氣邪得以深入故為大逆浮則無血下後亡血也大則為寒者邪氣獨在也寒邪因裡虛而入寒氣相搏乃為腸鳴醫見脈大以為有熱飲以冷水欲令勝熱而作大汗里先虛寒又得冷水水寒相搏使中焦之氣遲澀故令䭇也䭇同噎趺陽脈浮浮則為虛浮虛相搏故令氣䭇言胃氣虛竭也脈滑則為噦此為醫咎責虛取實守空迫血脈浮鼻中燥者必衄也趺陽脈浮為䭇滑為噦皆醫之咎責虛取實之過也內經曰陰在內陽之守也陽在外陰之使也發汗攻陽亡津液而陰氣不足者為守空經曰表氣虛微裡氣不守故使邪中於陰也陰不為陽守邪氣因得而入之內搏陰血陰失所守血乃妄行未知從何道出若脈浮鼻燥者知血必從鼻孔中出也不巖為䭇為噦皆誤下傷陰之咎陰傷則陽失所守故曰守空文前後二段並無當發其汗與攻陽亡津之語學者詳之宇泰䭇與噎同噦即俗之厄逆也東垣海藏以噦為乾嘔陳無擇又以噦為咳逆皆失之此䭇與噦皆因妄下之後復與之水反發其汗胸中虛氣逆上輕則為噎重則為噦矣健曰發汗攻陽亡津液陰氣不足等語乃成氏設辭仲景未之及此二條只重醫反下之句看一以水寒相搏而致䭇一以責虛取實而致噦皆屬誤醫犯胃胃虛故寸口趺陽之脈浮大而變證如是陽氣虛於中則陰氣不能獨守邪搏於陰迫血妄行清道故鼻衄也䭇是飲食之際氣塞於胃脘難下脘中必痛氣稍轉食始入有痰噎氣噎之分寒熱虛實之別故噎為雜證之重病乃見於傷寒責之醫咎致胃虛而痰凝氣滯故脈滑也噦於月切宇泰謂即俗之厄逆非也厄則聲有輕重連斷以辨證之寒熱虛實其聲如字本音有一聲即定而復厄者有連厄數聲者有連身挺動甚致抬肩擷肚者有但在喉問厄忒者此為厄逆若噦其聲亦如字本音而不連接東垣海藏以為乾嘔健以為如干嘔至盡之極聲其實非嘔徑為噦也內經曰病深者其聲噦乃胃氣虛丹田之氣逆上進迫而作凡病至此不救者多無擇以為咳逆更非諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者積有膿也浮數之脈主邪在經當發熱灑淅惡寒病人一身盡痛不欲飲食者傷寒也若發熱惡寒而痛偏一處飲食如常者非傷寒是邪氣鬱結於經絡之間血氣壅遏不通欲畜聚成膿也宇泰傷寒書舉類證數條至癰疽之發憎寒壯熱大似傷寒仲景已及之而後人多忽何也然人身有焮腫處無不自覺者此條所言必是內癰故畜聚成膿也如胃癰肺癰腸癰皆各有辨而胃癰之脈人迎反盛未有不誤以為傷寒宜察之脈浮而遲面熱赤而戰惕者六七日當汗出而解反發熱者差遲遲為無陽不能作汗其身必癢也脈浮面熱赤者邪氣外浮於表也脈遲戰惕者本氣不足也六七日為傳經盡當汗解之時若當汗不汗反發熱者裡虛津液不多不能作汗既不能汗邪無從去是以差遲發熱為邪氣獨浮於皮膚必作身癢也經曰以其不能小汗出故身必癢宇泰脈浮而遲為陽氣虛所以脈遲氣怫鬱不得越故面熱赤正與邪爭故戰惕猶天氣褥蒸而成雨豈可以不汗乎若陽氣衰微不能作汗六七日反發熱其身不痛而癢也宜各半湯小汗之寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內燥也表氣微虛裡氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所謂陽中霧露之氣故清邪中上濁邪中下陰氣為栗足膝逆冷便溺妄出表氣虛裡氣微急三焦相溷內外不通上焦怫鬱臟氣相熏口爛蝕齦也中焦不治胃氣上衝脾氣不轉胃中為濁營衛不通血凝不流若衛氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入臟腑熱氣所過則為癰膿若陰氣前通者陽氣厥微陰無所使客氣內入嚏而出之聲嗢咽塞寒厥相逐為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全浮為陽沉為陰陽脈緊則霧露之氣中於上焦陰脈緊則寒邪中於下焦上焦太陽也下焦少陰也發熱頭疼項強頸攣腰疼脛酸者霧露之氣中於太陽之經也濁邪中下陰氣為栗足脛逆冷便溺妄出者寒邪中於少陰也因表氣微虛邪入而客之又裡氣不守邪乘里弱遂中於陰陰虛遇邪內為懼栗致氣微急矣內經曰陽病者上行極而下陰病者下行極而上此上焦之邪甚則下於中焦由是三焦混亂也三焦主持諸氣膻中為陽氣之海既相混亂氣不得通怫鬱於上焦而為熱與臟相熏口糜齦爛也中焦為上下二焦邪混亦不得治中焦在胃中失治胃氣因上衝也脾助胃氣消穀脾氣不轉則胃中水穀不消故胃中濁也營者水穀之精氣也衛者水穀之悍氣也氣不能布散致營衛不通血凝不流也衛氣者陽氣也營血者陰氣也陽主為熱陰主為寒衛氣前通者陽氣先通熱氣得行也膀胱者津液藏焉氣化能出以小便赤黃知衛氣前通也熱氣與衛氣相搏而行出入臟腑遊於經絡經絡客熱則血凝肉腐而為癰膿也若陰氣前通者則不然陽在外陰之使也陽氣微厥陰無所使陽氣不能衛外寒氣因而客之鼻者肺之候肺主聲寒氣內入客於肺故嚏出聲嗢咽塞也寒者外邪也厥者內邪也內外之邪合併相逐又為熱所壅使血凝不流且自下如豚肝也上焦陽氣下焦陰氣二氣俱厥不相順接則脾氣孤弱不能行化氣血滋養五臟致五臟皆虛而五液注下也闔者合也清者圊也下焦氣脫而不合故數便而下重臍者生氣之原臍築湫痛則生氣欲絶故曰命將難全宇泰此言邪是濕邪也蓋天之濕霧露與雨也天本乎氣故中上中表中經絡地之濕水泥是也地本乎形故中下中里中筋骨經曰風者上先受之濕者下先受之又云清濕地氣之中人也必從足始故其脈緊其證頭痛項強腰痛與傷寒同也內栗者心惕惕然栗也難經以中濕為腎邪其病足脛寒而逆則此足膝逆冷為中濕明甚便溺妄出者河間所謂邪客於足厥陰之經廷孔鬱結極甚而氣血不通痿痹不用旋溺遺失不能收禁也三焦者原氣之別使主通行上中下之三氣經歷於五臟六腑通行三焦者即紀氏所謂稟真元之氣即原氣也上達至中焦中焦受水穀精悍之氣化為營衛營衛之氣與真元之氣通行達於上焦則上下內外左右皆通今表氣微虛裡氣微急則三焦相混內外不通矣上焦病則鬱熱內發而口糜齦蝕中焦病則脾不能化胃所納而胃中濁則無精氣為營悍氣為衛而營衛不通則血亦凝泣而不流矣其人尚可以久乎然營衛不能一時而通必有先後欲知孰為先後衛氣先通者必先小便黃赤而後發癰膿營氣先通者必先嚏嗢咽塞而後下血如豚肝也衛氣者溫分肉充皮膚肥腠理司開闔故其通也以潰膿營氣者以其津液注之於肺化而為血以榮四末注臟腑故其通也以下血若營衛之氣竟不通則陰陽俱厥脾弱不能散精幹肺通調水道而五臟之津液注下下焦不闔數至圊而無氣以出之也臍中如築拘急而痛腎間動氣欲絶故也故曰命將難全亮宸衛氣前通者下焦之邪化而為熱陰病變陽故癰膿也營氣前通者上焦之邪化而為寒復遇外客之寒邪則上下皆寒矣故向日為熱所壅之血凝自下如豚肝也此陽病化陰故曰陰陽俱厥厥者寒濕之極也所以命將難全傷寒之證轉熱為佳故少陰厥陰皆以發熱而愈則凡下膿血與癰膿皆非死證也脈陰陽俱緊者口中出氣唇口乾燥踡臥足冷鼻中涕出舌上胎滑勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日已上反火發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也脈陰陽俱緊者表裡客寒寒為陰得陽則解口中氣出唇口乾燥者陽氣漸復正氣方溫也雖爾然陰未盡散踡臥足冷鼻中出涕舌上胎滑知陰猶在也方陰陽未分之時不可妄治以偏陰陽之氣到七日以來其人微發熱手足溫者為陰已退陽氣得復是為欲解若過七日不解到八日以上反發火熱者為陰極變熱邪氣勝正故治難陽脈緊寒邪發於上焦上焦主外也陰脈緊寒邪發於下焦下焦主內也設使惡寒者上焦寒氣勝是必欲嘔也腹內痛者下焦寒氣勝是必欲利也宇泰此篇表裡陰陽混淆未的疑似之間慎勿妄投藥餌徐而俟之若七日外當解之候微熱手足溫則為邪氣解而自愈矣若八日以上當解不解及發大熱此為逆證不可治也陰陽俱緊至於吐利其脈獨不解緊去人安此為欲解若脈遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解脈陰陽俱緊為寒氣甚於上下至於吐利之後緊脈不罷者為其脈獨不解緊去則人安為欲解若脈遲至六七日不欲食者為吐利後脾胃大虛則水飲內停也晚發者後來之疾也若六七日而欲食脾胃已和寒邪已散故云欲解病六七日手足三部脈皆至大煩而口噤不能言其人煩擾者必欲解也煩熱也傳經之時病人身大煩口噤不能言內作躁擾則陰陽爭勝若手足三部脈皆至為正氣勝邪氣微陽氣復寒氣散必欲解也若脈和其人大煩目重臉內際黃者此為欲解也脈經曰病人兩目皆有黃色起者其病方愈病以脈為主若目黃大煩脈不和者邪勝也其病為進目黃大煩而脈和者為正氣已和故云欲解脈浮而數浮為風數為虛風為熱虛為寒風虛相搏則灑淅惡寒也內經曰有者為實無者為虛氣並則無血血並則無氣風則傷衛數則無血浮數之脈風邪並於衛衛勝則營虛也衛為陽風搏於衛所以為熱營為陰營氣虛所以為寒風並於衛發熱惡寒之證具矣兼善古今皆以數脈為熱茲以數為虛寒者何也數則為虛乃陰陽偏負之理非專寒而專熱也浮為陽浮數為陽虛沉為陰沉數為陰虛陽虛則惡寒藥用溫熱抑陰扶陽陰虛則發熱藥用寒涼抑陽扶陰使二氣平其病自愈且如病在表脈浮而數乃陰盛陽虛汗之則愈下之則死病在裡脈沉而數乃陽盛陰虛下之則愈汗之則死經論昭然非有差別健曰浮數風熱表證之脈此言數者乃陽氣虛而風邪乘之上湧之象虛為寒者乃風邪猶未作熱先令惡寒即內經云邪之所湊其氣必虛者是也然證實非虛寒誤認則僨事矣脈浮而滑浮為陽滑為實陽實相搏其脈浮疾衛氣失度浮滑之脈數疾發熱汗出者此為不治浮為邪氣並於衛而衛氣脈勝滑為邪氣並於營而營氣實邪氣勝實壅於營衛則營衛行速故脈行疾而失其常度也浮滑數疾之脈發熱汗出當解若不解者精氣脫也不可治矣經曰脈陰陽俱盛大汗出不解者死健曰浮滑風痰在表之脈浮滑而至數疾風從火熾痰熱盛極喜其汗出而解何以言不治耶此應分兩節看浮滑既為陽實明系在表之邪必汗不及時邪留於衛衛氣失度熱並於營而營衛之行俱速故脈更數且疾勢將喘息發熱而為亢陽之象其舌必焦縮火極自汗熱迫流津而成不治矣脈訣稱七疾八極誠屬死候傷寒咳逆上氣其脈散者死謂其形損故也千金以喘嗽咳逆上氣者肺病散者心脈是心火刑于肺金也內經曰心之肺謂之死陰死陰之屬不過三日死形見損傷故也辨平脈法第二問曰脈有三部陰陽相乘營衛氣血在人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀脈大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輟改易進退低昂心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源脈有三部尺寸及關寸為上部關為中部尺為下部營衛流行不失衡銓衡銓者稱也稱量輕重也內經曰春應中規夏應中矩秋應中衡冬應中權營衛與脈相隨上下應四時而不失常度腎沉心洪肺浮肝弦此自經常不失銖分腎北方水旺於冬而脈沉心南方火旺於夏而脈洪肺西方金旺於秋而脈浮肝東方木旺於春而脈弦為銖分不差之經常出入升降漏刻周旋水下二刻一周循環身之脈長十六丈二尺一呼行三寸一吸行三寸一息共六寸一日一夜漏水下百刻人一萬三千五百息脈行八百一十丈五十周於身則一刻之中人一百三十五息脈行八丈一尺水下二刻人二百七十息脈行十六丈二尺一周於身也經脈流行終而復始若循環之無端也當復寸口虛實見焉經脈之始從中焦注於手太陰寸口二百七十息脈行一周還復寸口寸口為脈之經始故以診視虛實焉經曰虛實死生之要皆現於寸口也變化相乘陰陽相干風則虛浮寒則牢堅沉潛水畜支飲急弦動則為痛數則熱煩風傷陽故脈虛浮寒傷陰故脈牢堅畜積於內者謂水之畜故脈沉潛走散於外者謂之支飲故脈弦急動則陰陽相搏則痛生焉數為陽邪氣勝陽勝則熱須焉設有不應知變所緣三部不同病各異端脈有與病不相應者必緣傳變之所致三部以候五臟之氣隨部以察虛實之異太過可怪不及亦然邪不空見中必有奸審察表裡三焦別焉知其所舍消息診看料度腑臟獨見若神為子條記傳與賢人太過不及之脈皆由邪氣干於正氣審看在表在裡入腑入臟隨其所舍而治之宇泰按此章後人以為出自叔和今按脈經載仲景論脈止此一條則知非叔和自撰也師曰呼吸者脈之頭也難經一呼脈行寸一吸脈行寸以脈隨呼吸而行故曰脈之頭也初持脈來疾去遲此出疾人遲名曰內虛外實也初持脈來遲去疾此出遲人疾名曰內實外虛也外為陽內為陰內經曰來者陽是出以候外去者陰是入以候內疾為有餘有餘則實遲為不足不足則虛來疾去遲者陽有餘而陰不足故曰內虛外實來遲去疾者陽不足而陰有餘故曰內實外虛間曰上工望而知之中工問而知之下工脈而知之願聞其說師曰病家人請云病人苦發熱身體疼病人自臥師到診其脈沉而遲者知其差也何以知之表有病者脈當浮大今脈反沉遲故知愈也望以觀其形證問以知其所苦脈以別其表裡病苦發熱身疼邪在表也當臥不安而脈浮數今病人自臥而脈沉遲表邪緩也是有里而無表證則知表邪當愈也觀子陽病得陰脈者死何以此得沉遲之脈反屬當差曰陽病陰脈死者以未服湯藥未得汗之前而言是病脈相反裡氣已壞故主死此乃指發熱身疼已罷之後而言政所謂凡服湯數動更遲初躁後靜之脈也邪退正復安得不愈一為未汗之先一為既汗之餘觀者毋忽諸假令病人云腹內卒痛病人自坐師到脈之浮而大者知其差也何以知之表裡有病者脈當沉而細今脈浮大故知愈也腹痛者裡寒也痛甚則不能起而脈沉細今病人自坐而脈浮大者裡寒散也是有表而無里證也則知里邪當愈是望證問病切脈三者而得之可謂十全之醫矣針經曰知一為上知二為神知三神明矣三陽曰腹痛所因不同亦有其脈自浮而大者必自坐方愈師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令脈下和處言已愈發熱煩極則不能靜臥今向壁靜臥知熱已去設令向壁臥聞師到不驚起而盻視者若三言三止脈之咽唾者此詐病也設令脈自和處言此病大重當須服吐藥針灸數十百處乃愈詐病者非善人以言恐之使其畏懼則愈醫者意也其斯之謂歟師持脈病人缺者無病也陽引而上陰引而下陰陽相引故缺陰陽不相引則病陰陽相引則和是缺者為無病也脈之呻者病也呻為呻吟之聲身有所苦則然言遲者風也風客於中則經絡急舌強難運也健曰中風痰塞每見是脈搖頭言者里痛也里有病欲言則頭為之動搖行遲者表強也表強者由經絡引急而行動不利健曰風寒之初邪在表則四肢酸重而步履難也坐而伏者短氣也短氣者里不和也故坐而喜伏坐而一腳者腰痛也內經腰者身之大關節腰痛則關節不利故坐一腳以緩腰中之痛耳裡實護腹如懷卵物者心痛也心痛則不能伸仰護腹得按其痛健曰心居膻中之內心君不受邪犯則立死此護腹如懷物非心之地位大抵是胃氣痛居多師曰伏氣之病以意候之今月之內欲有伏氣假令舊伏氣當須脈之若脈微弱者當喉中痛似傷非喉痹也病人云實咽中痛雖爾今復下利冬時感邪藏於經中不即發者謂之伏氣至春分之時伏寒欲發故云今月之內欲有伏氣假令伏氣已發當須脈之審在何經得脈微弱者知邪在少陰少陰之脈循喉嚨寒氣客之必發咽痛腎司開闔少陰治在下寒邪內甚則開闔失治下焦不約必成下利故云雖爾咽痛復欲下利健曰伏氣猶傷寒不即病而變溫變熱之類伏於少陰之經則發喉痛夫喉主天氣咽主地氣因其脈微弱是少陰在下之象故言咽痛非喉痹也文雖如此然伏藏之氣其邪久郁寒已變熱而上為咽痛者多成氏謂寒氣客之客者新感之稱新邪束其伏郁之熱亦有咽痛此名熱為寒束治當辛涼以散須鼠黏子湯加減若認寒邪內甚而進辛溫必害事矣雖爾而復下利者蓋咽通腸胃其熱下移乃挾熱而利若作寒治則均失伏氣之義問曰人恐怖者其脈何狀師曰脈形如循絲纍纍然其面白脫色也內經曰血氣者人之神恐怖者血氣不足而神氣弱也脈形似循絲而面白脫色針經曰血奪者色夭然不澤其脈空虛是知恐怖為血氣不足也問曰人不飲其脈何類師曰其脈自澀唇口乾燥也澀為陰主亡津液而唇口乾燥以陰為主內故不飲問曰人愧者其脈何類師曰脈浮而面色乍白乍赤愧者羞也愧則神氣怯弱故脈浮而面白色改變不常也問曰經說脈有三寂六菽重者何謂也師曰脈者人以指按之如三菽之重者肺氣也如六寂之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也菽豆也難經曰如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋骨相得者肝部也按之至骨舉指來疾者腎部也各隨所主之分以候臟氣假令下利寸口關上尺中悉不見脈然尺中時一小見脈再舉頭者腎氣也若見損脈來至為難治脈經曰冷氣來胃中故令脈不通下利不見脈則冷氣容於脾胃今尺中時一小見為脾虛腎氣乘之脈再舉頭者脾為腎氣所乘也若尺中之脈更或減損為腎氣衰脾復勝之鬼賊相形故云難治是脾勝不應時也觀子此即察腎氣脈之一法以該上分菽數求諸臟之法也損脈者平人數至病人一至所謂四損五損類也諸部脈既伏匿難求止得一臟之氣見而又至極遲減兼得損脈其欲生全也難已哉問曰脈有相乘者有縱有橫有逆有順何也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘水名曰逆金行乘水木行乘火名曰順也金勝木水勝火縱者言縱任其氣乘其所勝橫者言其氣橫逆故乘所不勝也縱橫與恣縱恣橫之義通水為金子子行乘母其氣逆也母行乘子其氣順也問曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六者名曰殘賊能為諸脈作病也為人病者凡八邪風寒暑濕傷於外也飢飽勞逸傷於內也其為諸經脈作病者必由風寒暑濕傷於營衛客於陰陽之中風則脈浮寒則脈緊中暑則脈滑中濕則脈澀傷於陰則脈沉傷於陽則脈浮謂之殘賊者以其能傷害正氣也健曰既言內外八邪何只言其外而未及其內竊以為飢則木來乘土而脈弦飽則悍氣上溢於肺而脈浮勞則氣耗而血不榮其脈澀逸則氣滯而血不行其脈沉此內賊之脈亦為證驗問曰脈有災怪何謂也師曰假令人病脈得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪耳醫以脈證藥相對而反變異為其災可怪故名災怪問曰東方肝脈其形何似師曰肝者木也名厥陰其脈微弦濡弱而長是肝脈也肝病自得濡弱之脈者愈也難經曰春脈弦肝東方木也萬物始生未有枝葉故脈來濡弱而長故曰弦是肝之平脈肝病得此脈而愈者是肝氣和也假令得純弦者死何以知之以其脈如弦直是肝臟傷故知死也純弦如弦直而不軟是中無胃氣為真臟之脈內經曰死肝脈來急益徑如新張弓弦南方心脈其形何似師曰心者火也名少陰其脈洪大而長是心脈也心病自得洪大者愈也心主夏夏貝陽外勝氣血淖溢故其脈來洪大而長假令脈來微去大故名反病在裡也脈來頭小本大者故名覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死心脈來盛去衰為平來微去大是反本脈內經曰大則邪至小則平微為正氣大力邪氣來以候表來微則知表和去以候里去大則知里病內經曰心脈來不盛去反盛此為不及病在中頭小本大者即前小後大也小為正氣大為邪氣邪氣先在裡今復於表故名曰覆不云去而止云來者是知在表脈經曰在上為表在下為里汗者心之液上微為浮之而微頭小為前小則表中氣虛故主汗出下微為沉之而微本大為後大沉則在裡大則病進內經曰心為牡臟小腸為之使今邪甚下行格閉小腸使正氣不通故不得尿名曰關格脈經曰陽氣上出汗見於頭今關格正氣不通加之頭有汗者則陽氣不得下通而上脫也其無汗者雖作關格然陽氣未衰而猶可治健曰此斷文義最奧成氏雖引經詳解而皆未顯豁竊以為來微去大者即浮按無力而沉按有力也頭小本大者即上部無力而下部有力也反覆表裡四字不必纖綱穿鑿其義似不中理反者反上之謂何云在裡覆者覆下之謂何云在表此經文之倒句也其要在頭小汗出為陽氣脫本大尿閉為陰氣結頭小則天道不能下濟膀胱之水無氣以化也本大則地氣不能上升為不交之否也上微頭小義相合下微本大義不合豈有微而兼大者乎理難為信也丹溪云上逆不入為格下閉不出為關上下不通謂之關格此但言不得尿而未及乎水漿不入者蓋闕文耳西方肺脈其形何似師曰肺者金也名太陰其脈毛浮也肺病自得此脈若得遲緩者皆愈若得數者則劇何以知之數者南方火火克西方金法當癰腫難治也輕虛而浮曰毛肺之平脈也遲緩者脾之脈脾為肺母以子母相生故云皆愈數者心脈火剋金為鬼賊相刑故劇肺主皮毛數則為熱熱客皮膚留而不去則為癰瘍經曰脈數不時則生惡瘡觀子此下當有北方腎脈一段必闕亡也問曰二月得毛浮脈何以處言至秋當死師曰二月之時脈當濡弱反得毛浮者故知至秋死二月肝用事肝脈屬木應濡弱反得毛浮者是肺脈也肺屬金金來剋木故知至秋死他皆仿此當春時反見秋脈為金氣乘木肺來克肝奪其旺氣而見至秋肺旺肝氣則絶故知至秋死健曰當春生髮之令而現肅殺之象其人本原已乏生氣至秋陰氣旺而陽氣衰安得不死師曰脈肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之肥人肌膚厚其脈當沉瘦人肌膚薄其脈當浮今肥人脈反浮瘦人脈反沉必有邪氣相干使脈反常故當責之也責者究也師曰寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治決死也若計其餘命死生之期期以月節克之也脈經曰陽生於寸動於尺陰生於尺動於寸寸脈下不至關為陽絶陽絶者不能下應於尺也尺脈上不至關為陰絶陰絶者不能上應於寸也內經曰陰陽決離精氣乃絶此陰陽偏絶故皆決死期以月節克之者謂如陽絶死於春夏陰絶死於秋冬也師曰脈病人不病名曰行尸以無旺氣卒眩僕不省人者短命則死人病脈不病名曰內虛以無穀神雖困無苦脈者人之根本脈病人不病為根本內絶形雖且強猝然氣絶則眩運僵仆死不曰行尸而何人病脈不病則根本內固形雖且羸止內虛爾穀神穀氣也穀氣既足自然安矣經云形氣有餘脈氣不足死脈氣有餘形氣不足生健曰內虛無穀神五字成解尚未透徹此內虛要作內無邪滯看無穀神惟胃弱食少爾其人雖困而其脈不病根原有在猶可調養安全故曰無苦無苦是無害也問曰翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽和合故脈滑關尺自平陽明脈微沉食飲自可少陰脈微滑滑者緊之浮名也此為陰實其人必股內汗出陰下濕也脈大而盛聚而沉謂之翕奄沉如轉珠之狀沉為臟氣故曰純陰翕為腑氣故曰正陽滑者陰陽之氣不偏勝也關尺自平陽明脈微沉者當陽部見陰脈則陰勝而陽不足也陽明胃脈胃中陰多故食自可少陰脈微滑者當陰部見陽脈則陽勝而陰不足也以陽湊陰分故曰陰實股與陰少陰之部也今陽熱湊陰必熏發津液泄達於外股內汗出而陰下濕也宇泰翕奄沉三字狀滑字最好夫翕者合也奄者忽也當脈來合聚而盛之時奄忽之間即已沉去是名滑也仲景恐人誤認滑為沉故下文又曰滑緊之浮名也曰沉曰浮若異而同觀上文緊者如轉索無常也一句則知浮為轉索無常之浮非輕手便得有常之名也沉為翕奄之沉非重取乃得一定之說也仲景下字具有史筆不可草草看過健曰翕奄沉狀滑脈之形也將三字意義連貫神會則往來替替流利旋轉滑之為象宛然指下是陽中有陰之脈也不必逐字分看而又專重一沉字仲景預防偏認故明現乎辭而曰陰陽和合關尺自平已無餘蘊成氏未悟及此將關尺自平句連於陽明脈微沉句而作陰勝陽不足解謬矣試思陰勝陽不足之胃豈能飲食自可且以和合自平四字何謂乎蓋因文失誤次將脈滑二字偏在關尺自平句上若在自平句下則省種種之疑議矣讀者當審之問曰曾為人所難緊從何而來師曰假令亡汗若吐以肺裡寒故令緊也假令咳者坐飲冷水故令緊也假令下利以胃中虛故令緊也要略曰寒令脈急經曰諸緊為寒宇泰陽舒緩陰縮急陰化為寒揪然收斂氣血以堅其脈寧得不急經曰緊脈帶數且如切繩又曰如轉索無常故有寒則見矣觀子亡汗若吐內傷陽氣其脈因緊固矣若飲冷者亦寒傷肺也下利者內經曰微寒為咳寒甚為泄是也是以汗吐咳利四端病雖殊而裡寒頗同故並見緊脈耳寸口衛氣盛名曰高高者暴狂而肥內經曰陰不勝其陽則脈流薄疾並乃狂衛為陽氣衛氣盛而暴狂者陰不勝陽也宇泰高謂脈來浮而有力衛氣主表浮以候之其體在上今浮中有力是衛氣勝也以其在上故謂之高有升而不降之義營氣盛名曰章章者暴澤而光營者血也榮華於身者也營盛故身暴光澤也宇泰章者明也往來分明有條理也今脈滑為血實之診殆近是乎卿子此章字責其暴著也成注暴澤而光安得為病脈高章相搏名曰綱綱者筋急脈直也營衛俱盛則筋絡滿急宇泰綱總也健曰綱乃網之總把起水則領直其繩通身著力之物以脈比之亦弦直帶緊之象衛氣弱名曰惵惵迫怯也衛出上焦弱則上虛而心中氣動迫怯也宇泰舉之濡弱恍惚故謂之惵營氣弱名曰卑卑者羞愧也針經曰血神氣也血弱則神弱故心中當自羞愧宇泰營主血為陰按之其脈沉而無力故謂之卑卿子高者衛盛於外卑者營弱於內相形氣血之虛實惵卑相搏名曰損損虛懾也營衛俱虛則五臟六腑失於滋養致乏氣虛懾也宇泰陰陽俱虛總為之損舉按無力也衛氣和名曰緩緩者四肢不能自收衛氣獨和不與營相諧則營病內經曰足受血而能步掌受血而能握四肢不收由營血病不能灌養故也營氣和名曰遲遲者身體重但欲眠也營氣獨和不與衛氣相諧則衛病身體重而欲眠欲眠者衛病而氣不敷布也宇泰緩為胃脈胃合衛氣衛氣和故見緩脈遲為脾脈脾合營氣營氣和故見遲脈遲緩相搏名曰沉沉者腰中直腹內急痛但欲臥不欲行營氣獨和於內衛氣獨和於外營衛不相和諧相搏而為病腰中直者衛不利於外也腹內痛者營不和於內也但欲臥不欲行者營衛不榮也卿子遲緩之脈多屬和平又以營衛內外分貼故貼陽遲陰又以遲緩二字與浮躁反故下曰沉俗所說沉靜之意善讀書者會其意可也一本沉作強宇泰營衛俱和故遲緩相搏不亦強乎寸口脈緩而遲緩則陽氣長其色鮮其顏光其聲商毛髮長遲則陰氣盛骨髓生血滿肌肉緊薄鮮硬陰陽相抱營衛俱行剛柔相搏名曰強也緩為胃脈胃合衛氣衛和氣舒則顏色光潤聲清毛澤矣遲為脾脈脾合營氣營和血滿則骨正髓生肌肉緊硬矣營衛調和二氣相抱而不相戾營衛流通剛柔相得是為強壯不巖此釋上三句之義並結高章以下一段脈法故復提寸口二字謂高章失之盛惵卑失之弱唯營衛和平斯脈法遲緩審能知遲緩之脈陰陽相抱剛柔相搏斷而名之為強則無誤於剛與損二者之患矣觀子氣盛髓生血滿之人而肌肉緊硬能無太過偏勝乎惟緊與薄俱而又鮮硬此為營氣之和剛柔相得之道也趺陽脈滑而緊滑者胃氣實緊者脾氣強持實擊強痛還自傷以手把刃坐作瘡也趺陽之脈以候脾胃滑則穀氣實是為胃實緊則陰氣勝是為脾強以脾胃一實一強而相持擊故令痛作此脾胃兩各強實相擊臟腑自傷而痛譬若以手把刃而成瘡豈非自貽其害乎卿子玩趺陽數條皆本虛寒此之為實為強非真實真強也如不劑量邪正以實持之以強擊之誤於攻削乃自取傷耳故重嘆之即為醫咎同意痛字惜之也三陽曰胃中有食脾中有寒皆有餘也是以相搏若脾氣自強胃中雖實自然消穀豈能為病乎寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆經曰浮為虛又曰大則病進浮則為正氣虛大則為邪氣實在尺則邪氣關閉下焦裡氣不得上通故不得小便在寸則邪氣格拒上焦使食不得入故吐逆丹溪吸入肝與腎夫一元之氣升者為陽降者為陰肝腎位居下主吸與入其所吸之氣不能達腎至肝而還者陰之弱也浮大之脈屬陽見於寸者陽氣偏盛陰不得配之也故為格主吐逆此無陰則嘔也見於尺者陰血不足陽往乘之也故為關主不得小便此東垣滋腎丸意也趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格伏則胃氣伏而不宣中焦關格正氣壅塞故吐逆而水穀不化澀則脾氣澀而不布邪氣拒於上焦故食不得入卿子寸口脈浮而大趺陽脈伏而澀皆名關格皆為吐逆一則不得小便一則食不得入浮者見病於上伏者見病於下二條上下相反而相別也脈浮而大浮為風虛大力氣強風氣相搏必成癮疹身體為癢癢者名泄風久久為痂癩痂癩者眉少發稀身有干瘡而腥臭內經曰脈風成厲寸口脈弱而遲弱者衛氣微遲者營中寒營為血血寒則發熱衛為氣氣緩者心內飢飢則虛滿不能食也衛陽營陰弱者衛氣微陽氣不足也遲者營中寒經中客邪也營客寒邪搏而發熱也陽氣內微心內雖飢虛滿不能食也趺陽脈大而緊者當即下利為難治大為虛緊為寒胃中虛寒當即下利脈當微小反緊者邪勝也故云難治內經曰下利脈大為未止寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫音藹而吞酸食卒不下氣填於膈上也陽能消穀弱者陽氣不足則不能消穀緩者胃氣有餘則胃中有未消之谷故使噫而吞酸食卒不下氣填於膈上也要略曰中焦未和不能消穀故令噫卿子此胃氣有餘即經云陳氣二字不必指朱消穀物說正是治之以蘭除陳氣之證健曰此有餘乃邪有餘故噫酸氣滿卿子言陳氣似是而實非此傷寒里邪非蘭可治也趺陽脈緊而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相搏腸鳴而轉轉即氣動膈氣乃下少陰脈不出其陰腫大而虛也浮為胃氣虛緊為脾中寒胃虛則滿脾寒則痛虛寒相搏腸鳴而轉轉則膈中之氣因而下泄也若少陰脈不出則虛寒之氣至於下焦結於少陰而聚於陰器不得發泄使陰腫大而虛也健曰趺陽專主胃氣緊而浮文言為氣為寒而現諸證核之病情是寒變為熱矣按浮緊似弦數之象肝木乘土脾氣受制故腹滿而痛絞勢急若寒痛則痛微而勢緩腎主二便雖膈氣下而少陰脈不出則水就濕濕與熱並腎失施化脾失專制流為陰腫內經曰前陰者太陰陽明之所合也濕熱下聚乃傷寒餘邪未化故陰腫也虛者總因脾胃虛而不能轉輸耳寸口脈微而澀微者胃氣不行澀者營氣不足營衛不能相將三焦無所仰身體痹不仁營氣不足則煩疼口難言衛氣虛則惡寒數缺三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消穀引食下焦不歸者則遺溲夫養三焦者血也護三焦者氣也營衛俱損不能相將而行三焦無所依仰身體為之頑痹不仁內經曰營氣虛則不仁針經曰衛氣不行則為不仁營為血血不足則煩疼營屬心營弱心虛則口難言衛為陽陽微則惡寒衛為氣氣虛則數缺三焦因營衛不足無所依仰其氣不能歸其部歸者至也上焦在膈上物未傳化之分上焦之氣不至其部則物未能傳化故噫而酢吞中焦在胃之中主熟腐水穀水穀化則思食中焦之氣不至其部則水穀不化故不能消穀引食下焦在膀胱上口主分清濁溲小便也下焦之氣不至其部則不能約制小便故遺溲酢同醋趺陽脈沉而數沉為實數消穀緊者病難治沉為實者沉主裡也數消穀者數為熱也緊為肝肝脈見於脾部木來剋土為鬼賊相刑故云難治寸口脈微而澀微者衛氣衰澀者營氣不足衛氣衰面色黃營氣不足面色青營為根衛為葉營衛俱微則根葉枯槁而寒栗咳逆唾腥吐涎沫也衛為氣面色黃者衛氣衰也營為血面色青者營血衰也營行脈中為根衛行脈外為葉根葉俱微則陰陽之氣內衰致生寒栗而咳逆唾腥吐涎沫也宇泰子能令母虛肺主氣氣虛則脾色見於面而黃心主血血衰則肝色見於面而青肺臭腥脾液涎也營虛則寒栗衛虛則咳逆趺陽脈浮而芤浮者衛氣衰芤者營氣傷其身體瘦肌肉甲錯浮芤相搏宗氣衰微四屬斷絶衛氣衰則身體瘦而不肥營氣傷則肌肉甲錯而不澤宗氣者三焦歸氣也四屬者皮肉脂髓也營衛衰傷則宗氣亦微四屬失所滋養致斷絶矣寸口脈微而緩微者衛氣疏疏則其膚空緩者胃氣實實則谷消而水化也谷入於胃脈道乃行水入於經其血乃成營盛則其膚必疏三焦絶經名曰血崩衛為陽微為亡陽脈微者衛氣疏衛溫分肉肥腠理衛氣既疏皮膚不能溫肥則空虛也經曰緩者胃氣有餘有餘則為實內經曰食入於胃淫精幹脈是谷入於胃脈道乃行也針經曰飲而液滲於絡合和於血是水入於經其血乃成也故胃中水穀消化而為氣血今衛疏營盛是營氣強而衛氣弱也衛氣弱者外不能固密皮膚而氣為疏內不能護衛其血而血為之崩經常也三焦者氣之道路衛疏則氣不循常道三焦絶其常度也卿子玩實字乃胃病也實則谷消水化虛則不能使水穀入經循其脈道故外則膚空內則血崩營盛則不能與衛和膚疏謂不能固其營非營強而衛弱也不巖既言悍氣為衛精氣為營則營衛者水穀精悍之氣所成豈獨單言水不能化血即單言谷亦豈有化氣之理乎經文語甚圓即引內經淫精於脈合而為血亦不似成字水穀二字截然兩分也趺陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣中虛且寒氣自短矣少陰脈弱而澀弱者微煩澀者厥逆煩者熱也少陰脈弱者陰虛則發熱以陰部見陽脈非大虛也故生微煩厥逆四肢冷也經曰陰陽不相順接便為厥厥者手足逆冷是也少陰脈澀者是陰氣澀不能與陽相順接故厥逆也趺陽脈不出脾不上下身冷膚硬脾胃為營衛之根脾能上下則水穀消磨營衛之氣得行今脾家氣衰不能上下則營衛之氣不得通行於外故趺陽脈不出身冷者衛氣不溫也膚硬者營氣不濡也少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥當刺期門巨闕尸厥者謂其從厥而生形無所知其狀若尸故名尸厥少陰脈不出則厥氣客於胃而腎氣微少精血厥氣上奔填塞胸膈壅遏陽氣使宗氣反聚而血結心下針經曰五穀入胃其糟粕津液宗氣分為三隊宗氣積於胸中貫心肺而行呼吸者也又曰營氣者泌其津液注於脈化血而榮四末者也今厥氣甚宗氣反聚而不行則絶其呼吸血結心下而不流則四體不仁陽氣為厥氣所壅不能宣發退下至陰股間與陰相動仁者柔也不仁者不柔和也謂寒熱痛癢俱不覺知也陽氣不能使內外不通營衛俱不能行身體不仁狀若尸也內經曰厥氣上行滿脈去形刺期門者以通心下結血刺巨闕者以行胸中宗氣血氣流厥氣退則蘇矣觀子傷寒必診衝陽太溪脈者蓋腎乃先天元氣有生之根蒂胃乃後天元氣穀食之本原較他臟不同故必察其動脈之存亡以驗經氣之絶否至後世則多忽之政仲景所謂握手不及足者矣然亦有浮沉滑澀諸象一如手診在臨病之工善為消息若寸口胃腎是又衝陽太溪之經氣也使未至伏亂不可察則脈會太淵者不即是諸法以兼求之乎健曰仲景書稱趺陽備矣而不及太溪上少陰二條是即太溪之謂也成氏未達其義而觀子發明之寸口脈微尺脈緊其人虛損多汗知陰常在絶不見陽也寸微為陽亡尺緊為陰勝故名虛損又多汗則愈損陽氣是陰常在而絶不見陽也寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無穀氣脾澀不通口急不能言戰而栗也微為衛氣微故云亡陽濡為營氣弱故云亡血弱為陰虛虛則發熱緊為陰勝故諸乘寒者陰陽俱虛而為寒邪乘也寒乘氣虛抑伏陽氣不得宣越遂成厥也厥尸厥也鬱冒昏冒不知人也不仁強直無覺也以胃無穀氣脾澀不通於上下故口急不能言也戰者寒在表栗者寒在裡也問曰濡弱何以反適十一頭師曰五臟六腑相乘故令十一濡弱者氣血虛也往反有十一者五臟六腑共有十一頭也問曰何以知其乘腑何以知其乘臟師曰諸陽浮數為乘腑諸陰遲澀為乘臟也腑陽也陽脈見者為乘腑也臟陰也陰脈見者為乘臟也健曰以上辨脈一卷條理舛錯不能逐一結束是知叔和誤次之故類多如此
