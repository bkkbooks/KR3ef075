body:
  text: 傷寒直指卷四辨太陽病脈證治下第七問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白滑胎者難治結胸者邪結在胸臟結者邪結在臟二者皆下後邪氣乘虛入里所致下後邪氣入里與陽相結者為結胸以陽受氣於胸中故爾與陰相結者為臟結以陰受之則入五臟故爾氣宜通而塞故痛邪結陽分則陰氣不得上通邪結陰分則陽氣不得下通是二者皆心下硬痛寸脈浮關脈沉知邪結在陽也寸脈浮關脈小細沉緊知邪結在陰也陰結而陽不結雖心下結痛飲食亦自如故陰氣乘腸虛而下故時時自下利陰得陽則解臟結得熱證多易治舌上白胎滑者邪氣結胸中亦寒故云難治宇泰按本文如結胸狀則與結胸有分別矣注云是二者皆心下硬痛缺穩如結胸狀飲食如故只是按之不痛耳既結於臟而舌白胎滑又為胸寒外證上下俱病故云難治臟結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也臟結於法當下無陽證為表無熱不往來寒熱為半表半裡無熱其人反靜為里無熱經曰舌上如胎者以丹田有熱胸中有寒也以表裡皆寒故不可攻觀子臟結一證既與結胸連類並舉其為傷寒之邪明甚但結胸由表證初得誤下之邪熱內陷或雖未下裡虛耗氣傳入而成病發於陽邪屬於陽結歸於陽證不難治攻之可愈也若臟結者無陽證外無表證可得也不往來寒熱中無表裡證可得也其人反靜內無里證可得也病不屬三陽其所以類結胸者則是亦為邪結按之亦痛亦痞硬耳夫臟為里為陰既不從表氣始必陰寒內縈於裡裡寒則吐利厥逆之證隨作乃僅飲食如故時時下利何也三陰大寒極陰之證多矣皆有陽劑以治之何但云無治不可攻而不一處方藥耶臟氣既結病悉屬裡其脈之寸浮舌之白胎又何也先哲云陰受之則入五臟夫心肺居上肝腎居下脾居中央臟各異列果入何臟耶抑五臟之氣總相結耶蓋嘗思之陽明居中土也萬物所歸無所傳變風寒營衛六經之邪靡不由之者其常道也外此則脾與冒實表裡蓋胃主納受脾職磨運胃稟四臟之氣而脾化精微以營諸經真靈之氣是脾之與胃一而二二而一者也發於陽邪為陽而與陽相結者必陽明發於陰邪為陰而與陰相結者有不於太陰者乎太陰者至陰也其經本陰寒而又得外受之寒邪與飲食之寒冷未有不病者然太陰為病亦有數端桂枝加芍藥大黃證者病從太陽之邪誤下而傳陷也四逆輩證者臟寒虛甚當溫也桂枝中風證者邪但傷於經也皆不足為臟結之由臟結者亦從風寒飲食而得但其人中虧氣弱內奪所守遂使三陽之氣不復能作鬱熱於外而凝固之邪直與至陰深結於裡其能食而下利者胃為水穀之海營衛之總司病不在胃營衛無邪故飲食如故便利時通也然脾一病必不能運精微而敷布諸經絡又不能行津液而輸泄夫糟粕積之有漸則上結而胸脅痞滿中結而邪高病下無從解散下結而丹田且熱胸中且寒陰陽乖膈時時下利必終閉塞而有不可攻之形矣何也脾者卑下之氣結者寒邪之凝似當溫散經不言可溫同直中之裡寒者一驗之舌上白胎也再驗之寸脈猶浮也太陰者陰之首亦陰之表去少陽猶未遠也白胎者邪猶半在表半在裡也是當從中治以和解之豈溫里之可勝任乎寸猶浮者雖不從發於陽以始然其外陷之邪無由解散則入里成熱猶是陰中伏陽也其不可攻者脾之與胃陰之於陽交通氣化者也結則陰並於陰而陰陽不相濟邪之內陷者既化丹田之熱氣之外虛者復為胸上之寒二氣間隔一寒一熱上下不並而或痞或痛若以在臟為陰而惟與熱劑則下熱轉增而閉者愈閉以邪結為熱而惟與寒劑則上寒必盛而陰者益陰曰不可攻者蓋結久則實疑若可攻不知本由邪氣內陷成結攻之則陷益深結愈固病何由解乎近子由盧氏獨闡臟結之祕所載治案甚詳曰熱入者頓結頓結者併發故攻之可已寒入者漸積漸積者入而出攻之反致臟轉寒陰轉凝結轉固腸轉枯矣斯言已盡臟結之蘊第其所分氣結痰結食結飲結蟲結垢結血結水結積結及諸熱病寒病虛病實病諸怪異病種種多由臟結而致有臟結之常復有臟結之變議以從緩從小從輕從漸而治竊謂此可語雜病之臟結而未可語傷寒之臟結蓋傷寒為日既速而邪復毒烈治之後時變生不測豈彼日積月盈以漸而致但奪食飲醇聽其自解之比然或疑臟結之證古人罕知而近世何其多哉不知脾胃水穀之海無所不納雖曰人身法陰陽造化實猶一器然其樞機旋運之處未有不久而敝憊者或由他病而致腸胃固結或從腸胃固結而轉生他病理所必然昔丹溪法湔腹蕩腸之巧以倒倉法窮推陳致新之妙蕩與生俱生之宿積皆此類耳故雖痿痹㿗癃營泣衛弛陰傷陽絶者無不克臻奇效但於傷寒臟結終未洞然且不知宣通二劑之外因勢利導之機尚有他法可從事否如結胸狀者結痛痞塞似結胸非邪由同結胸誤下亦同結胸也成氏謂二者皆下後入里所致誤矣夫陰邪入里必作痞陽邪入里不作痞即協熱利甚者且清穀安有誤下入里而復作臟結者哉僕於近歲所見聞者大抵外非三陽諸證內非陰寒直中而痞結日久邪不得去或腹或脅硬痛不舒或下利或閉結皆舌上白胎誤投寒涼攻下溫熱法者靡不決裂昔陶尚文處小柴胡加生薑以主斯證僕謂更當參以先後緩急如果上塞結痛難除何妨暫從枳桔理中如果下熱閉結已久又應合之瀉心分解庶病無定形而藥非執一矣少陽表裡兼有故治不可單寒單熱脾土陰陽俱備故病亦且寒且熱是太陰絶類少陽者也而舌胎亦如之經曰難治者以其胎滑也滑則內轉寒陰轉盛若但胎白末至於滑猶可治耳或曰丹田陰也而反有熱胸中陽也而反有寒是其病不在表裡而在上下也上下之邪相悖而不相入所以不可攻也健曰臟結之證雖似結胸實不同結胸也結胸因太陽汗下之誤此屬太陰寒邪結塞結胸在上臟結在下顧名思義地位可判也乃因元陽之氣虛陰寒之邪盛凝結於腹脅腸臟之內耳結胸痛實而拒按不食者多臟結無拒按能食自利之可辨也群賢反復辨論以胎不滑為可治胎白滑為難治皆涉丹田有熱胸中有寒之句拘疑寒涼溫熱攻下之間致證治俱未鑿然後學何所適從考之舌法昭然可別矣其丹田有熱胸中有寒者乃少陽半表半裡無疑柴胡梔子豉湯白胎之證並無滑字其白胎滑者有左右之分舌右白胎滑者病在肌肉亦主半表半裡之邪必往來寒熱宜小柴胡湯解之舌左白胎滑者方是臟結之證邪併入臟斯為難治其或左或右半邊胎白滑半邊胎或黑或黃乃寒邪結在臟也宜黃連湯加附子結咽者不能言語生脈散合四逆可救十之一二此危候也若非半邊白滑不得以臟結論何前輩俱惑于丹田熱胸中寒而不酌治以善後乎細玩寸脈浮關脈細小沉緊又曰無陽證不往來寒熱總是表邪乘虛入陰太陰為陰經之首與少陽相接此不易之理當從陶氏小柴胡以解少陽之邪而合理中去附子加桂枝為治以使冒氣鼓動於脾內經曰脾為死陰待胃氣以生脾氣得舒陰寒之結可散而四臟之氣鹹得轉環所謂邪不解何由而散寒不溫何從而解總循傷寒治法不必較量雜病庶無歧惑病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也發熱惡寒者發於陽也而反下之則表中陽邪入里結於胸中為結胸無熱惡寒者發於陰也而反下之表中陰邪入里結於心下為痞兼善成注謂無熱而惡寒者發於陰也既無熱惡寒為陰證安可有下之理又豈止作痞而已哉夫仲景所謂陰陽者指表裡而言也病在表則當汗而反下之因作結胸病在裡尚未入腑而轍下之因作痞所以成結胸者下之太早故也然結胸與痞皆太陽證所致非陰證之謂也觀子經云柴胡證他藥下之但滿而不痛為痞是以半在裡之邪為陰也崔皋云三陰各有在經表證下之早皆成痞是以陰經為陰也竊觀致痞之由不一安得謂但有在裡之陰而無三陰表邪之陰吳氏之言可為善推仲景之餘意矣至張兼善又以風邪入里為結胸寒邪入里為痞陶節庵以桂枝證為結胸麻黃證為痞二人語異而意同是直以寒為陰耳然經云傷寒中風下之皆成痞表未解宜桂枝湯者亦戍痞痞果盡屬寒耶否耶大抵痞與結胸要在分高下輕重虛實之迥殊若陰陽表裡雖言其邪已不同亦未可盡拘拘者如經云下早成痞然生薑瀉心證又因汗後所致者有焉作痞句雖不言熱其意可會痞但邪輕於結胸非痞為寒入也所以成結胸句不言痞而含一痞字在內結胸痞皆由下之太早而成文則舉此以該彼耳健曰發於陽者為風為表發於陰者為寒為里但三陽三陰皆有表裡因不當下而下之則成結胸與痞耳結胸痞之列於太陽篇者以太陽為首經病必先之也結胸者項亦強如柔痓狀下之則和宜大陷胸丸結胸病項強者為邪結胸中胸膈結滿心下緊實但能仰而不能俯是項強如柔痓之狀也與大陷胸丸下結泄滿觀子結胸不曰膈內拒痛即曰心下硬滿不曰心下石硬即曰心下至少腹痛不可近是邪雖未入腑而三焦上下心腹之所為病也故大陷胸湯以下之此更不言胸腹諸患但項強如柔痓則其邪猶淺僅浮結於上部無峻劑之下達遂易丸煮飲兼瀉肺閉也結胸證其脈浮大者不可下下之則死結胸病邪結胸中屬上焦之分得寸脈浮關脈沉者為在裡則可下若脈浮大心下雖結是在表者猶多未全結也下之重虛邪氣復結則難可制故云下之則死兼善結胸為可下之證今脈浮大心下雖結表邪尚多下之重虛其里外邪復聚死矣故言此為針戒也又如小結胸脈浮滑按之則痛知邪亦非深結不敢下無過解除心下之熱耳或曰結胸倘有外證大陷胸可用否曰結胸無外證或有微熱或有小潮熱已明言之若有外證具邪亦未結不可以結胸論也如經云六七日惡寒心下支結外證未去者柴胡桂枝湯主之六七日胸脅微結但頭汗出往來寒熱心煩者柴胡桂枚乾薑湯以上皆有外證之治如無外證止胸腹結實而痛者方必陷胸也健按浮大之脈表邪尚在陽分故不可下結胸之脈必寸浮關沉為在裡可下茲不分寸關但曰浮大想必兩手浮大矣烏可誤下者乎結胸證具煩躁者亦死結胸證具邪結已深也煩躁者正氣散亂邪氣勝正病者必死矣太陽病脈浮而動數浮則為鳳數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余無汗劑頸而還小便不利身必發黃也浮動數皆陽脈也當責邪在表睡而汗出謂之盜汗為邪在半表半裡則不惡寒此頭痛發熱微盜汗出反惡寒者表未解也當發其汗醫反下之虛其胃氣表邪乘虛內陷邪在表則見陽脈邪在裡則見陰脈邪氣內陷動數之脈所以變遲而浮脈獨不變者以邪結胸中上焦陽結脈不得而沉也客氣者外邪乘胃空虛入里結於胸中而拒痛者客氣動膈也要略曰短氣不足以息者實也短氣躁煩心中懊憹皆邪氣為實陽氣內陷不得通於膈塞於心下為硬滿而痛成結胸也與大陷胸湯以下結熱若胃中空虛陽氣內陷不結於胸膈下入於胃中遍身汗出則為熱越不能發黃若但頭汗出身無汗劑頸而還小便不利者熱不得越必發身黃也亮宸病發於陽為太陽中風證故盜汗出惡寒當以桂枝汗之今醫反下虛其裡氣邪熱乘虛結於膈上胃在膈下故胃中反空虛而客氣動膈也夫人之有膈前齊鳩尾所以遮膈腸胃濁氣今邪結於膈氣不得下故短氣邪熱內結氣不得通故躁煩熱熏胸中故懊憹心下硬且痛者結之最堅也脈動數變遲者在表故動數既胸中堅結故變遲也前云寸脈浮者上氣不得下降也關脈沉者下氣不得上行也方用大黃最多若以蕩滌芒硝佐之咸以軟堅此皆下焦血分之品而用之者上焦水與氣並未全腐化非甘遂從上焦直達通泄水氣以鼓硝黃之力是氣分之藥為專功也觀子此表邪初盛之際已妄下之入里成結胸者也玩痛發熱惡寒及脈浮數類自見政所謂下之太早者膈內拒痛八語形容結胸之狀備且晰矣傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之病在表而下之熱入因作結胸此不云下後而云傷寒六七日則是傳裡之實熱也沉為在裡緊為裡實以心下痛按之實硬是以為結胸與大陷胸湯以下結熱兼善經言所以成結胸者以下之太早故也此不云下後但云傷寒六七日熱實而亦結胸者何也夫下早結胸事之常熱實傳裡結胸事之變乃法之關防不盡者故仲景述其證以著其方也於此可見古人用心曲盡之妙且如下章水結胸脅但頭汗出者以大陷胸湯主之亦在常法之外故條列其證以彰其理也亦或其人本虛或曾吐下而裡氣弱外邪因入故自為結胸也然所入之因雖不同其證治則一理而已亮宸雖曰下後亦有不因下而表邪傳入遂成結胸者此一條政明傳邪也沉緊為裡實石者言堅之甚也觀子此不由誤下里虛邪熱內結因以成結胸者也結胸皆熱入胸中此獨云熱實者可見未嘗妄治而熱已收斂成實也結胸脈寸浮關沉臟結脈關小細沉緊此但沉緊者邪入之深也既病略同遂一法治之傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結胸脅也但頭微汗出者大陷胸湯主之傷寒十餘日熱結在裡是可下之證復往來寒熱為正邪分爭未全斂結與大柴胡湯下之但結胸無大熱者非熱結也是水飲結於胸脅謂之水結胸周身汗出者是水飲外散則愈若但頭微汗出余處無汗是水飲不得外泄停畜而不行也與大陷胸湯以逐其水潔古甘遂直達水氣所結之處乃泄水之聖藥若水結胸中非此不除但有毒不可輕用亮宸熱與水結於裡故表無熱水結則停畜不行故但頭汗出是水飲外發則愈矣然必作痛果有堅結之狀者方可大陷胸湯又不若活人書小半夏茯苓湯類為穩也觀子此言水結胸與熱結在裡之不同也十餘日邪深入腑之時熱結在裡而猶有半表裡之邪作往來寒熱者必以大柴胡兩除之但胸脅結滿初無大熱收斂入內者此亦不得為大柴胡證必水結胸也何以知之熱結胸者頭汗出今但頭微汗水結胸證也與大陷胸湯太陽病重發汗而復下之不大便五六日舌上燥而渴日哺所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之重發汗而復下之則內外重亡津液而邪熱內結不大便五六日舌上燥而渴也日晡所潮熱者屬胃此日晡小有潮熱非但在胃從心下至少腹硬滿而痛不可近是一腹之中上下邪氣俱甚也與大陷胸湯以下其邪亮宸日晡潮熱少腹硬滿似屬承氣證今從心下至少腹由於胸中之結故亦主陷胸也觀子此太陽與陽明俱有邪結者也玩舌上乾燥而渴可為熱結胸之甚者從心下至少腹硬痛不可近可為大陷胸之甚者蓋重汗復下因不大便轉屬胃實則邪已干陽明然潮熱猶小硬痛從心下始則結於太陽者為本矣故亦從大陷胸湯治健曰所字作時字解日晡日西申酉時也陽明燥金經氣旺於申酉至其時邪氣搏之則發潮熱潮熱者如潮之應時而至不失汛也小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之心下硬痛手不可近者結胸也正在心下按之則痛是熱氣猶淺謂之小結胸脈沉緊或寸浮關沉今脈浮滑知熱未深結與小陷胸湯以除之宇泰上文言硬滿而痛不可近者是不待按而亦痛也此云按之則痛是手按之然後作痛耳上文云至少腹是通一腹而言此云正在心下則少腹不硬痛可知矣熱微於前故云小陷胸也觀子此熱邪微但痰氣之相結者故不用硝黃類而曰小陷胸也太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利不止必作結胸未止者四日復下之此作協熱利也太陽病二三日邪在表也不能臥但欲起心下必結者以心下結滿臥則氣壅而愈甚故不能臥而但欲起也心下結滿有水分有寒分有氣分今脈微弱知本有寒分醫見心下結而反下之則太陽表邪乘虛入里利止則邪氣留結為結胸利不止至次日復如前則下利不止者是邪熱下攻腸胃為挾熱利也觀子太陽病二三日之時表邪必盛脈微弱有寒則又裡虛邪深臥起不安心下結邪留心胸間政為半表裡之候法當柴胡類雙解之醫不知此而以內結為實下除之表邪必併入於裡其陷高者利止而結胸陷之深與四日復下者利不止而協熱也結胸者如經云本柴胡證下之心下滿而痞硬者為結胸大陷胸湯主之是已協熱者如經云外證未除數下之協熱而利心下痞硬表裡不解桂枝人參湯主之是已健曰經文不言治法觀子引前結胸以發明之但協熱利下文無心下痞硬表裡不解二句何可與桂枚人參為治溫補之劑與協熱二字有礙而於心下痞硬表裡不解八字更有違矣觀子之囊括雖精而折斷未妥蓋非閲歷經驗中來耳太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血此太陽病下之後邪氣傳變也其脈促者為陽盛若下之後脈促為陽勝陰也故不作結胸為欲解下後脈浮為上焦陽邪結而為結胸也經曰結胸寸脈浮關脈沉下後脈緊則太陽之邪傳於少陰經曰脈緊者屬少陰內經曰脈緊者邪客少陰之絡令人咽痛不可納食所以脈緊者必咽痛也脈弦則太陽之邪傳於少陽經曰尺寸俱弦者少陽受病也其脈循脅絡耳所以脈弦者必兩脅拘急也下後邪氣傳裡則頭痛當止脈細數為未傳裡而傷氣也細為少氣數為在表故頭痛未止脈沉緊則太陽之邪傳於陽明為裡實沉為在裡緊為裡實陽明裡實故必欲嘔脈滑則太陽之邪傳於腸胃以滑為陰氣有餘知邪氣入里干於下焦也沉為血勝氣虛是為協熱利浮為氣勝血虛是必下血經曰不宜下而便攻之諸變不可勝數此之謂也東垣此太陽一下分八變也觀子同一誤下而所變不同如此邪氣與正氣之爭勝無常也或侵少陽或侵少陰或侵陽明或結於胸或入於腸隨其所傳陷而莫不徵之於脈誠病之先機乎玩此又以悟傳經之微旨原不可拘拘為者病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服病在陽為邪在表也法當汗出而解反以冷水潠之灌洗熱被寒水外不得出則反攻其里彌更益煩肉上粟起者水寒之氣客於皮膚也意欲飲水者里有熱也反不渴者寒在表也與文蛤散以散水寒之氣若不差是水熱相摶欲傳於裡與五苓散發汗以和之始熱在表因水制之不得外泄內攻於裡結於胸脅心下硬痛本是水寒伏熱為實故謂之寒實結胸無熱證者外無熱而熱悉收斂於裡也與小陷胸湯以逐之與白散下熱故亦可攻觀子此寒實結胸致病之由與隨證施治之法結胸皆由下早熱入而成此未曾下而以冷水潠灌致在表之邪隨水寒之氣鬱伏入內而成寒結胸也邪在陽者從汗外解潠灌則轉劫入里矣奚從去乎由是內則熱入而彌煩外則寒凝而粟起邪熱在胸意欲飲水寒氣內凌究不成渴其淺而易解者與文蛤散深而難去者與五苓散庶幾相搏之氣導而散之不已者必閉熱入里而悉收斂於內外更無熱證也是寒已成實而結胸中宜三物小陷胸湯以除焦膈之煩灼而被劫之邪自去矣猶不已則結久而痰飲邪濁留之深固也與白做攻之而膠滯之物悉蠲矣水結胸乃過飲停水是有物為病此惟溪灌洗濯寒冷之氣劫熱而成雖曰寒實較之停飲者有有形無形之殊太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門太陽之脈絡頭下項頭項強痛者太陽表病也少陽之脈循胸絡膈如結胸心下痞硬者少陽表病也太少陽相併為病不能在表故頭項不但強痛而或眩冒亦未全入里故時如結胸心下痞硬此邪在半表半裡之間刺大椎第一間肺俞以瀉太陽之邪刺肝俞以瀉少陽之邪邪在表則可發汗在半表半裡不可發汗發汗則亡津液損動胃氣少陽之邪因干於胃土為木刑必發譫語脈弦至五六日傳經盡邪熱去而譫語當止著復不止為少陽邪熱甚也刺期門瀉肝膽之氣觀子太陽之病頭項強痛而已或眩冒者與少陽並病也少陽之病脅下硬滿而已如結胸心下痞硬者與太陽並病也太陽當汗有少陽則不可汗少陽當和解有太陽則和解邪不去此非湯藥所能行也惟刺大椎第一間肺俞而太陽之熱邪以瀉刺肝俞而少陽之熱邪以瀉則二經之氣悉和矣若不知而誤汗亡津損胃則必譫語脈弦蓋太陽之邪即從汗衰而少陽之邪轉盛也五六日譫語猶宜刺期門者此之譫語由亡津液損胃氣而致不宜再下以奪內液法惟刺期門以瀉肝之盛熱大椎即百勞穴一椎上陷中主瀉胃中諸熱氣第一間疑即商陽在食指內側主胸中氣滿熱病汗不出肝俞在第九椎下肺俞在三椎下各去脊中二寸二穴並主瀉五臟之熱期門在乳根二肋端主傷寒胸中煩熱過經汗不出健曰太陽少陽並病經文但有刺法世醫兼擅者少如必待刺而愈倘無能刺者坐而待斃耶可與小柴胡去參加防風蒼朮石膏合溫膽湯治之諒亦可解柴胡溫膽能和解少陽除眩冒痞結之氣防風蒼朮石膏能散太陽頸項強痛之風濕與熱則半表半裡之邪俱解矣婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之中風發熱惡寒表病也若經水不來表邪傳裡則入腑而不入血室也因經水適來血室空虛至七八日邪氣傳裡之時更不入腑乘虛而入於血室熱除脈遲身涼者邪氣內陷而表證罷也胸脅下滿如結胸狀譫語者熱入血室而裡實期門者肝之募肝主血刺期門者瀉血室之熱審看何經氣實更隨實而瀉之東垣妄見妄聞夜夢亡人皆肝木大盛而為邪刺期門即此義亮宸此少陽內結肝臟之在也三條惟此為獨盛發熱惡寒表病也經水來而血室大虛邪遂乘虛內結於肝曰熱除曰身涼曰脈遲則表邪悉罷非如猶有寒熱者矣曰胸脅滿如結胸狀曰譫語則里結甚堅非如次證之無痞硬三證之止暮譫語者矣然在肝贓非如腑病之可桃仁抵當下也惟有刺肝之募使臟氣通而血自行故曰隨其實而瀉之也婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之中風七八日邪氣傳裡之時本無寒熱而續得寒熱經水適來適斷者此為表邪乘虛入於血室與血相搏而血結不行經水所以斷也血氣與邪分爭致寒熱如瘧而發作有時與小柴胡湯以解傳經之邪三陽經水適來血虛甚矣而邪氣入之熱除身涼胸滿譫語者則邪盡入里里有實邪又難下故刺以瀉之經水適斷則血尚未盡為邪熱相搏而結之不行續得寒熱發作有時邪在半表半裡故用小柴胡湯以徹其邪也亮宸往來寒熱少陽證然少陽無時今發作有時以經行之際血室空虛表邪乘虛入之與熱相結而不行經水所以適斷也血氣與邪分爭故如瘧狀而發作有時然有寒熱尚未全結猶有可散之機故以小柴胡清其熱益其虛熱邪既去血自流通矣婦人傷寒發熱經水適來晝則明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈傷寒發熱者寒已成熱也經水適來則血室空虛邪熱乘虛入於血室若晝日明瞭暮則譫語如見鬼狀是邪不入腑入於血室與陰爭也陽盛譫語則宜下此熱入血室不可與下藥犯其胃氣熱入血室血結寒熱者與小柴胡湯散邪發汗此雖熱入血室而不留結不可與發汗藥犯其上焦熱入血室胸脅滿如結胸狀者可刺期門此雖熱入血室而無滿結不可刺期門犯其中焦必自愈者以經行而熱隨血去則邪熱悉除而愈矣所謂發汗犯上焦者汗則動衛氣衛氣出上焦故也刺期門為犯中焦者刺則動營氣營氣出中焦故也經曰無犯胃氣及上二焦必自愈豈謂藥不謂針耶宇泰犯胃氣謂下之犯上二焦謂發汗也明理論婦人熱入血室有須治而愈者有不須治而愈者各不同也所謂無犯者謂恐以譫語為陽明內實攻之是犯胃氣也無胸脅邪刺之是犯中焦也無血結與柴胡湯是犯上焦也何以知之衛出上焦小柴胡解散衛氣是以犯上焦營出中焦刺期門則動營氣是以犯中焦南陽胃實譫語有燥矢故宜承氣下之若血室有熱非胃實之比仲景恐人誤作胃實攻之故曰無犯胃氣也亮宸此病能自愈者全在適來二字熱雖入血室而血仍自行故也第一條之適來以七八日經水盡而血室虛表邪悉入千里故如結胸狀第二條之適斷邪與血結故如瘧狀此晝日明瞭邪不在陽而熱亦輕暮始譫語者夜屬陰血為陰類寒為陰邪入於血室與陰相爭故如見鬼狀也然不寒熱不痞滿知血不結不與邪搏俟經行盡則熱隨血去而自愈矣所謂血自下下者愈是也無犯胃氣謂不必下及上二焦謂不必汗及和解蓋奪血者無汗則柴胡亦不必與也健曰熱入血室不獨婦女有之男子亦有此患婦女因病而經水適來適斷男子亦因病而吐血下血皆邪熱乘虛血熱妄行而為熱入血室前條言七八日熱除而脅滿如結胸譫語者乃表解裡實但刺期門以瀉肝之募而去血分之熱二條經水適斷乃熱結於血故如瘧狀者用小柴胡解之三條經水適來雖譫語如見鬼狀而日無犯胃氣及上二焦必自愈不設方治此仲景恐人誤藥之耳然果不治而能自愈乎倘失治有變又將何如健常遇此證而處小柴胡合地黃湯加紫草茜根挾虛熱盛兼滯斑疹未化者加人參石膏連翹花粉以和解其經邪涼瀉其血熱則結滯脅滿譫語如瘧狀等俱得獲效者夥矣傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡加桂枝湯主之傷寒六七日邪當傳裡之時支散也嘔而心下結者里證也法當攻裡發熱微惡寒支節煩疼為外證未去不可攻裡與柴胡桂枝湯以和解也宇泰支節猶枝節古字通用支結謂支撐而結若訓作散則不結矣南陽云外證未解心下妨悶者非痞也謂之支結全善病雖太陽表證而有里證兼者則不言太陽病但稱表不解外證未去其兼心下支結則此條柴胡桂枝湯是也觀子發熱微惡寒煩疼邪猶在表微嘔心下滿悶則半表裡證又具其主柴胡宜矣前加減內云外有微熱加桂三兩此合桂枝以治外證未去即此義矣芍藥善瀉土中之壅塞故妨悶尤宜之健按發熱微惡寒是邪傳少陽半表未解微嘔支節煩疼為半里證具少陽為中清之腑陽明乃氣血總司邪熱干之中氣窒塞營衛不行於四肢而心下支結支結者支離鬱悶為痰飲畜聚如留飲伏飲證類是也柴胡湯中應去參不必加桂而加竹茹則合乎時宜之治不必拘拘於古法也傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之傷寒五六日已經汗下之後則邪當解今胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者邪氣猶在半表半裡之間為未解也小便不利而渴者汗下後亡津液內燥也若熱消津液其人必嘔今渴而不嘔知非裡熱也傷寒汗出則和今但頭汗出而余處無汗者津液不足而陽虛於上也與柴胡桂枝幹薑湯以解表裡之邪復津液而助陽也宇泰既汗之邪當自散然不待其全解及內實而徹下之是猶傷於早也烏得不仍結但已汗之後邪勢向衰雖失之下早結亦微矣觀子此汗下後損津液陽氣虛雖有半表裡宜兼助陽復津者也傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉人在裡此為半在裡半在外也脈雖沉緊不得力少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解傷寒五六日邪當傳裡之時頭汗出微惡寒者表仍未解也手足冷心下滿口不欲食大便硬脈細者邪結於裡也大便硬為陽結此邪熱雖傳於裡然以外帶表邪則熱猶淺故曰陽微結脈沉雖為在裡若純陰結則更無頭汗惡寒之表證諸陰脈皆至頸胸中而還不上循頭今頭汗出知非少陰也與小柴胡以除半表半裡之邪服湯已外證罷而不了了為裡熱未除與湯取其微利則愈故云得屎而解孫兆一人患傷寒五六日頭汗出自頸而還手足冷心下痞悶大便閉結或以為陰證孫診脈沉而緊曰此誠可疑然便結非虛祕也安得以陰脈沉緊為少陰證蓋少陰多自利未有祕結者此正半在表半在裡也仲景云傷寒五六日頭汗出云云遂投小柴胡而愈或難曰仲景云脈陰陽俱緊反汗者亡陽也此屬少陰不得有汗今頭汗出何也曰此一段正是仲景議論處意謂四肢冷脈沉緊腹滿全似少陰然大便硬頭汗出不得為少陰夫頭者三陽同聚若三陰至胸而還有頭汗出自是陽虛故曰汗出為陽微是陰不得有汗也若少陰頭有汗則死矣觀子此便硬為陽微結而邪仍在半表裡也健曰頭為諸陽之首汗出於頭是陽經熱盛上蒸內有大熱外必惡寒而反手足冷矣心下滿不欲食大便硬者脈應數實而大今脈沉細此為陽微結半在表半在裡也如舌現干黃直可與大柴胡微下之非小柴胡能解故仍不了了至得屎而解原是下去而病始除一番作兩番治矣倘遲則有變將如之何傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯傷寒五六日邪在半表半裡之時嘔而發熱邪在半表半裡之證是應柴胡湯為主以他藥下之而其證不罷者不為逆因其陰陽俱有邪復與柴胡可解矣若下後陽邪傳裡結於胸中則結胸以胸中為陽受氣之分與太陷胸湯主之以下其結陰邪傳裡者則留於心下而為痞以心下為陰受氣之分與半夏瀉心湯以通其痞經曰病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞此之謂也觀子此本柴胡證不為逆然有因下而遂成他證者則陽邪陷為結胸陰邪陷為痞皆不可復與柴胡湯也太陽少陽並病而反下之成結胸心下硬下利不止水漿不下其人心煩太陽少陽並病為邪氣在半表半裡也而反下之二經之邪乘虛入里結於胸中為結胸心下硬少陽里邪乘虛下干腸胃遂利不止若邪結陰分則飲食如故而為臟結此為陽邪內結故水漿不下而心煩宇泰生薑瀉心湯小陷胸湯觀子以慎勿下而誤下之所以上證猶未至如結胸者而此竟成結胸則太陽之邪已熱入在胸矣少陽之僅在心下者此復下於腸胃下利不止則少陽之邪轉深矣木盛必土敗水漿為之不下熱既客於內其人因而心煩也然此下語尚未竟疑必有闕文健曰太陽少陽並病三條經言不宜汗下而無方治但以刺為工如無能刺者可無治乎宇泰舉二方以善後妙甚脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳脈浮為傷陽緊為傷陰當發其汗而反下之若浮入里為陽邪則作結胸浮不入里而緊入里者為陰邪則作痞觀子脈浮緊者當發汗醫反下之所以作痞也然必緊入里始成痞者陰邪與陰分相結物各從其類也均此下之緊入浮不入者前證云大下後心下痞惡寒者表未解也即此緊雖入內浮仍不入內之類矣曰按之自濡但氣痞則不特痞輕於結胸而氣痞復輕於但滿不痛之痞又可知矣健曰注言浮不入緊入里為陰邪作痞之說文雖明而未悉入里之微竊以為脈浮而緊乃傷寒在表宜汗之診因誤下之邪乘虛陷但有緊而無浮矣故曰反入里則作痞痞者否塞不通之謂濡而不實非結胸拒痛之比當與理中湯去參治之前結胸章及太陽與少陽並病條中何不入此二節而茲復言之猶有未竟者然其為編次失緒明矣太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之下利嘔逆里受邪也邪在裡者可下亦須待表解乃可攻之其漐漐汗出發作有時不惡寒者表已解也頭痛心下痞滿引脅下痛乾嘔短氣者邪熱內畜而有伏飲里未和也與十棗湯下熱遂飲亮宸下利嘔逆有似裡寒然其人漐漐汗出則是水飲內結而蒸其汗以結聚甚堅故亦如陽明之發作有時但彼為熱而此為水所以一則潮熱一則汗出也頭痛者水氣上衝也心下痞硬引脅下痛者水結於心胸之間也乾嘔者水氣逆也短氣者實也表邪已解而里結非蕪花大戟之毒不足以攻之大棗惡甘遂取其反激為功亦傷胃而不至大傷意耳觀子中風邪方在表不當有下利之裡證此下利即是水乾腸胃而然然太陽中風下利嘔逆表未解者一小青龍證耳漐漐以下正表未解攻之之證也故末申明之曰此表解里未和也其證雖曰汗出非風家自汗之比蓋中諷當自汗出無時此漐漐出而有時故為水飲內蒸而然中風表未解必惡寒此表已解故不惡寒但云頭痛亦由水畜經絡不利而痛非太陽病在之痛故總曰此表解也病既不在表復有心下痞硬脅痛相引之證則知在裡者明矣乾嘔且短氣者痰飲深伏於內而未可輕除也非十棗湯何以逐之太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈太陽病因發汗遂發熱惡寒者外虛陽氣邪復不除也因復下之又虛其里表中虛邪內陷傳於心下為痞發汗表虛為竭陽下之裡虛為竭陰表證罷為無陽里有痞為陰獨又加燒針虛不勝火火氣內攻致胸煩也傷寒之病以陽為主其人面色青膚肉瞤動者陽氣大虛故云難治若面色微黃手足溫者即陽氣得復故云易愈觀子此二證雖是心下痞硬然俱吐下之太過陰陽兩損表裡俱虛遂成壞證故不復列湯劑而但詳其難治之狀也心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之心下硬按之痛關脈沉者實熱也心下痞按之濡其脈關上浮者虛熱也大黃黃連湯以導其虛熱甫陽結胸與痞關脈須皆沉若關脈浮者必大黃黃連瀉心主之若脈浮則結熱故三黃以瀉肝也士材結言胸痞言心下結言按之硬痞言按之濡結言寸浮關沉痞不言寸但曰關上浮可以明二病之分矣觀子按之濡則為虛邪關上浮者去表未遠故瀉心以勝其虛熱而痞自去健曰結胸結於膻中地位之下故脈寸浮關沉寸浮則上焦之熱勢浮也關沉是胸中邪結中焦之氣塞不通故關沉也痞則否塞於心之下胃之上故脈但關上浮是邪氣不能下舒而獨上壅之故故治結胸以三陷胸治痞以五瀉心雖曰腎心實瀉其脾胃之邪以疏通其窒塞也心下痞而復惡寒汗出者附子瀉心湯主之心下痞者虛熱內伏也惡寒汗出者陽氣外虛也與瀉心湯攻痞加附子以固陽觀子痞而表不解汗出惡寒者實也故表解之後宜以苦寒除痞痞而陽不固汗出惡寒者虛也故去痞之中必兼附子益陽健曰汗後痞而汗出者為實先解表後治痞此痞而復惡寒汗出為虛則應附子瀉心湯矣本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之本因下後成痞當與瀉心湯除之若服之痞不解其人渴而口燥煩小便不利者為水飲內畜津液不行非熱痞也與五苓散發汗散水則愈一方忍之乃愈者不飲水則外水不入所停之水得行而痞亦愈也觀子誤下邪陷入星故痞其腸虛而熱不畜者下利日數十行是也口燥煩小便不利熱畜而水道為之不利也與五苓散分利其熱邪傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之胃為津液之主陽氣之根大汗出後外亡津液胃中空虛客氣上逆心下痞硬要略曰中焦氣未和不能消穀故今噫乾噫食臭者胃虛而不殺穀也脅下有水氣腹中雷鳴土弱不能勝水也與瀉心湯以攻痞加生薑以益胃觀子汗不至損傷中氣則邪退正復無下陷成痞之咎汗解失宜至乾噫食臭者胃虛食穀不化也脅下水氣者土虛腰臍不利也下利雷鳴者腸虛無以約制也然則汗下雖殊其為正損邪陷則一姜半以除逆氣參甘以復陽氣芩連以瀉熱氣汗則津液亡而胸弱故益氣扶陽是主耳健曰觀子詳解通暢兼方法之微而此劑最為工穩傷寒中風醫反下之其人自利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非熱結但以胃中虛客氣上逆故使硬也甘草瀉心湯主之傷寒中風是傷寒或中風也邪氣在表醫反下之虛其腸胃而氣內陷也下利日數十行穀不化腹中雷鳴者下后里虛胃弱也心下痞硬乾嘔心煩不得安者胃中空虛客氣逆也與瀉心湯以攻痞加甘草以補虛前以汗後胃虛是外傷陽氣故加生薑此以下後胃虛是內損陰氣故加甘草觀子傷寒中風者風邪與寒邪下早皆成痞耳不當下而下之重傷裡氣故下利日數十行完穀雷鳴也腸胃雖虛邪熱不除故硬滿乾嘔心煩土居心下位中央升降陰陽變通上下者也傷則虛而不運邪氣留滯醫者不知為虛痞又復下之正益虛而邪益深痞硬何由去乎夫下利數十行完穀雷嗚火化急迫可知君甘草以緩腸胃之氣邪氣內結為熱芩連以清之煩不得安正氣內虛乾薑以復之半夏以散逆氣大棗以養脾氣中土妝寧而痞自解矣此條自首至乾嘔心煩句為一證醫見以下又一證甘草瀉心湯是治復下後已甚痞非治初證之痞也設未經復下遂無正治之劑乎味此當正屬半夏瀉心湯也蓋柴胡條內雖止說得但滿不痛為證在如結胸對舉而言若詳具之自當有以上諸證在非便以心下滿而硬痛一句了卻也此非熱結者見不與結胸之熱實同但虛邪凝結為痞耳健曰此節文順詳總以心下滿而痛者為結胸硬滿不痛者為痞但甘能作滿豈可用甘草為君何不以半夏為君甘草為使始妙也傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便傷寒服湯藥下後利不止而心下痞硬者氣虛而客氣上逆也與瀉心湯攻之則痞已醫復以他藥下之又虛其里致利不止也理中丸脾胃虛寒下利者服之愈此以下焦虛故與之其利益甚聖濟經曰滑則氣脫欲其收也如開腸洞瀉便溺遺失澀劑所以收之此利由下焦不約與赤石脂禹餘糧湯以澀洞瀉下焦主分清濁下利水穀不分若服澀劑而利不止當利小便以分其氣觀子服湯藥利不止是始為誤下也復以他藥利不止是終為誤下也醫因利久不止意為虛寒遂用理中溫之不知利不在脾胃既由熱入邪陷以成痞復加溫補中州之藥心下之邪何由得解利所以益甚也夫腸開洞瀉病在下焦滑脫法當用石脂餘糧澀而固之復不止邪熱壅結未能去也以分利藥行之此利在下焦大須著眼蓋利有由中焦者脾胃虛邪陷成利是也有由下焦者腎主禁固腎虛滑脫也既在下焦非崇上之可已法淮澀劑止而收之傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痞傷寒吐下後發汗則表裡之氣俱虛虛煩脈甚微為正氣內虛邪氣獨在至七八日正氣當復邪氣當罷而心下痞脅下痛氣上衝咽喉眩冒者正氣內虛而不復邪氣留連而不去經脈動惕經絡之氣虛極久則熱氣還經必成痿弱宇泰或用真武湯桂枝茯苓白朮甘草湯傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之大邪雖解已曾發汗吐下胃氣弱而未和虛氣上逆故心下痞硬噫氣不除與旋覆代赭石湯降虛氣而和胃南陽有是證其人或咳逆氣虛者先服四逆湯胃寒者先服理中丸次服旋覆代赭石湯觀子邪氣已從汗下而解或曰解後但病後中氣大虛肺金失職肝無所畏得以上逆噫而痞結然此非表邪入里之痞乃濁痰逆氣未理之痞也故主旋覆代赭石湯以治下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯前第三卷中十六證云發汗後不可更行桂枝湯汗出而喘無大熱者為與此證治法同汗下雖殊既不當損正氣則一邪氣所傳既同遂用一法治之經所謂若發汗若下若吐後是矣太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之外證未除而數下之為重虛其里邪熱乘虛而入裡熱遂利不止而心下痞若表解而下利心下痞者可與瀉心湯若不下利表不解而心下痞者可先解表而後攻痞以表裡不解故與桂枝人參湯和里解表士材既云桂枝證醫反下之利遂不止與葛根黃芩黃連湯此又與桂枝人參湯二證俱以表不解而下之成利何用藥有溫涼之異蓋二證雖同是內虛熱入挾熱遂利而脈證不同故用藥有別且前證但曰下之此曰數下之前證但曰下利此曰利不止兩論味之即有虛實之分矣兼善大柴胡湯瀉也桂枝人參補也何為皆治下利心下痞硬曰此非裡實乃下之早因作痞裡虛協熱遂利也觀成氏注若表解云云夫傷寒發熱汗出不解心下痞硬嘔吐而下利者痞硬雖同而虛實有異故用藥有攻補之別也健曰痞硬虛實當察按之痛不痛分而行補瀉之劑並探舌苔燥滑脈之大小厥無貽誤傷寒大下後復發汗心下痞惡寒者表未解不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯大下後復發汗則表裡之邪當悉已此心下痞而惡寒者表裡之邪俱不解也因表不解而下之為心下痞先與桂枝湯解表表解乃與大黃黃連瀉心湯攻痞內經曰從外之內盛於內者先治其外而後調其內活人大抵結胸與痞皆應下然表未解者不可攻也觀子病在表反下之邪陷下則痞然有雖經大下成痞而表邪仍在者亦須先解表乃治痞也惡寒者表也夫既屬表邪發汗治不為逆是以雖經發汗表邪不為之衰也治痞用大黃黃連者外證未除其痞結者熱邪耳又無下利完穀裡虛諸證故惟以苦寒之品入心除熱也傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之傷寒發熱寒已成熱也汗出不解表和而里病也吐利心腹濡軟為虛嘔吐而下利心腹痞硬者是裡實也與大柴胡湯以下里熱觀子傷寒發熱得汗當解不解者非表病而里病熱氣內蒸津液外走也熱越汗出不當吐利津液內外亡損證得心下痞硬下除裡實為急陽明病發熱汗出多者急下之即此類矣然發熱為邪在表下利為邪在裡嘔吐自汗痞硬為邪在半表半裡則柴胡湯仍不可少故亦以大柴胡湯兼而行之病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為腰有寒也當吐之宜瓜蒂散病如桂枝證謂發熱汗出惡風言邪在表也頭痛項強為桂枝證具若頭不痛項不強則邪不在表而傳裡也浮為在表沉為在裡今寸脈微浮則邪不在表亦不在裡而在胸中也胸中與表相應故知邪在胸中猶如桂枝證而寸脈微浮也因胸中痞硬上衝咽喉不得息知寒邪客於胸中而不在表也千金曰氣浮上部填塞心胸胸中滿者吐之則愈與瓜蒂散以吐胸中之邪觀子因是太陽中風故發熱自汗如桂枝證病不在經故頭不痛項不強痞硬至沖咽喉不得息者寒邪全窒塞於膈以上也胸中去表不遠故寸脈應以微浮瓜蒂散引而越之之義也華元化曰傷寒四日在胸宜藜蘆丸瓜蒂散吐之其即此類乎健曰此言寸微浮為邪在胸中只應痞滿乃無形之氣按之不痛也痞而硬者必拒按如拒按者又當究其關脈沉實與否倘關脈沉實而數舌現黃胎是不但表邪入里成痞且有形之物停滯非特吐之並可消之亦不可不辨也病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死素有宿昔之積結於脅下為痞今因傷寒邪氣入里與宿積相助使臟之真氣結而不通致連在臍旁痛引少腹入陰筋者死觀子臟結曰難治本危證也若去太陰而且入少腹陰筋肝腎之地如斯之臟結安得不死乎然以脅痞連臍旁其邪遂深則舊疾安可輕視哉傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之若吐若下後七八日則當解復不解而熱結在裡表熱者身熱也裡熱者內熱也本因吐下後邪氣乘虛內陷為結熱若無表熱而純為裡熱則邪熱結而為實此以表熱未罷時時惡風若邪氣純在表則惡風無時純在裡則更不惡風以時時惡風知表裡俱有熱也邪熱結而為實者則無大渴邪熱散漫則渴今雖熱結在裡表裡俱熱未為結實邪氣散漫熏蒸焦膈故大渴舌上乾燥而煩欲飲水數升與白虎加人參湯散熱生津亮宸熱結在裡熱在肺胃也表者經熱也里者胃熱也時時惡風熱極反見寒化熱傷肺氣故也引飲之為渴舌乾燥謂無津液也煩者熱甚也欲飲水至數升渴之極矣非人參石膏焉能救之健曰若吐下後大渴時時惡風欲水裡熱之證悉具方與人參白虎是也然但治其渴煩而未治其惡風亮宸謂熱極反見寒化此只可與雜證論不可與傷寒言也況惡風不同惡寒此雖吐下後而未得汗則表邪未解不能全歸裡熱故時時惡風方中宜加蘇葉杏仁為妥傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之無大熱謂身無大熱也口燥渴心煩者當作陽明病然以背微惡寒為表未全罷所以屬太陽也背為陽背惡寒口中和者少陰病也當與附子湯今口燥渴背雖惡寒此里也則惡寒亦不至甚故云微惡寒與白虎湯和表散熱加人參止渴生津吳氏或問白虎湯仲景以表不解不可與今時時惡風背微惡寒此有表而以白虎主之何也蓋石膏辛寒解足陽明本經之熱蒸蒸發熱潮熱表裡皆熱舌燥煩渴之聖藥也且時時者時或惡風而不常也背微惡者但覺微寒而不甚也所有熱甚燥渴用之無礙若失表證惡寒常在背上惡寒而不燥渴者不可用也又太陽經發熱渴無汗者不可與之但汗後脈洪大而渴者則可與也如陰經傷寒面赤煩躁身熱與冒虛噁心大便不實脈弱食少無大熱者切不可用也如誤用之傾危可立而待亮宸上言表裡熱此何以言無大熱謂身不甚熱而肺胃熱也視前證為稍深矣背微惡寒者亦熱傷肺氣故也傷寒脈浮發熱無汗其表不解者不可與自虎湯渴欲飲水無表證者白虎加人參湯主之脈浮發熱無汗其表不解不渴者宜麻黃湯渴者宜五苓散非白虎所宜大渴欲水無表證者乃可與白虎加人參湯以散表熱臨病之工大宜精別兼善用藥有遲速之誤故設法以防備也法有防備不盡者則著方以拯救也如此條乃仲景設法以防備也前二條及若吐若下後七八日不解則著方以拯救也夫白虎專治大煩大渴古人設法之意惟恐表證未罷而輒用之治有太速之弊若背惡寒及時時惡風二證其煩渴已甚非白虎不能遏也必俟表邪俱盡未免太遲之愆此乃法之防備不盡者故著方以拯救也不著方必然違法此方法之妙所以不可偏廢也健曰脈浮發熱無汗表不解不渴者宜麻黃湯而不可與白虎人所知也成注云渴者宜五苓散人所不解也熱而無汗若渴是表邪已入陽明津液為熱所迫故渴也何可用五苓之辛溫以燥之必致更渴增劇文無是句而成氏臆見加此若後人信之必誤蒼生矣不得不為指出太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞慎勿下之心下硬而眩者少陽也頸項強者太陽也刺大椎肺俞以瀉太陽之邪以太陽之脈挾脊故爾太陽為在表少陽為在裡明是半表半裡前第六證云不發汗發汗則譫語是發汗攻太陽則少陽之邪益甚干胃故發譫也此云慎勿下之攻少陽則太陽之邪乘虛入里必作結胸經曰太陽少陽並病而反下之成結胸宇泰小柴胡加桂湯觀子此與前證相似而無冒無時如結胸邪既稍輕故刺肺俞瀉太陽之經也然前曰不可發汗此曰慎勿下皆互言以見意而前之不可下此之不可汗瞭然言外矣太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之太陽陽明合病自下利為在表當與葛根湯發汗陽明少陽合病自下利為在裡可與承氣湯此太陽少陽合病自下利為在半表半裡非汗下所宜故與黃芩湯以和解半表半裡之邪嘔者胃氣逆也故加半夏生薑以散逆氣宇泰下利而頭痛胸滿或口苦咽乾或往來寒熱其脈大而弦是也此表實裡虛熱漸攻裡故自利若兼痰飲則嘔傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之濕家下後舌上如胎者以丹田有熱胸中有寒是邪氣入里而為下熱上寒也此傷寒邪氣傳裡而為下寒上熱也胃中有邪氣使陰陽不交陰不得升而獨治於下為下寒腹中痛陽不得降而獨治於上為胸中熱欲嘔吐與黃連湯升降陰陽之氣觀子胸中熱者陽邪也胃中邪氣者陰邪也腹中痛且嘔吐者陽欲降而不得降陰欲升而不得升也此邪正不得交通陰陽互格可知矣與黃連分理其寒熱而陰陽靡不和同矣太陽病從表則不當有腹痛證然有里挾虛寒者有邪己傳之裡者有寒熱相摶於中者以其病處方起而非專屬他經之可比也故遂出太陽篇中耳健曰就此論治方中應除參桂為穩以其胸中有熱胃中有邪胃與胸相接此邪未必為寒況腹中痛欲嘔吐者豈宜溫補之品歟傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之傷寒與中風至七八日再經之時則邪氣多在裡身必不苦疼痛今日數多復身體疼煩不能自轉側者風濕相搏也煩者風也身疼不能轉側者濕也經曰風則虛浮脈經曰脈來澀者為病寒濕也不嘔不渴里無邪也脈得虛浮而澀身有疼煩知風濕但在經也與桂枝附子湯以散表中風濕健曰傷寒八九日不嘔不渴脈虛浮而澀想因無汗故風寒濕之氣皆未能散桂枝附子湯雖能祛風逐寒而不能除濕何不用桂麻各半湯加蒼朮以除濕當歸以和營衛為當若其人大便硬小便自利者去桂枝加白朮湯主之桂枝發汗走津液此小便利大便硬為津液不足故去桂枝加朮風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之風則傷衛濕流關節風濕相轉兩邪亂經故骨節疼煩掣痛不得屈伸近之則痛劇也風勝則衛氣不固汗出短氣惡風不欲去衣為風在表濕勝則水氣不行小便不利此身微腫為濕外薄也與甘草附子湯散濕固衛活人杏仁湯健曰此有似雜證之周痹風寒濕三氣合致甘草附子湯恐未對病而反助熱不如海藏神術加羌獨二活木瓜木通靈仙之妙傷寒脈浮滑此表有熱里有寒白虎湯主之浮為在表滑為在裡表有熱外有熱也里有寒邪氣傳裡也以邪未入腑故止言寒如瓜蒂散證云胸中有寒是矣與白虎湯以解內外之邪亮宸浮者表脈也肺最為表與太陽氣合表熱炎於肺脈所以滑滑為陽邪也里有寒胃腑屬裡胃腑之裡無熱也不渴為液未竭故止用白虎清熱而不加參耳健曰此條若非注解有理否則里有寒而可用白虎者乎然裡寒二字必是誤文脈訣云浮滑風痰古人以滑為寒究非通論而白虎亦非治痰之劑傷寒脈結代心動悸炙甘草湯主之結代之脈動而中止能自還者名曰結不能自還者名曰代由氣血虛寒不能相續也心中悸動知真氣內虛也與炙甘草湯益虛補血氣而復脈健曰脈以血為榮此證似傷寒汗出將解之象蓋因汗多消耗心液而然則炙甘草湯可與之若初起未經汗而現此象必寒甚傷營血泣不行於脈故結且代也心悸動似畏寒惕惕陽氣內怯營衛不能發越之狀當以桂麻合當歸四逆散通之按脈之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治結代之脈一為邪氣留結一為真氣虛衰脈動而中止不能自還因其呼吸陰陽相引復動者是真氣衰極名曰代陰為難治之脈經曰脈結者生代者死此之謂也
