活人半硫丸活人金液丹活人黑錫丹活人健按上方活人書稱能治傷寒直中諸四逆陰證為神妙之藥然其中金石猛烈之味居多非王道之法雜病尚難用之何況傷寒危急之候仲景書所不載而硫黃水銀太陽太陰玄精等石皆燥熱悍劑考之本草絶與傷寒陰證無涉投之豈能有效若制煉不精必致惹禍匪輕萬不可著相於此而率意妄行功則未必害即隨之因前輩既有諸方但存其名而不録其藥者恐後來之士好奇弄巧浪試以誤人耳慎之蔥尉法治氣虛陽脫體冷無脈氣息欲絶不省人事及傷寒陰厥百藥不效者用大蔥以線纏如臂大切去根葉存白長二寸許先以火灼一面令通熱乃以熱面尉病人臍上臍下次以尉斗貯火尉蔥上面令蔥氣入肌肉中須作三四餅壞即易之良久病人當漸醒手足溫有汗即瘥更服四逆輩以溫其內昔有人傷寒冥不知人四體堅冷如石藥不可入用此而瘥尉而手足不溫者不治一法取蔥白搗爛作餅先以麝香半分填臍中放蔥餅尉之連換四餅稍蘇灌以薑汁服回陽急救湯如不醒再灸關元氣海二三十壯使熱氣通於內逼其寒邪外出以復陽氣艾灸法陰毒沉困之極六脈附骨按之方有舉之即無一息八至以上或不可數至此則藥亦難效矣但於臍下灼艾二三百壯如手足不和緩者不可治矣倘得和緩以還陽散及熱藥助之若陰氣散陽氣轉則漸減熱藥而和之又法陰證面如刀刮四逆爪甲青面黑身體如冰灸氣海臍下一寸五分丹田臍下二寸關元臍下三寸艾炷各五十壯甚者至二百壯以手足漸溫人事漸省為可治又曰積陰盛於下則微陽消於上故其候爪甲青面黑四肢沉重逆冷腹痛轉甚或咽喉不利或心下結硬脹滿躁渴虛汗不止或時狂言六脈沉細而一息七至此證速於氣海關元二穴灸二三百壯以手足溫暖為效佐服金液丹來蘇丹五勝散還陽散退陰散類健曰上方與前方相同不録藥味恐生異見耳蒸臍法陰證吐利厥逆昏沉心下脹硬如冰湯藥不受唇面指甲皆青黑脈沉欲絶麝香半夏皂角等分為末填臍中次以生薑片二文錢厚鋪於上用大艾圓灸薑片上二七壯候手足溫暖然後投薑附等藥茱萸尉法陰證四肢逆冷用吳茱萸不拘多少為末溫酒和勻生絹袋盛之烘熱尉腳心令通暢或煎湯洗滌以接四肢溫暖之氣回陽返本湯節庵治陰盛格陽陰極發躁等證脈來無力或欲絶或全無熟附乾薑人參甘草五味子黃連陳皮一方不用陳皮入細茶若無黃連細茶入麥冬茯苓肉桂煎好後浸冰冷入蜜水三匙服戴陽加蔥白無脈入膽汁人尿嘔加薑汁半夏變通建中湯小建中湯活人桂枝錢半白芍三錢炙甘草一錢生薑三片大棗一枚飴糖三匙水煎溫服尺脈遲加黃耆乙錢舊有微溏或嘔去膠飴黃耆建中湯金匱汗多亡陽尺脈虛弱及汗後身痛脈弱黃耆錢半芍藥二錢肉桂一錢甘草炙六分薑三片棗二枚水煎入膠飴一大匙服氣短胸滿加生薑腹滿去棗加茯苓虛損不足加半夏千金諸虛不足加人參念莪虛甚加參朮不眠加棗仁當歸建中湯本事發熱頭疼脈浮數而尺遲弱宜先服此補血次與麻黃桂枝輩黃耆當歸各二錢白芍桂枝炙甘草各錢二分薑三片棗一枚日三服夜二服如脈尚遲再進大建中湯黃耆當歸芍藥桂心各二錢半夏附子炮各二錢半人參炙甘草各一錢薑棗煎千金多幹薑橘皮變通陷胸湯大陷胸湯活人桂枝人參各一錢甘遂五個栝蔞實一枚去皮用四之一棗一枚水煎胸中無堅物勿用之枳實理中丸三因枳實十六片麩炒白朮茯苓人參炙甘草乾薑炮各二兩為末蜜丸如雞黃大熱湯化下速進二三服即胸中豁然渴加栝蔞根一兩自汗加牡蠣二兩煅下利同增損理中丸海藏大小陷胸湯丸不效者宜與此人參白朮炙甘草栝蔞實牡蠣煅各二兩乾薑炮五錢枳實炒甘四枚黃芩去枯一兩煉蜜丸彈子大湯一盞煎服一丸不解再進不過五六丸豁然矣薑汁尉法一切停滯結胸等證不問寒結水結食結痰結血結痞結支結用生薑四五斤搗如泥略捩去汁炒熱絹包揉按心腹處豁然自愈如冷易熱者以愈為度惟熱結者以冷渣揉之勿炒健曰如食結血結者有形拒按以薑渣同鹽炒熱揉運易於消化灸法黃連二寸為末巴豆七粒去殼研和作餅子安臍中以艾炷龍眼大者灸之輕者一炷重者不過二三炷熱氣透入腹中作聲泄下惡物立愈巴豆餅子陰證寒實結胸痛不可按二便閉塞或纍下不通但出氣少而緩者可用此巴豆十粒去殼研入白麵一錢搗作餅填病人臍中用艾炷七壯覺腹中鳴大便通利矣或用蔥白十莖生薑一塊搗貼臍中尉斗火不時尉之再以枳實理中湯加熟附溫之或五積散加附子生薑大棗鹽同煎服汗出愈柴胡桔梗湯小結胸脈弦數心下硬痛或胸中滿硬或脅下滿硬或發熱潮熱往來寒熱耳鳴目眩心煩喜嘔並治之柴胡三錢黃芩蔞仁各二錢半夏枳殼桔梗各一錢半心上滿用此二味枳實黃連各錢半心下滿用此二味甘草一錢生薑三片煎變通抵當方代抵當丸大黃四兩桃仁六十個炒研芒硝生地歸尾穿山甲炒各一兩桂三錢為末煉丸梧子大畜血在上丸如芥子大仰臥去枕以津咽之中焦食遠下焦空心俱煎百勞水下如血成積攻之不動去歸地加廣茂一兩桂七錢生地黃湯韓氏病人七八日後脈沉遲微細膚冷臍下滿或喜忘或狂躁大便實而色黑小便自利畜血也老年及虛弱人俱宜此生地黃自然汁一升無則用乾者末二兩生藕自然汁半升無則用刺薊汁半升無則薊末一兩藍葉一握或乾末一兩此藍應是紅藍虻蟲三十個炒去翅足水蛭十個炙大黃一兩乾漆炒令煙盡桃仁各五錢炒研水三升慢火熬至二升分三服冷飲至半日許未下再服無二汁增水煎宇泰抵當丸其中虻蟲水蛭性猛厲不若四物湯加酒浸大黃各半下之之妙海蛤散活人婦人傷寒血結胸膈按之痛不可近海蛤滑石甘草炙各一兩芒硝半兩共細末每二錢雞子清調下小腸通利則胸膈血散膻中血聚則小腸壅故血不流行服此小便利而血行矣然後桂枝紅花湯發其汗則愈婦人血結胸法當刺期門仲景治法疑無此方然其言頗有理姑存焉不得汗蒸汗傷寒連服湯劑而汗不出者如中風法蒸之使溫熱之氣於外迎之無不汗出也其法用薪燒地良久掃去以水灑之將蠶沙桃葉柏葉粳麩皆鋪於上可側手厚上鋪席令病人臥於上溫覆之移時汗立至候周身至腳心漐漐乃以溫粉撲之汗止上床千金陳凜邱云連發汗而汗不出者死吾思之可蒸之如蒸中風法後以問張苗苗云曾有人作事疲極臥簞中冷得病諸醫與湯丸散四日內凡八過汗不出苗令燒地布桃葉蒸之即得大汗傅粉起便愈後數以此發汗皆得但人性自有一種難出汗者非病使然也再造飲陶氏傷寒用發汗藥二三劑不得汗者若不論時令再以麻黃重藥及火劫取汗誤人死者多矣不知陽虛不能作汗者無陽也宜此黃耆人參桂枝熟附子細辛羌活防風川芎炙甘草生薑大棗水煎健曰凡病不得汗者必熱勢內甚消爍血陰津液不行者多法當益血通津涼以解之則汗必至安可謂為陽虛耶蓋汗多為亡陽無汗為陰弱為血少為熱結為表固豈宜迸此大熱大補更固其表乎且黃耆得防風而功愈大為氣虛固表之劑今反用於不得汗之證先犯藥禁必非陶公明理所作也此方只可與傷寒無頭疼發熱而但身冷體痛脈微無汗者言耳汗過多溫粉撲法活人白朮白芷川芎藁本等分每細末一兩入米粉三兩和勻周身撲之汗立止無藁本亦可溫粉熟米粉防風白朮牡蠣散活人汗多頭眩筋惕肉瞤防風白朮牡蠣粉各等分細末每二錢酒調下或米飲下日二三服止後服小建中湯玉屏風散白朮黃耆防風水煎黃耆湯海藏傷寒兩感拘急氣虛自汗肢體振搖腰腿沉重或譫語妄言或面赤目紅頭上壯熱或自利不渴或口乾咽燥不欲飲水或腹中痛皆陰盛陽虛之候脈浮沉不一往來不定有沉澀弱微弦形狀按之全無力或浮之損小沉之亦損小皆陰脈也宜此又傷寒或歌或笑或悲哭狂妄並治之人參白朮黃耆茯苓白芍生薑各一兩甘草炙七錢嘔加藿香陳皮各五錢甚者加炮薑一錢為黃耆加乾薑湯大便閉結者調中丸或理中丸建中去桂加參耆地黃湯傷寒自汗補虛和陰陽當歸白芍各三錢人參熟地各五錢黃耆炙甘草各一錢溫經益元湯陶氏汗後大虛眩振瞤惕及發汗不止衛虛亡陽或下後利不止身疼痛熟附子人參白木黃耆白芍當歸炙甘草茯苓陳皮生地肉桂飽悶去生地加砂仁瘦人去白芍有熱去桂附利不止去地黃當歸加升麻倍白朮嘔加薑汁半夏渴加花粉汗後畏風寒去桂附生地加桂枝膠飴入薑棗健曰此方加減精切傷寒後調理可用如虛而有內火未清者膏連亦可入一法用麻黃後汗出不止者將病人發披水盆中浸之足露在外用炒米一升龍骨牡蠣防風藁本各一兩細末周身撲之庶兔亡陽而死凡用麻黃去節先煮醋湯略浸片時庶兔太發如冬月腠理致密生用嘔吐大橘皮湯活人橘皮去白三錢人參五分炙甘草三分竹茹一握生薑三片棗一枚水煎復庵加麥冬赤苓枇杷葉半夏橘皮湯一切嘔吐不止人參白朮茯苓半夏厚朴藿香葛根黃芩橘皮甘草等分水煎入薑汁少許竹茹湯仲醇食谷欲嘔屬陽明非少陽也胸中煩熱者竹茹三錢薑汁拌麥冬五錢蘆根三兩枇杷葉三張蜜水拂炙若內無熱證小便利口不渴陽明虛也吳茱萸湯噦半夏生薑湯活人半夏洗五錢生薑一兩水煎橘皮乾薑湯橘皮通草炮薑桂心各一錢人參五分水煎生薑橘皮湯生薑一兩橘皮五錢水煎羌活附子散羌活附子炮茴香微炒各五錢木香乾薑炮各如棗大每細末二錢入鹽一捻同煎丁香柿蒂散胸中虛寒厄逆不止丁香柿蒂各錢半乾薑良薑茴香陳皮各一錢細末薑湯調服一二錢扁鵲丁香散丁香柿蒂各二錢半良薑甘草各五分細末沸湯點服豆蔻湯本事陰證厄逆丁香茴香肉豆蔻等分水煎節庵方加人參蓮實枇杷葉生薑華蓋山備急方活人香附橘核炒各五錢研細末每二錢水煎細細呷之或入酒二匙或將二味酒炒用乳香硫黃散陰寒厄逆用此劫之乳香硫黃艾葉等分細末好酒煎乘熱嗅之外搗生薑炒熱尉胸次最效健曰上二方藥性與厄逆無甚中病況此猛悍只可嗅而不可服也灸法陰寒厄逆服藥不差者灸期門穴婦人屈乳頭向下盡處為穴男子乳小以手直下一指骨間動脈是也男左女右各三壯咳嗽加減瀉白湯寶鑑煩熱胸膈不利上氣喘促口乾或咳桑白皮二錢知母橘紅蔞仁黃芩貝母桔梗甘草各錢半地骨皮一錢水煎人參杏子湯仁齋虛弱人感冒風寒咳嗽有痰或惡風頭痛乾嘔人參半夏白芍各錢半茯苓二錢半五味子一錢細辛乾薑炙甘草桂各五分杏仁五粒生薑三片水煎健曰此即小青龍加參杏也惡風頭痛之咳豈可用此酸收辛熱之補劑乎喘五味子湯活人傷寒喘促脈伏而厥人參杏仁麥冬橘紅各二錢半五味子五錢生薑十片大棗三枚水煎蘇沉九寶湯易簡麻黃薄荷紫蘇桑皮杏仁橘紅大腹皮官桂甘草等分薑三片烏梅半個水煎臨臥服噫氣如聖加枳實湯云岐桔梗甘草各二錢枳實炒一錢五味子二分水煎如聖加人參藿香杏仁湯上方加三味等分短氣人參益氣湯東垣四肢懶倦熱傷元氣各證黃耆四錢人參二錢半升麻一錢白芍二錢半柴胡一錢二分生甘草炙甘草各一錢五味子七十粒水煎分服氣上衝李根湯活人氣上衝正在心端當歸身酒拌白芍藥半夏茯苓黃芩甘草各二錢半桂枝一兩干李根白皮二合每五錢入生薑四片水煎瘛瘲牛蒡根散活人汗後因風攣搐牛蒡根十段麻黃牛膝南星各六錢蒡根祛風滌熱通經絡之熱優於子故用之專功於石臼內入好酒一升同搗細以炭火燒一地坑至赤去火淨投藥坑內再用炭火燒令黑色取出研細末每一錢好酒熱服日三服外以百草霜膏貼之肉疴駱龍吉升麻湯升麻秦艽連翹白芍防風羚羊角木香枳殼米仁各一錢薑五片水煎咽痛蜜附子三因大附子一枚去皮臍切八片以蜜塗炙黃含一片於口中徐徐咽津下不得臥酸棗仁湯虛煩奔氣在胸中不得眠棗仁茯神人參各錢半石膏二錢半知母甘草各一錢桂心五分生薑三片水煎臨臥服健曰此應去桂入五味子良加味溫膽湯太陽病後虛煩不眠此膽寒也茯神二錢人參二錢半棗仁半夏各錢半枳實陳皮甘草各一錢竹茹一團生薑三片若內熱心煩倍黃連麥冬口燥舌乾去半夏加麥冬花粉五味子有表熱未清加軟柴胡內虛大便自利去枳實加白朮茯苓心煩內實加山梔一方無茯神枳實入茯苓當歸黃連生地柴胡白芍以治內有熱邪十味溫膽湯半夏枳實陳皮各二錢茯苓錢半遠志棗仁熟地人參五味子各一錢甘草五分薑三片棗一枚梔子烏梅湯活人梔子黃芩人參麥冬甘草各一錢柴胡二錢烏梅二個竹葉十四片生薑三片水煎硃砂安神丸東垣病後心神不安夜臥不寧硃砂二錢另研一半為衣黃連炒地黃酒炒各錢半歸身一錢甘草五分細末湯浸蒸餅為丸緑豆大臨臥納口中津咽二三十丸內經熱淫所勝治以甘寒以苦瀉之以黃連之苦寒去心煩除濕熱以甘草生地之甘寒瀉火補氣滋生陰血為臣當歸補其血不足硃砂納浮溜之火而神安矣千金流水湯虛煩不眠麥冬半夏黃連遠志人參草薢甘草各一錢茯神棗仁各錢半生薑三片桂五分米一合長流水二鍾煮米至蟹眼沸以杓揚萬遍取湯煎一鍾服譫語升陽散火湯陶氏譫語昏沉不省人事及循衣摸床此失汗熱乘肺金元氣虛不能自主持名撮空小便利者可治不利者不治人參白朮當歸白芍麥冬陳皮茯神柴胡黃芩甘草薑三片棗二枚有痰加薑汁製半夏泄瀉加升麻便實發渴加大黃健曰如上等證而腹實便祕舌焦胎黑下證居多者不宜驟用此方竹瀝仁齋傷寒熱甚心煩有痰神昏譫語者竹瀝一盞天花粉汁一盞和服或加金器同煎水結胸小半夏加茯苓湯活人諸嘔噦心下堅膈間有痰水半夏泡五錢茯苓三錢薑四錢取汁水煎次入薑汁數沸服赤茯苓湯活人傷寒嘔噦心下滿胸間有停水頭眩心悸赤茯苓人參各二錢半夏制川芎白朮橘紅各一錢薑五片水煎健曰此應去川芎之辛溫入竹茹枳實各一錢始佳痞桔梗枳殼湯活人痞氣胸滿欲絶桔梗枳殼炒各一兩水煎傷寒本無痞應汗反下遂成痞枳實理中丸最良審知是痞先用枳桔湯尤妙緣二味行氣下膈用之蚤無不驗也桔梗半夏湯傷寒冷熱不和心腹痞滿疼痛用此順陰陽消痞結桔梗半夏制橘皮各二錢枳實麩炒一錢水煎腹痛人參養胃湯和劑半夏厚朴橘紅各八分藿香白朮茯苓人參各五分甘草三分薑五片烏梅半個下利薤白湯活人傷寒下利如爛肉汁赤白滯下伏氣腹痛結熱毒利豆豉半升薤白一把梔子七個水煎黃連阿膠湯熱毒入胃下利膿血梔子一錢黃柏阿膠炒各二錢黃連四錢水煎地榆散傷寒熱毒不解日晚壯熱腹痛便膿血地榆炒黑犀角黃連黃芩茜根各錢六分梔子八枚薤白五寸水煎調中湯夏月初秋忽有暴寒折其盛熱之氣熱結四肢則壯熱頭痛寒傷於胃則下利或血或水迷悶脈數葛根芍藥黃芩藁本白朮桔梗茯苓炙甘草各一錢大黃錢半水煎再服得快利愈治陽病因下遂協熱利不止及不因下自利表不解而脈浮數及治風溫皆去大黃服又云夏秋旱熱日積或暴寒折之熱無可散多著肌中作壯熱胃為六腑之表最易為暴寒所傷虛冷人不作壯熱但下利或霍亂也便不宜服此惟壯實人以此和其胃氣防風芍藥湯仁齋瀉利身熱脈弦頭痛自汗腹痛防風芍藥黃芩水煎三黃熟艾湯活人傷寒四五日大下熱利服白通湯諸藥不效者宜服此除熱止利黃連黃芩黃柏熟艾水煎仲醇六一散陽明協熱下利心下痞者黃連栝蔞湯調服太陽陽明合病協熱下利黃連湯調服七味人參白朮散脾胃虛弱協寒下利或口乾發熱人參白朮上茯苓葛根藿香中木香炙甘草下薑三片水煎增損四順湯活人少陰下利手足冷無熱證者人參炙草龍骨各二錢乾薑黃連各一錢附子六分水煎腹痛加當歸嘔加橘皮不大便歸菀湯五法紫菀當歸桃仁蔞仁牛膝或入生薑少許傷寒燥屎閉結大劑紫菀潤之有用至一二兩者余藥佐之益佳若餘熱未清加柴胡黃芩按之中焦硬痛者加枳實更衣丸仲醇硃砂五錢蘆薈七錢酒為丸酒服一錢朝服暮通暮服朝通健曰此只治老年人血枯腸燥及虛弱內熱便結為雜病門方非傷寒實熱在裡祕結行便之法衄血犀角地黃湯活人傷寒及溫病應汗不汗內有瘀血衄血吐血面黃便黑此方能消化瘀血又治瘡疹太盛以此解之地黃三錢芍藥丹皮犀角鎊無則升麻代之各一錢水煎有熱加黃芩二錢脈大而遲腹不滿自言滿為無熱不加健曰此方只治傷寒溫熱時行疫癘等見諸血證者然其力微功緩須加紫草石膏蘆根茅根童便方能退熱止血若但熱甚而無血證者未可浪施不謂近習荒唐一遇神昏譫語或斑點不化或舌刺唇焦大便祕結竟忘仲景入腑下法輒以犀角地黃為養陰退熱妙劑豈知陽邪實熱在裡服此沉陰之藥遂致陽陷入陰往往害事果遇陰證又忘仲景溫經散寒之法亦以地黃為務恆見下咽口噤肢冷脈沉其死甚速噫陽證滋陰既誤矣陰證滋陰更誤矣仲景大法幾廢草營人命慘莫甚矣故不得不明白曉暢以告之要知傷寒及外感溫疫之可用犀角地黃輩者惟衄血吐血便血溺血瘀血熱入血室六證而已非取其養陰以退熱也特取其涼血化瘀以止之耳如無血證而擅用之則沉陰膩滯壅遏邪氣無有不變者也舉今之世莫説傷寒一切外感之死於此弊者十之六七夫乃天之劫數使然歟抑人之猥鄙而趨附末流之習歟但聖賢經論猶未泯滅豈容妄事非法而為醫劊可乎有智慧者亟宜猛醒尚可立地成佛海藏仲景脈浮緊者麻黃湯浮緩者桂枝湯又言衄家不可發汗蓋為脈微也脈已微既二藥不可用宜犀角地黃湯主之立齋去瘀之劑抵當湯最緊桃仁承氣次之犀角地黃又次之緊者主下焦次者主中焦緩者主上焦此方行中有補血家中和之藥一方拔萃地黃二錢黃芩黃連丹皮各錢半大黃三錢水煎加味犀角地黃湯陶氏首方加桔梗陳皮當歸紅花甘草茅花湯活人衄不止茅花一把水三盞煎服如無花以根代生地芩連湯節庵鼻衄成流不止或熱毒入深吐血不止犀角地黃芍藥黃芩黃連山梔柴胡桔梗當歸甘草薑棗煎臨服入茅根汁或藕汁京墨汁均可吐血者去桔梗柴胡加阿膠生地黃連湯節庵治失血過多而涸燥熱氣未除循衣摸床撮空不省人事揚手擲足錯語失神脈弦浮而虛氣粗鼻乾此為難治急服此又婦人血風因崩漏大脫血而患前證並宜服之生地川芎當歸各七錢赤芍桅子黃芩黃連各三錢防風一兩為末每三錢水煎大承氣氣藥也自外而之內者用之又曰自氣而之血血而復之氣者大承氣湯下之生地黃黃連湯血藥也自內而之外者用之自血而之氣氣而復之血者生地黃黃連湯主之氣血合病循衣撮空者同治之因俱不大便乃承氣湯對子及與三黃石膏湯相表裡皆三焦包絡虛火之用也病既危急只得以此湯降血中之火耳脈實者加大黃健按此稱去血過多而致危急理應補血止血何尚事川芎赤芍破血防風散表耗血耶又稱與承氣對於夫乃犯虛虛之戒矣未為允當仲醇陽明病衄血此緣失於發汗荊芥一錢丹皮錢半蒲黃炒黑側柏葉炒各二錢地黃葛根各三錢麥冬五錢茅根二兩濃煎兼飲童便佐之健按此方乃雜病手足陽明齒衄便血之藥欲用於傷寒陽明病衄之證不能瀉其經邪之熱反有膩滯之患何似葛根白虎加紫草茅根之去邪也吐血柏皮湯活人熱毒入深吐血柏皮三錢黃芩黃連各錢半水煎入阿膠服河間地黃散熱鬱衄血或吐或咯柴胡黃芩黃連天冬白芍枸杞子地骨皮黃耆生地熟地甘草等分水煎下血加地榆健按此方為雜病勞欲陰虛吐血者設非傷寒邪熱動經吐衄之劑投之必增其熱而有迷悶之患即或去血過多何如人參白虎加紫草茜根之妙也四生丸吐血陽乘於陰血熱妄行者生荷葉生艾葉生柏葉生地黃等分水煎健曰此亦雜病之方三黃補血湯東垣白芍二錢地黃錢二分熟地川芎各八分當歸柴胡各六分黃耆丹皮升麻各四分水煎健按此亦雜病方法若傷寒吐血乃邪熱迫之而出升柴川芎上升之藥熟地黃耆膩補之品皆當禁也可擅用乎夫傷寒吐血其故有二一因於表未得汗邪郁陽明而致吐者猶如鼻衄之紅汗吐出反身涼而脈靜無害也一因陽邪熱傷陰血動經而致吐者當審多少輕重如熱勢熾盛吐之不止須三黃石膏大青清熱解肌紫草茜根茅根童便涼血止化人參當歸保正除邪始為切當若從以二地等滋補為事豫經見頗多其變甚速蓋藥性沉滯無化邪瀉熱之功反多壅塞之力耳麻黃人參芍藥湯東垣麻黃去外寒白芍黃耆實表益衛炙甘草補脾各一錢桂枝溫經補虛當歸和血養血各五分五味子安肺氣五粒麥冬保肺氣人參益三焦元氣不足而實其表各三分水煎熱服健按此方或因胃氣虛而惡寒懶倦吐血非邪熱動經火毒內迫者庶可用之麥冬飲子治吐血久不愈黃耆一錢麥冬歸身生地人參各一錢五味子草粒水煎或兼刺氣街血出愈下血瘀血當歸活血湯節庵無頭疼惡寒止身熱發渴小便利大便黑出語無倫此內傳心脾二經使人昏迷沉重名挾血如見祟證當歸生地紅花人參甘草赤芍乾薑桃仁桂心枳殼柴胡生薑一片水煎健按此方虛中帶補實中兼瀉乃是消瘀之劑非治下血之藥桃仁承氣對子節庵即桃仁承氣湯加減桃仁桂枝大黃芒硝柴胡芍藥當歸青皮枳實甘草炙生薑三片水煎仲醇陽明病下血譫語但頭汗出熱入血室也葛根荊芥各三錢黃芩丹皮各錢半地黃二錢麥冬五錢濃煎對童便飲發黃商陳茯苓湯韓氏發黃煩躁而渴小便不利茵陳蒿湯加豬苓茯苓滑石桂當歸健曰發黃每多熱桂不可浪用茵陳橘皮湯發黃煩躁喘嘔不渴本湯加白朮陳皮茯苓半夏生薑水煎茵陳附子湯發黃四肢遍身冷本湯加附子炙甘草茵陳四逆湯發黃肢體逆冷腰以上自汗本湯加附子乾薑炙甘草商陳薑附湯發黃冷汗不止本湯加附子乾薑煎商陳茱萸湯發黃服前薑附藥未已脈尚遲本湯加吳茱萸附子乾薑木通當歸健按以上各方皆屬陰黃而設蓋因脾虛寒濕之氣為病故也若陽黃濕熱偏盛者毫釐不可用五冬加茵陳湯活人發黃渴而小便不利本湯十分五苓散五分每三錢水調日三服一方以茵陳濃煎湯調五苓散二錢服理中加茵陳湯傷冷中寒脈弱氣虛變為陰黃理中湯加茵陳煎服茵陳湯茵陳山梔黃柏黃芩膽草柴胡升麻各一錢大黃炒二錢水煎茅根湯發黃遍身如金茅根梔子茵陳蒿地骨皮甘草等分生薑三片豆豉七粒水煎瓜蒂散寒濕發黃瓜蒂二錢丁香一錢赤小豆五分粟米四十九粒細末每夜搐鼻中取下黃水仲醇用防風葛根蒼朮桔梗陳皮甘草生薑茵陳煎服取微汗衍義一僧傷寒發汗不徹有留熱身面皆黃期年不效用茵陳梔子各五錢秦艽升麻各二錢每末三錢水煎服谷疸丸濟生苦參三兩膽草一兩牛膽一個細末二味膽汁入少煉蜜為丸梧子大生薑甘草煎湯下五十丸仲醇陽明病無汗小便不利心中懊憹當發黃梔子麥冬豆豉大劑濃煎服如見身黃急加茵陳為君痞氣發黃半夏瀉心湯加茵陳枳實小便難者茵陳五苓散加山梔結胸發黃陷胸湯加茵陳內傷發黃調中湯加茵陳逆冷加附子陰證發黃脈沉遲肢冷氣促或陰極發躁輕者理中重者四逆俱加茵陳發狂大黃散活人陽毒傷寒熱結在內恍惚如狂者大黃木通大腹皮炙甘草各一錢芒硝二錢桂心七分桃仁三粒水煎寒水石散本事即鵲石散傷寒發狂棄衣而走逾垣上屋寒水石黃連等分細末每二錢濃煎甘草湯調下斗門方治熱病及時疫心躁狂亂奔走狀如癲癇言語不定久不得汗不知人事者人中黃不拘多少入罐內封固武火煅半日候冷取出地上以盆蓋半日許細研新汲水調下三錢未退再服健按人中黃乃甘草末填入青竹筒黏緊入臘月糞坑底浸四十六日取出開筒曬乾聽用並無火煅之法若煅之成灰燼而無用矣此云武火煅半日者想必是人中白或俗以坑砂混稱人中黃耳亦可解毒治熱也發斑升麻葛根湯和劑即活人之升麻湯也斑欲出未出以此發之若已出忌用升麻三錢葛根白芍各二錢甘草一錢熱甚斑不透加紫草錢半脈弱加人參一錢胃虛食少加白朮腹痛倍芍藥健曰熱甚血結肌肉不松斑難透發須加石膏涼其經氣以發之熱甚難化汗不出亦應加石膏解其肌而斑始化汗始泄身始涼故本草稱石膏能發汗解肌為發斑發疹要藥托化皆賴其力舍此而他求未有能勝之者此豫素所經效之良法也元參升麻湯活人咽痛發斑元參升麻各錢半甘草八分水煎化斑湯白虎湯加人參萎蕤水煎熱服又人參白虎湯大青四物湯解毒化斑大青二錢或青黛代阿膠甘草各一錢豆豉百粒水煎犀角大青湯斑出已盛心煩大熱錯語呻吟不眠或咽痛不利犀角大青上元參升麻黃連黃芩黃柏山梔中甘草下水煎健曰芩柏梔不如石膏一味良一方犀角二錢半大青五錢梔子一個豆豉一撮犀角元參湯發斑毒盛心煩狂言或咽痛犀角元參各二錢升麻射干黃芩各一錢甘草六分水煎加味小柴胡湯三因發斑肌熱潮熱往來寒熱口苦咽乾耳聾目眩胸脅滿痛或煩嘔渴喘咳柴胡上人參黃芩半夏黃連元參白芍升麻中甘草下薑三片煎口燥渴去半夏加花粉咽痛加桔梗倍甘草嘔去花粉加生薑減甘草斑毒盛加犀角牛蒡子更加大青胸中煩悶加蔞仁痰火上喘加桔梗知母貝母蔞仁桑皮喘而舌燥煩渴脈數大加石膏脅痛胸滿不利加桔梗枳殼心下痞硬加枳實黃連漏蘆連翹湯熱毒發斑無汗大便實漏蘆連翹麻黃升麻黃芩白斂甘草各一錢枳實二錢大黃三錢水煎熱甚加芒硝不拘當歸丸發斑內實大便不通當歸五兩黃連甘草各兩半水煎當歸成膏和二味為末丸白湯下五十丸利為度加減三黃石膏湯發斑紫赤煩渴脈洪數黃連上黃芩黃柏山梔知母石膏升麻赤芍元參中甘草下粳米二撮水煎熱服熱盛加大青犀角人參三白湯陰證發斑出於胸背手足間稀而淡紅或為涼藥太過人參上白朮白茯苓白芍中薑三片棗二枚水煎足冷脈沉加乾薑附子黃連橘皮湯活人溫毒發斑黃連四錢橘皮去白麻黃杏仁葛根枳實各二錢厚朴甘草各一錢每五錢水煎葛根橘皮湯冬溫至春始病發斑而咳嗽心悶但嘔清水葛根知母麻仁杏仁黃芩橘皮甘草等分水煎黑膏溫毒發斑豆豉一升生地半斤豬膏二斤水煎三分減一去滓以雄黃麝香如豆大研末攪入服之毒從皮中出愈後忌蕪夷山梔散孫兆熱毒炎盛遍身發斑甚者瘡如豌豆丹皮山梔麻黃黃芩大黃各二錢半木香五分水煎健按斑毒忌辛溫香燥方中麻黃木香非對病之藥無足取也即瘡家亦不宜此二味壞病鱉甲散活人八九日不差諸藥不效名壞證鱉甲升麻前胡黃芩犀角烏梅枳實各七分生地一錢甘草五分水煎羊肉湯韓氏當歸白芍牡蠣各一兩薑二兩桂七錢龍骨五錢附子四錢共搗每末一兩精羊肉四兩蔥白五寸水煎將半絞汁服吐蛔理中安蛔飲節庵人參三錢白朮茯苓乾薑各錢半川椒十四粒水煎若末止再加黃連黃柏各五分川椒甘四粒足冷甚者加附子五分至二三錢量病酌用兩感大羌活湯東垣兩感元氣實感之輕者猶可治之羌活獨活防風防己黃芩黃連蒼朮白朮細辛炙草各六分川芎知母生地各二錢水煎熱服連用二三劑若有他證遵仲景法沖和靈寶飲節庵兩感傷寒陽先起受病多者以此探之上方去獨活防己蒼朮黃連白朮知母增柴胡乾葛白芷石膏狐惑百合目赤黑甘草瀉心湯金匱較傷寒論中方多人參三兩雄黃熏法雄黃為末二瓦合之燒向肛熏治狐惑湯千金黃連薰草各四兩白酢漿一斗漬一宿煮二升分三眼百合知母湯金匱百合七枚擘知母三兩先以水洗百合漬一宿去白沫更以泉水二升煮取一升去渣別以泉水二升煮知母取一升去滓合和煎取一升五合分溫再服滑石代赭湯百合七枚擘滑石三兩碎代赭石如彈子大一塊碎先以水如上法漬洗百合煎取一升去滓別以泉水二升煎二石取一升濾去屑合和重煎取一升五合分溫再服百合雞子湯百合七枚擘雞子黃一枚先以水如上法漬百合煎取一升去滓內雞子黃攪勻煎五分溫服百合地黃湯百合七枚擘生地一斤搗汁以水如上法漬百合煎取一升去渣內地黃汁煎取一升五合分溫再服中病勿更服大便當如漆百合洗方百合一升水一斗漬一宿以洗身洗已食煮餅勿以鹽豉也取汁浸病人身忌食鹽醬則可食白粥與白湯也栝蔞牡蠣散栝蔞根牡蠣熬等分為細末飲服方寸匕日三服百合滑石散百合一兩炙滑石三兩共為細末飲服方寸匕日三服當微利者止服熱則除大小便已利則止服此方本治小便赤澀臍下堅急赤小豆當歸散赤小豆三升浸出芽曬乾當歸三兩共杵為散漿水服方寸匕日三服雄黃鋭散活人下部𧈟瘡雄黃苦參青葙子黃連各兩半桃仁二錢半為末生艾汁丸如棗核綿裹內下部雄黃丸狐惑上攻下蝕及便膿血雄黃當歸各七錢半蘆薈麝香各二錢半檳榔五錢共末麵糊丸梧子大粥飲下十五丸日三服桃仁湯活人治𧈟槐子艾葉桃仁炒各二錢棗三枚煎黃連犀角湯傷寒及諸病後有瘡出下部黃連五錢犀角一兩木香二錢半烏梅七個水煎百合病腹中滿痛方仁齋百合二兩炒黃為末白湯下二錢日三服柴胡百合湯節庵百合勞復食復及瘥後昏沉發熱錯語失神柴胡黃芩人參甘草知母生地陳皮百合一方無生地陳皮入芍藥茯苓鱉甲薑棗煎渴加花粉煩躁加山梔微頭疼加羌活川芎嘔吐加薑汁製半夏滿悶加枳桔水停心下加豬苓腹中如雷鳴加煨薑有表證去茯苓加蒼朮川芎微汗之有里證去茯苓知母加大黃陽毒即極熱證作壞病陽毒解者非黃連解毒湯活人黃芩三錢黃連錢半黃柏一錢梔子三個水煎梔子仁湯陽毒壯熱百節疼痛梔子大青赤芍知母各一錢升麻黃芩石膏杏仁炒各二錢柴胡錢半甘草五分豆豉二十粒薑三片水煎黑奴丸時行熱病六七日未得汗脈洪大或數面赤目瞪身大熱煩躁狂言欲走大渴又五六日以上不解熱在胸中口噤不能言為壞傷寒醫所不治或其人精魄已竭心下猶緩急發其口令藥下咽即活兼治陽毒及發斑大黃一兩釜底煤灶突煤梁上塵小麥奴黃芩芒硝各五錢麻黃兩半細末煉蜜丸彈子大新汲水下須病人大渴倍常者乃可與之又渴者當與水儘量飲之須臾當寒寒後汗出便差水漬法陽毒脈洪大內外結熱舌卷焦黑鼻中如煙煤者以布疊數層新汲水漬搭胸上須臾布熱易之數十遍甚者置病人於水中勢才退亦良法也葛可久治傷寒不得汗發狂者循河而走公就之捽置水中禁不得出良久出之得汗而解又法淨朴硝一斤新汲水一大桶和勻以真青布方尺三五塊浸微捩去水搭胸前及背心頻易之得熱汗出愈一法熱甚內結不能解者擂地龍調水去渣飲之地龍水陽毒傷寒下之雖通結胸不軟依舊結硬痛楚喘促或發狂亂大白頸蚯蚓四條水洗淨研如泥入薑汁一匙白蜜半匙生薄荷汁一匙無則用乾者煎濃汁亦可更入片腦半分和勻徐徐灌下令盡良久漸快穩睡一時再與揉心下片時得睡當有汗出即愈不應再一服必效陰毒即極寒證作壞病陰毒解非正陽散活人陰毒傷寒張口出氣面青舌黑多睡四肢冷心下硬身不熱但頭上有汗煩渴不止附子一兩炮乾薑炮甘草炙各二錢半皂角一錢研細為末每二錢水煎正元散治傷寒如黨風寒吹著四肢頭目百節疼痛急服此如人行五里許再服連服三次汗出立瘥若治陰毒入退陰散半錢同煎服麻黃半夏陳皮芍藥肉桂炮薑熟附子吳茱萸炒大黃炙甘草等分上麻黃加一半茱萸減一半俱為末每錢入生薑三片棗一枚煎熱服以衣被蓋覆取汗若是陰毒不可用麻黃致再出汗白朮散陰毒心胸煩躁四肢逆冷白朮細辛附子炮桔梗川烏炮各一兩炮薑五錢細末每二錢水煎天雄散天雄炮肉桂厚朴炒各一兩當歸麻黃白朮半夏炮各五錢橘皮炮薑各七錢半川椒二錢半焙去汗每五錢加薑三片棗二枚水煎溫服未汗再進附子散熟附子三分半夏洗炮薑各一錢桂心當歸白朮各五錢每三錢加薑二片煎肉桂散肉桂良薑白朮厚朴木香各三錢赤芍陳皮前胡熟附子當歸人參各一兩吳茱萸五錢每四錢生薑三片棗三枚水煎退陰散兼治傷寒厄逆服之便止川烏乾薑等分為粗末炒令轉色搗細末每一錢入鹽少許水煎溫服附子回陽散良方陰毒傷寒面青肢冷臍腹㽱痛附子一枚炮搗末每三錢生薑汁冷酒各半盞調服再飲冷酒一盞相次再進一服良久臍下如火遍身和暖為度一方川烏水浸七日切曬乾用遇患者取研末一錢入鹽一匙水煎服能壓下陰毒所注如豬血相似未效再進獨參湯陰陽二毒不明下藥錯誤欲死者人參一兩水煎冷頓服名奪命散傷寒昏沉脈不出者最宜之健曰病既陰陽二毒不明藥誤欲死當審其藥之故與病之勢以決寒熱表裡虛實庶可投劑非貿貿然即以獨參為必能活人也智者察之代灸塗臍膏附子蛇床子馬藺子吳茱萸肉桂等分細末以白麵一匙藥末一匙入生薑汁煨成膏攤貼臍下關元氣海處自晚至曉其力可代灸百壯腹痛亦可用又法用丁香蓽菝乾薑牡蠣燒灰放手心中以津唾調如泥掩其陰至暖汗出愈健曰此二法甚佳瘥後復病參胡三白湯過經不解人弱脈虛人參二錢柴胡一錢白茯苓白朮白芍各錢半薑棗煎脈微弱口乾心煩加麥冬五味子陰虛火動遺精加黃柏知母牡蠣不得眠加竹茹棗仁健曰此瘥後調理妙方加減亦精人參三白湯仁齋發汗後有表證不解惡寒脈浮桂枝湯和之若人弱脈虛以此湯加桂枝一錢方見前發斑證內汗再多者黃耆建中湯竹葉湯千金汗後表裡虛煩不可攻但當與此竹葉二把半夏半升石膏麥冬各一升人參甘草各二兩生薑四兩粳米半升水煮米熟頻飲之麥門冬湯海藏勞復氣欲絶者用之有起死回生之功麥冬一兩甘草一兩粳米半合竹葉五十片水煎不用石膏以三焦無火熱也加人參尤妙不能入口者綿引滴口中七味蔥白散許仁則勞復食復甚者一如傷寒初有此證宜服葛根三合新豉半合蔥白半升生薑一合乾地黃麥冬各三兩勞水以杓揚千遍者四升煎服取汗健曰按勞復非外邪所感豈宜大劑蔥豉發汗食復必因停滯在中何可地黃麥冬膩膈意見皆非此方無足用也補中益氣湯東垣勞復發熱氣高而喘身熱而煩四肢怠惰人參一錢黃耆二錢白朮陳皮當歸白芍柴胡各一錢升麻炙甘草各五分水煎下元陰虛火動或夢中失精自汗煩熱陰虛不足必加黃柏知母以救腎水再入麥冬五味子若宿食不消心下痞去人參升麻加黃連枳實不眠加棗仁茯神遠志脈弱人虛倍人參自汗盜汗倍黃耆食少胃弱倍白朮外感多倍柴胡內外有熱佐黃芩有痰加橘皮半夏嘔吐並加竹茹米食不化入麥芽神麯肉食不消入生山楂炒青皮無熱下虛有寒黃耆建中湯虛甚大建中湯人參養榮湯健曰此方加減得法大病後補虛法外臺取七歲以下五歲以上黃牛乳一升水四升煎至一升稍稍飲之服十日佳易病赤衣散千金女勞復及陰陽易室女月經布近陰處者名赤衣燒灰白湯下日三服付皮湯活人治女勞復青竹皮刮取半升水煎溫服宜淡薑汁拌用豭鼠糞湯陰陽易及女勞復韭白根一大把豭鼠糞十四粒水煎溫服之必有黏汗出為效未汗再服調燒褌散尤妙健按豭鼠糞即雄鼠屎也栝蔞竹皮湯陰陽易熱氣上衝胸中煩悶手足蜷攣或搐搦栝蔞根五錢青竹皮一兩水煎調燒褌散服當歸白朮湯婦人未平復因有所動小腹結痛腰胯四肢無力發熱當歸白朮黃耆人參芍藥炙甘草桂枝附子各錢半薑三片煎服得微汗瘥逍遙湯節庵陰陽易女勞復難治者人參知母竹青黃連生地柴胡犀角滑石韭根炙甘草薑棗煎入燒褌末一錢服卵縮腹痛倍地黃得汗為效無再服小水利陰頭痛愈矣妙香散和劑陰陽易不差大便不通心神昏亂驚惕不安辰砂三錢冰片膩粉牛黃各七錢半巴霜二錢半金箔五片黃占三錢蜜一小匙煉勻和丸每一兩作三十丸米飲下五丸壯者七丸弱者三丸取大便通即止健按此乃劫劑其分兩不均藥性猛利與易病無甚貼切難用也發頤連翹敗毒散發頤初腫連翹上羌活獨活荊芥防風柴胡桔梗牛蒡子歸尾花粉中升麻紅花炙甘草下水酒各一鍾煎服面腫加薄荷殭蠶便硬加酒浸大黃內有熱及寒熱交作倍柴胡加酒芩石膏未消加穿山甲白附子健按發頤乃陽明風熱為病宜辛涼以汗之若耳後發則兼少陽風毒之甚此方太陽經風居多恐風勝而火更熾且原方內尚有川芎白芷蘇木漏蘆似屬外科家藥因其辛溫香烈故去此四味而增入薄荷殭蠶石膏白附以佐涼散庶幾近之然二活亦非對證並可去之內托消毒散發頤有膿不消已破未破俱可服黃耆上人參防風白芷當歸桔梗川芎連翹柴胡升麻銀花甘草節俱中水酒各半煎徐服兼服蠟礬丸尤妙健按發頤本屬陽明少陽風熱理宜辛涼以散不應辛溫助火發風既有膿血為熱所迫明矣並宜涼血解毒何必仍用芎芷況發頤多兼發疹之證惟升麻葛根湯為主入牛蒡蟬退殭蠶木通柴胡橘紅杏仁桔梗薄荷石膏柳柳蔥白並煎湯洗之或用山梔末飛面蔥汁調敷之疹透汗泄遂愈何至成膿而作此治乎此非偶感時之發頤乃是傷寒溫疫病後餘毒耳均不利於參耆補托嗟乎用藥之難不但不易與俗人言亦難為前輩較也能得對經對證之道庶幾左右逢原而有出人之作消毒圍藥黃連黃芩黃柏梔子大黃雄黃白芨白蘞芙蓉葉大薊根天南星赤小豆歸尾朴硝五倍子半夏細為末以五葉藤腦腫見消野苧根三種搗汁入苦酒少許調敷留頭出毒健曰觀此圍藥原以風熱壅腫為治而方多寒瀉更兼涼血則知所應服者不得用辛溫之劑矣雜解表方宇泰大抵證兼表裡邪由錯雜似傷寒而非正傷寒者宜於後方斟酌選用若脈證與麻黃桂枝吻合者自當遵仲景法治之六神通解散河間解利兩感及非時暴寒感冒頭痛發熱燥渴麻黃上蒼朮中石膏滑石黃芩甘草下蔥薑各五豆豉一撮水煎人參敗毒散和劑傷寒頭痛壯熱惡風寒痰嗽鼻塞身重風濕身腫體痛惡風四時疫癘通用夏至後傷風有汗亦用此方即蘊要之人參羌活散羌活獨活柴胡前胡桔梗川芎枳殼人參茯苓各一錢甘草炙五分薄荷少許生薑三片一方去人參加黃芩乾葛十二味敗毒散邱文莊用此治人最效凡諸時行疫證但內渴即宜服之上方去人參加乾葛黃芩花粉十神湯和劑時令不正疫癘妄行感冒發熱不問陰陽兩感或疹子欲出麻黃乾葛紫蘇白芷升麻川芎赤芍香附陳皮甘草等分蔥薑煎如頭痛甚更加蔥白二莖胸滿悶加枳殼仁齋此湯用升麻乾葛能解利陽明經疫癘時氣發散之藥非正傷寒藥若太陽傷寒用之能引邪入陽明傳變發斑矣慎之健曰疫癘發熱必挾溫濕之氣辛溫者烈如芎芷香附皆能助燥生熱鼓動斑黃害人不淺凡治疫必從清解為主非所論於發散也藿香正氣散和劑四時不正之氣傷寒頭痛憎寒壯熱霍亂吐瀉山嵐瘴氣伏暑吐利轉筋藿香蘇葉白芷大腹皮茯苓各錢半厚朴白朮陳皮半夏各一錢薑三片棗一枚水煎仁齋此方宋人所制治內傷飲食外感寒邪拘急嘔逆胸膈滿悶與傷濕傷冷中暑霍亂山嵐瘴氣水土不服寒熱作瘧增損用之其效如神然非正傷寒藥若太陽病妄用之先虛正氣逆其經絡往往變成壞證不可救藥健觀仁齋二論則知傷寒是另一法門未許雜方混治雜藥妄投也前賢不忍後世顛倒故叮嚀諄切而欲人誕登彼岸如此其至也宜相勉諸參蘇飲元戎內外感一切發熱之藥又云前葛自能解肌陳枳自能寬膈大治中焦痞滿凡小兒室女有熱尤宜蘇葉乾葛半夏前胡人參茯苓各七分半枳殼桔梗陳皮木香甘草各五分薑五片棗二枚煎溫服有痰者熱退後二陳六君相間服十味芎蘇飲淡寮四時傷寒發熱頭痛即芎芷香蘇飲川芎七分半夏六分蘇葉乾葛柴胡茯苓各五分陳皮三分半枳殼三分桔梗五分甘草二分薑三片棗一枚水煎仁齋天道和暖邪輕者用此代麻黃湯健曰處方之難如名人撰古作要通篇鍛鍊無一間字始稱高手若此方通體屬三陽疏散之劑而茯苓一味乃是余文欲其滲泄乎則犯發汗不得利小便之戒欲其健脾乎又疏散中所不必前輩未能刮垢磨光無怪後之冗雜紊亂欲其專功去病難矣故處方之要貴乎清真能如作古文之法斯可謂得之矣和解散和劑四時傷寒頭痛煩躁自汗吐利咳嗽蒼朮一兩桔梗藁本甘草各五錢厚朴陳皮各二錢半每五錢加薑三片棗三枚水煎即平胃散加藁桔也雙解散河間傷寒傷風表證悉具內熱口乾者通聖散天水散即六一散各半每二兩加薑蔥各三片煎服取汗養胃湯三因外感風寒內傷生冷憎寒壯熱頭目昏疼夾食停痰並治半夏制厚朴炒蒼朮炒各一錢橘紅七分半藿香草果茯苓人參各五分甘草三分生薑二片烏梅一個水煎五積散海藏陰經傷寒脾胃不和及感寒腹痛白芷川芎當歸茯苓半夏芍藥肉桂炙甘草各三錢麻黃枳殼陳皮各六錢乾薑厚朴各四錢蒼朮二兩四錢桔梗一兩二錢每粗末三錢薑三片蔥白三個水煎一方有人參三錢無枳殼麻桂芍甘即麻黃桂枝各半湯也蒼朴皮草即平胃散也枳桔二陳即枳桔半夏湯也加芎歸理血又加乾薑為厚朴散此數藥相合解表溫中消痞調經此為內傷外感表裡之分所制雖非仲景桂枝麻黃薑附之的方能變通用之治效多矣陰經傷寒手足逆冷及虛汗不止脈細面青而嘔更加附子健按此方藥品據有所自惟白芷獨無專屬非傷寒家藥明矣此惟癰瘍食物香料可用非大方王道所宜也欲其開發脾胃不如丁香豆蔻木香砂仁之為妙何前人不察往往用之後學得以藉口貽誤故不少矣況此劑乃雜病因寒停食之方非治陰證傷寒之法雖欲變通其治恐難應手副心觀子按感冒輕證雖病似傷寒有必不可以正傷寒藥治之者以上各方權用可已至正傷寒自當遵仲景諸法或因難用遂欲以此等代之其貽禍亦不淺也蓋邪有重輕病有大小邪輕藥重正氣因傷病大藥小邪亦不除不然今之敗毒芎蘇豈勝於古之麻黃桂枝哉古法治三時傷寒方生薑蔥白紫蘇作湯汗之連須蔥白湯活人生薑連須蔥白水煎服一法凡感冒用帶根蔥白煎湯嚼生薑飲下得汗愈傷寒易簡方仁齋凡感冒風寒連須蔥白一握生薑五片陳皮一塊細茶一撮白梅一個水煎熏頭目飲蓋覆取汗一方蔥白一握豆豉半合泡湯服之一方紫蘇煎湯飲之一方卒無醫藥處覺傷寒者百沸湯飲之少頃再飲得微汗愈風溫萎蕤湯活人治風溫或冬溫或春月中風傷寒發熱頭眩咽乾舌強胸內痞疼腰背強萎蕤二錢半石膏三錢羌活麻黃白薇杏仁川芎各一錢葛根二錢木香甘草各五分炙水煎又方蘊要石膏三兩萎蕤麻黃杏仁川芎白薇獨活木香甘草各一兩水煎三服取汗健曰凡兼溫者必以涼解為主故用石膏為君發汗解肌而涼瀉溫熱之毒也今人不辨藥性視其有白虎之名畏不敢用此等之證墮誤莫挽寧死而醫家病家均不醒悟眼見時行溫疫用膏者多活不用者則死察此則知宜用而不宜畏矣要在施之及其時耳遲早輕重尤當酌量如不應用而用之亦能害事也知母葛根湯活人風溫身體灼熱甚石膏三錢葛根二錢萎蕤知母各錢半麻黃有汗去之羌活防風南星生用黃芩升麻人參各一錢杏仁甘草各七分川芎木香各五分煎健曰此方藥味混雜不合風溫灼熱之證川芎木香均屬辛溫有礙防己湯風溫脈浮身重汗出惡風防己白朮各二錢黃耆二錢半人參甘草炙各一錢薑三片棗二枚每五錢水煎服被覆取汗蘊要有防風錢半防己黃耆湯風溫身重防己一兩黃耆兩二錢白朮七錢半甘草五錢每五錢加薑四片棗一枚煎服後當如蟲行皮膚中腰以下如冰坐被上再以被圍之得微汗出瘥喘加麻黃胃中不和加芍藥氣上衝加桂下有陳寒加細辛栝蔞根湯風溫灼熱大渴栝蔞根三錢石膏乾葛人參各二錢防風知母各錢半甘草一錢水煎葛根龍膽湯仁齋風溫脈弱身重汗出萎蕤三錢葛根升麻各二錢大青白芍各一錢膽草桂枝各一錢甘草炙七分石膏三錢生薑三片煎健曰此方寒熱並用最難師法非有得於中者不能如此見淺者易於引誤濕溫茯苓白朮湯活人茯苓乾薑各一錢白朮錢半桂枝七分甘草五分炙水煎麻黃杏子薏苡甘草湯一身盡痛發熱晡劇風濕麻黃薏苡各兩半甘草一錢杏仁炒十粒每四錢水煎痙栝蔞桂枝湯金匱濕家汗之成痙栝蔞根二錢桂枝芍藥各二錢半羌活獨活甘草各一錢薑三片棗二枚水煎防風當歸散難知汗多亡血成痙防風人參當歸川芎各二錢生地白芍羌活各錢半甘草炙一錢水煎惡風自汗加桂枝一錢白朮二錢時行疫癘清熱解肌湯丹溪溫暑之月病天行瘟疫熱病兼治羌活三錢石膏錢半黃芩知母白芍三味酒炒升麻乾葛人參各一錢甘草七分黃連酒炒生地酒洗各五分薑三片水煎胸膈滿悶痰涎壅塞加枳實半夏各一錢薑汁四五匙脾胃不實加朮炒錢半人中黃丸大黃黃芩黃連人參桔梗防風蒼朮廣皮滑石人中黃取末曲糊為丸分氣血與痰作湯水氣虛四君子湯下血虛四物湯下痰多二陳湯下熱甚童便下神效沃雪湯傷寒陰陽二證未辨及時行疫癘惡氣相感服之效如沃雪蒼朮炒乾薑炮甘草炙各三兩厚朴炒防風白芍乾葛各二兩每四錢水煎熱服身體微潤即愈如患疫氣正盛或相傳染每用二錢清晨服普濟消毒飲東垣時行大頭瘟疫黃芩黃連各五錢人參三錢元參橘紅柴胡桔梗甘草各二錢連翹白芷鼠黏子板藍根或藍葉或青黛五分代之馬勃各一錢殭蠶炒升麻各七分細末或加當歸薄荷防風每五錢水煎服大便硬加酒煨大黃一二錢微利之腫勢盛者兼砭刺之漏蘆湯丹溪臟腑積熱發為腫毒時疫疙瘩頭面浮腫咽喉填塞水藥不下及一切危惡疫癘升麻錢半漏蘆二錢黃芩藍葉各錢半元參牛蒡子連翹桔梗甘草各一錢大黃酒浸酌用水煎清涼救苦散蘊要治證同上芙蓉葉桑葉白蘞白芨紫河車草藥大黃黃芩黃連黃柏白芷雄黃赤小豆芒硝等分為末蜜水調塗或萬病解毒丹人生薄荷汁磨服並塗腫處咽喉腫痛磨濃點入喉中亦良消毒丸即救苦消毒飲時毒疙瘩惡疫大黃殭蠶牡蠣等分煉蜜丸如彈子大新汲水化下內加桔梗甘草牛蒡子更妙救苦丹治時疫皂角元參乾葛各一兩大黃九制二兩水泛丸湯下雞子湯時氣熱盛狂妄欲走雞子七枚芒硝一兩入井花水一升攪千遍服取微利解一切疫甘草五兩細切微炒量人能飲若干取無灰酒研去渣服當大瀉毒隨出雖大渴勿飲水飲即難救治天行時疫熱毒臘雪磁器收盛服之最良又方半天河服之亦佳本草衍義謂即爛樹頭中水也人中黃飯杵和丸如緑豆大水下十五丸最解瘟疫聖散子時毒流行不問陰陽之感一切可治草豆蔻十個煨石菖蒲獨活麻黃藁本柴胡防風細辛良薑蒼朮藿香厚朴茯苓豬苓枳殼白朮芍藥半夏澤瀉甘草吳茱萸洗熟附子等分每五錢水煎宇泰此治時行疫氣必與傷寒證同者始可用熱藥至謂不問陰陽無不取效決無是理後世以過信蘇長公故施聖散子殺人者屢矣嗟乎可不慎哉健曰凡時疫流行必兼溫暑法當清涼解毒豈宜辛熱助勢此或為寒疫而設偶爾得中留為成方若輕用之必禍不旋踵老君神明散活人闢疫法烏頭四兩炮桔梗二錢半白朮一錢為末絳囊盛佩之同居閭里皆不染疫或酒服方寸匕取汗即瘥藜蘆散即千金之赤散硃砂另研桂枝附子各六兩丹皮皂角各兩六銖乾薑羊躑躅藜蘆各一兩細辛十八銖為末絳囊佩方寸匕於臂男左女右已病者納米大一粒於鼻中酒服一錢取汗務成子螢火丸一名武威丸闢疫癘惡氣百鬼狼虎蛇虺蜂蠆諸毒及五兵盜賊凶害雄黃雌黃各二兩羚羊角鍛灶灰鐵捶柄入鐵處燒焦者各兩半螢火蟲鬼箭羽刺蒺藜礬石各一兩為末以雞子黃並雄雞冠一具搗和丸如杏仁大作三角絳囊盛五丸係臂上並挂門戶上屠蘇酒千金大黃川椒桔梗桂心防風各五錢川烏白朮菝葜各一錢銼碎絳囊盛之除夕懸井中令沉至泥元旦出之將囊浸酒中略煎向東方飲之從小者先飲而上仍棄囊於井中菝葜即澤蘭詩謂採蘭水上以拔除不祥孔聖闢疫丹彭氏臘月念四夜五更取井水盛淨器量人口數取乳香塊如數浸水中至歲朝五更燉溫從幼至長每人以乳香一小塊飲水三呷咽下則一年不患時疫此方孔氏用之至今不轍闢瘟丹蒼朮絳香青木香安息香桃木香柏葉白芷皂角虎頭骨等分棗肉搗和丸如彈子大硃砂為衣除夕及元旦慢火焚之外臺闢疫方硃砂一兩研細白蜜和丸麻子大元旦平明向東一家大小各吞三七丸忌食諸肉並勿近齒肘後方正月上寅日取女青末三兩紅絹縫三角囊盛系帳前即闢疫一方東行桃枝細銼煮湯閣家澡浴佳一方水磨雄黃塗鼻上或水飛雄黃末吹鼻孔中一方光明雄黃研細以筆蘸點鼻內兩旁陷中則疫不能入雖與病者同床亦不相染一方明雄黃一塊絳囊盛系頂心重五錢可用一方赤小豆同黏米浸入水缸中每日取飲一方貫仲浸水日汲飲一方上好香油塗鼻中五症丹醫統治疫如神黃芩乙庚年為君黃柏丙辛年為君黃連戊癸年為君山梔丁壬年為君甘草梢甲已年為君香附紫蘇俱為臣上七味生研末除當年為君者倍用余各減半再以大黃三倍濃煎去渣熬膏和藥搗丸如雞子大加硃砂雄黃等分為末為衣再裹金箔於外每用一丸泉水七碗浸化可服七人病者愈不病者不染雄黃丸潔古雄黃一兩丹參赤小豆炒鬼箭羽各二兩為末蜜丸桐子大溫水下五丸雖與病人同寢亦不染又方紅棗全用蒼朮等分共搗為丸彈子大置爐中燃之亦闢瘟氣又方疫氣行時每日五更投黑豆一大握於井中勿使人見凡飲此水之家俱不染疫功德無量或投自己缸內飲之保全一家婦人桂枝紅花湯活人婦人傷寒發熱惡寒拘急口燥舌乾桂枝芍藥甘草炙各三兩紅花一兩每五錢加薑煎阿膠散活人妊孕傷寒安胎阿膠炒桑寄生白朮茯苓人參等分細末每二錢黏米飲調服日再白朮散治證同上白朮黃芩等分為末每三錢入薑三片棗一枚煎服惟四肢厥冷陰證忌服蘇木湯妊娠傷寒或中時氣灑浙寒栗悸噦蘇木赤芍橘皮黃芩黃連炙甘草各一兩每五錢水煎健曰妊娠傷寒時氣不論寒熱必以保胎為無傷動其氣血此蘇木赤芍專工破血豈可用乎成方中常有混雜之弊而活人書方法更多謬誤此斷不可用也黃龍湯活人妊娠傷寒寒熱脅痛嘔逆痰氣及經水適來適斷産後風入胞宮寒熱如瘧即小柴胡去半夏薑棗一方柴胡五錢黃芩甘草各二錢赤芍三錢水煎健曰柴胡少則升中則和多則降妊娠豈可重用乎赤芍破血狠味更不宜用於此見朱奉議之所學往往多謬無足取旋覆花湯妊娠傷寒頭目旋疼壯熱心躁旋覆花赤芍甘草炙各五錢白朮黃芩人參麻黃各七錢半前胡石膏各一兩每四錢薑三片煎健曰此方去赤芍用芍藥湯妊娠傷寒自利腹痛脈沉太陰病芍藥酒炒白朮土炒茯苓炙甘草各二錢半水煎桂心牡蠣湯産後頭痛發熱及腹內拘急疼痛桂心六錢牡蠣煅白芍地黃各一兩黃芩四錢每五錢水煎服竹葉防風湯産後傷風發熱面赤喘頭疼竹葉半把葛根兩半防風桔梗桂枝人參炙甘草各五錢每四錢薑三片棗二枚煎神功丸三焦氣壅六腑風熱大便不通大黃三兩河子皮二兩麻仁五兩人參五錢蜜丸梧子大溫水下二十丸日三服産後大便祕者米飲下十丸黑神丸溫疫時氣有積食者巴豆一兩急流水二碗浸一宿煮三五十沸冷取去心膜拭乾研如膏厚紙包重物壓去油取淨粉五靈脂研細末杏仁炒大戟去皮生用三稜各五錢豆豉二兩研共為極細末入巴豆杏仁同研勻入飛面半匙井花水調如糊杵二三千下丸緑豆大曬乾收藏傷寒有積食脈沉結身體不熱者即下之薑棗湯吞數丸若身熱服此即為結胸痞氣健曰此猛利之藥不宜浪用小兒惺惺散云岐小兒寒邪及時氣瘟疫頭痛體疼壯熱多眠潮熱煩渴痰實咳嗽瘡疹等證羌活獨活柴胡川芎枳殼茯苓人參各一錢前胡桔梗天麻地骨皮甘草各五分生薑一片棗半個薄荷少許煎健曰此方夾雜雖無大犯而未為穩當薄荷散夾驚傷寒熱極生風薄荷葉五分羌活麻黃各一分半全蠍去尾鉤酒洗瓦上炙二個天竺黃殭蠶白附子各二分半每末一分水煎服或加竹瀝少許鉤藤湯調服亦可紅綿散小兒四時感冒發熱諸驚丹毒變蒸等熱人參二錢半天麻殭蠶麻黃全蠍各二錢甘草辰砂各一錢每一錢入綿胭脂少許煎服健曰此方治小兒本虛邪盛頗精連翹飲撮要三焦積熱大小便不利瘡瘍蘊毒各證連翹瞿麥滑石牛蒡子車前子木通山梔當歸黃芩荊芥柴胡赤芍蟬退甘草等分每二錢水煎補遺健增防風通聖散河間風寒暑濕諸邪表裡三焦壅熱癰瘍腫瘡面赤耳疼頭痛昏暈二便祕澀皆治大黃芒硝防風荊芥麻黃梔子芍藥連翹甘草桔梗川芎當歸石膏滑石薄荷黃芩白朮分兩隨證酌量水煎羌活勝濕湯局方濕氣在表腰脊重痛一身盡痛微熱昏倦傷風頭痛通用之方羌活川芎獨活炙甘草蔓荊子藁本防風防己附子水煎濕重者可加蒼朮木通獨活湯丹溪風虛瘛瘲昏憤寒熱兼治風溫獨活羌活防風川芎當歸細辛桂心半夏人參石菖蒲白薇茯神遠志炙甘草薑棗水煎小續命湯千金剛柔二痙健曰兼治痙證然亦不見效驗桂枝川芎人參附子麻黃杏仁芍藥防風防己黃芩炙甘草水煎清暑益氣湯東垣太陽中暍發熱惡寒身重疼痛脈弦細芤遲人參黃耆麥冬五味子當歸神麯黃柏橘皮炙甘草葛根蒼朮白朮青皮升麻澤瀉薑棗煎健曰方中去神麯青皮白朮加鮮藿香黃連滑石為妙八正散局方濕熱下注咽乾口燥飲水多而小便不利車前子炒研木通大黃萹蓄甘草梢山梔滑石瞿麥燈心水煎一方加木香涼膈散局方中焦燥實煩熱斑黃口渴吐衄大小便祕芒硝大黃梔子連翹黃芩薄荷甘草竹葉水煎加蜜服清心蓮子飲士材治腎虛有熱小便不利口苦咽乾石蓮人參地骨皮黃耆柴胡赤茯苓炙甘草麥冬車前子水煎胃苓湯宇泰治熏黃蒼朮厚朴炙甘草陳皮豬苓澤瀉茯苓肉桂薑棗煎即平胃合五苓故名歸脾湯濟生補益心脾為傷寒汗下後心神恍惚飲食少思瘥後調理妙劑時氣外感百病後皆宜人參黃耆白朮當歸棗仁茯神遠志炙甘草木香龍眼肉薑棗同煎並治勞復勞神三拗湯治表寒喘嗽麻黃杏仁炙甘草煎八珍湯氣血兼補即四君四物二方全用附易窗歷效方救急解毒湯易窗傷寒時氣感冒風邪疫毒陡發喉風及咽痛臚脹惡寒發熱咳嗽嘔惡兼發斑疹緊急危證牛蒡子炒研三錢薄荷葉一錢桔梗錢半生甘草橘紅木通射干各一錢殭蠶洗炒研二三錢石膏生搗六七錢河水輕煎熱服二三劑即愈如咳者加杏仁去皮尖研二錢壯熱頭痛鼻塞傷風聲重者加荊芥防風各一錢寒熱欲嘔者加柴胡一錢咳而嘔惡疹現未透者加前胡蟬蛻各一錢杏仁二錢柳柳三錢熱甚嘔吐現斑者加豆豉蟬退升麻各一錢乾葛錢半解托之斑疼現而難發或發而熱甚難化或咽喉腐爛臭穢痛甚俱加重石膏至二三兩併入連翹錢半花粉元參各二三錢知母酒炒錢半若斑色紫赤並加紫草酒拌三錢青黛一錢以化之兼保咽喉風涎壅盛腫甚欲閉者必加全蠍去尾勾酒洗炙脆研五七枚痛甚湯水難咽者加山豆根一錢痰鳴氣喘加葶藶隔紙焙研一錢並前胡杏仁腐爛不能收口加川貝母去心研末調下二錢如兼口疳齒腐加青黛倍石膏外邪輕而本原陰虛火炎咽痛者去殭蠶重用元參三四錢黃柏鹽水炒一錢知母鹽水炒錢半咽喉腐爛外無寒熱但內火上熏本原虛而清之不退飲食不進倦怠脈虛可加人參三五分若喉證舌強或口噤不語昏憒躁擾循衣撮空妄見鬼神二便自遺不知人事者死如咽喉腫閉口緊藥飲難入者取雞翎抄後方奪命散探入喉中攪去涎痰外用紫蘇長蔥柳柳煎湯大手中蘸濕乘熱揉其兩腮圍其頸項使藥氣侵入亦可寬鬆然後可進湯藥健曰咽喉要害之地為病最危雖輕亦當慎重若誤投藥石妄施刀針不禁葷酒鮮不害命方書論證不一須辨內傷外感咽痛喉證各別皆因五志之火內郁六淫之邪外觸從內傷者勢緩從外感者勢急發於喉則痰壅氣閉而悶絶發於咽則腐痛不食而暴亡若猝然陡發頃刻畢命者別感惡厲之氣雖有神丹亦難救也其四時不正流行傳染及傷寒伏熱上僭致患斯證寒熱交作或斑疹並現總以半表半裡論治究足少陽陽明手太陰三經為主不可相循俗習擅用荊防麻桂足太陽辛溫之表劑又不可妄投芎歸芍地足厥陰酸溫之斂劑更不可浪進芩連梔柏手足三陰苦寒之瀉劑並不可憑仗刀針驟開瘡口使先引爛難以收拾法惟辛涼以散邪解肌以化毒大忌辛溫香燥貽人夭殃茲參前賢精要酌設是方經效良多公諸於世俾患家知此病情而留心味道者亦可小補焉凡施送方中近有用芎歸香附者非對病而辛溫有礙不可服用土牛膝根汁灌者太寒有誤用生蘆蔔汁飲者太克非咽喉家藥古法用巴豆油紙燃燈刺腫處者太險難用若腫勢凶猛痰涎壅塞惟桐油探吐瓜蒂矣藜蘆湯吐之為妙若閉塞至極水漿不入命吸者不刺則死刺之出其膿痰反可幸生並刺少商合谷二穴凡吹藥中切不可其味酸澀反致喉緊之禍奪命散一切咽喉腫痛喉風痰壅喉痹腐爛雙單乳蛾會靨腫硬臚脹舌強痰涎湧吐此藥吹三次即解輕者立愈重者漸退其效有斬關奪命之能因以名方白殭蠶水洗炒香研三錢全蠍去尾勾酒洗炙脆研細末十個辣薄荷葉曬研一錢山豆根切薄曬研一錢硼砂研錢半冰片研五分牙硝研一錢雄黃研五分大黃曬研五分黃柏酒炒研五分生甘草切曬研三分共為極細末合和瓶盛勿泄氣臨用以管筒抄藥吹之如本原陰虛火炎喉痛不用此藥而用後方碧玉散一切咽喉腐爛牙疳喉癬咽痛痰塞吹之即能生皮收口消痰清火解毒止痛兼治陰虛咽痛咳嗽小兒口疳齒𧈟神效人中白精製潔白者煅研三錢燈草灰存性橄欖灰存性綿灰存性冰片珍珠西黃各三分研花青篩去腳川連生研黃柏酒炒研牙硝研各五分硼砂一錢研共研極細末和勻瓶盛勿泄氣臨用吹之正氣丹治瘟疫流行時氣傳染寒熱交作頭疼肢重咽喉腫痛嘔吐胸滿狂譫煩渴斑疹欲發及已發不化二便不通無汗脈數均可救療兼治大頭天行疙瘩疫毒浸淫瘡瘍瘧痢腹脹發黃無論初久表裡雙解其效甚捷升麻柴胡前胡蘇葉薄荷葉防風荊芥橘紅豆豉蟬退射干小木通澤瀉青黛山豆根土藿香葉茅山蒼朮炒檳榔各一兩陳神麯炒焦半夏薑汁製乾葛桔梗枳實麩炒厚朴薑汁炒連翹黃芩酒炒大黃酒浸芒硝另研入各兩半殭蠶炒香杏仁去皮尖去油研桃仁去皮尖去油研鬼箭羽取嫩枝切各二兩牛蒡子去殼炒去油研紫草尖酒洗各三兩元參花粉滑石水飛楂肉炒焦各二兩四雌黃水飛青木香炙甘草各五錢共磨細末用藍根馬勃柳柳澤蘭大腹皮各三兩洗淨石膏半斤搗浮萍二大把煎湯去渣取煮陳大麥粉為稀糊拌藥搗潤為丸如雞子黃大外以水飛雄黃末為衣曬乾錫瓶盛勿使發黴泄氣遇瘟疫時疫每一丸開水化下小兒半丸孕婦不忌服後表熱重者得汗而解裡熱實者得便而解斑疹隱現者可透不化者可化如人壯實不能即解連服三四丸無不痊愈歷經效驗普施徹邪退瘥後虛熱者不宜服健按疫癘屬陽明少陽為病居多故兩三日即狂譫嘔吐發斑最忌辛溫香燥以張其勢如麻黃桂枝乃傷寒家藥細辛白芷川芎香附乾薑草蔻川附烏頭丁香木香麝香五倍五味赤白芍生熟地黃耆萎蕤石斛枸杞天冬麥冬山萸吳萸輩皆雜病家藥均非時證疫毒所宜凡人好善施藥不諳就里每以太乙寸金等丹為救疫妙劑殊不知其中如上項辛熱悍味大半在內干犯病經而致猝變者目擊不少要知此種丹藥前人制為佩帶闢疫並非教人磨服以治疫也其可服者惟停食感寒胃寒氣痛而已余則無可治之證世咸謬為仙授隨處施送陰受其害而與者受者誰能醒此蓋未究其藥性故也試遇疫作之際醫家臨證立方寫出丹中諸藥則是人必駭而不肯服也因其施送之便爭取浪服豈知下咽蒙害誤盡蒼生而無一指迷喝破之者實堪憫嘆乃闡前賢治疫良法酌設是方以挽救之歷經捷效無有偏失所謂正氣勝則邪氣退也因以名方
