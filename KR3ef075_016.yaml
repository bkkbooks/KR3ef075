body:
  text: 傷寒直指卷十四交通方健曰傷寒論原方百有十二已彙集第八卷此變通方者乃歷代名醫闡發仲景奧旨因時制宜之良法也蓋傷寒書既不全證論方劑類多難用世殊事異艱於得手因設變通之法期於中病而無偏弊以濟人耳藥品雖殊究不離乎仲景針線茲從論注及類證中匯録成卷以便學者得圓融通變而取法焉變通桂枝湯桂枝湯活人桂枝芍藥各三錢甘草二錢炙生薑五片棗二枚煎桂枝湯自西北二方人四時行之江淮間惟冬月春初可行自春末夏至以前遇桂枝證可加黃芩二錢謂之陽旦湯夏至後有桂枝證可加知毋一錢石膏三錢或加升麻一錢若病素虛寒者正用古方不在加減也岐伯所謂同病異名也大抵用溫藥宜避春用熱藥宜避夏素問所謂用溫遠溫用熱遠熱是也雖云宜桂枝須病人嘗自汗出小便不數手足溫或指稍微冷身微似煩而又憎寒始可行之若無汗小便數手足冷不惡寒及飲酒人慎不可行也服後無桂枝證者尤不可再與雖宜解肌證輕者只與柴胡桂枝湯及敗毒散選用安常江淮間地偏暖處春末夏至前桂枝麻黃皆宜加芩夏至後又須隨證增知母石膏大青升麻輩若時行寒疫及病人虛寒者正宜古方不待加減可矣陽旦湯即上方加減黃耆湯潔古黃耆白朮防風等分水煎溫服汗多惡風甚者加桂枝有汗不得服麻黃無汗不得服桂枝然春夏汗孔疏雖有汗不當服桂枝宜黃耆和解之秋冬汗孔閉雖無汗不當服麻黃宜川芎湯和解之健曰秋冬之際病太陽傷寒發汗不出非麻黃何以開腠理若川芎乃手足厥陰經血中氣藥辛溫猛悍無輕揚表汗之功不論風寒外感破血損氣非麻桂之儔殊難信用白朮湯白朮三錢防風二錢甘草一錢炙薑三片水煎疏邪實表湯節庵桂枝芍藥甘草防風白朮羌活川芎薑一片棗三枚膠飴一匙汗不止加黃耆喘加杏仁柴胡胸滿悶加枳桔桂枝湯仲醇冬月即病太陽證自汗畏風頭痛發熱桂枝八分白芍二錢甘草一錢炙生薑二片大棗二枚水煎春溫夏熱加防風白朮去桂枝變通麻黃湯麻黃湯活人麻黃三錢去根節湯泡去汁焙用桂枝二錢杏仁八個去皮尖炒甘草一錢炙水煎夏至後加石膏三錢知母一錢黃芩一錢麻黃性熱夏月服之有發黃斑出之失惟冬與春及病人素虛寒者正用古方不在加減證輕者只宜桂枝麻黃各半湯或麻黃葛根湯蔥豉湯選用川芎湯潔古蒼朮川芎羌活等分水煎無汗惡風寒甚者加麻黃一二錢升陽發表湯節庵冬月正傷寒發熱惡寒體痛脊強脈浮緊無汗以頭如斧劈身如火熾者宜此麻黃桂枝杏仁炙甘草羌活防風升麻川芎白芷生薑三片蔥白二枚或加豆豉一撮水煎服取汗如神無汗而喘者去升麻加葛根體痛去杏仁加蒼朮芍藥身癢面赤不得小汗去升麻杏仁加柴胡芍藥胸中飽悶加枳桔感邪深重服之不汗宜再服健曰方中川芎白芷性味辛溫香烈不必用此為當羌活神術湯節庵傷寒頭痛發熱無汗體痛脈浮緊羌活川芎俱上藁本白芷蒼朮俱中細辛炙甘草俱下加生薑蔥白煎健曰既稱傷寒頭痛發熱無汗是應與麻黃湯何必以祛風之芎芷藁辛猛悍燥烈而反張其勢並開後世冗雜混亂之弊非傷寒門正法也此頭風痛方耳變通大青龍方九味羌活湯潔古羌活防風蒼朮各一錢五分川芎白芷黃芩生地甘草炙各一錢細辛五分水煎健曰潔古欲以此方變大青龍而治傷寒見風傷風見寒之證恐非仲景遺意既用羌防之祛風辛蒼之散寒可兩解矣又何必川芎白芷之猛烈地黃黃芩之沉陰苦寒於傷寒大法悖矣夫傷寒法貴清真最忌混雜此法一設無怪後世多紊亂無章貽誤不淺此方只治雜病風濕體痛頭風之劑豈能及仲景大青龍之玄妙哉神術湯海藏治內傷冷飲外感寒邪無汗者蒼朮防風各二錢炙甘草一錢蔥白生薑同煎如太陽證發熱惡寒脈浮緊加羌活浮緊中帶弦數是兼少陽也加柴胡浮緊中帶洪是兼陽明也加黃芩婦人加當歸健曰此方表裡兼治四時通行之妙劑並能化濕逐飲為陽明太陽家要法變化而出入之無方體也羌活沖和湯節庵治春夏秋非時感冒暴寒頭疼發熱惡寒體痛無汗脈浮緊表證不與正傷寒同治法又春可治溫夏可治熱秋可治濕雜病亦效又以代桂枝麻黃青龍各半等湯是即潔古之九味羌活湯也夏月加知母石膏為神術湯有汗去蒼朮加白朮再不止去細辛加黃耆再不止以小柴胡加桂枝芍藥胸中飽悶去生地加枳桔不作汗加蘇葉豆豉喘而惡寒身熱去生地加杏仁汗下兼行加大黃釜底抽薪熱盛而煩手足自溫脈浮緊此傷風見寒脈也不寒而熱四肢微厥脈浮緩此傷寒見風脈也二者為營衛俱病宜大青龍湯然此湯險峻須風寒俱盛又煩躁者乃可不若以此湯加石膏知母枳殼為妙也健曰太陽為諸陽之首陽明為氣血之宗感冒發熱體痛無汗應與之表責在太陽應與之裡責在陽明何入以足少陰之細辛足厥陰之川芎手太陰陽明之白芷手少陰之生地等如此雜亂只可與俗人言不堪為知者道也二公傷寒名家慮麻黃桂枝之不便輕用而設其實非正傷寒法乃為時行感冒者備耳若欲以此變通大青龍則去仲景大法遠矣況考通部傷寒方劑未有芎芷藁本等件可想見其非傷寒門藥也如或用之必有損無益變通葛根湯解肌湯活人太陽無汗惡風項背強及太陽陽明合病自利葛根二錢黃芩芍藥各一錢桂枝甘草炙各五分麻黃錢半生薑三片大棗二枚水煎麻黃葛根湯活人傷寒一二日頭項腰脊拘急疼痛惡寒煩熱麻黃芍藥各三錢葛根一錢蔥白三個豆豉一撮水煎溫服取汗此方去芍藥即蔥豉湯治傷寒脈緊無汗葛根蔥白湯活人已汗未汗頭痛不止葛根芍藥川芎知母各一錢蔥白五個薑三片千金方傷寒三日與表藥不差脈仍數者陽氣猶在經未入於臟也桂枝黃芩甘草炙各二錢葛根升麻生薑各三錢芍藥六錢石膏六錢梔二圓水煎葛根柴胡湯祗和葛根錢半柴胡一錢桔梗芍藥各七分半厚朴甘草各五分生薑二片蔥白二個水煎柴葛解肌湯陶氏陽明經證目痛鼻乾不眠身熱微惡寒頭微痛脈微洪葛根柴胡羌活黃芩芍藥無汗去之有汗倍用桔梗甘草炙薑三片蔥白兩個冬月無汗惡寒甚者去黃芩加麻黃夏秋加蘇葉健曰原方有白芷宜去之仁齋加減法太陽反汗出惡風桂枝加葛根湯一方有汗加防風無汗惡風葛根湯一方無汗加羌活羌活湯仲醇羌活三錢葛根前胡各二錢杏仁九粒甘草炙八分薑三片棗二枚深秋冬月加紫蘇蔥白冬月即病服此不汗加麻黃一錢薑七片若遍身疼頭痛不解兼口渴鼻乾目疼不臥即太陽陽明證加石膏知母大劑服變通白虎湯白虎湯活人石膏五錢知母三錢甘草一錢粳米一撮水煎米熟為度虛人老人及春秋月宜以竹葉石膏湯代之白虎湯治中暑與汗後一解肌藥耳夏月陰氣在內或患熱病氣虛者妄投白虎往往成結胸以白虎性寒故也蘄水夏至以後雖宜白虎自非新中暍與暑變後汗出不解或冬春寒甚之時因汗下後變狂躁不解當作內熱用白虎治之又不拘於時令也觀子俱屬陽明病何以有葛根白虎之殊蓋葛根治病之在經者若邪已入胃作大熱非白虎不除也雖入胃而又非結聚成實之比石膏滌熱之中復具解肌之妙所以合宜其內本無熱者必犯如上所云之戒矣竹葉石膏湯活人陽明汗多而渴衄而渴差後渴及虛羸少氣氣逆欲吐石膏三錢麥冬一錢人參甘草炙各五分半夏七分竹葉草片粳米一撮嘔加生薑汁二匙白虎加桂枝湯海藏傷寒脈尺寸俱長自汗大出身表如冰石脈傳裡細小其人動作如故白虎加梔子湯治老幼及虛人傷寒五六日昏冒譫妄小便淋或澀起臥無度或煩不得眠並加梔子一錢白虎加人參蒼朮湯河間傷寒汗下後自汗虛熱不止於本湯加二味服之汗止身涼至妙至神一方加半夏橘皮一方加半夏桔梗一方加苓術一方加麻根浮麥一方合解毒湯一方合涼膈散如神白虎湯節庵石膏知母人參麥冬粳米甘草山梔五味子生薑一片水煎心煩加竹葉竹茹心煩背微惡寒大渴去山梔加花粉小便短加滑石嘔加薑汁半夏頭微痛眼眶痛去山梔加乾葛三黃石膏湯陶氏治熱邪傳裡極甚為陽毒發斑發黃身如塗彩眼睛如火狂叫欲走六脈洪數煩渴欲死表裡皆熱欲發其汗病熱不退又復下之大便遂頻小便短赤或不利五心煩熱鼻乾面赤齒黃大渴及過經譫妄不知人事已成壞證亦有錯治溫病而成此者又八九日已經汗下後脈洪數體壯熱拘急沉重欲治其內其表未解欲發其表里證已急趦趄不能措手待斃而已殊不知熱在三焦閉塞經絡津液枯竭營衛不通遂成此證若或發狂躁渴斑黃大便燥實脈數有力者則宜三黃巨勝湯舌卷囊縮者毒氣深入於臟難治也權以此劫之石膏五錢黃芩黃連黃柏各二錢半山梔七個豆豉一撮麻黃一錢生薑一片棗二枚三黃巨勝湯即上方去麻黃豆豉加大黃芒硝枳實仲醇陽明病發狂登高而歌棄衣而走此陽明實也大承氣亟下之便不結者大劑白虎湯灌之白虎專解陽明邪熱若勞役人病此元氣先虛者可加人參名人參白虎湯發斑陽毒盛者白虎湯加竹葉麥冬知母若自汗煩躁遍身疼頭疼不解羌活一錢白芍二錢桂枝七分甘草炙八分知母三錢麥冬六錢石膏一兩二錢竹葉一百二十片陽明病不大便自汗潮熱口渴鼻乾咽乾或乾嘔目眩不得眠畏人聲木聲畏火不惡寒反惡熱甚則譫語狂亂循衣摸床脈洪長而大宜急解其表竹葉石膏湯大劑與之不嘔無汗葛根湯表證罷脈緩小便利愈矣陽明病心下硬滿此邪未入於腹中慎勿下之竹葉石膏加栝蔞一個碎桔梗二錢黃連一錢三陽合病腹滿身重譫語遺尿白虎湯加百合三陽合病脈大上關上但欲睡目合則汗百合一兩麥冬五錢知母花粉白芍各二錢鱉甲三錢甘草一錢竹葉五十片變通柴胡湯小柴胡湯千金治瘥後更頭痛壯熱煩悶即黃龍湯也柴胡半夏各四錢黃芩錢半人參甘草各一錢薑三片棗二枚不嘔而渴去半夏加栝蔞根二錢南陽方柴胡四錢半夏一錢二分半黃芩人參甘草各錢半生薑三片大棗一枚仲醇方柴胡二錢黃芩半夏人參各一錢甘草炙五分生薑三片大棗二枚仁齋方柴胡三錢外熱多者用四錢黃芩二錢內熱多者加五分人參二錢脈弱人怯者用三錢半夏錢半嘔而不渴者用二錢甘草炙一錢嘔者用五分生薑三片嘔者用五片大棗二個嘔者去之心下滿亦去之水煎溫服一鍾待少時又服一鍾以接藥力和之近代名醫加減法若胸膈痞滿不寬或胸中痛或脅下痛去人參加枳桔各二錢名柴胡枳桔湯若胸中痞滿按之痛者去人參加瓜蔞仁三錢枳實桔梗各錢半黃連二錢名柴胡陷胸湯若脈弦虛發熱口渴不飲水者倍用人參加麥冬錢半五味子十五粒名參胡清熱飲又名清熱生脈湯若脈弦虛發熱或兩尺浮且無力此必先因房事或曾夢遺失精或病中不固者宜知母黃柏各二錢牡蠣粉一錢名滋陰清熱飲若脈弦虛發熱口乾或大便不實胃弱不食者加白朮茯苓白芍各錢半名參胡三白湯若發熱煩渴脈浮弦而數小便不利大便泄利者合四苓散用之名柴苓湯內熱者此協熱而利也加炒黃連錢半自芍藥錢半腹痛倍用若腹痛惡寒者去黃芩加炒白芍二錢桂枝一錢名柴胡建中湯若自汗惡風腹痛發熱者亦主之若心下痞滿發熱者加枳實二錢黃連錢半若血虛發熱至夜尤甚者加當歸川芎白芍各錢半生地一錢若口燥舌乾津液不足者去半夏加瓜蔞根錢半麥冬一錢名柴胡解毒湯若脈弦長少陽與陽明合病而熱者加葛根三錢白芍二錢名柴葛