body:
  text: 傷寒直指卷十一類證二太陰經腹滿脾為中央之土所以腹滿多屬太陰滿者邪入脾也常滿者為裡實當下之時減者為裡虛當溫之若表解內不消非大滿猶生寒熱亦未可下是邪未全入腑若大滿大實堅有燥矢雖得之日數少亦為可下謂邪已入腑也陽熱為邪腹滿則咽乾大小便閉潮熱譫語陰寒為邪腹滿則吐利食不下若曾經吐下後而腹滿者治法又各不同也太陽發汗後腹脹滿當溫厚朴生薑甘草半夏人參湯吐後腹脹滿當下少與調胃承氣湯下後心煩腹滿臥起不安梔子厚朴湯過經十餘日心下溫溫欲吐胸中痛大便反溏腹微滿鬱郁微煩吐先吐下傷胃與調胃承氣湯未經吐下勿與身黃如橘小便不利腹微滿茵陳蒿湯傷寒腹滿譫語脈浮緊此肝乘脾名曰縱發熱惡寒大渴腹滿自汗小便利病欲愈此肝乘肺名曰橫俱刺期門陽明中風咽燥口苦腹滿微喘發熱惡寒脈浮緊小柴胡加葛根若汗出不惡寒反惡熱身重柴葛解肌湯若脈弦浮大短氣腹都滿脅及心痛鼻乾不汗嗜臥身黃小便難噦小柴胡加茯苓脈但浮無餘證者麻黃湯腹滿時減為裡虛理中湯加木香厚朴腹滿不減為裡實大承氣湯陽明脈遲不惡寒身重短氣腹滿喘潮熱手足汗出大便已硬上方陽明下後懊憹煩尚有燥矢可攻之若腹微滿必初硬後溏不可攻陽明汗多若微發熱惡寒外未解也其熱不潮未可與大承氣若腹大滿不通小承氣微和之發汗不解腹滿痛急下之大承氣湯潮熱譫語腹滿便閉大柴胡湯大實大滿大承氣湯三陽合病腹滿身重難轉側譫語口中不仁面垢遺尿小柴胡湯若自汗白虎湯太陽誤下腹滿痛屬太陰桂枝芍藥湯痛甚桂枝大黃湯太陰腹滿痛吐食不下自利枳桔理中丸少陰六七日腹脹痛不大便急下之大承氣湯厥陰下利清穀不可汗汗出必腹脹滿四逆湯下利腹脹滿身疼痛先溫補四逆湯次攻表桂枝湯噦而腹滿小便難豬苓湯大便難小承氣湯飲食不節寒中陰經胸脅脹滿唇青厥冷脈沉細或生冷傷脾腹滿痛屬太陰也理中加香附青皮陳皮五積散為妙脾不勝水水與氣搏腸中漉漉有聲腹滿痛小半夏茯苓湯加桂陰陽不和腹脹滿桔梗半夏湯損庵腹脹有屬熱者有屬寒者雖為里證然亦有淺深之別淺者表已解內不消非大滿猶生寒熱是未全入腑深者大滿大實堅有燥矢可除下之是邪氣已入腑也腹滿固多可下又有虛實之殊經言腹滿不減者為實時滿時減者為虛要略曰腹滿時減減後如故虛寒從下上也當溫藥和之蓋虛氣留滯亦為之脹但比實者不至堅爾諸經皆有腹滿但脾位中央專主太陰若汗吐下後或腹脹者胃為津液之主發汗亡陽胃氣虛而不能敷布諸氣壅滯而脹滿是當溫散厚朴生薑甘草半夏人參湯可也吐後邪氣不去加之脹滿者胸中之邪下停入胃壅而為實當須調胃承氣以下之也若邪未入腑而妄下之表邪乘虛入郁胸中上下不得通利腹為之滿故當吐之梔子厚朴湯是也又結胸證從心下至少腹硬滿而痛與腹滿類然結胸按之手不可近腹滿舉按常痛手近不甚也又痞起心下至少腹亦與滿類然痞正留心下腹滿但在腹中也是以治法各不同爾海藏少陰證小便遺瀝大便遺矢六七日其人靜重如山目不視體如水腹脹滿與水則咽不與不求脈沉細而微疾按之有力須大承氣急下之可救腹痛邪氣入里與正氣相搏則為腹痛太陽無腹痛少陽有胸脅痛而無腹痛或腹痛者非寒在裡即邪氣已內侵也陽明腹滿急而痛為裡實宜下之三陰下利消穀腹痛者裡寒宜溫之邪氣傳太陰而腹痛證有二當分虛實腸鳴泄瀉而痛者虛也宜與建中湯便閉按之轉痛者實也宜下除之云岐曰手足之經皆會於腹傷寒邪在三陰內外不得變通故腹為痛寒邪交聚不得分散故腹為之痛傷寒陽脈澀陰脈弦當腹中急痛先與小建中湯不瘥小柴胡去黃芩加芍藥胸中有熱胃中有邪腹痛欲嘔吐黃連湯陽明不大便五六日繞臍痛煩躁有燥屎也大承氣湯大下後六七日不大便煩不解腹滿痛有宿食也上方發汗不解腹滿痛急下之上方少陽往來寒熱胸脅滿煩嘔或腹中痛小柴胡去黃芩加芍藥並病太陽轉屬陽明太陽證不罷者可小發汗若發汗不徹煩躁不知痛處乍在腹中乍在四肢短氣但坐葛根湯各半湯太陰腹滿吐食不下自利時腹痛理中湯不渴四逆湯太陽誤下腹滿時痛四逆散加附子二三日至四五日腹痛小便不利下利不止便膿血桃花湯下利清穀裡寒外熱厥逆脈微欲絕反不惡寒面赤或腹痛通脈四逆湯去蔥加芍藥二三日至四五日腹痛小便不利肢重自利此有水氣真武湯厥陰四五日腹痛若轉氣下趨少腹者欲下利也四逆湯乾薑附子湯士材按腹痛有虛有實有寒有熱有食有血當詳辨之可揉可按而軟者虛也不可揉按而硬者實也身無大熱口中不渴喜飲熱湯者寒也身熱口渴喜飲涼水者熱也噫氣惡食氣口脈實者食也痛有定處而不動移或動或小腹硬滿小便利大便黑者血也大抵脈大而有力者可涼可下脈沉而無力者宜溫宜補更以證參之百不失一矣如陽邪傳裡痛者其痛不常當以辛溫之劑和之陰邪在內而痛者痛無休時欲作利也當以熱劑溫之有燥矢宿食痛者則煩而不大便腹滿硬痛也下除之經曰諸痛為實此痛隨利減之法也海藏中脘痛太陰也理中定中類主之少腹痛厥陰也重則正陽丹回陽丹類輕則當歸四逆湯太陰傳少陰痛甚者當變下利不止夏令肌熱惡熱脈洪疾者黃芩芍藥湯秋令肌熱惡熱脈沉疾者桂枝芍藥湯又腹痛者芍藥甘草湯主之脈弦傷氣加黃芩脈洪傷金加芍藥脈緩傷水加桂枝脈澀傷血加當歸脈遲傷火加乾薑仁齋凡中脘痛者屬脾土脈沉遲內寒理中湯陽脈澀陰脈弦小建中湯少腹痛者屬厥陰當歸四逆加吳茱萸厥逆者四逆加吳茱萸大實腹滿而痛或繞臍刺痛不大便脈實者大承氣潮熱不大便從心下至少腹硬滿而痛手不可近大陷胸湯脈弦腹痛無寒無熱者芍藥甘草湯脈弦口苦發熱腹中痛小柴胡去人參加芍藥寒熱交作腹中痛加芍藥肉桂寒多者去芩倍桂少陰手足冷腹痛四逆散加附子湯入肉桂芍藥吳茱萸主之發熱脈弦而腹痛芍藥黃芩湯自利腹痛小便清白理中四逆看微甚輕者五積散無脈者通脈四逆湯使陰退而陽復腹痛吐利而煩躁者多有疹毒俗刺委中穴少陰經但欲寐嗜臥衛氣者晝則行陽夜則行陰行陽則寤行陰則寐故陽氣虛陰氣盛則目瞑多眠乃邪氣傳於陰而不在陽也昏昏然但閉目者陰主闔而靜也但欲寐是少陰本病然亦有熱者蓋熱氣內伏則亦多眠耳太陽病十日已去脈浮細嗜臥外已解也神將復而愈設胸滿脅痛小柴胡湯此條當是太陽少陽並病脈但浮麻黃湯陽明中鳳脈弦浮大短氣腹滿喘脅及心痛鼻乾不得汗嗜臥身黃小便難潮熱噦小柴胡湯麻黃湯三陽合病但欲眠睡目合則汗出膽有熱也小柴胡湯少陰但欲寐尺寸脈微細四逆湯欲吐不吐心煩但欲寐五六日自利而渴小便自四逆湯白通湯若小便黃赤而渴白頭翕湯風溫脈浮發汗後自汗身熱多眠睡息鼾語言難出葳蕤湯念莪嗜臥亦有陰陽之殊少陰脈微細但欲寐或蜷臥或向壁臥四肢逆冷身體沉重皆陰證也附子湯溫之如熱氣伏於裡喜睡者神氣皆倦令人多眠小柴胡湯誠為要劑咽痛太陽陽明各一證悉屬熱也少陰六證熱證四寒證二厥陰一證亦熱也咽痛皆熱證何少陰有二寒證耶一以汗多亡陽故用姜附以溫經復陽一以陰盛格陽故用通脈四逆以散陰通陽太陽下之脈緊者必咽痛半夏散及湯陽明頭眩不惡寒能食而咳必咽痛四逆散加桂枝少陰二三日咽痛甘草湯不瘥桔梗湯少陰咽中生瘡不能語言聲不出苦酒湯咽痛下利胸滿心煩豬膚湯少陰客寒咽痛半夏散脈陰陽俱緊反汗出亡陽必咽痛吐利桂枝加乾薑湯四逆湯下利清穀裡寒外熱厥逆脈微欲絕反不惡寒面赤或咽痛通脈四逆湯加桔梗去芍藥伏氣病伏寒少陰經脈微弱喉中痛似傷非喉痹也必下利始用半夏桂枝甘草湯次四逆散厥陰大下後寸脈沉遲手足厥逆下部脈不至咽喉不利唾膿血麻黃升麻湯若泄利不止難治先厥後熱下利必止反汗出咽中痛者喉為瘁陽毒咽痛升麻鱉甲湯陰毒咽痛上方去蜀椒雄黃兼善傷寒惟少陰篇中言咽痛咽傷何也蓋少陰之脈上貫肝膈入肺循喉嚨系舌本故云咽傷痛內經曰所生病咽腫上氣咽乾及痛此經所繫邪氣由行而致然也節庵咽痛不利或痛或癢不可納食皆毒氣上衝所致也太陽病下之脈緊咽痛者太陽之邪搏於少陰也少陰咽痛脈沉遲厥冷或吐利者不可汗下桔梗等湯甚者半夏散通脈四逆湯復庵亦有初得病頭痛發熱無陽毒少陰諸證而咽喉自痛者此因感冒後頓用厚衣被堆塞或過服生薑熱酒遂成上壅或先有熱壅後致風寒外襲寒包熱火於內者參蘇飲倍桔梗或清胃百解散敗毒散類健按咽與喉雖同出上竅其實有別夫咽者咽也乃胃脘上口司納受之道也喉者候也乃肺管上口司呼吸之道也是喉為輕清天象咽為重濁地象司出者為表司入者為里一屬太陰肺一屬陽明胃而其經脈遍於五臟六腑故為病則寒熱表里虛實之不同在傷寒外感時氣屬表屬熱屬實者十之七八雜證本原內傷屬裡屬寒屬虛者十之一二咽與喉皆能為痛為腫為癢為腐爛為乾燥而猝然患之居要害之處雖輕必當慎重總因內火為外寒所束或六淫之邪蘊畜或七情之氣鬱結概不可以辛溫香燥又不可以苦寒酸澀只宜辛涼以散邪甘寒以緩痛斯為良法外感發疹熱結多喉痹發斑熱盛多咽痛乃邪氣循經致病之驗疹透斑消咽喉之患亦退如果真陰下虧相火上熾則養陰抑火導龍入海之法庶乎可行然亦千百中僅有能施之而能受之者恐下未得益而上櫻其累耳對經去病之藥前咽痛條內備悉後變通方中詳載更制經效吹藥以療之無偏弊矣下利自利者不因攻下而自泄瀉俗所謂漏底是也有表邪傳裡裡虛挾熱而利者有不當攻下而下之遂利是皆挾熱也又三陽合病皆作自利然有發表攻裡和解之不同自利不渴者屬太陰臟寒故也下利慾飲水者有熱故也故大便溏小便自可之與夫發熱後重瀉色黃赤者熱也自利小便白色少陰形證悉具與惡寒脈微自利清穀皆寒也自利寒者固可溫若腸胃有積結與下焦客邪非溫劑所能止也必分利之或泄之可也又下利雖有表證不可發汗以下利為邪氣內攻津液走而胃虛也攻表汗出必脹滿矣三陰自利居多然身涼脈靜為順身熱脈大為逆及下利邪盛正虛邪壅正氣下脫多死也要略曰六腑氣絕於外手足寒五臟氣絕於內利下不禁噫疾成而後藥氣已脫矣雖神醫亦難之矣六經皆有下利之證表裡寒熱治各不同學者審之挾熱猶言助熱太陽表不解心下有水氣乾嘔發熱而咳或微利小青龍湯去麻黃加芫花桂枝證反下之利遂不止脈促者表未解也喘而汗出葛根黃芩黃連湯太陽外證未除數下之遂協熱利心下痞硬表裡不解桂枝人參湯太陽二三日不能臥心下必結脈微弱本有寒也反下之利不止必結胸未止四日復下之作協熱利也黃芩湯脈沉滑協熱利浮滑下血發熱汗出不解心下痞硬嘔吐下利大柴胡湯十三日過經譫語熱也當下之若小便利者大便當硬而反下利脈調和醫以丸藥下之也自利者脈當微厥今反和內實也調胃承氣湯過經十餘日溫溫欲吐胸中痛大便反溏腹微滿微煩先極吐下者上方下利心下痞硬痛乾嘔心煩復下之痞益甚胃氣虛逆也甘草瀉心湯汗解後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利生薑瀉心湯下利心下痞硬復下之利不止治以理中利益甚此利在下焦赤石脂禹餘糧湯下利頭痛心下痞硬脅痛乾嘔短氣汗出不惡寒表解里未和也十棗湯下後下利清穀不止身疼痛急當救里四逆湯後身疼痛清便自調急當救表桂枝湯臟結如結胸狀飲食如故時時下利寸脈浮關小細沉緊舌上白胎滑難治陽明潮熱大便溏小便自可胸脅滿小柴胡湯無表裡證發熱七八日脈雖浮數可下下後脈數不解利不止必便膿血黃芩湯柏皮湯脈浮而遲表熱裡寒下利清穀四逆湯十三日不解胸脅滿而嘔日晡潮熱微利先小柴胡湯解外後以柴胡加芒硝此條當屬少陽太陽陽明合病必自下利葛根湯太陽少陽合病自利黃芩湯陽明少陽合病必下利脈不負者順脈滑而數有宿食也大承氣湯太陽少陽並病反下之成結胸心下硬下利不止水漿不下心煩生薑瀉心湯或小陷胸湯自利不渴屬太陰臟有寒也四逆輩腹滿痛吐食不下自利益甚理中加青皮陳皮太陰自利脈弱當行大黃芍藥宜減之胃弱易動也脈浮緩手足溫當身黃若小便利不發黃至七八日雖暴煩下利必自止以脾家腐穢當去也平胃散加穿山甲少陰欲吐不吐心煩但欲寐五六日自利而渴小便色白四逆湯白通湯下利咽痛胸滿心煩豬膚湯下利六七日咳而嘔渴心煩不眠豬苓湯少陰四逆或泄利下重四逆散加薤白腹痛小便不利下利不止便膿血桃花湯自利清水色純青心下痛口乾燥大承氣急之下腹痛小便不利肢重痛自利或咳或嘔或小便利有水氣也真武湯去芍藥加乾薑下利清穀裡寒外熱厥逆脈微欲絕反不惡寒面赤或腹痛或乾噦或咽痛或利止脈不出通脈四逆湯下利脈微與白通湯利不止厥逆無膿乾嘔煩白通湯加豬膽汁服脈微續者生暴出者死少陰下利惡寒而躁手足溫者可治四逆湯少陰吐利手足厥冷煩躁欲死吳茱萸湯熱利下重白頭翁湯下利慾飲水有熱也上方下利譫語有燥屎也小承氣湯下利後虛煩按之心下濡梔子豉湯大下後寸脈沉遲厥冷下部脈不至內拘急四肢疼下利厥逆惡寒四逆湯大汗若大下利厥冷上方脈沉遲面少赤身微熱下利清穀者必鬱冒汗出而解戴陽下虛者必微厥上方下利清穀不可攻表汗出必脹滿上方下利脈大者虛強下之也脈浮革腸鳴當歸四逆湯下利清穀裡寒外熱汗出而厥通脈四逆湯傷寒本自寒下復吐下之寒格吐下食入即吐乾薑黃連黃芩人參湯念莪凡下利有寒熱之分最宜詳辨寒瀉者口不燥渴小便清白不澀完穀不化或如鶩溏或吐利腥臭其脈沉細或遲微無力或身雖熱手足逆冷惡寒蜷臥或洞下白色或深黃色或臍下多寒此皆寒也熱瀉者口必燥渴小便黃赤或澀或所下如垢膩之狀其脈多數或浮滑弦大或洪或糞色焦黃熱臭或出聲響得涼藥冷飲則止得熱藥與熱飲則增此皆為熱也原病式曰瀉白為寒青黃紅黑皆為熱也熱瀉亦有邪熱不殺爺者與寒瀉之完穀不化相似當兼他證及色脈辨之必脈數口燥渴小便赤黃也南陽協熱利者臍下必熱大便赤黃色及腸間津液垢膩謂之腸垢也宜黃芩湯白頭翁湯三黃熟艾湯薤白湯赤石脂湯寒毒入胃者臍下必寒腹脹滿大便黃白或青黑或清穀也宜四逆湯理中湯白通附子湯四逆加薤白散濕毒氣盛者下利腹痛大便如膿血或如爛肉汁也宜桃花湯地榆散黃連阿膠散東垣當汗而下之成協熱利者各隨三陽本經表證發之表解則下利自止若不愈方以利藥下之陶氏下利寒者理中湯四逆湯熱者小柴胡湯豬苓湯寒因直中陰經熱因風邪入胃木來傷土故暴下或攻或溫或利小便或固下焦隨證施治但不可發汗汗之邪氣內攻復泄其津液胃氣轉虛必成脹滿也下利譫語脈沉實有力急下之大承氣湯腸鳴腹痛脈沉遲無力急溫之小建中湯寒毒下利戴陽者下虛附子理中湯又陽病協熱下利者小柴胡合四苓散陰證下利清穀脈沉細伏絕者四逆加薑桂參朮升麻肉果仁齋凡下利煩熱而渴小便不利五苓散主之內熱心煩者加炒黃連腹中痛者炒芍藥陽明下利心煩不眠小便不利者豬苓湯下利脈滑數者有宿食也小承氣湯下利更煩心下滿按之軟梔子豉湯濕熱泄瀉小便不利口渴者五苓散加滑石木通車前類若腹痛亦加白芍凡胃虛內熱煩渴瀉利脈弱者七味人參白朮散若發熱者參胡三白湯去黃芩加炒黃連皆治熱利法也太陰下利不渴脈沉者理中湯寒甚逆冷脈沉細者加熟附子若腹滿小便不利者五苓散合理中湯凡傷水下利脈浮表未解者仲景以小青龍去麻黃加芫花蓋散表邪兼治水也若小便不利大便水瀉不止者五苓散水行則利自止凡下利不可發汗當先治利利止內實正氣得復邪氣自解汗出而愈蓋因利內虛誤汗之則內外皆虛變證危殆矣清穀者米穀不化也此胃虛內寒故水穀不變而下宜溫其里不可別治也陳氏熱在上中二焦醫者不知清理法誤用攻下者多成自利不止蓋中氣已陷而邪熱未清為難治也宜小柴胡去半夏入車前澤瀉和解分利之此證因誤下所傷或涼藥太過損中氣而成或傷於生冷或中氣素弱脾胃不足皆能為患而致斯疾吐利吐與利二者並至故曰吐利傷寒發熱汗出不解心下痞硬嘔吐下利大柴胡湯太陽少陽合病自利而嘔黃芩加半夏生薑湯太陽腹滿時痛吐食不下自利不渴理中湯加青皮陳皮少陰脈陰陽俱緊反汗出亡陽必咽痛吐利桂枝幹薑湯四逆湯下利六七日咳而嘔渴心煩不眠豬苓湯下利清穀裡寒外熱厥逆脈微反不惡寒面赤或乾嘔通脈四逆湯下利脈微與白通湯利不止厥逆無脈乾嘔煩白通加豬膽汁湯脈微續生暴出死吐利手足厥逆煩躁欲死吳茱萸湯腹痛小便不利四肢重疼痛自利或嘔真武湯吐利手足不逆冷反發熱不死脈不至灸少陰七壯下利脈微澀嘔而汗出當溫其上灸之傷寒本寒下復吐下之寒格食入口即吐乾薑黃連黃芩人參湯病嘔吐而利曰霍亂病發熱頭痛身疼惡寒吐利曰霍亂全善吐與利本屬大陰因在少陰者多故總附少陰耳厥陰經氣上衝氣自腹中時時逆沖而上因太陽病下之表邪乘虛傳裡里不受邪則氣逆上行仍在表也當復汗之厥陰客熱氣上衝心此熱在裡而氣上也若病後虛羸少氣氣逆欲吐者及動氣發汗而氣上衝者皆正虛而邪氣逆也太陽下之後氣上衝桂枝湯吐下後逆滿氣上衝胸頭眩脈沉緊發汗則動經身振振搖茯苓桂枝白朮甘草湯吐下後發汗虛煩脈甚微心下痞硬脅痛氣上衝咽喉眩冒經脈動惕久而痿上湯真武湯病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息瓜蒂散厥陰客熱氣上撞心消渴心疼飢不欲食食即吐蛔大柴胡湯動氣發汗氣上衝李根湯病後虛羸少氣氣逆上衝欲吐竹葉石膏湯燒針令汗氣從少腹上衝心為奔豚熱上衝胸少腹裡急頭重眼花為易病口噤不語氣上衝胸為剛痙健曰氣上衝之證惡候也氣屬無形然至逆而上衝其病也為痰為人為食為表邪鬱於氣分為裡實滯於臟腑為後天中氣虛為先天真氣弱邪正不相容虛實不並立則氣不和而皆能逆衝於上須作上中下三焦分察上中二部逆沖者多邪實下部逆而上衝者多正虛審其證勢經脈而治之庶幾無誤否則實實虛虛最易犯也吐蛔病人素有寒妄發其汗後身有熱又復汗之以致胃中虛冷餓不能食食即吐蛔又臟寒者蛔上入膈煩躁欲死須臾止得食即嘔時吐蛔出者為蛔厥厥陰病氣上衝心心疼飢不欲食吐蛔桂枝白朮茯苓湯理中安蛔散蛔厥者靜而時煩為寒厥蛔上入膈故煩須臾復止得食嘔又煩蛔聞食臭出當吐蛔烏梅丸病人有寒復發汗胃冷必吐蛔先理中丸次烏梅丸復庵胃中冷必吐蛔吐蛔人皆知為陰也然亦有陽證吐蛔者蓋胃中空虛既無穀氣故蛔上求食至咽而吐又看別證如何不專以胃冷為說曾記一人陽黃吐蛔又大發斑陽毒證口瘡咽痛吐蛔皆以冷劑取效是亦有胃熱者矣士材屬陽證者如脈洪大數實或渴或閉或斑黃也切不可執一凡吐蛔得甘則動得苦則安得酸則止得辛則伏也陶氏乍靜乍煩者蛔或上或下也蟲聞食臭必出故食即吐蛔五法蛔得熱則安得寒則泛故吐蛔知膈上有寒也如直中陰證必唇甲青脈沉遲無力大小便清澈若傳邪吐蛔者熱鬱於胃以致蛔不安而逆出也健曰陽明熱邪傷冒最易吐蛔然有虛實之別須察脈舌治之厥四逆者四肢不溫也厥者手足冷也夫邪在三陽手足熱必脈雖沉而帶數手足溫而唇焦舌槁口大渴為異傳至太陰手足溫至少陰則逆而不溫至厥陰則為之厥厥甚於逆冷也然自熱至溫四逆至厥者傳經之邪四逆散主之始得之便厥陰經受邪陽氣不足四逆湯主之太陽脈浮自汗小便數心煩微惡寒腳攣急誤與桂枝攻表得之便厥咽乾煩躁吐逆甘草乾薑湯脈微弱汗出惡風誤服大青龍湯厥逆筋惕肉瞤真武湯陽明反無汗小便利二三日嘔而咳手足厥必頭痛三陽合病腹滿身重口不仁面垢譫語遺尿下之額上汗手足逆冷若自汗出白虎湯少陰四逆或咳或悸或小便不利或腹痛泄利四逆湯少陰飲食入口即吐復不能吐始得之手足寒脈弦遲胸中實也當吐之若膈上有寒欲乾嘔不可吐也急溫之附子湯少陰身體痛骨節痛手足寒上方下利清穀裡寒外熱厥逆脈微欲絕反不惡寒面赤或腹痛或乾嘔或咽痛或利止脈不出通脈四逆湯下利脈微與白通湯利不止厥逆無脈乾嘔煩白通加豬膽汁湯服湯脈微續者生暴出者死吐利手足厥冷煩躁欲死吳茱萸湯傷寒脈滑而厥里有熱也白虎湯一二日至四五日厥者必前熱後厥厥微熱微四逆散厥深熱深承氣湯手足厥冷脈乍緊者邪結胸中心下滿而煩飢不能食瓜蒂散厥而悸宜先治水卻治其厥茯苓甘草湯大下後寸脈沉遲厥逆下部脈不至咽喉不利唾膿血泄利不止者難治麻黃升麻湯大汗出熱不去內拘急四肢疼下利厥逆惡寒四逆湯嘔而脈弱小便複利微熱見厥難治上方下利清穀面少赤身微熱必鬱冒汗出而解若其人下虛戴陽必微厥上方下利清穀裡寒外熱汗出而厥通脈四逆湯手足厥寒脈細欲絕當歸四逆湯若內有久寒當歸四逆力口吳茱萸生薑湯脈促手足厥逆可灸之少陰惡寒身蜷而利手足逆冷者不治少陰吐利煩躁四逆者死少陰但厥無汗強發之血從口鼻中出名曰下厥上竭死諸四逆厥者不可下發熱下利厥不止者死下利厥逆無脈灸之不溫脈不還反微喘者死活人冷厥者初得病便四肢逆冷脈沉微而不數足多攣臥時惡寒或自引衣蓋覆不飲水或下利清穀或清便自調或小便數外證多惺惺而靜脈雖沉實按之遲而弱知其為冷厥也四逆湯理中湯通脈四逆湯當歸四逆湯類隨證選用熱厥者初病必身熱頭痛外別有陽證數日後方發厥厥至半日卻身熱蓋熱氣深方能發厥是以在二三日後也其脈雖沉伏按之滑里有熱也其人或畏寒或飲水或楊手躑足煩躁不得眠大便閉小便赤外證多昏聵者知其熱厥也或頭上有汗雖厥冷手足心溫或手雖冷指甲微溫或雖冷復有時溫暖法當清之白虎湯承氣湯隨證用有下證悉具而見四逆者是失下氣血不通四肢便厥若不識誤為陰厥復進熱藥禍如反掌須承氣下之諸手足逆冷皆屬厥陰不可汗下為真寒者言也若火極似水而厥非下何以救乎節庵陰陽二厥治之一差死生立判夫陽厥者先自陽經氣分同感寒邪初頭疼發熱惡寒已後傳進三陰血分變出厥冷乍溫便實譫語煩渴揚手擲足反惡熱脈沉有力此為傳經熱證謂之陽厥乃熱極發厥陽極似陰外雖厥冷內則熱邪耳皆由便實失下使氣不通故手足乍冷乍溫也如火鍊金熱極金反化水水寒極而成冰反能載物厥微熱微厥深熱深若疑為陰厥妄投熱藥如抱薪救火矣夫陰厥者陰經直中真寒不從陽經傳也乃血分自受寒邪初無頭疼身熱便畏寒四肢厥冷直臂脛以上過乎肘膝引衣蜷臥不渴或腹痛或吐瀉或戰慄面如刀刮口吐涎沫脈沉遲無力輕則理中重則四逆溫之勿今誤也邪在表者手足熱邪在表裡之間者手足溫邪在三陰之極者手足逆冷先熱後厥者熱邪伏於內先厥後熱陰退而陽復也仁齋厥者逆也經言陰陽之氣不相順接四肢逆冷便為厥也又言諸四逆厥者不可下虛家亦然又曰陽厥應下不發汗汗之則口傷爛赤蓋厥亦有可下者在焉曰厥逆者手足冷而四肢溫也四逆者四肢手足俱冷也凡手足冷便當早察冷熱虛實而治毋致履霜堅冰而治則後時矣大抵傷寒至厥宜速為治稍若差遲禍不旋踵陽厥者必先因熱不解而後發厥經言厥深熱亦深厥微熱亦微此之謂也切其脈雖沉按之則滑四肢雖冷手足心或溫也時或煩躁發熱與之冷飲則咽也仲景以厥逆手足冷脈滑者里有熱也白虎湯主之河間謂肢體厥冷惟心胸熱大便閉者涼膈散養陰退陽不宜速下大便不閉者黃連解毒湯凡厥證可下者內有燥屎也必以手按病人臍腹或硬或滿或痛甚者手不可近或繞臍刺痛若失氣極臭者已有燥屎也承氣等下之或涼水下元明粉一二錢或雞子清加蜜和水一甌入芒硝二三錢最效蓋診陽厥以脈滑為主則無差也陰厥者必先因腎氣虛寒或復著外寒或誤服涼藥或誤下致積陰盛於下微陽衰於下遂發厥逆也其脈沉細而微按之全無者是也宜四逆湯急溫之凡寒熱而厥面色不澤冒昧兩手忽無脈或一手無脈此將有正汗出如亢陽欲雨必先陰晦之象用衣被覆暖手足急進熱薑湯或熱稀粥湯汗不至以人參附子麻黃細辛五味子甘草煎湯飲之或兼與桂枝麻黃各半湯活人與麻黃細辛甘草湯服之必作大汗而解若再脈不至汗不出者死陰證四肢厥手足指甲皆青脈沉細而急者四逆湯無脈者通脈四逆湯或真武湯類酌用戴氏陰陽之病皆能發厥故有陽厥陰厥皆病之深者也二厥惟陽厥易誤當問其初得病如何若初頭不痛身不熱此寒厥也是為陰中之陰宜四逆湯附子理中湯若初病頭疼身不熱此熱厥也是為陰中之陽宜白虎湯大承氣湯熱厥雖手足冷而指甲卻暖不若寒厥並指甲俱冷此辨陰陽要法也五法傷寒不省人事曰厥輕則不語重則昏沉或目直視手足厥逆不動脈數大者熱厥也凡病人不忌飲食者多有此證乃胃邪盛實也蘇後不宜即與飲食止可白湯此證重於前半夜後半夜少醒甚者至侵晨方稍清至晚又發少腹滿少腹滿者臍下滿也胸滿心下滿腹滿皆為邪氣而非物若小腹滿是有物而非氣小便利者畜血之形小便不利者溺澀之證治分兩途若素有痞在臍旁痛引少腹入陰筋臟結也死候矣太陽表不解心下有水氣乾嘔發熱而咳或小便不利少腹滿小青龍湯去麻黃加茯苓六七日表證仍在脈微而沉不結胸發狂少腹硬滿小便自利抵當湯身黃脈沉結少腹硬小便不利五苓散小便利如狂抵當湯傷寒有熱少腹滿小便反利抵當丸熱結膀胱其人如狂外解已但少腹急結桃仁承氣湯太陽重發汗復下不大便舌上燥渴日晡潮熱從心下至少腹硬滿痛不可近大陷胸湯厥陰病六七日煩少腹滿囊縮脈沉短者毒氣入臟大承氣攻之手足厥冷脈沉小腹滿按之痛冷結膀胱關元也四逆湯真武湯厥陰陰寒少腹滿痛茱萸四逆湯甚者灸關元陰陽易病小腹滿燒褌散損庵胸中滿心下滿者氣也腹滿者多屬燥屎也少腹滿者非溺即血也邪結下焦則津液不通氣血不行小便不利溺澀也小便利者畜血也俱是熱病若冷結膀胱少腹滿一證寒病也有手足厥冷為可辨節庵以手按少腹若痛而小水自利大便黑兼身黃譫妄燥渴脈沉實為畜血桃仁承氣湯下盡黑物則愈若按之少腹脹滿不硬痛小水不利則溺澀也五苓散加減利之亦不可大利恐耗津液也若按之小腹繞臍硬痛渴而小水短者大便實有燥屎也大承氣湯下之舌卷囊縮此厥陰危證扁鵲孫真人皆斷為死候仲景無治法今採南陽海藏所云有陰陽之殊至婦人乳頭縮者亦同此證厥陰病尺寸脈俱沉短必舌卷囊縮毒氣入腹也承氣湯速下之煩滿囊縮二便不通發熱引飲腹滿邪在裡也大承氣湯厥逆爪甲青色二便不通地道塞也正陽散或回陽丹仁齋囊縮有熱極而縮者有冷極而縮者熱極者可下大承氣湯冷極者急溫附子四逆加茱萸湯並灸關元氣海蔥熨等法復庵舌卷囊縮不獨陰中之陰有之陽明之熱陷入厥陰亦有之蓋陽明主宗筋宗筋為熱毒風所攻故弗榮而急引舌與睪丸故舌卷而囊縮當瀉陽明而用大承氣以救其陰長卿問囊縮何以為直中寒證曰囊陰囊也熱則舒寒則斂定理也直中傷寒陰盛陽衰不能溫其下故縮假令平人冬日腎囊必斂夏月腎囊必舒此陰陽寒暖之驗也其熱極宜下之證亦有囊縮者蓋足厥陰肝主一身之筋聚於陰器陽邪次第傳至厥陰六經已盡亢熱已極血耗不能榮筋筋枯則急致舌卷而囊縮矣然必口渴煩滿兼見方是承氣之證若兼厥逆清穀口不渴者宜溫里之寒證矣各兼證喘肺主氣形寒飲冷則傷肺故氣逆上行急迫而張口抬肩是名曰喘有水寒射肺而喘者有邪在表氣不利而喘者有邪在裡而喘者邪在表而喘心腹必濡而不堅設腹滿而喘又為可下之證經云喘而汗出宜利之汗不出而喘宜發之若汗出如油喘而不休直視譫語喘滿者皆不治太陽無汗而喘麻黃湯喘家中風自汗桂枝湯加厚朴杏仁表不解心下有水氣乾嘔發熱而咳或喘小青龍湯去麻黃加杏仁發汗後飲水多必喘水停心下腎氣乘心也小青龍湯加杏仁豬苓汗下後不可更行桂枝汗出而喘無大熱麻黃杏仁甘草石膏湯桂枝證反下之利遂不止脈促表未解也喘而汗出葛根黃芩黃連湯太陽下之微喘表未解也桂枝加厚朴杏仁湯陽明脈浮無汗而喘發汗則愈麻黃湯陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮緊小柴胡湯加葛根若喘而汗出不惡寒反惡熱身重柴胡解肌湯脈沉喘滿沉為在裡反發其汗津液越出大便為難表虛里實久則譫語大承氣湯脈遲汗出不惡寒身重短氣腹滿而喘有潮熱手足濈然汗出大便已硬上方小便不利大便乍難乍易微熱喘冒不臥有燥屎也上方太陽陽明合病喘而胸滿不可下麻黃湯陰證喘促四肢厥逆返陰丹病人小渴與水劇飲致停心下滿結者喘死甚眾五苓散或陷胸丸吐下後不大便潮熱劇者不識人循衣摸床微喘直視者死少陰病息高者死厥冷無脈灸之不還死微喘死直視譫語喘滿死脈浮而洪汗出如袖喘而不休命絕矣仁齋表有寒發喘宜麻黃湯汗之表有風發喘宜桂枝湯加厚朴杏仁陽明內實不大便腹滿短氣發潮熱而喘大柴胡加厚朴杏仁或小承氣湯陰證厥逆脈沉細而微氣促而喘無汗四逆湯加五味子杏仁虛人脈伏手足逆冷而喘五味子湯暴冒風寒脈浮無汗而喘蘇沉九寶湯熱甚有痰脈弦數而喘不可汗下小柴胡加知母貝母蔞仁胸滿者加枳殼桔梗心下滿者加枳實黃連舌燥飲水而喘加知母石膏念莪心火刑金肺受迫而喘呼故古人以諸喘為惡證至於陰喘則無根虛火泄越於上根本將脫更為危候華佗云盛則為喘指邪氣盛非肺氣盛也所謂肺病用桑白皮者非瀉肺也瀉肺中之邪火以救肺也故曰氣即是火其義瞭然尚文邪在表而喘者必心腹軟而不堅邪在裡而喘者必心腹脹滿水氣而喘者必心下怔忡陳氏喘出乎肺者肺六葉司氣之升降外合皮毛寒邪外傷皮毛則肺氣斂束不得伸越氣高而喘矣咳嗽咳者有聲無痰嗽則有聲有痰也肺主氣形寒飲冷則傷之便氣逆而不散沖激咽喉如癢如梗而咳嗽也有寒有熱有停飲有在表有在裡有在半表半裡病各不同治亦有異咳為肺病必發散為先然亦有不可發散者經曰咳而小便利不可發汗汗則四肢冷厥又曰咳而發汗踡而苦滿腹中復堅此為逆也又脈數者心火刑肺金則死傷寒咳逆上氣脈數者死謂其形損也太陽表不解心下有水氣乾嘔發熱而咳小青龍湯少陽往來寒熱胸脅滿默默不欲飲食心煩喜嘔或咳小柴胡去人參加五味乾薑湯少陰四逆而咳四苓散加五味子乾薑少陰腹痛小便不利四肢沉重疼痛自利或咳此有水氣真武湯加五味子細辛乾薑下利咳而嘔渴心煩不眠豬苓湯南陽大抵傷寒水氣皆因飲水過多古人治水氣而咳病在陽小青龍主之病在陰則真武湯主之水停心下則肺為之浮肺主於咳水氣乘之咳而且喘節庵水咳有三證不可不辨小青龍太陽之表水也十棗湯太陽之裡水也真武湯陰證之水氣也蓋水與表寒相合而咳小青龍汗之水與裡寒相合而咳真武湯溫之里邪合水動肺而咳十棗湯所以下之念莪表寒喘嗽者三拗麻黃裡熱咳嗽者參蘇桑杏停飲而咳青龍真武少陽咳嗽小柴胡加乾薑五味子胸中痞滿枳殼蔞杏陰證脈沉細四肢逆冷咳嗽四逆湯加五味子乾薑細辛大抵傷寒咳嗽非比雜證細閱仲景治例不分陰證陽證必用五味子乾薑蓋乾薑辛溫散肺家逆氣而溫肺五味子甘酸收肺家浮氣而止嗽故也復庵咳嗽各有陰陽太陽經喘嗽俱有少陽有嗽無喘有喘則非少陽也陽明有喘無嗽有嗽非正陽明也陰證喘惟少陰有之諸陰喘促最為危證也健按乾薑五味辛熱酸收凡病咳嗽最不宜此二者而仲景方多用之蓋因新寒入肺或暫用耳若寒變為熱傳邪迫肺而咳者豈宜用乎用之勢必增劇而咳終不止動傷本原致成怯弱亦由是來已於證條下詳辨之噫氣說文飽食息也俗作噯於蓋切因胃弱不和虛氣上逆所致也汗解後心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利生薑瀉心湯汗吐下解後心下痞硬但噫氣不下利者旋覆代赭湯虛而噫氣脈弱神困四君子加枳殼桔梗生薑云岐傷寒噫氣者何氣使然曰胸中氣不交故也少陰經至胸中交於厥陰水火相摶而有聲故噫氣也宜如意加枳實湯及加人參藿香杏仁噎音乙由水寒相持而致或妄下後復與水胸中虛氣逆而作也輕則為噎重即為噦然噎但胸喉間氣噎塞不得下通而無聲若噦則吃吃有聲不止矣太陽表不解心下有水氣乾嘔發熱而咳或噎小青龍湯去麻黃加附子趺陽脈浮則浮虛相傳胃氣虛竭故令氣噎上方寸口脈浮大反下之寒氣相傳腸鳴醫反飲以冷水其人即噎豆蔻湯健按噎即噎塞見於傷寒乃痰凝氣滯於胸膈胃脘必其人年衰素弱氣血枯槁而致須用潤劑和血快氣化痰為治如歸身紅花桔梗炙草白蔻蔞仁蘇子花粉貝母海藻昆布橘紅半夏黃芩硼砂旋覆牛乳薤白童便薑汁之屬甘以緩痛咸能潤下養陰抑火俾痰開而升降之氣順噎可已矣噦即呃逆也東垣以為於嘔者非也多因胃寒亦有胃熱不可不辨陰證者陰氣內伏已甚腎水專權肝氣不生丙火已病丁火又消所以遊行相火寒邪迫而萃集於胃亦欲盡也故令人發熱大渴引飲欲去蓋覆病人煩躁自覺熱甚他人捫其肌則冷此無根失守之火非實熱也乃水極似火若不識此而誤用寒涼下咽則敗矣故宜丁香乾薑之類熱藥溫胃其火自下或用活人羌活附子散或加味附子湯急溫其下真陽一回火降而呃逆自止陽明脈弦浮大短氣腹滿脅及心痛鼻乾發黃嗜臥小便難潮熱時時噦小柴胡湯凡陽證呃逆者俱宜小柴胡傷寒大吐大下之極虛復極汗出外氣怫鬱復與水發其汗胃中寒因得噦橘皮乾薑湯羌活附子散退陰散服藥不差者灸之愈婦人屈乳頭盡處骨間是穴男子及乳小者一指為率男左女右艾炷小豆許陷中動脈處灸之噦而腹滿視其前後何部不利利之即愈前部豬苓湯後部調胃承氣湯汗下後虛極得噦胃中寒理中湯加丁香半夏噦而煩躁自覺熱甚他人捫其肌則冷附子理中湯冷服兼灸期門中脘氣海關元胃虛熱而噦橘皮竹茹湯因痰而噦半夏生薑湯胃實便閉失下而噦承氣湯胃雖熱便未硬瀉心湯有瘀血而噦難治溫病熱未除被暴寒入胃變噦梓皮飲子飲水暴冷作噦茅根葛根湯溫病胃冷而噦茅根橘皮湯明理噦者胃中寒冷也妄下後胃氣虛逆多成噦然又有熱氣壅鬱不得通而成者輕者和解之重者攻下之經曰有潮熱時時噦與小柴胡湯和解法也噦而腹滿視其前後何部不利利之愈攻下證也活人呃逆多有先熱吃生冷涼藥相激而成蓋陰陽二氣摶也服丁香柿蒂後再以小柴胡解餘熱無不瘥者潔古呃逆者火熱奔急上行而肺陰不納也失下胃熱便閉者宜承氣下之便軟者瀉心湯主之海藏少陰呃逆者失下也陰消將盡陽欲上行陰不能內然陰既盡陽亦將盡也吸入肝與腎陽上行陰不內故為陽極脈微將盡不宜下也宜瀉心湯養陰退陽而已否則涼膈散去硝黃入桔梗清肺飲亦可蓋脈左浮右沉非表也里極則反出於表邪入已深矣內熱當沉反浮陽極復之表也觀子字學𩚚與𩚬通氣上逆作聲之名也俗曰呃忒氣自胸腹間直衝而上兀兀然遽止連續有聲不達也屬寒者多亦有熱氣壅鬱上下不通而作者輕者和解之失下者通利之寒者溫散之古多謂之咳逆及為呃逆諸書訛說不一不可不辨仁齋噦而腹滿大便不利人實者小承氣湯人弱胃虛蜜膽導小便不利五苓散加木香或生薑七片蔥頭十四枚豆豉七十粒搗成餅入麝少許哄熱貼臍上以帛束定或入皂角末用火斗熨之令暖氣入腹則小便自通健按內經曰病深者其聲噦並非呃逆之謂夫呃有連續間斷之殊以分寒熱虛實蓋因痰凝氣結阻滯呼吸而相摶成聲循理治之猶有可救若噦者乃丹田原氣不歸病邪或寒或熱壅塞三焦腸胃正氣既虛不能化邪欲納不入欲吐不出邪正迸迫而作干惡似嘔之極聲其音為噦噦居月切此危篤之候九死一生者矣諸傢俱作呃逆論之非也夫呃之聲亦如其音呃于格切以此辨之顧名思義是屬兩途矣仲景書有噦無呃或古之通稱爾短氣氣急而短促不能相續似喘而不抬肩似呻吟而無痛苦或表或里或虛或實或陽或陰或飲多而水停心下各宜詳審頭痛心下痞硬滿脅下痛乾嘔短氣汗出不惡寒表解里未和十棗湯下後膈內痛心中懊憹心下硬短氣躁煩便為結胸大陷胸湯及陷胸丸陽明中風脈弦浮大短氣腹滿脅及心痛鼻乾不得汗嗜臥發黃小便難潮熱噦小柴胡湯脈但浮無餘證麻黃湯陽明脈遲汗出多不惡寒身重短氣腹滿喘潮熱大承氣湯表未解短氣手足濈然汗出或潮熱上方短氣潮熱腹滿而喘此外欲解而里欲實大柴胡湯太陽陽明並病太陽證不罷面怫鬱正赤當汗不汗其人躁煩短氣葛根湯念莪按汗吐下後脈微氣不能續則與異功散陰證逆冷脈沉難以布息則與四逆湯加人參飲多水停心下短氣則茯苓甘草湯及小半夏湯皆補仲景之未備也節庵千金云短氣少氣不足以息也要略曰病人無寒熱短氣不足以息者實也大抵心腹脹滿短氣者邪在裡為實心腹濡濡不短氣者邪在表為虛及停飲心下令短氣也結胸痞支結經曰病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞以下之早故也所謂陰陽者指表裡而言在表當汗而反下之因作結胸在裡尚未入腑而輒下之因作痞也結胸有大小寒熱水血痰食八者之異而痞則所傳猶淺但一氣凝聚耳若未經下者不名結胸或痰或食或熱隨證施治節庵曰表證誤下正氣內虛陽邪陷入心胸之間輕則為懊憹重則為結胸心下滿硬而痛者為實為結胸滿硬而不痛者為虛為痞不滿不硬但煩悶者為支結保命集云脾不能行氣於四肢氣結而不散則為痞大抵諸痞皆熱也故攻痞之藥皆寒劑其一加附子者以辛熱佐寒涼欲令開發痞之怫鬱結滯非攻寒也不按自痛為大結胸大陷胸湯太陽病發汗若下不大便舌上燥渴小潮熱從心下至少腹硬滿痛不可近表未解下之膈內拒痛短氣躁煩懊憹陽氣內陷心下石硬脈沉緊並大結胸按之乃痛為小結胸小陷胸湯正在心下按之乃痛脈浮滑煩渴便閉為熱結胸大陷胸加黃連不熱渴小便清白為寒結胸枳實理中湯怔忡但頭微汗出無大熱揉之有聲為水結胸小半夏茯苓湯胸滿痛漱水不咽喜忘如狂大便黑小便利為血結胸犀角地黃湯婦人傷寒胸脅痛不可近亦為血結胸脈滑喘嗽為痰結胸黃芩半夏生薑湯加枳實氣口脈大為食結胸小陷胸加枳實厚朴結胸加斑黃狂呃者最重脈沉小者死結胸證具煩躁者亦死傷寒中風誤下之下利乾嘔心煩痞硬甘草瀉心湯本柴胡證誤下之成痞但滿而不痛無別證半夏瀉心湯發汗後胃不和而痞乾噫食臭下利生薑盡心湯痞而虛熱甚關上脈浮大黃黃連盡心湯陽虛惡寒汗出而痞滿附子盡心湯吐汗下後心下痞但噫氣不下利者旋覆代赭湯心下痞下利服瀉心湯利不止與理中湯利益甚此利在下焦赤石脂禹餘糧湯惡寒微發熱支節煩疼外證未去微嘔心下滿者為支結柴胡桂枝湯節庵結胸之證今人不分曾下與未下但見心內滿悶便呼為結胸便與枳桔湯蓋朱春議之說耳有頻與之反成結胸者殊不知結胸乃因下早而成未經下者如結胸也表邪傳至胸中未入於腑證雖滿悶尚屬在表為少陽部分宜小柴胡加枳桔以治之如未效則以本方對小陷胸湯一服豁然若下早而成者方可用陷胸丸分淺深從緩治之不宜太峻上焦乃清高之分若過下之則傷原氣矣嘗讀仲景論云病發於陽而反下之乃成結胸云云成氏誤注發熱惡寒者發於陽也無熱惡寒者發於陰也夫無熱惡寒直中陰經之真寒證也若誤下之不死則危矣豈可瀉心湯寒熱相參之藥治之乎豈反輕如結胸僅作痞而已乎詳此當是營衛陰陽也風傷陽陽邪傷衛頭疼發熱微汗當用桂枝湯止汗散邪醫者不達而反下之胃氣重傷胸中結硬故用陷胸湯峻利之藥以下之寒傷陰陰邪傷營當服麻黃湯發表醫反誤下之而成痞滿故宜瀉心湯以理痞也又云脈來沉實為結胸急用大陷胸湯加枳桔下之活人誤下初未成結胸急與理中湯自解即不成結胸蓋理中治中焦故也此亦古人說不到後人因消息得之若大民轉損有厥證者兼與四逆湯便安胃中雖和傷寒未退者宜候日數足可下即以承氣再下之蓋前此下之未是故也崔行功云傷寒結胸欲絕心腹高起手不可近用大陷胸湯不瘥者蓋下後虛逆氣不理而毒復上攻氣相拎結當用枳實理中丸先理其氣次療諸疾應手而愈古今用之如神損庵病在表當汗解反下之裡氣為下所損表之熱邪乘虛入里結於心下為結胸里之陰分亦受熱邪為發於陰下證未具而輒下之裡熱雖除表邪復至雖不結胸必成痞也小陷胸輕於大陷胸而重於痞由誤有大小非以痞為寒也經言但結胸無大熱實為寒實結胸亦非寒也但微熱耳臟結者熱結於臟故病深難治若用涼劑亦有生者其陽結者熱結於腑則微而淺也水結胸者留飲不散或頭汗脈沉潛或附骨者積飲也又有不因誤下而成結胸痞者此又失下或失汗而成也經謂熱已入里久不攻之亦至結實者三死一生是失下也汗後熱傳入心而痞是失汗也結胸固當下脈浮大者下之則死是猶帶表邪未全結實也結胸證全具加煩躁者亦不治夫藥逐邪必待胃氣以輸轉藥力若邪氣勝胃氣敗安可為乎復庵寒實結胸雖痛而無煩躁等證此因下後虛逆寒氣結滯宜理中湯加枳實茯苓嗣真痞證有傳經之邪有內陷之邪亦當分別一者病發於陰身無熱而反下之緊反入里而作痞其脈關上沉為陰邪內陷也先宜桔梗枳殼湯次半夏瀉心諸湯隨證用之渴而躁煩小便不利者五苓散一者身有熱不因下後而傳邪入里亦作痞其脈關上浮為陽邪隨經入里須先解表不惡寒者三黃瀉心湯又有痞而汗出惡寒者以陽邪與表之正氣入里表虛而汗出惡寒故加附子固表也既結胸有寒實熱實之殊則痞證亦有陰陽之邪不為異也外有痞而硬者或桂枝人參湯溫之或用大柴胡湯十棗湯下之亦自一律也臟結臟結臟氣閉結不得流通也外證如結胸狀但飲食如故時時下利舌上白胎為異耳夫邪結於腑者微而淺結於臟者病已深故難治然猶為熱結若冷結與無陽反靜者不更危乎如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊曰臟結舌上白胎滑者難治脅下有痞氣連在臍旁痛引少腹陰筋此冷臟結必死臟結無陽證不往來寒熱其人反靜舌上胎滑不可攻也茱萸四逆湯兼灸關元節庵臟結者臟氣閉結不得流布也一息不運則機緘窮一毫不續則穹壤判臟其可結乎宜灸關元仍以小柴胡加生薑與之心下滿硬謂正當心下高起而滿硬也不經下後者有吐下之殊看邪之高下而泄之下後者有結胸痞之別審邪之虛實而治之太陽病外證未除數下之遂協熱利心下痞硬表裡不解桂枝人參湯五六日頭汗出微惡寒手足冷心下滿不欲食便硬脈細小柴胡湯傷寒發熱汗出不解心下痞硬嘔吐下利大柴胡湯過經十餘日嘔不止心下急鬱郁微煩上方服桂枝或下後仍頭項強痛發熱無汗心下滿微痛小便不利桂枝去桂加茯苓白朮湯太陽下利嘔逆頭痛汗出不惡寒心下痞硬滿脅痛乾嘔短氣表解里未和也十棗湯吐下後心下逆滿氣上衝胸頭眩脈沉緊發汗則動經身振振搖茯苓桂枝白朮甘草湯柴胡證以他藥下之心下滿而硬痛者結胸大陷胸湯但滿而不痛者痞半夏瀉心湯二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食少與小承氣微利之陽明心下硬滿者不可攻攻之利遂不止者死利止者愈或用瀉心湯此條為邪氣猶淺未全入腑蓋食猶在胃故不可下次條則宿矢已在胃腑故必下除之脈浮大心下反硬有熱屬臟者有燥矢可攻屬腑者小便不利忌再走津液太陽少陽並病或結胸心下痞硬下利不止煩生薑瀉心湯小陷胸湯太陽少陽並病頭項強痛或眩冒時如結胸心下痞硬刺大椎第一間肝俞肺俞厥陰手足厥冷脈乍緊邪結在胸中心下滿而煩飢不能食瓜蒂散仁齋凡心下滿者正在胃之上心之下也此自滿耳非下之所致昔下早心下滿者為痞氣心下滿以手按之則散而軟者氣虛也不發熱木香和中湯發熱者小柴胡加枳實姜炒黃連去黃芩減人參之半少陽脈弦口苦發熱心下滿者同按之汨汨有聲者是停飲按之硬痛者宿食也不按而其人喜忘者畜血也各詳本條以治之心痛健曰心君端拱無為而不受邪凡諸心痛皆痰瘀氣結上潮於心而治卻不在心若真心痛此屬危候不過晬時心可痛乎哉茲心痛乃傷寒家心下痛耳五六日大下後身熱不去心中結痛梔子豉湯小結胸正在心下按之則痛脈浮滑小陷胸湯陽明中風脈弦浮大短氣腹滿脅下及心痛鼻乾嗜臥身黃小便難潮熱噦小柴胡湯少陰自利清水色純青口乾燥心下必痛大承氣急下之厥陰消渴氣上撞心心中疼熱飢不欲食吐蛔桂枝茯苓白朮湯理中安蛔散飲水過多腹脹氣喘心下痛不可忍灸中脘氣海懊憹心中鬱郁不解憒憒無奈比之煩躁殆又甚焉因誤下表邪乘虛內陷結伏於心胸間故懊憹也懊憹之甚即為結胸邪在心胸即宜吐若熱結胃腑即宜下不可拘也發汗吐下後虛煩不眠懊憹梔子豉湯太陽脈浮動數頭痛盜汗惡寒表未解反下之短氣躁煩膈內拒痛心下因硬心中懊憹則為結胸大陷胸湯陽明中風咽燥口苦腹滿喘發熱汗出惡熱身重反下之客氣動膈心中懊憹舌上胎梔子豉湯陽明下後外有熱手足溫不結胸懊憹頭汗出上方陽明下之懊憹而煩有躁屎大承氣湯陽明無汗小便不利心中懊憹必發黃茵陳蒿湯動氣臟氣不調肌膚間築築跳動病人先有痞積而後感寒醫者不知妄施汗下致動其氣隨臟所主而見於臍之上下左右獨不言當臍者脾為中州以行四臟之津液左右上下且不宜汗下何況中州其敢輕動乎動氣在右誤汗則衄煩渴飲即吐水先服五苓散次服竹葉湯誤下則津竭咽燥鼻乾眩悸人參白虎湯加川芎動氣在左誤汗則頭眩汗不止筋惕肉瞤先服防風白朮牡蠣湯汗止服小建中湯誤下則腹內拘急食不下雖身熱而蜷臥先服甘草乾薑湯後服小建中動氣在上誤汗則氣上衝心李根湯誤下則掌握熱煩身上浮冷熱汗自泄欲得水自灌竹葉湯動氣在下誤汗則無汗心大煩骨節痛目暈惡寒食即吐先服大橘皮湯吐止服小建中湯誤下則腹滿頭眩食則下清穀心下痞甘草腎心湯節庵動氣通用理中去朮加桂及柴胡桂枝湯良二方當看有熱無熱奔豚氣從少腹上衝心而痛如豕突之狀曰奔豚也凡作奔豚其氣在臍下築築而動一由誤汗一由燒針皆壞病也節庵曰真氣內虛水結不散與之相摶而發以其從氣走動衝突如豚故曰其證云太陽發汗後臍下悸者欲作奔豚茯苓桂枝甘草大棗湯或理中湯去朮加桂痛甚者更加吳萸燒針令汗針處被寒核起而赤必發奔豚氣從少腹上衝心灸核上各一壯與桂枝加桂湯痛甚手足厥逆者當歸四逆湯加吳茱萸肉桂士材奔豚為少陰之氣故非肉桂不能泄其邪也雜病氣上衝胸腹痛往來寒熱曰奔豚者奔豚湯除中臟寒應不能食反能食者是也二證俱屬厥陰脈遲厥冷下利當不食若反能食者名除中不可治其證有二一由誤服黃芩湯涼藥而致者必死一則熱少厥多胃氣在可治此不因藥故也健曰就其脈遲厥冷下利而除中者應與姜附理中倍人參以扶脾胃此因胃虛引谷自救脾虛運化不及故也速於溫補雖由寒誤或可挽也鬱冒即昏迷也郁為郁遏而氣不舒冒為昏冒而神不清經云諸虛乘寒則鬱冒然亦有宜下者冒從曰加目曰者小兒變鼻頭衣也曰冒者若以物蒙其目也吐下發汗虛煩脈甚微心下痞硬脅痛氣上衝咽喉眩目動惕真武湯桂枝茯苓白朮甘草湯下後復汗表裡俱虛因致冒冒家汗出則表和而愈若里未和然後復下之小承氣湯陽明小便不利大便乍難乍易微熱喘冒不臥有燥屎也大承氣湯太陽少陽並病頭項強痛或眩冒時如結胸心下痞硬刺大椎第一間肝俞肺俞厥陰下利清穀脈沉遲面少赤身微熱必鬱冒汗出而解其人戴陽下虛必微厥四逆湯少陰下利止而頭眩時時自冒者死少陰脈不至精血奔氣上入胸膈血結心下熱歸陰股令身不仁為屍厥刺期門及甘草乾姜等湯宇泰諸虛乘寒而厥鬱冒不仁附子湯倍人參川芎天麻乾薑太陽先下後汗表裡俱虛因冒自汗出愈表和也若不得汗不解者人參三白湯加川芎天麻下虛脈微者加附子以溫腎固本要略曰新產婦人有三病一鬱冒亡血復汗寒多也又曰產婦鬱冒脈微弱不能食大便堅者由血虛而厥厥而必冒冒家欲解必大汗出則鬱冒為虛乘寒明矣海藏傷寒傳至五六日間漸變神昏不語誤與承氣下之死也病洋傳經內損庵余云衢復患熱病肢體甚熱揚手擲足如躁擾狀昏冒不知人時發一二語不可了而非譫脈微細如欲絕有謂為陰證當溫者有謂當下者予謂陽病見陰脈者死法不治然素稟如此又值酷暑外爍酒炙內炎宜狂熱如焚脈洪數有力而此候如是豈熱氣怫鬱不得伸耶且不大便六七日矣姑以大柴胡下之或欲用大承氣予不可服藥已大便即行脈已出手足溫繼以黃連解毒湯數服而平後讀河間直格曰畜熱內甚脈當數疾以極熱畜甚而脈道不利反致沉細欲絕俗未明此致謂為寒極陰毒者或始得之陽熱暴甚而便有此證或兩感熱甚者通宜解毒加大承氣下之下後熱稍退而未愈者黃連解毒湯調之或涼膈散除之或失下熱極以致身冷脈微而昏冒將死若急下之則殘陰暴絕而死不下亦死惟涼膈或黃連解毒養陰退陽積熱漸消而心胸漸暖脈漸生予於是恍然曰云衢所患政失下熱極而致身冷脈微昏冒欲絕也下與不下大下與微下死生在呼吸之間可不慎哉又云脈漸生後至陽脈復有力者以三一承氣微下之或解毒湯加承氣尤良煩躁煩為煩擾心病也煩字從火躁為憤躁腎病也故躁字從足有邪氣在表在裡之分有火劫陽虛陰盛之異太陽中風脈浮緊發熱惡寒身痛無汗煩躁大青龍湯發汗若下病仍不解煩躁茯苓四逆湯下後復汗晝日煩躁不眠夜安靜不嘔不渴無表證脈沉微乾薑附子湯發汗後大汗出胃中干煩躁不得眠欲飲水少少予之若脈浮小便不利而渴五苓散火逆下之因燒針煩躁桂枝甘草龍骨牡蠣湯下後膈內痛心下硬懊憹短氣躁煩為結胸大陷胸湯陽明二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食少與小承氣湯微和之五六日不大便繞臍痛煩躁發作有時有燥屎也大承氣二陽並病太陽證不罷面赤怫鬱當汗不汗躁煩不知痛處短氣葛根湯麻黃湯六七日無大熱躁煩陽去入陰也少陰吐利手足厥冷煩躁欲死吳茱萸湯厥陰熱少厥微指頭寒不欲食煩躁數日小便利色白欲食此熱除也為欲愈若厥而嘔胸脅煩滿後必便血黃芩芍藥湯抵當湯結胸證具煩躁者死少陰四逆惡寒身蜷脈不至不煩而躁死少陰吐利躁煩四逆死脈微細沉但欲臥五六日自利復煩躁不得臥死厥陰脈微厥冷煩躁灸之厥不還者死七八日脈微而厥膚冷而躁無暫安時為臟厥死宇泰煩躁者皆熱也拆而言之煩陽也為熱之輕躁陰也為熱之甚先煩漸至躁者為煩躁先躁迤復煩者為躁煩有不煩而躁者陰盛格陽也雖大躁欲坐泥水中但飲水不得入口是也此氣將脫而爭譬之燈將滅而暴明也霹靂散火焰散丹砂丸類蓋內煩曰煩心中煩郁也外熱曰躁氣外熱燥也內熱者有根之火故但煩不躁及先煩後躁者皆可治外熱為無根之火故但躁不須及先躁後煩者皆不可治也活人煩躁太陽與少陰為多陽明因不大便中有燥矢故也大抵陰氣少陽氣勝則熱而煩故太陽傷風多煩而躁也若陽虛陰盛亦發煩躁者陽氣弱為陰所乘而燥故少陰亦煩躁也又有汗下之後而煩躁者陰陽俱虛邪氣與正氣內爭也若病解後尚微煩者新瘥不勝穀氣損谷則愈或小柴胡以和營衛通津液或調胃湯微下燥矢也節庵心熱則煩陽實陰虛也腎熱則躁陰實陽虛也太陽不得汗煩躁者邪在表也羌活沖和湯不得汗火劫取汗火熱入胃中令煩躁者小柴胡加牡蠣海藏煩躁心下硬若未曾下無太陽柴胡證者小承氣微和之若曾下心下硬痛短氣躁煩者大陷胸也復庵煩躁陰陽經俱有之太陽已得汗而煩五苓散陽明有燥矢而煩直下之少陽亦有煩宜和之陰煩少陰為多由陽邪傳入陰經陰得陽而煩也自利而謁煩不得眠者辰砂五苓散若非陽傳陰經則為陽虛而陰乘之亦煩也如吐利手足厥冷而煩及陰盛發躁欲坐井中是也宜吳茱萸湯甚者四逆湯加蔥白二莖煩煩者熱也心中熱而煩擾也亦有屬寒者或在表或在裡或半表半裡或因陰火內動或因心虛或因氣虛太陽中風服桂枝湯反煩不解先刺風池風府後與桂枝即愈傷寒已解復煩脈浮數邪未盡也再與桂枝湯脈浮自汗小便數心煩微惡寒腳攣急誤予桂枝必厥汗吐下後心煩不眠懊憹梔子豉湯下後心煩腹滿梔子厚朴湯發汗若下而煩熱胸中窒梔子豉湯丸藥大下之身熱不去微煩梔子乾薑湯吐下後表裡俱熱惡風煩渴白虎加人參湯汗後脈浮數煩渴五苓散中風發熱六七日不解而煩有表裡證欲飲水水入則吐上方與瀉心湯痞不解渴而口躁煩小便不利上方過經十餘日心下溫溫欲吐胸中痛大便反溏腹微滿鬱郁微煩先曾極吐下者調胃承氣湯不吐下者勿與過經十餘日嘔不止心下急鬱郁微煩大柴胡湯吐下汗後微煩小便數大便硬小承氣湯下後下利心下痞硬滿乾嘔心煩不得安復下之痞益甚甘草瀉心湯吐下後發汗虛煩脈甚微心下痞硬脅痛氣衝咽喉眩冒動惕茯苓桂枝白朮甘草湯真武湯二三日悸而煩小建中湯陽明不吐不下心煩調胃承氣湯下後懊憹而煩尚有燥屎大承氣湯若腹微滿必初硬後溏忌攻大下後不大便煩不解腹滿痛有燥屎上方陽明自汗又重發汗病已差尚微煩不了了以亡津液大便必硬若小便少大便不久出不可攻之少陽中風耳聾目赤胸中滿而煩小柴胡湯傷寒中風往來寒熱胸脅滿心煩喜嘔上方或胸中煩而不嘔小柴胡去半夏人參加栝蔞實少陽誤汗譫語胃不和煩而悸大柴胡湯小承氣湯下之胸滿煩驚小便不利譫語身重柴胡加龍骨牡蠣湯已汗復下胸脅微結小便不利渴而不嘔但頭汗寒熱心煩柴胡桂枝幹薑湯少陰但欲寐心煩自利而渴小便白四逆湯白通湯二三日以上心煩不得臥黃連阿膠湯下利咽痛胸滿心煩豬膚湯下利咳而嘔渴心煩不眠豬苓湯服白通後利不止厥逆無脈乾嘔而煩白通湯加豬膽汁厥陰手足厥冷脈乍緊邪結胸中心下滿而煩瓜蒂散下利後虛煩按之心下濡梔子豉湯陰虛火動而煩生脈散氣虛自汗脈虛而煩補中益氣湯損庵煩者擾也謂煩擾也與發熱若同而異也經有煩有微煩有煩熱有復煩反煩煩滿痛煩渴胸中煩心中煩內煩虛煩大煩欲解皆以煩為熱也然陰寒而煩者亦不少也蓋在表而煩者則有惡風寒體強痛之證在裡而煩者則有潮熱譫語不大便腹滿小便赤澀之證在半表裡而煩者則有往來寒熱胸中痛之證其邪在胸膈以上而煩者則又有胸滿懊憹可吐之證其陰寒而煩者則有惡寒而蜷下利厥逆脈微與吐蛔之證夫煩欲解者其脈必和若脈不應者難治足冷脈沉細而煩者陰證之類也急用附子人參熱劑補之若內傷勞役陰虛火動而煩者其人身倦無為自汗尺脈浮虛也宜補中益氣加炒黃連生地麥冬黃柏知母之類若不得眠而煩者兼服硃砂安神丸納其浮游之火而安神明此治之大略也虛煩心中煩胸中煩三者不因汗吐下而煩則是傳經之邪不作腹實但當和解而已經用小柴胡湯黃連阿膠湯是也若經汗吐下而煩則是邪熱內陷以為虛煩心中嘔溫飲吐憒憒無奈是也但多吐湧而已經用梔子等湯又有不因汗吐下邪結胸中膈實者與瓜蒂散及陽明調胃承氣湯此又煩之實者也二三日悸而煩虛也少陽之邪入腑煩而悸熱大抵先煩後悸為熱先悸後煩為虛節庵邪熱入里不經汗下者為煩熱與發熱似同而異也經曰病人煩熱汗出則解如未作膈熱但當和解而已若心下滿而煩則有吐下之殊矣千金諸虛煩發熱者與傷寒相似然不惡寒身不疼痛知非傷寒不可發汗也熱不潮脈不數知非裡實不可下也如此者內外皆不可攻但當與竹葉湯嘔者橘皮湯此法甚效傷寒後虛煩者亦宜
