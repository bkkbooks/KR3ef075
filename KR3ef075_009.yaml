body:
  text: 傷寒直指卷八傷寒論原方健曰仲景推內經七方十劑之旨廣伊尹湯液之制設傷寒方劑一百一十有三而失其一為立法制方之祖叔和編次傷寒論列於各證條下歷來舊本如是茲念傷寒證變百出頭緒繁多病情舛錯之處讀者已難領悟而以方劑雜處其間更覺紛心眩目阻遏文思因將方劑另匯一卷次之經後以使學者便於覽記與證相參仍不失仲景大法其藥味炮製分兩升合煮服之法一遵舊本然今古不同土方各異當今之世氣稟漸薄甫人只可十分之一北人只可十分之二約量重輕隨證斟酌因人而施不失君臣佐使之法即為能事矣考銖兩升合當從漢制古之一銖今之二分半也古之一兩今之六錢也古之一斤今之九兩六錢也古之一升今之二合半也古之一斗今之二升五合也前賢辨之甚詳學者準則可耳桂伎湯第一桂枝三兩去皮芍藥三兩甘草二兩炙生薑一兩大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾吸熱稀粥一升余以助藥力溫覆令一時許通身漐漐微似有汗益佳不可令如水流漓病必不除若一服汗出病差停後服當小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物內經曰辛甘發散為陽桂枝湯辛甘之劑所以發散風邪內經曰風淫所勝平以辛佐以苦甘以甘緩之以酸收之是以桂枝為主芍藥甘草為佐也內經曰風淫於內以甘緩之以辛散之是以生薑大棗為使也成氏桂枝湯用薑棗不特專於發散以脾主為胃行其津液薑棗之用專行脾胃之津液而和其營衛者也麻黃湯不用薑棗者專於發汗不行化而津液流通矣東垣桂枝湯是陰經營藥也閉衛氣使陰氣不泄此藥為衛虛設也曰仲景治表虛制此湯桂枝味辛熱發散助陽體輕本乎天者親上故桂枝為君芍藥甘草為佐如陽脈澀陰脈弦法當腹中急痛乃制小建中湯以芍藥為君桂枝甘草為佐一則治表虛一則治裡虛各有主也後學觸類而長之三陽云太陽病汗出服桂枝只使之似有汗邪已去矣似字當細玩不可認作發汗與麻黃湯混看海藏或問仲景治傷寒當汗者皆用桂枝湯又云無汗不得用桂枝汗多者桂枝甘草湯一藥二其義何也曰仲景云太陽中風陰弱者汗自出衛實營虛發熱汗出又云太陽病發熱汗出者此為營弱衛強陰虛陽必湊之故皆用桂枝發汗此乃調其營氣則衛氣自和風邪無所容遂從汗解非桂技能開腠發汗也汗多用桂枝者以之調和營衛則邪汗出而汗自止也桂枝湯下發汗之發字當作出字營衛和汗自出非若麻黃之開腠發汗也瀕湖桂枝透達營衛故能解肌而風邪出脾主營肺主衛也甘走脾辛走肺也念莪衛氣不能衛外為固則有汗成云胃實何耶蓋邪盛則實非正氣實也既曰邪入則熱在表矣其惡風又何耶蓋汗能開腠也既曰熱在表則汗出腠開宜解矣乃不解者又何耶趙嗣真所謂惟臟腑可分表裡皮膚骨髓但分浮沉淺深俱屬於表若以皮膚為表骨髓為里則麻黃湯證骨節疼痛其可謂有表復有里耶然不解者骨髓之邪自在正與嗇嗇惡寒之義相合所謂熱在皮膚寒在骨髓也如骨髓無寒則桂枝不宜與矣論曰桂枝下咽陽盛則斃其是之謂乎觀子邪在表者必從汗解然自汗之證津液已傷安可復與汗法乎桂枝善達肌表氣薄發泄用以解散膚腠風邪固矣若芍藥甘草化土崇脾收斂營氣則妄溢者自不再溢生薑大棗行陽益氣生髮脾胃以添津液然後營衛以通邪氣以去正氣以復而非亡陽流漓之比也健曰桂枝湯辛溫之劑只治太陽中風自汗多而熱不退惡風寒者用之調和營衛則邪從汗解乃已若中風無汗發熱惡寒及諸在表無汗之證萬難概用用之反斂其表邪汗不泄而熱更甚桂枝加葛根湯第二葛根四兩桂枝三兩去皮芍藥二兩甘草二兩炙生薑三兩大棗十二枚擘麻黃三兩去節上七味以水一斗先煮麻黃葛根減二升去上沫內諸藥煮取三升去滓溫服一升覆取微似汗不須吸粥余如桂枝法觀子按病條成注云後證無汗當加麻黃今既自汗出恐不當用麻黃但加葛根夫麻黃本發無汗之邪既主桂枝實表安得復入麻黃曰桂枝加葛根者名方之義甚明則知麻黃之錯列無疑念莪表邪方盛不當有汗出風傷衛也故以桂葛解肌芍藥和營薑棗和衛桂枝加厚朴杏子仁湯第三於桂枝湯方內加厚朴二兩杏仁五十個去皮尖余依前法叔微一武人為寇執數日得脫乘機恣食解衣捫蝨次日傷寒自汗而膈不利一醫下之一醫汗之表不解微喘予令治桂枝加厚朴杏子仁湯一啜喘定再啜漐漐微汗至晚身涼脈和醫曰某平生未嘗用仲景方不知其神妙乃爾桂枝加附子湯第四於桂枝湯方內加附子一枚炮去皮劈八片余依前法崔皋發汗遂漏不止則虛其表而亡陽陽虛無以衛外故其人惡風小便難者經虛腑亦虛而膀胱之氣不化則溺不出汗多亡津液則無以養筋故四肢微急難以屈伸用桂枝湯所以和表之營衛加熟附子者所以回在裡之元陽朮附湯第五於此方內去桂枝加白朮四兩依前法東垣附子能除腎中寒甚白朮佐之名朮附湯除寒濕之聖藥也觀子朮附湯即白朮附子湯乃桂枝附子湯去桂加朮非桂枝加附湯去桂加朮也叔和之誤由此蓋無加字者與有加字者自是兩方也桂枝去芍藥湯第六於桂枝湯方內去芍藥余依前法桂枝去芍藥加附子湯第七於桂枝湯方內去芍藥加附子一枚炮去皮破八片余依前法念莪胸滿者不利於酸收故去芍藥微寒者非表寒必裡寒也故加附子以祛寒消滿桂枝麻黃各半湯第八桂枝一兩十六銖去皮芍藥生薑甘草炙麻黃各一兩去節大棗四枚擘杏仁二十四個去皮尖上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取一升八合去滓溫服六合全善凡仲景稱太陽病者皆表證發熱惡寒頭項強痛也若脈浮大則與證相應宜發汗今見表證而脈反微不與證應不可發汗但用一二各半湯和之可也桂枝二麻黃一湯第九桂枝一兩十七銖去皮芍藥一兩六銖麻黃十六銖去節生薑一兩十銖杏仁十六個去皮尖大棗五枚擘上七味以水五升煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升日再士材各半湯以不汗故也今既大汗出故用桂枝多於麻黃白虎加人參湯第十於白虎湯方內加人參三兩余依白虎湯法亮宸此治熱乘肺胃液竭之方也桂枝治風汗出當解今大汗不解液竭而表裡熱甚肺金虧爍猶赤日之流金也石膏白虎屬金入肺甘寒性發而解肌用澈表微之盛邪知母上救肺金下滋腎水甘草粳米益土以生金又使寒涼不傷胃氣人參救將竭之津止渴而生液細檢仲景諸方凡渴無不加人參者此益水救金瀉熱之妙法涼風至而炎威去秋令行白虎之名以是乎健曰今人不悟玄奧醫家病家視石膏一味即為白虎如食人之獸畏不敢用墮誤貽害莫之能省殊不知此藥甘寒質重性輕善能解肌化熱為傷寒時氣疫毒溫暑斑疹煩渴肺胃蘊熱之聖藥應用之其效甚捷太過不及則有誤矣桂枝二越婢一湯第十一桂枝去皮芍藥甘草炙各十八銖生薑一兩三錢大棗四枚擘麻黃十八銖去節石膏二十四銖碎綿裹上七味㕮咀以五升水煮麻黃一二沸去上沫內諸藥煮取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一胃為十二之主脾治水穀為卑臟若婢內經曰脾主為胃行其津液是湯所以謂之越婢者以發脾氣通行津液外臺方一名越脾湯即此義也良仁婢義當作脾甘者土之本味脾氣不和者和以甘熱胃氣不清者清以甘寒石膏麻黃甘草行其津液所以發越脾氣以散皮膚間寒水故曰越婢也不巖桂枝麻黃越婢或一或二此即大小奇偶之義以各半湯詳之當是一之一無所去其半也曰三者當是二之一乃所謂各半之半也及考分兩本論與活人書參差不一然以小發其汗為各半湯謂桂枝止麻黃髮今在止發之間故裁為各半則汗出必解者自應麻黃多桂枝少不可更汗者自應桂枝少石膏多也桂枝麻黃各半湯即桂枝證藥也桂枝二麻黃一湯即麻黃證藥也桂枝二越婢一湯即大青龍證藥也總是一太陽病時日有淺深脈證有應否邪氣亦有微甚權衡劑量不失銖黍於此見古人立方之妙卿子條中無陽二字宜審脾氣不發越耳又云寒少桂枝少熱多故石膏多也桂枝去桂加茯苓白朮湯第十二於桂枝湯方內去桂枝加茯苓白朮各三兩余依前法煎服小便利則愈宇泰或問頭項強痛此邪氣仍在表也雖經汗下而未解何故去桂加茯芬白朮是無意於表矣曰此非桂枝證乃屬飲家也夫頭項強痛既經汗下而不解心下滿而微痛小便不利此為水飲內畜邪不在表故去桂枝加茯苓白朮若得小便利水飲行腹滿減而熱自除則頭項強痛悉愈矣且如十棗湯證頭亦痛乃邪熱內畜而有伏飲故頭痛其水飲頭痛不須攻表但宜逐飲飲盡頭痛安矣甘草乾薑湯第十三甘草四兩炙乾薑二兩炮上㕮咀以水三升煮取一升五合去滓分溫再服內經曰辛甘發散為陽甘草乾薑相合以復陽氣芍藥甘草湯第十四白芍藥四兩甘草四兩炙上二味㕮咀以水三升煮取一升半去滓分溫再服之芍藥白補而赤瀉白收而赤散酸以收之甘以緩之酸甘相合用補陰血念莪或論桂枝加附子湯甘草乾薑湯芍藥甘草湯三方浮為風合用桂枝大為虛虛而脛攣者寒則筋急也非附子不能溫經以舒筋故加之厥陰咽乾煩躁此陰躁也雖內結譫語而陽氣未回故以甘草乾薑溫理中氣為脾主四肢又甘能緩急也及陽氣以回則除去溫劑雖脛上拘急不過以芍藥和營而已直待脛伸寒證盡去然後以承氣止其譫語蓋內結者非承氣不能除也一證也始而大溫之既而微溫之又既而微寒之終而大寒之非有見垣之智者未易語此後人遇此證豈復能出此手眼耶調胃承氣湯第十五大黃四兩去皮清酒浸甘草二兩炙芒硝半斤上三味㕮咀以水三升煮取一升去滓內芒硝更上微火煮令沸少少溫服內經曰熱淫於內治以鹹寒佐以苦甘芒硝鹹寒以除熱大黃苦寒以蕩實甘草甘平助二物推陳而緩中海藏大黃宜酒浸者蓋邪氣居高非酒不到譬如物在高巔人跡所不及者則射而取之故用酒浸引而上之若用苦泄峻下則遺高分之邪熱所以愈後或目赤或目閉或頭腫膈上反生熱證矣用甘草者甘以緩之用芒硝者辛以潤之咸以軟之也芒硝鹹寒除熱以為君大黃苦寒蕩實以為臣加甘草之甘平以緩以和監其峻烈雖有承順其氣之勢復有調和其胃之功曰調胃承氣亮宸夫惡寒則為表惡熱則為里至於蒸蒸熱自里達表而愈按愈熱也其太陽經譫語腹滿與鬱郁微煩真有熱氣閉結不能自堪之狀故雖溏利亦不可已於下也但太陽傳來之邪其結固高而證不至潮熱喘冒臍痛手足汗出之甚故加甘草於黃硝中而不用枳樸蓋一以緩之使盡中焦之邪一以和之使黃硝不致過傷正氣故曰調胃也至若心煩腹滿雖屬下證然猶岐於可下未可下之間俱宜細別之宇泰按陽明一證分為太陽陽明少陽陽明等而以調胃大小承氣主之者按本草曰大黃酒浸入太陽酒洗入陽明浸久於洗得酒為為多故能引於至高之分仲景調胃承氣入太陽篇而大黃酒浸一則曰少少溫服二則曰當和胃氣及詳其本湯之證則曰不吐不下心煩者發汗不解蒸蒸發熱者吐後脹滿者是太陽陽明去表未遠其病在上不當攻下故宜緩劑以調和之也至正陽陽明皆曰急下之與大承氣湯而大承氣大黃酒洗是洗輕於浸微升其走下之性以治其中也至少陽陽明則去正陽而逼太陰其為下故小承氣湯大黃不用酒製少陽不宜下故曰小與之曰微溏之勿令大泄下此仲景制方之妙也東垣不審胃之云者仲景置調胃承氣於太陽篇乃以太陽不宜下故稱調胃以別之卻踵成氏之謬以小承氣治太陽脾約之證以調胃承氣治正陽陽明大承氣之證予故不能無辨四逆湯第十六甘草三兩炙乾薑一兩半附子一枚生用去皮破八片上三味㕮咀以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩內經曰寒淫於內治以甘熱又曰寒淫所勝平以辛熱甘草薑附相合為辛甘大熱之劑乃發散陰陽之氣四肢諸陽之本陽氣不足陰寒加之陽氣不相順接故四肢不溫而成逆冷此湯申發陽氣卻散陰寒溫經暖肌是湯以四逆名之然此奇制之大劑也四逆屬少陰少陰腎也肝腎位遠非大劑不能達內經曰遠而奇偶制大其服此之謂也士材是方專主四逆之證故名脾主四肢而甘為土味乃以甘草為君寒淫所勝平以辛熱乃以乾薑為臣溫經回陽非純陽而健脾者無此大作用是以附子為使太陽與少陰俱受陽和之煦而真氣充周於肢節矣若發熱頭痛脈反沉不差身體痛當救其里皆陰證也故並主之崔皋四逆必冷服者經曰治寒以熱涼而行之是也否則戴陽者反增上燥耳目鼻皆血者有矣藥之難用也如此葛根湯第十七葛根四兩麻黃三兩去節桂枝二兩去皮芍藥二兩甘草二兩炙生薑二兩大棗十二枚擘上七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌本草云輕可去實麻黃葛根之屬是也此以中風表實加二物於桂枝湯中也卿子按前桂枝葛根湯此葛根湯上似失麻黃二字蓋二葛根即桂枝麻黃變例也故二證項背強𠘧𠘧惡風一也士材太陽病有汗用桂枝無汗用麻黃確乎不可易矣此復以太陽無汗用葛根湯太陽有汗桂枝葛根湯者何也葛根本陽明經藥恐太陽病久將入陽明故用葛根以迎而奪之預發其邪勿令傳入也前用桂枝麻黃者病方起也今用此二方者病己久也又按太陽病脈靜為不傳煩躁為欲傳故用此二方元素治太陽陽明合病桂枝湯內加葛根麻黃又有黃芩黃連湯解肌是用之以斷太陽入陽明之路也頭顱痛如破乃陽明中風可用葛根蔥白湯為陽明仙藥若太陽初病未入陽明而頭痛者不可更服升麻葛根發之是反引邪入陽明為開門挹盜也葛根加半夏湯第十八葛根四兩半夏半斤麻黃去節湯泡去黃汁焙乾秤生薑各三兩甘草炙二兩芍藥二兩桂枝二兩去皮大棗十二枚擘上八味以水一斗先煮葛根麻黃減二升去白沫內諸藥煮取三升去滓溫服一升覆取微似汗士材太陽表證與陽明裡證合同而見其邪甚於里者也自利與葛根湯以澈二陽之邪具不下利而嘔者里邪稍輕故加半夏以理逆氣葛根黃芩黃連湯第十九葛根半斤甘草二兩炙黃芩二兩黃連三兩上四味以水八升煮葛根減二升入諸藥煮取二升去滓分溫再服內經辛甘發散為陽表未解者散以葛根甘草之甘苦以堅里裡氣弱者堅以黃芩黃連之苦崔皋表有頭疼發熱惡寒故曰表證尚在里有熱邪故喘而汗出葛根甘草之辛甘以解表黃芩黃連之苦寒以清裡亮宸此方與桂枝人參湯皆為表裡並見之證而溫補與清解之不同桂枝葛根解表之微異是亦為後人治協熱利之準繩麻黃湯第二十麻黃三兩去節桂枝二兩去皮甘草一兩炙杏仁七十個湯泡去皮尖上四味以水九升先煮麻黃減二升去上沫內諸藥取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息內經寒淫於內治以甘熱佐以苦辛麻黃甘草開肌發汗桂枝杏仁散寒下氣本草云輕可去實麻黃之屬是也實者謂邪在表腠密無汗而表實也麻黃為輕專主發汗是以為君表實者非桂枝所能獨散所以為臣也甘草甘平杏仁甘苦用以為佐者經所謂肝苦急急食甘以緩之肝者營之主也傷寒營勝衛固血脈不利故須緩之且桂枝湯治風傷衛則衛實營弱故佐以芍藥和其營血也麻黃湯寒傷營則營實衛虛故佐以杏仁利其衛氣也經所謂氣之所併為血虛血之所併為衛虛處方製劑之微該通君子其明察之東垣六淫有餘之邪客於陽分皮毛之間腠理閉拒營衛氣血不行故謂之實二藥輕清成象故可去之麻黃微苦其形中空入足太陽寒水之經其經本寒而又受外寒故宜發汗去皮毛氣分之寒邪以泄表實念莪審系真太陽無汗非麻黃莫可代者前哲謂冬不用麻黃夏不用桂枝蓋以冬令主閉藏不應疏泄夏令本炎熱不可辛溫經所謂必先歲氣毋伐天和之說也又曰麻黃惟冬月寒邪傷表腠密無汗者必用是何與前說相反邪夫誡不用者明時令之常慮輕用也勸必用者發病機之理慮遺用也或舍時從證舍證從時臨病變通存乎其人倘一概疑懼惟以輕淺之劑代之誤事必矣麻黃為發表第一藥惟冬令在表真有寒邪者始為相宜雖發熱惡寒苟不頭疼身痛拘急脈不浮緊者不可用也雖可汗之證亦當察病之輕重人之虛實不得多服蓋汗乃心之液若不可汗而誤汗與雖可汗而過汗則心血為之動搖或亡陽津竭而為壞證矣崔皋發汗必用麻黃亦有禁用者何耶傷寒發於天令寒冷之時寒邪在表閉其腠理須用麻黃辛苦之藥為能開發腠理逐寒邪汗出而解也惟夏月炎暑之時為禁須辛涼以發乃葛根蔥白豆豉之類為妙若麻黃加涼劑在內亦可用如通解散是也亮宸寒為陰邪入於營故傷之深則血澀而經絡不行身疼骨痛然邪必由衛以入營澀而衛亦閉故無汗而喘者衛外閉而肺氣不通則憤鬱而逆麻黃一湯專為大發寒邪通行營衛而設桂枝亦能行陽散邪而不如麻黃之澈也通天遍越毛胰故以麻黃為君桂枝為臣蓋麻黃中空而輕揚性熱善發汗通營衛無如其捷也杏仁內利肺氣外走皮毛以定喘甘草最輕不用其補益但取其甘緩於大發散中能調和表裡之意也海藏麻黃治衛實之藥桂枝治衛虛之藥二者均是太陽表劑其於營衛虛實不同心主營為血肺主衛為氣故麻黃為手太陰肺之劑桂枝為手少陰心之劑傷寒傷風而用麻黃桂枝為湯之源也瀕湖仲景治傷寒無汗用麻黃有汗用桂枝歷代明醫皆隨文傳會未有究其精者夫津液為汗汗即血也在營則為血在衛則為汗寒傷營營血內澀不能外通於衛衛氣閉固津液不行故無汗發熱而惡寒風傷衛衛氣外泄不能內護於營營氣虛弱津液不固故有汗發熱而惡風然風寒之邪皆由皮毛而入皮毛者肺之合也肺主衛氣包羅一身天之象也是證雖屬太陽而肺實受邪其證多兼面赤怫鬱咳嗽痰喘胸滿諸證非肺病乎蓋皮毛外閉則邪熱內攻而肺氣怫鬱則麻黃甘草同桂枝引邪出營達之肌表佐以杏仁泄肺而利氣汗後無大熱而喘加以石膏活人書夏至後加石膏知母皆是泄肺火之藥也然則麻黃雖太陽發汗重劑實發散肺經火鬱之藥腠理不密則津液泄而肺氣自虛虛補其母故用桂枝同甘草外散寒邪以救表內伐肝木以防脾佐以芍藥瀉木而固脾泄東所以補西也使以薑棗行津液而和營衛也下後微喘者加厚朴杏仁以利肺氣也汗後脈沉遲加人參以益肺氣也朱肱又加黃芩為陽旦湯以泄肺熱也皆是脾肺之藥是則桂枝雖太陽解肌輕劑實理脾救肺之藥也此千古未發之秘予因表而出之觀子吾人身中之氣總統於一呼一吸者即一陰一陽也一開一闔也一營一衛也然雖對待之中已具流行互根禪代不窮之妙衛主開衛病汗出不止是有開無闔營主闔營病毛孔閉塞是有闔無開張弛之機窒矣陰病治陽從陽引陰陽病治陰從陰引陽桂枝湯入芍藥以理血麻黃湯入杏仁以理氣其即此旨乎健按麻黃湯治傷寒發熱頭痛項強太陽無汗之專劑非可施諸別證若溫病熱病時氣感冒疫毒雜病等未便亂與也即傷寒兼證有可用之處亦當核仲景加減之法群賢詳考之要方妥大青龍湯第二十一麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十個去皮尖生薑三兩大棗十二枚擘石膏如雞子大碎上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也辛甘均為發散然風宜辛散寒宜甘發辛甘相合乃能發散營衛之風寒麻黃甘草石膏杏仁以發散營中之寒桂枝薑棗以解除衛中之風青龍者東方木神也應春而主肝專發生之令萬物出甲則有兩岐肝有兩葉以應之謂之青龍者發散營衛兩傷之邪也桂枝主風麻黃主寒此則中風見寒脈傷寒見風脈所以處大青龍兩解風寒也風寒兩傷非輕劑可以獨散必合輕重之劑同散之是以用石膏之甘辛質重而又達肌表者也此湯為發汗重劑用稍過即有亡陽之害故戒多服也仁齋大青龍仲景治傷寒發熱惡寒煩躁者用之夫傷寒邪氣在表不得汗出其人須躁不安身心無如之奈何脈浮緊或浮數急用此湯發汗則愈乃仲景之妙法也譬若亢熱已極一雨而涼其理可見也若不曉此見其躁熱投以寒涼其害可勝言哉若脈不浮緊但數者恐數中挾虛無惡風惡寒身疼者亦不可用此也如誤用之其害亦不淺所以脈證不明者多不敢用也文祿大青龍治風寒外壅而閉熱於經者故加石膏於發汗藥中尤為峻劑叔微仲景治傷寒一則桂枝二則麻黃三則大青龍三方如鼎立人皆能言之而不曉前人處方用藥之意故鄉不用無足怪也余嘗深究之若證候與脈相對無不應手而愈何以言之風傷衛衛氣也寒傷營營血也營行脈中衛行脈外風傷衛則風邪干陽陽氣不固泄而為汗是以自汗為表虛故仲景用桂枝以發其邪芍藥以和其血蓋中風則病在脈之外其病稍輕雖同曰發汗特解肌之藥耳故仲景於桂枝湯云令遍身漐漐微似有汗不可如水淋漓病必不除是知中風不可大發汗汗過則反動營也邪氣乘虛襲之故病不除也寒傷營則寒邪入陰血而營行脈中者也寒邪居脈中非特營受病邪自內作則並於衛犯之久則浸淫及骨是以汗不出而熱齒乾煩冤仲景以麻黃髮其汗又以桂枝甘草助其發散滌除內外之邪使營衛之邪去耳大抵二藥皆發汗以桂枝則發其衛之邪麻黃則並營與衛治之亦自有淺深也何以驗之第十九證云病嘗自汗出者營氣和以衛氣不共營氣和諧故爾又四十七證云發熱汗出為營弱衛強是知中風乃營和而衛不和也若第一卷云寸口脈浮而緊浮則為風緊則為寒風寒兩傷營衛俱病骨節煩疼當發其汗傷寒脈浮者營衛俱病也麻黃湯中並用桂枝此仲景之微也至大青龍一證尤難用藥須形證諦當然後可行王實夫用桂枝麻黃各半湯蓋慎之也觀子風者陽邪其傷衛也必作自汗今二證具以寒邪外閉腠理不得汗出無由發泄而惟內壅成熱誠非微邪營衛間如各半等湯可和之比矣第一證煩躁第二證但身重蓋皆熱盛亢極之勢且一證猶以寒邪勝見惡寒身疼之證若二證在外者曰身不疼在內無少陰證則並寒亦化熱夫營衛交病而又閼遏莫通此如夏令蘊除鬱熱之際非大雨一注奚從既濟而清涼故以麻黃湯倍麻黃而加石膏是誠汗劑之最重者此方河間一變即為防風通聖不復表裡兩解而且汗下兼行然元氣克當此等者能幾人哉或疑大青龍之難用謂不若止行桂枝麻黃各半湯此不特不識營衛兩傷之病兼亦錯解各半證也各半湯是微邪營衛間僅可小汗者故品味止三之一若大青龍麻黃用至六兩兼石膏甘寒以澈里豈猶輕劑和之之比蓋緣傷寒中有此一等重證或邪深或熱重或質強形氣病氣俱盛非桂枝麻黃之可勝任者此證一失治即為發狂陽毒之類如後人之三黃解毒等湯皆所以救後時之咎也不知此而但尋常輕病例之誤矣抑思解表各劑仲景立論甚備何不復贅一湯乎健曰書云若藥不冥眩厥疾不瘳有是證服是藥所謂有故無隕也若方不中病勢必毫釐千里豈一大青龍云乎哉至以品味之輕重較之則又非處方之確論也君臣佐使各要其能大小奇偶各合其度宣通補瀉各專其力因病適用如良將將兵不拘拘於陣法而又不離乎陣法也小青龍湯第二十二麻黃去節桂枝去皮芍藥甘草炙細辛乾薑各三兩半夏湯洗五味子各半升上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升寒邪在表非辛甘不能散之麻黃桂枝甘草之辛甘以發散表邪水停心下而不行則腎氣燥內經曰腎苦燥急食辛以潤之乾薑細辛半夏之辛以行水氣而潤腎咳逆而喘則肺氣逆內經曰肺欲收急食酸以收之芍藥五味子之酸以收逆氣安肺崔皋表不解者頭痛發熱身疼尚在也傷寒因渴飲水過多故心下有水氣有聲無物謂之乾嘔名曰水氣則有形之水已散但無形之氣尚在爾故無物可吐而但有聲或咳或噎或喘皆水寒射肺故也兼善小青龍與小柴胡皆嘔而發熱表裡之證何用藥不同曰傷寒表不解裡熱未甚而渴欲飲水不能多不當與之以腹中熱尚少不能消水水飲停畜故作諸證然水寒作病非溫熱之劑不能解故用小青龍發汗散水要其理初無里證因水寒以致然也夫小柴胡系傷寒發熱熱邪傳在半表裡間熱氣內攻而生諸證二者雖曰表裡俱病其中寒熱不同故用藥有薑桂柴芩之異也觀子表不解而內復蘊熱與石膏以清之表不解而內復有寒與乾薑以溫之此大小青龍俱取義於兩施也然則柴胡之外又有雙解之法矣夫小青龍以過飲成疾當亦是壞證類爾健曰此湯雖為水寒射肺而辛辣酸收雜處猛而難用較大青龍則相去遠矣加減法若微利者去麻黃加芫花如雞子大熬令赤色下利者不可攻其表汗出必脹滿麻黃髮其陽水漬入胃必作利芫花下十二經水水去則利止若渴者去半夏加栝蔞根三兩辛燥而苦潤半夏辛而燥津液非渴者所宜故去之栝蔞根味苦而生津故加之若噎者去麻黃加附子一枚炮經曰水得寒氣冷必相搏其人即噎加附子以溫散水寒病人既有寒復發汗冒中冷必吐蛔去麻黃惡發耳若小便不利少腹滿去麻黃加茯苓四兩水畜下焦不行為小便不利少腹滿麻黃髮津液於外非所宜也茯苓泄水畜於下加所當也若喘者去麻黃加杏仁半升去皮尖要略曰其人形腫故不內麻黃內杏子仁以麻黃髮其陽故也喘呼形腫水氣標本之疾觀子按千金已有此條非始成氏明矣乾薑附子湯第二十三千姜一兩切附子一枚生去皮破八片上二味以水三升煮取一升去滓頓服內經寒淫所勝平以辛熱虛寒太甚者是以辛熱劑勝之也海藏服姜附湯有二法當熱服手少陰心也水包火熱服以接心火身衣寒盛外火少也寒從外至熱從內消譬如凍死寒在外也一法當寒服是少陰腎也寒邪入水冷服以類腎水身表微熱內水多熱從外生寒從內消譬如飲冷寒在內也士材身無大熱但微熱也此無根虛火遊行於外非薑附大辛大熱之劑何能退陰以復陽麻黃杏仁甘草石膏湯第二十四麻黃四兩去節杏仁五十個去皮尖甘草二兩炙石膏半斤碎綿裹上四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升內經肝若急急食甘以緩之風氣通於肝風邪外甚故以純甘之劑發之兼善觀仲景常言發汗後乃表邪未解止餘一證而已故言不可行桂枝湯今汗出而喘無大熱乃上焦餘邪未解當用麻黃杏仁甘草石膏湯以散之夫桂枝加厚朴杏仁湯乃桂枝證悉具而加喘者用之注言汗出而喘以為邪氣壅甚非桂枝所能發散此誤也況身無大熱更無他證何故復言表邪必甚其後章下後不可更行桂枝湯條下注曰汗下雖殊即當損正氣則一其言有至理焉可見汗後所注之誤矣原其理當時因事發機前後失於照應故有此等之弊文祿成注不可更行桂枝以表解故恐貽之熱耳復庵云審知邪熱未解雖經汗下宜石膏竹葉湯又云太陽汗解後不宜復行暖劑念莪汗後表邪悉解身無大熱但汗而喘上焦餘邪未盡不當以桂枝止汗但以麻黃散表杏仁石膏清裡俟表裡之邪盡澈則不治喘汗而喘自止矣桂枝甘草湯第二十五桂枝四兩去皮甘草二兩炙上二味以水三升煮取一升去滓頓服桂枝之辛走肺而益氣甘草之甘入脾而暖中亮宸今人此證則用黃耆可見黃耆與桂枝性用不甚相遠也茯苓桂枝甘草大棗湯第二十六茯苓半斤甘草三兩炙大棗十五枚擘桂枝四兩去皮上四味以甘瀾水一斗煮茯苓減二升內儲藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之茯苓以伐腎邪桂枝能泄奔豚甘草大棗之甘滋助脾土以平腎氣煎用甘瀾水者揚之無力取不助腎氣也士材奔豚為水寒凌火之候用甘瀾者動而不已理停滯之水也厚朴生薑甘草半夏人參湯第二十七厚朴半斤去皮炙生薑半斤切半夏半斤洗人參一兩甘草二兩炙上五味以水一斗煮取三升去滓溫服一升日三服內經脾欲緩急食甘以緩之用苦泄之厚朴之苦以泄腹滿人參甘草之甘以益脾胃半夏生薑之辛以散滯氣三陽曰吐下後脹滿為實者表邪未除而誤下故也此發汗後邪氣已散故知非裡實也茯苓桂枝白木甘草湯第二十八茯苓四兩桂技三兩去皮白朮二兩甘草二兩炙上四味以水六升煮取三升去滓分溫三服陽不足者補之以甘茯苓白朮生津液而益陽也裡氣逆者散之以辛桂枝甘草行陽散氣亮宸滿用朮甘非石山立齋誰與言此茯苓松根氣所結敵降逆氣虛者猶宜也芍藥甘草附子湯第二十九芍藥三兩甘草三兩炙附子一枚炮去皮擘以上三味以水五升煮取一升五合去滓分溫服叔和疑非仲景意芍藥之酸收斂津液而益營附子之辛溫固陽氣而補衛甘草之甘調和辛酸而安胃氣茯苓四逆湯第三十茯苓四兩人參一兩甘草二兩炙乾薑一兩半附子一枚生用去皮破上五味以水五升煮取三升去滓溫服七合日三服四逆湯以補陽加茯苓人參以益陰士材既曰陰陽俱虛獨用氣藥者蓋氣藥有生血之功也亮宸正虛有邪正欲勝邪而不能故煩躁此虛極而陽將脫之象也當急溫正氣邪自除矣大青龍煩躁者實也茯冬四逆頒躁者虛也五苓散第三十一豬苓十八銖去皮澤瀉一兩六銖半白朮十八銖茯苓十八銖桂半兩去皮上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈淡者一也口入一而為甘甘甚而化淡甘緩而淡滲豬苓白朮茯苓三味之甘潤虛燥而利津液鹹味下泄為陰澤瀉之咸以泄伏水辛甘發散為陽桂枝之辛甘以和肌表苓者令也通行津液克伐腎邪專為號令者苓之功也五苓之中茯苓為主故曰五苓散內經曰淡味滲泄為陽水飲內畜須滲泄之必以甘淡為主故茯苓甘平為君豬苓甘平為臣雖甘也終歸甘淡脾惡濕水飲內畜則脾不治脾土強旺則水飲不敢停留故以白朮為佐泄飲導溺必以成為助故澤瀉為使水畜不行則腎氣燥經曰腎惡燥急食辛以潤之散濕潤燥必桂味辛熱為嚮導之使多飲暖水令汗出而愈者以辛散而水氣外泄故解兼善煩渴用白虎宜也其用五苓滲津液何哉曰白虎乃表證已解邪傳裡而煩渴者今脈尚浮身有微熱而渴乃表邪未解故用桂枝之辛和肌表白朮茯冬之甘淡以潤虛燥也宇泰此說亦未瑩太陽經也膀胱腑也膀胱者溺之室也五苓散者利溺之藥也膀胱者津液之府東垣以謁為膀胱本病然則治渴者當瀉膀胱之熱瀉膀胱之熱者利小便而已矣崔皋水道為熱所閉故小便不利不利則不能運化津液故渴水無當於五味故用淡以治水桂性辛熱熱則氣化經曰膀胱者州都之官津液藏焉氣化則能出矣此用桂之義也雖有因汗下後亡津液而致小便不利者不可強以五苓利之利之則重亡津液益虧其陰矣亮宸大汗出後裡虛脾弱不能運行致水停中焦不能上潤而渴小便不利雖汗表仍未解故見脈浮微熱之證也桂枝既能解表又能溫中益陽白朮健脾行水三苓分布上下脾氣散精上歸於肺而不渴通調水道下輸膀胱而小便利水令行陽氣布而汗出解矣景岳膀胱位居最下三焦水液所歸都會之地故曰州都之宮津液藏焉膀胱有下口而無上口津液之入者為水水之化者由氣有化入而後有出是謂氣化則能出然氣化之源居丹田之間是名下氣海天乙元氣化生於此元氣足則運有常水道自利所以氣為水母知氣化能出之旨則治水之道思過半矣觀子水飲停畜不行何必主五苓治之蓋水飲之在人身原非注諸胃即泄諸膀胱其間陰陽臟象之微有化機焉內經曰膀胱者津液藏焉是液也始於脾源於肺特輸泄於膀胱耳何也脾胃者水穀之市豈獨食谷有形之物待醞釀以分清濁在飲水亦猶是也凡入胃之後必藉真火以為之既濟至於熟腐變化之餘各有清濁之殊清者精微上奉而為五液之本使肌骸筋髓得以灌溉無是則槁矣濁者耗剩之渣滓傳出闌門滲漉膀胱而為溺焉然必先資於脾者脾職行津液而後得營運之常為資始資生之本內經曰飲入於冒遊溢精氣上輸於脾是也必繼達於肺者地氣上騰為云云升於天然後得為雨澤之施內經曰脾氣散精上歸於肺是也然則通調水道下輸膀胱之際有不脾胃先病而膀胱獨不治哉彼大汗出胃汁於則脾無津液可輸何以上奉於肺肺家液涸則生水之源竭而燥氣日以盛蓋所謂傳本者豈特熱閉膀胱也三焦既不能如霧如漚安能如讀之流通乎法以白朮理卑濫而中扃無停濕二苓助秋氣而水源得清肅澤瀉導伏藏之水而邪從溺解肉桂壯化氣之本而轆運無停是五苓者澄其源而流自潔蓋有水出高原氣即是水之道焉豈僅疏瀹決排之為事哉千金傷寒無熱但狂言煩躁不安精彩言語不與人相主當者五冬散主之又云以豬苓湯服之及與新汲水一二升飲之令以指探喉中吐之病隨手愈若不能吐勿強與水水停則結心下也節庵庸醫不識便指為發狂誤用下藥死者多矣不知此熱結於膀胱也健按方中桂字諸傢俱宗成注作桂枝為解以五苓為和營解表之劑殊失方藥之大旨而認證亦錯矣夫五苓本是裨土勝濕之藥停飲不化畜水不泄者主之其於和營解肌反隔一層止渴除煩更增其燥崔皋所謂因汗下後內亡津液而小便不利者不可強與五苓利之與則重亡津液益虧其陰此千古之明論也蓋因仲景原本失去肉字但存桂字而諸家皆作桂枝立說第考方之專主桂之分兩及後賢方本俱是肉桂原以水寒土濕不能制化故設補火生土逐之之法乃五苓之妙用也若入桂枝其義何居非仲景立方鼻祖之意矣玩觀子壯化氣之本而轆運無停是肉掛為五苓之良相燮理陰陽功獨在是豈桂枝所能任乎千載疑案未得直指其誤茲若不為表出何以明制方本義茯苓甘草湯第三十二茯苓二兩桂枝二兩去皮生薑二兩甘草一兩炙上四味以水四升煮取二升去滓分溫服茯苓甘草之甘益津液而和衛桂枝生薑之辛助陽氣而解表梔子豉湯第三十三梔子十四枚擘香豉四合上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服酸苦湧泄為陰苦以湧吐寒以勝熱梔子香豉相合吐劑宜矣經曰其高者因而越之其下者引而竭之中滿者瀉之於內其有邪者必漬以為汗其在皮者汗而發之治傷寒之妙雖有變通終不越此數法也傷寒邪氣自表傳裡留於胸中為邪在高分則可吐之所吐之證亦自不同如不經汗下邪氣蘊鬱於膈則為之實應以瓜蒂散吐胸中之實邪也若汗吐下後邪氣乘虛陷於胸中則為虛煩應以梔子豉湯吐胸中之虛煩也梔子苦寒苦以湧吐為君煩為熱勝勝熱者必寒香豉苦寒故為臣而助之東垣梔子色赤味苦入心而治煩香豉色黑味鹹入腎而治燥宗奭梔子雖寒而無毒治胃中熱氣既亡血津液臟腑無以潤養內生虛熱非此不可去也海藏易老云梔子輕浮而象肺色赤而象火故能瀉肺中之火本草不言吐藥仲景用此為吐藥者為邪氣在上拒而不下故令上吐邪得以出也煩者氣也燥者血也氣主肺血主腎故用梔子以治肺煩香豉以治腎躁亮宸汗吐下則大邪稍解其餘熱未去乘虛客於們中郁遏而不得散煩擾不寧故不得眠甚則熱蒸於心心中擾亂反復顛倒無可奈何梔子入心而清熱香豉味苦而氣升一吐之後上焦郁邪遂升散而寧矣梔子甘草豉湯第三十四於梔子豉湯方內加入甘草二兩余依前法得吐止服梔子生薑豉湯第三十五於梔子豉方內加生薑五兩余依前法得吐止後服梔子厚朴湯第三十六梔子十四枚擘厚朴四兩姜炙枳實四枚水浸去穰炒以上三味以水三升煮取一升半去滓分二服溫進一服得吐者止後服酸苦湧泄梔子之苦以湧虛煩厚朴枳實之苦以泄腹滿梔子乾薑湯第三十七梔子十四枚擘乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服得吐者止後服苦以湧吐梔子之苦以吐煩辛以潤之乾薑之辛以益氣念莪病在上因而越之其為吐一也而所以吐則異也虛煩兼少氣加甘草以和中虛煩而兼嘔惡加生薑以散逆腹滿虛煩則中州之實也入枳樸以寬中大下而微煩中州之虛也入乾薑以理中經曰氣有高下病有遠近證有中外治有重輕適其所以為法依而行之所謂良矣胸中懊憹若無燥屎大便軟者吐證也若有燥屎不大便者下證也毫釐疑似之間關人生死奈何不悚懼者耶小柴胡湯第三十八柴胡半斤黃芩三兩人參三兩甘草三兩半夏半升泡生薑三兩切大棗十三枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服內經曰熱淫於內以苦發之柴胡黃芩之苦以發傳邪之熱里不足者以甘緩之人參甘草之甘以緩中和之氣邪半人里則裡氣逆辛以散之半夏以除煩嘔邪半在表則營衛爭之辛甘解之薑棗以和營衛傷寒邪氣在表者必漬形以為汗邪氣在裡者義盪滌以取利其於不內不外半表半裡者不可汗不可下但當以小柴胡和解而已三陽曰證在半表半裡或中風或傷寒三四日得之者或有傳經而得或有直中此經而始終不傳者但見一證而以脈合之便當照此方治不可汗下亦不可求諸證悉具也瀕湖少陽之證寒熱胸脅痞滿默默不欲飲食心煩嘔渴等證雖曰在半表半裡而胸脅痞滿實兼心肺上焦之邪心煩喜嘔默默不欲飲食又兼脾胃中焦之證故用黃芩以治手足少陽相火黃芩亦少陽本經藥也成注但云柴胡黃芩之苦以發傳邪之熱芍藥黃芩之苦以堅斂腸胃之氣殊昧其治火之妙楊士瀛云柴胡退熱不及黃芩蓋亦不知柴胡之退熱乃苦以發之散火之標也黃芩之退熱乃寒能勝熱折火之本也亮宸少陽為三陽之裡去陽入陰之界邪在表則寒邪在裡則鬱而熱今在表裡之間已成熱而熱未全熱故或陰勝而寒或陽勝而熱往來不定也又少陽為陽之微陽氣初彰陰氣尚盛亦寒熱往來也少陽之脈循胸過季脅邪客之則經氣不通而苦滿邪漸入里裡氣不和故默默不欲飲食心頒者熱也嘔者寒也寒熱並見故煩而苦嘔熱多則煩而不嘔也渴者里有熱消津液腹中痛者里有寒散於經絡脅下痞硬者邪結於脅而堅心下悸小便不利者停水不渴身有微熱者里無熱而表未罷咳者水寒射肺經在表裡之間證兼寒熱之際或表多或里多或寒甚或熱甚雜見不一經曰有一證便是蓋視其人之陰陽寒熱而見證不必全具也方以柴胡為君者邪入少陽寒已成熱非麻桂之辛熱所宜柴胡苦平而升散以發熱邪使之外出黃芩苦寒而下降以折熱邪使之內清也然邪在少陽雖熱而未全熱此如初春之令微寒未去故以半夏生薑之辛溫散寒邪而止嘔去滿合柴胡使春陽甲膽之令行而寒熱散合黃芩使陰陽平而寒熱止然少陽少氣少血必中氣實則邪易外散而不為內傷故以人參甘草大棗之甘溫益元氣而生津液一以斷入三陰之路一以斷入陽明胃之腑也故經云少陽為樞此正陰陽出入之界寒熱未定之時藥兼溫涼真如化工賦物非仲景醫聖其孰能之加減法若胸中煩而不嘔去半夏人參加栝蔞實一枚煩而不嘔熱聚而氣不通也甘令人中滿方聚熱無用人參之補辛散逆氣既不嘔無用半夏之辛去熱宜寒療聚熱宜苦栝蔞實苦而寒以瀉胸中之蘊熱若渴者去半夏加人參合前成四兩半栝蔞根四兩半夏燥津液非渴者所宜人參甘而潤栝蔞根苦而涼澈熱生津二物為當若腹中痛者去黃芩加芍藥三兩去黃芩惡寒中加芍藥以通壅若脅下痞硬去大棗加牡蠣四兩甘令人中滿痞者去大棗之甘咸以軟之硬者加牡蠣之咸若心下悸小便不利者去黃芩加茯苓四兩飲不化水畜不行為悸小便不利苦以堅腎則水益堅故去黃芩淡味滲泄茯苓甘淡以泄伏水若不渴外有微熱者去人參加桂三兩溫覆取微汗愈不渴者里和也故去人參有微熱表未解也加桂以發汗健曰此加桂雖脫去枝字然察其里已和外微熱表未解是為桂枝無疑若咳者去大棗人參生薑加五味子半升乾薑二兩咳者氣逆也甘則氣壅故去人參大棗肺欲收急食酸以收之五味子之酸以收逆氣肺寒則斂散以辛熱故易生薑以乾薑之熱士材邪氣自表未斂為實乘虛而湊則所傳不一變證良多故立加減之法煩者熱也嘔者氣逆也煩而不嘔則熱雖聚而氣未逆邪氣欲漸成實也去人參恐其助熱去半夏以無逆氣加栝蔞以除鬱熱渴為津液枯半夏性燥故去之人參甘而潤栝蔞苦而堅堅潤相合津液生而渴自己氣不通暢血不和調則腹痛黃芩寒中能滯氣故去之芍藥酸泄能和營故加之痞則氣滿甘能滿中故去大棗硬則形堅咸能軟堅故加牡蠣悸而小便不利停水之候也去黃芩之苦堅堅能助水加茯芬之淡滲淡能行水不渴者里自和故去人參微熱者表未解故加桂枝咳則肺氣逆甘補中則氣愈逆故去參棗之甘肺欲收收逆氣者五味子之能也咳本於寒氣內淫熱以散之乾薑辛溫快氣而散寒亦司大逆故仲景不分寒熱每治咳證必用此二物也瀕湖雖云腹痛去黃芩加芍藥心下悸小便不利去黃芩加茯苓亦當以意逆之辨以證脈若因飲寒受寒腹中痛及飲水心下悸小便不利而脈不數者是里無熱證黃芩不可用也若熱厥腹痛肺熱而小便不利其可不用乎健曰五味乾薑咳家最忌若非肺虛挾寒毫釐不可擅用在仲景西北人也當嚴寒暴咳或可用之遺法於後而諸家就文釋義不辨半表之邪未解半里之熱內盛上迫於肺則氣逆而咳豈可憑以酸收熱散之說大劑以投勢必邪愈急熱愈熾病必增劇其如之何於理確難信也嘗見世人偶或用之咳反加甚是知五味酸斂一入肺家如油入面終無可愈之日矣況於傷寒表邪未解者哉玩瀕湖之論黃芩士材之論乾薑五味均要因病制宜書不可讀殺見不可執定士材雖未明言二物之非然云仲景治咳不分寒熱每必用此已屬皮裡春秋學者當須識此不可膠柱鼓瑟自貽伊戚也小建中湯第三十九桂枝去皮甘草炙生薑切各三兩芍藥六兩大棗十二枚擘膠飴一升上六味以水七升煮取三升去滓內膠抬更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也建中者建脾也內經曰脾欲緩急食甘以緩之膠飴大棗甘草之甘以緩中也辛潤也散也營衛不足潤而散之桂枝生薑之辛以行營衛酸收也泄也正氣虛弱收而行之是以桂枝辛熱芍藥酸寒為佐胃者衛之源脾者營之本衛為陽益之必以辛營為陰補之必以甘辛甘相合脾胃健而營衛通是以生薑辛溫大棗甘溫為佐或謂桂枝湯解表而芍藥數少建中湯溫里而芍藥數多何也二者遠近之制皮膚為近則制小其服心腹為遠則制大其服此所以不同也脾居四臟之中生育營衛通行津液一有不調則營衛失育津液失守此湯甘溫善為中州培養有建立之義故曰建中東垣仲景治表虛制桂枝湯桂枝味辛熱發散助陽體輕本乎天者親上故桂枝為君芍藥甘草佐之陽脈澀陰脈弦腹中急痛制小建中湯芍藥酸寒主收補中本乎地者親下故芍藥為君桂枝甘草佐之一則治表虛一則治裡虛各因其主用也亮宸小建中者治中虛之劑也虛者脾弱也脾為心子中氣弱不能自振故心悸而煩澀弦皆為陰脈腹中痛者裡寒也急者脾虛而不能緩也桂枝去姜溫里以散寒芍藥收耗散之氣以止痛飴棗甘草補中而緩急蓋壯中官以行營衛則脾強而心氣足悸定而煩止也士材二三日邪方盛又未經汗下見證不過悸而煩不審何故便行建中疑必有脫文也若陽脈澀而陰脈弦腹中掣急而痛灼然虛寒建中溫之當矣損庵脈弦木旺土之仇也故以桂枝與芍藥制之大柴胡湯第四十柴胡半斤黃芩三兩芍藥三兩半夏半斤洗生薑五兩枳實四枚炙大棗十二枚擘大黃二兩上七味以水一斗二升煮取六升去滓再煎溫服一升日三服叔和一方用大黃二兩若不加大黃恐不為大柴胡也柴胡黃芩之苦入心而折熱枳實芍藥之酸苦湧泄而扶陰辛者散也半夏之辛以散逆氣辛甘和也薑棗之辛甘以和營衛方有緩急輕重醫當臨時斟酌如大滿大實有燥屎者非駃劑不能泄是以有大小承氣之峻也如不至大滿大實惟邪甚而攻下者又非承氣之可投必也輕緩之劑如大柴胡為下劑之緩者也傷寒室於可下則熱有餘折熱必以苦為主除邪必以寒為助故用柴胡之苦平解肌為君黃芩之寒除熱為臣芍藥佐黃芩扶營中熱枳實佐柴胡扶衛中熱是以為佐半夏薑棗理冒之逆大黃滌盪奪土中之壅是以為使海藏大柴胡治有表復有里之證有表者或頭痛或惡寒或惡風或脈浮四證中有一二尚在及十三日過經不解是也有里者譫言妄語揚手擲足皆里之急者也欲下之則表仍在故以大柴胡調和三陽是不犯諸禁以芍藥下安太陰使邪氣不納以大黃去地道不通以枳實去心下痞悶於小柴胡減人參甘草加芍藥枳實大黃是也欲緩下之全用小柴胡加枳實大黃亦可亮宸痞而且硬熱結已在陽明之腑然以少陽證多若純用下劑恐作結胸故以小柴胡和少陽之邪加大黃枳芍以泄陽明之結熱兼善或問大柴胡內煩裡實固宜用其嘔而下利者亦用之何也夫治病節目虛實二者而已裡虛者雖便難而勿攻裡實者雖吐利而可下經云汗多則便難脈遲尚未可攻以遲為不足裡氣未實故也此以大柴胡主之者凡吐利心腹軟為裡虛嘔吐下利而心下痞硬者是裡實也下之為當故與大柴胡者宜也柒胡加芒硝湯第四十一於小柴胡湯方內加芒硝六兩余依前法服不解更服士材胸脅滿嘔潮熱邪在半表半裡小柴胡為的當之劑但下之失宜則里邪未盡非柴胡所能療也故加芒硝以利之桃核承氣湯第四十二桃仁五十個去皮尖桂枝二兩去皮大黃四兩芒硝甘草各二兩炙上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利甘以緩之辛以散之少腹急結緩以桃仁之甘下焦畜血散以桂枝之辛大熱之氣寒以收之熱甚搏血故加二物於調胃承氣湯中也宇泰按以上詳玩之當是桂非桂枝也蓋桂枝輕揚治上桂厚重治下成氏隨文順釋未足據崔皋無頭痛發熱惡寒為外證已解小腹急為邪在下焦大便黑瘀血漬之也小便利血病氣不病也下焦主陰瘀血客之下焦不行上干清陽之分天君不寧矣故如狂也桃仁潤腸而滑血大黃推陳而致新芒硝軟堅而潤燥甘草和胃而緩中血寒則止血熱則行佐以桂枝之辛熱有不入血而使下行者乎亮宸大黃芒硝雖為破結通堅之劑必得桃仁入血分而行血又必得桂枝引入膀胱之本而散血然後黃硝之力直達下焦而為功始捷健按此方宇泰謂應當用桂士材亦以為桂枝輕揚治上桂厚重降治下疑有錯誤然審證系太陽不解熱結膀胱故用桃仁承氣取桂枝以達膀胱之腑為嚮導非比寒凝血聚於少腹厥陰之地而必厚桂辛熱以破之者方中桂枝非誤也是知古方今論前輩意見猶難一轍如五苓之應桂而偏認桂枝為和解之劑此則應桂枝引經而偏曰是桂一字之推敲有限而表裡補瀉殊途其關係非細也柴胡龍骨壯蠣湯第四十三半夏二合洗大棗六枚擘柴胡四兩生薑一兩半人參龍骨鉛丹桂枝茯苓各一兩半大黃二兩牡蠣一兩半煅上十一味以水八升煮四升內大黃切如棋子更煮一二沸去滓溫服一升健按此方攻補劫利兼具仲景何處此細審病情實難施用況此際氣稟薄弱誰能勝任前輩無一言論及者想亦疑似無憑艱於措手耳桂枝去芍藥加蜀漆龍骨牡蠣救逆湯第四十四桂枝三兩去皮蜀漆洗去腳生薑各三兩甘草二兩炙龍骨四兩牡蠣五兩煅大棗十二枚擘上為末以水一斗二升先煮蜀漆即常山苗也減二升內諸藥煮取三升去滓溫服一升亮宸此治火劫出汗汗多亡陽虛熱迫而驚狂者傷寒脈浮當以藥取汗今以火劫之則汗大出而亡陽矣汗者心之液亡陽則心氣虛心惡熱火邪內迫則心神浮越故驚狂起臥不安與桂枝解未盡之表邪不用芍藥者以其益陰非亡陽所宜也火邪內熾加蜀漆之辛平以蠲之汗出氣脫加龍骨牡蠣之澀以固之且以鎮驚狂而斂浮越之氣也夫表邪既解火邪亦散驚定汗止陽氣由是而漸復矣健曰火劫亡陽則心陰亦竭故現驚狂不寧即有未盡之表邪又何必以桂枝之辛熱而反去芍藥斂陰益肝之品不幾以火濟火己且蜀漆性專利痰在小兒則有痰熱生驚之候而此證因汗出舍空心膽自怯如驚如狂當以清補為治若投此劑恐無益而有害也其難信難用處已於前證條下詳言之桂枝加桂湯第四十五於桂枝湯方內加桂二兩共五兩余依前法士材桂辛熱下行大泄奔豚之要藥同桂枝湯用之則針處被寒之邪莫不畢散矣健曰玩士材辛熱下行句則以加桂為肉桂矣然方曰共五兩其義是加重桂枝耳故稱為加桂湯桂枝甘草龍骨牡蠣湯第四十六桂枝一兩甘草二兩龍骨二兩牡蠣二兩熬上為末以水五升煮取二升半去滓溫服八合日三服辛甘發散桂枝甘草之辛甘以發散經中之火邪澀可去脫龍骨牡蠣之澀以收斂浮越之正氣亮宸火逆者以火劫而逆也下之又虛其里燒針則表益虛表裡俱虛故煩躁是火熱為緩而亡陽為急矣故用龍骨牡蠣正氣而止煩桂枝甘草散火邪而斂汗健曰既雲表里俱虛亡陽火逆法用斂劑理也但宜斂則不宜散矣何仍用桂枝之辛散龍骨牡蠣雖能收澀然其性純陽燥烈且有桂枝為嚮導恐助其火更逆陽更亡耳上四方終難憑信抵當湯第四十七水蛭熬虻蟲各三十個熬去翅熬即炙炒也桃仁二十個去皮尖大黃三兩酒浸上四味為末以水五升煮取三升去滓溫服一升不下再服苦走血咸勝血虻蟲水蛭之鹹苦以除畜血甘緩結苦泄熱桃仁大黃之苦以下結熱人之所有氣與血也氣為陽氣留而不行者則易散陽病易治血為陰血畜而不行者則難通以陰病難治也血畜於下非大毒駃劑則不能抵當故治畜血曰抵當湯經曰咸勝血去血必以咸是以水蛭之鹹寒為君若走血破血必以苦是以虻蟲之苦寒為臣肝者血之源血結則肝氣燥以桃仁之潤滑為佐血結則凝泣以大黃之盪滌為使亮宸此治太陽隨經入腑畜血豪堅之劑故必桃仁以破其瘀大黃以瀉其熱但此硬滿與結胸者不同此之發狂與如狂者不同是必以水蛭虻蟲蠕軟血之物因其性而用之無堅不破然後桃仁大黃能奏功也第二證脈泥結視沉微又甚而多一身黃蓋血死而不行不能榮華其身故黃此方峻駃毒烈若非畜血於下不可輕用宇泰按玩在字則邪氣為不傳於裡非猶淺也膀胱為太陽本經曰熱在下焦曰少腹硬曰小便自利皆膀胱之證故結曰隨經瘀熱也在裡二字要看得活非三陰之裡乃膀胱之裡也抵當丸第四十八水蛭二十個熬虹蟲二十五個去翅足熬桃仁二十個去皮尖大黃三兩上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者更服士材畜血堅結非輕緩之劑可療必峻猛之藥方對證以丸較湯僅得三分之二為稍緩也大陷胸丸第四十九大黃半斤葶藶半升熬芒硝半升杏仁半升去皮尖熬黑上四味搗篩二味內杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法大黃芒硝之苦鹹所以下熱葶藶杏仁之苦甘所以泄滿甘遂取其直達白蜜取其潤利皆以下泄滿實也吳氏不用湯液而用丸者湯主盪滌用大陷胸湯者其從心下至少腹俱硬滿三焦皆實故用湯以蕩之此惟上焦滿實恐湯液中傷中下二焦之陰故用丸以攻之亮宸此證高結於肺分故能仰而不能俯左右顧盼不得曰項如柔痙狀也然結近於肺故用葶藶杏仁肺經氣分之劑瀉胸中至高之氣而後配以硝黃之攻堅甘遂之直達蜜取其潤丸取其緩皆以結之高故緩以攻之一宿乃下亦以高故爾大陷胸湯第五十大黃六兩去皮芒硝一升甘遂一錢上三味以水六升煮大黃取二升去滓內芒硝煮兩沸內甘遂末溫服一升得快利止後服大黃謂之將軍苦能盪滌芒硝一名硝石咸能軟堅夫間有遂以通水也甘遂若夫間之遂其氣可以直達透結陷胸三物為名井田一夫所受田間有通水之道其名為遂宇泰結胸由邪在胸中處身之高分宜若可吐然所謂結者諸陽受氣於胸中邪氣與陽氣相結不能分解壅於心下為硬為痛是邪正固結於胸非虛煩膈實者比也低者舉之高者陷之以平為正結胸高邪必陷下以平之故曰陷胸也平邪蕩寇將軍之職以大黃為君咸能軟堅以芒硝為臣澈上澈下破結逐水以甘遂為佐利藥之中此駃劑也唯大實者宜之苟或挾虛或短氣或脈浮不可輕投也丹溪此證經曰胃中空虛曰短氣躁煩曰脈浮浮則為虛此湯不可輕用崔皋三陽經表證未解而用承氣以攻裡者此下之早也下早則裡虛表邪乘之而入三焦皆結故心下至少腹硬滿而痛不可近也其為證危急尋常藥餌所不能平故用三物之峻以成起死之功用人之勇去其怒惟善將將者能之損庵傷寒錯惡結胸為甚非此不能通利劑大而數少須其迅速分解邪結也小陷胸湯第五十一黃連一兩半夏半升洗栝蔞實大者一個上三味以水六升先煮栝蔞取三升去滓內諸藥煮取二升去滓分溫三服苦以泄之辛以散之黃連栝蔞實苦寒以泄熱半夏之辛以散結海藏大陷胸湯治熱實大陷胸丸兼喘小陷胸治痞瀕湖結胸滿痛用栝蔞實取其甘寒不犯胃氣能降三焦乏火使痰氣下降也士材下早熱結胸中按之則痛曰小陷胸是不按猶未痛也黃連以泄胸中之熱栝蔞以下胸中之氣半夏以散胸中之結然必下後方有是證一服未即和再服微下黃涎遂和也亮宸正在心下與直至少腹者殊矣按之則痛與石硬不可近者異矣脈浮而滑與沉而遲沉而緊者別矣凡此皆浮淺故以小寒之藥取之耳文蛤散第五十二文蛤五兩上一味為散以沸湯和一錢匕服用湯五合咸走腎邪可以勝水氣仲醇文蛤味成氣平經曰硬則氣堅成以軟之文蛤之咸能消散上下結氣故主胸痹等痛觀子此食品之花蛤非五倍子也熱為寒束寒熱相搏不解文蛤能軟堅化痰除熱利水散胸痹結氣故治寒實有專功也健曰蛤蜊出海濱有二種大而有黃花紋者名車蛾小而白薄殼者為文蛤煅研即是蛤粉因其生於海水味鹹能軟堅破頑痰且散胸痹結氣為妙品白散第五十三桔梗三分巴豆一分去皮心熬黑研如脂貝母三分上三味為末內巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利過不止進冷粥一杯身熱皮粟不解欲引衣自覆者若以水撰之洗之益令熱卻不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法辛散而苦泄桔梗貝母之苦辛用以下氣巴豆之辛用以散實宇泰上熱實結胸及寒實結胸活人書不拘寒熱但以陷胸湯不差者用枳實理中丸應手而愈崔皋此證或由表解裡熱之時過食冷物亦成寒結胸然必無熱證者方是且惟病甚不得已而用之若輕者活人但以枳實理中丸取效健按結胸之熱實寒實須察脈與舌色若熱實者脈當洪數或沉實而數舌必於黃若寒實脈當沉遲或緊而結舌必白滑審察確當方以三陷胸酌之若自散之猛利更宜慎用柴胡桂枝湯第五十四柴胡四兩黃芩人參桂枝去皮芍藥生薑各一兩半半夏二合半洗甘草一兩炙大棗六枚擘上九味以水七升煮取三升去滓溫服婁氏病雖太陽表證而有里證兼之者則不言太陽病但稱表不解外證未去其兼心下支結則此條柴胡桂枝是也亮宸此邪傳少陽尚帶表證之偶方也發熱惡寒頭疼為太陽表證微嘔心下支結為少陽證故以二方合而用之觀子此方較小柴胡加桂枝湯多芍藥而諸味亦各減半意加桂是半表裡邪居多表邪較少此則與半表裡邪勢均故合二種為偶方以治之是柴胡桂枝之各半湯也柴胡桂枝幹薑湯第五十五柴胡半斤桂枝三兩去皮乾薑二兩栝蔞根四兩黃芩三兩牡蠣三兩熬甘草二兩炙上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈熱淫於內以苦發之柴胡黃芩之苦以解傳裡之邪辛甘發散為陽桂枝甘草之辛甘以散在表之邪咸以軟之牡蠣之咸以消胸胃之滿辛以潤之乾薑之辛以固陽虛之汗液不足而為渴苦以堅之栝蔞之苦以生津液亮宸胸脅滿結渴而往來寒熱此屬少陽之證宜柴胡解之所以用薑桂者皆因已汗復下之故也汗之則表氣不足陽虛於上而頭汗下之中氣已寒內亡津液而小便不利故仍以柴芩清少陽之邪加桂枝以益表乾薑以溫里用栝蔞根者以其渴加牡蠣者以其結去半夏者以其不嘔於此可見仲景用藥如轉環耳半夏瀉心湯第五十六半夏半升洗乾薑黃芩人參甘草各三兩炙黃連一兩大棗十二枚擘上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服辛入肺而散氣半夏之辛以散結氣苦入心而泄熱黃芩黃連之苦以瀉結熱脾欲緩食甘以緩之人參甘草大棗之甘以緩之氣結而不散壅而不通為結胸陷胸湯為直達之劑塞而不通否而不分為痞瀉心湯為分解之劑痞與結胸有高下焉結胸者邪結胸中故曰陷胸湯痞者邪留心下故曰瀉心湯瀉心者以苦為主苦先入心以苦泄之是以黃連為君黃芩為臣以降陽而升陰也散痞者必以辛為助是以半夏之辛溫乾薑之辛熱為佐陰陽不交曰痞上下不通曰滿欲通上下交陰陽者必和其中中者脾胃也脾不足者甘以補之故人參大棗甘草為使中氣得和上下通陰陽分水升火降則痞消熱已而大汗解矣兼善或謂痞證多有雜以別證而心下痞硬者必非半夏瀉心所宜也曰證候不同宜各治療諸證皆雜別證非特下早而成仲景所以各從其宜而治之若下早而痞但滿而不痛別無外證者與半夏瀉心以攻痞宜也崔皋三陰亦有在經表證如太陰厥陰俱有中風之條少陰有麻黃附子細辛湯之證若不治其表而用承氣下之則傷中氣而陰經之邪乘之矣以既傷之中氣而邪乘之則不能升清降濁否塞於中如天地不交而成否故曰痞瀉心者瀉心下之邪也半夏之辛以散痞氣芩連之苦以瀉痞熱已下之後脾氣必虛人參甘草大棗以補脾氣之虛夫痞者氣鬱不通泰也若不因下早而成痞者或痰或食或氣為之結也保命篇曰治痞用瀉心湯主之各有冷熱之不同要在辨而治之如熱入而為痞者大黃黃連瀉心之類是也或寒多而熱少者半夏瀉心之類是也要之非瀉心火之熱乃瀉心下之痞滿也十棗湯第五十七芫花熬甘遂大戟大棗十枚擘上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去滓內藥末強人服一錢匕羸人服半錢溫服之平旦服若下病不除者明日更服加半錢得快下利後糜粥自養辛以散之芫花之辛以散飲苦以泄之甘遂大戟之苦以泄水水者腎所主也甘者脾之味也大棗之甘益土而勝水孫兆里未和者痰與燥氣壅於中焦故頭痛乾嘔短氣汗出是痰隔也非十棗湯不能治但此湯不宜輕服恐損人於傾刻雖然實者宜之南陽大抵脅下痛者為有飲須分表裡乾嘔微利發熱而咳為表有水小青龍加芫花治之身體涼表證罷汗出而乾嘔脅下痛為里有水十棗湯主之但十棗非小青龍之比須量人虛實不可妄投耳東壁仲景治太陽表不解心下有水氣小青龍湯若表已解有時頭汗出不惡寒心下有水氣乾嘔脅痛或咳十棗湯主之蓋小青龍治未發散表邪使水氣自毛竅而出乃內經開鬼門法也十棗驅逐里邪使水氣自大小便而泄乃內經潔淨府去陳繭法也芫花甘遂大戟之性逐水泄濕能直達水飲窠囊隱僻之處但可徐徐用之取效甚捷不可過劑泄人真氣也健曰服一錢匕匕即匙也一錢匕者將一個錢作匕抄藥末調服也半錢匕者以錢半抄也曰方寸匕者以方一寸之抄抄之也大黃黃連瀉心湯第五十八大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服內經曰火熱受邪心病生焉苦入心寒除熱大黃黃連之苦寒以導瀉心下之虛熱以麻沸湯漬服者取其氣薄而泄虛熱也瀕湖治痞用大黃黃連瀉心湯此亦瀉脾胃之濕熱非瀉心也病發於陰而反下之因作痞乃寒傷營血邪氣乘虛結於上焦胃之上脘在於心位故曰瀉心實瀉脾也素問云太陰所至為痞滿又濁氣在上則生腹脹是矣若病發於陽而反下之成結胸乃熱邪陷入血分亦在上脘分野故大陷胸湯丸皆用大黃亦瀉脾胃血分之邪而降其濁氣也若結胸在氣分則用小陷胸湯痞滿在氣分則用半夏瀉心湯矣亮宸此治熱客心下成痞者雖痞按之濡而脈浮其非堅結可知但熱非黃連之寒不解微結非大黃之迅不除故不煮而用麻沸湯漬之者蓋不用其味但取微寒之氣以泄微熱耳觀子麻沸湯李東壁謂即百沸湯蓋滾水之沸如麻者用此漬而服之更不煮飲者單用其氣不用其味以虛熱成象假苦寒而用之非至薄不相當也附子瀉心湯第五十九大黃二兩黃連黃芩各一兩附子一枚炮去皮破別煮取汁上四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服士材心下痞者熱邪也惡寒汗出者陽虛也以三黃之苦寒清中濟陰以附子之辛熱溫經固陽寒熱互用攻補兼施而不悖此仲景之妙用入神也亮宸此治心下痞而陽氣大虛者熱客心下雖已成痞其人本氣虛寒故復惡寒汗出是痞滿輕而惡寒汗出為重用附子汁者取其重味以回外虛之氣三物漬之者取其薄氣以清內陷之熱邪仲景用藥其神矣乎生薑瀉心湯第六十生薑四兩切甘草三兩炙人參三兩半夏半斤洗乾薑黃芩黃連各一兩大棗十二枚孽上八味以水一斗煮取六升去滓再煎去三升溫服一升日三服亮宸表證宜汗下之則腸胃虛里寒故下利乾嘔表熱內陷客氣上逆而成痞故心煩不安乾薑之熱以溫其裡寒配半夏能除逆氣而消痞合甘草大棗更能補虛而止利芩連者用其苦寒以解客熱之虛煩也寒熱並用不亦仲景之妙歟三方本一意但半夏瀉心多人參之補生薑瀉心以乾噫食臭有水氣故倍生薑減乾薑取其宣發耳甘草瀉心湯第六十一甘草四兩黃芩三兩乾薑三兩半夏半斤洗黃連一兩大棗十二枚擘上六味以水一斗煮取六升去滓再煎取三升溫服日三服氣結而不散壅而不通為結胸陷胸湯為直達之劑塞而不通否而不泰為痞瀉心湯為分解之劑痞與結胸有高下焉邪結在胸中故曰陷胸邪留在心下故曰瀉心亮宸半夏瀉心甘草瀉心皆下後傷其氣之故也生薑瀉心因於食大黃瀉心因於熱附子瀉心因於寒觀子誤下成痞與不誤下之中虛氣逆證較重於半夏生薑瀉心矣何反去人參耶按狐惑證亦用甘草瀉心湯而金匱方仍有人參三兩此屬錄方時脫漏無疑也赤石脂禹餘糧湯第六十二赤石脂一斤碎禹餘糧一斤碎以上二味以水六升煮取二升去滓三服本草云澀可去脫石脂之澀以收斂之重可去怯餘糧之重以鎮固之旋覆代赭石湯第六十三旋覆花三兩人參二兩生薑五兩半夏半斤洗代赭石一兩大棗十二枚擘甘草三兩炙上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服硬則氣堅成味可以軟之旋覆之咸以軟痞硬虛則氣浮重則可以鎮之代赭之重以鎮虛逆辛者散也生薑半夏之辛以散虛痞甘者緩也人參甘草大棗之甘以補胃弱婁氏病解後心下痞硬噫氣若不下利此條旋覆代赭石湯也若下利者前條生薑瀉心湯也崔皋吐汗中虛肺金失令肝氣乘脾而作上逆干心心病為噫用代赭石所以鎮心亦所以平肝也觀子旋覆花善消胸中痰唾如肢漆者通血脈去噫氣故胸臆未平之痞結以此主之健曰制方有一定之理而合君臣佐使之法以命名取義也既成劑則君藥宜重而臣佐次之又當辨藥性之厚薄體質之重輕如體輕而味厚者分兩雖少而力巨質重而味薄者分兩雖多而性輕如此方之旋覆體輕而用三兩赭石體重而用一兩較生薑半夏佐使之多寡大不合法矣此必錄方錯誤也就此配合代赭須用十兩庶得其鎮氣消痰定喘平肝之力為清金制木之良劑也稜枝人參湯第六十四桂枝四兩去皮甘草四兩炙白朮三兩人參三兩乾薑三兩上五味以水九升先煮四味取五升內桂更煮取三升溫一升日再夜一服表未解者辛以散之里不足者甘以緩之此以裡氣大虛表裡不解故加桂枝甘草於理中湯也兼善大柴胡湯瀉也桂枝人參湯補也皆治下利心下痞硬若傷寒發熱汗出不解心下痞硬嘔吐而下利者表和而里病也以心中痞硬故為實當大柴胡湯下之二者心下痞硬雖同而虛實有異故用藥有攻補之別也亮宸此治妄下里氣虛寒表仍未解也裡虛邪入為痞硬下利名為協熱然數下之後下利不止已裡虛挾寒也故桂枝解表配乾薑溫里而散寒參朮甘草補虛消痞以止利瓜蒂散第六十五瓜蒂一分熬黃赤小豆一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散其高者越之越以瓜蒂豆豉之苦在上者湧之湧以赤小豆之酸內經曰酸苦湧泄為陰念莪邪客胸中至氣衝不得息非吐之不可也寒氣在胸瓜蒂之苦寒從其性而治之也赤小豆酸寒湧泄又以香豉酸苦為助則痰濁邪氣一湧而盡矣然此為快劑重亡津液與梔子豉湯大不侔也故亡血虛家特為申禁耳觀子瓜蒂善除陽明濕熱故能引去胸中涎濁且苦則湧泄蒂則喉嗌間物也赤小豆散熱而通氣香豉蒸罨所成性升而散三物酸苦相合自成上達之功黃芩湯第六十六黃芩三兩芍藥二兩甘草二兩大棗十二枚擘上四味以水一斗煮取三升去滓溫服一升日再夜一服若嘔者加半夏半升生薑三兩虛而不實者苦以堅之酸以收之黃芩芍藥之苦酸以堅斂腸胃之氣弱而不足者甘以補之甘草大棗之甘以補固腸胃之弱黃芩加半夏生薑湯第六十七於黃芩湯方內加半夏半升生薑兩半余依黃芩湯法服士村半夏辛燥除濕而大和脾胃生薑辛散下氣而善理逆結故二物為嘔家聖藥黃連湯第六十八黃連甘草炙乾薑桂枝去皮各三兩人參二兩半夏半升洗大棗十二枚擘上七味以水一斗煮取六升去滓溫服一升日三服夜二服上熱者泄之以苦黃連之苦以降陽下寒者散之以辛桂薑半夏之辛以升陰脾欲緩急食甘以緩之人參甘草大棗之甘以益胃桂枝附子湯第六十九桂枝四兩去皮附子三枚炮去皮破八片生薑三兩切甘草二兩炙大棗十二枚擘上五味以水六升煮取二升去滓分溫三服風在表者散以桂枝甘草之辛甘濕在經者遂以附子之辛熱薑棗辛甘行營衛通津液以和表也亮宸此治表虛無陽寒與風濕太甚者蓋風濕相持經中陽氣幾絕而為寒邪所困故疼煩不能自轉側也不嘔不渴風濕在經而里無邪也浮者風脈也虛而濕者陽氣絕而陰亦欲絕也桂枝甘草之辛甘行陽氣而散在表之風邪附子之辛熱回陽氣而散在經之寒濕用三枚者蓋以陽氣困極非重用之不能追將絕之元陽也小便利而大便硬者為津液不足故去桂加朮用薑棗者亦和營衛通津液之意耳甘草附子湯第七十甘草二兩炙附子二枚炮去皮破白朮二兩桂枝四兩去皮上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合者為妙桂枝甘草之辛甘發散風邪而固衛附子白朮之辛甘解濕氣而溫經活人身腫者加防風一兩悸氣小便不利者加白茯苓一兩半亮宸此與上同一則疼煩不能轉側一則掣痛不得屈伸俱為純陰在表此汗出短氣彼浮虛而骨節煩疼而痛劇也汗出短氣惡風不欲去衣者風勝而衛氣不固也小便不利故身微腫者濕氣勝而水不行也故用白朮桂枝散風濕而固衛甘草附子益陽氣而溫經白虎湯第七十一石膏一斤碎知母六兩甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服內經曰熱淫所勝佐以苦甘知母之苦佐石膏之甘寒以散熱熱則傷氣甘以緩之甘草粳米之甘以益氣白虎西方金神也應肺熱甚於內者以寒下之熱甚於外者以涼解之其有中外皆熱內不得泄外不得發非是湯則不能解暑暍之氣得秋而止故曰處暑是湯以白虎名謂能止熱也又曰熱淫於內以苦發之欲澈表熱必以苦為主故以知母苦寒為君熱氣內甚消爍津液故以石膏甘寒為臣甘草粳米之甘平以緩益脾胃而助津液是太陽中暍得此湯頓除煩渴即熱見白虎而盡矣東垣身以前胃之經也胸肺胃之室也邪在陽明肺受火制故用辛寒以清肺氣所以號為白虎也煩出於肺躁出於腎君以石膏佐以知母所以清腎之源也兼善活人謂白虎治中暍並汗後一解肌藥耳非正傷寒藥也況夏月陰氣在內尤宜戒之夫白虎具載仲景之書證治昭然何言非正傷寒藥耶又明理論云立秋後不可服恐白虎太寒將變虛羸不食二說俱偏矣夫傷寒之證有是病服是藥安可拘於時哉假使秋冬之傷寒身無表證而大熱煩渴於法合用白虎苟拘於時候何以措手若以白虎為大寒其承氣又可行於冬令乎既以夏宜戒秋後不可行然則何時可用耶雖然經云必先歲氣毋伐天和此言常也設或賊邪變出陰陽寒暑亦當舍時從證豈必以時令為拘哉海藏本草言粳米益脾胃仲景白虎湯用之入肺者以味甘為陽明之經色白為西方之象而氣寒入手太陰也少陰證桃花湯用之者以補正氣竹葉石膏湯用之者以益不足也念莪仲景云傷寒脈浮滑此表有熱里有寒白虎湯主之疑必有誤又云熱結在裡表裡俱熱大渴飲水白虎湯主之又云表不解者不可與白虎湯又陽明證云表熱裡寒四逆湯主之又少陰證云裡寒外熱通脈四逆湯主之乃知其脈浮滑表熱裡寒者表裡二字必訛也就仲景數論而斷之豈有里既寒而反用大寒之劑乎豈有裡寒而脈浮滑者乎豈有裡寒而大熱煩渴者乎故知白虎為陽明大熱而設其曰里有寒者定差無疑也成氏隨文釋之誤矣知母之寒不及石膏且知母但主內熱不能解肌況止用六兩非君藥也宜作臣石膏入肺屬金其色白其性涼與白虎之義相合且用一斤非臣藥也宜作君三陽云經文里有寒之寒字當作邪字解亦熱也健按念莪此論抉千古之疑兼善名言拯後人之溺三陽解寒字為邪即熱亦善體經文之不逮皆屬當頭棒喝炙甘草湯第七十二甘草四兩炙生地黃一斤麥門冬去心麻子仁各半斤桂枝去皮生薑各三兩人參阿膠各二兩大棗十二枚擘上九味以清酒七升水八升先煮八味取三升去滓內膠烊消盡溫服一升日三服一名復脈湯補可去弱人參甘草大棗之甘以和不足之氣桂枝生薑之辛以益正氣聖濟經曰津液耗散為枯五臟痿弱營衛涸流溫劑所以潤之麻仁阿膠麥冬生地之甘潤經益血復脈通心也念莪脈結代者氣血虛衰不能相續也心動悸者邪氣煩擾不能自安也參甘補其氣薑桂溫其氣麻仁阿膠地黃麥冬皆濡潤益陰之品所以濟其枯涸而脈代悸者可復於平和故名復脈湯也亮宸脈者血之府心合脈主營主血心氣弱則營血衰不能注於經隊脈所以結代而心為之悸動也復脈者必先補心以益血阿膠生地以生之麻仁以潤之麥冬滋肺益心以生脈蓋寸口為手太陰之經脈司治節行營衛陰陽者也夫營出中焦統於脾胃非甘草人參大棗以補脾生薑桂枝以行陽益生化之源此方為千古養陰之祖也仁齋若脈結足冷腹中痛陽氣微者須當用大建中湯大承氣湯第七十三大黃四兩酒洗厚朴半斤去皮炙枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓內大黃煮取二升去滓內芒硝更上火微一兩沸分溫再服得下余勿服內經曰燥淫所勝以苦下之大黃枳實之苦以潤燥除熱又曰燥淫於內治以苦溫厚朴之苦以下結燥又曰熱淫所勝治以鹹寒芒硝之咸以攻蘊熱承者順也胃為水穀之海邪氣入冒冒為壅滯糟粕秘結必滌盪之正氣乃順故有承氣之名也王冰曰宜下必以苦枳實苦平潰堅破結為君厚朴苦溫降氣泄滿為臣芒硝鹹寒軟堅除熱為佐大黃苦寒盪滌潤燥為使是以有將軍之名也海藏厚朴去痞枳實泄滿芒硝軟堅大黃泄實惟痞燥實堅四證全見者方可用之若不宜下而誤下之變證不可勝數大小調胃氣必須脈浮頭痛惡風惡寒表證盡罷而反發熱惡熱譫語不大便者方可用之若脈浮緊下之必結胸脈浮緩下之必痞氣大抵三法不可差差則無者生之有者遺之假令調胃承氣證而用大承氣下之愈後則元氣不復以其氣藥犯之也若大承氣證而用調胃承氣下之愈後則神思不清以其無氣藥也小承氣證若用芒硝下之則或利不止變而成虛矣卿子乾陽亢極於上而有悔悔字即陰承於下五行家所謂陰生於午坤象所謂順承天亢害承製之義皎然此湯不曰制火不曰生陰而曰承氣仲景法天以為方者也東垣仲景謂邪自外傳入於胃者為入腑腑之為言聚也胃為水穀之海營衛之源水穀會聚變化而為營衛邪氣入胃則胃氣菀滯糟粕秘結而為實實則瀉之人無所苦知其間緩急輕重之法則臨時消息焉成氏云大熱結實者云云如不至大堅而邪熱已甚須攻下者亦未可投大承氣必以輕緩之劑攻之於大承氣減枳樸加甘草乃輕緩以調胃也設若大承氣證反用調胃承氣下之則邪氣內伏小承氣證反用大承氣下之則過傷正氣而腹滿不能食仲景所以分而治之有勿大泄之戒未嘗越聖人之制度也後世醫者以此三藥合而為一且云通治三藥之證反無問傷寒雜病內外一切所傷如此與仲景之方甚背戾大夫軒岐緩急之旨由是紅紫亂朱迷惑世人一唱百和病者暗受其殃將何所咎哉倘有公心審是者當於內經及仲景求之必使藥證相對以聖賢之心為心則方之真偽可得而知矣吳氏按承氣有三種用者大須審酌必真有大熱大實者方可與大承氣湯小熱小實者可與小承氣湯若但結熱而不滿堅者僅與調胃承氣湯此為合法若病大而以小承氣攻之則邪氣不淨病小而以大承氣攻之則正氣必傷仲景曰凡欲行大承氣必先與小承氣轉失氣者有燥矢也可與大承氣又曰服承氣得利者慎勿再服何其諄諄致謹乎節庵傷寒熱邪傳入於裡無非苦寒之藥下之不下其邪從何而去然須看熱之淺深今醫不分輕重概用大承氣攻下非徒無益而反害之予謂傷寒之邪傳來非一治之有殊病有三焦俱傷者則痞滿燥堅全具正宜與大承氣厚朴苦溫以去痞枳實苦寒以泄滿芒硝鹹寒以潤燥軟堅大黃苦寒以泄實去熱中病即愈矣邪在中焦則有燥實堅三證故宜調胃承氣以甘草和中芒硝潤燥大黃泄實不用枳樸恐傷上焦虛無氤氳之氣調胃之名自此著矣若上焦受傷則痞而實宜用小承氣湯枳實厚朴能除痞大黃以瀉實去芒硝則不傷下焦血分之真陰謂不伐其根本也若夫大柴胡湯無芒硝加芍藥者以其表證尚未除而里又急不得不下只用此湯以通表裡而緩治之猶有老弱及氣血兩虛之人及差後復有下證者亦宜用此恐承氣太峻故也經曰轉藥孰緊有芒硝者緊也大承氣最緊小承氣次之大柴胡又次之大柴胡加大黃大承氣加芒硝方為轉藥亮宸傷寒三陽之經日久蘊結化熱者皆能傳入胃腑故經有太陽陽明有正陽陽明有少陽陽明有因汗下而得有不因汗下邪熱內傳而得蓋胃為五臟六腑之海藥物所歸表邪悉斂入於內熱毒蘊結如熾炭然於此失下地道不通營衛閉絕陰陽竭而死矣然辨治之法有數端焉以兩字言之曰熱曰實熱而不實未可以用此也五字言之曰痞滿燥實堅痞滿而不實實而未燥未可全用此也然雖實熱表邪未罷更未可用此也第一辨惡寒不惡寒稍有惡寒即是表邪斷未可下第二辨潮熱不潮熱蓋熱悉入里內有堅結則身表無熱至其旺時熱始外蒸如潮之有信知其內實也第三辨手足汗出陽明法多汗今熱蒸而止手足汗出知津液竭而便硬也第四辨譫語蓋熱盛則神昏而妄語知有燥屎也第五辨繞臍與腹滿痛煩躁發作有時蓋寒亦痛者以煩躁知其為熱也又以發作有時知為熱而實也第六辨微熱喘冒不能臥蓋微熱者熱斂於裡也喘者熱實而上衝也冒者神昏而熱盛也第七辨目不了了睛不和骨之睛為瞳子熱甚而水竭故目不明非急下恐無以救水也第八辨汗多汗太過恐液竭第九辨脈遲脈實脈滑遲為營衛不通熱結而行遲實者滑者宿食也第十辨小便多少多則便硬少則便溏也至心下硬腹滿與痞雖系陽明內實兼有之證然未可便定為裡實蓋亦有不當下者在矣健按亮宸十辨條分縷晰如是則承氣無誤投之患矣然更須驗舌胎則熱之實與不實輕重多少瞭然心目而三承氣之用無少差矣小承氣湯第七十四大黃四兩厚朴二兩炙枳實大者三枚炙以上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之大熱結實者與大承氣小熱微結者與小承氣以熱不大甚故於大承氣湯去芒硝又以結不至堅故亦減厚朴枳實也吳氏或問承氣湯仲景有大小調胃之名何也傷寒傳變入里邪氣與糟粕蘊而為實實則潮熱譫語手足濈濈汗出者此燥屎所為也如人壯大熱大實者宜大承氣下之小熱小實者與小承氣下之又熱結不堅滿者減去厚朴枳實加甘草而和緩之故曰調冒承氣也若病大而以小承氣攻之則邪氣不去病小而以大承氣攻之則過傷正氣且不及還如再攻過則不能復救可不慎哉仲醇胃之上口曰賁門與心相連胃氣壅則心下亦急而痞痛邪塞中焦則升降不舒而氣上逆枳實得其破散沖走之力則結實脹滿悉除所以仲景承氣湯用之也豬苓湯第七千五豬苓去皮茯苓阿膠滑石碎澤瀉各一兩上五味以水四升先煮四味取二升去滓內下阿膠烊消溫服七合日三服甘甚而反淡淡味滲泄為陽豬苓茯苓之甘以行小便鹹味湧泄為陰澤瀉之咸以泄伏水滑石利竅阿膠滑石之滑以利水道嗣真太陽脈浮小便不利微熱消渴者五苓散陽明脈浮發熱渴欲飲水小便不利者豬苓湯既脈證皆同何用藥之不同曰太陽邪在表發汗不解故用五苓散和表行津液陽明邪已入里熱客下焦故用豬苓湯滲瀉其熱蓋豬苓專滲泄五苓則兼汗利也士材活人云脈浮者五苓散脈沉者豬苓湯則知此湯論中脈字下脫一不字也按太陽篇內五苓散乃豬苓澤瀉茯苓三味加桂與術也陽明篇內豬苓湯乃豬苓澤瀉茯苓三味加阿膠滑石也桂與術味甘辛為陽主外阿膠滑石味甘寒主內南陽之言可謂不失仲景之旨矣但竟以沉字易之不若浮字為妥崔皋少陰下利而主此方者分其小便而下利自止也渴欲飲水小便不利而主此方者導其陽邪由溺而出則津液運化而渴自愈也豬苓質枯輕清能滲上焦之濕茯苓味甘益中能滲中焦之濕澤瀉味鹹潤下能滲下焦之濕滑石性寒清肅能滲濕中之熱四物皆滲利恐有下多亡陰之懼故用阿膠佐之以存津液於決瀆耳蜜煎導第七十六蜜七合一味內銅器中微火煎之稍凝似抬狀攪之勿焦著欲可作餅手捻作挺令頭銳大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之健曰後人煉蜜以滴水成珠時離火調入牙皂末攪作挺更利於便豬膽汁導第七十七大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出士材汗則津液枯於上小便利則津液竭於下若強攻之危證立見如上二導法為虛弱人立權巧法也然此惟燥屎在直腸者宜之若燥屎在上者非其治也崔皋膽能潤腸醋能斂液故大便難者用之茵陳蒿湯第七十八茵陳蒿六兩梔子十四枚擘大黃二兩去皮上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿復減黃從小便去也小熱之氣涼以和之大熱之氣寒以取之茵陳梔子之苦寒以逐胃燥宜下必以苦宜補必以酸大黃之苦寒以下瘀熱發黃者熱之極也非大寒之劑則不澈其熱泄甚熱必以苦為主故以茵陳蒿之苦寒為君心法南方火而主熱梔子苦寒入心而勝熱故以為臣下必以苦推除邪熱必假將軍攻之故以大黃苦寒為使苦寒相得雖甚熱大毒分泄祛邪而解矣士材熱不得越鬱而發黃如橘子色者熱甚於外津液不行也非大寒之品不能澈其鬱熱茵陳酸苦梔子苦寒二物之性能使丙丁之邪屈曲下行黃為土之本色奪土鬱而無壅滯者大黃有專掌焉三物偕行而水泉湧決矣吳茱萸湯第七十九吳茱萸一升洗人參二兩生薑六兩切大棗十二枚擘上四味以水七升煮取二升去滓溫服七合日三服內經曰寒淫於內治以甘熱佐以苦辛吳茱萸生薑之辛以溫胃人參大棗之甘以緩脾海藏衝脈為病逆氣裡急宜吳茱萸湯主之震坤合見故其色綠仲景此湯及當歸四逆湯治厥陰及溫脾胃皆用之也崔皋少陰犯其寒者足少陰腎臟中寒陰寒甚故上格乎陽而吐腎主二便腎寒故大便不禁而利手足得陽而溫受氣於內者也內有陰寒故手足厥逆而冷煩躁者陰盛格陽陽氣內爭故陽煩而陰躁其為證亦危矣故欲死厥陰者肝也寒氣內格故嘔吐涎沐厥陰與督脈會於巔故頭痛吳茱萸辛熱而味厚經曰味厚者為陰故走下焦而溫少陰臣以生薑散其寒也佐以參棗補中虛也婁氏得湯反劇者當用生薑黃連治之庶仁丸第八十麻子仁二升杏仁去皮尖熬另作脂大黃各一兩去皮厚朴一斤去皮炙枳實炙芍藥各半斤上六味為末煉蜜為丸桐子大飲服十丸日三服漸加以和為度內經曰脾欲緩急食甘以緩之麻子杏仁之甘緩脾而潤燥津液不足以酸收之芍藥之酸以斂津液腸燥胃強以苦泄之枳實厚朴大黃之苦下燥結而泄胃強也腸潤結化津液還入胃中則大便和小便少而愈矣亮宸趺陽候胃浮者胃有物而陽強也澀者脾陰虛而津液不布但輸小便也夫脾主為胃行其津液者也今脾氣既弱冒中有物便多液少致大便不得潤降良由脾氣約束不行故也此方雖用大黃枳實以泄胃強但因燥而結無大熱故以麻仁潤燥而秘通芍藥收陰而泄結煉蜜之甘緩而作丸從乎中治也然不獨小便數者宜之凡汗出多津少燥結里無大熱者皆宜之入腑結於胃中非下除之不可脾約初不由胃但津液偏滲大腸中涸燥耳下之則愈損其液故必潤降而徐去之也梔子柏皮湯第八十一梔子十五個擘甘草一兩黃柏二兩上三味以水四升煮取一升半去滓分溫再服士材身黃者本子濕熱去濕熱之道莫過於清膀胱故用黃柏直入少陰以達膀胱之本投梔子導金水而下濟甘草入中調和升降剖別清濁庶幾直搗黃證之巢矣亮宸此治陽明濕熱而無瘀者不言無汗小便不利又無腹滿則里濕不甚但身黃髮熱則熱在肌肉黃柏苦寒最能清熱燥濕梔子引熱從小便去甘草生用亦瀉熱也瘀而不甚故用此和解之海藏仲景茵陳梔子大黃湯治濕熱也梔子柏皮湯治燥熱也如苗澇則濕黃旱則燥黃濕則燥之燥則潤之可也此二藥治陽黃也韓祗和李思訓治陰黃用茵陳附於湯大抵以茵陳為君而佐以大黃附子各隨其寒熱也健按海藏於茵陳梔子二湯分黃之濕燥核之經文一則腹微滿小便利一則身黃且發熱是濕黃燥黃之確證乃發千古未發之真諦也麻黃連軺赤小豆湯第八十二麻黃二兩去節連軺連翹根也二兩赤小豆一升杏仁四十個去皮尖生梓白皮一升大棗十二枚擘生薑二兩切甘草二兩炙以上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升分溫三服半日則盡內經曰濕上甚而熱治以苦溫佐以甘平以汗為故此之謂也煎用潦水者取其水味薄則不助濕氣也亮宸此治不得汗表氣閉熱因而內瘀者人之濕氣皆從郁遏而生如霧結云凝則土潤濕蒸風開云淨則天潔地燥矣人之表邪閉遏內生瘀熱大約似之所以內經曰開鬼門又曰風能勝濕也此以表郁為重故用麻黃杏仁薑棗甘草發其閉而開之閉則內熱連軺赤小豆以清熱利濕梓皮性寒亦以清閉遏之熱也全善梔子柏皮湯連軺赤小豆湯治身黃小便利而身不疼者海藏所謂干黃是也桂枝附子湯去桂加白朮湯治身黃小便不利而一身盡痛者活人所謂中濕也桂枝加芍藥湯第八十三於桂枝湯方內更加芍藥三兩通前共六兩余依桂枝湯法桂枝加大黃湯第八十四桂枝三兩去皮大黃一兩芍藥六兩生薑三兩甘草二兩大棗十二枚擘上六味以水七升煮取三升去滓溫服升日三服婁氏用四逆輩固所當然復用桂枝大黃大黃大寒何為用於陰經又兼桂枝寒熱相雜何也曰自利而渴者屬少陰為寒在下焦自利不渴者為太陰為寒在中焦以四逆等湯溫其臟此本經當用之藥也其太陽病反下之表邪未解乘虛傳於太陰因而腹滿時痛大實痛者桂枝加芍藥湯為宜嗣真太陰腹滿證有三有次第傳經之邪有直入本經之邪有下後內陷之邪不可不辨也麻黃附子細辛湯第八十五麻黃二兩去節細辛二兩附子一枚炮去皮破八片上三味以水一斗先煮麻黃減三升去沫內藥煮取三升去滓溫服一升日三服內經曰寒淫於內治以甘熱佐以苦辛以辛潤之麻黃之甘以解少陰之寒細辛附子之辛以溫少陰之經嗣真太陽病發熱頭痛其脈當浮今反沉少陰脈沉法當無熱今反熱仲景於此兩證各言反者謂反常也蓋太陽病而脈似少陰少陰病似太陽所以皆謂之反而治之不同也均是脈沉發熱以其有頭痛故為太陽病陽證脈當浮今反不浮者以裡虛久寒正氣衰微所致又身體痛故宜救里使正氣內復通邪出外且乾薑生附亦能發汗假使裡氣不虛寒則脈必浮而正屬太陽麻黃證矣均是脈沉發熱以其無頭疼故名少陰病少陰當無熱今反發熱則寒邪在表未轉於裡但以皮腠鬱閉為熱而在裡無熱故用麻黃細辛以發表間之熱附子以溫少陰之經假使寒邪入里則外必無熱當見吐利厥逆等證而正屬少陰四逆證矣由此觀之表邪發熱浮淺之反為輕正氣衰微脈沉之反為重此四逆不為不重於麻黃附子細辛湯也又可見熟附配麻黃發中有補生附配乾薑補中有發仲景之旨微矣崔皋病發於陰者當無熱今少陰病何以反發熱也此乃太陽表裡雙傳之證故耳蓋太陽膀胱與腎為表裡腎經虛則太陽之邪由絡直入腎臟餘邪未盡入里故表有發熱真寒入腎故里有脈沉外有太陽之表熱故用麻黃以發汗內有少陰之裡寒故用辛附以溫經觀子裡虛陰寒得以直入故始得之即脈沉表氣猶未至蕩盡故外發熱是兩感之外又一太陽少陰俱病之證矣然裡寒雖屬重證較鬱熱內克之兩感反有可治之機故處二湯以兼解之麻黃附子甘草湯第八十六麻黃二兩去節甘草二兩炙附子一枚炮去皮破上三味以水七升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓溫服一升日三服麻黃甘草之甘以散表寒附子之辛以溫寒氣嗣真仲景發汗湯劑各分輕重不同至少陰發汗二湯其第一證以少陰本無熱今發熱故云反也蓋發熱為邪在表而當汗又兼脈沉屬陰而當溫故以附子溫經麻黃散寒而熱須汗解故加細辛是汗劑之重者第二證既無裡寒之可溫又無裡熱之可下其所以用麻黃附子者唯是脈亦沉故曰少陰病亦發熱故行發汗藥然得之二三日病尚淺比之前證稍輕故不重言脈證而但曰微發汗所以去細辛加甘草是劑之輕者海藏體沉重加防己蒼朮以勝濕也體輕加石膏知母以勝熱也黃連阿膠湯第八十七黃連四兩黃芩一兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三物取二升去滓內膠烊盡小冷內雞子黃攪令相得溫服七合日三服陽有餘以苦除之黃連黃芩之苦以除熱陰不足以甘補之雞黃阿膠之甘以補血酸收也泄也芍藥之酸收陰氣而泄邪熱觀子雞清善清氣理咽故苦酒湯煮而用之雞黃則陰中之陰而又生用於寒藥之中以勝熱清者本上濁者本下所以物殊而功各不同也附子湯第八十八附子二枚去皮破茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服辛以散之附子之辛以散寒甘以緩之茯苓人參白朮之甘以補陽酸以收之芍藥之酸以扶陰所以然者偏陰偏陽因為病火欲實水當平之不欲偏勝也宇泰背惡寒者陰寒氣盛此條是也又或陽氣內陷有背微惡寒者經所謂傷寒無大熱口燥渴心煩背微惡寒白虎加人參湯主之是也一為陰寒氣盛一為陽氣內陷當於口中潤燥辨之仁齋附子乃陰證要藥凡傷寒傳變三陰及中寒夾陰雖身大熱而脈沉者必用之或厥冷腹痛脈沉細甚則唇青囊縮者亦急須用之有退陰回陽之力起死回生之功近世陰證傷寒往往疑似不敢用附子直待陰極陽竭而用之已遲矣且夾陰傷寒內外皆陰陽氣頓衰急用人參健脈以益其原佐以附子溫經散寒舍此不用何以救之桃花湯第八十九赤石脂一斤一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫服七合內赤石脂末方寸匕日三服若一服愈余勿服澀可去脫赤石脂之澀以固腸胃辛以散之乾薑之辛以散裡寒粳米之甘以補正氣丹溪仲景便膿血赤石脂乾薑為桃花湯者蓋謂病屬下焦血虛且寒非乾薑之溫石脂之澀且重不能止血用粳米者味甘引入腸胃不使重澀之體少有凝滯也仲醇凡泄利腸澼久則下焦虛脫無以閉藏其他固澀之藥性不能達下惟石脂體重而澀直入下焦陰分故為久利泄澼之要藥豬膚湯第九十豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和相得溫分六服豬水畜也其氣先入腎少陰客熱是以豬膚解之加白蜜以潤燥除煩加白粉以益氣斷利石山豬膚海藏以為鮮豬皮吳緩以為燖豬時刮下黑膚二說不同今考禮運疏革膚內厚皮也膚革外薄皮也其說為是膚者膚淺之義甘草湯第九十一甘草二兩上一味以水二升煮取一升半去滓溫服七合日二服桔梗湯第九十二桔梗一兩甘草二兩上二味以水三升煮取一升去滓分溫再服桔梗辛溫以散寒甘草甘平以除熱甘桔相合以調寒熱亮宸咽痛者邪客少陰之經而漸成熱也咽痛既不可發汗若寒之恐益其寒而下利作溫散之又益其氣惟甘草之甘平緩而解熱故用之不差者開利散郁之功少也以桔梗之苦升而發之則寒熱邪散而咽痛平矣觀子非少陰之虛則邪不直干於少陰之經未至臟寒己極則邪郁亦不復化熱少陰之脈貫肝膈入肺循喉嚨政陽熱結咽之道路故少陰之證多病於喉也然以寒藥治之無裡寒遂變真寒此惟以桔梗之苦辛清肺甘草之甘溫瀉火則熱調而痹痛解矣苦酒湯第九十三半夏洗破如棗核大十四枚雞子一枚去黃內上苦酒著雞子殼中上二味內半夏著苦酒中以雞子殼置刀環中安上火三沸去滓少少含咽之不差更作三劑辛以散之半夏之辛以發音聲甘以緩之雞子之甘以緩咽痛酸以收之苦酒之酸以斂咽瘡宇泰按苦酒本草注曰醢而成氏復云苦酒之酸余則以為名義俱乖安知酒之味苦者不可以已咽痛耶若嫌苦酒性熱則半夏湯更辛況此味苦哉下文發字斂字自相反士材少陰多咽傷咽痛之證古方用醋煮雞子主咽喉失音取其酸收宜也半夏辛燥何為用之蓋少陰寒證取其辛散一發一斂遂有理咽之功耶觀子半夏散郁發音聲卵白清氣除伏熱苦酒消壅腫散瘀解毒而理咽清音繆仲醇言常治少陰咽痛咽中生瘡聲不出用苦酒湯到咽即效因知古人立法非今人可及健按苦酒湯之治咽痛此最可疑夫少陰受寒曷為有此咽痛哉蓋少陰之脈循喉嚨寒結少陰則地氣不能上升廉泉玉英之道閉而津液不及上朝於母肺氣燥而咽喉故痛此陰伏於下陽亢於上之證也豈是苦酒湯之可治耶苦酒是醋酸斂之物肺所惡也半夏乃脾胃辛燥之藥欲其不燥必以薑製制之稍生反能嘎音亦肺所惡也腎為肺子母之所惡子豈悅之欲其展開喉之效理必不然況痛必傷腫咽喉乃呼吸之門五味之火上熏要害之地一遇辛酸其痛如割非別處可耐之比諸家盡稱其能愚獨不敢相信只宜辛涼以散甘緩治之庶幾無失其苦寒溫燥均非咽痛所宜明理者審之半夏散及湯第九十四半夏洗桂枝甘草炙各等分以上三味各搗篩已合治之白飲和服方寸匕日三服若不能服者以水一升煎七沸內散兩方寸匕更煎三沸下火小冷少少咽之寒淫所勝平以辛熱佐以甘苦半夏桂枝之辛以散經寒甘革之甘以緩正氣士材凡曰少陰病者必兼脈細乃知咽痛多是伏寒於少陰之經法當溫散此半夏桂枝之所由用也和以甘草蓋緩其熱耳若肺家實火而痛當與甘桔湯山梔葶藶及刺少商出血即愈健按內經曰人之傷於寒也則為病熱除直中真寒厥逆外大抵伏寒為熱者多此咽痛之所由作也前輩往往隨文釋義致後人膠執錯誤不少按半夏專主陽明太陰本草雖有辛能潤腎燥之說然非指少陰咽痛言也桂枝乃太陽中風表藥此曰少陰又無發熱之文何以欲其散少陰之咽痛經既殊途藥偏礙病士材謂其伏寒少陰少陰在下陰寒下伏上陽反越間隔之患前條言之詳矣苦酒湯尚且難用而況此方之辛熱乎素問云病所遠而中道氣味之者食而過之無越其制度也夫遠者恐其中道受藥之毒中道胃氣也毒者大毒小毒之劑治遠雖當猶慮其中道受累故必食而過之過者食前食後以俟遠近無使傷及於胃也若少陰果系伏寒而無咽痛亦非桂枝所主今乃咽痛焉能啜其辛熱之味則恐下未能遠達乎少陰之伏寒而上之咽痛先受反劇之近禍耳經藥俱悖於理萬難信用者也考雜病有少陰腎虛陰火上炎之咽痛足冷至膝者用七味湯引火歸原之法亦常反受其累茲屬傷寒不免毫釐千里況經無兼見脈證但曰少陰病咽中痛明是脫文而非不易之方也並此以明之白通湯第九十五蔥白四莖乾薑一兩附子一枚生用去皮破八片上三味以水三升煮取一升去滓分溫再服內經曰腎昔燥急食辛以潤之蔥白之辛以通陽氣薑附之辛以散陰寒崔皋是方也能散陰而通陽即蔥白而名白通耳兼善白通湯及白通加豬膽湯真武湯與通脈四逆湯皆為少陰下利而設除用薑附相同其餘之藥各異何也蓋少陰下利寒氣已甚非薑附不能治然下利之理無殊而兼有之證不一用藥故不同耳白通加豬膽汁湯第九十六蔥白四莖炮姜一兩附子一枚生去皮破八片人尿五合雄豬膽一合以上三味以水三升煮取一升去滓內膽汁人尿和令相得分溫再服若無膽亦可用內經曰若調寒熱之逆冷熱必行則熱物冷服下咽之後冷體消熱性便發由是病氣隨愈嘔噦皆除情且不違而致大益此和人尿膽汁鹹寒苦物於白通熱劑中要其氣相從則可以去拒按之寒矣兼善白通湯用附子凡四證惟真武湯一證熟用余皆生用何也凡附子生用則溫經散寒炮用則益陽除濕乾薑辛熱佐生附為用生薑辛溫少資熟附之功然白通等湯以下利為重其真武湯證以寒濕為先故用藥有輕重之殊耳瀕湖陽氣獨虛陰氣大勝純與陽藥恐陰氣拒格不得入故加膽汁等苦入心而通脈寒制肝而和陰不致拒格也凡用烏附藥並宜冷服者熱因寒用也蓋陰寒在下虛陽上浮治之寒則陰氣益甚治以熱則拒格不納熱藥冷飲此反治之妙也真武湯第九十七茯苓三兩芍藥三兩生薑三兩切白朮二兩附子一枚炮去皮破上五味以水八升煮取三升去滓溫服七合日三服若咳者加五味半升細辛乾薑各一兩氣逆者咳五味子之酸以收逆氣水寒相搏則咳細辛乾薑之辛以散水寒若小便利者去茯苓小便利則無伏水故去茯苓若下利者去芍藥加乾薑二兩芍藥之酸泄氣乾薑之辛散寒亮宸下利更甚則裡寒極矣故去芍藥之寒加乾薑之熱以佐附子若嘔者去附子加生薑足成半斤氣逆則嘔附子補氣生薑散氣千金曰嘔家多服生薑為聖藥脾惡濕甘先入脾茯苓白朮之甘以益脾逐水寒淫所勝平以辛熱濕淫所勝佐以酸平附子芍藥生薑之酸辛以溫經散濕真武北方水神也水氣在心下外帶表而屬陽必應發散故治以真武湯青龍湯主太陽真武湯主少陰少陰者腎水此湯可以治之真武之名得矣真武主少陰之水亦治太陽之悸夫脾惡濕腹有水氣則不治脾欲緩甘以緩之則土調故以茯苓甘草為君白朮甘溫為臣經曰濕淫所勝佐以酸辛故以芍藥生薑為佐經曰寒淫所勝平以辛熱故以附子為使然水氣內漬散行不一則變證多端故立加減之法咳者水寒射肺也肺氣逆則以五味子酸收之肺惡寒則以細辛乾薑辛潤之小便利去茯苓以其滲泄也下利則去芍藥以其酸澀也加乾薑者散其寒也嘔者必因於氣逆附子益氣故去之生薑散氣故加之兼善真武湯治少陰二三日至四五日腹滿小便不利四肢重痛自利者為有水氣故多或為之證水為寒濕腎實主之腎病不能制水水飲停畜為寒濕內甚四肢重痛為寒濕外甚小便不利濕甚而水穀不分也茯苓白朮之甘以益脾逐水薑附芍藥之酸辛以溫經散濕太陽篇中小青龍湯亦有水氣故多或為之證如少陰真武湯不殊此理也通脈四逆湯治少陰下利清穀手足厥逆脈微欲絕者裡寒身熱不惡寒面赤者為外熱此陰盛格陽於外與通脈四逆湯以散陰通陽其或為之證依加減法治之以上四逆俱下利而各不同故其用藥因宜而各別也通脈四逆湯第九十八甘草三兩炙附子大者一枚生用去皮破八片乾薑三兩強人可四兩上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖蔥味辛以通陽氣腹中痛者去蔥加芍藥二兩芍藥之酸通寒利腹中痛為氣不通也嘔者加生薑二兩辛以散之嘔者為氣不散也咽痛者去芍藥加桔梗一兩咽中如結加桔梗則能散之利止脈不出者去桔梗加人參二兩利止脈不出者亡血也加人參以補之經曰脈微而利亡血也四逆加人參湯主之脈皆相應乃可服之念莪此湯與四逆湯同但倍乾薑耳加蔥者以通陽氣加芍藥者以和營衛加生薑者以散逆氣加桔梗者以散結氣加人參者以補肺氣仁齋或問陰證傷寒用附子必冷服何也此陰極於下陽浮於上之治法也余曾治一傷寒十餘日脈細沉手溫而足冷大便不通面赤嘔煩渴藥不能下惟喜涼水一二口或西瓜一塊食下良久吐出此陰甚於內逼其浮陽失守之火聚於胸中上衝咽嗌故為面赤煩嘔也遂用大附子一枚以生薑自然汁和麵裹煨熟去皮尖切以人參三錢炮二錢水煎浸冷與之而愈按內經云若調寒熱之逆云云蓋近世陰證傷寒往往疑似參差初不敢用附子直待陰極陽竭而用已遲矣故凡治法有是病投是藥豈可狐疑而誤治哉且挾陰傷寒先因欲事伏陰於內卻又著寒外內皆陰陰氣獨盛則陽氣頓衰故脈沉足冷須急用人參健脈以益元氣佐以附子溫腎經散寒邪以退陰而回陽也舍此將何以救乎諺云傷寒偏死下虛人誠哉是言許學士云必以真武為主乃人命之根蒂若不察元氣之虛實而欲急攻其熱或妄施汗下或誤用寒涼外熱未去陰寒復生病遂不救良可悲矣四逆散第九十九甘草炙枳實破水漬炙乾柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服內經曰熱淫於內佐以甘苦以酸收之以苦發之枳實甘草之甘苦以泄裡熱芍藥之酸以收陰氣柴胡之苦以發表熱咳者加五味子乾薑各五分並主下利肺寒氣逆則咳五味子酸收逆氣乾薑之辛散肺寒並主下利者肺與大腸為表裡也上咳下利治則頗同經所謂上則為咳下則為利為痛是也悸者加桂枝五分悸者氣虛而不能通行心下築築然悸動也桂猶圭也引導陽氣苦熱以使小便不利者加茯苓五分茯苓味甘而淡用以滲泄腹中痛者加附子一枚炮令拆裡虛遇邪則痛加附子以補虛泄利下重者先以水五升薤白三升煮取三升去滓以散三方寸匕內湯中煮取一升半分溫再服泄利下重者下焦氣滯也加薤白泄氣滯論云四肢者諸陽之本陽氣不足陰寒加之陽氣不相順接致手足不溫而成四逆此湯發陽氣散陰寒溫經暖肌故以四逆名之此奇制之大劑也四逆屬少陰少陰者腎也腎腑位遠非大劑不能達內經曰遠而奇偶制大其服此之謂也觀子少陰四逆既為陽邪入里何以咳悸諸證反惟暖藥之加蓋少陰之與厥陰厥逆雖同而熱伏之淺深不同厥陰之厥深熱深者燥屎聚非下不可者也厥微熱微者雖未入腑里有極熱者也二者豈少陰比少陰四逆而猶有咳悸痛諸或為之證因其邪結尚淺證亦表裡雜見而不定藥以柴胡澈表枳實和里不同承氣白虎之施而惟從乎中治者豈非經既陰而熱氣淺所慮者駸駸陰進而長之勢既無大實之難攻亦非熱極在腹然則炮附薑桂之投又何疑焉烏梅圓第一百烏梅三百個黃連一斤乾薑十兩桂枝黃柏細辛附子炮人參各六兩當歸蜀椒各四兩去核上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下圓如梧子大先食飲服十圓日三服稍加至二十圓禁生冷滑物臭食等肺主氣肺欲收急食酸以收食之烏梅之酸以收肺氣脾欲緩急食甘以緩之人參之甘以緩脾氣寒淫於內以辛潤之以苦堅之當歸桂椒細辛之辛以潤內寒寒淫所勝平以辛熱薑附之辛熱以勝寒蛔得甘則動得苦則安黃連黃柏之苦以安蛔士材凡治蛔勿使甘甜之物蓋蛔得甘則動得苦則安得酸則軟得辛則伏乾薑桂附溫臟寒也人參當歸補胃虛也當歸四逆湯第一百一當歸芍藥桂枝細辛各三兩甘草通草各二兩大棗二十五枚擘上七味以水八升煮取三升去滓溫月匠一升日三服內經曰脈者血之府也諸血皆屬於心通脈者必先補心益血苦先入心當歸之苦以助心血心苦緩急食酸以收之芍藥之酸以收心氣肝苦急急食甘以緩之大棗甘草通草之甘以緩陰血念莪手足厥寒者陽氣外虛不能潤於四末脈細欲絕者陰血內弱不能充於經隧桂枝細辛調衛外之陽氣當歸芍藥和營內之陰血通草宣和通其陰陽甘草緩中和其營衛則陰陽均受劑厥寒有不愈者乎崔皋手足厥寒脈細欲絕則陽氣外虛陰血內弱可知矣然此自表入里傳至厥陰始終只是陽證與直中陰經者不同故不用吳萸薑附輩而用桂枝湯加當歸細辛通草明者自得之當歸四逆加吳茱萸生薑湯第一百二當歸芍藥桂枝各三兩甘草炙通草各二兩生薑半斤切大棗二十五枚吳茱萸二升上九味以水六升清酒六升和煮取五升去滓溫分五眼叔和一方水酒各四升念莪證雖同上但久寒之陽氣益弱非生薑茱萸不能溫於四末然不用四逆何也為手足厥寒邪猶淺也崔皋曰久寒則陳久之寒非時下直中之寒也明矣安道仲景言四逆與厥者非一或曰四逆或曰厥或曰厥逆厥冷厥寒或曰手足逆冷手足厥逆手足厥冷手足厥寒此是言寒冷耳故厥逆二字每每互言未嘗分逆為不溫厥為冷也然四肢四字與手足字亦有所分以四字加逆之上者是通指手足臂脛而言也以手足字加厥逆厥冷等上及無手足字者是獨指手足言也蓋厥逆雖俱為寒冷卻有陰陽之殊熱極而厥冷陽極似陰也仲景以四逆散寒藥治之是也寒極而厥逆者獨陰無陽也仲景雖無四逆湯熱藥治之之條然四逆湯之名由四肢之逆冷而立可不類知乎但四逆之為湯與散有寒有熱而四肢通冷比之手足獨冷則有間矣仲景曰少陰病吐利煩躁四逆者死又曰四逆惡寒而蜷脈不至不煩而躁者死少陰病吐利手足厥冷煩躁欲死者吳茱萸湯三條二為死一為可治雖通諸證而言可治者以厥冷言死者以四逆言可見四逆重於厥冷矣成氏謂厥甚於逆豈不謬歟宇泰凡言四逆或言厥逆者皆為重證蓋舉四肢而言耳言指頭寒四肢厥與逆與冷者皆為厥微其病之淺深輕重皆寓於書法中不可不審也又曰自熱至溫自溫至厥乃傳經之邪四逆散主之厥而大便閉小便赤或大便黑脈沉而滑此為陽證似陰白虎湯甚者大承氣湯不可誤投也節庵或曰人之手足乃胃土之末凡脾胃有熱手足必熱脾胃有寒手足必冷理之常也雖傷寒厥深熱亦深厥微熱亦微之論何耶曰胃寒手足冷胃熱手足熱病之常也若夫極則變不可以常道拘矣蓋亢則害承乃制火氣亢極反兼水化陰陽反復病之逆從故有此象耳凡經言厥逆厥冷厥寒手足寒冷等語皆變文耳不可以論輕重若言肢冷則有異也厥冷直至臂脛以上其為真寒無疑急用薑附等溫之少緩則難療謂其上過乎肘下過乎膝非有真寒達於四肢而何然更當以脈與所兼之證參之庶斃無誤凡厥逆兼之腹痛腹滿泄利清白小便清口不渴惡寒戰慄面如刀刮者皆寒證也若腹滿後重泄利稠黏小便赤澀渴而好飲者皆熱證也觀子辨厥逆之要有三其一辨熱厥寒厥之異先發熱後得厥從熱至厥也為熱厥一起便得厥冷獨陰無陽也為寒厥若寒厥之後反得發熱者為陰極陽生厥必愈矣仲景言熱厥者五條以氣不宣通熱未深入但當散傳陰之邪者主少陰之四逆散以陽陷伏深但有極熱里無實結宜養陰退陽主厥陰之白虎湯失於汗下傳久入腑氣血不通陰陽否隔非攻除不可者主厥應下之之大小承氣湯後賢又以熱厥易誤必辨以陰中涵陽厥冷中或心胸有熱或指爪甲卻暖或手心仍熱者方為熱厥使更參之以證別之以脈而二厥猶有遁情乎其一辨手足冷與四肢冷之異但手足厥寒冷者厥微寒亦微也上過乎肘下過乎膝四肢皆厥逆者厥深寒亦深也仲景以厥冷厥寒厥逆逆冷變文而言先賢謂未可因是而分重輕然言寒厥者三十四條其中屬不治者十條而四逆厥逆遂冷者居其五又脈微欲絕無脈陰極格陽之危證無不厥且逆焉是不特凡言四肢者重於手足而然凡言逆者不為不重於厥與寒冷也其一辨但厥冷與厥不知人之異內經言厥之狀與病能非一傷寒不但厥者陰陽之氣不相順接手足逆冷而已其最甚者曰四逆蓋病之重輕無不從手足之僅冷與時膝並冷以辨之然此亦只言寒厥耳若熱厥往往有暴不知人厥狀如屍者亦謂之厥其於仲景奚屬哉外此復有平脈內所言屍厥考之目瞑無知卒昏迷者古謂之鬱冒即今之厥證也然內經言諸虛乘寒則為厥鬱冒不仁本篇又言下利清穀者必鬱冒汗出而解必微厥其鬱冒之與厥果一耶二耶厥不知人之厥與但厥冷之厥果有殊治耶同治耶又按暴不知人之熱厥或當亟瀉其陽或攻除其閉或厥一二日而復甦或終不治而死仲景雖未詳言要其治法亦不越乎各條之內是又不可不知者也麻黃升麻湯第一百三麻黃二兩半去節升麻一兩一分當歸一兩一分知母黃芩萎蕤各八十銖石膏碎白朮乾薑芍藥天門冬去心桂枝茯苓甘草炙各六銖上十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取二升去滓分溫三服相去如炊三斗米頃令盡汗出愈玉函曰大熱之氣寒以取之熱甚之氣汗以發之麻黃升麻之甘以發浮熱正氣虛者以辛潤之當歸薑桂之辛以散寒上熱者以苦泄之知母黃芩之苦涼心去熱津液少者以甘潤之茯苓白朮之甘緩脾生津肺燥氣熱以酸收之以甘緩之芍藥之酸以斂逆氣萎蕤天冬石膏甘草之甘以潤肺除熱士材以芍藥甘草制肝以天冬萎蕤潤肺更以石膏清胃勿使東方之邪犯中氣也乾薑黃連黃芩人參湯第一百四乾薑黃連黃芩人參各三兩上四味以水六升煮取二升去滓分溫再服辛以散之甘以緩之乾薑人參之甘辛以補正氣苦以泄之黃芩黃連之苦以通寒格士材上焦寒則吐下焦寒則利為醫所傷遂成寒格以乾薑散寒人參補正氣此正治也其芩連者寒因寒用為嚮導之兵此從治也健曰既為寒格而以芩連為嚮導則不當等其分兩應以乾薑為君人參為佐芩連為使使者之職不合等其主帥白頭翁湯第一百五白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈更服一升內經腎欲堅急食苦以堅之利則下焦虛是以純苦之劑堅之崔皋寒者除熱苦者厚腸四藥皆苦寒故治熱利而療下重觀子白頭翁善止毒利秦皮能除虛利故與連柏同為厚腸泄瀉之品吳氏曰下利紫血鮮血者此湯宜之四逆加人參湯第一百六於四逆湯方內加人參一兩余依前法理中丸第一百七人參甘草炙白朮乾薑各三兩上四味搗篩為末蜜和九如雞黃大以沸湯數合和一丸研碎溫服之日三服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服內經曰脾欲緩急食甘以緩之用甘補之人參白朮甘草之甘以緩脾調中寒淫所勝平以辛熱乾薑之辛以溫散寒心肺在膈上為陽肝腎在膈下為陰脾胃應土處於中州在五臟曰孤臟在三焦曰中焦一有不調此丸專治故曰理中脾欲緩緩中益脾必甘為主是以人參之甘溫為君脾惡濕溫中勝濕必以甘為助是以白朮之甘溫為臣甘先入脾脾不足以甘補之是以甘草之甘平為佐喜溫惡寒者胃也胃寒則中焦不治是以乾薑之辛溫為使加減法若臍上築者腎氣動也去朮加桂四兩脾虛腎氣築動於臍上內經曰甘者令人中滿朮甘壅補桂泄奔豚是以相易也健按此稱桂應是肉桂能入肝腎命門補真火不足而除痼冷沉寒益陽消陰制木生土非桂枝屬太陽膀胱經藥比也觀成注能入腎治奔豚則知是肉桂矣吐多者去朮加生薑三兩嘔家不喜甘故去朮嘔家多服生薑以辛散之健曰吐多者胃氣必傷用術猶能保胃也下多者還用術悸者加茯苓二兩下多者用術以去濕悸者加茯苓以導飲渴欲得水者加朮足前成四兩半津液不足則用術甘以緩之也腹中痛者加人參足前成四兩半裡虛腹痛加人參以補之健曰凡腹痛不利於補故曰痛無補法專指腹痛而言此條不但理中丸之可補而更加參何也夫治腹痛當察其上中下三段部位及痛處緩急有無停滯空實可按不可按喜冷喜暖之分核之脈舌面色如果脈虛而遲唇舌淡白喜按喜暖者方可用補並要究其二便之利不利庶無干礙否則稍有阻滯誤矣寒者加乾薑足前成四兩半寒淫所勝平以辛熱腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升微自溫勿發揭衣被胃虛則壅塞腹滿甘令人中滿是以去朮附子之辛以補陽散壅脾胃居中病則邪氣上下左右無病不至故有諸加減法氣壅而不泄則築然動白朮味甘補氣去之則氣易散動者欲作奔豚桂辛以散之能入腎治奔豚故加之氣上逆則吐術甘而壅非所宜也姜辛而散為聖藥氣泄而不收則下多術甘而補能使正氣收而不泄飲聚則悸茯苓之滲泄伏水以除津液不足則謁術甘以補津液裡虛者腹痛補可去之人參之屬是也寒用乾薑辛能散也氣鬱腹滿為之治滿術甘補則去之附子辛散故加之四逆加豬膽汁湯第一百八於四逆湯方內加入豬膽汁半合余依前法服如無豬膽以羊膽代之燒褌散第一百九上取婦人中褌近陰處剪燒灰以水和服方寸匕日三服小便即利陰頭微痛而愈婦人病取男子褌襠燒灰兼善易病之為合陰陽感動餘邪則其人正氣本虛故能染著同用燒褌散以誘安正氣正氣安餘邪自平矣枳實梔子豉湯第一百十枳實三枚炙梔子十四枚擘豉一升上三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗枳實梔子豉湯則應為吐之劑此云覆令微自汗出以其熱聚於上者苦則吐之熱散於表者苦則發之內經曰火淫所勝以苦發之此之謂也宇泰傷寒之邪自外入勞復之邪自內發汗吐下隨宜施治牡蠣澤瀉散第一百十一牡蠣熬澤瀉栝蔞根蜀漆洗去腥葶藶熬商陸根熬海藻洗去咸以上各等分上七味異搗篩為散更人臼中治之白飲和服方寸匕小便利止後服日三服鹹味湧泄牡蠣澤瀉海藻之咸以泄水氣內經曰濕淫於內平以苦佐以酸辛以苦泄之蜀漆葶藶栝蔞商陸之酸辛與苦以導腫濕竹葉石青湯第一百十二竹葉二把石膏一斤半夏半升洗人參三兩甘草二兩炙粳米半升麥門冬一升去心上七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服辛甘發散而除熱竹葉石膏甘草之甘辛以發散餘熱甘緩脾胃而益氣麥冬人參粳米之甘以補不足辛者散也氣逆者欲其散半夏之辛以散逆氣
