body:
  text: 傷寒直指卷三辨太陽病脈證治上第五太陽之為病脈浮頭項強痛而惡寒經曰尺寸俱浮太陽受病太陽主表為諸陽主氣脈浮頭項強痛而惡寒者太陽表病也觀子太陽者巨陽也為諸陽之長主氣於表故脈浮其經從頭下項行身之背邪中之則頭項強痛惡寒傷於寒則惡之也蓋邪初入人尚在腠理而太陽為經病在表故脈與證應之太陽病發熱汗出惡風脈緩者為中風風陽也風則傷衛衛為陽衛外者也病則不能衛固其外而皮腠疏故汗出而惡風也傷風脈緩者風性懈緩故也健曰脈浮而緊為傷寒脈浮而緩為傷風皆太陽經表證然傷寒為陰邪傷營腠理閉故無汗而惡寒傷風為陽邪傷衛腠理疏故自汗而惡風如是分別古人稱中風即傷風通稱非真中風太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒經曰凡傷於寒則為病熱為寒氣客於經中陽氣怫結而成熱也中風即發熱者風為陽也傷寒或未發熱者寒為陰邪不能即熱鬱而方變熱也風則傷衛寒則傷營衛虛者惡風營虛者惡寒營傷寒者必惡寒也氣病則麻血病則痛風令氣緩寒令氣逆體痛嘔逆者營中寒也經曰脈盛身寒得之傷寒脈陰陽俱緊者知其傷寒也觀子緊者氣為寒束寒性斂縮陽不得伸故脈形切急如絞繩要略曰寒則令脈急是也傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也太陽主表一日則太陽受邪至二日當傳陽明若脈微則不傳陽明矣胃經受邪則喜吐寒邪傳裡者則變熱如頗欲吐若煩躁脈數急者為太陽寒邪變熱傳於陽明也傷寒二三日陽明少陽證不見者為不傳也傷寒二三日無陽明少陽證知邪不傳止在太陽經中也太陽病發熱而渴不惡寒者為溫病發熱而渴不惡寒者陽明也太陽受邪知為溫病非傷寒也積溫成熱所以發熱而渴不惡寒也觀子內經曰冬傷於寒春必溫病經曰不即病者寒毒藏於肌膚至春變為溫病東垣又曰冬傷於寒者冬行秋令當寒而溫火勝而水虧矣當春之月陽已外泄孰為發生腎水內竭孰為滋養身之所存熱耳故為溫病夫受病之由既殊所發之時又異雖頭痛發熱項強同是太陽經病豈可於傷寒之太陽證以治哉曰不惡寒過時而發在表者輕也口渴熱鬱已深在裡者重也然則有從同之裡證而有必不可同之表藥矣經但例其端而未竟其旨其治法與入里之證不一再見豈非散失已多乎健曰溫病乃傷寒至春而發之變證茲不言春字而入於太陽經篇疑是冬溫乃傷寒類也觀子引東垣之說明系冬溫而不同傷寒變溫之溫矣然其不惡寒而渴似熱邪已入陽明之象故云有從同之裡證有必不可同之表藥尚可與太陽論治乎傷寒賦曰冬溫總是時行加乎調燮宜以葛根兼石膏湯治之則熱解而汗泄渴止矣若發汗已身灼熱者名曰風溫風溫為病脈陰陽懼浮自汗出身重多眠睡息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期傷寒發汗己則身涼若發汗已身灼熱者非傷寒為風溫也風傷於上而陽受風氣風與溫相合則傷衛脈陰陽俱浮自汗出者衛受邪也衛者氣也風則傷衛溫則傷氣身重多眠睡者衛受風溫而氣昏也鼻息必鼾語言難出風溫外盛而氣壅不利也若被下者則傷臟氣太陽膀胱經也內經曰膀胱不利為癃不約為遺溺癃者小便不利也太陽之脈起目內眥內經曰瞳子高者太陽不足戴眼者太陽己絕小便不利直視失溲為下後竭津液損臟氣風溫外勝經脈欲絕也為難治若被火者則火助風溫成熱微者熱瘀而發黃劇者熱甚生風如驚癇而瘛瘲也先曾被火為一逆若更以火熏之是再逆也一逆尚可延引時日而不愈其再逆者必致危殆故云促命期也觀子按風溫有二發汗已身猶灼熱者曰風溫本條所列是也若序例之熱未已更遇於風者亦為風溫一言證一不言證一言脈陰陽俱浮一言陽脈浮滑陰脈濡弱雖其間或有不同然皆以冬傷於寒至春病溫之際復感於風風與溫二氣相合而成則所謂前病未已更感異氣變為他病自當依壞證施治被下火熏有不犯深成者乎健曰此條承上文溫病而來當溫之際發汗已身猶灼熱不退必復中風邪名為風溫故脈陰陽俱浮而現證如是則非傷寒所致明矣觀子謂當依壞證而治非也既非傷寒傳變應作時氣論治疏風瀉熱涼以解之列之太陽篇中亦差也病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六故也陽為熱陰為寒發熱而惡寒寒傷陽也無熱而惡寒寒傷陰也陽法火陰法水火成數七水成數六陽病七日愈者火數足也陰病六日愈者水數足也觀子此以有熱無熱辨陰證陽證之大綱也陽得數奇陰得數偶陽道常盈故至七日邪始衰陰道常縮故至六日而邪衰也元禮幾治傷寒先辨陰陽二候不可誤也陽經有三太陽陽明少陽是也陰經有三太陰少陰厥陰是也經之陰陽以臟腑言腑為陽膀胱胃膽是也臟為陰脾腎肝是也病之陰陽即邪之陰陽陰氣陽氣是也健曰邪之陰陽風寒暑濕是也治之陰陽表裡汗下是也無不有陰陽之分也太陽病頭痛至六七日已上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈傷寒自一日至六日傳三陽三陰經盡至七日當愈經曰太陽病衰頭痛少愈若七日不愈則太陽之邪再傳陽明針足陽明為迎而奪之使經不傳則愈觀子既日一日太陽脈靜者不傳煩躁數急者傳二三日陽明少陽證不見者不傳則日傳一經之旨言之甚晰叉云太陽病七日行其經盡何耶蓋是傳經之微妙實有二種之不同也一日一經六日遞六經者即序例之太陽受病一二日發陽明受病二三日發及此處首節二節所云皆日過一經而傳之常也若二日不傳陽明三日不傳少陽者則始終只在一經矣只在一經故太陽七日者亦但頭痛而已此在序例有之曰更不傳經不加異氣者七日太陽病衰頭痛少愈是也病衰少愈者即行其經盡自愈之謂也然七日經盡不愈者亦有之不愈則太陽必傳於陽明所謂再經是也再經者此經不已再過一經非六經已遍復始太陽陽明之為再也夫此由太陽以入陽明之傳頗同而七日欲愈未愈衰微之邪與一日即傳熾邪其相去奚止徑庭哉故刺以通其經氣而可收勿藥之愈成氏未達其旨遂謂六日傳至厥陰此七日復始太陽為再經噫謬矣此日過一經之傳與七日始過一經之傳仲景序例及太陽與三陽之末靡不分舉而詳之人自不之察耳其詳具於後論茲不備述健曰經稱太陽病至六七日以上自愈者以行其經盡也直達太陽日過一日至經盡而愈明矣若作再經則遞傳陽明而陽明將受傳邪故刺以絕其經氣使不入陽明而太陽病則解矣林氏歷舉序例反復以闢成氏之謬甚當若認為日傳一經則三日傳遍三陽六日傳遍三陰已成下證豈有再傳返至太陽之表者乎一言遂立剖矣後人惑於成氏誤注故特詳辨而政之太陽病欲解時從己至未上己為正陽則陽氣得以復也始於太陽終於厥陰六經當三時解而太陽從己至未陽明從申至戌少陽從寅至辰太陰從亥至醜少陰從子至寅厥陰從醜至卯者以陽行也速陰行也遲陽主於晝陰主於夜陽三經解時從寅至戌以陽道常饒也陰三經解時從亥至卯以陰道常乏也內經曰陽中之太陽通於夏氣則己午未太陽乘旺時也風家表解而不了了者十二日愈中風家發汗解後未全快暢者十二日大邪皆去六經悉和則愈觀子桂枝之和營衛必不如麻黃微表之快迅且風家既以多汗亡陽損氣則真元不能遽復七日不盡了了十二日卦氣再周無不安矣言只當靜養以俟勿妄攻治也病人身大熱反欲得近衣者熱在皮膚寒在骨髓也身大寒反不欲近衣者寒在皮膚熱在骨髓也皮膚言淺骨髓言深皮膚言外骨髓言內身熱欲近衣表熱裡寒也身寒不欲近衣表寒裡熱也南陽熱在皮膚寒在骨髓仲景無治法宜先與陽旦湯寒己次以小柴胡加桂以溫其表寒在皮膚熱在骨髓仲景亦無治法宜先與白虎加人參熱除次以桂枝麻黃各半以解其外大抵病有標本治有先後表熱裡寒者脈須沉遲手或微厥下利清穀也所以陰證亦有發熱四逆湯通脈四逆湯主之表寒裡熱者脈必滑而厥口燥舌乾也所以少陰惡寒而踡時時自煩不欲厚衣用大柴胡下之而愈此皆仲景之餘議也太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒漸漸惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之陽以候衛陰以候營陽脈浮者衛中風也陰脈弱者營氣弱也風並於衛則衛實而營虛故發熱汗自出也經曰太陽病發熱汗出者此為營弱衛強是也嗇嗇不足也惡寒之貌漸漸灑淅也惡風之貌衛虛則惡風營虛則惡寒營弱衛強惡寒復惡風者以自汗則皮膚緩腠理疏是亦惡風也翕翕熇熇然熱也若合羽所覆言熱在表也鼻鳴乾嘔者風壅而氣逆也與桂枝湯和營衛而散風邪觀子此言脈浮發熱自汗惡風寒鼻鳴乾嘔之為中風宜主桂枝湯言衛實者邪氣實衛虛者正氣虛也健曰陽浮陰弱本從脈言而合營衛以辨傷寒中風二者之異因陽脈浮雖自汗出而邪猶在表也因陰脈弱雖於嘔而邪未入里也兩言即能顯豁應桂枝湯和其營衛太陽病頭痛發熱汗出惡風者桂枝湯主之頭痛者太陽也發熱汗出惡風者中風也與桂枝湯解散風邪觀子此言頭痛發熱汗出惡風之亦為中風宜桂枝湯主之太陽病項背𠘧𠘧反汗出惡風者桂枝加葛根湯主之𠘧𠘧者伸頸之貌動則伸頸搖身而行項背強者動則如之項背𠘧𠘧者當無汗今反汗出惡風者中風表虛也與桂枝湯以和表加葛根以祛風謙甫𠘧𠘧項屈而且強也明理論謂短羽烏不能飛騰動則伸引其頸之貌甚得之蓋不能左右回視之義宇泰詩赤寫𠘧𠘧𠘧𠘧絇貌謂拘也取自拘持低首不妄顧視之義按此可想見項背拘強之狀矣成氏謂伸頸搖頭而行反不切拘強之義後葛根湯乃桂枝湯中加麻黃葛根也其證無汗故以麻黃加之此證有汗故去麻黃而曰桂枝加葛根湯觀子此項與背強且𠘧𠘧焉則非復太陽證矣膀胱之脈夾背者四行由邪氣盛實而極故背強而𠘧𠘧則知侵入者必多而陽明之證已將具矣二陽經邪既熾則邪並而外實衛何由虛曰反汗出惡風者中風之邪未除也中風必解肌是以仍主桂枝法兼迎而奪之故加葛根耳健曰項背強汗出惡風原是太陽傷風自汗之證未解故汗出而猶惡風𠘧𠘧若平人失枕之狀有似乎痙不但中風且兼濕並桂枝加葛主於仲景後人用之者少變通之法海藏神術加防風可療之太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之太陽病屬表而反下之則虛其里邪欲乘虛傳裡若氣上衝胸者里不受邪而氣逆上與邪爭也則邪仍在表故當復與桂枝湯解外其氣不上衝者裡虛不能與邪爭邪氣已傳裡也故不可更與桂枝攻表觀子此言誤下而裡氣實不受邪陷仍與桂枝湯太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之太陽病三日中曾經發汗吐下溫針虛其正氣病仍不解者謂之壞病言為醫所壞不可復與桂枝湯審觀脈證隨所逆而救之宇泰逆者謂不當汗而汗不當下而下或汗下過甚皆不順於里故云逆也王韓諸家以壞病另作一證為羊肉湯主之誤矣觀子此言壞病之不宜桂枝也桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也脈浮發熱汗出惡風者中風也可與掛枝湯解肌脈浮緊發熱不汗出傷寒也可與麻黃湯常須識此勿妄治也觀子此言傷寒之不宜桂枝而應麻黃若酒客病不可與桂枝湯得湯則嘔以酒客不喜甘故也酒客內熱喜辛而惡甘桂枝湯酒客得之則中滿而嘔觀子酒客之不可例用桂枝明矣喘家作桂枝湯加厚朴杏子仁太陽謂諸陽主氣風盛氣壅則生喘也與桂枝湯以散風加厚朴杏仁以降氣觀子此言喘家不可例用桂枝健曰喘出於肺何列於太陽篇中而以桂枝乎蓋因風中於表無汗發泄皮毛之氣壅塞干動於肺而為喘也既喘則風乘火熾豈可以桂枝辛溫作治耶不若三拗湯加芩之妙也凡服桂枝湯吐者其後必吐膿血也內熱者服桂枝湯則吐如酒客之類也既亡津液只為熱所傳其後必吐膿血而為肺痿要略曰熱在上焦為肺痿謂或從汗或嘔吐重亡津液故得之健曰觀要略之言則知喘家不當用桂枝明矣太陽病發汗遂漏不止其人惡風小便難四肢微厥難以屈伸桂枝加附子湯主之太陽病因發汗遂汗漏不止而惡風者為陽氣不足因發汗陽氣益虛而皮腠不固也內經曰膀胱者州都之官津液藏焉氣化則出小便難者汗出亡津液陽氣虛弱不能施化也四肢者諸陽之本四肢微急難以屈伸者亡陽而脫液也針經曰液脫者骨屬屈伸不利與桂枝加附子湯以溫經復陽太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之脈來數時一止復來者名曰促促為陽盛則不因下後而脈促者也此下後脈促不得為陽盛矣太陽病下之脈促不結胸者此為欲解此下之後脈促而復胸滿則不得為欲解由下後之陽虛表邪漸入而客於胸中也與桂枝湯以散客邪通行陽氣芍藥益陰陽虛非所宜故去之陽氣己虛若更加之微惡寒則必當溫劑以散之故加附子活人芍藥味酸脈促胸滿恐成結胸故去芍藥單用辛甘之味發散毒氣也健曰脈促胸滿已屬裡熱下證此不言他故而言下後脈促胸滿是不應下而誤下之也誤下之則邪從內陷裡熱更深故脈至促而胸至滿矣若進桂枝加附夫乃以熱濟熱吾斯未信也謂其微惡寒而去芍亦非殊下思脈促者熱邪內結營血大傷衛氣不能外衛故覺惡寒經所謂大熱在內大寒必伏於外豈特微惡者哉與陽虛表弱者不同論也若用此湯勢必助虐其禍叵測況病情脫略非仲景原文仲景雖西北人然病機有一定之理如此法恐難遵信也前輩隨文敷衍茲不得不辨如驗舌胎焦乾芒刺則是調胃承氣證如胸胃拒按則是小陷胸證未可遂投熱劑以致毫釐千里且傷寒而至脈促裡熱己極亦危候矣太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必發癢宜桂枝麻黃各半湯傷寒八九日則邪傳再經又遍三陽欲傳三陰之時也傳經次第則三日傳遍三陽至四日陽去入陰不入陰者為欲解其傳陰經第六日傳遍三陰為傳經盡而當解其不解傳為再經者至九日又遍三陽陽不傳陰則解如瘧發作有時也寒多者為病進熱多者為病退經曰厥少熱多其病為愈寒多熱少陽氣退故為進也今雖發熱惡寒而熱多寒少為陽氣勝而邪氣少也里不和者嘔而利今不嘔清便自調者里和也寒熱間日發者邪氣深也日一發者邪氣復常也日再發者邪氣淺也日二三發者邪氣微也內經曰大則邪至小則平言邪甚則脈大邪少則脈微今日數多而脈微緩者是邪氣微緩也故云欲愈脈微而惡寒者表裡俱虛也陽表也陰里也脈微為裡虛惡寒為表虛以表裡俱虛故不可更發汗更下更吐也陰陽俱虛則面色清白反有熱色表未解也熱色為赤色得小汗則和不得汗則邪氣不能外散皮膚而為癢也與桂枝麻黃各半湯小發其汗以除表邪宇泰此論當分三段看自首至寒少為自初至今之證下文皆防擬之辭至欲愈是不須治至吐也是宜溫之至末是小汗之麻黃髮桂枝止一發一止則汗不得大出矣健曰傷寒八九日如瘧脈微等證雖屬過經不解為將愈之候也成氏欲申說傳經之旨而以九日為再經謬矣若至再經豈能得欲愈之脈證耶所云六日傳遍三陰已成下證豈有復返三陽之表者乎仲景再傳之旨從內經一日一經之數至第六日則六經之病氣當解如不解則初太陽而次陽明陽明不解則傳少陽以及三陰而證危矣非謂六日至厥陰七日復轉太陽九日仍是少陽為再經也其義已悉前章觀子說約而後卷名論詳剖即此證既言不可汗吐下又何以各半為劑耶只與小柴胡定能療之矣太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈煩熱也服桂枝湯後當汗出而身涼和若反煩不解者風甚而未能散也先刺風池風府以迎太陽之經而泄風氣後與桂枝湯解散而愈潔古衛為陽主表陽維受邪亦病在表二穴乃陽維之會故服桂枝後尚自汗發熱脈寸浮尺弱反煩為病在陽維宜先針此二穴也觀子太陽諸陽之長陽維諸陽之會此不但病在太陽而陽維亦病者桂枝不能兼解陽維之邪故服反煩須瀉此二穴而並治之始愈服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯經曰如服一劑病證猶在日當復作本湯服之服桂枝湯汗出後脈洪大者病猶在也若形如瘧日再發者邪氣客於營衛之間也與桂技二麻黃一湯解散營衛之邪觀子如瘧日再發二三發者寒熱隨作隨止也邪氣更移欲解之候也其猶有流連營衛之間而不即從汗去者則一二各半湯輕和之劑以調之既無餘邪不解之患亦無發汗太過乏弊矣服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之大汗出脈洪大不渴邪氣猶在表也可更與桂枝湯若大汗出脈洪大而煩渴不解者表裡有熱不可更與桂枝湯可與白虎加人參湯以生津止渴和表散熱三陽曰前條脈洪大者不渴此條脈洪大而頒渴不解故二湯不同觀子白虎為陽明大熱而設脈浮發熱無汗邪猶在表也故戒不可與表證罷渴欲飲水里有大熱明矣故與之若大渴乾燥而煩表裡俱熱及口燥渴心煩二證熱氣炎灼焦膈已甚雖有惡風微惡寒之證直須與之不可謂猶有表不解也況惡風曰時時惡寒曰背微惡與但在表者自異也至於大汗出後大煩渴脈洪大一條尤為白虎證具矣然但邪熱者白虎湯證元氣已傷津液已涸者加人參湯證也白虎與葛根俱陽明要藥此以外帶表邪及從太陽以入陽明故遂出太陽篇中其陽明篇反缺二湯之證則知仲景書遺扶多矣健曰觀子論精理切大汗後脈洪大而煩渴不解乃血耗津枯得白虎加參清熱止渴陰陽兩益者矣太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可更汗宜桂枝二越婢一湯宇泰前脈微緩以各半湯小汗之者猶未弱也此脈微弱則虛於前證矣雖小汗亦不宜故曰不可更汗決辭也然病在陽表證未罷桂枝之藥終不可無但不令汗而已亮宸夫發熱惡寒者宜汗解其熱多寒少為陽邪盛若單用麻桂辛熱之劑以取汗則邪氣愈盛而不散正氣愈閉而不舒故用石膏於桂枝湯中少佐麻黃取其涼以散之使邪氣易解而脾氣得越故曰越婢也然亦須審脈浮數或浮大者方宜此若脈微弱是陽氣虛也陽既虛再用麻桂能無蹈汗多亡陽肉瞤筋惕之逆乎故曰此無陽不可更汗又所以重誡之耳卿子無陽二字宜審謂脾氣不發越耳又云寒少故桂枝少熱多故石膏多健曰此證發熱惡寒熱多寒少脈微弱而曰不可更汗是已經發汗於前而熱不解寒猶在之謂也又曰此無陽謂其脈微也乃元氣不充發熱惡寒之證應與小柴胡和之可解何必列於太陽篇中而以越婢為治令人不解服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂加茯苓白朮湯主之頭項強痛翕翕發熱雖經汗下為邪氣仍在表也心下滿微痛小便利者則欲成結胸今外證未罷無汗小便不利心下滿微痛為停飲也與桂枝湯以解外加茯苓白朮利小便行留飲觀子病在表者固頭痛項強發熱無汗然水飲內畜致經絡不利者亦頭項強痛翕然無汗是病異而證頗同也夫何以知留飲之為患耶以服桂及下後其證仍在則非太陽為邪明矣證兼心下滿微痛小便不利非內有飲畜而何桂枝去桂者病不在表也加茯苓白朮法專行水也宇泰或問頭項強痛此邪在表之恙雖經汗下而未解何故去桂加茯苓白朮是無意於表矣曰此非桂枝證乃屬飲家也夫頭項強痛既經汗下而不解心下滿而微痛小便不利此為水飲內畜邪不在表故去桂而加苓朮若得小便利水飲行胸滿減而熱自除則頭項強痛悉愈矣且如十棗湯證頭亦痛乃邪熱內畜而有伏飲故不須攻表但宜逐飲飲盡則病安矣健曰此證蓋太陽風濕為病既經汗下而仍發熱頭項強痛胸滿小便不利者何也想因病熱之際恣飲水漿或平昔多酒挾濕或體肥向有痰飲壅於中焦則胃之清陽不能上升而頭痛濁陰不能下降而溺澀法當清痰燥濕仲景雖未明言留飲而用苓朮其旨微矣然不必仍謂桂枝去桂使人岐惑而苓朮並難用也諸家但循文衍釋未悉致飲之由何致項強頭痛耶夫飲者水類水聚則濕盛因於風則相搏於太陽之經而項則強頭則痛矣治宜海藏神術合二陳以去其表裡之邪因其有似乎痙而兼心下滿故必祛風勝濕庶胃氣行三焦通而水飲俱化傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之脈浮自汗出小便數而惡寒者陽氣不足也心煩腳攣急者陰氣不足也陰陽氣血俱虛則不可發汗若與桂枝攻表則又損陽氣故為誤也得之便厥咽中干煩躁吐逆者先作甘草乾薑湯復其陽氣得厥愈足溫乃與芍藥甘草湯益其陰血則腳脛得伸陰陽雖復其有胃燥譫語少與調胃承氣湯微溏以和其胃重發汗為亡陽加燒針則損陰內經曰營氣微者加燒針則血不流行重發汗復燒針是陰陽之氣大虛四逆湯以復陰陽之氣嗣真發汗漏風小便難與自汗小便數二證相似仲景恐人誤認故重出一章以明之首一證云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸桂枝附子湯主之蓋是因邪發汗遂漏不止乃服汗藥太過非自汗也惡風者餘邪未盡也小便難四肢急者亡津液筋失所養也乃汗多亡陽外虛經氣病帶表邪不在裡也故宜附子溫經桂枝解表芍藥益血舒筋也此一證云云蓋是脈浮為虛也汗自出微惡寒者陽虛無以衛外也小便數為下焦虛寒不能制水也心煩為陰虛血少也腳攣急乃血為汗奪筋無以潤也此初得病便表裡俱虛外無陽證病不在表是虛虛也得之便厥咽乾煩躁吐逆為寒格而上也故宜乾薑以溫里復陽甘草芍藥益其汗奪之血然後可以復陰陽不足之氣得腳伸後或譫語者由自汗小便數胃家先自津液乾燥又服乾薑性熱之藥以致陽明內結譫語然此非實邪大滿故但用調胃承氣以調之原其芍藥甘草乃是厥愈足溫後專治兩脛攣急之藥非正治脈浮自汗便數之藥也蓋嘗玩味而細繹焉自常人觀之豈不日自汗小便數證又無自利遽用於姜溫之以致燥結譫語而又用大黃芒硝寒藥以解熱似若失次殊不知仲景之意不患乎乾薑之熱惟患乎正氣之虛正氣之長邪氣之所由消也且自汗便數等證為表裡俱虛治法為先復其陰陽不足之正氣非乾薑芍藥甘草不可至正氣已復而內有所主則雖胃燥譫語不過大便內結大黃芒硝潤而去之則正氣內強不致下脫結燥而得安矣以上用藥次第先熱後寒先補後瀉似逆而實順非仲景之妙孰能至是後之學者不以推廣而應變又何暇辨病家之謬謗也耶復庵此證為一陽中寒蓋邪中膀胱經虛寒也宜桂枝加附子湯則愈健曰此條病情舛錯方治無倫即曰仲景原論亦是設辭未必有是證也縱有之須在誤與桂枝便厥上看總非可溫之證矣夫厥有陰陽寒熱之分經曰厥深熱深厥微熱微乃大法也此言與桂枝便厥者其為熱厥明甚且得之便咽乾煩躁吐逆熱證蜂起而復與甘草乾薑姜雖止吐而礙咽甘草反作嘔而引吐因其皆可和胃故得厥愈足溫但更熱甚譫語如舌無胎腹無垢何可遽投承氣至重發汗復燒針者氣血兩耗陰衰陽亢而更與四逆非補養氣血之劑寒熱混施汗下失序豈是仲景原文獨嗣真以為非仲景之妙孰能至是此未明根柢之言也就此而論屬陽明家病不當列於太陽篇中脈浮自汗無頭痛發熱者非太陽中風也故與桂枝而便厥其誤明矣顯系熱邪內郁陽明津液空乏故咽乾煩躁便數譫語腳攣諸證畢具皆因以熱犯熱營衛受傷陽明失其總司法惟清熱潤燥人參白虎為宜若云姜附四逆必致孤陽獨亢而成厥竭者已復庵又謂為一陽中寒說更謬矣夫一陽少陽也少陽乃中清之腑無中寒證且以一陽為膀胱虛寒其認經已誤豈能復察病情況中寒從無便數心煩脈浮自汗之理愚者尚不出此乃斯言之玷也問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而譫語師曰言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛觀子夫桂枝證脈浮緩也緩則風邪今脈浮而大則為虛豁可知風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈陽旦桂枝別名也前證脈浮自汗出小便數心煩微惡寒腳攣急與桂枝證相似是證象陽旦也與桂枝而增劇得寸口脈浮大浮為風邪大為血虛即於桂枝湯加附子以補虛增桂今汗出以祛風其有治之之逆而增厥者與甘草乾薑湯陽復而足溫更與芍藥甘草湯陰和而脛伸表邪已解陰陽已復而有陽明內結譫語須亂少與承氣微溏以和胃則陰陽之氣皆和內外之邪悉去故知病可愈觀子此條與前證治頗同而文則互見以明其義也前條詳於言證及誤後救逆諸脈而終不言正治之屬何藥且既有脈浮自汗微惡寒其為表虛而風傷明甚何以投桂枝即厥燥大錯乎夫證本疑似而治法更雜若不明晰其故後學何所領承此重出問答以釋其由也曰脈浮而大但浮者當責風兼大者當責虛虛而有風邪若徒以形證象桂枝而施陽旦以再渴其外能免虛虛之禍乎此數語已將似桂枝而不可誤投桂枝之義說得了然曰因加附子忝其間者正治法也蓋桂枝加附子湯本治陰陽而外挾風邪之正藥使知此而加附子以忝之即可溫經而安和不知此而反增桂必且汗出亡陽夫證既近似而藥復不遠只一加附子與不加附子便霄壤之隔仲景於此類必俟人深造自得故其辭秘其義隱也若以溫經句接讀加附子句亡陽句接增桂枝句讀去便易明矣既申明成誤之故又指出當用之劑誤後諸藥自可忝觀而得所以更不重言其義而惟就前文點綴以結之耳健曰是問欲明前條治誤增劇之故答以寸口脈浮而大為風為虛夫浮大在人迎則屬表而用桂枝之證今浮大在寸口乃是胃虛挾熱而脈自浮也因汗多亡陽誤令厥逆而現諸證皎然矣汗為血化雖曰亡陽實屬陰耗凡浮大之脈陰必傷陰虛陽亢則內燥而咽乾煩譫以成陽明結熱兩條病概在此一句為經文大旨陽明內燥胃氣不能輸津充達四肢故兩脛自然拘急夜半陽生陰長病氣少退胃氣少轉則足能伸豈姜附為功之證耶或以為姜附扶陽益陰之藥似是實非彼草木之資豈能及天地絪縕之氣終難免以熱濟熱之累不得不使承氣復解其結然細審之於證於脈於治法皆反復錯亂仲景或設言以防微杜漸或因散佚而局法紛更未可信為成驗而效此以誤人也觀子明知之而隱斥之曰證本疑似治法更雜又曰辭甚秘義甚隱俟後人深造自得此皮裡春秋若待健直指以明之者辨太陽病脈證治中第六太陽病項背𠘧𠘧無汗惡風葛根湯主之太陽病項背𠘧𠘧汗出惡風者中風表虛也項背強𠘧𠘧無汗惡風者中風表實也表虛宜解肌表實宜發汗是以葛根湯發之也觀子此證疑屬寒傷營之久而欲傳者成雲中風表實豈以證惡風與方之仍兼芍藥薑棗耶夫傷寒惡風者多矣傷寒復汗皆桂枝湯安可因是決其為中風哉曰項背𠘧𠘧則侵入陽明者自深奪陽明則太陽之邪悉去故主葛根湯猶有無汗惡風之表證在則麻黃類亦不可少耳健曰項背𠘧𠘧無汗惡風乃風濕所郁正應海藏神術太陽與陽明合病必自下利葛根湯主之傷寒有合病有並病本太陽病不解並於陽明者謂之並病二經俱受邪相合病者謂之合病合病者邪氣甚也太陽陽明合病與太陽少陽合病陽明少陽合病皆言必自下利者以邪氣並於陰則陰實而陽虛邪氣並於陽則陽實而陰虛寒邪氣甚容於二陽二陽方外實而不主裡則裡氣虛故必下利與葛根湯以散經中之邪損庵或曰太陽表未解而陽明裡又至兩陽相合熱甚於表乘虛漸攻於裡故下利也其不下利而嘔者邪氣雖攻裡未入於胃但氣逆而嘔故加半夏以止逆氣龐氏曰外證必頭痛腰疼肌熱目疼鼻乾脈浮大而長浮大太陽也長陽明也頭腰太陽也肌目鼻陽明也太陽與陽明合病不下利但嘔者葛根加半夏湯主之邪氣外甚陽不主裡裡氣不和氣下而不上者但下利而不嘔裡氣上而不下者但嘔而不下利與葛根湯以散其邪加半夏以下逆氣太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯主之經曰不宜下而便攻之內虛熱入協熱遂利桂枝證者邪在表也而反下之虛其腸胃為熱所乘遂利不止邪在表見陽脈邪在裡見陰脈下利脈微遲邪在裡也促為陽盛雖下利而脈促者知表未解也病有汗出而喘者為自汗出而喘也即邪氣外甚所致喘而汗出為因喘而汗出也即裡熱氣逆所致與葛根黃芩黃連湯散表邪除裡熱宇泰汗出而喘不已者外邪壅盛使氣不利既邪猶在表雖經汗下亦可發之故與麻黃杏仁甘草石膏湯喘而汗出邪氣內攻氣逆不利既邪氣在裡雖表未解止可和之故與葛根黃芩黃連湯健曰太陽而曰桂枝證是中風表病也誤下則邪乘虛入遂利不止而喘且汗表未解而邪已內陷故其脈促用此清解之法理也成氏言促為陽盛作表之陽邪未解而以此湯為解表之劑謬矣後人能無因之而認他證之促亦為表脈其誤多矣太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之此太陽傷寒也寒則傷營頭痛身疼腰痛以至牽連骨節疼痛者太陽經營血不利也內經曰風寒客於人使人毫毛畢直皮膚閉而為熱寒在表也風並於衛衛實而營虛者自汗出而惡風寒也寒並於營營實而衛虛者無汗而惡風寒也以營強衛弱故氣逆而喘與麻黃湯以發其汗觀子此言發熱頭痛體痛骨痛無汗之為傷寒宜主麻黃湯按桂枝證曰乾嘔麻黃證曰喘非風主嘔而寒主喘也首條傷寒內曰體痛嘔逆桂枝湯曰喘家加厚朴杏子則寒未嘗不嘔風未嘗不喘也又桂枝亦有惡寒麻黃亦有惡風昔人謂傷風惡風傷寒惡寒殆未盡然太陽與陽明合病喘而胸滿者不可下宜麻黃湯主之陽受氣於胸中喘而胸滿陽氣不宣發壅而逆也心下滿腹滿者皆為實當下之此以為胸滿非裡實故不可下雖有陽明然與太陽合病為屬表是與麻黃湯發汗叔微有人病傷寒脈浮長喘而胸滿身熱頭痛腰脊強鼻乾不臥予曰太陽陽明合病仲景有三證若喘而胸滿者麻黃湯也治以麻黃得解太陽病十日以去脈浮細而嗜臥者外己解也設胸滿脅痛者與小柴胡脈但浮者與麻黃湯十日以去向解之時也脈浮細而嗜臥者表邪已罷也病雖未已和解之若脈但浮而不細者邪猶在表也與麻黃湯發散之觀子十日以去當再傳三陰之時不入陰經者陽盡欲解也浮者得陽脈也細者邪氣微也浮而且細者陰陽並見而和同嗜臥者身無他患精神欲復也故為已解其猶有餘邪之未盡在半表裡則小柴胡和之在表則麻黃散之經曰傷寒差後更發熱者小柴胡主之脈浮者以汗解之即此類矣傷寒再汗即主桂枝湯者已經汗解後邪氣必微慮過竭表氣也此雖十日之外脈猶但浮必邪氣仍在故當重與麻黃湯解表也惟其邪之重輕不惟其日惟其病真聖人轉圓之法歟健曰既與小柴胡後脈但浮而無發熱字樣何可再與麻黃況十日以去外解而嗜臥者乃汗後血虛陽上浮而陰氣未復懶倦之象脈無根柢之勢也當與養榮湯以斂其浮越之陽即胸滿脅痛亦因血虛氣溢肝來犯胃小柴胡中應加歸芍莫謂其浮也而可麻黃莫謂其列於太陽而可言表若此則難免虛虛之禍矣太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也此中風見寒脈也浮則為風風則傷衛緊則為寒寒則傷營營衛俱病故發熱惡寒身疼痛也風並於衛者為營弱衛強寒並於營者為營強衛弱今風寒兩傷則營衛俱實故不汗出而煩躁也與大青龍湯發汗以除營衛風寒若脈微弱汗出惡風者為營衛俱虛反服大青龍則必亡陽或生厥逆筋惕肉瞤此治之逆也活人此證脈似桂枝反無汗病似麻黃反煩躁也凡陰氣少陽氣勝則熱而煩故太陽傷於風必煩而躁觀子風傷衛桂枝治之寒傷營麻黃治之此風寒兩傷營衛俱病者則大青龍湯是也既營衛俱病矣其但見寒脈與寒證何也曰此雖兩傷而寒邪復勝故但見脈之浮緊與證之惡寒身熱無汗也寒勝矣其煩躁何也夫寒邪既閉固於腠理風邪未有不壅於內者風陽也陽壅成熱煩者內熱也躁者身熱也風寒之邪交熾於營衛之中豈輕劑所能勝任非君麻黃以解表臣石膏以澈里安能一雨濟亢極之陽哉然此為營盛者設也若脈微弱汗出惡風一表虛營弱證耳既無交熾難解之邪麻黃以竭之石膏以寒之中外俱虛有不厥逆瞤惕哉傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之此傷寒見風脈也傷寒者身疼此以風勝故身不疼中風者身重此以兼寒故乍有輕時不發厥吐利無少陰證者為風寒外甚也與大青龍以發散表中風寒觀子此亦兩傷而復風邪勝者也浮緩者風勝但見風脈也傷寒營血不利當身疼邪未傳裡不當身重身不疼但重者陽熾而熱氣內薄也然寒伏於營非風邪所竟傷故乍有輕時夫身重脈緩殊類陰證更寒氣在裡當厥逆吐利無少陰證知風寒但熾於營衛之中而陽熱已盛也故亦以大青龍發之傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之傷寒表不解心下有水飲則水寒相摶肺寒氣逆故乾嘔發熱而咳針經曰形寒飲冷則傷肺以其兩寒相感中外皆傷故氣逆而上行此之謂也與小青龍湯發汗散水水氣內漬則所傳不一故有或為之證增損以解化之健曰是證仲景為表不解水停心下用此治法後人難解其意核諸證總因表無汗出熱邪入里故乾嘔咳利喘噎俱作是熱傳陽明上迫於肺下移於腸兼漬於膀胱而少腹且滿內則溺澀不利外則腠理不疏邪氣無從發泄即無水而水氣不得不停而為患皆系熱邪所致何可以小青龍之辛溫酸斂不幾藉寇兵而齎盜糧矣如後條之發熱不渴服湯已反渴者益見以熱助熱之驗獨此二條諸家何無忝發豈忽此而不辨歟抑疑似而難斷歟成氏謬引針經形寒飲冷傷肺之說逮非此證之熱迫於肺而喘且渴者可同日語須治以葶藶定喘湯加石膏則輕可去實庶毛孔開汗可泄水可逐氣可順溺可行喘可定而滿可除矣此雖屬手太陰之主劑然能瀉足太陽陽明之良藥也或曰水性寒水停故謂之水寒相摶而竟忘其所病傷寒已發熱之變證為哉傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之咳而微喘水寒射肺也發熱不渴者表證未罷也與小青龍湯發表散水服湯已渴者裡氣溫水氣散為欲解也健曰此比前證稍輕既欲發表散水而方中有辛辣酸斂之薑桂細辛芍藥五味豈是喘咳所宜亦非散水之物服已而反渴益見其助熱之弊前條辨之概詳就其文義小青龍湯句應在微喘發熱之下則服湯已渴者此寒去欲解而無別辭也若曰與湯復渴而更以是湯主之非誤而何太陽病外證未解脈浮弱者當以汗解宜桂枝湯脈浮弱者營弱衛強也觀子此脈浮弱之外證未解必從汗解故主桂枝湯太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之下後大喘則為裡氣大虛邪氣傳裡正氣將脫也下後微喘則為裡氣上逆邪不能傳裡猶在表也與桂枝湯以解外加厚朴杏仁以下逆氣太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之經曰未發汗而復下之為逆也若先發汗治不為逆觀子此言中風外證未解之可汗不可下主桂枝湯太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之經曰柴胡湯證具而以他藥下之柴胡湯證仍在者與柴胡此雖已下之不為逆則其類矣觀子此言誤下而表證仍在者宜復用桂枝湯太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之脈浮緊無汗發熱身疼痛太陽傷寒也雖至八九日而表證仍在亦當發其汗既服發散藥雖未作大汗亦微除也煩者身熱也邪氣不為汗解鬱而變熱故煩也目受血而能視營氣既傷血為熱搏肝氣不治故目瞑也劇者熱甚於經迫血妄行而為衄則熱隨血散而解陽氣重者熱氣重也與麻黃湯以解前太陽傷寒之邪也文祿此與下條同看上條陽氣重即下條所謂不得越也下條不徹即上所謂微除也麻黃瀉實故主之兼善或謂經言衄家發汗汗出必額上陷今衄家之證皆贅麻黃其下何也夫太陽脈浮緊發熱無汗自衄者愈此一定論也何故復用麻黃以汗之曰麻黃湯主之五字合應列當發其汗之下蓋以汗之文法用藥諸方類皆贅於本條之下觀子此發熱身痛無汗之傷寒至八九日熱氣甚重雖服麻黃湯必顯劇必得衄而解健曰成云熱搏陰血肝氣不治此不治是肝盛不和也肝開竅於目目得血而能視血熱氣盛則目昏冒而畏陽光故瞑也汗不外泄邪熱搏血上干請道而為衄經所謂陽絡傷則血溢而上出病熱傷陽衄出於鼻俗名紅汗至則其邪可解既衄矣則奪血者無汗當涼血清熱以瀉陽邪何可仍以麻黃髮汗不畏其亡陽者乎兼善謂麻黃句應在當發其汗之下則理順矣太陽病脈浮緊發熱身無汗自衄者愈風寒在經不得汗鬱而變熱衄則熱隨血散故云自衄者愈觀子此言當汗不汗而得衄即解可見汗即是血二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒宇泰大柴胡湯若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈葛根湯何以知汗出不徹以脈澀故知也太陽病未解傳併入陽明而太陽證未罷者名曰並病續自微汗出不惡寒者為太陽證罷陽明證具也法當下之若太陽證未罷者為表未解則不可下當小發其汗先解表也陽明之經循面色緣緣正赤者陽氣怫鬱在表也當解之熏之以取其汗若發汗不出者不足言陽氣怫鬱止是當汗不汗陽氣不得越散邪無從出壅甚於經故躁煩也邪循經行則痛無常處或在腹中或在四肢按之不可得而短氣但責以汗出不散更發汗則愈內經曰諸過者切之澀者陽氣有餘為身熱無汗是以脈澀知陽氣壅鬱而汗出不徹也宇泰因太陽故當汗因並陽明故當下小發先字最有次第仲景之樞機也下之大小承氣汗之麻黃等湯觀子張兼善曰並者催併督並之義乃前病未已後病又至有逼促相併之勢故曰並如果並作一家則仲景不具兩經之證而言也其非並字明矣夫病起二經三經齊病曰合病病起一經未罷一經隨至曰並病如律書二事併發之義若作此經併入彼經則是傳經病而非並病矣要處在證已罷證未罷別之此節分三段看至不惡寒是一段言轉屬陽明者之不得為並病也太陽初得汗四語已悉前陽明中言由太陽汗出不徹轉屬入腑是太陽證己罷此復曰續微汗出不惡寒是陽明證又具雖不言下而當下之意已明故下文於證不罷者反足其意曰不可下也若此者緣既經發汗止為傳經不為並病矣至解之熏之是一段政太陽與陽明並病之證也太陽證不罷則太陽之邪猶在安可攻裡然陽明之邪已熾安可發汗曰小發汗而與解之熏之以除怫鬱在表之邪既不失太陽當汗復不失陽明之不可大汗也若發汗不徹至末一段言汗出不徹之正當重汗亦不得為並病也已經發汗則非陽氣怫鬱之比矣汗之不徹必躁煩短氣痛無定處之證隨作然只一更汗可除非如並病之但可小汗解熏也何以辨之汗不徹者脈必澀非再汗邪奚自去乎是知未汗則為並病已汗則為轉屬陽明未汗則為陽氣怫鬱在表已汗即為汗出不徹汗不徹者更汗之轉屬者必下除之未汗者可小發汗怫鬱者解之熏之邪由不同為病自不同而施治亦不同矣脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈經曰諸脈浮數當發熱而灑淅惡寒言邪氣在表也是當汗出愈若下之身重心悸損其津液虛其胃氣若身重心悸而尺脈實者則下后里虛邪氣乘虛傳裡今尺脈微身重心悸者知下后里虛津液不足邪氣不傳裡但在表然津液不足則不可發汗須裡氣實津液足便自汗而愈矣脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗何以知之然以營氣不足血少故也針經曰奪血者無汗尺脈遲者為營血不足故不可發汗南陽先以小建中加黃耆如尺尚遲再一劑次以柴胡湯桂枝二越婢一湯和解之脈浮者病在表可發汗宜麻黃湯浮為輕手得之以候皮膚之氣內經曰其在皮者汗而發之脈浮而數者可發汗宜麻黃湯浮則傷衛數則傷營營衛受邪為病在表故當汗散觀子麻黃湯必脈浮緊而見證甚重者宜之此但脈浮及浮數耳又無前條諸證何以亦主麻黃湯蓋浮者太陽受病邪氣在表非與發汗則太陽之邪奚從解乎不惟其證惟其脈故特舉而明之病嘗自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故爾以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯風則傷衛寒則傷營衛受風邪而營不病者為營氣和也衛既客邪不能與營氣和諧亦不能衛護皮腠是以嘗自汗出與桂枝湯解散風邪調和營衛則愈觀子此言中風自汗之傷衛而不傷營故主桂枝湯病人臟無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯主之臟無他病里和也衛氣不和表病也外臺云里和表病汗之則愈所謂先其時者先其發熱汗出之時發汗則愈也宇泰時發熱者有時而發熱也時作時止病流連不愈候其時止而與之曰先其時也素問曰因其衰也事必大昌其此之謂歟觀子此言發熱自汗而時作時止宜先其未作迎而奪之之意故主桂枝湯傷寒脈浮緊不發汗因致衄者麻黃湯主之傷寒脈浮緊邪在表也當與麻黃湯發汗若不發汗則邪無從出壅熱於經迫血妄行因致衄也三陽曰奪血者無汗既致衄不可輕用麻黃湯須審之如點滴不成流者斯可觀子此言雖得微衄而邪重未解必再主麻黃湯夫衄必分點滴成流成流者邪氣已散不須服藥上條自衄者愈是也點滴者邪猶在經當散其邪用麻黃湯非治衄也邪去衄自止矣傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不從里仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯不大便六七日頭痛有熱者故宜當下若小便清者知里無熱則不可下經曰小便數者大便必硬不更衣十日無所苦也況此不大便六七日小便清者不可責邪在裡是仍在表也與桂枝湯以解外若頭疼不已為表不罷郁甚於經迫血妄行上為衄也丹溪外證未解不可下下之為逆今頭痛有熱宜解表反與承氣正是責其妄下之過也故下文又言小便清者知其無里不當行承氣又繼之曰當鬚髮汗頭痛必衄不復告誡論意甚明而成注曰故宜當下想因六七日不大便耳雖不大便他無所苦俟表解然後攻之正仲景法注意似未瑩健曰傷寒頭痛有熱無論便與不便明是在表理當發汗若無汗仍頭痛者勢必衄衄至當自解即或未解亦不必再與桂枝溫劑應行清解法前章言之詳矣傷寒發汗已解半日許復煩脈浮數者可更發汗宜桂枝湯主之煩者熱也發汗身涼為已解至半日許身復熱脈浮數者邪不盡也可更發汗與桂枝湯亮宸汗後若見他證即當易方今仍見表證表脈不嫌復汗但有汗之太過其麻黃峻駛故復汗多用桂枝傷寒本不主桂枝此以解後復煩且得脈浮數非邪盛表實可比與桂枝湯所謂和其營衛則愈之義故凡屬再汗者主桂枝皆同此旨也健曰按仲景曰煩者成注皆稱為熱此謂其表未退而身復熱非也竊以為煩者不安之貌不耐煩也當與躁燥渴虛等字相連則煩之稱屬裡熱居多若雲表熱何不稱仍熱發熱身熱而曰已解復煩雖脈浮數而無頭痛等證蓋因汗去營虛內火外越故煩也且煩字從火豈宜更用桂枝若未汗之前得脈浮數或可與之既汗之後浮主表虛數主裡熱矣理當益營清熱以小柴胡合人參白虎湯和解之自可安己凡病若發汗若吐若下若亡津液陰陽自和者必自愈重亡津液則不能作汗必待陰陽自和乃自愈矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈因亡津液而小便不利者不可以藥利之俟津液足則小便自利而本原自復也下之後復發汗必振振寒脈細所以然者以內外俱虛故也發汗則表虛而亡陽下之則裡虛而亡血振寒者陽氣微也脈微細者陰血弱也下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之下之虛其里汗之虛其表既下又汗則表裡俱虛陽旺於晝陽欲復虛不能勝邪正邪交爭故晝日煩躁不得眠陰旺於夜陰旺陽虛不能與之爭是夜安靜不嘔不渴者里無熱也又無表證而脈沉微知陽氣大虛陰寒氣勝與乾薑附子湯退陰復陽健按下後亡陰而復汗奪其血此營氣大虛衛氣孤立之候也晝日陽旺無陰以濟之故煩躁不得眠矣衛氣者晝行於陽夜行於陰晝不得與營氣合故目不瞑至夜陰旺營與衛合則安靜而眠矣既不身熱脈沉微無表證全是營血虛而不能受任陽光毫無邪氣為患何成住稱陽虛不能勝邪陰旺不能與爭認作陽氣大虛陰寒獨勝而以姜附能退陰復陽其意不過宣揚姜附本領然於病情未協尚未知耳殊不思仲景書非全壁證治不符者多故許叔微有師仲景法未嘗守仲景方之心印要在融會貫通若刻舟求劍反似是而非就此證皆緣亡陰不能濟陽豈宜姜附復亢其陽必致愈爍其陰而更增煩躁理當人參養榮湯扶陰益陽為中病之劑脈之沉微可起且沉微而無遲字何以姜附為哉況姜附但能去寒引經回陽不能補本以生氣血此既無邪應從脈而扶陽益陰發汗後身疼痛脈沉遲桂枝加芍藥生薑各一兩人參三兩新加湯主之汗後身疼邪氣未盡也脈沉遲營血不足也經曰其脈沉者營氣微也遲者營氣不足故也與桂枝湯以解未盡之邪加芍藥生薑人參以益不足之血兼善或謂經言表邪盛身疼痛脈浮緊法當汗自身痛皆表邪未盡此又加參芍生薑以益血何也夫表邪盛則身疼痛血虛則身亦痛其脈浮緊者邪盛也其脈沉微者血虛也盛者損之則安虛者益之則愈仲景凡言發汗後以外無表證里無實證止余身痛一事而已若脈稍浮盛表邪未盡解也今言沉遲此血虛致然宜新加湯以益血卿子經曰其脈沉者營氣微又曰脈遲為營中寒故脈沉遲知營氣不足而寒猶勝也健曰觀二家之論則知前條的是營血虛而非陽氣虛也況脈無遲字姜附之不可用明矣此以脈沉遲身痛乃虛而且寒應與此湯以和氣血並可加當歸為佐發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之發汗後喘當作桂枝加厚朴杏仁湯汗出則喘愈今汗出而喘為邪氣壅甚桂枝不能發散故不可更行桂枝湯汗出而喘有大熱者內熱氣甚也無大熱者表邪必甚也與麻黃杏仁甘草石膏湯以散其邪兼善觀仲景嘗言發汗後乃表邪悉解止餘一證而已故言不可行桂枝湯今汗出而喘無大熱乃上焦餘邪未解當用麻黃杏仁甘草石膏湯以散之夫桂枝加厚朴杏仁湯乃桂枝證悉具而加喘者用之注言汗出而喘以為邪氣壅甚非桂枝所能發散此誤也況身無大熱更無他證何故復言表邪必甚其後章下後不可更行桂枝湯條下注曰汗下雖既不當損正氣則一其言有至理存焉可見汗後所注之誤矣原其理當時因事發機前後失於照應故有此等之弊也文祿成注謂不可更行解表恐貽之熱耳故復庵云審知邪熱未解雖經汗下宜石膏竹葉湯又云太陽汗解後不復行暖劑亮宸此汗後熱壅於經也桂枝所以治風今汗後風已變熱桂枝湯甘補而性熱不可再行矣汗出而喘熱壅於肺也無大熱者裡熱而表不熱也石膏甘寒而發用以清肺胃之熱配麻黃之快利所謂涼以發之也杏仁苦辛能利肺氣以定喘用甘草者微和之意乃慮石膏易傷胃耳此方散解鬱閉之熱蘊熱去而經氣自通矣健曰按三家之說頗是然以為發汗後汗出而喘無大熱者非肺熱壅盛即氣立孤危汗多亡陽之象不可不慮脫文不言脈候而皆以麻黃杏仁甘草石膏湯之無復擬議殊不審經曰無汗而喘者麻黃湯主之自汗出而喘者為邪氣外甚喘而汗出者乃里熱氣逆於葛根黃芩黃連湯條下成注別之甚明此既發汗後無餘證復汗出而喘恐不宜此劑倘投之喘汗垂脫將如之何須診脈氣何如如脈虛微或洪空豁已屬危候速與補中益氣然亦未保吉凶夫喘為急證百病不宜況傷寒既汗之餘里證緊急而復與發汗難免虛虛之禍耳發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之發汗過多亡陽也陽受氣於胸中胸中陽氣不足故叉手自冒心心下悸欲得按與桂枝甘草湯以調不足之氣健曰方書向稱汗多亡陽猶未之信也夫汗為血化乃心之液是陰類也何謂乎亡陽哉原其達於腠理澈於皮毛通衛出表而外多疏泄故謂之亡陽耶抑成云胸中之陽氣不足耶由是言之蓋亡陽即亡氣矣氣亡必皮毛酒浙手足冷而喘迫肺孤矣何不出此而見之叉手冒心心下悸欲按者何也因其人汗出心虛惕惕然有恐懼不寧之勢故叉手自冒其心以庇護之並欲得按乃虛者實之之義人未察其液去舍空而致是也不知汗雖外泄於表之陽實內亡乎里之陰耳經曰奪血者無汗奪汗者無血即此旨也謂之曰汗多亡陰正究本之理也夫實則治標虛則治本汗過多而現虛象應從本治矣安可桂枝為事乎或曰唯子之言汗多為亡陰則下多乃亡陽乎曰汗多亡陰而下多亡陽亦理也蓋肺為天象主陽主氣與大腸為表裡大腸津液之腑也下多則津液耗而肺氣內陷元陽下脫豈非亡陽而何古人因其在裡在下之鄉故稱下多亡陰亦猶汗為心液心主君象在上向南故稱亡陽人但知言其標而未究其本所以常蹈虛虛之轍而孰審其弊乎觀前賢以天王補心治汗出舍空以補中益氣治下多陽陷細味藥品豈非汗多益陰而下多升陽始得太極旋轉之機陰陽互交之理方是根柢妙用否則徒言而人莫之悟也按諸下條更見汗去舍空諸證蜂起蓋血虛必火旺君火動而相火隨之不濈則自焚矣固宜養血清火何可仍事桂枝真武等劑只恐木火通明上冒下厥而陽亦不免乎終亡發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之汗者心之液發汗後臍下悸者心氣虛而腎氣發動也腎之積曰奔豚發則從少腹上至心下為腎氣逆欲上凌心今臍下悸為腎氣發動故云欲作奔豚與茯苓桂枝甘草大棗湯以降腎氣健曰此亦汗後心虛之證比上條稍輕欲作奔豚非真奔豚也乃汗虛心氣血室空乏臍下衝脈地位沖為血海血虛不能朝宗故生奔逆之氣如奔豚然成氏以為腎氣欲上凌心非也此屬汗後血虛與腎何涉若一牽扯後之疑團更莫釋矣是湯亦非對病之劑須養榮湯加重歸芍入橘紅鉤藤黃芩以平其逆氣發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之吐後腹脹與下後腹滿皆為實言邪氣乘虛入里為實發汗後外已解也腹脹滿知非裡實由脾胃津液不足氣澀不通壅而為滿與此湯和脾胃而降氣兼善或問發汗後諸證不言太陽病固所當然至於既列傷寒之右何止言腹脹云云曰凡言發汗後者以外無表證里無別證止有腹脹一事而已除此之外即獲安全夫傷寒二字豈易言哉其傳變吉凶反掌豈可與所餘一證並列故諸後條目不復言傷寒者皆具此意三陽云曰吐曰下後脹滿為實者表邪未除而誤下之故也此發汗後邪氣己散故知非裡實也健曰汗後腹脹滿有誤汗之而邪陷入里者有表已解而里未和者當究脈證之虛實腹之堅軟舌之有無胎色如脈虛腹軟舌無胎者直宜補中以健脾胃如脈沉數腹拒按舌焦黃者是宿垢在腑為患已屬下證豈可便投參劑文未明悉兼善亦無定斷傷寒若吐若下後心下逆猶氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之吐下後裡虛氣上逆者心下逆滿氣上衝胸表虛陽不足起則頭眩脈浮緊為邪在表當發汗脈沉緊為邪在裡不可發汗汗則外動經絡損傷陽氣陽氣外虛則不能主持諸脈身為振振搖也與此湯以和經益陽亮哀氣滿上衝胸水飲內發也起則頭眩水飲上行也沉與緊乃水之象經曰沉潛水高緊則為寒是也然裡氣既虛不可再下矣若發汗則外動經絡陽虛不能主持諸脈故振搖也甘草白朮以益脾土茯苓降氣而行水桂枝行陽而散寒健曰傷寒既吐既下表裡之邪俱可兩解何脈尚沉緊而逆滿上氣頭眩發汗則動經身振搖者何謂也此因吐下內亡津液火氣空發故作逆滿等證內經曰諸逆衝上皆屬於火諸風掉眩皆屬於肝眩而振搖風自火出之象吐下既已傷津發汗更耗營血故病轉劇桂枝辛溫助熱奚可用乎須去之加歸芍黃芩天麻鉤藤始得敦土平木之法清火定風之義諸證療而經氣平矣發汗病不解反惡寒者虛故也芍藥甘草附子湯主之發汗病解則不惡寒發汗不解表實者亦不惡寒今發汗病不解反惡寒者營衛俱虛也汗出則營虛惡寒則衛虛與芍藥甘草附子湯以補營衛發汗若下之病仍不解煩躁者茯苓四逆湯主之發汗若下病宜解也若病仍不解則發汗外虛陽氣下之內虛陰氣陰陽俱虛邪獨不解故生煩躁與茯苓四逆湯以復陰陽之氣亮宸正虛有邪正欲勝邪而不能故煩躁溫其正氣邪自除矣又云大青龍煩躁者實也茯苓四逆煩躁者虛也健曰躁有陰陽之分寒熱之治當從脈舌辨之陽熱盛則脈數有力而舌胎干陰寒甚則脈沉微而胎濕滑發汗後惡寒者虛故也不惡寒但熱者實也當和胃氣與調胃承氣湯汗出而惡寒者表虛也汗出而不惡寒但熱者裡實也經曰汗出不惡寒者此表解里未和也與調胃承氣湯和胃氣觀子但熱惡熱也汗後而但惡熱邪在裡成實明矣故以調胃承氣除之健曰發汗後惡寒句乃比起不惡寒但熱句也當以調胃承氣微下之此條文順而治亦順太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之發汗已解胃中干煩躁不得眠欲飲水者少少與之胃氣得潤則愈若脈浮者表未解也飲水多而小便少者謂之消渴裡熱是也微熱消渴者熱未成實上焦燥也與五苓散生津液和表裡觀子發汗後則邪當解此何以不解以其汗大出也與桂枝湯漐漐微似汗者佳麻黃法復取微似汗不可如水淋漓病反不除夫胃者津液之主外既過奪夫津液內即乾燥煩而不得眠矣胃不和則臥不安也欲得水少少與之以潤胃氣也此數句是雖有過汗之餘證然得水即可解者若脈浮以下是雖與水亦不解者矣何也消渴者頻飲而渴不止小便不利者飲多而溺道澀是水雖入而燥熱不為減且有凝滯也夫發汗後而脈浮微熱太陽之邪仍在者因汗太過則津液徒損而邪無從出遂下結於腑而為傳本故津液不化而熱聚小便不利也與五苓散其在下者引而竭之之治乎按兼善謂脈尚浮身微熱乃表邪未全解故用桂枝之辛以和肌表竊謂既經大發汗不當責邪仍在表只是汗之非宜陰陽失度營衛未和故邪陷而內傳此脈浮是浮為太陽之浮非為在表之浮且微熱亦非但在表之熱使非謁與小便不利必不為傳本矣既下入於腑又是大汗之餘何反用桂枝以行表且妄走津液乎畜血證亦有曰表證仍在者然只一抵當逐血而邪自解未嘗再用攻表藥也健曰上段因大汗出胃亡津液欲得水而胃可和下段復云脈浮小便不利微熱消渴觀子指為太陽傳本而曰與五苓散引而竭之之治未為確論兼善又曰用桂枝之辛以和肌表認五苓之桂為桂枝則所誤皆從此出考仲景原方只刊一桂字下注去皮明是肉桂而非桂枝其來已舊夫欲行表乃取枝可旁達枝而去皮有失和表之義矣按肉桂為龍雷之主陰經血藥補火之品配四苓而為五苓以治陰水脾虛腫脹泄瀉腎寒小便不利之劑非太陽傳本熱結之表方兼善亦誤認矣成注稱飲多而小便少謂之消渴是裡熱明甚若用五苓之燥熱滲利豈不更耗津液轉增劇乎內經曰二陽結謂之消二陽手足陽明也二經皆主津液因邪熱所耗故飲多猶未能潤而消渴不止無以濟利小便如投熱燥於理大背應竹葉石膏湯為解渴利便潤燥除熱之妙藥何紛紛塞說而以五苓為和肌表止消渴以貽後害而人莫之悟也發汗已脈浮數煩渴者五苓散主之發汗已脈浮數者表未盡也煩渴亡津液胃燥也與五苓和表潤燥海藏渴者邪入太陽本也太陽高則汗而發之下則引而竭之五苓散為下藥使從膀胱出也腎燥膀胱熱小便不利者宜之然太陽病熱而渴雖小便不利亦宜五苓散下之若當服不肌必谷消水去形亡就陽明戊土發黃此太陽入本失下也若不當服而服是為犯本強利小便重亡津液侵陽之極必侵陰而成血證矣健曰海藏所論前則言其概後則誡其誤原有可否在焉上條脈但浮而小便不利者尚恐五苓燥熱更耗津液此條脈加數無小便不利字樣明是熱入陽明而煩渴何必牽涉太陽蓋皆佚文誤次故也然上條從太陽發汗後而煩躁者原有少少與水令胃氣和則愈之句而此無太陽之證前則引五苓為表劑此則以五苓為瀉腎燥膀胱熱之利藥其疑團終在以桂為桂枝上來雖然仲景雖設此方究非太陽表裡之劑實屬脾胃燥濕利水之藥也前輩往往圍護經文不能直折是否後學之欲登道岸難矣因重言以明之如此條宜白虎加參清之潤之可愈傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之傷寒汗出而渴者亡津液胃燥邪氣漸傳裡也五苓散以和表裡若汗出不渴邪氣不傳裡但在表而虛也與茯芬甘草湯和表合衛觀子汗出不渴若汗之得宜其病已解惟汗之非宜雖汗已不渴病亦不除也消渴煩渴者熱聚飲多而水道不行渴在上而病在下故五苓散以利其下此不渴者飲留於上而未至成燥也主茯苓以行飲兼桂枝生薑甘草以除未盡之邪按厥陰曰厥而心下悸者當服茯苓甘草湯以治其水又傷寒之茯苓桂枝甘草大棗湯茯苓桂枝白朮甘草湯皆屬治水飲之劑則此或單就上言之飲而設非僅為和表合衛者也健曰前二條脈浮數渴煩明是津耗火浮當清當潤此但汗而渴不言不解並無小便不利是汗多則上焦津耗而必渴下多則下焦液脫而亦渴一定之理也觀子亦隨聲附和三條並無水飲二字特為五苓而將水飲作解忘其辛熱補火之力不顧渴家反燥之禍可乎玩成注亡津胃燥一句已得至理何不喝破既非太陽而五苓亦非應用乍出乍入偶中偶失烏足以度後世所謂無人破其痼弊者在是況此並無表證猶泥於和表合衛四字俱執五苓為能和表裡是認藥差而認病亦差矣雖有充棟之書欲求指南車而不可得也如下條方是水飲然亦只須四苓可已仲景書之難明易誤蓋如此中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之中風發熱至六七日則當解若不解而煩者邪在表也渴欲飲水邪傳裡也裡熱甚則能消水水入則不吐裡熱少則不能消水停積不散飲而吐水也以其因水而吐故名水逆與五苓散和表裡散停飲活人假令發熱脈浮而大是表證當汗其人煩渴小便赤卻當下是表裡證俱現觀子表裡俱有證熱未全入里渴亦非大渴自不能消水而吐如經云五六日渴欲飲水飲不能多不當與也以腹中熱尚少不能消之便更與人作疾也宜五苓以救水逆此條曰中風與傷寒發汗者異矣曰發熱視微熱者異矣日六七日不解有表證視汗後邪熱內虛者異矣然則同用五苓其為病迥殊也蓋五苓散主之是專治渴欲飲水水入即吐之水逆證非治中風發熱至渴欲飲水之證也若中風發熱六七日煩渴表裡證俱作者則宜小柴胡去半夏加花粉治之裡熱再甚者柴葛解肌湯與之原非太陽白虎之比焉能大飲無傷欲按五苓之用原有二義曰服散後多飲暖水令汗愈者致津液之義也曰忍之一日不飲水外水不入乃愈者行停水之義也消渴者熱甚飲多膀胱不治也水逆者熱少不能消水入則拒也蓋為病本殊而治法從同耳健曰為病既殊治法豈可從同中風發熱不解而煩是邪傳入里乃表證未除里證已現故曰有表裡證渴欲飲水而吐乃為水逆以五苓溫散水氣恐煩渴未必能解表熱未必能去故觀子曰表裡俱作者須小柴胡去半夏加減為和解添津之治裡熱甚者柴葛解肌則知前條諸無表證而脈數煩渴者自當責重裡熱白虎是可與而五苓決難進也觀子率意於前條始校正於此節猶不失為我心之同然者未持脈時病人叉手冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此發汗多亡陽胸中陽氣不足病人叉手自冒心師見外證知陽氣不足也又試令咳而不即咳者耳聾也知陽氣虛明矣耳聾者陽氣虛精氣不得上通於耳也三陽看此病當常思少陽柴胡證但強弱自不同耳健按此與前條發汗過其人叉手冒心者同而加甚於耳聾也此則原知其發汗虛何前獨不知而猶以桂枝為事於此見仲景原本自有精義凡所疑似者皆散佚顛倒之文也叉手冒心即靈樞所謂交兩手而瞀之象故令咳而不聞也蓋因重發汗虛痰熱結於胸臆與鬱冒之證相類但冒以自汗而解此則挾虛而應半夏瀉心湯補虛瀉熱則神氣自清條無治法蓋闕如也發汗後飲水多必喘以水灌之亦喘喘肺疾飲水多喘者飲冷傷肺也以水灌洗而喘者形寒傷肺也發汗後水藥不得入口為逆若更發汗必吐下不止發汗後水藥不得入口為吐逆發汗亡陽冒中虛冷也若更發汗則愈損陽氣胃氣大虛故吐下不止也發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹同惱梔子豉湯主之發汗吐下後邪熱乘虛客於胸中謂之虛煩者熱也胸中煩熱鬱悶而不得發散者是也熱氣伏於裡者則喜唾今熱氣浮於上煩擾陽氣故不得眠心惡熱熱甚則神必昏是以劇者反復顛倒而不安心中懊憹而潰悶懊憹即懊惱也內經曰其高者引而越之與梔子豉湯以吐胸中之邪健曰既汗吐下後而致虛煩不眠懊憹何復與梔豉吐劑倘更吐之而致逆氣不食能無虛虛之慮乎考前後梔豉法俱未合病後人用之毫無所益即群賢方解亦少明辨不過述梔豉之性而已竊以發汗吐下後上中下三焦之原氣皆傷津液已耗豈尚有邪而三法不去者乎何可再與吐劑更亡其胃氣乎夫先虛煩而致不得眠者乃熱迫於心血虛而不能睡也當與人參白虎加當歸棗仁茯神以補虛除煩使一睡而懊憹盡適矣若先不眠而致煩憹者以導赤各半湯安之始為保本之治既無表裡之證又何用梔政為哉若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之少氣者熱傷氣也加甘草以益氣嘔者熱煩而氣逆也加生薑以散氣少氣則氣為熱搏散而不收甘以補之可也健按梔子性能解鬱除煩瀉無根之火是雜病中藥於傷寒外感之證其力甚微烏能及苓連膏翹之捷至豆豉為托斑要藥能引吐發汗其他一無勝任此以汗吐下後虛煩懊憹而致少氣比前更甚一層夫少氣即短氣也成雲氣為熱搏亦有分別若熱壅迫氣則氣滿逆而息粗虛而少氣則氣短促而息微俗名吃力是也此條承上文而致少氣更不應用梔豉即就少氣二字非梔豉所能治也明矣若加嘔者是虛甚而胃氣逆也法當理中六君為主如虛而火旺津干作嘔則六君加黃連竹茹乃止嘔之聖藥況此無外證之兼梔豉本屬吐劑用之反益其嘔即兼表證之嘔梔豉加姜亦不甚擔力也發汗若下之而煩熱胸中窒者梔子豉湯主之陽受氣於胸中發汗若下使陽氣不足邪氣客於胸中結而不散故煩熱而胸中窒塞與梔子豉湯以吐胸中之邪健曰此言汗下之後而煩熱窒於胸中乃汗下皆非其當而邪在半表裡間也不有停滯在胃即有斑點蘊畜與梔豉吐之雖為對病然恐力不能勝不若以膏易梔效兼解肌其功始捷健常用之徹應也傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之傷寒五六日邪氣在裡之時若大下後身熱去心胸空為欲解若大下之後身熱去而心中結痛者結胸也身熱不去而心中結痛者虛煩也結胸為熱結胸中為實熱氣已收斂於內則外身熱去虛煩為熱客胸中未結為實散漫而煩是以身熱不去六七日為欲解時以熱為虛煩故云未欲解也與梔子豉湯以吐除之宇泰身熱不去四字要玩結胸身不熱知熱不在表故可用大小陷胸丸以遂之今熱仍在表宜越之而已第一證是虛煩之最劇者故不得眠反復顛倒第四證是虛煩之稍靜者故但覺煩熱而胸不舒第五證則類結胸而有表熱全未收斂入內故雖心胸結痛而止為虛煩三者固有微甚之分然邪之所結略同遂總以越而去之健曰汗則表邪泄下則里邪去傷寒五六日大下之身熱不去而心中結痛者猶當審其可搔拒按之空實察脈之屬表屬裡舌胎之有無如胎黃而胸冒拒按者宿食未消雖下而不能去故尚熱不解身熱者陽明胃熱也應小陷胸化之蓋痛為實邪窒為虛邪二者大不同也宇泰之說於表裡虛實亦朱鑿然豈可一例梔豉耶在此條的系陽明實邪非結胸亦非虛須不但梔豉吐之非理亦不當列於太陽也傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之下後但腹滿而不心煩即邪氣入里為裡實但心煩而不腹滿即邪氣在胸中為虛煩既煩且滿則邪氣壅於胸腹之間也滿則不能坐煩則不能臥故臥起不安與梔子厚朴湯吐煩泄瀉健曰此若舌黃而右脈實者以黃連易梔子並加橘半枳桔尤良傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之丸藥不能除熱但損正氣邪氣乘虛留於胸中未深入者則身熱不去而微煩與梔子乾薑湯吐煩正氣凡用梔子湯病人舊微溏者不可與服舊微溏者裡虛而寒在下也雖須則非蘊熱故不可與梔子湯內經曰先泄而後生他病者治其本必且調之後乃治其他病太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲僻地者真武湯主之發汗不解仍發熱邪氣朱解也心下悸頭眩身瞤動振振欲僻地者汗出亡陽也裡虛為悸上虛為眩經虛為身瞤振振搖與真武湯主之溫經復陽活人類纂云凡發汗過多筋惕肉瞤振搖或微羸人微汗出便有此證俱宜服真武湯羸甚者芍藥量多少與之惡熱者去附子余依加減健曰汗出不解而心下悸頭眩等齊作較前證為重成氏活人俱以亡陽而就真武立論竊以為不然汗出已解而現諸象者庶可謂之亡陽然實亡其陰血此則汗雖出而邪未解乃津液空乏營氣不能和於經脈熱邪內搏心血虛而心為之悸肝風鼓而頭為之眩風火相迫無陰以制故身瞤動振振欲僻地矣內經曰諸噤鼓慄如喪神守皆屬於火諸風掉眩皆屬於肝心下悸有喪神之意身瞤振有鼓慄之形無痰不作眩無火不生風是也此因發汗未解之證法惟和而已何與乎真武者哉諸家謂汗多心亡津液腎氣欲上凌心真武北方之神能司水火以此主之謂可伐腎而療悸壯火而祛邪和營而生津其言似是而非如果腎上凌心則乙癸同源木得水而柔和火得水而既濟恐不如此則反助熱增劇不若養血和營以使風平火息之為穩也與小柴加歸芍天麻鉤藤薑蠶之屬治之諸證庶乎悉完咽喉乾燥者不可發汗津液不足也淋家不可發汗發汗必便血膀胱裡熱則淋反以湯藥發汗亡耗津液益增客熱膀胱虛必小便血瘡家雖身疼痛不可發汗發汗則痓表虛聚熱則生瘡瘡家身疼如傷寒不可發汗發汗則表氣愈虛熱勢愈甚生風則交痓也衄家不可發汗汗出必額上陷脈急緊直視不能眴不得眠衄者上焦亡血也若發汗則上焦津液枯竭經絡乾澀故額上陷脈急緊諸脈皆屬於目筋脈緊急則牽引其目故直視不能眴眴瞬合目也針經曰陰氣虛則目不瞑亡血為陰虛是以不得眠也韓氏云此人素有衄血證非傷寒後如前條之衄也故不可發汗亡血家不可發汗發汗則寒慄而振針經曰奪血者無汗亡血發汗則陰陽俱虛故寒慄活人假如淋家衄家類不可汗而振搖者亦可以小柴胡和解之千金太陽證具而其人適失血及大下利不可大汗也只頻頻少與桂枝湯使體潤漐漐汗出自解健曰前章汗後不解頭眩身振者曾擬小柴胡加養血定風之藥和解之以代真武湯之未妥適合活人此旨汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸方闕汗者心之液汗家重發汗則心虛恍惚心亂奪汗則無水故小便已陰中疼三陽血家汗家指平時舊病言也病人有寒復發汗胃中冷必吐蛔有寒則溫散反發汗損陽氣胃中冷必吐蛔也三陽溫散者理中湯之類活人云先服理中丸次服烏梅丸本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆病在表者汗之為宜下之為逆病在裡者下之為宜汗之為逆經曰陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死婁氏陽盛則陽並於陰故宜下陰盛則陰並於陽故宜汗陽並於陰沉而實也陰並於陽浮而實也陽盛陰虛是病在裡陽虛陰盛是病在表健曰婁氏將脈之沉實浮實分陽盛陰盛雖為顯亮然脈之沉者多實而浮者少實且有病不合脈脈不合病之診不可拘此一見傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯傷寒下之續得下利清穀不止身疼痛者急當救里以裡氣不足為先救急與四逆湯得清便自調知裡氣己和然後急與桂枝湯以救表身疼者表邪也內經曰病發而不足標而本之先治其標後治其本此以寒為本也三陽此證當照顧協熱利須審其利之色何如與勢之急緩不可輕投四逆桂枝也亮宸此大關鍵不可不知若兩感者亦可類推矣觀子下利至清穀不止不特里虛邪陷其中寒氣已甚非四逆急溫之正氣且脫矣雖有表邪未解之身疼痛不遑治也惟有救里而已至清便自調知虛寒已愈而身痛猶未除非重與發汗表邪奚從去乎故再以桂枝急救表也按太陽施四逆者三證惟發熱頭痛脈反沉者為真寒在裡余皆為救逆而設蓋既由誤下致成內氣虛寒則非陰證之比四逆但可救在裡之寒彼先時發於陽經之邪豈從四逆去乎故溫里之後必別解表散邪方安也健曰觀子之論雖是然未詳其身之熱與否而曰救表若仍熱不解者此是協熱利兩方俱不宜也若熱已解續下利清穀者始宜四逆至清便自調後身疼痛此下多亡陰不能榮於肢體更宜加歸術以扶脾胃而轉氣血豈尚挾表而曰急當救表況文無表象觀子亦附會其說矣病發熱頭痛脈反沉若不差身體疼痛當救其里宜四逆湯發熱頭痛表病也脈反沉者里脈也經曰表有病者脈當浮今脈反沉遲故知愈也見表病而得里脈則當差若不差為內虛寒甚也與四逆湯救其里宇泰此為陽病得陰脈若以發熱體痛證在太陽遲投四逆則病生他變也亮寢此以四逆治太陽經虛欲入少陰者蓋發熱頭痛身疼雖太陽表證而脈沉其勢即欲入少陰見厥逆吐利矣雖見表證急當救里使邪不內侵治未病之法也觀子發熱頭痛太陽病其脈當浮反沉者雖得表證而里之真寒已深況不差加之身痛乎此體痛當照少陰附子湯之體痛看內外多陰變證隨作故宜四逆以救其里也遇此等證若猶先治表誤矣健按此證發熱頭痛乃表邪也脈當浮而此脈反沉復身疼痛是脈證不合矣當求其故以別陰陽夫脈有三候浮中沉為大綱耳欲究病脈必有兼象此但言沉而不分人迎氣口不言兼象何以即決為裡寒而必四逆湯耶倘太陽初病未經汗泄脈得沉緊沉數表證不解而體痛頭疼者甚多因成注增入沉遲字面致諸家咸附其說而曰雖屬表證里之真寒已具皆以四逆為宜夫四逆者治四逆之劑也證不病四逆而藥以四逆何說乎玩若不差三字是曾究表而不得汗脈現沉者乃寒束營血邪滯經脈故體仍痛不愈無厥逆下利卻未入陰應麻附細辛溫經散寒必效於四逆也太陽病先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得里未知然後復下之冒者郁也下之則裡虛而亡血汗之則表虛而亡陽表裡俱虛寒氣怫鬱其人因致冒要略曰亡血復汗寒多故令鬱冒汗出則怫鬱之邪得解則冒愈又曰冒家欲解必大汗出汗出表和而里未和然後復下之觀子經曰諸虛乘寒則必鬱冒東垣曰昏迷不省者上焦心肺之熱也上焦之病悉屬於表又曰瞑目之病悉屬於陰宜汗不宜下者也故雖新產鬱冒亦必升而舉之政冒家必從汗解之義也然冒後多有大便腹堅者以血分必不足也故復當下健按此是應汗而反下之則表邪內陷無以發越故致冒也既冒仍令汗出表和而愈若里未和則復與下之其病明悉無容他贅矣但因表裡俱虛一句遂致疑團莫釋乃以寒氣怫鬱諸虛乘寒等度之如果表裡俱虛則當進補治何復行汗下而得愈耶此必誤文牽入去此一句則情順理直何必紛紛臆斷哉夫冒上越之謂只有火冒而無寒冒之理豈傷寒而反是者乎明者熟審之太陽病未解陰陽脈俱停必先振粟汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之脈陰陽俱停無偏勝者陰陽氣和也陰陽和平雖劇當愈故先振慄汗出而解但陽脈微者陽不足而陰有餘也經曰陽虛陰盛汗之則愈陰脈微者陰不足而陽有餘也經曰陽盛陰虛下之則愈三陽曰陰陽俱停者三部相等皆微脈也既脈微不必更用汗下法彼必自汗出自便利而愈不必如成氏陽盛陰虛之說也蓋觀經文用調胃與若字可知非必當下之下矣觀子脈大者病進脈微者病退陽脈微者表之正氣將復也故當從汗而解陰脈微者里之正氣將復也故當從下而解下則必以苦藥除之調胃承氣是也太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯太陽中風風並於衛則衛實而營虛營者陰也衛者陽也發熱汗出陰弱陽強也內經曰陰虛者陽必湊之故少氣時熱而汗出與桂枝湯解散風邪調和營衛觀子太陽中風以自汗為主餘證不必悉具脈之陽浮陰弱雖不再言當無有或異者矣傷寒中風五六日往來寒熱胸脅苦滿默默不欲食心煩喜嘔或胸中煩而嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者與小柴胡湯主之病有在表有在裡有在半表裡間者謂半表裡證或中風或傷寒至五六日邪氣自表傳裡之時非是傷寒再中風中風復傷寒也但見一證即是柴胡不必諸證悉具也經云邪在表則寒在裡則熱今邪在半表半裡未有定處是以寒熱往來也邪在表則心腹不滿邪在裡則心腹脹滿今但言心腹苦滿知邪在表裡間也邪在表則呻吟不安邪在裡則煩而悶亂內經云陽入之陰則靜默默者邪方自表之裡邪在表則能食在裡則不能食不欲食者邪在表裡之間未至於必不能食也邪在表則不煩不嘔在裡則煩滿而嘔喜嘔者邪在表方傳裡也表初入里未有定處則所傳不一故有或為之證或者無定之稱或在表或在裡皆以小柴胡主之血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之人之氣血隨時盛衰當月郭空時則為血弱氣盡腠理開疏之時也邪氣乘虛傷人則深針經曰月郭空則海水東盛人血氣虛衛氣去形獨居肌肉減皮膚緩腠理開毛髮殘焦理薄煙垢落當是時遇風則其深入者是矣邪因正虛自表之裡而結於脅下與正分爭作往來寒熱默默不欲飲食此為自外之內經絡臟腑相連邪氣隨經必傳於裡故曰其痛下痛一作病邪在上焦為邪高邪漸傳裡為病下裡氣與邪氣相傳逆而上行故使嘔也與小柴胡湯以解半表半裡之邪服柴胡湯已渴者屬陽明也以法治之服小柴胡湯表邪已而渴者里邪傳於陽明也以陽明治之三陽曰前條渴者去半夏柴胡證已具未服柴胡湯先見渴證者也此條渴者已服柴胡湯外證已除而又渴者也得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅滿痛面目及身黃頸項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食谷者噦六七日脈遲浮弱惡寒手足溫則邪在半表半裡未為實反二三下之虛其胃氣損其津液邪蘊於裡故不能食而脅下滿痛胃虛為熱蒸之熏發於外面目及身悉黃也頸項強者表仍未解也小便難者內亡津液也雖本柴胡湯證然以裡虛下焦氣澀而小便難若與柴胡又走津液後必下重也不因飲水而嘔者柴胡湯證若本因飲而嘔者水停心下也要略曰先渴卻嘔者為水停心下此屬飲家飲水水停而嘔食谷者物聚而噦噦者皆非柴胡湯所宜不可不識也觀子此本柴胡證以過下之遂成壞證與或以過飲而嘔或以食谷而噦皆不可用柴胡湯也健曰治病無論傷寒雜證須從重而治重者去而輕者自愈此因不當下而下之則脾胃虛濕熱反聚故不能食而諸證皆作原非柴胡證矣當與茵陳合四苓利濕清熱可己若更飲則更惡濕而嘔食谷則壅滯難化而噦此噦非比病深之噦似作噯氣窒塞耳下重者少腹緊急因小柴胡中有參反補其濕故也成氏謂又走津液更非傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之身熱惡風頸項強表未解也脅下滿而渴里不和也邪在表則手足通熱邪在裡則手足厥寒今手足溫知邪在表裡間也與小柴胡以解表裡之邪亮宸此有身熱惡風項強則太陽之證猶多宜兼桂枝更妙健曰亮廢謂其太陽證多愚謂脅滿手足溫而渴已兼少陽陽明是三陽合病矣仲景專主和解而用小柴胡亮宸兼掛之說恐反助熱方中應加防風防己石膏木通良傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之脈陽澀陰弦腹中急痛者作里有虛寒與小建中溫中散寒若不差非裡寒也必由邪氣自表之裡裡氣不利所致與小柴胡去岑加芍藥以除傳裡之邪健曰脈左陽右陰左血右氣左表右里寒邪傷營故陽脈澀也營傷則肝無血養而肝氣乘脾故陰脈弦也土受木克則腹中急痛也凡腹痛寒痛緩熱痛急緩者宜柴胡桂枝急者須柴胡芍藥不可去芩乃能清熱和肝且芍藥黃芩為腹痛之妙劑此太陽之邪已入少陽傳至太陰地位邪熱已甚故痛而急奚可建中之溫乎傷寒中風有柴胡證但見一證便是不必悉具柴胡證是邪氣在表裡之間也或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳但見一證便宜與柴胡湯治之不必待其證候之全具也凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解邪在半表半裡之間為柴胡證即未作裡實醫便以藥下之若柴胡證仍在者雖下之不為逆可復與柴胡以和解之得湯邪氣還表者外作蒸蒸而熱先經下裡虛邪氣欲出內作振振也正氣勝陽氣生卻復發熱汗出而解也健曰此結上文反復叮嚀之意也傷寒二三日心中悸而煩者小建中湯主之傷寒二三日邪氣在表未當傳裡之時心中悸而煩是非邪氣相搏所致心悸者氣虛也煩者血虛也以氣血內虛與建中湯先建其里明理二三日悸而煩煩之虛者也故與小建中補之煩本為熱悸甚為虛大抵先煩而悸者為熱先悸而煩者為虛如少陽之邪入腑煩而悸則為熱也健曰傷寒二三日已傳陽明心中悸而煩則邪熱與胃中水飲相搏所致豈可即為氣血兩虛而驟與建中乎況無汗下字樣何謂屬虛未可深信者也當與麻黃石膏湯加橘半發太陽之表而除陽明之裡庶為得當太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈日數過多屢經攻下而柴胡證不罷者亦須先與小柴胡湯以解其表經曰凡柴胡湯證而下之柴胡證不罷者復與柴胡是也嘔止者表裡和也嘔不止鬱郁微煩者裡熱已甚結於胸中與大柴胡下其裡熱則愈宇泰仲景雖云嘔家雖有陽明證可攻攻之為逆然陽明伏熱鬱蒸清道而嘔且煩者非苦寒直折不可故以大柴胡下之觀子嘔不止則半表半裡證猶在然心下急鬱郁微煩者中有燥屎也非下之不可故以大柴胡兼而行之健曰過經十餘日而云反下之則非下證明矣後四五日尚有小柴胡證在也與柴胡而嘔不止心下急鬱郁煩者為未解其證仍在半表裡而入於陽明者多將作斑也當察其肌膚如斑跡已現應與柴葛解肌兼豆豉石膏涼以托之即無斑跡與之亦合於證能解嘔而除煩經文但言煩而不言滿未必即是大柴胡證宇泰既引仲景誡嘔家不可攻之句而又曰非以苦寒直折下之不可則自相矛盾矣要知伏熱在經嘔而煩者邪欲外越之勢非班即汗乃解若以得下而解則前二三下之何不早解而復煩嘔不止即如實熱應下之證必腹滿拒按潮熱譫語舌焦齒燥兼致方是下證文既無此實象重複下之是一誤再誤矣傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不利今反利者醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之傷寒十二日再傳經盡當解之時也若不解胸脅滿而嘔者邪氣猶在表裡之間此為柴胡湯證若以柴胡湯下之則無潮熱自利矣醫反以丸藥下之虛其腸胃邪氣乘虛入腑日晡所發潮熱熱已而利也潮熱雖為熱實然胸脅之邪未已故先與小柴胡湯以解外後以柴胡加芒硝湯以下胃熱觀子既有胸脅滿嘔之半表裡證又有日晡潮熱之裡證若竟以大柴胡兼解之則內外之邪悉去而胃實亦除矣乃醫妄以丸藥攻之丸藥徒虛腸胃不能解實邪故證仍在而反得微利也利則邪陷而深留滯腸臟上下不並矣是必分而治之先以小柴胡除胸脅之邪加芒硝以滌下焦之滯然均為盪滌入芒硝而不入大黃邪遂利藥而作腸垢非大黃所能勝任耳健曰此條文正治當腸垢即痢積也利古之通稱傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之十三日再傳經盡謂之過經譫者陽明胃熱也當以諸承氣下之若小便利者津液偏滲大便當硬反下利知醫下之誤也下利脈微厥者虛寒也今脈調和則非虛寒由腸虛胃熱協熱而利也與調胃承氣湯以下胃熱宇泰經文內實之實當作熱注中偏滲之偏當作漏此段有反對熱與厥反丸與湯反便硬與下利反脈微與脈和反下藥與自利反惟小便利大便硬為對讀宜細玩三陽前條醫下之下利清穀不止身疼痛當以四逆救里觀身疼痛則知邪在表不當下下之裡虛元氣急當溫里況誤下里之受損多矣可不救里乎且外疼痛亦須桂枝矣此本柴胡證邪在半表半裡一半可下一半當汗若以丸藥下之表熱不能徹去邪熱乘虛入里為協熱利且外證譫語內有實邪見脈調和元氣頗在故用調胃承氣復下之也兩證虛實表裡不同必當參看觀子過經不解熱實在裡於法當下既下似難再下殊不知譫語反自利脈和者為內實雖大便日幾行而燥屎不去皆由丸藥下之非法故病不為解夫下之不當必再下除之審視脈證以除裡實可也調冒承氣證應列陽明此過經不解非他證己罷專屬在腑之比故出太陽篇中健曰過經不解裡熱譫語已屬陽明若小便利大便硬者法當與下如以丸下之不能盪滌邪穢銷鎔渣滓而反自利不解脈若不微此內證仍實須調胃承氣復下其燥屎始解也竊按醫以丸藥句乃仲景示不可用丸而法須湯下之之誡太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯主之太陽膀胱經也太陽病邪熱不解隨經入腑為熱結膀胱其人如狂者尚未至於狂但不寧爾經曰其人如狂者以熱在下焦太陽多熱熱在膀胱必與血相搏右血不為蓄為熱迫之則血自下血下則熱隨血出而愈若血不下者則血為熱搏畜積於下而少腹急結乃可攻之與桃核承氣湯下熱散血內經曰從外之內而盛於內者先治其外後調其內此之謂也宇泰此當作三證看至下者愈是一證謂其自下也疑有闕文至當先解其外是一證蓋其人如狂是下焦血非桃仁承氣證也自外解至末又一證恐是自下只去得下焦血而中焦道遠未能盡去尚留於少腹耳故以桃核承氣湯主之傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之傷寒八九日邪已成熱而復轉陽經之時下之虛其里而熱不除胸滿而煩者熱客胸中也驚者心惡熱而神不守也小便不利者裡虛津液不行也譫語者胃熱也一身盡重不可轉側者陽氣內行於里不營於表也與柴胡湯以除胸滿而煩加龍骨牡蠣鉛丹收斂神氣而鎮驚加茯苓以行津液利小便加大黃以遂胃熱止譫語加桂枝以行陽氣和解身重錯雜斯悉愈矣健曰證非應下而誤下之則邪從內陷故胸滿煩驚蓋下則津液內耗熱邪擾攘於中正氣不能下濟故小便不利陰血不能內榮故一身盡重表裡皆病捋成陰極陽亢之象豈宜桂枝之辛溫大黃之盪滌鉛丹之利龍骨之澀皆非中病之品後人亦難效法投之必有奇禍去此五味而入歸身紅花木瓜鉤藤木通石膏之屬庶乎陰血得行而津液自回諸患悉可解矣傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門腹滿譫語者脾胃病也浮而緊者肝脈也脾病見肝脈木行乘土也經曰木行乘火木行乘土名曰縱此其類矣刺期門者肝之募也刺之以泄肝經盛氣傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門傷寒發熱嗇嗇惡寒肺病也大渴欲飲水肝氣勝也玉函曰作大渴欲飲酢漿是知肝氣勝也傷寒欲飲水者愈而腹滿者此肝行乘肺水不得行也經曰木行乘金名曰橫刺期門以泄肝之盛氣則肺氣平水散而津液得通外作自汗出內為小便利而解也宇泰傷寒發熱惡寒表病也至自汗出則表已解矣大渴腹滿里病也至小便利則里自和矣故曰其病欲解觀子腹滿澹語熱實胃者深矣安得脈有浮緊乎緊者弦之類也肝之診也木亢盛必賊土有似腑實而非泄冒之可除也惟瀉肝之盛邪則乘脾之患自已故法刺期門渴而腹滿者俱屬裡證何發熱惡寒耶既發熱惡寒猶在安得大渴至欲飲水耶是此證與上證皆在常法之外矣大渴且腹滿者木藏烽焰是肝邪熾盛極也極則兼侮勝已者木行乘金發熱惡寒邪淫於肺非表證也病既不屬於三陽表裡治亦非汗下諸法之可已故亦刺期門以瀉其盛實之勢自汗出至欲解至其病自愈並不須刺之之謂汗出則肺氣通和小便利則肺邪更不作尚何乘寒之為患哉然肝肺之句當連於腹必滿之下緣仲景文法往往如此耳健曰按傷寒只言經腑表裡而不言臟此二條何皆及於肝而有縱橫之名其義難析上條腹滿譫語寸口脈浮而緊是邪實陽明如舌色黃焦乃調胃承氣證也此條發熱而嗇嗇惡寒是邪在少陽半表也大渴欲飲水是兼入陽明半里之熱甚者得自汗小便利其腹雖滿而表裡欲解何涉於肝之乘肺乎只須小柴胡合白虎治之可愈夫傷寒之於肝屬厥陰矣厥陰家證未嘗有此諸家何隨文衍說而不破其的使人終莫測其所自故特以理詳繹舉此二方以代刺法蓋上古以針砭療病設此縱橫之名立此期門之刺仲景引之以示後人針家所應知也近世刺法失真恆多謬誤非細事也勿輕試之太陽病二日反躁反熨其背而大汗出大熱人胃胃中水竭躁煩必發譫語十餘日振慄自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及不多大便已頭卓然而痛其人足心必熱穀氣下流故也太陽病二日則邪在表不當發躁而反躁者熱氣行於里也反熨其背而發汗大汗出則胃乾燥大熱入胃胃中燥熱躁煩而譫語至十餘日振慄自下利者火邪勢微陰氣復生津液得復大汗出則愈若從腰以下不得汗則津液不得下通故欲小便不得熱氣上逆而反嘔也欲失溲足下惡風者氣不得通於下而虛也津液偏滲令大便硬者小便當數經曰小便數者大便必硬也此以火熱內燥津液不能下通故小便不數及不多也若火熱消津液和則結硬之便得潤因自大便也便已頭卓然而痛者先大便硬陽氣不得下通既得大便則陽氣降下頭中陽虛故卓然而痛穀氣者陽氣也先陽氣不得通於下之時足下惡風今陽氣得下故足心熱也健曰太陽病二日不應躁而反躁者其人必平素內熱反熨其背而大汗出胃中津液消耗大熱入胃故更煩譫十餘日振慄者內有大熱外必惡寒非表也故自下利為欲解至足心熱而自愈火氣下泄而退矣文無治法當以小柴胡合白虎治之可已太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治風為陽邪因火熱之氣則邪風愈甚迫於血氣使血氣流溢失其常度風與火氣謂之兩陽兩陽相熏灼熱發於外必發身黃若熱摶於經絡為陽盛外熱迫血妄行必衄熱摶於內者為陰虛內熱必小便難若熱消血氣少為陰陽俱虛血氣虛少不能榮於身體為之枯燥三陽經絡至頸三陰至胸中而還但頭汗出劑頸而還者熱氣炎上摶陽而不摶於陰也內經曰諸腹脹大皆屬於熱腹滿微喘者熱氣內郁也火氣內發上為口乾咽爛者火熱上熏也熱氣上而不下大便不硬若熱氣入胃消耗津液則大便硬故云或不大便久則胃中燥熱必發譫語內經曰病深者其聲噦火熱太甚正氣逆亂則噦四肢者諸陽之本陽盛則四肢實火熱太甚故手足躁擾捻衣摸床擾亂也小便利者為火未劇津液未竭而猶可治也健按此條病情總因風從火熾火得風炎熏灼其經脈消爍其津液逼迫其氣血擾亂其神明遂成陰離陽亢之象曰小便利者其人可治而不言治法蓋亦脫辭也當與人參白虎合茵陳蒿湯及早治之不使致噦與捻衣摸床之時則難措手矣傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之傷寒脈浮責邪在表醫以火劫發汗汗大出者亡其陽汗者心之液亡陽則心氣虛心惡熱火邪內迫則心神浮越故驚狂起臥不安與桂枝湯解未盡表邪去芍藥以芍藥益陰非亡陽所宜也火邪錯逆加蜀漆之辛以散之陽氣亡脫加龍骨牡蠣之澀以固之本草云澀可去脫龍骨牡蠣之屬是也健曰傷寒脈浮而無發熱頭痛等表證者其浮已屬內火上盛之象何可以火劫之而致亡陽驚狂不安者法當清火生陰濟陽為宜豈桂枝辛溫而反去斂陰之芍於理實有悖焉夫汗多亡陽以汗為心液心為陽臟又汗出表虛表為陽故古人稱曰亡陽竊以為汗太過則心液虛而脈必空心主血主脈血屬陰汗從血化實亡其陰耳此究本之論前章言之詳矣陰亡則虛陽孤注心神失守而驚狂不寧皆因火邪錯逆所致也內經重陽者狂重陰者癲癲責心虛狂責胃火胃主津液汗多液耗胃火空發故發狂也肝為藏血之臟主驚汗多血走膽氣虛怯故似驚也不以歸芍棗仁茯神硃砂鉤藤膏連之屬養血安神除邪補正為治而欲以龍骨鎮之牡蠣澀之可乎殊不知二者但能固下澀精不能回津斂汗以救傷寒誤劫之驚狂成氏就文解注未知底裡是非所以世人視傷寒為畏途而動手便錯也考蜀漆系常山之苗性猛辛散力同常山劫痰截瘧之劑非傷寒家藥在當日仲景或另有他見或因脫佚而叔和誤次未可深信也浪用之其禍叵測形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈形作傷寒謂頭痛身熱也脈不弦緊則無傷寒表脈也經曰諸弱發熱則脈弱為裡熱故云弱者必渴若被火氣兩熱相合摶於胃中胃中躁煩必發譫語脈弱發熱者得脈浮為邪氣還表當汗出而解矣三陽此證固不須治待其自汗則愈若脈不肯浮酒炒芩連等微解之可也健曰此是虛人患證其形屬半表裡當汗出愈但云解之而無解法亦非全文明矣當與小柴胡加石膏自然可解太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪此火邪迫血而血下行者也太陽病用火熏之不得汗則熱無從出陰虛被火必發躁也六日傳經盡至七日再到太陽經則熱氣當解若不解熱氣迫血下行必清血清者廁也健曰此可與小柴胡合犀角地黃湯涼血解熱以和之脈浮熱甚反灸之此為實實以虛治因火而動必咽燥唾血此火邪迫血而血上行也脈浮熱甚為表實醫以脈浮為虛用火灸之因火氣動血迫血上行故咽燥唾血健曰此可與白虎合犀角地黃湯微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也微數之脈則為熱也灸則除寒不能退熱是慎不可灸也若反灸之熱因火則甚遂為煩逆灸本追虛而復逐熱為實熱則傷血又加火氣使血散脈中氣主煦之血主濡之氣血消散不能濡潤筋骨使骨焦筋傷血散而難復也健曰此以犀角地黃加歸身條芩花粉之屬治之下條同此脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也脈浮在表宜以汗解之醫用火灸取汗而不得汗邪無從出又加火氣相助則熱愈甚身半以上同天之陽身半以下同地之陰火性炎上則腰以下陰氣獨治故從腰以下必重而痹也欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也煩熱也邪氣還表則為煩熱汗出而解以脈浮故為邪還表也燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂三兩燒針發汗則損陰血而驚動心氣針處被寒氣聚成核心氣因驚而虛腎氣承寒氣而動發為奔豚要略曰病有奔豚從驚發得之腎氣欲上乘心從少腹直上衝心也先灸核上以散其寒與桂枝加桂湯以瀉奔豚之氣健曰凡燒針之處赤而微腫者因火熱逼其肌肉故也豈有被寒而起核者耶即針處腫硬如核必是火逆太甚爾曰必發奔豚焉有其事夫奔豚腎積也此雜證家病非傷寒暴病所有蓋緣針傷血分火氣迫其血海衝脈上衝而似奔豚非真奔豚也不與散火涼血復以火灸其核更與桂枝加桂是與火益烈矣於理不然於法甚悖後人蜀敢行之然此亦屬希有火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之先為火逆復以下除之裡氣因虛又加燒針裡虛而為火熱所煩故生煩躁與桂枝甘草龍骨牡蠣湯以散火邪健曰因火逆燒針而致煩躁豈可復以辛燥投之是以火濟火更增害矣太陽傷寒者加溫針必驚也寒則傷營營氣微者加燒針則血留而不行驚者溫針損營血而動心氣要略曰血氣少者屬心宇泰心屬火火先入心心主血藏神血如水也神如魚也兩陽相熏灼水熱湯沸則魚驚躍不安矣健按以上諸條乃三陽雜見之證不當列於太陽篇中俱主桂枝是不分表裡寒熱豈仲景之原底歟如此等因於火逆燒針者總是熱傷氣血經脈而致煩躁驚狂諸恙何可概與辛溫以濟火乎不盡疑團惟宇泰此斷足稱棒喝可見前條錯誤健之折辨非矯枉矣太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆惡寒發熱為太陽表病自汗出不惡寒發熱者為陽明證本太陽表病醫反吐之傷動胃氣表邪乘虛傳於陽明也以關脈細數知醫吐之所致病一二日為表邪尚寒而未成熱吐之則表邪傳於胃中胃中虛寒故腹中飢而口不能食病三四日則表邪已傳成熱吐之則表邪乘虛入胃胃中虛熱故不喜糜粥欲食冷食朝食暮吐也朝食暮吐者食入胃中胃虛不能消化至暮胃氣行里與邪氣相搏則吐然以胃氣尚在故云小逆兼善此病雖逆當自愈吐中有發散之義也但當節飲食則餘邪自去若更妄治之變證起矣健曰病已自去而無惡寒發熱胸滿等證醫反吐之致關上脈細數是餘邪傳入陽明吐傷津液胃虛熱燥故飢而不能食也何成氏謂其表寒入胃耶胃寒而有關脈數者耶三四日不應吐而反吐之胃更熱矣故欲冷食冷食至暮亦己作熱而自吐出皆因吐逆胃氣大傷豈小逆也夫胃為後天之本百病不宜傷胃蜀可無治蓋亦脫文耳急須二陳合竹茹溫膽湯去枳實投之逆始已也太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也太陽表病醫反吐之傷於胃氣邪熱乘虛入胃胃為邪熱內煩故不惡寒不欲近衣也健曰此條與上條同等成氏原知為邪熱乘胃可見前條注謬不待言矣何古人之出入不自返也治應同上更宜或連或膏以除其煩病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故吐也陽受氣於胸中發汗外虛陽氣令陽氣微膈氣虛也數為熱本熱則消穀客熱則不能消因發汗損陽氣致胃中虛冷故吐也健曰此條結句冷字最疑既得脈數而客熱在胃不能消穀胃為熱擾故吐也謂其胃虛則可謂其胃冷則否豈有胃冷而脈數者乎此冷字乃誤入也治宜清胃以止吐扶胃以迸食顧傷寒書之差失類此者不少讀者須審之太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先以此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也心下溫溫欲吐鬱郁微煩胸中痛當責邪熱客於胸中大便反溏腹微滿則邪氣已下於胃也日數雖多若不經吐下止是傳邪亦未可下當與柴胡湯以除上中二焦之邪若曾吐下傷損胃氣則邪乘虛入胃為實非柴胡湯所能去與調胃承氣湯下胃熱以嘔知胃氣先曾傷動也觀子過經十餘日邪熱入里之時欲吐胸痛腹滿微煩熱結在腑之候大便當硬而反溏者必由先時醫人吐下所傷也妄吐者損動胃氣而嘔妄下者腸虛不固而溏雖溏內有實熱未除當與調胃承氣以去之若未經吐下者不可與以便溏則內無實結也大嘔吐胸痛者多為柴胡證便溏者熱未全入腑此亦不得為邪在半表裡何也嘔者以先時極吐而嘔則溏者亦因先時極下而溏不因欲嘔便作柴胡證也健曰凡下證必見里邪作實者方可與下此先已自極吐下而尚溫溫欲吐胸痛微溏煩滿成注謂邪乘入胃為實與承氣以下胃熱又曰不經吐下者不可與愚以為已經吐下若是實邪可以去矣今不去復嘔明系經邪在胃故過經不解勢欲發斑若與承氣是經腑不分而有內陷之禍須當以柴葛解肌合小陷胸投之托斑化滯則嘔止而煩滿痛蠲如果拒按舌焦者乃調胃承氣之證也溫溫古作嗢嗢太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之太陽經也膀胱腑也此太陽隨經入腑者也六七日邪傳裡之時脈微沉邪氣在裡之脈也表氣仍在者則邪氣猶淺當結於胸中若不結胸中其人發狂者熱結在膀胱也經曰熱結膀胱其人如狂此發狂則又深矣少腹硬滿小便自利者血證諦也與抵當湯以下畜血宇泰按玩仍在二字則邪氣為不傳裡非猶淺也膀胱為太陽本經曰熱在下焦曰少腹滿小便自利皆膀胱之證故總結曰隨經瘀熱也在裡二字要看得活非三陰之裡乃隨經膀胱之裡兼善因是下焦畜血中間自有輕重然皆發汗未得其宜或當汗不汗或汗遲或覆蓋不周而汗不透其太陽之邪無從而出故隨經入腑結於膀胱令小腹滿硬若小便不利者血不畜小便利者血畜也血或不畜為熱迫之則自下血熱隨血出而愈若血不下外不解者為未可攻當先解外外解但少腹結急者用桃核承氣攻之此如狂也其發狂者則不然表證雖在脈已沉微邪氣傳裡其可已乎下之則已故抵當湯主之海藏畜血下焦血結膀胱當知其為從太陽中來侵盡無形之氣乃侵有形之血太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之身黃脈沉結少腹硬小便不利者胃熱發黃也可與茵陳湯身黃脈沉結少腹硬小便自利其人如狂者非胃中瘀熱即熱結下焦而為畜血也與抵當湯以下畜血健曰發黃如狂是兩證同是少腹硬在小便利不利之分發黃屬胃家熱結未入膀胱而無血畜如狂乃太陽隨經入腑之熱結聚畜血故黃主茵陳狂主抵當此條理順傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸傷寒有熱少腹滿是畜血於下焦若熱畜津液不通則小便不利其熱不畜津液而畜血不行小便自利者乃為畜血當與桃核承氣湯下之然此無身黃矢黑又無喜忘發狂是未至於甚不可峻利之藥當與抵當丸小下之可也宇泰身黃矢黑喜忘發狂是推廣之詞上文只是滿而不硬耳海藏丸藥味同劑如何是二法蓋喜忘發狂身黃矢黑者病之甚也無以上各證但少腹滿小便利者輕也故止以三之二作丸丸者取其數少而緩湯用煎服一升而丸止七合耳太陽病小便利者以飲水多必心下悸小便少者必苦裡急也飲水多而小便自利者則水不內畜但腹中水多今心下悸要略曰食少飲多水停心下甚者則悸飲水多而小便不利則水畜於內而不行必苦裡急也健曰心下悸者以飲水多水凌心氣雖小便利而不能去也宜二陳合四苓以除之小便不利而裡急者宜八正散解之
