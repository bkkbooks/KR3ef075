body:
  text: 傷寒直指卷十類證一太陽經發熱發熱者無休止時也寒熱者寒已而熱熱已而寒也潮熱者有時而熱有時止如潮汛之不失期也煩熱者虛而煩躁發熱也傷寒發熱證多其不同者太陽邪氣怫鬱在表多作壯熱若微熱者邪已衰也陽明主乎潮熱少陽主往來寒熱然亦皆有發熱者其兼證必異其施治亦殊也少陰反發熱者外未離乎表也裡寒外熱者陰盛格陽之熱也太陰不言發熱而有中風脈浮可汗之條厥陰有陰極陽生先厥後熱之熱是六經皆有發熱也汗下後亦有發熱者非邪猶在即陰陽已虛也合併病異氣病亦無不發熱者與瘥後發熱皆宜詳本條之說而各區別毋混視焉可矣太陽發熱頭痛項強腰脊痛身痛骨節痛惡寒無汗脈緊麻黃湯惡風有汗脈浮緩桂枝湯中風脈浮緊發熱惡寒體痛無汗煩躁大青龍湯表不解心下有水氣乾嘔發熱而咳小青龍湯中風發熱而煩有表裡證渴欲飲水水入則吐為水逆五苓散大汗後脈浮數微熱消渴小便不利為太陽傳本上方服桂枝湯或下後仍頭項強痛發熱無汗心下滿痛小便不利桂枝湯去桂加茯苓白朮湯五六日大下後身熱不去心中結痛梔子豉湯丸藥大下之後身熱不去微煩梔子乾薑湯傷寒發熱汗出不解心下痞硬嘔吐下利大柴胡湯發汗不解仍發熱心悸頭眩身瞤動振振欲擗地真武湯發熱頭痛脈反沉不瘥身體痛當救里四逆湯陽明發熱目痛鼻乾不眠微惡寒頭額痛脈洪長葛根湯脈浮滑表裡有熱白虎湯吐下後熱結在裡表裡俱熱惡風大渴煩躁脈洪數白虎加人參湯陽明中風口苦咽乾腹滿喘發熱惡寒脈洪緊小柴胡湯加葛根若發熱汗出不惡寒反惡熱身重柴葛解肌湯陽明下之外有熱懊憹飢不能食但頭汗梔子豉湯太陽三日發汗不解蒸蒸發熱調胃承氣湯陽明汗多微發熱惡寒熱不潮外未解也未可與大承氣其腹大滿不通小承氣微和之小便不利大便乍難乍易時有微熱喘冒不臥大承氣湯陽明發熱汗多急下之上方六七日目中不了了睛不和無表裡證大便難身微熱急下之上方無表裡證發熱七八日雖脈浮數可下之已下脈數不解善飢不大便有瘀血也抵當湯脈浮而遲表熱裡寒下利清穀四逆湯少陽發熱耳聾脅痛寒熱嘔口苦頭角痛脈弦數小柴胡湯傷寒頭痛發熱脈弦細者屬少陽上方嘔而發熱上方四五日身熱惡風頸項強脅下滿而渴上方傷寒中風往來寒熱胸脅滿不欲飲食心煩喜嘔或不渴外有微熱小柴胡去人參加桂六七日發熱微惡寒肢節煩疼微嘔心下支結柴胡桂枝湯少陰始得之反發熱足冷脈沉麻黃附子細辛湯下利清穀裡寒外熱厥逆脈微欲絕反不惡寒面赤色通脈四逆湯吐利手足不逆冷反發熱者不死脈不至灸少陰厥陰下利清穀裡寒外熱汗出而厥通脈四逆湯大汗出熱不去內拘急四肢疼下利厥逆惡寒四逆湯嘔而脈弱小便複利微熱見厥難治上方先厥後發熱下利必自止反汗出必喉痹口苦發熱不惡寒而渴為溫病發汗已身猶灼熱為風溫節庵翕翕發熱為表熱是風寒客於皮膚邪氣鬱於外表熱而里不熱也脈浮緊無汗宜發表浮緩有汗宜解肌蒸蒸發熱為裡熱是陽邪陷入陰中裡熱而表不熱也脈沉實而渴宜下之其在半表裡者表熱未罷邪氣傳裡而里未作實則表裡俱熱脈必弦數宜和解太陰厥陰皆不發熱惟少陰有反發熱是未離於表也麻黃附子細辛湯若發熱煩渴小便赤脈浮大此表裡俱見也五苓散利之汗下後發熱者大汗則損氣氣損則陽微故脈虛而惡寒大下則傷血血傷則陰弱故脈澀而發熱此誤汗誤下如此也若陰陽俱虛熱不止者汗下後復熱脈躁亂者下利熱不止者皆死矣復庵諸陰不發熱惟少陰發熱有二證初得病即見證發熱惡寒頭不疼宜麻黃附子細辛湯若下利清穀身熱躁擾裡寒外熱乃陰盛格陽宜四逆湯附子理中湯蓋陽邪傳陰經而利者是熱利陽陷入里外所以無熱陰邪入陰經而利者乃里寒自利寒既在裡為主則陽氣必客於外所以反發熱要知發於陽而熱者頭必疼發於陰而熱者頭不痛為驗也又發汗後只惡寒者為虛虛乃表虛是汗出太過所謂陽微則惡寒宜芍藥附子甘草湯發汗後只惡熱者為實實乃里實是表解而里不消所謂陰微則發熱宜大柴胡湯或小承氣湯又汗下後陰陽不相入水火不相濟致餘熱未退不可更用冷藥其人已虛虛能生熱宜小建中湯加當歸一錢或四君子加黃耆或十全大補其營衛虛甚者真武湯審是邪熱未解雖經汗下卻不畏寒者宜竹葉石膏湯嗣真仲景論中三陰皆有發熱大抵陰證雖發熱必有手足厥冷下利清穀脈沉之殊與陽證自不類惡風衛氣者所以溫分肉充皮毛肥腠理司開闔者也風邪中於衛則腠理不密故惡風惡寒者不當風而時自畏怯惡風者居密室之中則無所畏惟當風則淅淅然惡也惡寒有陰陽之別惡風悉屬於陽所以三陰經證無惡風也里證全具而惡風未罷者當先解其外也太陽無汗惡鳳麻黃湯有汗惡風桂枝湯項背強𠘧𠘧反汗出惡風桂枝加葛根湯無汗惡風葛根湯汗多亡陽惡風小便難四肢急難屈伸桂枝加朮附湯吐下後不解表裡俱熱時惡風大渴而煩白虎加人參湯四五日身熱惡風頸項強脅下滿而渴小柴胡湯風濕相搏骨節痛短氣小便不利身微腫自汗惡風甘草附子湯惡寒寒邪客於營衛故惡寒身雖熱不欲去衣由陰氣上入陽中或陽微或風虛相搏所致也惡寒一切屬表雖里證悉具而微惡寒者亦表未解當先解其外俟不惡寒方可攻裡然雖屬表亦有虛實之分汗出惡寒為表虛宜解肌無汗惡寒為表實可發汗若無熱惡寒脈沉細陰證也宜溫里治之太陽發熱無汗惡寒麻黃湯中風自汗惡寒桂枝湯中風脈浮緊發熱惡寒身痛無汗煩躁大青龍湯八九日如瘧熱多寒少脈浮緩欲愈脈微而惡寒陰陽俱虛也不可更汗吐下發熱惡寒熱多寒少脈微弱無陽也不可更汗桂枝二越婢一湯脈浮自汗小便數心煩腳攣急微惡寒誤與桂枝必厥宜桂枝附子湯五六日頭汗出微惡寒心下滿手足冷不欲食便硬脈細為陽微結有表復有里也小柴胡湯六七日發熱微惡寒支節煩疼微嘔心下支結柴胡桂枝湯發汗病不解反惡寒虛故也芍藥附子甘草湯下後復汗振寒脈微細內外俱虛也當歸四逆湯真武湯下後脈促胸滿微惡寒桂枝去芍藥加附子湯大下復汗心下痞惡寒表未解也不可先攻痞解表桂枝湯攻痞大黃黃連瀉心湯心下痞復惡寒汗出附子瀉心湯陽明脈遲汗出多微惡寒桂枝湯陽明中風口苦咽乾腹滿喘發熱惡寒脈浮緊小柴胡加葛根陽明汗多微發熱惡寒外未解也其熱不潮未可與大承氣若腹大滿不通小承氣微和之少陽頭汗出微惡寒小柴胡加桂枝少陰無熱惡寒理中湯四逆湯下利惡寒而蜷四逆湯真武湯小建中湯大汗出熱不去內拘急四肢疼下利厥逆惡寒四逆湯陽明背微惡寒口燥渴心煩白虎加人參湯少陽口中和背惡寒附子湯少陰惡寒身蜷而利手足逆冷者不治四逆惡寒身蜷脈不至不煩而躁者死損庵太陽病在表故惡寒少陽半表半裡故微惡寒陽明在裡本不惡寒或惡寒者與太陽合病也三陰惟少陰有惡寒之證然少陰惡寒亦有二發於陰者無熱而惡寒宜溫之理中四逆類若下利惡寒而蜷手足溫者小建中類惡寒而蜷時自煩欲去衣被陽氣將復活人云宜大柴胡趙氏謂宜溫散陰邪導引真陽汗出而解若下之不能解表反虛其里惡寒之邪內陷矣雖脈浮滑內實亦未可遽用大柴胡必先解表使惡寒證罷而後用之至於太陰自利不渴厥陰下利厥逆俱成惡寒太陰宜理中厥陰宜四逆夫太陰厥陰本無惡寒今或惡寒者陰入陰者也特少陰為多耳背惡寒者陽弱也有二證少陰以陰寒氣盛不能消耗津液故口中和三陽合病以陽氣陷入津液已涸故舌乾口燥少陰附子湯三陽合病白虎湯南陽大抵太陽惡寒亦不可過覆衣被及近火氣恐寒熱相搏脈道沉伏愈令人寒甚但飲以和表之藥自不惡也若婦人尤忌近火恐寒氣入血室結聚針藥所不能治也頭痛巔痛腦後痛者太陽也頭額痛者陽明也頭角痛者少陽也頭痛專主表太陽為病屬表故太陽經獨多三陰脈至頸而還故無頭痛惟厥陰會於巔故亦有頭痛然卻無身熱與陽證自不同也若風溫病在少陰濕溫病在太陰而頭反痛及陰毒亦然此痰與氣逆壅而上氣不得降故頭痛是又不可拘拘為也內因頭痛作止有時外因頭痛常常有之必傳入里方罷太陽頭痛有汗惡風桂枝湯無汗惡寒麻黃湯不大便六七日頭痛有熱小便清如不在裡當鬚髮汗若頭痛者必衄桂枝湯服桂枝湯或下之仍頭項強痛發熱心下滿痛小便不利桂枝去桂加茯苓白朮湯頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒表解里未和也十棗湯二證屬飲家病發熱頭痛脈反沉不差體痛當救里四逆湯陽明頭額痛目痛鼻乾不眠脈微洪葛根解肌湯用川芎升麻表裡大熱煩渴頭痛如破竹葉石膏湯頭痛不惡寒反惡熱大便實調胃承氣湯潮熱譫閉渴而頭痛脈沉數有力小承氣湯陽明身熱頭痛漱水不欲咽必發衄脈數者犀角地黃湯茅花湯傷寒頭痛發熱脈弦細屬少陽少陽頭角痛脈弦數並小柴胡加川芎膈上有涎頭痛胸滿寒熱脈緊而不大瓜蒂散太陰頭痛氣逆有痰二陳加枳實芎辛少陰頭痛足寒氣逆麻黃附子細辛湯厥陰乾嘔頭痛吐涎沫吳茱萸湯厥陰頭痛脈緩為欲愈小建中湯熱病後頭痛不止石膏川芎湯濕家鼻塞頭痛瓜蒂散搐鼻黃水出即愈兩感頭痛口乾煩滿而渴與頭痛極連胸手足寒者真頭痛也皆不治復庵三陽有頭痛三陰無頭痛此論古矣然三陰間有頭痛者厥陰與督脈會於巔也三陽間有不頭痛者此非正法三陰頭痛似非正病然陰盛隔陽者亦有頭痛以其病本在陰而陽又為陰所病故亦見陽證也若發汗太過至頭疼甚者宜小建中加川芎一錢東垣太陰頭痛者必有痰也少陰頭痛者足寒而氣逆也蓋太陰少陰二經雖不至頭然痰氣逆壅於膈中則頭上氣不得暢降而為痛也仁齋少陽頭痛不問有汗無汗皆以小柴胡主之凡非次頭痛發寒熱脈緊不大者是上膈有痰宜瓜蒂散吐之海藏傷寒頭不痛者知邪不在經頭痛者知邪猶在經項強項強者太陽經感邪也然結胸並病痓病皆有之其兼背強則太陽入陽明矣太陽病頭項強痛惡寒項背強𠘧𠘧反汗出惡風桂枝加葛根湯無汗惡風葛根湯服桂枝湯或下之仍頭項強痛發熱心下滿痛小便不利桂枝去桂加苓術湯結胸項強如柔痓狀大陷胸丸四五日身熱惡寒頭項強脅滿手足溫而渴小柴胡湯太陽少陽並病頭項強痛眩冒時如結胸心下痞硬刺大椎第一間肺俞肝俞陰毒初得病項背強附子湯甘草湯頸項強急卒口噤背反張為痓項背強𠘧𠘧脈反沉遲為痓體痛體痛乃六經俱有之證有表里寒熱風濕之分太陽寒傷營營血不利身疼者宜汗汗後脈沉遲體痛者宜溫中暍者宜白虎湯裡寒外熱者宜先救里後攻表寒在三陰者脈沉風在三陽支節煩疼四逆柴胡可不審哉中濕者身重不可轉側陰毒者身大痛宛如被杖以此別之太陽發熱惡寒無汗體痛麻黃湯中風脈浮緊惡寒元汗體痛煩躁大青龍湯支節煩疼微嘔心下支結外證未去柴胡桂枝湯發汗後脈沉遲身疼痛桂枝加芍藥人參新加湯傷寒誤下下利清穀身疼痛急救里四逆湯後身疼痛急救里桂枝湯發熱頭痛脈反沉不差身體疼痛四逆湯體痛尺脈遲黃耆建中湯俟尺脈回仍以麻黃湯發之或小柴胡湯和解之太陰中風四肢煩疼脈陽微陰澀而長為欲愈少陰身體痛手足寒骨節痛脈沉附子湯四五日小便不利大便自利腹痛四肢沉重疼痛有水氣也真武湯厥陰大汗出熱不去內拘急四肢疼下利厥逆惡寒四逆湯下利身疼痛清便自調當救里桂枝湯下利腹脹滿體疼痛先四逆湯溫里後桂枝湯攻表厥逆下利身痛嘔逆茱萸四逆湯身痛如被杖面目青咽痛為陰毒升麻鱉甲湯去雄黃蜀椒風濕一身疼痛身重不可轉側小便不利五苓散加羌活蒼朮霍亂後體痛不休少與桂枝湯瘡家身疼痛不可發汗發汗則成痓考少陽無體痛證體痛且身重者始屬陽明中風今云三陽俱有體痛此論未瑩自汗衛氣者護衛皮膚肥實腠理禁固津液不得妄泄邪氣干之則不能衛固於外由是津液妄泄濈濈然出不因發散而自汗也傷風則發熱自汗中暍則汗出惡風而渴風濕甚則汗多而濡是風與暑濕皆能令自汗惟寒邪傷營而不傷衛肌膚閉密故汗不出也始雖無汗及將入里而為熱則營衛通腠理開亦令自汗出矣自汗又有表裡之別虛實之異汗出惡風及微惡寒者皆表未解宜發汗解肌漏不止惡風及發汗後惡寒者表虛也宜溫之若汗出不惡風寒者非表病也表解里病下之則愈如陽明發熱汗出是為熱越及陽明發熱汗多急下之者是也其或汗出發潤如油或如貫珠著身不流則為不治矣誤發汗出不止者為亡陽表虛自汗出不止者亦為亡陽也太陽風傷衛脈浮緩自汗桂枝湯項背強反汗出惡風桂枝加葛根湯過汗漏不止惡風小便難四肢急難屈伸桂枝附子湯朮附湯脈微弱汗出惡風誤服大青龍厥逆筋惕肉瞤真武湯表虛汗不止黃耆建中湯汗不止無他證者溫粉撲之脈浮自汗小便數心煩微惡寒腳攣急誤與桂枝必厥宜桂枝附子湯汗後不可更行桂枝汗出而喘無大熱麻黃杏仁甘草石膏湯下後同桂枝證下之利遂不止脈促喘而汗出葛根黃芩黃連湯心下痞復惡寒汗出附子瀉心湯下利嘔逆汗出不惡寒表已解頭痛心下痞硬滿脅下痛乾嘔短氣里未和也十棗湯陽明身熱濈濈汗自出不惡寒反惡熱胃實也調胃承氣湯陽明多汗津液外出必便硬譫語小承氣湯陽脈實發其汗太過亡津液大便則硬上方陽明汗多若微發熱惡寒外未解也其熱不潮未可與大承氣若腹大滿不通小承氣微和之汗出譫語有風也燥屎在胃必過經下之大承氣湯下之若早語言必亂陽明發熱汗出多急下之大承氣湯脈遲汗出多微惡寒表未解也桂枝湯陽明中風脈浮緊咽燥口苦脹滿微喘發熱汗出惡熱身重柴葛解肌湯不可汗下燒針自汗若發汗小便自利者津液內竭雖便硬不可攻宜蜜膽導陽明汗出多而渴不可與豬苓湯複利小便三陽合病腹滿身重口不仁面垢譫語遺屎自汗白虎湯少陰脈陰陽俱緊反汗出亡陽桂枝加乾薑湯四逆湯下利脈微澀嘔而汗出必數更衣反小者當溫其經灸之吐利汗出手足厥冷發熱惡寒四肢拘急四逆湯既吐且利小便複利大汗出下利清穀內寒外熱脈微欲絕上方二條系霍亂下利清穀裡寒外熱汗出而厥通脈四逆湯吐逆厥冷脈沉身痛大汗人參四逆湯加桂枝耆術肢冷額上手背汗出脈沉細四逆湯脈浮汗出身重多眠鼻鼾語難為風溫太陽發熱汗出惡寒為柔痓海藏太陽自汗桂枝湯少陰自汗四逆湯陽明身熱鼻乾不臥目痛自汗惡熱而尺寸俱浮者白虎湯又傷寒尺寸脈俱長自汗大出身表如冰石脈傳至里細而小及瘧疾但寒不熱其人動作如故此陽明傳入少陰戊合癸夫傳婦也白虎加桂枝主之然脈雖細小當以遲疾別之此證脈必疾而不遲活人陰不得有汗而少陰亦有反汗出之證陽明法多汗而陽明亦有反無汗之條皆不可不察也陽明經不大便有大便不通有大便難有大便硬皆陽明胃實之候里證宜下者多矣然胃實有表未罷者宜先解表表證已乃可攻之又口渴咽乾脈浮緊者猶在半表必先和之忌即攻下又表證罷不可攻者大便已硬惟宜導之至便雖硬無所苦不可攻也惟宜俟之若胃實表解而有下證者方隨證攻之陽明太陽少陽傳入眾所共知於三陰傳入者鮮能察識若能熟視其微則三陰有急下之證多矣豈非仲景之微意與六七日不大便頭痛有熱勿與承氣湯小便清者知不在裡仍在表也桂枝湯陽明病脈浮無汗而喘麻黃湯陽明中風脈弦浮大短氣腹滿脅及心痛鼻乾不得汗嗜臥一身悉黃小便難潮熱噦耳前後腫外不解脈續浮小柴胡湯但浮無餘證麻黃湯陽明脅下硬滿不大便而嘔舌上白胎小柴胡湯傷寒頭汗出微惡寒手足冷心下滿不欲食大便硬脈細上方陽明自汗若發汗小便自利者津液內竭雖硬不可攻蜜膽導太陽寸緩關浮尺弱發熱汗出不惡寒而渴轉屬陽明也小便數大便必硬不更衣十日無所苦也渴欲飲水少少與之渴不止五苓散陽明病本自汗醫重發汗病已差尚微煩不了了者以亡津液胃中乾燥故大便硬若本小便日三四行今日再行津液還入胃中大便不久出也陽明病不吐不下心煩調胃承氣湯汗出多必大便硬譫語小承氣湯若譫語止莫再服陽明實發其汗太過亡津液大便因硬小承氣湯太陽吐下汗後微煩小便數大便因硬小承氣和之不大便繞臍痛煩躁有燥屎也大承氣湯潮熱不大便六七日少與小承氣轉失氣者有燥矢可攻上方小便不利大便乍難乍易微熱喘冒不臥有燥矢也上方脈遲汗出不惡寒身重短氣腹滿喘潮熱外已解可攻裡也手足濈然汗出大便已硬上方譫語潮熱不能食必有燥矢上方能食者但硬無燥矢不大便六七日小便少者必初硬後溏未可攻須小便利者屎定硬乃可攻之上方陽明下後心中懊憹而煩尚有燥屎也上方若腹微滿必初硬後溏不可攻大下後六七日不大便煩不解腹滿痛有燥屎也上方吐下後不大便至十餘日日晡潮熱不惡寒獨語如見鬼狀劇者不識人循衣摸床微喘直視脈弦者生澀者死微者但發熱譫語上方六七日目中不了了睛不和無表裡證大便難身微熱急下之上方陽明少陽合病下利脈滑而數有宿食也上方二陽並病太陽證罷潮熱汗出譫語便難上方少陰病六七日腹脹不大便急下之上方陽明喜忘矢雖硬大便反易其色黑必有畜血抵當湯無表裡證下後脈數不解善飢六七日不大便有瘀血也上方不大便舌上燥渴日晡小潮熱從心下至少腹硬滿痛不可近結胸也大陷胸湯趺陽脈浮澀小便數大便難脾約也麻仁丸念莪仲景論初硬後溏者有四證曰陽明病潮熱不大便與小承氣不轉失氣者初硬後必溏不可攻之此胃初熱未作實也曰太陽病下之腹滿初硬後必溏此虛在上無燥矢者也此二證不言小便曰陽明病中寒不能食小便不利手足濈然汗出此欲作痼瘕初硬後必溏以水穀不分也曰服承氣湯若不大便六七日小便少者初硬後必溏須小便利屎定硬乃可攻之此二證一言不利一言少乃知仲景測大便法皆以小便驗之然小便利屎定硬固為可攻亦有小便利大便硬而不可攻者何也陽明自汗或發汗後小便自利此為津液內竭雖硬不可攻當須自欲大便蜜煎導之蓋非裡實可攻也夫胃雖實有表者汗之半表半裡者和之不因胃實便下也此仲景心法精求詳考自無誤矣節庵不大便者因發汗利小便過多耗損津液以致腸胃乾燥邪熱傳入轉屬陽明里證再見發渴譫語狂妄潮熱自汗小便赤脈實或腹脹滿硬痛急選承氣等下之大便通而愈矣倘脈浮脈虛惡寒表證尚在或帶嘔吐知邪未全入腑猶在半表裡間用小柴胡和之俟大便硬不得不下者只以大柴胡下之若自汗發汗小便自利不大便者津液內竭復不可攻之又脾約一證不因發汗利小便亡津液小便自數大便難者為津液偏滲致大腸燥也必麻仁丸治之活人不大便有陰結陽結之論不可不別其脈浮而數能食不大便此為胃實名曰陽結宜小柴胡所謂和其營衛以通津液縱不了了得屎而解也其脈沉而遲不能食身體重大便反硬名曰陰結宜用金液丹所謂陰盛則結之結同也仁齋陽結宜調胃承氣湯陰結可四物湯加附子或半硫丸太陽病經吐下發汗後微煩小便數大便因硬宜小承氣和之裡實燥矢結聚腹滿按之臍腹堅硬大承氣湯下之陽明自汗小便自利津液內竭蜜煎導血虛腸燥不通或去血過多或新產婦人或久病虛人皆當歸潤燥湯及麻仁丸蜜煎導等法不可下也健曰雖屬陰結而金液半硫陽精猛烈之藥非傷寒所宜即雜病而人信服之制不如法則有貽害也不得臥不得眠者陽明病也胃不和則臥不安或因汗下而心血虧損或因煩熱而轉輾不寧或因瘥後餘熱未盡陰氣未復皆令人不得眠也正病不得眠者陽明也少陰當但欲寐不得臥者緣陽氣入少陰非少陰正病也不得眠者皆熱證其太陽汗下後晝日煩躁不得眠用乾薑附子湯蓋復其汗下所亡之陽非治不眠也不得眠為常證然少陰脈沉細自利煩躁不得眠者死傷寒發熱下利厥逆煩躁不得臥者死俱正氣弱陽不復也太陽病二三日不能臥但欲起心下必結脈微弱者寒也桂枝加厚朴杏子湯下後復汗晝日煩躁不得眠夜安靜不嘔不渴無表證脈沉微身無大熱乾薑附子湯汗吐下後虛煩不得眠心中懊憹梔子豉湯下後心煩腹滿臥起不安梔子厚朴湯發汗後胃中乾燥不得眠欲飲水少少與之愈脈浮火迫劫之亡陽驚狂起臥不安桂枝去芍藥加蜀漆牡蠣龍骨救逆湯衄家不可汗汗則額上陷脈緊急直視不能胸不眠黃芩芍藥湯身熱目痛鼻乾不得臥尺寸脈長陽明標病也葛根解肌湯脈洪數自汗表裡俱熱煩渴飲水不得眠人參白虎合解毒湯中風脈浮緊咽燥口苦喘滿發熱汗出不惡寒惡熱身重加燒針怵惕煩躁不眠梔子豉湯小便不利大便乍難乍易微熱喘冒不能臥有燥屎也大承氣湯少陽發熱口苦心煩不得眠小柴胡加黃連梔子虛弱人加麥冬棗仁少陰三日以上心煩不得臥黃連阿膠湯少陰下利六七日咳而嘔渴心煩不得眠豬苓湯脈浮數身疼無汗煩躁不得眠麻黃湯傷寒大熱乾嘔呻吟錯語不得眠黃連解毒湯汗後脈浮數煩渴不眠小便不利五苓散脈數大人參白虎湯竹葉石膏湯汗下後虛煩不得眠加味溫膽湯梔子烏梅丸硃砂安神丸汗出脈虛不得眠小建中湯節庵凡陽盛陰虛則不得眠蓋夜以陰為主陰氣盛則目閉而安臥若為陽所勝終夜煩擾不寧也汗出鼻乾不得臥者邪在表也有燥屎大熱錯語及大汗出胃中汁干不得眠者邪在裡也所謂胃不和則臥不安治宜澈熱和胃也咳而嘔煩悶不得眠者停水也少陰病不得眠者熱煩於內宜扶陰散熱也瘥後不得眠者熱氣未散與諸陽相併陰氣未復也汗下太過陽氣暴虛而不得眠者若無熱證宜姜附退陰復陽也士材心為丙丁之主邪火炎灼則神不休息魂氣飛揚不能歸肝而不臥脈大則血亡心主血故不得臥健曰大汗則心液耗散亦不得臥潮熱一日一發按時而熱若潮汛之來不失其期也若一日三五發者非也潮熱屬陽明陽明旺於未申故必於日晡時發熱乃為潮熱專主胃中實熱燥屎使然故宜下之陽明潮熱大使硬與承氣湯不大便者不與若不大便六七日先與小承氣轉失氣者燥屎也可與大承氣不轉失氣者初硬後必溏慎勿攻攻之則脹滿不食脈遲汗出不惡寒身重短氣腹滿而喘潮熱者外欲解可攻裡也手足濈然汗出大便已硬大承氣湯吐下後不大便日晡潮熱不惡寒獨語如見鬼劇者不識人循衣摸床微喘直視脈弦者生澀者死微者但發熱譫語上方譫語潮熱不能食有燥屎也上方若能食但硬非燥屎譫語潮熱脈滑而疾與小承氣湯轉失氣者更與勿轉失氣者勿與病人煩熱汗出則解又如瘧狀日晡發熱屬陽明也脈實下之大承氣湯脈浮虛汗之桂枝湯潮熱大便溏小便利胸脅滿不去小柴胡湯十三日不解胸脅滿而嘔日晡潮熱微利之先小柴胡解外次柴胡加芒硝湯陽明中風脈弦浮大短氣腹滿脅及心痛鼻乾不得汗嗜臥身黃小便難潮熱噦耳前後腫過十日脈續浮小柴胡湯脈但浮無餘證麻黃湯太陽重發汗復下不大便五六日舌上燥渴日晡小有潮熱心下至少腹硬滿痛不可近大陷胸湯二陽並病太陽證罷但發潮熱汗出便難譫語大承氣湯南陽仲景云潮熱者實也大承氣證又云其熱不潮未可與也則知潮熱當下無疑矣更看脈與外證何如若脈浮脈虛及外證惡寒猶有表者且與小柴胡解之其胸脅滿而嘔日晡潮熱其潮熱已而微利微潮熱大便溏或潮熱而咳逆者當用小柴胡也又陽明病脈浮而緊潮熱發作有時但脈浮者必盜汗出黃芩湯主之至於外未解腹大滿不通與小承氣微和胃氣及當行大承氣者必先與小承氣不轉失氣者不可攻之兢兢致慎未便以潮熱為必可攻也明理潮熱屬陽明邪入胃腑為可下之證設脈浮而緊潮熱而利或小便利大便溏是熱未入腑猶帶表邪當先和解其外俟小便利大便硬方可攻之若潮熱於寅卯即屬少陽潮熱於已午已屬太陽又不可不辨也仁齋潮熱若在寅卯辰巳時候且未可下只宜小柴胡和之熱甚煩渴者人參白虎湯解之譫語譫語者妄有所見而語無倫次皆胃中實熱上乘於心心為熱冒故神識昏亂謬妄不自知也多言稍有次第者獨語如見鬼者睡中呢喃者皆熱之輕也音聲高朗言之不休者熱之重也狂言叫喊罵詈不避親疏神明已亂熱之最甚也諸如此者脈短者死脈和者愈又身微熱脈浮大者生逆冷脈沉者死或氣上逆而喘滿或氣下奪而自利皆為逆也十三日不解過經譫語當下之若小便利者大便當硬而反下利脈調和知以丸藥下之非也自利者脈當微厥今反和內實也調胃承氣湯脈浮自汗小便數微惡寒腳攣急誤與桂枝攻表得厥厥愈後胃不和而譫語少與調胃承氣湯陽明病汗多胃燥必便硬譫語小承氣湯譫語止莫再服譫語潮熱脈滑疾上方轉失氣者再服不轉失氣勿服四五日脈沉喘滿沉為在裡反發其汗津液越出大便為難表虛里實久則譫語大承氣湯譫語潮熱反不能食必有燥屎上方汗出譫語燥屎在胃中以有風須過經乃可下之上方吐下後不大便潮熱不惡寒獨語如見鬼劇者不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語上方發汗多亡陽譫語者不可下和營衛以通津液柴胡桂枝湯下後胸脅滿煩驚小便不利譫語一身盡痛不可轉側柴胡加龍骨牡蠣湯少陽誤汗譫語胃不和煩悸大柴胡湯承氣湯發汗吐下溫針後譫語柴胡證罷為壞病二陽並病太陽證罷潮熱汗出便難譫語大承氣湯太陽少陽並病誤汗譫語不止刺期門三陽合病腹滿身重口中不仁面垢譫語遺尿自汗白虎湯男子陽明病下血譫語熱入血室但頭汗出刺期門及小柴胡加黃連瓜蔞傷寒腹滿譫語脈浮緊肝乘脾也名曰縱刺期門譫語不惡寒反惡熱白虎湯火迫致譫語上方大便秘小便赤手足溫脈洪數者必譫語調胃承氣湯下利譫語脈滑數有燥屎也此湯飲旁流所利皆稀水可下之大承氣湯已得汗身和譫語柴胡桂枝湯譫語氣虛獨言脈無力補中益氣湯陰證手足冷脈微細而譫語四逆湯白通湯黃耆加乾薑湯節庵熱入於胃水涸糞燥必發譫語為實邪有被火劫汗而譫者有亡陽而譫者有下利清穀不渴而譫者皆為虛邪如脈來沉實洪數有力大便不通小便赤澀燥渴譫語狂妄腹脹滿硬痛或潮熱自汗或下利純清水心腹硬痛皆里證邪熱燥矢也大承氣下之或下後利不止與喘氣逆而上奔自利氣脫而下奪皆為逆也其三陽合病脈實身重口中和面垢遺尿白虎湯或便結大熱狂言煩躁精彩不與人相當五苓散三錢新汲水探吐或掛苓湯狂言漱水不欲咽大便黑小便自利身黃脹滿此失下瘀血譫語桃仁承氣湯下盡黑物則愈全善譫語氣虛獨言也予用參耆歸術等劑得愈者廿數豈可不分虛實概用黃連解毒大小承氣等湯乎丹溪亦曰予治譫語皆用參術之劑而愈信夫屬虛者十居八九譫語脈調手足和小便利者陽也故用承氣下之脈微厥及少陰但欲寐下利小便難被火劫汗出譫語者皆陰也故當補劑和之海藏黃耆湯治傷寒或時悲哭或時嬉笑或太息或語言錯亂世疑為譫語非也此神不守舍陰盛陽虛之故兩手足脈浮沉不一舉按無力浮之損小沉之亦損小皆陰脈也宜先緩而後急緩者黃耆湯急者加乾薑一錢大便秘者調中丸或理中丸復庵有虛人譫語乃虛不禁熱不可遽用十分冷劑健曰向言實則譫語虛則鄭聲呢喃密語乃屬陰盛陽衰與鬼為鄰之象矣但譫則聲響而喚之猶醒舌上黃焦或黑脈洪大滑數為實是可下也若語言低小短氣喚之恍惚不醒舌淨脈虛微細者屬陰陽兩虛斯為應補之候鄭聲謂鄭重頻煩語言諄復不換他句也若譫語則亂言無次數數更端蓋神有餘則機變而更端神不足則無機變而但守一聲故曰實則譫語虛則鄭聲成氏謂為鄭衛之聲非是鄭聲重語也實則譫語虛則鄭聲四逆脈微鄭聲四君子湯甚者參附湯送黑錫丹復庵譫語屬陽鄭聲屬陰譫語者顛倒錯亂言出無倫或對空獨語如見鬼狀鄭聲者鄭重頻煩諄諄不已如老人遇事瑣碎不休以陽氣虛故也此譫語鄭聲虛實之不同二者本不難辨但陽盛裡實與陰盛格陽皆能錯語須以他證別之大便秘小便赤身熱煩渴而妄言者乃里實之譫語也小便如常大便洞下或發躁或反發熱而妄言者乃陰盛格陽之譫語也裡實宜下之調胃承氣湯熱躁甚而妄言不休大渴喜飲理中湯若陰盛格陽通脈四逆湯附子理中湯又有不繫正陽明似困不困間時一二聲譫語者當隨證施治已得汗卻身和而妄言者此汗後津液不和慎不可下乃非陽非陰宜小柴胡合建中湯和營衛通津液病後氣血未復精神未全多於夢寐中失聲如魔此非譫語鄭聲也溫膽湯去竹茹加入參或六君子湯仁齋大抵鄭聲因內虛正氣將脫之象如更手足冷脈沉細口鼻氣短言語輕微無力布息或呃逆不止神昏氣促不知人事死矣如氣不促手足溫脈沉細而微急以附子湯倍人參兼進接氣黑錫丹一二服以助真氣或濃煎參汁徐徐服或未可用附子者三白湯倍人參發狂經曰邪入於陽則狂又曰重陽者狂是狂為陽盛也傷寒熱毒在胃並於心臟使邪不寧而志不定至於發狂為邪熱極矣狂之發作少臥不飢妄語笑妄行起登高而歌棄衣而走甚則踰垣上屋皆獨陽亢極非大吐下之不能已也亦有當汗不汗瘀熱在裡下焦畜血而如狂者小便必利特未至於狂耳其或重熨迫汗灼艾燒針令人煩躁起臥不安則為火邪驚狂其或狂言目反直視為腎絕汗出復熱狂言不能食者皆死矣脈浮無汗醫以火迫劫取汗亡陽必驚狂起臥不安桂枝湯去芍藥加蜀漆龍骨牡蠣救逆湯太陽六七日表證仍在脈微而沉反不結胸其人發狂以熱在下焦少腹當硬滿小便自利下血乃愈以隨經瘀熱在裡也抵當湯太陽病不解熱結膀胱其人如狂血自下者愈外不解尚未可攻外已解但少腹急結乃可攻桃仁承氣湯身黃脈沉結少腹硬小便自利其人如狂血證諦也抵當湯陽明病欲食小便不利大便自調骨節疼翕翕如有熱奄然發狂濈然汗出而解桂枝湯羌活湯類大渴目赤唇焦舌乾齒燥脈實狂妄大承氣湯煩躁狂走妄言叫罵面赤咽痛鼻如煙煤或身斑如錦紋陽毒也表者陽毒升麻湯黑奴丸里者大黃散時行熱病發狂黑奴丸陰證發躁欲坐泥水井中面赤足冷脈沉不能飲水霹靂散冷服身微熱面赤足冷脈舉之數大按之無力此虛陽伏陰而躁人參四逆湯冷服脫陰者發狂宜峻補其陰天門冬地黃煎膏謂之天地煎少陰誤汗漏不止亡陽故狂玉屏風散入附子一枚狂不止冷汗自出手足厥逆四逆湯冷進發狂肌表雖熱按之冷透手或肩背胸膈有斑十數點脈極沉細者乾薑附子湯咖人參冷服仁齋發狂者傷寒凶惡之候也要在詳辨而治之如陽盛發狂者大抵熱甚則神昏狂妄罵詈踰垣上屋神明之亂非素能為之病使然也必先以涼水噀其面或以硝水法浸布搭胸中甚者以玄明粉寒水石散先與之以折其熱勢俟稍定察脈若實大滑大便結腹滿者急以大承氣倍芒硝下之如勢輕未可攻三黃石膏湯類主之溫病發狂者伏寒得春時溫氣而發也脈大胸滿多痰發狂及脈浮數不得汗出發狂六神通解散加寬胸消導藥便秘承氣湯下之熱病發狂發於夏暑之時其熱尤甚若無汗脈浮數者六神通解散汗之熱甚者三黃石膏湯凡溫病熱病發狂得汗者生無汗者死脈小逆冷者不治蓋溫熱病不得汗者必發狂要在審察而汗之陽毒發狂其人素有積熱因患傷寒又失汗下其熱蘊而為毒脈洪數大尤熱之甚也其候唇口焦黑舌卷鼻煤面赤咽痛狂言妄語或斑發如錦或如豌豆赤豆之類七日內者可治犀角地黃湯三黃石膏湯選用大抵與陽盛發狂同治因發斑咽痛故曰毒耳念莪按狂證多屬實熱非大承氣下之安能已乎如脈無力者宜三黃石膏湯清之至畜血證但如狂非真狂也由於當汗不汗或汗遲或脈盛汗微或覆蓋不周汗不透太陽之邪無從而出故隨經入腑結於膀胱若夫陰躁真氣敗壞虛陽上越乃陰盛格陽庸醫不識脈之浮盛沉衰與不能飲水見其面赤身熱誤與涼劑立斃矣要知此證肌表雖熱重按之則冷透手矣然陰躁一證十中止救一二惜乎昧者不察識者憂讒束手待盡良可哀也叔微侯輔之病脈沉細內寒外熱肩背胸脅斑出數點語言狂亂或曰發斑狂譫非熱乎予曰非也陽為陰逼上入於肺轉之皮毛故斑出神不守舍故錯語如狂非譫語也肌表雖熱以手按之須臾冷透如冰與薑附等藥數日約二十兩餘得大汗而愈後因再發脈復沉遲三四日不大便與理中丸三日內約半斤其證全瘥以此知侯生之狂非陽狂之狂乃失神之狂即陰虛也海藏陳志仁治傷寒狂妄欲走四五人扶捉不定脈虛數用柴胡湯反劇以參耆歸術煎湯一服而狂定再服安睡而愈循衣摸床手弄衣被及摸床者必兼撮空此肝家之熱肝將絕故見此危惡證也然有二焉一由太陽中風火劫壞病一由陽明裡熱之極太陽中風以火劫發汗邪風被火兩陽相熏其身發黃陽盛則衄陰虛則小便難但頭汗出腹滿微喘口乾咽爛或不大便譫語甚者噦手足躁擾捻衣摸床小便利可治不利者死吐下不解不大便日晡潮熱不惡寒獨語如見鬼劇者不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者發熱譫語大承氣湯士材按循衣摸床必兼撮空及怵惕肝主筋肝熱極故動惕也脈弦則肝木未敗故生脈澀則金旺而木欲絕故死仲景主下者因其不大便也若內無燥矢而脈重按無力者往往以大補氣血而愈此又法外之變通也叔微嘗治循衣摸床撮空得愈者數人皆用大補氣血之劑一人兼瞤振脈代遂於補劑中加桂二分亦振止脈和而愈健按此證誠屬惡候然有輕重虛實寒熱之不同而因正虛邪實者多如火劫所致者火迫其氣汗亡其血非正虛邪盛而何吐下不解不大便潮熱譫語者吐下亡其津液則氣血不能和於筋脈而現此象亦正虛邪實也治之必須潤燥清熱扶正除邪庶可轉凶為吉過溫過寒非良治也此本陽明腑證燥屎結甚消爍津液而致何以謂為肝家之熱耶蓋肝為藏血之臟主乎疏泄因其熱極血枯便秘熬灼筋脈是以惕動撮捻多所不安故曰肝欲絕也究其實在乃屬陽明腑熱之甚故從下法者多若為日不久津液未至耗竭或因斑毒壅滯或因燥矢結聚或因醫藥所誤予曾以解肌合白虎托化斑發便通而解者有之或用調胃承氣下之而愈者有之未可偏信大補氣血以助邪釀禍悔之晚矣夫陽明主乎四末陽明熱極則指節煩冤有難忍難言之勢病人自視其指異常心中疑惑故頻頻摩擬撮捻而循衣摸床之證現矣理當瀉陽明之熱則津液回而筋脈得潤其惡狀自息也若兼搖頭直視昏亂則不治者多渴渴必問其所飲欲冷欲熱欲多欲少欲多而飲冷者陽渴也飲少而喜溫者陰渴也邪在表則不渴邪傳裡則渴三陽雖或有渴不如三陰之渴甚也故太陰腹滿咽乾少陰口舌燥渴厥陰消渴蓋邪初傳熱微而渴微傳深則熱甚而渴甚陽明不甚渴者胃有津液邪猶在經也太陰乃大渴者自利津液己去無以潤養也渴欲飲水者亦須少少與之若不與無以解其枯燥何由作汗若過多恐成悸動水結胸咳嘔噦腹滿下利等證不可不慎也表不解心下有水氣乾嘔發熱而咳或渴小青龍去半夏加栝蔞根若咳而微喘發熱不渴服湯已渴者寒去欲解也小青龍湯太陽大汗出後煩躁不眠欲飲少少與水則愈若脈浮小便不利微熱消渴五苓散六七日不解而煩有表裡證渴欲飲水水入即吐名水逆上方與瀉心湯痞不解渴而口燥煩小便不利上方服桂枝湯大汗出後大煩渴脈洪大白虎加人參湯吐下後不解熱結在裡表裡俱熱時時惡風大煩渴欲飲水數升上方太陽重發汗復下不大便五六日舌上燥而渴小潮熱心下至少腹硬滿痛大陷胸湯發熱惡寒大渴腹滿自汗小便利其病欲解此肝乘肺名曰橫刺期門陽明脈長微洪無汗而渴葛根解肌湯中風誤下後渴欲飲水口乾舌燥白虎加人參湯若脈浮發熱渴欲飲水小便不利豬苓湯惡寒自汗面赤譫渴脈洪數人參白虎湯加黃連花粉譫黃狂渴脈沉數大承氣湯太陽寸緩關浮尺弱發熱汗出不惡寒而渴屬陽明也小便數大便必硬不更衣十日無所苦也渴欲飲水少少與之渴不止五苓散陽明汗出多而渴不可與豬苓湯以胃中燥複利其小便也白虎加人參湯小柴胡去半夏加瓜蔞竹葉陽明但頭汗出小便不利渴引水漿瘀熱在裡必發黃茵陳蒿湯往來寒熱胸脅滿心煩喜嘔或渴小柴胡加人參花粉去半夏李加葛根花粉傷寒身熱惡風脅下滿手足溫而渴上方已汗復下胸脅滿微結小便不利渴而不嘔但頭汗寒熱心煩柴胡桂枝幹薑湯少陰欲吐不吐心煩但欲寐自利而渴小便白四逆湯白通湯下利咳而嘔渴心煩不眠豬苓湯少陰渴自利純清水色青大承氣湯厥陰消渴氣上撞心瘀熱飢不欲食吐蛔大柴胡湯若大熱甚譫閉舌卷囊縮大承氣湯下利慾飲水有熱也白頭翁湯陽毒目赤唇焦鼻如煙煤渴而脈實三黃石膏湯陽毒倍常躁盛大熱大渴黑奴丸食少而渴胃脈弱宜茯苓白朮勿用涼藥益傷中氣太陽病發熱不惡寒而渴者溫病仁齋凡渴當分六經而治太陽標熱在表則不渴熱傳膀胱之本則煩渴脈浮數小便不利也五苓散陽明脈長無汗而渴者葛根解肌湯或通解散倍葛根以汗之若熱傳胃中惡熱濈濈汗出而渴脈洪浮數人參白虎湯若陽明本熱或蒸蒸而熱潮熱煩渴舌燥口乾飲水大便實者大柴胡湯或調胃承氣湯下之少陽口苦咽乾發熱而渴小柴胡去半夏加栝蔞根太陰自利則不渴小渴欲飲水小便色白下有寒也脈沉者附子湯若身寒厥冷脈滑而渴里有熱也人參白虎湯凡陰證煩躁口渴不能用水脈沉足冷者宜四逆湯冷服凡傷寒時氣證欲水者為欲愈蓋得水能和其胃氣汗出而解若不與則乾燥無由作汗遂致悶亂而死也與水須量病人勇怯邪熱重輕寧少與之不可太過致生他疾水須新汲者良熱甚大實者以元明粉一二錢加入飲之妙又虛人不能飲者以燈心煎湯浸冷與之復庵陰證自利而渴古人多用冷劑以其皆挾陽氣經雖陰而病則陽也然有下利清穀不繫熱利純是陰病而反渴者此是陰在下隔陽於上兼因泄瀉津液枯燥而渴其人雖喜飲飲不多而常喜溫是也宜理中湯加入參渴甚連理湯治渴有堅腎水而渴止者用知母花粉是也有利小便而渴愈者用豬苓茯苓是也蓋太陽以利小便為先陽明以利小便為戒少陽半表半裡未可下之或大渴不止以柴胡加花粉之屬堅其腎腎水既堅自還滲入大腸大便微通熱去而渴解若病在太陽膀胱之腑非利小便則熱無從去渴何由愈外有非太陽證煩躁發渴乃陰盛格陽不當潤其渴惟當治其陰活人太陽無汗而渴不可與白虎日明汗多而渴不可與五苓蓋渴欲飲水無表證者白虎加人參湯若脈浮發熱無汗是表未解也故不可與必汗後脈洪大方與白虎否則以小青龍去半夏加栝蔞根治之陽明汗出多胃中燥不可複利其小便必小便不利汗少脈浮而渴方可與豬苓湯否則以薏仁竹葉湯治之陶氏以竹葉石膏湯節庵渴者里有熱也津液為熱所耗故令渴也傷寒六七日傳至厥陰消渴者飲水多而小便少乃熱能消水也朱氏曰脈浮而渴屬太陽有汗而渴屬陽明發熱惡風寒熱而渴屬少陽脈沉自汗而謁屬少陰至於厥陰則熱之極矣若先嘔後渴為欲解當與之水先渴後嘔則為水停屬赤茯苓湯也活人傷寒熱氣入臟流於少陰之經少陰主腎腎惡燥故渴而引飲又發汗吐下後臟腑空虛津液枯竭腎又餘熱者亦渴天益傷寒食少而渴當以和胃之藥止之不可與涼藥恐損胃氣愈不能食白木茯苓為主發黃黃者中央土色陽明太陰之證濕熱交併必發身黃如夏月罨曲因濕熱而生黃也濕勝者一身盡痛色如熏黃而晦熱勝者一身無痛色如橘黃而明又傷寒汗已身目為黃以寒熱在裡不解此不可下宜於寒濕求之是非特濕熱為黃而寒濕亦為黃也其畜血亦能發黃但兼小腹硬小便自利其人如狂耳發黃鼻出冷氣寸口近掌無脈者死黃而直視搖頭為心絕黃而環口黧黑為脾絕是皆不治之證也古謂之疸疸即黃也謂單陽而無陰也瘀熱在裡但頭汗身無汗渴小便不利熱不得越如橘之黃且明大便閉腹滿者茵陳蒿湯小便難者五苓散加茵陳山梔濕家發黃一身盡痛小便難色如熏黃之暗胃苓湯加茵陳大便閉者茵陳蒿湯寒濕發黃身疼發熱頭痛鼻塞而煩脈大瓜蒂散搐鼻取水或用防風葛根蒼朮茵陳桔梗陳皮甘草生薑煎服取微汗即愈痞氣發黃半夏瀉心加茵陳枳實小便難者五苓散加茵陳山梔結胸發黃陷胸湯加茵陳畜血發黃小腹滿痛小便利大便黑如狂脈沉桃仁承氣湯內傷寒發黃調中湯加茵陳逆冷者加附子陰證發黃脈沉遲肢冷氣促嘔悶或面赤足冷陰躁欲坐泥水井中輕者理中湯重者四逆湯俱加茵陳身冷汗出脈沉而黃為陰黃乃太陰中濕也小便利朮附湯小便不利大便反快五苓散傷寒遇太陽太陰司天下之太過往往變成陰黃一則寒水太過水來侮土一則土氣不及水來侵之並宜韓氏法一茵陳茯苓湯加當歸桂枝二茵陳橘皮加半夏薑術三茵陳附子湯四茵陳四逆湯五茵陳姜附湯六茵陳吳茱萸湯當依次第而用之太陽病脈浮動數頭痛發熱微盜汗惡寒表未解也反下之不結胸但頭汗小便不利必發黃梔子柏皮湯六七日脈遲浮弱惡風寒二三下之不能食脅下滿痛項強小便難面目及身黃茵陳五苓散中風以火劫汗兩陽相熏身發黃陽盛則衄陰虛則小便難防己黃耆湯梔子柏皮湯身黃脈沉結少腹硬小便自利如狂畜血也抵當湯陽明瘀熱在裡身必發黃麻黃連軺赤小豆湯身黃髮熱梔子柏皮湯陽明中風脈弦浮大短氣腹滿脅及心痛鼻乾不得汗嗜臥一身及面目悉黃小便難潮熱噦小柴胡湯麻黃湯陽明病被火額上微汗小便不利必發黃五苓散加山梔茵陳陽明脈遲食飽微煩頭眩小便難欲作谷疸下之腹滿如故谷疸湯五苓加茵陳陽明無汗小便不利心中懊憹必發黃五苓加茵陳往來寒熱一身盡黃小柴胡加梔子身黃脅痛小便難未下宜柴胡下後忌柴胡濕家一身盡痛小便不利發熱色如熏黃五苓散小便自利朮附湯身煩痛麻黃湯加蒼朮脈浮身重汗出惡風防己黃耆湯兼善或謂傷寒發黃惟陽明與太陰有之小便利者不發黃何也蓋黃為土之正色以太陰與陽明俱屬土故黃也凡外不得汗里不得小便脾胃為熱所蒸則色現於外而黃若小便利者熱不能畜不變黃也其別經發黃者亦由脾胃之土受邪故也熱雖內盛若有自汗小便利即不能發黃其但頭汗身無汗劑頸而還及小便不利渴飲水漿為瘀熱在裡必發黃矣南陽白虎證亦身熱煩渴引飲小便不利何以不發黃曰白虎與發黃證相近遍身汗出為熱越白虎證也頭面汗頭以下無汗熱不得越發黃證也濕在裡不散熱畜於脾胃腠理不開瘀熱與宿谷相薄鬱蒸不化故發黃其濕氣勝則如熏熱氣勝則如橘全善身黃小腹不硬其人不狂大便不黑雖小便利非畜血也其為證有三一者梔子柏皮湯二者麻黃連軺赤小豆湯皆治身黃小便利而身不疼者海藏所謂干黃是也三者桂枝附子湯或去桂白朮湯皆治身黃小便利而一身盡痛者活人所謂中濕是也海藏熏黃濕病也一身盡痛橘子黃熱病也一身不痛熏黃陰黃也橘子黃陽黃也發斑斑者胃經熱毒也下之太早熱邪乘虛入胃乃致發斑下之太遲熱氣留於胃中不散亦令發斑或服熱藥多者亦發斑胃主肌肉故微微隱起實無頭粒小者如芝麻大者如芡實輕者如星布重者如錦紋鮮紅者為胃熱易治紫者為熱盛難治黑者為胃爛必死斑有六證一曰傷寒二曰時氣三曰溫毒四曰陽毒五曰內傷寒六曰陰證此外有發疹頗類斑證但疹屬肺熱肺主皮毛故有頭粒尖起惟癮疹亦如錦紋而無頭粒尤為難辨然疹為肺證必有鼻塞流涕咳嗽聲重為異耳疹脈多浮大斑脈多洪數疹多發於病之首斑多發於病之尾疹多現於胸腹斑多現於手足自不同也獨疫氣發斑竟有病前先見者貴乎諳練而精治之考仲景論無斑證華佗千金皆言之云微熱者赤斑出此疾五死一生劇者黑斑出此疾十死一生一曰傷寒發斑因當汗不汗當下不下或未當下而早下則熱毒蘊於胃而發斑也身溫足暖脈洪數有力者易治脈沉小足冷挾虛者難治斑欲出未出升麻葛根湯以發之紫黑者上方加紫草脈虛者上方加人參食少大便不實倍用白朮斑已出不宜再發恐傷其氣也又不可汗汗之則病更增發斑表虛里實若更用表藥發汗開泄更增斑爛矣不可下下之則斑毒內陷煩渴熱甚脈洪數者人參化斑湯或犀角元參湯大青四物湯熱毒內盛心煩不得眠錯語呻吟黃連解毒湯加元參升麻大青犀角熱甚煩渴喘咳解毒合化斑湯斑勢稍退潮熱譫語便硬大柴胡加芒硝或調胃承氣湯大青為化斑要藥如無以大藍葉代之或青黛亦可凡發斑避忌香臭與痘瘡同已出未出之時切不可投寒涼之劑吃生冷之物恐冰凝其毒不得發泄也挾虛者必先助真氣往往拘泥而不敢補者多致不救若脈弱者必先犯房事要審問明白如夾陰者亦必先助真氣為主二曰時氣發斑四時不正之氣人感之則寒熱拘急或嘔逆或喘嗽或煩悶或躁熱或頭痛鼻乾不眠皆斑候也鮮紅稀朗者吉紫赤稠密者凶大抵鮮紅起發者雖大亦不妨稠密成片紫黑者凶雜黑者難治重者發熱一二日即出輕者發熱三四日始出必察元氣虛實脈來有力無力為主如虛者先以參胡三白湯助元氣斑未透者升麻葛根湯熱甚加紫草胃弱人虛者以四君子合用曰升君湯稠密咽腫甘草桔梗元參知母升麻及犀角黃連湯斑出嘔逆陳皮甘草茯芬黃連半夏生薑斑出脈數大煩渴人參化毒湯若發潮熱不解小柴胡增減或人參敗毒散斑出毒盛必用犀角大青元參黃芩黃連連翹石膏知母花粉三曰溫毒發斑或犯春令溫邪而發或犯冬令寒邪至春始發或冬有非時之溫皆名溫毒治例與時氣相同但溫毒則尤甚爾斑將出未出咳悶嘔逆葛根橘皮湯斑已出黑膏或元參升麻湯犀角大青湯人參化斑等湯受邪於春病發於夏亦同此例四曰陽毒發斑大熱狂言面赤鼻黑咽痛斑欲出未出須涼以解之乾葛升麻大青紫草陳皮甘草斑紫煩渴三黃石膏湯加犀角大青陽毒發斑多成膿瘡蜜煎升麻塗之五曰內傷寒發斑暑月納涼太過食冷大多內外皆寒逼其暑火浮游於外而為斑不過數點身無大熱脈來沉澀調中湯去桂枝麻黃加厚朴乾薑夾暑加香薷藿香暑月陽氣重者須常候體間忽有赤點非蚊跡蚤痕卻宜急治健曰宜香薷飲加黃連葛根六一散又有停食不化曰內傷發斑其人本體素弱或因勞瑣發熱食不消化壅熱於冒而發斑細小淡紅當以小陷胸加減消食去便以化之六曰陰證發斑狀如蚊跡蚤痕無大斑點出則淡紅稍久為微黃病人安靜脈來沉細此因元氣素虛或多房事或誤服寒涼太過遂成陰證乃寒伏於下逼其無根之火熏灼肺胃傳及肌膚升麻藿香陳皮人參生薑附子甘草或與調中溫胃治之寒甚脈微大建中湯得溫補之劑陽回而陰火自降此治本不治標也大抵發斑身溫足暖脈數大者順身涼足冷脈微細者逆治斑不可專以斑治必察脈之浮沉證之虛實而治之切不可孟浪一概論之此證根本既拔吉少凶多庶老成練達者十可救四五病家醫家臨斯證者顧可忽乎哉陶氏大熱則傷血血熱不散裡實表虛熱結肌理而為斑也輕則如疹重則如錦或本陽證誤投熱藥或汗下不當邪氣不解皆致發斑斑之方萌多見手足脈洪大病人昏沉先紅後赤者斑也脈不洪大病安靜先紅後黃者蚊跡也凡汗下不解足冷耳聾煩悶嘔惡便是發斑之候黃氏陰證發斑稀少而淡紅跡如蚤痕無大點也急與溫中暖胃之藥寒甚脈微者人參三白加薑附主之仁齋一人傷寒七八日服涼藥太過遂身涼手足厥冷通身黑斑惟心頭溫暖乃火伏也六脈沉細昏不知人不能言語狀如屍厥遂用人參三白湯加熟附半枚乾薑二錢服下一時許斑漸紅手足漸暖蘇矣數日後餘熱不清此伏火後作再用黃連解毒竹葉石膏湯調治而愈滄洲一人傷寒十餘日身熱而人靜兩手脈盡伏醫以為死證弗與藥予診之無脈舌胎滑兩顴赤如火語言不亂因告曰此子必大發赤斑夫脈血之波瀾也今血為邪熱所搏淖而為斑外見於皮膚呼吸之氣無形可依猶溝渠之水雖有風不能成波瀾也斑消則脈出矣及揭其被而赤斑爛然與白虎加人參湯化其斑脈乃復繼投承氣下之而愈發斑無脈仲景未言今以消息之耳健按發斑雖有六證總不離乎陽明胃經毒邪而有虛實之分凡見身熱嘔惡胸中煩擾或手足指尖冷乃欲發斑之象矣主以升麻葛根湯入豆豉蟬退甘桔木通以發之若熱甚氣滯肌肉緊結難出者須解肌湯加石膏豆豉甘寒以發之所謂得涼而津液回肌理松始能透出色淡者本虛而熱亦不甚色赤者熱甚灰黑藍紫皆熱極胃憊之危候也若神昏譫妄米穀不入死者多矣其但譫語猶尚知人唇焦舌黑腹有燥矢者當以調胃承氣令解毒湯下之可愈更有時氣發斑不待身熱但覺胸中泛泛而即見斑者以白虎湯化之又有歲氣少陰厥陰司天夏秋時行瘧痢必兼斑點先以托化為主又熱病本應發斑而斑不現直待里證急下去後反發出而身始涼又疫證見斑鮮紅或赤而脈洪滑有力者為陽斑可涼藥解化有一種似斑非斑似疹非疹如疙搭如雲錦似無頭粒而腫凸有形根腳散漫色淡紅肌肉隱隱不清身亦似熱非熱間有四肢若冷而漐漐汗出按之如捏濕木乃屬本原大虛之陰證溫中解毒俱難挽救若更夾食或停宿垢而遇妄醫投以陰寒之劑則立變昏迷口噤而死者不少此因正虛毒盛氣血不能聚毒於斑以致流離散漫無宿垢內畜者須升麻葛根湯加人參早扶其本而托其毒若有停畜者當早盪滌不致邪盛正衰以使措手莫及此疫癘為病與內傷寒發斑相似不可以地黃黃連等沉陰膩膈苦寒之藥殺之更不可以普施太乙寸金等丹藥誤服凡疫證發時人家施送丹藥與者受者未能深究其中藥味大半辛溫香燥最足害人殊不知此等丹藥前人設以闢疫者只許絳囊佩帶未嘗教人磨服也夫疫乃溫毒惡氣大法以涼解為先切忌辛熱助勢若至狂譫發斑之際投之立見其禍予屢經目擊深為警惕而撰正氣丹以拯救瘟疫無論初終表裡有斑無斑均可解化所投輒效此方附載變通方後為救疫之良法少陽經口苦咽乾口乾舌乾咽通六經口為脾竅舌乃心苗津為腎液干俱屬熱而無寒也惟誤汗誤下及虛人久病者方與溫經耳有因汗下者有不因汗下者或和或解或微汗或下或急下當考兼見之證施治經謂咽乾不可發汗以其多里證也實無寒病蓋治者再參渴條以施焉舌乾輕而咽乾重咽舌俱通於少陰之絡而舌為心苗傷寒喜陽而惡陰故舌乾為輕也經云太陰受病腹滿咽乾今考太陰中闕嗌乾證太陽咽乾不可發汗津液竭也脈浮自汗小便數心煩微惡寒腳攣急本桂枝附子證誤與桂枝攻表便厥咽乾煩躁吐逆甘草乾薑湯吐下後不解表裡俱熱惡風大渴舌乾燥而煩白虎加人參湯重發汗復下之不大便五六日舌上燥而渴日晡小潮熱心下至少腹硬滿痛太陷胸湯與瀉心湯痞不解渴而口燥煩小便不利五苓散陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮緊柴胡湯加葛根若汗出不惡寒反惡熱身重柴葛解肌湯陽明中風咽燥口苦腹滿喘惡熱身重若下之渴欲飲水口乾舌燥白虎加人參湯便硬口燥舌乾調胃承氣湯陽明脈浮發熱口乾鼻燥能食必衄黃芩湯陽明口燥漱水不欲咽必衄黃芩芍藥湯犀角地黃湯少陽口苦咽乾目眩小柴胡湯少陰二三日口燥咽乾大承氣急下之少陰口燥咽乾而渴若尺寸脈俱沉遲四逆湯沉疾者大承氣少陰自利清水色純青心下痛口乾燥大承氣急下之不欲眠目不能閉聲嘎咽乾為狐惑趙耆活人謂脾臟有熱則津液枯少故口燥而咽乾固也然獨太陰腹滿咽乾可言脾熱耳余如白虎加人參證口舌乾燥者表裡俱熱也口苦咽乾者少陽經熱或陽明中風也口燥咽乾急下之自利純清水口燥干急下之少陰經熱也咽乾煩躁吐逆者誤汗津液少而欲作陽明內實者也豈可專言脾熱哉仁齋凡發汗吐下後口燥咽乾此津液衰少腎水不升虛火上炎也宜生津益氣湯或竹葉石膏湯若脈沉微足冷口燥者多難治少陰有急下救腎水之例及虛人水竭火燥不可下者補中益氣湯人參加麥冬花粉黃柏知母以滋水也又少陽脈疾者可下脈沉者附子湯加知母黃柏麥冬五味子花粉若虛熱病後煩熱不解者竹葉石膏湯加花粉潤之海藏少陰燥渴脈沉遲四逆沉疾大承氣若身表涼脈沉細而虛則宜瀉心湯此有形無形之法也頭眩目眩頭眩者頭旋眼花也因汗吐下虛其上焦元氣所致眩冒者昏冒是也傷寒起則頭眩與眩冒者皆汗吐下所致知其陽虛也針經曰上虛則眩下虛則厥若陽明中風但頭眩不惡寒者風主動搖故眩非逆候也少陽頭眩者目系連肝膽膽有邪鬱而戍熱熱氣上衝故眩也諸逆發汗劇而言亂目眩者死是病勢己成莫可挽也吐下後逆滿氣上衝胸頭眩脈沉緊發汗則動經身振搖茯苓桂枝白朮甘草湯發汗不解仍發熱心悸頭眩身瞤動振振欲擗地真武湯吐下發汗後虛煩脈微心下痞硬脅痛氣上衝咽喉眩冒動惕真武湯或茯苓桂枝白朮甘草湯陽明但頭眩不惡寒能食而咳咽痛四逆散加桔梗陶氏茯苓白朮甘草生薑湯少陽口苦咽乾目眩小柴胡加花粉麥冬太陽少陽並病頭項強痛或眩冒時如結胸心下痞硬刺大椎第一間肝俞肺俞動氣誤汗頭眩汗不止小建中湯少陰利止頭眩時時自冒者死虛極而脫也太陽中風頭眩頭搖脈弦浮而急羌活神術湯加防風天麻頭眩血虛者四物加人參天麻痰火上攻加酒芩竹瀝內傷陰虛補中益氣加川芎天麻防風下焦元氣欲脫人參養榮湯或大建中加天麻耳聾有二證一由重發汗而虛由少陽中風未持脈時其人叉手冒心試令咳而不咳耳聾無聞也以重發汗虛故如此黃耆建中湯胸脅痛耳聾尺寸脈俱弦少陽也少陽中風耳聾目赤胸滿而煩並小柴胡湯少陽厥陰俱病耳聾囊縮兩感也厥陰耳聾囊縮不知人營衛不通皆死矣健曰耳為腎竅傷寒半表半裡少陽陽明之證每多耳聾然重喊能聽也若熱甚傷陰腎氣絕則全不聽見與陽明胃氣絕而全不知覺者皆死證也因陽明之脈縈於耳蓋耳得胃氣以聞也往來寒熱往來寒熱者寒已而熱作熱已而寒起蓋寒為陰熱為陽里為陰表為陽邪容於表與陽爭則發寒邪入於裡與陰爭則發熱表邪多則寒多而熱少里邪多則熱多而寒少邪在半表半裡之間外與陽爭而為寒內與陰爭而為熱表裡不拘內外無定由是寒熱往來而無常也故立小柴胡諸加減法以和解之然與寒熱如瘧似是而非也如瘧者作止有時正氣與邪爭則瘧作分則止矣往來寒熱則作止無時日有三五或十數發也雖然往來寒熱屬半表半裡當和解之又有病至十餘日熱結在裡復往來寒熱者則宜大柴胡湯下之而愈傷寒中鳳往來寒熱胸脅滿默默不欲飲食心煩喜嘔小柴胡湯太陽病不解傳入少陽脅下硬滿乾嘔不能食往來寒熱脈沉緊上方已吐下發汗溫針譫語太陽證罷為壞病他法治之已汗復下胸脅滿小便不利渴而不嘔但欲汗出往來寒熱心煩柴胡桂枝幹薑湯十餘日熱結在裡復往來寒熱大柴胡湯活人往來寒熱有三證有表證而往來寒熱者小柴胡湯也有里證而往來寒熱者大柴胡湯也已汗或己下復往來寒熱者皆可柴胡桂枝幹薑湯也胸脅滿痛邪氣傳裡必先是胸而脅以次經心腹而入胃是以胸滿多帶表證脅滿多帶半表半裡證腹滿多里證少腹滿非溺即血也蓋身半以上同天之陽身半以下同地之陰清陽出上竅濁陰歸下竅當出不出積而為滿故在上滿者無形之氣也在下滿者有形之物也在上者因而越之故胸滿宜吐在下者引而竭之故腹滿宜下俱有陰陽之辨不可不察也太陽十日已去脈浮細嗜臥外已解也設胸滿脅痛小柴胡湯下後脈促胸滿桂枝去芍藥湯汗下後煩熱胸中窒滿梔子豉湯病如桂枝證胸中痞硬氣上衝喉不得息此胸中有寒痰瓜蒂散太陽下利嘔逆頭痛心下痞硬滿脅痛乾嘔短氣汗出不惡寒表解里未和也十棗湯已汗復下胸脅滿小便不利頭汗出寒熱心煩柴胡桂枝幹薑湯下後胸滿煩驚小便不利譫語身重柴胡加龍骨牡蠣湯過經十餘日溫溫欲吐胸中痛大便反溏腹微滿微煩先極吐下者調胃承氣湯不吐下者勿與吐下後發汗虛寒脈甚微心下痞硬脅下痛氣衝咽喉眩冒經脈動惕真武湯桂枝茯苓白朮甘革湯陽明潮熱大便溏小便自可胸脅滿不去小柴胡湯陽明脅下硬滿不大便而嘔舌上白胎上方太陽不解轉入少陽脅下硬滿乾嘔寒熱脈沉緊上方四五日身熱惡風頸項強脅下滿手足溫而渴上方傷寒中風往來寒熱胸滿脅痛心煩喜嘔上方或脅下痞硬上方去大棗加牡蠣少陽中風耳聾目赤胸滿而煩若吐下驚而悸小柴胡去黃芩加茯苓十三日不解胸脅滿而嘔潮熱微利先小柴胡湯解外後柴胡加芒硝湯太陽陽明合病喘而胸滿麻黃湯少陰下利咽痛胸滿心煩豬膚湯厥陰手足厥冷脈乍緊邪結在胸中滿而煩飢不能食病在胸中也須吐之瓜蒂散明理胸滿如下後脈促胸滿合病喘而胸滿二者俱屬表宜汗之蓋胸中至表猶近也及脅滿則不言發汗但主小柴胡和解而已大抵邪初入里尚未停留為實氣鬱積而不行致生滿者惟和解之若留胸中聚而為實非湧吐之不可故華佗曰四日在胸吐之則愈邪已收斂不散則可吐之內經曰其高者因而越之病在胸膈之上為高吐之為越如梔子豉湯瓜蒂散二證是已雖均是吐劑又須知梔子吐虛煩客熱瓜蒂吐痰實宿寒也嗣真活人云太陰者脾之經主胸膈膜脹觀明理論云胸中至表猶近所以喘而胸滿者麻黃湯是屬表而可汗也胸脅滿者以柴胡湯是半表裡而可和解也至太陰止云腹滿而吐食不下時腹自痛或腹滿而咽乾可見太陰不主胸上矣仁齋胸滿多用吐法實者瓜蒂散虛者人參蘆更以手探吐之傷寒三四日已傳少陽口苦發熱胸滿小柴胡湯若胸滿而悶加枳殼桔梗各二錢若滿而煩加瓜蔞三錢黃連錢半凡心之上胸之分宜枳殼心之下胃之分宜枳實蓋枳殼能瀉至高之氣枳實能瀉至低之氣蔞仁能瀉肺滌胸冒痰垢之藥故胸滿而煩者必加之戴氏陽證身熱而胸膈痞塞者減枳殼桔梗之半加柴胡前胡治之嘔吐乾嘔嘔者有物有聲而漸出吐者有物無聲而頓出乾嘔者有聲而無物嘔有責為熱者有責為寒者至於吐則悉屬虛冷矣嘔又有停飲者有胃脘有膿者大抵傷寒表邪欲傳裡裡氣上逆則為嘔是以半表裡證多嘔也生薑為嘔家聖藥散逆氣也半夏為嘔家要藥去痰水也嘔多雖有陽明者不可攻為其氣逆尚未收斂為實是猶在外未傳入里也熱者脈數煩渴寒者脈遲逆冷有水氣者先渴後嘔腹滿怔忡有膿血者吐儘自愈不須治也初起病即嘔吐寒傷胃也藿香正氣散太陽惡寒體痛嘔逆脈陰陽俱緊麻黃湯五六日嘔而發熱小柴胡湯六七日發熱微惡寒支節煩疼心下支結微嘔柴胡桂枝湯發汗吐下後虛煩懊憹而嘔梔子生薑湯胸中有熱胃中有邪氣腹痛欲嘔吐黃連湯發熱汗出不解心下痞硬嘔吐下利大柴胡湯過經十餘日嘔不止心下急微煩上方十三日不解胸脅滿而嘔潮熱微利先小柴胡解外後柴胡加芒硝湯過經十餘日嗢嗢欲吐胸中痛大便溏腹微滿微煩但欲嘔先曾吐下傷胃與調胃承氣湯不爾不與陽明脅下硬滿不大便而嘔舌上白胎小柴胡湯嘔多雖有陽明證不可攻黃芩生薑半夏湯小柴胡湯食後欲嘔陽明也吳萊萸湯得湯反劇者屬上焦葛根半夏湯陽明有寒而嘔吳茱萸湯潮熱便閉而嘔大柴胡湯陽明反無汗而小便利二三日嘔而咳手足厥頭痛真武湯去茯苓發熱口苦脈弦數而嘔或心煩喜嘔或胸脅滿痛寒熱而嘔或日晡發熱而嘔並小柴胡加半夏生薑血弱氣盡邪氣因入結於脅下往來寒熱邪高痛下故嘔小柴胡湯渴而飲水嘔柴胡不中與也赤茯苓湯太陽陽明合病不下利但嘔葛根半夏湯太陽少陽合病下利而嘔黃芩加半夏生薑湯少陰下利咳而嘔渴心煩不眠豬苓湯少陰腹痛小便不利四肢重痛自利或嘔此有水氣真武湯去附子加生薑少陰下利脈微澀嘔而汗出更衣反少者灸之溫其上嘔而肢冷脈沉細四逆湯加橘半生薑厥陰嘔而脈弱小便複利微熱見厥難治四逆湯熱厥吐蛔得食而嘔烏梅丸熱少厥微煩躁小便利色白欲得食熱除欲愈也若厥而嘔胸脅滿煩後必便血黃芩芍藥湯抵當湯嘔而吐涎沫逆冷脈沉微茱萸四逆湯加橘半先嘔後渴欲解也思水者急與之先渴後嘔水停心下也赤茯苓湯茯苓半夏湯加薑橘嘔而下利有寒熱者為陽黃芩湯無熱者為陰豬苓湯真武湯嘔而心煩若汗吐下後梔子生薑豉湯未經汗吐下兼咳而渴茯苓湯有癰膿而嘔不必治嘔膿儘自愈太陰腹滿痛自利而吐脈沉理中湯加藿香薑橘少陰欲吐不吐心煩但欲寐自利而渴小便白四逆湯白通湯飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲胸中實也當吐之瓜蒂散若膈上寒飲乾嘔不可吐也急溫之四逆湯傷寒本自寒下復吐下之寒格食入口即吐乾薑黃連黃芩人參湯吐利厥逆煩躁欲死吳茱萸湯汗下後關脈遲緩而吐為胃寒理中丸汗後水藥不入口四逆茯苓半夏湯似嘔似噦似喘憒憒無奈大橘皮湯脈數手心熱煩渴而吐熱在胃脘五苓散寒多不飲水而吐理中湯去朮加生薑陰證喘促及吐逆返陰丹入口便住瘥後虛煩嘔吐竹葉石膏湯生薑汁或橘皮竹茹湯脈滑數或洪發熱茅根湯嘔吐發熱而腳弱或疼乃腳氣於腳氣求之太陽中風自汗鼻鳴乾嘔桂枝湯表不解心下有水氣乾嘔發熱而咳小青龍湯頭痛心下痞硬滿脅痛乾嘔短氣汗出不惡寒表解里未和也十棗湯下之下利日數十行腹中雷鳴心下痞硬滿乾嘔心煩復下之痞益甚甘草瀉心湯太陽轉入少陽脅下硬滿乾嘔往來寒熱脈沉緊小柴胡湯少陰膈上有寒飲乾嘔四逆湯下利厥逆無脈乾嘔煩白通湯加豬膽汁下利清穀裡寒外熱厥逆脈微欲絕反不惡寒面赤或乾嘔通脈四逆湯加生薑少陰下利乾嘔姜附湯厥陰乾嘔吐涎沫頭痛吳茱萸湯得湯反劇與小柴胡湯復庵太陰厥陰間有嘔吐太陰宜理中湯厥陰宜四逆湯並加生薑此蓋陰中之陰宜用熱劑若陽入陰者能為利而不能為嘔嘔屬上而近於外也陽之所以入者深故利也大抵得之太陽而嘔者必是合病嘔乃病漸入內非正太陽也曾有人初得病太陽證嘔吐不住投暖藥莫效知太陽已汗解固當用冷劑況太陽見嘔非合陽明即少陽也其嘔為熱用暖劑非矣又一人初病具太陽證而嘔一家少長相類與養胃湯服之俱效此時行之氣使然是傷寒雜病又不可以正傷寒例之也若非合病而獨見太陽證恐素有痰飲停水食傷且以二陳定之徐進解太陽之藥吳氏凡胃家有熱脈必弦數口苦煩渴胃家有寒脈必弦遲逆冷不食有水氣者先渴後嘔腹滿怔忡有膿血者喉中腥氣奔逆上衝此四者不可不辨活人無陰則嘔嘔者足陽明胃之氣本下行今厥而上行故為氣逆氣逆則嘔仲景云嘔多雖有陽明證不大便不可下可小柴胡湯上焦得通津液得下胃氣因和泱然汗出而解矣陶氏乾嘔者嘔而無物也於猶空也大抵熱在胃脘與穀氣並熱氣上熏心下痞結則有此證太陽汗出乾嘔桂枝主自汗也少陰下利於嘔薑附主下利也厥陰吐涎沫乾嘔吳茱萸主涎沫也邪去則嘔自止矣若有水氣二證太陽表不解乾嘔微喘小青龍湯不發熱不惡寒脅痛咳而利乾嘔十棗湯在分表裡而治之若嘔而脈弱便利身熱見厥難治以其虛寒甚也長卿乾嘔者寒鬱於中脘令陽不舒故欲吐不得吐若熱在內則吐而物出嘔酸嘔苦也然太陽少陽水氣亦乾嘔者太陽必頭痛發熱少陽必胸滿脅痛水氣必咳引脅疼三者未離乎寒也至三陰乾嘔則外無一毫表證內必下利清穀具諸寒證矣
