body:
  text: 舌鑑總論傷寒邪在皮毛初則舌有白沫次則自涎白滑再次白屑白泡有舌中舌尖舌根之不同是寒邪人經之微也舌乃心之苗心屬南方火當赤色令反見白色者是火不能制金也初則寒鬱皮膚毛竅不得疏通熱氣不得外泄故惡寒發熱在太陽經為頭痛項強腰背疼等證傳至陽明則有白屑滿舌雖證有煩躁如脈浮緊猶當汗之在少陽者則舌胎白滑用小柴胡和之胃虛者里中湯溫之如白色小變黃者大柴胡大小承氣分輕重下之白胎亦有死證不可不察也健曰滿舌白胎滑而本色亦淡無血氣者此陰寒已極病縱輕而必轉重不救者多也寒邪初入太陽舌色微白有津香蘇散羌活湯類發散之此太陽里證舌也二三日未曾汗故邪入丹田漸深急宜汗之或太陽少陽合病有此舌柴胡桂枝湯主之三四日其邪只在太陽故胎純白而厚卻不幹燥解表自愈其證頭疼發熱其脈浮緊四五日未經發汗邪熱漸深少有微渴過飲生冷停積營熱胃冷故發熱煩躁四肢冷胎白乾厚滿口白屑四逆散加乾薑此陽明腑兼太陽也其胎邊白中心乾黑因汗不澈傳至陽明所致必微汗出不惡寒脈沉方可下之如二三日未曾汗有此舌必死白滑胎中黑舌為表邪入里之候大熱譫語承氣湯等下之白胎黃心舌此太陽初傳陽明腑也若微黃而潤宜再汗待胎燥里證具下之若煩躁嘔吐大柴胡加減下水沫無糞者大承氣下之半邊白滑胎舌即二十二舌二十三舌也凡白胎見於一邊無論左右皆為半表半裡並宜小柴胡左加葛根右加茯苓有咳嗽引脅下痛小青龍夏月多汗自利人參白虎湯或左或右半邊白胎滑半邊黑或老黃者寒邪結在臟也黃連湯加附子結咽者不能語言生脈散合四逆湯可十救白胎黑根舌舌胎白而根黑火被水克之象雖下亦難見功白胎尖根俱黑舌舌尖根俱黑而中白乃金水太過火土氣絕於內雖無凶證亦必死也白尖黃根舌邪雖入里而尖白未黃不可用大承氣宜大柴胡加減下後神清安臥可生有變證凶白胎尖紅舌滿舌白滑而尖卻鮮紅者乃熱邪內盛復感客寒人少陽也小柴胡加減白尖紅根舌舌尖胎白邪在半表裡也小柴胡和解之此太陽初傳經之舌也無汗者發汗有汗者解肌亦有少陽經者小柴胡加減舌尖白而根灰黑少陽邪熱傳腑熱極而復傷冷飲也如水停而渴五苓散自利而渴白虎湯下利而渴解毒湯若黑很多白尖少中不甚紅者難治此太陽濕熱並於陽明也如根黃色潤目黃小便黃者茵陳蒿湯健曰尖灰根黃心脾熱盛上蒸於肺而中白多燥應與四苓散加黃連茵陳以瀉之此陽明裡證舌也因邪熱上攻故致舌有雙黃如脈長惡熱煩躁大柴胡調胃承氣下之白胎中見黑色兩條乃太陽少陽之邪入胃土色衰絕故手足厥冷胸中結痛理中瀉心選用此夾冷食舌也七八日後見此舌而有律者可治理中四逆選用無津不治如干厚見里證則下之次日灰色去者安健曰有津即滑也灰白而滑裡寒之象故溫之以理中四逆若干厚而燥當以小陷胸清熱化食為主此陽明腑兼少陽舌也三四日自利脈長者生弦數者死有宿食者下之十可全五健曰無食可按而脈數者黃連解毒湯宜之白胎中生滿乾黑芒刺乃少陽之裡證也不惡寒反惡熱者大柴胡加芒硝急下之危證也健曰此更應加黃連石膏傷寒胸中有寒丹田有熱所以舌上白胎因過汗傷營舌上無津所以燥裂內無實熱故不黃黑宜小柴胡加麥冬花粉健曰此更宜加石膏知母白胎老極如煮熟相似者心氣絕而肺色乘於上也由食生冷冰水之物陽氣不得發越所致為死候用枳實理中間有生者健曰此可加乾薑透明舌年老胃弱雖有風寒不能變熱或多服湯藥傷乎胃氣致淡白通明似胎非胎也宜補中益氣加減白胎如積粉舌乃瘟疫初犯募原也達原飲見三陽表證者健曰此未得汗而失表之舌類似應柴葛解肌加升麻石膏豆豉涼以治之屢效以上申氏法黃胎圖舌見微黃色初病即得之發譫語者由失汗表邪入里也必用汗下兼行以雙解散加解毒湯兩停處之舌見微黃色者表證未罷宜小柴胡合天水散主之可下者大柴胡下之表裡雙除臨證審用之健曰傷寒而見舌黃熱已入里乃可用黃連矣如舌未見黃色用連則多誤也舌見黃色者必初白胎而變黃色也皆表邪傳裡熱已入胃宜急下之若下遲必變黑色為惡證為亢害鬼賊深也不治宜調胃承氣湯健曰如無實邪但有熱者不宜遽下只可黃連解毒以瀉之舌見黃色而有小黑點者邪遍六腑將入五臟也急服調胃承氣湯下之次進和解散十救四五健曰此須下之重用川連以瀉熱毒舌見黃而澀有隔瓣者熱已入胃邪毒深矣心火煩渴急以大承氣下之若發黃茵陳湯下血抵當湯水在脅下十棗湯結胸陷胸湯痞大黃瀉心湯舌見黃而黑點亂生者其證必渴譫語脈實者生澀者死循衣摸床者不治若下之見黑糞亦不治下宜大承氣湯健曰下藥中必須加黃連為要舌黃中黑至尖者熱氣已深兩感見之十當九死惡寒甚者亦死不惡寒而下利者可治宜用調胃承氣湯舌見灰色尖黃不惡風寒脈浮者可下之若惡鳳惡寒者雙解散加解毒湯主之三四下之見糞黑不治健曰灰黑舌燥者乃傷寒停食拒按小陷胸主之若無食而灰濕之舌乃少陰腎寒水色上侵也宜真武湯若腎熱者宜下除之舌根微黑尖黃脈滑者可下之脈浮者當養陰退陽若惡風寒者微汗之用雙解散若下利用解毒湯十生八九也舌根微黑尖黃隱現或有一紋者脈實急用大承氣湯下之脈浮渴飲水者用涼膈散解之十可救一二以上金鏡錄法舌鑑曰黃胎者里證也傷寒初病無此舌傳至少陽亦無此舌直至陽明腑實胃中火盛火乘土位故有此胎當分輕重瀉之初則微黃次則深黃有滑甚則干黃焦黃也其證有大熱大渴便秘譫語痞結自利或因失汗發黃或畜血如狂大抵舌胎黃證雖重若脈長者中土有氣也下之則安如脈弦下利舌胎黃中有黑色者皆危證也微黃胎舌微黃而甚燥者表失汗初傳裡也大柴胡湯純黃微干舌舌見純黃胎胃熱已極急下之遲則變黑惡候矣黃干舌同俱裡熱已極急下勿緩之候舌尖胎黃邪初傳胃也宜調胃承氣湯表證未盡者大柴胡兩解之舌黑根多而黃尖少雖無惡證脈恐一時暴變以胃氣絕耳健曰根黑尖黃脾胃實邪熱甚宜小陷胸或調胃承氣如尚惡寒發熱表未盡者大柴胡加連主之舌根灰色而尖黃雖比黑根少輕如再一二日亦黑也難治矣無煩躁直視脈沉有力者速下之舌根白尖黃其色倒見必少陽傳陽明方陽明證多者大柴胡少陽證多者小柴胡如譫語煩躁者調胃承氣健曰白胎尚屬失表不宜下以葛根白虎為妥舌尖白根黃乃表邪少而里邪多也天水涼膈合用如陽明無汗小便不利心中懊憹必發黃茵陳蒿湯舌見根黃尖灰土來侮火也不吐不利心煩而渴胃中有鬱熱也調胃承氣加黃連舌見根黃尖白而短硬不燥不滑但不能伸出譫妄煩亂此痰挾宿食大承氣加生薑半夏主之健曰如食尚在胃而拒按者宜消未可下以陷胸合平胃散如或夾陰寧與溫散半夏湯加乾薑未效再投恐下之而致口噤難治矣少陽證罷初見陽明裡證故白胎變黃色而滑兼失氣者大柴胡下之舌黃而有黑滑者陽明裡證具也雖不幹燥亦當下之下後身涼脈靜生大熱脈躁死舌胎老黃極而中有黑刺者皆由失汗下所致邪毒內陷已深急下之十可保一二健曰下劑中須加黃連舌黃而脹短者陽明胃經濕熱也證必身黃便秘煩躁茵陳蒿湯如大便利五苓加茵陳梔子黃連以上申氏法舌見純紅內有黑形如小舌者乃邪熱結於裡也君火熾盛反兼水化宜涼膈散大柴胡湯下之健曰二方須重用黃連神清有胃者可治若神昏脈微無胃者難治舌見紅色尖見青黑色者水虛火實腎熱所致宜竹葉石膏湯治火健曰此亦須兼用黃連舌見淡紅色而中有一紅暈沿邊皆純黑乃餘毒遺於心包絡之間與邪火鬱結二火亢極故有是證也以承氣湯解之健曰此亦宜加黃連舌見純紅色內有乾硬黑色形如小長舌而有刺者此熱毒熾盛堅結大腸金受火制不能平木也急用調胃承氣湯下之健曰此必重加黃連舌見純黑水剋火明矣患此者百無一治故曰死現舌節庵凡黑而芒刺者必死乃腎水克心火熱毒入深故十有九死況純黑乎健曰欲救之須辨乾溼以論寒熱觀立齋後案便知治法立齋云鄭姓之戚患傷寒得此舌醫士曾禧謂當用附子理中湯人咸驚駭遂止迨困甚治棺曾往視之謂用前藥有生理其家既待其斃棄從之數劑而愈大抵舌黑之證有火極似水者即杜學士所謂薪為黑炭者之意宜涼膈散之類以瀉其陽毒有水來剋火者即曾所療之人是也宜理中湯以消陰翳又須以老生薑切平擦其舌色稍退者可治堅不退者不可治健曰此水極似火之證也金臺姜姓患傷寒亦得此舌手足厥冷呃逆不止眾醫猶作火治幾致冤斃判院吳仁齋用附子理中湯而愈夫醫之為道有是病必有是藥附子療寒其效可數奈何世皆以為必不可用之藥寧視人之死而不救不亦哀哉至於火極似水之證用藥得宜效應不異不可便謂百無一治而棄之也健曰純黑之舌十難一生必其人稟厚脈好形證未憊或可挽回前二證活者舌必滑黑故用熱補以消陰翳也若黑燥如鍋底者須寒涼解其熱毒攻下去其燥屎庶可救也予曾療常熟孫氏子秋令時疫夾食初患似瘧無汗第五日延視舌白而中有乾黑胎五六瓣左脅下瘧癖如茄當臍動氣有形燥矢拒按乃與大柴胡下之去黃沫一二行無糞再與調胃承氣而轉氣全無予時往鄉邑醫稱為陰虛欲投薑附不果而進地黃湯類滋陰病加甚覆看則神氣昏沉臍腹更實矣乃投小陷胸加楂芽稜蒁芒硝軟堅以消削之四劑不減予又往鄉眾醫共詆予方更擬參耆溫補曰非此不救矣本家遑遽予恰回覆診大非其議立案以闢群疑如前方連進三服忽寒戰發熱而作正瘧舌現純黑胸發白疹遂與升麻柴胡湯加大力子蟬退桔梗木通黃連石膏瓜蔞枳實等投之汗始微泄而疹隱舌退間日瘧又作舌復純黑疹發如前汗方泄舌旋退疹覆沒又間一日瘧大作疹大發舌不黑汗淋漓瘧遂止而癖已化身涼神清惟堅屎未出仍投消堅潤燥之品五劑而下黑糞數丸然後調胃健脾半月而起此證緣夏暑內伏復感時疫誤進滋陰邪伏不能發越予用解肌攻削其邪漸疏直待瘧作而舌胎現疹子發癖化屎下乃得獲生若任其地黃參耆膠固必致邪結正憊而成冤案矣於此可見舌法為傷寒時氣之指南如瞽者之明杖表裡寒熱虛實百病證驗無所遁形是證猶賴脈象始終洪滑有力故病匝月不食兩旬雖神昏體瘦而能療之記此並知有淬現猝滅之純黑舌舌外淡紅心淡黑者如惡風表未罷雙解散解毒湯相半微汗之汗罷急下之如結胸煩躁目直視不治無結胸可治以上金鏡錄法舌鑑傷寒五七日舌見黑胎者最為危候表證皆無此舌如兩感一二日間見之必死若白胎上漸漸中心黑者邪熱傳裡之候紅舌上漸漸中心黑者乃瘟疫傳變壞證將至也有純黑有黑暈有刺有瓣有瓣底紅有瓣底黑大抵尖黑輕根黑重全黑者水極似火火過炭黑甚難救也舌中黑邊白而滑表裡俱虛寒也脈必微弱證必畏寒附子理中湯溫之夏月過食生冷而見此則宜大順散類舌黑有津譫妄者必表證時失治不戒飲食冷物結滯於胃也虛人黃龍湯或枳實理中加大黃壯實者備急丸下之夏月中暍多有此舌白虎人參湯主之舌胎久而變黑實熱已極未經服藥恣意飲食而見脈伏目閉口開獨語譫妄遇此者可與大承氣下之凡見瓣底黑者不可用藥雖無惡候亦必脈暴絕而死滿舌黑胎乾燥而生大刺揉之觸指而響掘開刺底紅色者心神尚在雖極下之猶可生有肥盛多濕熱人感寒痞脹悶亂一見此急與大陷胸丸後與小陷胸湯治之刺底黑舌刺底黑者言刮去芒刺底下肉色俱黑也凡見此不必辨其何經脈有無惡候必死不治黑爛自齧舌舌黑爛而頻欲嚼齧者必爛至根而死雖無惡候怪脈切勿藥之中焙舌中心黑胎乾厚而燥也為熱甚津枯之候急以生脈散合黃連解毒湯治之健曰舌至中焙即火燔成炭之謂也治之良難中黑無胎乾燥舌舌黑無胎而燥津液受傷而虛火用事也急宜生脈散合附子理中主之健曰雖虛火但附子理中恐非所宜中黑無胎枯瘦舌傷寒八九日過汗津枯舌無胎而黑瘦便閉腹不硬滿神昏不得臥或呢喃嘆息炙甘草湯健曰枯瘦即乾癟也在傷寒為汗過津枯在本原為心血耗竭雜病遇之皆屬難治與滿白舌光嫩無胎舌本色淡而無神者亦心血告竭又有舌垢如黃糞或曰如腐花洗去即生滿舌上下俱到者此脾胃濕熱壅塞見於痢疾多因補早而致飲食不進者死證也舌至乾黑而短厥陰熱極已深或食填中脘䐜脹所致急以大劑大承氣下之十救一二服後糞黃熱退生糞黑熱不止死以上申氏法舌見如灰色中間更有黑暈兩條此熱乘腎與命門也宜急下之服解毒湯下三五次遲則難治如初服量加大黃酒浸炮舌見四邊微紅中央灰黑色者此由失下而致用大承氣下之熱退可愈如三四下方退五次下之而不退者不治健曰灰黑色而腹未堅實非必下之證量其食少食多以小陷胸湯化之若不大便舌不退然後微下之舌見灰黑色而有黑紋者脈實急用大承氣下之脈浮渴飲水者涼膈散解之十可救二三以上金鏡錄法舌鑑灰色舌亦有陰陽之異若直中陰經則病起便灰黑而無積胎若邪傳三陰必四五日表證罷而胎始變灰色也有在根在中在尖之分有渾舌俱灰黑者大抵傳經熱證有灰黑干胎皆當攻下以泄其熱毒若直中三陰之灰黑而無胎者當溫經散寒又有畜血證其人如狂或瞑目譫語亦有不狂不語不知人事而面黑舌灰色者當分輕重以攻去其瘀血切勿誤與冷水致引敗入心而遂不救也若舌純灰色而無胎直中三陰夾冷也脈必沉細而遲不渴不煩者附子理中四逆救之次日灰中變有微黃色者生如更灰縮乾黑者死灰尖舌已經汗下而見舌尖灰黑有宿食未消或再傷飲食邪熱復盛之故調胃承氣下之灰黑多黃根少舌灰色而根黃亦熱傳厥陰而胃中復有食停滯之候灰色現於中央而消渴氣上衝心飢不欲食食即吐蛔熱傳厥陰之候也烏梅丸主之舌根灰色而中紅尖黃腸胃燥熱之證也大渴譫語不大便者下之如溫病熱病惡寒脈浮涼膈雙解選用舌邊灰黑而中淡紫時時自齧舌尖為爽乃少陰厥陰上逆非藥可治矣健曰此宜導赤散加黃連麥冬黃柏知母元參燈心淡淡灰色中間有滑胎四五點如墨汁此熱邪傳裡中有宿食未化也大柴胡湯健曰若墨汁點燥者須加黃連墨汁點滑者應加草蔻紅色圖舌見純紅色熱畜於內欲將發瘟也不問何經宜用透頂清神散治之舌見紅色而有小黑星者熱毒乘虛入胃畜熱則發斑矣宜元參升麻葛根湯化斑湯解之健曰舌既有黑星若斑點紫赤者須黃連紫草大青速化舌見淡紅中有大紅星者乃少陰君火熱之盛也所不勝者假火勢以侮脾土將欲發黃之候也宜茵陳五苓散治之健曰此宜加黃連滑石甘草舌見紅色更有裂紋如人字形者乃君火燔灼熱毒炎上故發裂也宜涼膈散健曰此亦宜加黃連花粉並有此形者熱入陽明胃腑故舌根微黃若頭汗身涼小便難者茵陳蒿湯加梔子香豉瘟疫一二日舌根灰黑急用涼膈雙解散下之至四五日後變深黑下無及矣相火來乘君位致令舌紅燥而紋裂作痛宜黃連解毒湯加麥冬潤之健曰此宜用黃連黃柏薄荷石膏花青煎湯調白蜜入川貝母甘草末噙化之瘟疫多有此舌宜解毒湯合益元散加元參薄荷治之尺脈無者死戰慄者亦死舌上出血如濺者乃心臟邪熱壅盛所致宜犀角地黃湯加大黃黃連健曰並宜加紫草石膏燈心紅短白泡舌舌短有泡口瘡聲啞咽乾煩躁者乃瘟疫強汗或傷寒失汗而變此證宜黃連犀角湯三黃石膏湯選用長腫出口舌舌長大脹出口外是熱毒乘心也內服瀉心湯外砭出惡血再用片腦入人中黃糝之舌見純紅更有紅點如蟲蝕之狀者乃熱毒熾盛火在上水在下不能相濟故也宜小承氣下之健曰如腹無停滯當以黃連解毒湯重加紫草用舌見紅色內有黑紋者乃陰毒厥於肝經肝主筋故舌現如絲形也用理中合四逆溫之以上金鏡錄法舌鑑紅舌者伏熱內畜於心胃自里而達於表也冬傷於寒至春變為溫病至夏變為熱病者其舌多紅而赤又瘟證疫癘舌亦赤而加積胎也其多食者助熱內蒸舌亦紅而面赤甚者面目俱赤口瘡也凡病有重輕色有微甚根尖中左右瘡蝕脹爛長短癟細種種異形所治自不同矣當解者內解其毒當砭者砭去其血與諸湯液推類而各施之純紅舌即將瘟舌瘟疫之邪初畜於內宜敗毒散加減或升麻葛根湯治之紅痿舌舌痿軟不能動者心臟受傷也當參脈證施治然亦十難救一健曰此宜人參養榮湯補之紅硬舌舌強硬失音或邪結咽喉以致不語者死證也脈有神證輕猶可治紅戰舌舌戰者顫掉不安蠕蠕瞤動也因汗多亡陽或漏風所致十全大補大建中選用紅餂舌舌頻出口為弄舌餂至鼻尖上下口角左右者惡候也用解毒湯加生地不效者死紅細枯長舌舌乾紅而長細者乃少陰之氣絕於內而不上通於舌也雖無他證朝夕變生難保矣紅嫩無津舌汗下太過津液耗竭舌鮮紅柔嫩如新生狀望之似潤而實涸燥宜人參三白湯合生脈散紅尖紫刺舌汗後食復而舌見紅尖紫刺證甚危矣急以枳實梔子豉湯加大黃下之健增純紅濕光舌一人疫證發熱自汗如雨斑疹隱隱不透六脈浮大無論洪而空豁年將望六陰虛太過和之不退補之不可投劑稍差必致猝變予望而卻走一醫視為初病脈浮浪與荊防發散當日氣喘汗脫而死一人舌脈如之年亦相似當春病溫過經不解予投小柴胡加參連而熱即退再進歸脾湯加薑棗五劑而痙可見同一舌脈而有治不治之殊因其形證有別也健增純赤光干舌予岳年居七旬秋初微瘧轉痢一醫浪進大黃一服大傷津液困頓少食一醫又誤投炮姜理中一劑燥涸其舌光赤如豚肝狀從此不思飲食百無滋味晝夜不寐日久骨立脈弦且代因延予師診視師知其本屬陰虛病屬伏暑乃與清暑益氣以參連化熱知柏養陰歸芍和血麥冬五味生脈添津兩越月服參斤十二兩中間曾發乾厚黑胎如指大一瓣剝去後邊上始發白胎如粉然後舌漸毛而光退津漸生而知味食漸進神漸旺而獲生要知此證皆緣瘧中無未得解散故伏暑日深變痢之際又不疏泄致藥誤內陷邪入心脾消爍津液幾乎不治幸先業滑石理調治邪從黑胎白粉而出益見失表之為害明矣又一女戚於大伏中偶因傷暑停食發熱即延醫診視醫見年近七旬便與健脾之劑而加嘔吐一醫恐其吐傷中氣遂投建中湯而吐更甚又一醫從其建中加重參桂而兼五味麥冬生脈乃至湯水不入來乞予診舌現花黑胎五六瓣知其停食作熱也啟胸按之豈料其胸脹肺高酸痰凝結於上燥屎壅塞於下皆為參耆桂術之所致也問其起病已十二日雖無壯熱而熱勢不解尚未得汗大便欲出而燥痛異常予思上結難開下滯易去去則氣下而吐或可止因先潤劑與小陷胸加鮮藿香葛根石膏元明粉內外雙解之服半劑而矢去其半明晨舌現滿黑干胎服完後半劑燥屎盡下矣而吐不肯定舌變赤光乾涸如隔宿豬腰狀予乃與其子言曰此舌伏暑甚深飲食難下且膈痰作堵未易消化從此留連恐年高力盡不能愈矣予遂不看延至百日復來邀視胸雖平而吐仍在形消脈減舌更枯燥而大便欲出不出回氣昏暈因用潤下清涼如蔞仁紫草膏連明粉等去其燥矢而小便紅赤短澀熱痛方將瀉其小便分利暑濕孰知下空上冒暑毒迸越口發黃疳勢不可遏兩日爛及咽喉湯水莫入而姐故凡疾病無論大小悉關性命延醫調治必當慎重毋以耳為目務虛名無實際之輩最誤人也如此證初時只須暑食兼消二三文之藥就可療也何故即用溫補包括暑邪淹纏三月以致不救真可哀也要知天令之邪終當外泄是證關閉無汗皆五味桂枝參耆之害同一光赤舌而一則得補而生一則因補而死其故在初治之大差與不差後治之去病與不去病耳紫色舌總論舌紫者酒後傷寒也或大醉後露臥當風寒或已病而仍飲酒或感冒用蔥姜熱酒發汗以致熱留心包沖行經絡故舌紫而復見白胎類也至胎結之根尖厚薄長短干滑各宜參而別之純紫舌皆酒毒入心所致直升麻葛根湯加石膏滑石心煩懊憹者梔子豉湯不然必發斑也紫上白胎舌舌紫中見白胎者酒後感寒及飲冷酒所致令人頭痛惡寒身熱宜隨證解表紫上乾燥黃胎舌四五日舌紫上積干黃胎者急用大承氣下之表證未罷者大柴胡湯紫上黃胎濕潤舌舌淡青紫中有黃濕胎食傷太陰也脈必沉細心下臍旁按之硬痛或失氣者小承氣加生附子或黃龍湯主之淡紫灰心舌舌淡紫而中心帶灰或青黑不燥不濕者為邪傷血分雖有下證只宜犀角地黃湯加酒大黃紫上赤腫乾焦舌舌邊紫而中心赤腫足陽明受邪或已下後便食酒肉所致津潤者大柴胡煩躁厥逆脈伏先用枳實理中次用小承氣淡紫帶青舌舌青紫色無胎且滑潤瘦小直中肝腎陰證也吳茱萸湯四逆湯急溫之熟紫老幹舌舌全紫如煮熟者熱邪傳入厥陰至篤之兆也當歸四逆湯淡紫青筋舌舌淡紫帶青而潤中絆青黑筋者直中陰經也必身涼肢厥脈沉面黑四逆理中治之紫短舌舌紫色短而團圞者食滯中宮熱傳厥陰也急用大承氣下後脈靜熱退舌柔和者生否者死健按紫赤舌生焦黑刺形縮如棗子乾燥起殼唇裂齒衄昏憒譫妄身熱耳聾便閉溺澀赤斑現紫黑灰藍皆應急下其脈細小急疾不沾米穀者十難救一若脈有神稍知人事身輕而能轉側無鼻煤鼻煽戴眼氣喘痰聲者尚可救之予曾救閩人黃姓之子因夏月伏暑秋天感冒瘧痢兼發復變時氣發斑誤於醫藥纏綿日久肌體消瘦神昏譫語將成不治醫擬地黃湯加參以異拖延時日其友二人與彼關切與予相好邀予決之予曰時氣斑毒未解伏暑無汗未出豈可滋補投則死矣乃與柴葛解肌合調胃承氣以兩解之但舌赤黑瓣焦刺起殼津液熬干先與西瓜食之爽快藥加膏連並進而斑復現灰黑接服三劑無汗不化齒燥唇裂晝夜不眠復投香薷飲白虎加黃連藿香兩劑而始微汗熱減斑消然搪尚不止復變瘧疾服小柴胡五劑而汗泄身涼又與人參白虎五劑而痊其時己交小雪乃以暑藥療病並吃大西瓜八個收效人所不信也要知治病必求其本此因伏暑而來故先瘧治不如法故變痢治不如法又變熱病發斑致其危急直待撥亂反正斯得全其生耳豈因於冬月而可不究其暑乎贅此以驗舌胎之凶吉如此舌渾紫而又滿舌紅斑或身亦發赤斑者化斑湯解毒湯加葛根青黛黃連有下證者涼膈散舌淡紅尖生紫蓓蕾者感冒後不戒酒食濕傷膽經味傷胃經所致也小柴胡加減之健曰應入連膏並進醬色論醬色胎者夾食傷寒也一二日即見此舌者寒傷太陰食停胃腑之證也輕者胎色薄雖腹痛而不下利桂枝湯加橘半積樸胎厚腹痛不止者必危舌見醬色乃黃兼乎黑為土邪傳水必唇口乾燥大渴雖下奪難愈健按醬胎乃老黃胎之甚而濕者若干而燥即為焦胎矣皆由飲食停畜濕熱侵脾不與清熱消導令變乾焦短縮芒刺黑胎何可以桂枝為治理當小陷胸或調胃承氣下之其茶葉色油綠胎治亦相同也藍色論藍色胎者乃肝木之色見於外也傷寒病久已經汗下胃氣既傷心火無氣胃土無依肺無所生木無所畏故乘土而見藍色是金木相併火土氣絕之候是以必死如微藍或稍見藍紋者猶可溫胃健脾調肝益肺治之純藍者肝木獨盛無畏也不治矣若見藍紋者可小柴胡加炮姜治之因寒物結滯者急進附子理中湯大建中湯以上申氏法成氏舌者心之官法應南方火本紅而澤傷寒三四日已後舌上有膜白滑如胎甚者或燥澀黃黑是數者邪氣淺深之故也邪氣在表者舌上無胎及邪氣傳裡津液摶結則舌上生胎矣寒邪初傳未全成熱或在半表或在半里或邪氣客於胸中者皆舌上白胎而滑也經曰舌上如胎者以丹田有熱胸中有寒邪初傳入里也陽明病脅下硬滿不大便而嘔舌上白胎者可與小柴胡湯是邪猶在半表半裡也陽明病若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之是邪客於胸中也若病在臟宜若可下如舌上胎滑者則不可攻是邪未全成熱猶帶表寒故也及其邪傳為熱則舌上之胎不滑而澀也經曰傷寒七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之是熱耗津液而滑者已干也若熱聚於胃則舌為之黃是熱已深也要略曰舌黃未下者下之黃自去若舌上色黑者為熱之極也針經曰熱病口乾舌黑者死以心為君主之官開竅於舌黑為腎色見於心部心者火腎者水邪熱已極鬼賊相刑故知必死觀其舌色可以見順逆矣立齋舌白者肺金之色也由寒水甚而火不能平金則肺金自盛故色白也色青者肝木之色也由火甚而金不能平木則肝木自盛故色青為實矣仲景曰少陰病下利清穀色青者熱在裡也大承氣下之舌黃者由土甚則水必衰所以水不能平火而脾土自旺故色黃也舌紅為熱心火之本色也或赤者熱甚深矣舌黑亦為熱者由火熱過極則反兼水化故色黑也五色應五臟如此敖氏以色白者邪在表未傳於裡也白胎滑者痛引陰筋臟結也舌赤者邪將入也舌紫者邪毒之氣盛也舌之紅點者火之極也舌之燥裂者熱之深也或黑圈黑點者水之萌發也舌尖黑者水之將至也舌心黑者水之已至也舌全黑者水之休也其死無疑矣舌黃者土之正色邪初入於胃則色微黃見舌黃且白者胃熱而大腸寒也舌之通黃者胃實而大腸燥也則以調胃承氣下之黃自去矣舌灰黑者厥陰肝木相乘速用大承氣下之可保但五死一生矣仁齋凡舌上生胎者或黃或白或黑或滑或澀也蓋邪熱在表未傳入里則無胎若邪熱入里則生胎也凡胎白而滑者表寒未解也若半表半裡之熱脈弦入少陽者舌上白胎口苦寒熱者小柴胡胎黃而澀者熱漸深也小柴胡去半夏加花粉黃連類若熱深聚於胃舌上黃胎而燥渴飲水人參白虎湯內實不大便者調胃承氣下之若火極似水舌黑而燥渴飲水漿者大承氣下之若未可下只宜小柴胡合白虎凡陰極水來刑火者亦生黑胎也黑胎滑而不燥不澀不渴脈沉微足冷者急宜四逆湯溫之舌上燥裂或赤澀或腫煩渴表裡俱熱欲飲水數升者人參白虎湯大抵舌乃心苗象離而紅色黑者紫黑者水來刑火多難治矣士材邪熱甚則胎黑而芒刺不熱不渴胎黑而有津為寒夏月黑胎多可治冬月黑胎多難治黑胎刮不去復生刺裂者死凡舌硬舌腫舌卷舌短舌強者十救一二舌縮神昏脈脫者死陰陽易舌出數寸者死扁鵲曰病人舌卷囊縮者死汗出不流舌卷黑者死又舌黑而胎滑陰寒也舌卷焦黑而燥陽毒熱深也舌青而胎滑陰寒冷極也東垣舌燥澀如楊梅刺者用生薑切平蘸蜜於舌上擦之其刺立消仁齋薄荷蜜治舌上白胎乾澀語言不真先以生薑片蘸蜜水擦洗須薄荷自然汁與白蜜等分調敷之節庵舌胎不拘滑白黃黑用井花水浸青布片洗淨次用生薑時時刮擦之胎自退士材舌吐出者糝冰片末少許即收
