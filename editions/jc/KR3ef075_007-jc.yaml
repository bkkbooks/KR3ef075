body:
  text: 傷寒直指卷六辨太陰病脈證治第十太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬太陰為病陽邪傳裡也太陰之脈布胃邪氣壅而為腹滿上不得降者嘔吐而食不下下不得升者自利益甚時腹自痛陰寒在內而為腹痛者則為常痛此邪干於裡雖痛亦不常但時時腹自痛也若下之則陰邪留於胸下為結硬經曰病發於陰而反下之因作痞三陽云此風寒中於太陰經非陽邪傳裡也若陽邪傳裡正當下何結硬之有況痞字與硬字有分別邪之初起必先入經而後入腑臟此邪中太陰之經其病猶在上膈非初中臟腑之陰證也當辛甘之藥溫散之則邪去而自和矣今誤下則邪氣乘虛入胸膈間作硬耳亮宸此寒邪直傷太陰之本證也三陰在裡本屬陰寒人氣壯者受邪必從太陽始化熱而內傳若本虛裡氣不固一受邪直傷三陰臟氣之陰與外邪之寒兩陰相合而成陰證矣太陰為三陰之表於陰為微故無厥證而手足溫腹滿者脈布胃中寒邪壅而滿也吐者裡寒而氣逆也食不下寒氣閉也自利者寒入於臟臟寒故自利甚也時腹自痛者太陰之脈入腹寒氣干之而痛也此宜理中四逆溫之若下之則重寒凝結而成痞硬矣觀子成氏以此為陽邪傳裡且謂陰寒腹痛痛有常陽邪腹痛痛無常皆誤也夫陽邪自三陽傳至太陰為熱深矣必不僅作腹痛如序例之咽乾及兼燥渴便閉等證即為傳邪無疑若此之上則吐食不下下則自利益甚非邪直於太陰之經而何其腹時痛者邪正相搏利已稍減故痛而不常若實熱內結之痛則有物而有常矣然裡氣固虛而陰寒之邪與飲食之冷傷其經者居多不行溫解而反以下藥攻之虛其裡氣則陰寒固結轉深而布胃之經邪反結復結硬胃下不去矣使屬陽邪內傳政宜下去者何反結硬乎腹滿類固太陰之本證然猶屬病於經氣者多故吐與利而誤下亦成結硬若但臟寒如宜四逆輩者必變清穀厥逆安得僅為胸下之痞陷乎健曰此傷寒直中太陰經證非三陽傳至之候直中為陰為寒傳至為里為熱直中應溫經散寒傳至應清邪下熱務當詳審精別庶無差失諸論透澈惟成注大謬經者太陰中風四肢煩疼陽微陰澀而長者為欲愈太陰脈也主榮四末太陰中風四肢煩疼風淫末疾也表邪少則脈微里向和則脈澀而長長陽也陰病見陽脈生以陰得陽而解故云欲愈海藏表少里和脈長者陽漸生也故欲愈此一證為太陰經從外而至觀子陰寒入里干於脾陰之臟者多然亦有但病於經者蓋中風之邪每從表得也既脈浮可汗肢節亦疼雖不言發熱其當溫表而不當溫里明矣故主桂枝湯治之若陽微陰澀而長陰病得陽豈中於外者邪氣猶淺而欲愈亦不難乎太陰病欲解時從亥至醜上脾為陰土王於醜亥子向陽之時故云欲解太陰病脈浮者可發汗宜桂枝湯經曰浮為在表沉為在裡太陰病脈浮者邪在經也故當汗散之亮宸太陰寒證宜溫而此脈浮為風邪在太陰之經而不在臟桂枝湯汗之當矣然不言無汗者陰不得有汗也不用麻黃者以陰病不當更發其陽也故宇泰云須識無汗亦有桂枝證正謂此耳健曰三陰皆有表證而此是太陰中風表證也自利不渴者屬太陰以其臟有寒故也當溫之宜服四逆輩自利而渴者屬少陰為寒在下焦自利不渴者屬太陰為寒在中焦與四逆湯以溫其臟兼善經言輩字謂藥性同類惟輕重優劣不同耳四逆湯辛甘相合乃大熱之劑苟輕用之恐有過度之失所以仲景不為定擬也莫若以理中循循而用之為當亮宸自利有陽邪而渴者如少陰自利純清水口燥咽乾宜急下厥陰下利慾飲水為有熱宜白頭翁湯清之是也有陰邪而渴者如少陰自利五六日自利而渴虛故引水自救厥陰消渴是也此自利不渴正屬太陰寒證蓋少陰厥陰寒之極也所謂物極則反見兼化故反渴太陰不如少陰厥陰之甚故止見寒證而不渴也然陰臟有陰邪而利者宜溫之四逆為宜輕則理中亦可故曰四逆輩也觀子或曰太陰屬濕土熱邪入而蒸動其濕故不渴而多發黃少陰屬腎水熱邪入而消耗其水故口謁而多煩躁此仲景之分經辨證法而曰自利不渴者屬太陰自利而渴者屬少陰然同一寒邪之入太陰曰臟有寒視寒之但傷於經與飲食之侵於脾胃者其陰寒為最甚而裡氣且虛極矣故直曰當溫且以四逆主之也嗣真詳太陰病腹滿證有三有次第傳經之邪有下後內陷之邪有直中本經之邪不可不辨也如腹滿咽乾者非傳經之陽邪乎法當下之腹滿吐食不下自利腹痛者非直入本經之陰邪乎法當溫之如太陽病醫下之腹滿時痛大實痛非誤下內陷之邪乎當以桂枝加芍藥大黃今活人書不言二湯為治誤下之劑又不曰大實痛而曰痛甚設遇本經直入陰邪脈沉細腹滿痛亦以此下之豈不貽胸下結硬之悔乎又所謂大實痛者乃胃中燥結而痛則與痛甚迥別以是知本經陰邪腹滿者宜理中加青皮陳皮傳經之邪腹滿咽乾者屬大柴胡誤下後腹滿痛者方屬桂枝加芍藥大黃也活人問陰證有發熱者乎太陰厥陰皆不發熱只少陰有反發熱愚詳仲景論三陰皆有發熱也如陰經二證外只有吐利手足不逆冷反發熱者死少陰病一身手足盡熱以熱在膀胱必便血少陰四逆散中用柴胡亦有發熱又厥陰先厥後發熱而利者必自止下利脈數有微熱今汗出欲愈面赤身微熱為鬱冒嘔而發熱小柴胡與夫太陰中風四肢煩疼是三陰皆有發熱何其言之拘耶又云太陰經無吐法如虛煩腹實等證可吐者皆屬他經獨華元化云四日在胸可吐之亦不曰太陰今活人太陰病在胸腹可吐而愈何耶況胸中非太陰部分仲景雖有胸下結硬之文是誤下後壞病而胸下反近心腹處亦非吐藥可治也至云脈大而無吐病可汗而已仲景但云太陰尺寸俱沉細亦未嘗言脈大也傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也太陰病至七八日大便硬者為太陰入腑傳於陽明也今至七八日暴煩下利日十餘行者脾家實腐穢去也下利煩躁者死此以脾氣和逐邪下泄故雖暴煩下利而利必自上觀子脈浮緩當為表病病在表手足必熱今得之手足自溫則緩為脾脈知邪已去表而下歸於脾故曰系在太陰也浮者陽邪緩者脾濕以熱邪內蒸太陰之濕多發身黃然小便利者濕氣猶能外泄不發黃也七八日邪漸深而入陰之際既不去陽之陰亦不結腑便硬但暴煩而下利者此非陰寒內甚之利也煩者陰之出陽正猶勝邪雖十餘行利必隨止何也脾家實邪不再傳腐穢既去太陰病衰其病自除矣蓋浮為陽陰病得陽脈者生緩為太陰之本脈皆吉兆也又少陰脈陽微陰浮者為欲愈厥陰脈微浮者欲愈是三陰皆以浮為自愈之診非中風脈浮之浮也序例所謂更不傳經者太陰病衰腹減如故此七八日政在太陰經儘自解之候矣本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之表邪未罷醫反下之邪因乘虛傳於太陰裡氣不和故腹滿時痛桂枝以解表加芍藥以和里亮宸表邪未罷妄下之陷入太陰然非大熱證故但邪壅而腹滿時痛耳以桂枝仍解太陽之邪倍芍藥以泄太陰之滿邪去滯通而病自止矣健曰此太陽誤下邪陷太陰之證大實痛者桂枝加大黃湯主之大實大滿自可除下之故加大黃以下大實潔古此非本有是證以其錯下脾傳於胃故曰誤傳觀子太陽病誤下之成結胸痞者猶未離三陽之表也若腹滿時痛直入太陰之裡矣然太陽之邪仍未解故復主桂枚病在太陰因加芍藥耳大實痛則不獨表邪之內陷而且有物留連矣諸痛為實實則必除去之加大黃以通壅塞其不可同於承氣證者一為傳久入腑之熱邪一為誤陷未解之表邪是以雖同主下而迥不侔矣婁氏用四逆輩固所當然復用桂枝大黃夫大黃大寒何為用之陰經又兼桂枝寒熱相雜何也曰自利而渴者屬少陰為寒在下焦自利不渴者屬太陰為寒在中焦以四逆等溫其臟此本經當用之藥也其太陽病反下之表邪未解乘虛傳於太陰因而腹滿時痛大實痛者桂枝加芍藥大黃為宜太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也腹滿痛者太陰病也脈弱其人續自便利則邪雖在裡未成大實欲與大黃芍藥攻滿痛者宜少與之以胃尚弱易為動利也健曰以上皆太陰受邪本經之證其從三陽傳入者則俱列於太陽篇中辨少陰病脈證治第十一少陰之為病脈微細但欲寐也少陰為病脈微細為邪氣傳裡深也衛氣行於陽則寤行於陰則寐邪傳少陰則氣行於陰而不行於陽故但欲寐亮宸少陰為陰中之陰寒邪中之則兩陰相合其為陰寒甚矣脈細微者邪在裡而為純陰也邪在少陰衛氣受團而不能出之陽故但欲寐矣觀子厥陰脈微緩太陰脈沉細今少陰脈亦見微細者經異而陰寒無大異也衛氣夜行於陰則寐但欲寐者陽氣虛陰氣盛故目恆瞑昏昏然閉矣陰主合主靜也然邪傳於裡熱氣內伏者亦多寐宜分別治之少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也欲吐不吐心煩者表邪傳裡也若腹滿痛則屬太陰此但欲寐則屬少陰五六日邪傳少陰之時自利不渴者寒在中焦則屬太陰此自利而渴為寒在下焦屬少陰腎虛水燥渴欲引水自枚下焦虛寒不能制水小便色白也經曰下利慾飲水者以有熱故也此下利雖渴然以小便色白明非裡熱不可不察亮宸病入少陰當發厥吐利然其始亦未盡發但寒伏於裡兀兀欲吐而不即吐也煩者少陰之脈從肺絡心寒客於腎氣上凌心心不能堪陰病伏藏甚微往往邪不甚覺至五六日寒極而然故自利而渴少陰屬水主液真陽虛極不能主液故引水自救小便自利色白下焦之寒顯甚而溫劑不可緩矣然今之少陰病小便多黃赤其白者甚少不可不知也三陽云此寒中陰經而傳入陰臟者其引水自救浮腸在上也若有大渴方可論陽邪傳陰熱證觀子欲吐不吐心煩虛陽格越於上但欲寐自利小便白里之真寒已深法當白通四逆類溫之雖有燥渴乃腎虛水涸引水自救非裡熱下利之渴也故小便白者少陰病形悉具又曰下焦虛寒故便色白論分四段而反復之只是一意成氏作熱邪內傳解誤矣要知此渴與口燥舌乾之渴不同若兼腹滿便閉惡熱諸證自當作陽邪傳裡治之既裡虛自利小便白其為虛寒明甚特曰下焦者正見陰既盛於下陽必格於上豈可以煩渴而誤攻其熱哉健曰此少陰傷寒陰證也文無誤而註疏詳不與傳邪相涉病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利脈陰陽俱緊為傷寒法當無汗反汗出者陽虛不固也故云亡陽以無陽陰獨是屬少陰內經曰邪客少陰之絡令人嗌痛不可納食少陰寒甚是當咽痛而復吐利南陽若脈沉遲手足厥冷或吐利而咽中痛此少陰證也病源云此為下部脈都不至陰陽隔絕邪客於少陰之絡毒氣上衝故咽喉不利或痛而瘡也觀子陰陽俱緊內外之寒已深微陽復外越汗出者陰盛欲亡陽也積陰在下格熱上浮客於咽絡而痛然其裡寒之重吐利必隨作矣豈非內真寒而外假熱上下不並者乎健曰陰陽俱緊人迎氣口皆緊表裡俱寒也須通脈四逆救本而咽痛次之少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也咳而下利裡寒而亡津液也反以火劫強責少陰之汗津液內竭加火氣煩之故譫語小便難也少陰病脈細沉數病為在裡不可發汗少陰病始得之反發熱脈沉者為邪在經可與麻黃附子細辛湯發汗此少陰病脈沉細數者為邪在裡不可發汗觀子細沉之中加之以數政陽邪入里之微入里安可復汗乎健曰病得細沉數脈無論少陰皆非汗證是應瀉之診矣如舌上干黃當於三黃湯內求之少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之脈微為亡陽表虛不可汗脈弱澀為亡陽裡虛不可下三陽云脈弱澀陰脈也澀為血少乃亡陰也故不可下陽字誤觀子少陰病其脈微則陽已虛矣設誤與發汗有不致亡陽者乎然不獨寸脈微為陽已虛也其尺脈弱澀者陰更虛矣奚可復下乎既汗下俱在所戒法惟溫經而邪自除矣健曰此二節言少陰不可發汗與妄下之禁少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈少陰病脈緊者寒甚也至七八日傳經盡應解之時自下利脈暴微者寒氣得泄也若陰寒勝正陽虛而泄者則手足厥而脈緊不去今手足溫脈緊反去知陽氣復寒氣去故為欲解下利煩躁者逆此正勝邪微雖煩下利必自止觀子按真寒入臟未有不作吐與利者蓋腎主二便裡虛氣寒則下焦不復禁固故下利其並膈上之陽亦虛者胃寒不納則吐且利此少陰病或作於始或得於繼而必以是為主證也經雖雜見於各條而於四逆正治吐利之際反無特出之文則其佚而未全明矣學者各以意推之可耳健曰少陰病脈緊不言惡寒發熱至七八日但自下利足見真寒入臟而非在經之表邪也治之當以附子理中湯下條同此少陰病下利若自利止惡寒而蜷臥手足溫者可治少陰病下利惡寒蜷臥寒極而陰勝也利自止手足溫者里和陽氣得復故為可治少陰病惡寒而蜷時自煩欲去衣被可治惡寒而蠟陰寒盛也時時自煩欲去衣被為陽氣得復故云可治觀子雖同為惡寒身蜷自煩則非不煩而躁之比欲去衣被則非四逆之比陽猶勝陰故可治也健曰既惡寒而蜷何自煩又欲去衣被此陽極似陰乃傳邪所致而非直中之證故云可治不與治法蓋脫文也觀子言其陽猶勝陰非四逆比不可以熱劑誤投明矣黃氏所謂涼劑從陰退陽之法正合是證少陰中風脈陽微陰浮者為欲愈少陰中風陽脈當浮而陽脈微者表邪緩也陰脈當沉而陰脈浮者裡氣和也陽中有陰陰中有陽陰陽調和故為欲愈觀子反發熱與真寒但傷於經者少陰之寒傷表也此中風者少陰之風傷表也是臟寒為病之外各有表邪初入之證與厥陰中風脈微浮為欲愈不浮為未愈之條皆但啟其端而不復及他證與治法則知經文之散失良多雖然微此則並陰經中風之病亦無從知之矣健按此是少陰風傷表證仲景但言其端諸家未發其蘊愚以為少陰之表屬膀胱膀胱是太陽之經即以太陽中風法治之則少陰之表邪亦可解臟腑之氣必自和矣與桂枝湯未為不可因所中亦輕故無發熱脈得陽微陰浮為欲愈少陰病欲解時從子至寅上陽生於子子為一陽醜為二陽寅為三陽少陰解於此者陰得陽則解也少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯經曰少陰病吐利躁煩四逆者死吐利手足不厥者則陽氣未衰雖反熱不死脈不至者吐利暴虛也灸少陰七壯以通其脈觀子非臟不吐利並作然手足不逆冷而反發熱是陽不盡而陰極復生也雖吐利重虛脈或不至當溫以艾火助其陽氣之得復耳少陰病八九日一身手足盡熱者以熱在膀胱必便血也膀胱太陽也少陰太陽為表裡少陰病至八九日寒邪變熱復傳太陽太陽為諸陽主氣熱在太陽故一身手足盡熱太陽多血少氣為熱所乘則血散下行必便血也觀子八九日邪復傳太陽雖一身手足盡熱而必侵入膀胱迫血下行蓋得於少陰者本陰邪故出之太陽亦必從太陽之裡也以是知陰極陽生之理在少陰亦有之又不獨厥陰為然矣健曰便血溺血也血泄則熱可退而自己如不已阿膠雞子黃湯與之亦穩少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治但厥無汗熱行於里也而強發汗虛其經絡熱乘經虛迫血妄行從虛而出或從口鼻或從目出諸厥者皆屬於下但厥為下厥血亡於上為上竭傷氣損血邪甚正虛故為難治宇泰但厥無汗熱入里而外寒甚也當溫之而強發其汗則衛寒甚而汗不能出必內傷其營血而妄行也健曰厥深者熱亦深而於少陰病得之強發其汗而致妄動其血是不宜溫熱行經之藥明矣宇泰謂其裡熱外寒曰當溫恐非既裡熱動血必須涼劑瀉之犀角地黃湯可用於此少陰病惡寒身躁而利手足逆冷者不治針經曰多熱者易已多寒者難已此油外寒極純陰無陽故云不治少陰病吐利躁煩四逆者死吐利者寒甚於里四逆者寒甚於表躁煩者則陽氣欲絕難治而死矣少陰病下利止而頭眩時時自冒者死下利止則水穀竭眩冒則陽氣脫故死觀子利止似可生然頭者諸陽之會眩而且冒者雖不下竭復上脫也故死少陰病四逆惡寒而身躁脈不至不煩而蜷者死四逆惡寒而身蜷則寒甚脈不至則真氣絕煩熱也躁亂也若憤躁之躁從煩而至燥為來有漸猶可不煩而躁是氣欲脫而爭也譬猶燈將滅而暴明其能久乎少陰病六七日息高者死腎為生氣之原呼吸之門少陰病六七日不愈而息高者生氣斷絕也健曰此真陰虛而氣不歸源之絕證所謂傷寒專死下虛人此證類是少陰病脈微細沉但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死陰氣方盛至五六日傳經盡陽氣得復則愈反更自利煩躁不得臥寐正氣已弱陽不得復病勝臟故死少陰病始得之反發熱脈沉者麻黃附子細辛湯主之少陰病當無熱惡寒反發熱者邪在表也雖脈沉以始得之則邪氣未深亦當溫劑發汗以散之活人陰病不當發汗發汗則動經然太陰脈浮少陰發熱亦須微微取汗但不可正發汗耳叔和云始表中風寒入里則不消故知初病則表中風寒未至入里亦宜溫覆少汗而解仲景太陰脈浮桂枝湯少陰反發熱脈沉麻黃附子細辛麻黃甘草二湯皆陰證表藥也要知脈沉細數病在裡不可發汗此大略之言耳脈應里而發熱在表宜以小辛之藥取微汗而溫散之也觀子按例篇云尺寸俱沉者少陰受病以傳邪入里之脈沉矣此少陰病體痛骨痛手足寒宜附子湯者脈亦沉少陰病急溫之宜四逆湯者脈亦沉至此證反發熱與陰寒皆有沉脈沉但可為病之在裡而未可專以沉為寒也其後一證云少陰病脈微細沉又云少陰病脈細沉數夫細微細數而俱得沉脈其寒熱自判矣健按少陰腎其臟屬水其位居北其令配冬其色應黑其脈應尺其胗應沉沉為少陰本象因傷寒而脈沉未可即為入里之深若始得之反熱而無數象煩渴等證是傷寒之邪在表應與辛溫達表若反熱而沉中帶數實之脈者是邪入少陰之裡又當涼瀉以治之少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也二三日邪未深也既無吐利厥逆諸里證則可與麻黃附子甘草湯微汗以散之少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之脈經云風傷陽寒傷陰少陰受病則得之於寒二三日已上寒極變熱之時熱煩於內心中煩不得臥也與黃連阿膠湯扶陰散熱亮宸邪入少陰多屬寒證然亦有鬱而成熱得之二三日以上不變吐利而心中煩者少陰之脈絡心熱迫於心故令煩也不得臥者熱盛而心不寧也黃連之苦寒用以為君正治心中之熱而黃芩佐之以止煩芍藥收陰氣而泄熱雞子黃阿膠以益血使陰氣足營血生心得所養而臥也觀子少陰之臟主水主陰少陰之脈從肺絡心注胸中邪客在經而陰衰熱甚則水必涸而心火無制故心中煩擾不眠也芩連芍藥以折熱之本阿膠卵黃以補陰之虛則邪自解故曰用此以扶陰散熱耳夫得之二三日以上其熱氣猶淺故但病於心中而未至舌燥口乾之甚也少陰病得之一二日口中和其背惡寒者當灸之附子湯主之少陰客熱則口燥舌乾而渴口中和者不苦不燥是無熱也背為陽背惡寒陽氣弱陰氣勝也經曰無熱惡寒者發於陰也灸之助陽消陰與附子湯溫經散寒活人一二日為初中病即入少陰不經三陽也故宜治少陰之經蓋入少陰者即惡寒而不熱宇泰背者胸中之腑諸陽受氣於胸中而轉行於背故背為陽腹為陰陽氣不足陰寒內盛則背惡寒若風寒在表而惡寒者則一身盡寒矣但背寒者陰寒氣盛可知也又有陰氣不足陽氣內陷入陰中表陽新虛而背惡寒者如所謂傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之是也一為陰寒氣盛一為陽氣內陷陰寒為病者不能消耗津液故少陰病口中和陽氣內陷熱爍津液故太陽病口燥舌乾而渴欲辨陰陽寒熱者當以此詳之亮宸此少陰陽氣在經將入臟為下利以迎而奪之也凡少陰當下利今一二日寒氣未極故未見下利之證然背為太陽之經督脈為諸陽之綱既見少陰脈微細欲寐之證而又兼背惡寒者此為陽氣大衰寒將入里非急固其里而益陽散寒至六七日已見躁亂厥逆下利之證則無及矣故用參朮芍苓以救里之虛用附子二枚以溫散表裡之寒救陽氣而逐周身之陰邪使不得內攻也其一條身體骨節痛亦與背寒同為陰寒在經然手足寒脈沉亦入里欲速之勢也故用藥相同耳少陰病身體痛手足寒骨節痛脈沉者附子湯主之少陰腎水主骨身體痛支冷脈沉者寒盛於陰也身疼骨痛若脈浮手足熱則可發汗此手足寒脈沉故當與附子湯溫經觀子無熱惡寒發於陰也得一二日則病邪直入少陰矣背諸陽之綱但背惡寒又陽弱之徵矣此證體痛骨節痛猶惡寒相類不言發熱是發於陰也脈沉手足寒內寒亦顯然矣雖未至於厥逆之深而真陰在經微陽內衰不輕之候法惟灸之溫之兼以人參苓木其氣血庶不致垂敗故養正溫經毋偏廢也少陰病下利便膿血者桃花湯主之陽病下利便膿血者協熱也少陰病下利便膿血者下焦不約而裡寒也與桃花湯固下散寒健曰腎主二便雖陰臟病而致利膿血諒非即中而即病者然勢必邪毒入深與陽病下利膿血相同也若寒邪入臟則下利清穀不至即便膿血雜病痢積便膿血為熱傷陰絡必以涼治傷寒便膿血而偏以熱治者乎證雖屬少陰而表裡寒熱其理一也寒而利血者稀見譬如人患癰疽初必因風寒暑濕凝滯氣血而成膿之際定然作熱未有陰寒而能變肌肉為膿血者明矣桃花湯熱而且澀投之致甚將如之何如利白膿而滑脫不禁者或可用之若利血膿而滯下者無論太陰少陰當以黃芩合白頭翁湯為妥少陰病二三日至四五日腹滿小便不利下利不止便膿血者桃花湯主之二三日以至四五日寒邪入里深也腹痛者裡寒也小便不利者水穀不別也下利不止便膿血者腸胃虛弱下焦不固也與桃花湯固腸止利也吳氏凡下血便膿血者陰陽冷熱之不同古人云見血無寒又言血得熱則行此大概之言也要略曰陽證內熱則溢出鮮血陰證內寒則下紫血如豚肝也亮宸此治寒傷少陰血利也下利清穀者為寒在氣分今便膿血為寒邪直傷少陰之營而病在血矣腹痛者寒在裡也小便不利者腎主二便不能司開也下利不止者腎氣不固不能司闔也石脂之澀可以固脫乾薑之辛可以散寒粳米之甘可以益胃是以寒邪散而下利止腸胃固而便膿愈觀子傷寒下利之證最多在少陰者亦俱從寒熱區分如兼咽痛煩滿之豬膚湯證兼渴嘔咳煩之豬苓湯證兼四逆咳悸之四逆散證下利清水色純青之大承氣證其為熱邪奚疑矣欲吐心煩引水便白之通脈四逆證清穀脈微反不惡寒之格陽證脈微之白通證無脈厥逆乾嘔煩之加人尿膽汁證其為寒邪奚疑矣乃於腹痛利不止便膿血者別出桃花湯一法何也或因用乾薑而溫少陰之經或因用石脂而為去協熱之利不知皆非也夫果宜溫經急當進四逆白通類豈乾薑一兩之能勝任果宜除熱亦自有白頭翁及前諸湯類豈石脂重澀之可使蓋嘗思之熱傳不利者邪陷走而不能守也寒甚下利者陰勝而腎不固也熱至下純青色之水寒至清穀不過自利而已皆不能便血今二三日至四五日腹滿利不止而便膿血者不特寒氣之深其下焦之虛脫亦甚矣腎司二便開闔之樞精血之道也寒則不能禁固滑則開闔廢弛下利不止而小便不利膿血大作者不特前陰之氣分虛而後陰之血分亦重傷矣此非腸胃垢膩結聚熱利之比亦非僅溫裡寒可愈之證法惟石脂之鎮重溫澀直達下焦而固其寒脫補以粳米之甘平回虛陷之正氣佐以乾薑之辛熱驅胸腹之久寒然後復其固閉之常而裡虛氣寒亦靡不解耳政如痞結下利之證非芩連理中可治者別出石脂餘糧湯備澀劑收之之法而後用熱用寒之外法無窮矣健按此證但言病而不言脈難憑屬熱屬寒因下利膿血故列於少陰篇中未可認定陰寒二字下利多則小便自少而不利乃膀胱氣化不及亦臟病而腑不治也夫血熱則行寒則凝注皆謂為裡寒入深獨仁齋疑之而舉要略陰證內寒則下紫血如豚肝以辨之若所下鮮紅夾膿者乃熱迫腸臟使然如脈現洪數或沉數者政是白頭翁湯證桃花湯不易服也少陰病下利便膿血者可刺下焦血氣留聚腐化則為膿血刺之以利下焦血氣觀子刺者瀉其經氣宣通之也下利便膿血既主桃花湯矣此復云可刺者如痞證利不止複利其小便與五苓散以救石脂餘糧之窮而此一刺又以輔桃花湯之所不逮健曰同一下利此無不止二字然均便膿血何此可以刺瀉之而彼獨以溫澀之何也此文之遺佚而難憑注之偏向而難玩此則水落石出矣故愚以為便膿血之非寒證不謬也論中當味仁齋引要略之辨則寒熱顯然自判曰可刺而無刺穴亦闕文耳少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之吐利手足厥冷陰寒氣甚煩躁欲死者陽氣內爭與吳茱萸湯助陽散寒亮宸既吐且利手足厥冷陰寒極矣煩躁欲死非元陽將脫乎故用吳茱萸湯然此方雖止吐利補虛而厥逆之證恐非姜附猛悍之氣不能回陽而散表裡之陰邪故遇此證又當於四逆類求之觀子少陰吐利煩躁四逆者死此但手足厥冷是輕於四肢耳何主吳茱萸湯為治哉蓋吐利煩躁等證有由腎虛寒極者有由胃虛寒甚者腎中陰盛必姜附純陽健下之藥溫之而尚多不治若胃虛胭寒者猶為可治法惟吳茱萸湯之辛溫輔人參薑棗之甘和以溫脾胃則吐利止而煩躁除四末之陽氣可復是回後天之脾元不為不捷於回先天之腎元也不然豈手足厥冷之易於四逆吳茱萸一湯反多功於四逆白通哉少陰病下利咽痛胸滿心煩者豬膚湯主之少陰之脈從腎上貫肝膈入肺中循喉嚨其支者從肺出絡心注胸中邪自陽經傳於少陰陰虛客熱下利咽痛胸滿心煩也與豬膚湯調陰散熱亮宸少陰下利多寒但此利非寒必兼下重而為邪熱然又未可遽用苦寒以少陰屬陰寒恐遂變寒證也惟豬膚甘寒解少陰之熱用白蜜引心胸之熱從利中去而止其利所謂通因通用也白粉以益胃氣蓋即白虎桃花之用粳米意耳觀子下利本屬熱邪內傳下焦不能約制然並見咽痛胸滿心煩諸證則邪客上焦亦甚不可單治裡虛挾熱之利矣此豬膚湯散心胸之浮邪瀉下陷之裡熱養不固之正氣則腸胃以下之邪亦除然後虛回利止而少陰之經氣安矣健按豬膚古法未詳其制或謂是燖豬時刮下黑衣或謂是豬皮劖薄之外膚世未精悉此湯所以難用也曾見一人患陰火上炎而挾外感咽痛一醫浪與此湯而不分別病家將薄皮用之助其痰涎轉劇殊不思豬皮乃是葷腥喉證用葷發風動氣有不加甚者乎以理推之須是刮下浮衣然豬非美畜雖屬水走少陰卻未見功力蜜與粉亦味淡無著混施此湯必無益也少陰病二三日咽痛者可與甘草湯不差者與桔梗湯陽邪傳於少陰而為咽痛服甘草湯差若寒熱相搏為咽痛者服甘草湯不差與桔梗湯以和少陰之氣健曰少陰之脈入肺中循喉嚨陽邪熱毒摶於少陰之經故發咽痛甘桔開肺氣通少陰為咽喉之聖藥少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之熱傷於絡則經絡乾燥使咽中傷生瘡不能語言聲不出者與苦酒湯解絡熱以愈咽瘡健曰言出於舌聲發於喉喉為肺管少陰脈入肺挾舌本熱邪壅塞經絡則咽傷生瘡語不出聲矣但其病經在喉而不在咽文曰咽中傷蓋古之通稱耳苦酒即醋也雖能解咽痛然恐酸斂不為穩當少陰病咽中痛半夏散及湯主之甘草湯主少陰客熱咽痛桔梗湯主少陰寒熱相摶咽痛半夏散及湯主少陰客寒咽痛也觀子大抵少陰有臟病有經病臟病者純陰見吐利手足寒類是也經病者多挾陽邪見咽痛心煩類是也少陰水之主乙癸同源與陽熱相鎮固者也水虛者火必上熾故伏於絡者多結咽喉之經熱而內有積熱者復為寒束之難通此甘桔苦酒諸湯之設治病起未有他證或痛或瘡或㾦均為少陰所病也若半夏散證變熱甚輕而伏寒甚重脈緊反汗出亡陽者但裡寒盛而陽復外越其視通脈四逆之咽痛何異然則上熱誠假而下寒實真矣豈彼客熱於經與寒熱相持之可同日語哉健曰此三節明系經邪客熱上結於咽而痛觀子以此條為上假熱下真寒無非為半夏散之可用耳殊不思半夏之辛燥桂枝之辛溫豈是咽喉能容之物並非少陰家藥況文客寒他證何可以此為治亦非上假熱下真寒可斷少陰病下利白通湯主之少陰主水少陰客寒不能制水故自利也白通湯溫里散寒亮宸此下利為寒甚於里非姜附不能回陽使周身之氣得復也然比通脈四逆稍輕以無厥逆故耳觀子少陰下利多主四逆此主白通湯蓋下利別無他證與下條脈微總無極陰之象陰極者陽必上越雖未見煩嘔類而格陽在外必然矣主白通湯迎而奪之若遲投能兔第三證之服湯反甚乎少陰病下利脈微者與白通湯利不止厥迎無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生少陰病下利脈微為寒極陰勝與白通湯復陽散寒服湯利不止厥逆無脈乾嘔煩者寒氣太甚內為拒格陽氣逆亂也與白通湯加豬膽汁以和之內經曰逆而從之從而逆之又曰逆者正治從者反治此之謂也服湯脈暴出者正氣因發泄而脫也故死脈微續者陽氣漸復也故生亮宸下利脈微寒極陰勝白通湯復陽散寒利當止矣反不止者由裡寒外格溫藥不得下行故致無脈厥逆乾嘔而煩也加人尿之鹹寒膽汁之苦寒從治以調之也脈暴出者無根之氣一發而盡故死微續者有根之氣以漸而回故生矣觀子既以白通通陽氣宜若可和矣反劇者欲導飛越之陽引之使下而拒格之患難破也不止則利益增無脈則重微厥逆者陰之轉深嘔煩者無根之甚是陰愈極而陽愈爭矣此惟佐以膽汁人尿乃少陰本經之物從其性而誘之則格越之患可除失位之陰火悉下而姜附方可施其戰勝之力脈暴出者陽已絕而難追也脈微續者陽猶有根而可徐復也一死一生判然矣健按少陰下利脈微陰邪內盛而陽氣將脫之診宜救陽退陰正治而何從治為哉既服白通不差反劇而復加膽尿其義何居諸家以為能導格越之陽使下未敢信也文稱厥逆無脈豈是陰盛格陽明系純寒陰極下竭津液而陰亡陽欲上脫而煩嘔奚可認為格陽若施鹹寒引誘必致寒滑下脫則厥不能回脈不能復矣惟人參附子理中湯保其胃氣生津回陽庶可獲生也少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之少陰二三日則邪氣猶淺至四五日邪氣己深腎主水腎病不能制水水飲停為水氣腹痛者寒濕內甚也四肢沉重疼痛寒濕外甚也小便不利自下利者濕勝而水穀不別也內經曰濕勝則濡泄與真武湯益陽氣散寒濕亮宸腹痛四肢疼痛者裡寒而表亦寒也小便不利而四肢沉重者水也水停則小便不利水滯於經陽氣不行故沉重水寒相搏故下利茯苓生薑利水而行飲白朮壯脾而燥濕芍藥以治腹痛附子有斬關奪命之能去寒止利又能行四肢而治沉重不用幹姜者雖寒而兼濕四肢不逆脈亦不微視白通四逆為輕耳觀子此與豬苓湯證俱屬挾飲但前證由渴飲外得傳邪不解故入滑石於利水藥中而以阿膠養經氣此證由腎寒在內有水不治侵於經絡故入生薑於行水藥中而以附子壯經氣之陽則寒濕蠲而脾腎悉強矣少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之下利清穀手足厥逆脈微欲絕為裡寒身熱而不惡寒面赤色為外熱此陰甚於內格陽於外不相通也與通脈四逆湯散陰通陽亮宸下利清穀謂水穀不化而出清冷甚於里也手足厥逆脈微欲絕則寒極陰盛而陽氣將脫矣然格陽於外外熱反不惡寒若藥少力輕則陽外脫而死是以此方附子用生者大者取其猛烈之氣追復散失之陽也乾薑四逆湯用兩半而此倍之附子得乾薑而益烈蓋非急溫之恐其絕去耳四逆類皆不用參朮者以寒甚於里陽氣欲絕惟大辛熱之劑乃可回陽而散寒參朮平緩勢力不及譬如寇賊方盛戡定禍亂非健將無功豈雍雍衽席可坐理哉故此方之參用於利止之後以通脈也觀子少陰病有但陰盛者有陰盛格陽者但陰盛者附子四逆等治之是已格陽者必白通通脈四逆治之何也蓋格拒格不相入也又日隔陽陰陽間隔欲離絕也又曰戴陽浮於上部上部如戴也夫真寒入里之證正氣未有不虛陰氣未有不盛者然其劇不過陽愈微陰愈盛耳何為外反熱不惡寒而面赤咽痛煩嘔燥躁之證並作哉蓋所謂陽者腎中之真陽生生之本也即坎卦中畫水中之火亦曰龍雷是陰火也又水木同源惟房勞腎虛之後復冷飲所傷或涼藥所誤則失守之虛焰必棄此窟宅而騰越於外是陰但深處於內而陽反上客諸表矣此而欲以熱劑正投求勝於陰彼偏極之氣必扞格而不容未能除在裡之寒而入咽之際客陽且一熾而盡矣故必輔以蔥白膽汁人尿及熱藥冷服之法則不獨熱因寒用無冷熱相激之虞而先寒以除上熱後熱以濟下寒情且不違而致大益無根失守之物有不導之歸元乎後賢立法曰破陰蓋破者亦去其扞格之一法耳然其不同於白通加膽汁證者較之上證其熾於陽者轉盛則其沉於陰者轉深倍姜附則非白通之可勝任去膽汁人尿似嫌寒藥之力減而但以冷服之法挽垂絕之狂焰此通脈四逆不為不重於白通之證也健按此條方是陰盛格陽諸注詳切而通脈四逆之劑在脈微欲絕四字理當用之其餘病勢雖未盡對故令冷服亦恐有礙耳細審之確是白通加膽尿證也通陽澈陰彼善於此前證無外熱不惡寒面赤咽痛等而為格陽實悖經旨矣故曰非白通加膽尿所宜而此證始為對病之劑能悟及此則傷寒救陰之道思過半矣他若後人破陰之法不但金石難用顧名思義大謬不然必有自貽伊戚之悔故於變通方中凡諸猛悍之劑但存其名不載其藥恐愚者效顰致害耳少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之四逆者四肢不溫也傷寒邪在三陽則手足必熱傳到太陰則手足自溫至少陰則邪熱漸深故四肢逆而不溫也及至厥陰則手足厥冷又甚於逆矣與四逆散以散傳陰之熱健按此條病證不一主以四逆散恐未悉中病情須忝加減之法乃能奏效少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之下利不渴者裡寒也此下利嘔渴非裡寒心煩不得眠知協熱也與豬苓湯滲泄小便分利水穀經曰複利其小便此之謂歟復庵自利而渴者豬苓湯能利腎中熱也不愈則當自大便去之方用大承氣或只用小承氣或且進白頭翁湯以上治法蓋為陰中涵陽者也亮宸此治少陰經中有熱挾水而下利者也三苓行水止利滑石導水而兼協熱阿膠養陰益血治煩而得眠也觀子下利則邪並於下矣其嘔而且咳何也蓋至六七日渴而心煩不眠則傳邪之上客者已盛渴則必恣飲飲多必停水是邪熱既不能解而水言之證復作也三苓以行在經之水阿肢滑石以除少陰之熱庶上下參錯之邪悉去矣熱邪傳陷之下利非陰寒吐利並作之比何由得嘔凡先嘔後渴者邪欲解先渴後嘔者多為水停況有水寒射肺為咳之兼察乎以是知復挾飲於內耳嗣真少陰咳而下利嘔渴心煩不眠及厥陰下利欲飲水是皆傳經之邪脈必沉細而數故仲景以黃連滑石等清利之其少陰自利而渴欲吐不吐心煩欲寐是直中陰經之陰邪也脈必沉微故仲景以附子乾薑溫之少陰病得之二三日口燥咽乾者急下之宜大承氣湯傷寒傳經五六日邪傳少陰則口燥舌乾而渴為邪漸深也今少陰病二三日邪氣未深之時便作口渴咽乾者是邪熱已甚腎水乾也急與大承氣下之以全腎若躁則死腎水乾故也健曰此邪入少陰之熱證急須下之少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少陰腎水也青肝色也自利青色為肝邪乘腎難經曰從前來者為實邪腎蘊實邪必心下痛口乾燥也與大承氣湯以下實邪健曰邪入少陰則腎實乘子而肝反上凌其母同歸入腑故心下必痛是肝木犯胃也故下利青色急下以去其邪利清水者蓋旁流耳少陰病六七日腹脹不大便者急下之宜大承氣湯此少陰入腑也六七日少陰之邪入腑之時陽明內熱壅甚腹滿不大便也陽明病土勝腎水則干急與大承氣下之以救腎水兼善或云承氣湯陽明下藥今少陰病亦用何也蓋胃為水穀之海主養四旁有病皆能傳入之其胃土燥則腎水乾以二三日則口燥咽乾是熱之深傳之速也故曰急下以全腎水夫土實則水凌謂水穀不相混故自利清水而口乾燥此胃土實熱所致也下利色青青肝也乃肝邪傳腎緣腎之經從肺出絡心注胸中由是而心下痛故急下之以去實熱逐腎邪其六七日腹脹不大便以入腑之邪壅塞其胃土土勝則水涸故急下之逐胃熱滋腎水益陽明與少陰皆有急下之條然證不同其入腑之理則一是以皆用大承氣也亮宸少陰多屬寒證然有邪在本經即化裡熱為陰中涵陽者有自陽經傳入少陰郁深熱深而成傳邪者腎主五液脈絡舌本廉泉者津液之道也今二三日即口燥咽乾是熱極而腎水欲竭非急下之無生理矣故大承氣救將絕之腎水第二三證皆少陰化熱入腑之證純清水與清穀不同謂絕無糟粕而純水蓋內已結實故所下止水青者肝之色實邪也心下痛則已結於胃腑口乾燥則津液將竭矣腹滿不大便者陽明裡實之證然曰少陰病自少陰傳入之耳三證皆曰急下者腎為陰中之少陰熱氣搏之則陰立竭不若陽明富於水穀猶能畜熱也健曰此傳經入少陰之下證也少陰病脈沉者急溫之四逆湯既吐且利小便複利而大汗出下利清穀內寒外熱脈微欲絕者不云急溫此少陰脈沉而云急溫者彼雖寒甚然而證已形現乎外治之則有成法此初起脈沉未有形證不知邪氣之將發何病故急與四逆溫之觀子傷寒以陽為主今見陰脈為死候少陰之證無論日數淺深但見脈沉則陽氣已微陰寒獨盛不問其何證而皆急與溫之進四逆類猶恐不及若濡遲其與必致後時矣陶氏內寒已甚陽和之氣欲絕故急溫之健曰此陰證而得陰脈之危候也少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯傷寒表邪傳裡至於少陰少陰之脈注胸中邪既留於胸中而不散則陽氣不得宣發於外是以手足寒脈弦遲此是胸中實不可下而當吐其膈上有寒飲亦使人心中溫溫而手足寒吐則物出嘔則物不出吐與嘔有別焉胸中實則吐而物出若膈上有寒飲但乾嘔而不吐也此不可吐可與四逆湯以溫其膈觀子此從嘔吐中以辨證之孰為痰實孰為陰寒分三段看至復不能吐是原所得之證如此飲食入口即吐者胃虛不能納穀也雖不飲食亦溫溫欲吐不吐若此者邪其有二焉至當吐之言始得脈弦遲者雖手足寒未可便為陰寒也凡痰實上聚者多吐而復不能吐其脈弦者痰也痰則胸中實非下證也其在上者因而越之非吐奚宜至四逆湯證又辨有痰嘔而非痰結者矣曰乾嘔則與四逆迥殊曰膈上寒飲證近吐涎沫此則大寒在內非急溫之他證且作與四逆湯其可緩乎健按入口則吐欲吐不能吐有三義焉觀子言之詳矣吐與嘔成氏注已分別但此皆寒中陰經初起之病須看脈弦遲三字則不可認誤為傳邪入陰之證而概與四逆少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之脈微為亡陽澀為亡血下利嘔而汗出亡陽亡血也津液不足里有虛寒必數更衣反少者溫其上以助其陽也灸之以消其陰觀子汗出嘔而利脈陰陽俱虛利必不止利反少者陽下竭而陰漸微則與上條皆陰病得陽之候也灸而溫其上則陷下之陽可復而余陰消矣健按下利上嘔而兼汗出得微澀之脈此陰陽兩傷氣血俱病曰當溫其上而無方灸之而無穴亦闕文也竊以為當調其脾胃宜姜附理中治之則安辨厥陰病脈證治第十二厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止邪傳厥陰則熱已深也邪自太陽傳至太陰則腹滿而嗌乾未成渴也邪至少陰者口燥舌乾而渴未成消也至厥陰成消渴者熱甚能消水故也欲水多而小便少者謂之消渴木生火肝氣通心厥陰客熱氣上撞心心中疼熱傷寒六七日厥陰受病之時為傳經盡則當入腑胃虛客熱飢不欲食蛔去胃中無食則動聞食嗅而出得食吐蛔此熱在厥陰也若使下之虛其胃氣厥陰木邪相乘必吐下不止卿子素問陰證三條皆指傳邪故云已滿三日可下而已仲景三陰首條皆言病氣所謂傷寒本自寒下也太陰少陰易明唯厥陰條種種似熱故成氏注為熱已深不知太陽篇中微熱消渴者五苓散則桂術也又氣上衝胸身為振振搖則大虛也厥陰寒疵亦氣上衝心又胭中陽氣微心中飢而煩平脈篇云氣微者心內飢飢而不欲食也又胃中冷則吐蛔脾胃論虛勞則熱氣熏胸中又雜病心中疼熱多成膈氣宜吳茱萸湯蓋皆以不能化熱成陰玩下之利不止一句爽然矣成注未渴而渴消渴分淺深故云渴而至消為熱甚試思少陰渴本文云虛故引水自救何嘗較大陰不渴為寢熱耶嘗見厥陰消渴數證舌盡紅赤厥陰脈微渴甚服白虎黃連等湯皆不救亮宸此寒邪直傷厥陰之證也凡熱消津液則渴陰寒不當有渴今渴至於消渴之極矣不知厥陰者陰之盡寒氣閉極陽氣不行水液不得上達故反見熱化而消渴視少陰為甚也觀夫水冰地拆之時則水泉竭冬至一陽生則水泉動略可見矣氣上撞心心中疼熱者肝繫上通於心木喜上達肝經有寒隨繫上沖故心中疼也心主人而氣熱肝中寒上凌於心格心之陽極而外燔故病寒反熱熱者假象而寒者真氣也內經太陽寒水司天之年寒氣下臨心氣上從心煩熱嗌乾善渴又曰甚則心痛此心受寒為渴為熱為疼之明驗矣飢而不欲食者經曰胃中熱則消穀善飢今飢而不能消穀以胃中虛本邪相乘故蟲動而求助於食實則裡寒不能消穀也經曰氣微者心內飢飢而虛滿不能食也食則吐蛔者經曰胃中冷則吐蛔又本篇云臟寒蛔上入膈故煩則吐蛔為冷明矣成氏以此候皆注為熱證不究渴與疼熱飢之故不思少陰之渴仲景已明言其虛故引水自救獨厥陰而不然邪吐蛔一證已明言胃冷臟寒豈疼熱與飢非寒格反見熱化耶至其熱搏厥陰仲景已明言可下而已何又言下之利不止豈非以虛寒故耶良以聊攝將內經傳邪之熱注陰自病之寒故率多牽合其於太陰腹滿自利而痛既注為傳經之邪又何怪此條字面皆似熱證而不為牽合耶幸而少陰之渴仲景註明不然亦萬古長夜矣觀子厥陰為六經最下之地寒邪至此可為極深其反見諸熱證者蓋龍雷陰火出於其經所謂火生於木木藏烽焰肝陰既不足肝陽必有餘內虛而陰寒得以傷之未有不逼其無根之焰上越所以真寒為本假熱為標勢每相同也曰消渴者消耗也飲多而能耗邪深於少陰故渴則甚於引水自救也心中疼者木火通氣厥氣上乘於心也曰氣上撞心為假熱之上浮明甚若傳邪深但熱毒結聚不解耳必不至客陽之騰逞也飢者浮熱所擾也不欲食食則吐蛔裡寒灼然矣然此極似陽邪內傳之狀而非然者若傳厥陰邪深熱久未有不入腑而先下證哉何下之反不止蓋誤下利故不止益見其里有真寒也此猶是邪傷於經氣而病故本寒而復挾不定之假熱若純臟病則但見厥逆下利涎沫面青諸證矣以是知邪干經氣而病雖三陰亦未有不化熱者也健按此厥陰傷寒為病之證成氏誤注傳邪諸家辨之蓋詳細審病勢皆內真寒而外假熱明甚其傳邪之證見於下條而此無治法亦闕文耳可與烏梅丸溫臟安蛔而渴吐下利皆效厥陰中風脈微浮為欲愈不浮為未愈陰病見陽脈者生浮者陽也厥陰中風脈微浮為邪氣還表向汗之時故云欲愈厥陰病欲解時從醜至卯上厥陰木王於卯醜寅向王故為欲解時厥陰病渴欲飲水者少少與之愈邪至厥陰為傳經盡欲汗之時渴欲得水者少少與之胃氣得潤則愈諸四逆厥者不可下之虛家亦然四逆者四肢不溫也厥者手足冷也皆陽氣少而陰氣多故不可下虛家亦然下之是為重虛玉函曰虛者十補不一瀉之觀子四肢諸陽之本陽氣衰甚故手足為之厥冷厥應下之者傳邪入腑陽極似陰之熱厥也若真陽一虛陰進而長其可同於裡實者之治乎曰諸四逆厥者見厥雖有但手足冷與四肢通冷之殊總為陰盛陽衰不可妄下也寒則未有不虛及虛家之不可誤攻亦然耳傷寒先厥後發熱而利者必自止見厥複利陰氣勝則厥逆而利陽氣復則發熱利必自止見厥則陰氣還勝而複利兼善三陰傷寒太陰為始則手足溫少陰則手足清厥陰則手足厥逆然病至厥陰乃陰之極也故反有發熱之證蓋陽極則陰生陰極則陽生此陰陽相引必然之理也易云窮則變者至極之謂也陽至極而生陰故陽病有厥冷之證陰至極而生陽則厥逆者有發熱之條言厥深熱亦深者乃事之極而變之常經曰亢則害承乃制也觀子陰既極有陽復生之理故皆得反發熱熱勝厥者病愈利止厥勝熱者病迸利作也健曰先厥後熱而利者當涼瀉見厥複利者當溫解也傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱五日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也始發熱邪在表也至六日邪傳厥陰陰氣勝者作厥而利厥反九日陰寒氣多當不能食而反能食者恐為除中除去也中胃氣也言邪氣太甚除去胃氣胃欲引食自救故暴能食此欲勝也食以索餅試之若胃氣絕得面則必發熱若不發熱者胃氣尚在也恐是寒極變熱因暴熱來而復去使之能食非除中也要略曰病人素不能食而反暴思之必發熱後三日脈之其熱續在者陽氣勝也期之旦日夜半愈若旦日不愈後三日脈數而熱不罷者為熱氣有餘必發癰膿也經曰脈數不時則生惡瘡觀子此節亦分四段看至恐為除中為一段言熱止六日厥反九日者陰寒既勝必厥且利厥利寒勝不能食反能食者恐為除中證也除者盡也無根之客熱索食以自救其本氣已垂盡也至復去也為一段言但食以索餅而內不發客熱者則胃氣復而思食亦未可知胃氣猶在必愈矣然恐暴熱來而復去人不覺不免為客熱除中也至期之旦日夜半愈又一段言前證由厥多熱少故危設後三日俱發熱者則厥雖九日並前熱亦九日矣厥不能勝熱非旦日即夜半必愈也後三日以下一段止續熱三日為厥熱相半若三日後或更發熱不罷其脈且數者則熱氣又太過矣肝主藏血熱氣留積不解發為癰膿者有之傷寒脈遲六七日而反與黃芩湯澈其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死傷寒脈遲六七日為寒氣已深反與黃芩湯寒藥兩寒相搏腹中當冷冷不消穀則不能食反能食者除中也四時皆以冒氣為本胃氣已絕故云必死觀子上證止由厥利之寒而得非有誤治此為醫壞而然陰寒既極應不能食反能食者政為厥陰內藏陰火其欲絕之際偏能為殺穀之邪耳彼不悟此陰極涵陽之臟而於消渴疼熱戴陽諸證猶作真火治之其不為黃芩湯之除熱者幾希健按傷寒發熱為陽厥利為陰既厥且利當不能食反能食者乃為除中譬如盜入門庭先劫貲財之意前證三日後脈之熱續者胃氣尚在期旦日夜半愈猶守護不失而盜自退也若脈更數而不罷為客熱有餘厥陰藏血之臟熱瘀於血必發癰膿也此條脈遲六七日陰寒已甚即有微熱不當以寒藥澈之反能食者蓋迴光返照之象日必死矣凡診傷寒初則原有舍脈從證舍證從脈之法至六七日厥陰陰盡之期而見陰極之脈投寒則誤矣傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹傷寒先厥而利陰寒氣勝也寒極變熱後發熱下利必自止而反汗出咽中痛其喉為痹者熱氣上行也發熱無汗而利必自止利不止必便膿血者熱氣下行也熱氣下而不上其喉不痹也宇泰厥而利發熱則利必止反汗出者亡陽也咽中痛熱上衝也亡陽則陰獨復會於熱則陰陽結而為喉痹也內經曰一陰一陽結為喉痹是也觀子此節亦分三段看至必自止為一證言先厥則寒甚為下利後發熱則陰極得陽故利止至其喉為痹是一證言亦有利不止而反汗出咽痛者汗出則亡陽咽痛則熱客於上是陽欲復而反虛陽妄越利無由止也至必便膿血又一證言發熱若無汗者利必止然亦有利不止而反便膿血者此熱氣大於於下挾熱遂利既非初厥純陰下利之比亦非陽虛格越於上之謂蓋熱氣下出者可治熱氣上浮者最重二者較之喉痹重於便膿血也健曰厥陰與少陽為表裡其脈挾咽熱極於內寒鬱於外發為喉痹當辛涼開豁以柴薄甘桔牛蒡殭蠶黃芩石膏射干豆根以解之不可投辛溫香燥之藥便膿血者合白頭翁湯傷寒一二日至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤前厥後發熱者寒極生熱也前熱後發厥者陽氣內陷也厥深熱深厥微熱微隨陽氣陷之淺深也熱之伏深必須下去之反發汗者引熱上行必口傷爛赤內經曰火氣內發上為口糜吳氏傷寒一二日至四五日厥者必發熱是傳經之邪前熱後厥者亦傳經之邪當以厥之微甚辨熱之淺深若厥深入腑而實者須下去之若反發汗則胃中津液愈燥而熱上騰故為口糜爛赤經云諸四逆者不可下此云應下最宜詳審先賢謂熱厥手足雖厥冷而或有溫時雖逆冷而手足心必暖戴院使又以指甲之冷暖別之寒熱二厥臨病之工慎之觀子仲景文字多引而不發欲人思而自悟此節是言先熱後厥之為熱厥也當看一二日至四五日發熱而厥者便易明是非一病便厥之寒厥比也故曰必發熱言必發熱在前也下即申明之曰前熱者後必厥見熱極必厥也又曰熱深者厥亦深熱微者厥亦微見厥之中復當分淺深微甚之治也夫邪傳熱入非結聚於胃氣血不通陰陽否隔何由得厥厥則肝極移克胃土非以承氣奪其壅結何由得生故厥應下之然不言湯治而惟誤汗後證詳之者蓋欲人即此悟彼之意也第傷寒傳至厥陰鮮不為危證矣何以故一舌卷囊縮而煩滿一熱極而厥二者皆入肝急下之證耳然止言其端而無正文以明達其旨終在殘缺之列耳厥微熱微四逆散厥深熱深大承氣健曰此屬傳經熱邪迫之而陰氣衰故厥內經曰陰氣衰於下則為熱厥觀子論精治當傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈陰勝則厥陽勝則熱先厥五日為陰勝至六日陽復勝熱亦五日後復厥者陰復勝若不厥為陽全勝故自愈經曰發熱四日厥反三日復熱四日厥少熱多其病為愈健曰此是中經寒邪入於厥陰為至陰之地陽氣衰不能發越故厥內經曰陽氣衰於下則為寒厥是也凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也手之三陰三陽相接於手十指足之三陰三陽相接於足十指陽氣內陷陽不與陰相接故手足為之厥冷也四逆者四肢逆而不溫也與厥相似而非也經曰諸四逆厥者不可下是四逆與厥異也厥者冷也甚於四逆也經曰陰陽氣不相順接便為厥厥者手足逆冷謂陽氣內陷熱氣逆伏而手足為之冷也仁齋厥者逆也經言陰陽之氣不相順接而四肢為之逆冷然曰厥逆者手足冷而四肢溫也四逆者四肢手足俱冷也凡有手足冷者便當早察寒熱虛實而治之毋致厥冷之深履霜堅冰雖欲治之已後時矣傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅圓主之又主久利方臟厥者死陽氣絕也蛔厥雖厥而煩吐蛔已則靜不若臟厥而躁無暫安時也病人臟寒胃虛蛔動上膈聞食臭出因而吐蛔與烏梅圓溫臟安蛔仁齋蛔厥者其人吐蛔而手足冷也故為臟寒胃中虛冷輕者吐小蟲重者吐長蟲或舌燥口乾常欲冷飲浸不欲咽蛔上煩躁昏亂欲死兩手脈沉遲足冷至膝甚者連蛔並屎俱出大便閉而不行此證雖凶多可救治宜加味理中安蛔飲及烏梅丸治之臟厥可金液丹四逆湯救之亮宸蛔厥與臟厥有辨脈微厥逆膚冷躁而無暫安時此陽氣將脫臟氣欲絕而爭故臟厥為死證若蛔厥者臟氣虛寒蛔不安位而動臟氣虛則蛔求食而出是以其證靜而復時煩當上膈則煩過時則止及聞食臭則又煩而嘔蓋以蛔動而煩非臟絕而煩故有生理也所以然者厥陰屬木屬風風從蟲風入八日而蟲生又木朽而蟲生此感召自然之理故厥陰寒甚則蟲出也此方用薑附桂枝蜀椒細辛之大辛熱以溫臟氣而治其寒以蟲畏辛也烏梅之酸入肝收厥陰上衝之氣而止其煩以蟲畏酸也人參以扶胃氣當歸以益肝血至連柏之用雖曰蟲得苦則伏亦以厥陰為陰之盡陰極陽生寒極熱生且消渴與瘀熱雖曰陰盛格陽恐薑附椒桂太過而化熱用之以節制也觀子陽煩陰躁煩輕躁重於臟厥言躁於蛔厥言煩已具安危之異矣況煩因蛔動時煩即時止較之無暫安時更不同矣厥陰陰之終寒莫甚焉然陰陽無終窮之理故挾熱之證反雜見且龍雷之火寄於其中是以用方靡不寒熱並施如蛔厥本屬臟寒亦必佐以連柏也健按蛔厥與吐蛔當分別吐蛔而不厥者其證非一有陽明邪熱傷胃者有食滯陽明熱實傷蟲者有風傷於胃而動蛔者有寒客於中而嘔逆者有胃虛失谷而上出者有偏嗜一物生化吐蟲者雖非盡屬傷寒家證然常於傷寒時氣見之須察其脈證舌色分寒熱以安之而終不若厥陰家蛔厥之甚藥當寒熱兼施此雖不比臟厥之危篤然亦陰證之急候有關胃氣之存亡也傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血指頭寒者是厥後熱少也默默不欲食煩躁者邪熱初傳也數日之後小便白色者裡熱去也欲得食為胃氣已和其病為愈厥陰之脈挾胃貫膈布脅肋厥而嘔胸脅滿煩者傳邪之熱甚於里也厥陰肝主血後數日熱不去又不得外泄迫血下行必致便血也宇泰設未欲食宜乾薑甘草湯嘔而胸脅滿者少陽證也少陽與厥陰為表裡邪干其腑故嘔而胸脅煩滿也肝主血故後必便血觀子此言厥微熱微之易愈也分三段看惟厥微故知熱少惟指頭寒故知厥微默默不欲食煩躁者邪欲內傳而尚未深入也此四句為一段乃原初得之證如此數日以下為一段便利色白者厥陰以囊縮為深入本經之邪今小便白而利知厥陰之邪已解也欲食者冒氣漸復而木不侮土故愈若厥以下一段又數日後之一證也厥則甚於指頭寒陰進而長矣嘔而且煩且滿邪深畜於裡矣肝藏血之臟邪不得解能無迫動而便血乎於熱厥言指頭寒於寒厥言手足寒甚者言四逆厥逆淺深自寓於書法亮宸厥陰陰之盡也陰極故有厥逆吐蛔下利嘔逆之證然而陰極陽生天地自然之理故厥極則熱厥多熱少其病為進厥三日熱五日其陽氣復而愈矣然至七八日熱不罷則熱太過又有為癰膿為便膿血為喉痹為吐膿血為熱利下重為熱深厥深者即以吐蛔一證而論本以臟寒蛔上入膈故溫以治之然兼連柏於大溫之中寓微清之意豈非以厥陰陰極陽生寒極熱生又腑為少陽視少陰猶易化熱且肝藏血故多見膿血之證是則與少陰不同者矣健曰不欲食煩躁之時乃肝木侮土雖厥微而邪已入腑當大柴胡微利之或小柴胡合石膏和解以瀉之至厥而嘔煩滿便血則須黃連阿膠合溫膽治之諸家未及於方酌此二法以俟取裁病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也手足厥不結胸者無熱也小腹滿按之痛下焦冷結也吳氏小腹滿俱是熱病惟冷結膀胱一證為寒有手足冷可辨小腹下焦所治當膀胱上口主分別清濁或用真武湯傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者其後必便膿血先熱後厥者陽邪傳裡也發熱為邪氣在表至四日後厥者傳之陰也後三日復傳陽明則復熱厥少則邪微熱多為陽勝其病為愈至七日傳經盡熱除則愈熱不除者為熱氣有餘內搏厥陰之血其後必大便膿血觀子此言厥少熱多之易愈也先熱後厥為邪深入里厥後復熱為邪氣還表況以日數較之厥止三日而熱共八日為陽氣猶勝也故為當愈若熱不止厥陰之邪猶盛也經邪既熱甚為協熱而便膿血矣健按此可與白頭翁湯加石膏紫草治之良傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也傷寒陰勝者先厥至四日邪傳裡重陰必陽卻熱三日七日傳經盡當愈若不愈而復厥者傳作再經至四日則當復熱若不復熱至五日厥不除者陰勝於陽其病進也觀子熱厥者先發熱後厥逆為邪深入里陽極似陰寒厥者一起便厥逆為陽氣衰微陰寒獨勝然寒復有厥極反發熱者正不為邪勝陰極而生陽也前條厥五日熱亦五日陰既未能勝陽至六日熱除則陽終勝陰而愈此條厥多熱少陽為陰勝陰進陽退難治矣然則辨厥之寒熱惟在厥熱之孰先孰後辨寒熱之死生又在厥熱之孰多孰少也厥終不過五日句要玩味發熱大抵以五日為率五日後或熱作或仍厥則生死判然矣傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死傷寒六七日正氣當復邪氣當罷脈浮身熱為欲解若反脈微而厥則陰勝陽也煩躁者陽虛而爭也灸厥陰以復其陽厥不還則陽氣已絕不能復正而死傷寒發熱下利厥逆躁不得臥者死傷寒發熱邪在表也下利厥逆陽氣虛也躁不得臥者病勝臟也故死傷寒發熱下利至甚厥不止者死要略曰六腑氣絕於外者手足寒五臟氣絕於內者利下不禁傷寒發熱為邪所傷臟氣憊壞下利至甚厥不止為臟腑兩絕故死傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也傷寒至七日為邪正相爭之時正勝則生邪勝則死始不下利而暴忽發熱下利汗出不止者邪勝正陽氣脫也故死傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死傷寒五六日邪氣當作裡實之時若不結胸而腹濡者里無熱也脈虛者亡血也復厥者陽氣少也不可下下之為重虛故死玉函曰虛者重瀉真氣乃絕觀子邪入熱深厥深應以下除者非上結陽分之胸必下結陰分之腹今不結胸腹且軟則里無實邪可知其所以五六日復厥者皆由脈虛虛則為亡血血陰也諸厥者皆屬於下凡內虛真氣失守未有不厥者誤下必死矣按諸條多從邪乘而言此復以脈虛血亡原其致厥之本即內經所謂腎虛厥作之旨乎發熱而厥七日下利者為難治發熱而厥邪傳裡也至七日傳經盡則正氣勝邪當汗出而解反下利則邪氣勝裡氣虛則為難治傷寒脈促手足厥逆者可灸之脈促則陽虛不相續厥逆為陽虛不相接灸之以助陽氣三陽曰厥逆為陽虛陽虛二字當作陰勝二字似必差訛觀子雜病脈促為陽盛此脈促非盛也乃陽衰而斷續不勻也灸者急於關元氣海丹田處著火至一二百壯庶可回陽氣於欲絕之際耳全善結促二脈皆脈為邪礙而歇止也灸之吐之所以去其邪耳健曰人之有脈如樹之有根病重而脈有根則生病輕而脈乖異則死其於傷寒殺厲之氣為病急迫易於傳變陰陽寒熱交爭之際全憑脈斷蓋脈以血為榮今得促脈促者數時一止乃寒傷營而熱耗血故數中見歇也手足厥逆者是熱深厥深陰陽阻塞氣血不和也豈是陽虛不相續亦非陰勝不相接全善謂邪礙而脈歇止是矣然非礙也特邪盛而正不勝耳若灸之則以熱濟熱迫其經血妄行又將奈何理宜涼瀉為是如舌上焦黑者直可下也據下條脈滑而厥原稱裡熱而用白虎則此之促更甚於彼之滑不辨可知矣注作陽虛立論誤認促為寒象非大謬乎傷寒脈滑而厥者里有熱也白虎湯主之滑為陽厥氣內陷是裡熱也與白虎湯以散裡熱觀子夫熱厥亦有不同如傳邪入腑秘結不通燥屎在內非下不可者以承氣治之是也若火極似水里有大熱而大腑不秘無燥屎可除者滑則裡熱深厥則邪陷極非以白虎滌其極熱則亢甚之陽何由得陰以濟乎後賢或以黃連解毒湯或以三黃石膏湯皆此意耳健按此注較上條則看滑字太重而看促字太差矣夫滑為陽中之陰滑而厥無逆字其傷於陰者熱尚淺促為陰中之陽促而厥逆傷於陰者其熱已深何前注隨文為可灸以助陽者皆認歇止為陽氣不相續而未悟其熱極傷陰故也內經曰氣主煦之太過為數血主濡之不及為歇數而歇止遂為促脈此當以白虎退陽益陰則彼可以三黃解毒不為過分矣故曰上條注誤文亦誤也於此可見手足厥寒脈細欲絕者當歸四逆湯主之手足厥寒者陽氣外虛不溫四末脈細欲絕陰血內弱脈行不利與當歸四逆湯助陽生陰健曰觀此則知陰血內弱脈細欲絕可見前之脈促乃熱傷陰血之甚者豈可以火灸而復耗其陰血乎若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之茱萸辛熱以散久寒生薑辛溫以行陽氣亮宸四肢諸陽之本由氣暖暢故肢溫脈者血之府由血盛滿故脈充今手足厥寒陽氣少也脈細欲絕者血不足也氣血生於脾胃故以大棗甘草益胃以充其源血藏於肝故以當歸芍藥益肝以裕其流桂枝細辛以散寒而達其陽通草以通其秘以無下利而但氣血不足故不用薑附耳加茱萸者辛熱以散寒生薑辛溫以行陽清酒者取其甘溫而和血又能通陽也大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之大汗出則熱當去熱反不去者亡陽也內拘急下利者寒甚於里也四肢疼厥逆惡寒者寒甚於表也與四逆湯復陽散寒大汗若大下利而厥冷者四逆湯主之大汗若大下利內外雖殊其亡津液損陽氣則一也陽虛陰勝故生厥逆與四逆陽固陰退病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散手足厥冷邪氣內陷也脈緊牢者為實邪氣入腑則脈沉今脈乍緊知邪結在胸為實故心下滿而煩胃中無邪則喜飢以病在胸中雖飢而不能食與瓜蒂散以吐其胸中之邪實傷寒厥而心下悸者宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也要略曰水停心下甚者則悸為水飲內甚先與茯苓甘草湯治其水而後治其厥若先治厥則水飲浸漬入胃必作下利海藏少陰心悸者四逆不可與也心悸火懼水也惟腎欺心故悸也是足經上手經也若與四逆變生惡候矣故先以茯苓甘草湯去其濕心悸全無次以四逆溫之若心悸在不可溫溫之則壞矣仁齋水停心下悸者心屬火而畏水過飲則水氣乘心不安而惕惕動悸也宜茯苓甘草湯主之或五苓散分利亦可傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之傷寒六七日邪傳厥陰之時大下之後下焦氣虛陽氣內陷寸脈沉而遲手足厥逆下部脈不至厥陰之脈貫膈上注肺循喉嚨邪在厥陰隨經射肺因亡津液遂成肺痿咽喉不利而吐膿血也要略曰肺痿之病從何得之彼快藥下利重亡津液故得之若泄利不止者為表裡大虛故云難治與麻黃升麻湯以調肝肺之氣士材此肝家雷火爍金若泄利不止又絕肺金之源故云難治亮宸此證止言六七日不言表裡意亦如少陰帶表宜以溫藥兼麻黃汗之者今妄為攻下裡氣大虛且所以寸脈沉遲尺脈不至泄利不止手足厥逆見厥陰裡寒之證也然下寒而表仍失汗邪陷於肺鬱而化熱以寒藥治上則甚厥陰之寒故曰難治此方兼寒溫補瀉以失汗而成肺熱非涼不除非汗不散故黃芩石膏知母之寒以清肺熱天冬於清肅之中又兼滋養所以保肺也表邪閉郁用麻黃以開發之妄下則中氣下陷用升麻以升提之而又可以解熱所謂火鬱發之二麻是也歸芍益厥陰之榮而調其膿血葳蕤治風熱而榮筋更資潤肺之功薑桂回厥逆而止泄且藉其溫中之力苓朮甘草用以補虛由是表氣足肺氣清寒熱去胃和脈生而吐膿血下利之證有不除者哉此仲景制方之妙秘也觸類而長之可以應無窮之變矣健按此節因大下之後正氣內虛故寸脈沉遲而手足厥逆然邪從內陷熱毒上干致咽喉不利吐膿血而利不止乃上盛下虛明矣盛者邪氣盛虛者正氣奪故為難治亮宸細繹方劑之妙竊以為方劑之亂莫過於此既邪毒結於咽喉則肺胃之熱應清肺胃協熱勢必下利表裡寒熱之藥辛溫酸苦之味混合而施能無偏弊者乎蓋咽喉不利唾膿血證未嘗有沉遲之脈因其失表誤下故耳欲究其內陷之邪在疏其失表之汗惟升麻葛根湯為太陰陽明解毒之聖藥何必麻黃薑桂歸芍葳蕤等辛溫滋補之劑錯雜其用而欲求中病為可得乎必非仲景原文明理之士當細審之傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也傷寒四日邪氣傳裡之時腹中痛轉氣下趨少腹者裡虛遇寒寒氣不行欲作自利也傷寒本自寒下醫復吐之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之傷寒邪自傳表為本自寒下醫反吐之損傷正氣內為格拒經曰格則吐逆食入即吐謂之寒格則重虛而死是更逆吐下也與乾薑黃連黃芩人參湯以通寒格宇泰按本自寒下恐是本自吐下玩復字可見上寒則吐下寒則利胃寒者不宜吐醫反吐之則傷胃氣遂成寒格下文文氣不貫當有闕文卿子本自寒下如少陽一條邪高痛下所謂邪正分爭蓋本為寒而邪為熱素問云風寒在下燥熱在上亮宸此治上熱下寒之劑也傷寒本自寒下謂下氣本屬虛寒法當溫下以散上乃妄吐之則表虛矣妄下之則裡虛矣夫里既虛則表熱乘虛入於上焦下寒上熱咽為格拒故吐逆也若更吐且下則愈逆是以飲食入口即吐王太僕曰食入反出是有火也此正下寒格其上熱之證非寒熱並用不能治之故以乾薑人參溫下焦之虛寒以黃連黃芩清上焦之人熱健按寒下二字可疑宇泰謂應是吐下愚以為此倒裝筆也下寒而上無發熱之文故厥陰家病非可吐之證醫誤吐之致寒反逆上格拒而吐下不止法宜溫中以除上逆之寒安其胃氣則邪自退理中湯為主若食入即吐此因吐滑氣逆不肯即降以陳皮半夏竹茹生薑入理中以止之遂可定也未可認為上熱下寒而據前方寒熱並進恐不中病而反害事下利有微熱而渴脈弱者令自愈下利陰寒之候反大熱者逆有微熱而渴裡氣尚溫也經曰諸弱發熱脈弱者陽氣得復也令必自愈下利脈數有微熱汗出令自愈設復緊為未解下利陰病也脈數陽病也陰病見陽脈者生微熱汗出陽氣得通也利必自愈諸緊為寒設復緊陰氣猶勝故云未解下利手足厥冷無脈者灸之不溫若脈不還反微喘者死下利手足厥冷無脈者陰氣獨勝陽氣大虛也灸之陽氣復手足溫而脈還為欲愈若手足不溫脈不還者陽已絕也反微喘者陽氣脫故死少陰負趺陽者為順也少陰腎水趺陽脾土下利為腎邪干脾水不勝土則為微邪故為順也下利寸脈反浮數尺中自澀者必清膿血下利者脈當沉而遲反浮數者里有熱也澀為無血尺中自澀者腸胃血散也隨下利必便膿血清與圊同脈經曰清者廁也下利清穀不可攻表汗出必脹滿下利者脾胃虛也胃為津液之主發汗亡津液則胃氣虛必脹滿觀子汗出解者陽氣還表即從表解也若但清穀者而汗之則脹滿作矣下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖熱不死沉為在裡弦為拘急裡氣不足是主下重大則病進此利未止脈微弱數者邪氣微而陽氣復為自止雖發熱止由陽勝非大逆也觀子三陰下利之證最多仲景以腹滿吐食自利腹痛者為太陰自利不渴者為太陰欲吐不吐煩但寐自利而渴引水便白者為少陰下利不止便膿血為少陰吐利手足逆冷惡寒蜷臥者為少陰下利四逆煩躁者為少陰下利脈微或厥逆無脈乾嘔煩者為少陰下利清穀厥逆脈微欲絕反外熱格陽為少陰消渴吐蛔疼熱下之利不止者為厥陰見厥複利者為厥陰先厥後發熱利應止不止便膿血者為厥陰大汗大下利而厥冷者為厥陰大汗後熱不去內拘急四肢疼下利厥逆惡寒者為厥陰大下後厥逆下部脈不至唾膿血泄利不止者為厥陰厥而悸水漬下利者為厥陰夫三經之證不為不詳矣然同一下利耳何以有如是殊哉蓋嘗論脾胃者水穀之市未有太陰病而水穀猶治者也腎者二便之主禁固之司腎病則裡虛氣寒未有陰寒甚而少陰猶能禁固者也肝者疏泄之司或利得厥或由厥致利未有厥而不寒亦未有寒而不利者也是三者均能為利而致利之由實不同謂之太陰者以其脾胃也謂之少陰者以其寒也謂之厥陰者以其厥也三經之證雖紛然而其要亦概可識矣乃厥陰篇中復有諸下利條何哉考下利未有不本於寒熱者也語其熱則有飲水下重譫語燥矢之證語其寒則有腹脹溫里清穀戴陽之證矣蓋足備前證之缺遺而不名之曰某經其果厥且利之治耶其非厥且利之治耶大抵傷寒本無定法而陰經之利又居其多凡三經所未盡而可資變通於無窮者則悉出此所以或但言傷寒更不言厥陰病或但言下利並不言傷寒歟下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下利清穀脈沉而遲里有寒也面少赤身有微熱表未解也病人微厥針經曰下虛則厥表欲解臨汗時以里先虛必鬱冒然後汗出而解也觀子同屬裡寒外熱之證何以此獨汗出而解蓋鬱冒則陽氣猶得還表故雖清穀於前微厥於後不難痊也下利脈數而渴者令自愈設不差必清膿血以有熱故也經曰脈數不解而下不止必挾熱便膿血也下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死下利後脈絕手足厥冷無陽也晬時周時也周時厥愈脈出為陽氣復則生若手足不溫脈不還者為陽氣絕則死傷寒下利日十餘行脈反實者死下利者脈虛也脈當微弱反實者病勝臟也故死難經曰脈不應病病不應脈是為死證下利清穀裡寒外熱汗出而厥者通脈四逆湯主之下利清穀為裡寒身熱不解為外熱汗出陽氣通行於外則不當厥其汗出而厥者陽氣大虛也與通脈四逆湯以固陽氣亮宸此證利與少陰同但多汗出耳汗出者亡陽也厥與逆冷同文義似甚於不溫者蓋冷甚不溫而厥陰深於少陰耳觀子裡寒不減上證而增汗出於厥則亡陽而陰益盛矣主通脈四逆豈非並治其格陽乎熱利下重者白頭翁湯主之利則津液少熱則傷氣氣虛下利致後重也與白頭翁湯散熱厚腸下利腹脹滿身體疼痛者先溫其里乃攻其表溫里四逆湯攻表桂枝湯下利腹脹滿者里有虛寒先與四逆湯溫里身疼痛為表未解利止里和與桂枝湯攻表下利慾飲水者以有熱故也白頭翁湯主之自利不渴為臟寒與四逆湯溫其臟下利飲水為有熱與白頭翁湯以涼中天益少陰自利而渴下焦虛寒而用四逆湯恐不可以渴不渴分寒熱也當以小便黃白別之耳亮宸下利本屬寒證然有乘下焦腸胃澀故令利而下重下利飲湯則為寒今欲飲水則亦熱也四味皆苦寒之劑裡熱清而利與後重去矣下利譫語者有燥屎也宜小承氣湯經曰實則譫語有燥屎為胃實下利為腸虛與小承氣湯以下燥屎亮宸下利原為陰寒今下利而譫語則厥陰化熱入於胃腑故宜下之去其實熱而利自止也又傷寒先熱後必厥厥深者熱亦深厥亦下之仲景雖未明言然必須此湯矣叔微有人病傷寒下利身熱神昏多困譫語不得眠或見下利譫語為陰虛曰此小承氣證眾駭曰下利而服小承氣仲景之法乎曰仲景之法也仲景云下利而譫語者有燥屎也宜小承氣湯素問曰微者逆之甚者從之逆者正治從者反治從少從多是其事矣帝曰何為反治歧伯曰塞因塞用通因通用王冰曰大熱內結注瀉不止熱宜寒涼結復須除以寒下之結散利止則通因通用也正合於此又何疑焉下利後更煩按之心下濡者為虛煩也宜梔子豉湯下利後不煩為欲解若更煩而心下堅者恐為谷煩此煩而心下濡是邪熱乘虛客於胸中為虛煩也與梔子豉湯吐之則愈亮宸此利後餘熱劑也下利煩躁厥冷為大寒今曰下利後則利止矣非虛寒之煩乃遺熱於胸中也按之心下濡雖熱而非實熱用此清其虛煩可也嘔家有膿血者不可治嘔膿儘自愈胃脘有癰則嘔而吐膿血不可治嘔得膿盡嘔自愈觀子此癰膿如前所云熱不罷發癰膿之類也嘔則其邪亦外出矣故不治可愈若胃有癰自當急治豈聽其膿盡之能愈乎嘔而脈弱小便複利身有微熱見厥者難治四逆湯主之嘔而脈弱邪氣傳裡嘔氣上逆而小便當不利小便複利者裡虛也身有微熱見厥者陰勝陽也為難治與四逆湯溫里助陽亮宸嘔而脈弱見厥雖不下利身微熱將必下利矣故用四逆以溫之觀子按手足自溫者系太陰未至於手足寒冷也少陰篇稱手足寒者二手足厥冷者一手足厥逆者一手足逆冷者一稱四逆者二厥逆者一但稱厥者一厥陰篇稱手足厥冷者六手足厥寒者一手足厥逆者一手足逆冷者一稱四逆厥者一厥逆者二厥冷者一但稱厥者十三夫厥者逆也盡也既以厥名經似諸厥冷厥逆之證皆屬之厥陰一經耳乃四逆不治之證既屬之少陰而白通四逆通脈各治厥之湯亦出於少陰一篇何也蓋由腎中真陽先虛故陰邪得以勝之而肢體清厥之形作是證雖以厥陰得名而致病實由少陰故其治反詳於少陰也少陰癸也厥陰乙也乙癸同源水木同治未有肝病而腎不病者故有別證見以厥陰之治治之若但寒而厥者即少陰之治治之而厥陰之病亦不外是也寒厥之治既備於少陰故厥陰之主四逆者雖有三證皆非正厥陰病也然則厥陰雖多於首末諸條之外並不再稱厥陰病者豈非亦具是義歟乾嘔吐涎沫頭痛者吳茱萸湯主之乾嘔吐涎沫者裡寒也頭痛者氣上攻也與吳茱萸溫里散寒亮宸嘔吐涎沫者厥陰之寒上干於胃胃冷故所吐皆清涎冷沫乾嘔者其聲濁而長也三陰不上於頭惟厥陰與督脈會於巔寒氣上衝故頭痛也吳茱萸生薑溫里而止嘔止沫裡寒去而涎濁除則頭痛止矣人參大棗以益胃不使木邪侮所不勝也觀子吐涎沫者厥陰之本證也寒入厥陰而氣內格故乾嘔厥陰寒而無火以安脾胃故涎沫不治厥陰之脈上巔頂邪傷則經氣不利故頭痛吳茱萸善散逆氣祛厥陰本經之寒兼以參薑大棗者脾胃強則肝病不復能移克之也健按嘔而吐涎沫則不當稱乾嘔矣內經云諸逆衝上皆屬於火諸嘔吐酸皆屬於熱此雖非吐酸然亦同是沖逆但乾嘔者為內火上衝吐涎為脾熱所致但頭痛而無惡寒發熱厥逆的系因嘔火升而為火痛明矣何遽注為寒氣上逆既列於厥陰篇中須用溫膽湯止嘔吐而平肝火為妥茱萸辛熱參溫補未必無誤嘔而發熱者小柴胡湯主之經曰嘔而發熱小柴胡證具亮宸乾嘔吐涎沫屬厥陰厥陰本無熱今嘔而發熱則臟病還腑而見少陽之證也是宜小柴胡治之觀子肝膽臟腑相連故厥陰而兼發熱健按傳邪臟病而見入腑者多入腑者入陽明胃腑為實邪而屬下證此萬物總歸於土之義未嘗有還腑之證也既厥陰有還少陽之說則少陰有還太陽之表證矣何異與六日厥陰經盡而言七日復傳太陽之謬同也夫此條與上條乃是少陽篇之遺文耳叔和不之細審誤次於此而諸家又不明辨誤注畫蛇添足何以訓後不得不申明之以俟味道之士參悟而有得焉傷寒大吐大下之極虛復極汗出者以其人外氣怫鬱復與之水以發其汗因得噦所以然者胃中寒冷故也大吐大下胃極虛復極發汗又亡陽氣外邪怫鬱於表則身熱醫與之水以發其汗冒虛得水虛寒相搏而成噦也傷寒噦而腹滿視其前後知何部不利利之則愈噦而腹滿氣上而不得下也視其前後何部有不利者即利之以降其氣前部小便也後部大便也活人前證橘皮乾薑湯半夏生薑湯此證前部不利宜豬苓湯後部不利宜調胃承氣湯
