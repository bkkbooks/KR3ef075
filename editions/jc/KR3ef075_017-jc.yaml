body:
  text: 傷寒直指卷十五名論一傷寒同異安道讀仲景書當求其所以立法之意苟得於此則知其書足以為萬世法而後人莫之能外矣不得其所以立法之意則疑信相雜未免通此而礙彼也鳴呼自仲景以來發明其書者不可勝數然其所以立法之意竟未有表彰以示人者豈求之而不得歟將相循習而不求歟抑有之而未之見歟予雖不敏僭請陳之夫傷於寒有即病者焉有不即病者焉即病者發於所感之時不即病者過時而發於春夏也即病謂之傷寒不即病謂之溫暑夫傷寒溫暑其證雖殊其所受之原則不殊也由其原之不殊故一以傷寒為稱由其證之殊故施治不得相混以所殊而混其治宜其貽禍後人以歸咎於仲景之法而委廢其大半也籲使仲景之法果貽禍後人傷寒論不作可也能知仲景之法不肯貽禍於人傷寒論其可一日缺乎後人乃不自責於己見之未至而歸咎於立法之大賢可謂溺井憾伯益失火怨燧人矣仲景法之祖也後人雖移易無窮終莫能越其矩度由是觀之則其法其方可委廢乎雖然立言垂訓之士猶不免失酌於此彼碌碌者無足誚矣惟夫立言之士形乎著述之間其碌碌者當趑趄猶豫之際得不靡然爭趨簡略之地矣故其法其方委廢大半而不知返日卑日鄙此民生所以無藉而仲景之心所以不能別白矣嗚呼法也方也仲景專為即病之傷寒設不兼為不即病之溫暑設也後人能知此旨則尚恨其法之散失所存不多而莫能御夫粗工妄治之萬變奚可憚煩而委廢之不自覺其非者由乎不得其所以立法之意也世醫往往以治傷寒法治溫暑不過借用之耳非仲景立法之本旨也猶六書假借移易無窮終非造字之初意夫仲景之法天下後世之權衡也姑可惜焉以為他病用豈特可惜以治溫暑而已今人因其可藉以治溫暑遂謂其法通為傷寒溫暑設此非識流而昧源者歟苟不予信請以證之考仲景書三陰經寒證居熱證十之七八彼不即病之溫暑但一於熱耳何由而為寒哉就三陰寒證而詳味之然後知予言之不謬或謂三陰寒證本是雜病為王叔和增入又謂其證之寒因寒藥誤治而致若此者皆非也夫叔和之增入者辨平脈與可汗可下諸篇而已其六經病篇必非叔和所能讚辭也但厥陰經中下利嘔噦諸條卻是叔和因其有厥逆而附並無厥陰同類者亦附之耳至若以藥誤治而成變證則惟太陽為多縱使三陰證亦或有寒藥誤治而變寒者豈如是之眾乎緣後人以仲景書通為傷寒溫暑設遂致溫劑皆疑焉而不敢用韓只和雖覺桂枝湯之難用但謂今昔之世不同然亦未悟仲景書本為即病之傷寒設也且其著微旨一書又純以溫暑作傷寒立論而即病之傷寒反不言及已是捨本徇末全不能窺仲景藩籬又以夏至前胸膈滿悶嘔逆氣塞腸鳴腹痛身體拘急手足逆冷等證視為溫暑謂與仲景三陰寒證脈理同而證不同遂別立溫中法以治觀仲景所敘三陰寒證乃是冬時即病之傷寒故有此證今欲以此求對於春夏溫暑之病不亦惛乎雖然祗和未悟仲景立法本旨又適當溫暑病作之際其為惑也固宜以予推之其胸膈滿悶嘔逆氣塞等證非內傷冷物即不正暴寒所中或過服寒藥所致內外俱傷於寒之病祗和但曰寒而當溫未悉其所以為寒之故能求其故則溫暑本無寒證矣再仲景書雖有陰毒之名然其所敘之證不過面目青身痛如被杖咽喉痛而已並不言陰寒極甚之證況其所治之方亦不過升麻甘草當歸鱉甲而已並不用大溫大熱之藥是知仲景所謂陰毒者非陰寒之病偶感天地惡毒異氣入於陰經故曰陰毒後之論者遂以陰寒極甚之證稱為陰毒乃引仲景所敘病狀並而言之卻用附子散正陽散等以治誤矣竊謂陰寒極甚之證固可名為陰毒然終非仲景所以立名之本意觀後人所敘陰毒與仲景所敘自是兩塗豈可混論朱奉議作活人書累數萬言於仲景傷寒多所發明其即入陰經之寒證諸家不識而奉議識之但惜其亦未知仲景專為即病者立法故其書中每以傷寒溫暑混淪竟無分別況又視傷寒論為全書遂將傳陰熱證與即入陰經寒證合為一說且謂傷寒陽明證宜下少陰證宜溫而於所識即入陰經之見又自相悖矣夫陽明證之宜下者因為邪熱入胃其少陰證之傳經熱邪亦可溫乎況溫暑病之少陰更不可溫也自奉議此說出而蒙害者不少矣逮成無己注傷寒論及明理論具表章名義可謂纖悉無遺然即入陰經之寒證又不及奉議能識況即病立法之本旨乎故止隨文解義而已未嘗明其何由不為熱而為寒也至劉守真出亦以溫暑作傷寒立論而遺即病之傷寒其所處辛涼解散之劑固為昧者有中風傷寒錯治之失而立蓋亦為桂枝麻黃難用之惑也既惑於此則無由悟夫仲景立桂枝麻黃之有所主用桂枝麻黃之有其時也故原病式有曰夏熱用桂枝麻黃類發表須加寒藥不然則熱甚發黃或斑出也殊不知仲景立桂枝麻黃湯本不用於夏熱之時也苟悟夫二湯非溫暑之劑則群疑冰洋矣何也夫寒之初客於表也閉腠理郁陽氣而為熱故非辛溫之藥不能發泄此麻黃湯之所由立也至於風邪傷表反疏腠理而自汗然邪既客表則表之正氣受傷而不流通亦發熱也必以辛甘溫之藥發其邪則邪去而腠理自密矣此桂枝湯之所由立也其所以不加寒藥者蓋由風寒在表又當天令寒冷之時寒無從用後人不知仲景立法之意而有加寒藥之論此未悟其所以然耳若仲景為溫暑立方決不如此必別有法惜其遺佚不傳致使後人紛紜其說若知仲景書專為即病之傷寒作則知桂枝麻黃所以宜用之故除傳經熱證外其直傷陰經與太陽不鬱熱即傳陰經諸寒證皆有所歸著不復疑寒藥誤下而生變矣若乃春夏有惡風惡寒純類乎傷寒證者亦暴中風寒之新病非冬時受傷過時而發者比不然則是溫暑將發復感風寒而動乎久郁之熱遂發溫暑也仲景曰太陽病發熱而渴不惡寒者為溫病觀此則知溫病不當惡寒而當渴其惡寒而不渴者非溫病矣仲景雖不言暑病然暑病即夏至後變為熱病復過一時而加重於溫耳其不惡寒而渴則無異也春夏雖有惡風惡寒表證其桂枝麻黃二湯終難輕用不可泥於發表不遠熱之語須是辛涼解散庶為得宜苟不慎而輕用之誠不免乎狂躁斑黃衄血之變也即或有行桂枝麻黃於春夏而效乃是因其辛甘發散之力偶中於萬一斷不可視為常道而守之今人以敗毒散參蘇飲通解散百解散類不問四時中風傷寒一例施之雖非至正之道較之輕用桂枝麻黃於春夏以致變者則反庶幾然敗毒等若用於春夏亦止治暴中風寒之證而已其冬時受傷過時而發之溫暑亦不宜也用則非徒無益而反害之縱或有效亦是偶然彼冬時傷寒用辛涼發表而或效者亦偶然也凡治病既效之後要明其當然與偶然能明其當然與偶然則精微之地安有不至者乎惟其視偶然為當然所以循非踵弊莫之能悟而病者不幸矣若夫仲景於三陰經每用溫藥正由病之所必須與用之有其時耳若概以三陰寒證視為雜病而外之有負仲景濟人利物之至仁而誤盡後世矣奈何前輩不能明示傷寒溫暑異治之端緒一以寒涼為務而諸溫熱之劑悉在所略以致後學視仲景書欲仗焉而不終決欲棄焉猶以為立法之祖而莫能外然則待為具文甚則束之高閣而謂其法宜於昔而不宜於今噫斯言也然耶否耶能明乎仲景本為即病者設法則桂枝麻黃自然必用諸溫熱劑皆不可無若謂仲景法不獨為即病者設則凡時行寒疫溫瘧風溫等證亦通以傷寒六經諸方治之可乎哉傷寒例曰冬溫之毒與傷寒大異為治不同又曰寒疫與溫及暑病相似但治有殊耳是則溫暑及時行寒疫溫瘧風溫等仲景必別有治法今不見者亡之耳觀其所謂為治不同所謂溫瘧風溫溫毒溫疫脈之變現方治如說豈非其法散亡乎決不可以傷寒六經病諸方通治也夫素問謂人傷於寒則為病熱者言常而不言變也仲景謂或熱或寒而不一者備常與變而弗遺也仲景善言古人之所未言大有功於古人者雖欲偏廢可乎叔和搜採仲景散落之論以成書功莫大矣但惜其以己之說混於仲景論中又以雜脈雜病並載於卷首故使玉石不分主客相亂若先備仲景之言而次附己說明著其名不致見惑於世而累仲景矣昔漢儒收拾殘篇於秦火之餘加以傳注後之議者謂其功過相等叔和亦難免於此之議予嘗欲編類其書以傷寒例居前而六經病次之相類病又次之差後病又次之診察治法治禁治誤病解未解等又次之其雜脈雜病與傷寒有所關者採以附焉與傷寒無相關者則刪之如此則王石有分主客不亂矣然有志未暇姑敘此以俟他日健曰此論反復詳辨專決異同溫暑不與即病之傷寒同論治冬溫時行寒疫溫瘧風溫等更與傷寒不涉而別有治法其說直捷通快是出諸家之上以闢奉議河間之誤為仲景之功臣後學之冰鑑讀者當知其見道透澈傷寒大旨不外於是官止神行無事旁求矣安道嘗讀仲景傷寒論於太陰曰自利不渴者屬太陰臟有寒也當溫之四逆輩於少陰日一二日口中和背惡寒者當灸之附子湯身體痛手足寒骨節痛脈沉者附子湯少陰下利白通湯下利脈微與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯下利清穀裡寒外熱手足厥逆脈微欲絕反不惡寒面赤色或腹痛或乾嘔或咽痛或利止脈不出通脈四逆湯少陰脈沉急溫之四逆湯於厥陰曰手足厥寒脈細欲絕者當歸四逆湯大汗若大下而厥冷者四逆湯仲景之論傷寒三陰自有寒證而宜用溫熱之劑也及讀劉守真書有曰傷寒邪熱在表腑病為陽邪熱在裡臟病為陰妄謂有寒熱陰陽之異誤人久矣寒病有矣非汗病之謂也寒證止為雜病終莫能為汗病且造化津液之氣者乃陽熱之氣非陰寒之所能致也故仲景有四逆湯證是治表熱里和誤以寒藥下之太早表熱入里下利不止及或表熱裡寒自利急以四逆溫里利止里和急解其表也又有四逆證復以承氣下之者是傷寒傳裡直言熱病而不言寒也即言三陰者邪熱在臟在裡以臟與里為陰當下其熱者也素問論傷寒熱證有二皆名曰熱不及於寒兼靈樞諸篇運氣造化之理言之則為熱病誠非寒也觀守真之論則傷寒無問在表在裡與三陽三陰一皆為熱而無或寒者兩說相同其是非之判必有至理存焉由是反復究潔其義而久不能得雖至神疲氣耗不捨置之自謂斯是傷寒大綱領此義不明則千言萬語未足為用況戕賊民生易有極耶意謂成無己注必有發明推而求之然亦止是隨文釋略而已竟不明言何由為熱何由為寒此非其不欲言也蓋止知傷寒皆是傳經故疑六經所傳皆為熱證而執熱無變寒之理遂不敢別白耳以寒為本臟之寒欽抑當熱邪傳裡入深之時反獨見寒而不見熱者且所用溫熱藥能不助傳經之熱邪乎以寒為外邪之寒歟則在三陽已成熱矣豈有傳至三陰而反為寒者哉成氏能潛心於此則必別悟其所以然矣自仲景作傷寒論以來靡不宗之弗遺至異同之論興而漁者走淵樵者走山矣宜乎後人不能決於似是而非之處或謂今世無真傷寒病又或以為今人所病俱是內傷至昧者又謂傷寒論中諸溫藥悉為傳經熱邪而設以三陰經屬陰故也其大謬者又曰論中凡有寒字皆當作熱字看嗚呼末流之弊一至於此於是澄心靜慮以涵泳之一旦劃然若有所悟然亦未敢必其當否也姑試陳之以正有道夫三陽之病其寒邪之在太陽者寒鬱其陽陽不得越而成熱陽雖人身之正氣既鬱則為邪矣用麻黃髮表以逐其寒則脈理通而鬱熱泄得汗則愈苟或不汗熱不外泄則必里入傳陽明傳少陽而或人腑也若夫三陰之病則或寒或熱者何哉蓋寒邪之在人也或在太陽鬱熱以次遞傳而入陰經者或有太陽不傳陽明少陽而便傳三陰經者或有寒邪不從陽經而直傷陰經者或有雖從太陽始而不及鬱熱即入少陰而獨見少陰證者或有自太陽邪入少陰而太陽不能以無傷者或有直傷即入而變寒熱及始寒而終熱者其鬱熱傳陰與寒便變熱者則為熱證其直傷陰經及從太陽即入少陰者則為寒證其太陽不能無傷見少陰脈證而兼太陽標病其始為寒而終變熱故先見寒證而後見熱證此三陰病之所以或寒或熱也能就三陰經諸條玩繹求之理自出矣然其或傳經或直傷或即入或先寒後熱者何耶邪氣卒暴本無定情而傳變不常耳經曰邪之中人也無有常或中於陽或中於陰夫守真絕類離倫之士也豈好為異說以惑人哉由其以溫暑為傷寒而仲景之方每不與溫暑對故略乎溫暑之劑而例寒涼概以傷寒為熱而無寒遂謂仲景四逆湯為寒藥誤下表熱里和之證及為表熱裡寒自利之證而設又謂溫里止利急解其表又謂寒病止為雜病嗟乎仲景傷寒論為中而即病之傷寒作不為不即病之溫暑作故每有三陰之寒證而溫熱之劑所以用也以病則寒以時則寒其用之也固宜後人不知此意愈求愈遠而說愈鑿若知此意則猶疱丁解牛動中款矣且如寒藥誤下而成裡寒者固有不因誤下而自為裡寒者其可謂之必無乎殊不知陰經之見寒證者多蓋由寒邪不由陽經直傷於此與在太陽而不及鬱熱即入於此而致者同也其或因寒藥誤下而致者甚少仲景用諸溫熱之劑何嘗為寒藥誤下而設況表熱裡寒之證乃是寒邪入客於內迫陽於外或虛陽之氣自作外熱之勢非邪熱所為也故仲景於裡寒外熱之證但與溫藥治裡寒而不治外熱則知其所以為治之意矣若果當解其表豈不於裡和之後明言之乎且三陰寒證既是雜病何亦載於傷寒論以惑後人乎其厥陰篇諸條之上又何故以傷寒二字冠之乎夫內經所敘三陰病一於為熱者言其常也仲景所敘三陰病兼乎寒熱者言其變也並行而不相悖耳後人謂傷寒無寒證知常而不知變耳然世之恪守局方好用溫熱劑者反能全於寒證此無他其守由則偏治此則是學者能知三陰固有寒邪所入之證則仲景刨法之本意已瞭然於心目之間而不為他說所奪矣或曰傷寒之病必從陽經鬱熱而傳三陰今子謂直傷陰經即入陰經而為寒證其何據乎予曰據夫仲景耳仲景曰病發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈夫所謂無熱惡寒則知其非陽經鬱熱矣謂發於陰則知其不從陽經傳至矣謂之六日愈則知其不始於太陽而止自陰經發病之日數矣仲景又曰一二日至四五日而厥者必發熱傷寒病厥五日熱亦五日設六日當復厥不厥者自愈傷寒厥四日熱反三日復厥五日其病為進夫得傷寒未為熱即為厥者豈亦由傳經入深之熱邪而致此乎世人有始得病便見諸寒證而無或熱者此則直傷陰經即入陰經者也苟不能究仲景之心但執凡傷於寒則為病熱之說以為治其不夭人之命者幾希矣健按此論三陰經病有寒有熱宜遵仲景無所移易三陽遞傳三陰者為熱宜清宜下直傷即入三陰者屬寒宜溫宜散直傷即直中也三陰寒熱之辨最難藥誤之禍易犯歷代名家不能無惑得安道此篇不但闢河間以傷寒為熱無寒一例寒涼之謬且釋素問之病熱言其常仲景之有寒有熱言其變以病則寒以時則寒是以直傷即入三陰之寒證必以溫熱主治剖別仲景心印明白曉暢喚醒後人無出其右者焉節庵客有問於予曰甚矣傷寒之深奧桂枝麻黃二湯之難用也服之而愈者才一二不愈而變重者常八九仲景立法之聖何其方之難憑有如此哉今人畏而不用以參蘇飲和解散等代之亦未見其當子盍為我言之予曰籲難言也請以經語證之經云冬時嚴寒萬類潛藏君子固密則不傷於寒觸冒之者乃名傷寒其傷於四時之氣皆能為病以傷寒為毒者其殺厲之氣中而即病名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也以此言之傷寒者乃冬時感寒即病之證桂枝麻黃二湯為當時之傷寒設與過時之溫暑無與焉治則不可以混也請略陳之夫春溫夏熱秋涼冬寒者四時之正氣以成生長收藏之用風亦因時之異而成溫涼寒熱也若氣候嚴寒風亦凜冽天道和煦鳳亦溫暖冬時坎水用事天令閉藏水冰地拆風與寒相因而成殺厲之氣人觸冒之腠理鬱塞乃有惡風惡寒之證其餘時月則無此證也仲景知傷寒為殺厲之氣非比他病可緩其言特詳於此書而略於雜病也能因名以求其實則思過半矣不幸此書遺佚頗多晉王叔和得之散亡之餘詮次流傳其功傅矣惜其以己論混經未免穿鑿成無己因之順文註釋並無抉疑正誤之言將冬時傷寒之方通解溫暑疑竇至今未已然溫暑必別有方因散失而無徵耳我朝宋景濂學士嘗嘆傷寒論非全書得其旨哉蓋傷寒之初中人必先入表表者何即足太陽寒水之經也此經行身之後自頭貫脊故有頭疼脊強惡寒之證在他經則無此況此經乃一身之綱維為諸陽之長主氣猶四通八達之衢治之一差其變有不可勝言者故宜此二湯發散表中寒邪經曰辛甘發散為陽也若以此湯通治春溫夏熱之病則誤之甚矣雖受病之原則同然所發之時則異耳曰傷寒發於冬時已聞命矣邪之在表為太陽經也一經而有二湯之分何耶曰在經雖一然有營衛之殊寒邪傷營證見惡寒發熱而無汗脈浮緊蓋浮為在表緊為惡寒當用麻黃湯輕揚之劑發而去之寒邪退則汗出表和而愈矣曰緊脈固為寒矣脈之浮緩者用桂枝湯又何耶曰風邪傷衛衛傷則自汗太陽受風不能護衛腠理疏而汗泄所以脈見浮緩也故宜桂枝辛溫之藥解散風邪腠理閉而汗止表和則愈又有營衛俱傷者復設大青龍湯治之然此藥難用非庸俗得而識也曰溫暑既無方治則將奈何脈證與傷寒有何分別曰溫暑雖殊亦冬時感受寒邪而不即發伏藏身中歷二三時之久天道大變寒化為熱人在氣交之中亦隨天地之氣而化觀仲景以即病之傷寒與過時始病之溫暑時令為病之名各異豈無意治方哉諒必有隨時涼解之法決勿用冬時辛溫之藥也今無其方者散亡之耳經既稱變溫變熱而方亦不容不隨證更變也夫溫病欲出值天驟暖自內達表脈反見於右關不浮緊而微數曰惡寒否乎曰傷寒自冬月風寒而成外有惡風惡寒之證既名為溫則無是矣曰然子之言何據乎曰亦據夫經耳經曰太陽病發熱不惡寒而渴者溫病也不惡寒則病非外來渴則明其自內達表曰春夏之病亦頭疼惡寒脈浮者何也曰此非冬時所受之寒乃感冒時行之氣或溫暑將發又觸暴寒之證雖惡寒脈浮未若冬時之甚法惟辛涼通其內外面解之斷不可用桂麻之劑矣曰溫熱之治與傷寒不同既得聞矣敢問傷寒之在三陽則為熱邪既傳三陰則為陰證法以熱治固其宜也三陰篇以四逆散涼藥以治四逆大承氣湯以治少陰其故何耶嗚呼此蓋叔和以殘缺之經作全書編次將傳經陰證與直中陰經陰證混同立論所以遺禍至今未已姑略陳之蓋風寒之初中人也無常或入於陰或入於陽初無定體非但始太陽而終厥陰也或自太陽始日傳一經六日至厥陰邪氣衰不傳而愈亦有不罷再傳者或有間經而傳者或有傳至二三經而止者或有始終只在一經者或越經而傳者或初入太陽不作鬱熱便入少陰而為陰證者或直中陰經而成真寒證者緣經無明文後人遂有妄治之失若夫自三陽傳次三陰之陰證外雖有厥逆內則為熱邪耳若不發熱四肢便厥冷而惡寒者此直中陰經之寒證也因前人立說之混使後人蒙害者多矣夫太陽受邪行盡三陽氣分傳次三陰血分則熱入深矣表雖厥冷裡熱已甚經云亢則害承乃制熱極反兼寒化也故先熱後厥逆者傳經之陰證也經云厥深熱亦深厥微熱亦微是也宜四逆散承氣湯看微甚而治之如其初病便但寒無熱則直中陰經之真寒證也急宜四逆湯輩以溫之經云發熱惡寒發於陽也無熱惡寒發於陰也尚何疑哉健曰病先熱後厥為傳經陰證病但寒無熱而厥為直中陰證二者判然則寒熱之治分矣又有日傳一經為兩感者傳經未終而死矣病有標本治有逆從豈概論乎曰陰證寒熱之不同亦備聞矣嘗讀劉守真書云傷寒無陰證人傷於寒則為病熱熱病乃汗病也造化津液皆陽氣也遍考靈素諸篇並無寒證陰證乃雜病也叔和誤人之耳守真高明之士亦私淑仲景者而議論之異又何耶曰雖守真之明達蓋因活人書以桂枝麻黃湯通治溫暑之誤而有是說故云天氣溫熱而桂枝湯必加涼藥兔致黃生斑出之患若知此湯為冬時即病之傷寒設不為過時之溫暑設則無此論矣觀其晚年著病機氣宜保命集其中羌活湯辛涼之藥以治非時傷寒足補仲景之遺亡已見其今是昨非之處矣夫仲景之論傷寒合常與變而無遺者所謂道並行而不相悖適相用也此其所以為萬世之準則也客唯而退請著其說於上健曰傷寒之難難莫難於陰證能知傳經陰證為熱之至直中陰證為寒之極虛實寒熱之治毫釐千里俗工不能仰止前賢傾心明哲道其所道無論傷寒罔有不錯苟得潛心力學就此名文亦足一隅三返而頓開茅塞矣質疑嘗考素問之傷寒證治由陽入陰悉言為熱至於仲景則寒熱兼言王安道又以仲景三陰寒證為直中陰分之病夫素問之言熱者主於邪氣在經以為法之常仲景之言寒言熱者主於邪氣在胃以盡法之變推而至於脈證從舍應否之殊足補素問之所未備惜其語淆而未瑩讀之者不復深察但能明於三陽之同於熱而不能無疑於三陰之互現乎寒也以言乎證治之在陽經也如太陽頭痛骨疼惡寒發熱無汗脈浮緊麻黃湯治之膀胱腑熱小便不利五苓散利之陽明身熱目疼鼻乾不臥脈長升麻葛根湯揚之腑實譫語潮熱多汗便閉三承氣下之少陽脅痛耳聾口苦寒熱脈弦柴胡湯和之結胃痞滿畜血諸證則陷胸瀉心抵當等湯除之三陽證之昭明如此至論三陰復有吐利四逆腹滿腹痛譫語便秘煩躁等證則寒熱互現而不專於熱邪若有戾於素問之旨者實則不相悖而反相為用也蓋邪淺而在經者必鬱而為熱此素問之所以主其常也邪深入胃者有熱而復有寒此仲景之所以通其變也何言在經在胃之分也蓋胃氣內實者脾得乾運之機而為之播氣於三陰故熱邪但由陽傳陰侵始於經而非徑入於胃故素問三陰之熱證具焉治宜瀉熱滌實凡仲景三陰之本於熱邪者證治由夫素問也若夫胃氣內虛脾失健運之令邪氣乘虛而入邪既入胃則不再傳經矣胃者猶川瀆之有海也水既注海必不復溢之於川瀆也其虛而未甚者尚能與邪摶而作裡熱之證其虛之甚者不復能勝其熱之傷因之下陷而裡寒之證作矣斯謂但寒無熱其證多危則其氣之欲脫矣故仲景於邪氣在胃而為裡熱之治下之清之則硝黃石膏輩於邪氣在胃而為裡寒之治溫之補之則參朮棗草薑附輩證治皆主乎胃而不分及三陰之經氣至於證兼表裡而跡涉疑似者又審輕重噪標本察虛實而先後緩急之莫不統之以胃焉由自觀之有裡熱之實而為譫語潮熱腹脹便閉脈沉實而數者則宜下如少陰病自利清水色純青心下痛口乾燥宜大承氣厥陰病下利譫語有燥屎宜大承氣之類是也有裡實熱兼頭疼身痛惡寒發熱表證者宜先解後攻如傷寒十三日不解胸脅滿而嘔日晡所潮熱先以小柴胡解外後以柴胡加芒硝下之之類是也有裡實熱證重而表證輕者治宜中外兼解如十餘日熱結在裡復往來寒熱與大柴胡之類是也有里雖熱而未實者治宜清之如煩渴身熱不惡寒脈洪大白虎湯太陽少陽合病自利黃芩湯厥陰下利欲飲水裡熱也白頭翁湯之類是也有裡熱而似寒者亦宜清之傷寒脈滑而厥白虎湯主之類是也有熱上傳心肺者治宜清上少陰二三日心煩不眠黃芩阿膠湯傷寒六七日大下後手足厥咽喉不利唾膿血麻黃升麻湯類是也此皆裡熱之治主乎胃者也表裡寒熱之甚而有嘔吐下利清穀厥冷時腹自痛小便清白脈沉微之屬則宜溫之如自利不渴者屬太陰臟有寒也四逆溫之嘔吐涎沫頭痛者吳茱萸湯主之類也有裡寒而似熱者陰盛格陽也如少陰下利清穀手足厥冷脈微欲絕反不惡寒面赤或口乾咽痛通脈四逆湯主之類也有裡寒而兼虛者宜補中溫中如少陰二三日口中和背惡寒附子湯惡寒脈微複利利止亡血也四逆人參湯類是也有裡寒而兼表證者宜先溫後解如下利腹脹滿身體疼痛先溫其里四逆湯後攻其表桂枝湯類是也有里證輕而表證重者宜汗表兼溫如少陰二三日微發汗麻黃附子甘草湯少陰始得之反發熱脈沉麻黃附子細辛湯類是也此皆裡寒之治主乎胃者也是知素問言熱以其在經也仲景兼言寒者以其在胃也義傅而法殊實相為出入不可偏廢者也王安道謂傷寒傳變有熱無寒仲景三陰之言寒者乃宜中陰經寒證耳夫直中之寒證由正氣虛甚腠理疏豁邪氣乘虛卒然直入臟腑之內無分經絡一身並受治以附子理中之屬者也仲景三陰之寒則大異是必久而後變如少陰脈緊至七八日下利脈暴微是也且多有表證之兼是證雖與直中類其所傷所治則大異豈可混而不晰乎抑素問有云三陽經絡皆受病未入於腑者可汗而已此腑亦指胃而言又云盛則瀉之虛則補之不盛不虛以經取之蓋亦謂邪氣在胃始有虛盛之分若未入於胃則里無虛盛但主治在經而已然經與胃之分久矣誠為傷寒之大要也學者苟能明此則仲景之三百九十七法自觸類可通矣健按此篇辨三陽三陰傳變直中寒熱之不同方治溫涼攻補之攸別該括要領總歸於胃夫病之始終仲景大旨在乎胃腑虛實而分補瀉以調劑玩此則治傷寒之妙秘則得而不失矣亮宸夫人之所以生者陽氣也六氣之中寒為陽邪殺物莫過焉政以其傷人之陽故耳所受之寒邪有微甚而人之陽氣有盛衰陽氣盛者邪加於身則鬱而化熱其在太陽一汗而愈若不已邪漸入漸深熱愈熱愈甚始太陽而陽明而少陽而陽明入腑而三陰遂為亢極之陽陽亢極亦有死道然陽常主生苟非陰絕一下氣通即愈故雖病甚至於囊縮而內經謂之可下而已所謂熱雖甚不死陽證故也其陽氣虛者本氣原寒復受陰邪兩陰相合或亦始太陽不能化熱即入少陰如太陽篇云病發熱頭痛脈反沉若不差多體疼痛當救其里四逆湯此即太陽入少陰之證或始即入三陰以陰遇陰而成真陰證吐利厥逆諸證作而死矣太陰無死證為陰之微少陰厥陰多死證為陰之甚厥陰發熱不死為陰極陽生故厥逆死而癰膿便血不死也內經辨證止論傳邪熱病之常故謂之熱病論蓋引而未發意藏熱甚不死句內仲景閱世多而處變備故於三陰論中詳言死狀治法甚悉因其宗族大半死於傷寒未必非庸醫妄執內經可下而已一語殺之是以三陰首篇詳切言之政補內經之未及也然三陰亦有始寒終熱者如少陰是黃連阿膠湯白頭翁湯大承氣諸證厥陰有熱深厥深之辨此為得之陽而愈非死證也後人讀內經與仲景書不得其所以合又不得其所以分徒疑大聖大賢何其牴牾若此不知成氏以內經傳邪之熱注仲景三陰自病之寒奉議雖識之而語焉不詳至河間直以三陰為雜病設非為傷寒設嗚呼何其敢於殺人之甚耶後之賢者有志救時必熟讀詳味本論反復尋繹自有得其意旨所在其後賢著論雖多皆爝火螢光未足補太陽之末照苟能得仲景之微亦可與仲景相視為莫逆者矣健曰此篇揭諸家之是否而決陰證陽證寒熱治法之謬以示後人情詞慨切不惜痛哭流涕籲前輩傳人稍遺偏弊難免千載之論況目未窺書胸無成竹者奚堪妄行非法對此不自寒心者不足以語道也觀子仲景書萬世之規矩準繩也讀其書將以為方圓平直不可勝用也往往扞格難通何哉其難明易誤之由有三焉不析乎此鮮不觸徑成礙而仲景之書終流於莫能讀莫能用矣姑請著之一在溫暑異氣諸病之無方可據也冬時即病特傷寒之一端耳若語其詳極其變有邪同而病異者有邪同病同而時異者有邪同病同時同而再感他邪之異者有感於他邪證狀絕似又非傷寒者雖連類並及其病名已自不同病名既不同施治更不同也仲景一則曰其病相似但治有殊再則曰為治不同未嘗不深切著明不幸溫暑諸病既與傷寒鼎坪諸方百不一存於是欲倚仲景之章程而茫無畔岸此散亡之無可如何者矣粗工洶洶以為仲景之神奇即六經各方已足治之而無餘夫藥本去邪方由病設藥病未宜即合用方中尚有輕重加減諸法奈何以異病之治無窮之變而謂盡於一證之施乎使誠入腑當除裡寒可溫壞證待救亦有不越範圍而可通用焉者若既無與於風寒營衛又無待乎解肌發表不問邪由之懸絕證狀之迥異而徒恃麻桂類以嘗傷寒之各變其滋禍乎能不滋禍耶所以無怖乎其為散亡則雖仲景所未盡傳自可補缺遺而不致舛謬皆因目為全書而謂溫暑異氣諸病之治已不越傷寒即病之治有不為圓鑿方柄者歟則非仲景書之難明而人之自致誤者一也一在三陰或熱或寒之為論不同也內經於傷寒但稱熱病仲病序傳陰亦止熱邪似非發熱不為傷寒非傳邪不入三陰矣乃無熱但寒之陰證後世滋多而聖經未之言仲景言之而序例未之詳果何以不侔若是耶故靈樞言邪之傷人悉矣皆不外三陽經絡所謂中於陽則溜於經中於陰則溜於腑而已又言邪之中人臟矣入房傷腎之類亦不過陰陽俱感中外皆傷邪乃得住而已從未有至表氣蕩然臟傷近死之危如是者且二經之言病能夥矣雖一噫一嚏一呵一欠之微靡不委曲詳盡何反復至篇終而於應熱反寒五死一生之傷寒曾不一語為之剖別耶我知之矣此古今形氣病氣不同之所未致豈可一視並論也何也茹毛飲血巢居穴處生禽獸之間邪不能入者上古之世也從軒岐時之形體已一大異矣虻蟲水蛭強人大附子一枚石膏如雞子大者仲景之世從今時較之形體又一迥殊矣則由仲景時言之強弱厚薄年壽長短俱相去遠矣形質元氣非後世衰薄比故邪風厲寒之侵其營衛猶能抵禦病亦不過傷自經絡必不至外氣無復存而直趨根蒂之地六腑與經絡之氣周護於身猶城郭也五臟之氣根於內猶官掖也凡病必始自經腑受傷久而不已內連五臟者受病之正也若病起即臟氣受傷者證之深病之變也猶城郭無守禦而宮掖可危也非根本先拔不致於此在上古風氣雄厚形質壯盛即病不至若是目前之大病前人若絕不知必其未至如是故古經無明文也如東垣悟陽氣之衰弱制補中益氣為近世之要劑前人智有所不逮賴東垣始顯也皆今昔元氣不同所致古之氣強鮮病是者今之氣弱患此多矣於此見世日降氣日蕭者類如是逮乎季漢形化日漓於是陽弱暴危之病始多然不入之例篇者古昔所無前聖未言之耳後人昧此反疑序例或叔和所作噫序例果出自叔和其如仲景於即病之傷寒外未嘗再研一證則非仲景之難知而人之自致誤者又一也一在麻黃桂枝之貴善其用也營衛人身之綱領麻桂湯液之淵源宗仿仲景者非此莫尚矣夫藥本依病而設輕重銖兩未有不視夫邪氣者仲景既立桂枝麻黃矣又設一二各半去桂去芍諸劑汗法又審尺中遲陽脈微瘡家淋家等忌圓機活法惟其宜而已矣孫真人曰凡用藥必隨地土所宜江南嶺表其地暑濕其人肌膚脆薄腠理開疏用藥輕省關中河北地土剛燥其人皮肉堅硬腠理緊密用藥重複噫此方宜異治不可不知河山兩界之間北地高寒陰氣常在未冬先寒夏不極暑至冬嚴寒氣邪毒烈非峻猛之劑奚能去病南方卑隘所謂下者為陽熱氣常在腠疏不必重表寒輕則其邪易散多暖則溫熱不宜若欲以燕秦晉豫之治漫施於荊梁吳越之邦宜乎否乎使不悟夫古今形質不同南北氣候迥別一州之間高下頓殊一人之身強羸各異而第守一法以施之則非仲景之法窮而人自致誤者又一也昧此三者凡傷寒之要豈能了了況言之所未盡意之所難通以引伸觸類者乎嗟夫仲景諸方有無所用其殊異者萬世守頂勿易可也有施之古未可施之今為此地設不為彼地設者則審地審時審人之為不可廢也不知師仲景之妙者猶無規矩準繩以為方圓平直者也僅知師仲景而不能變通合宜者猶索驥於圖鍥劍於舟者也世之研求仲景者已無幾矣得其微不泥其跡化於法之內以遊於法之外者實難其人焉健按觀子又將古今稟質南北地宜點醒世人知仲景書之難明易誤一以溫暑異氣之不與傷寒同治一以明三陰傳中寒熱之不同治一以明湯藥須審地審人審時輕重異宜之不同治與學者嚮往之路並悉內經未盡後世之變真千載破的之論也於斯測之且運化之庶幾不悖乎道矣原治活人古人治傷寒有法非雜病比六經各異陰陽傳受日數淺深藥劑溫涼用有先後差之毫釐輕者危殆矣傷寒惟兩感不治其餘證候雖感異氣能消息之無不愈者其有差失仲景所謂醫殺之耳知其法者若網在綱如此而汗如此而吐如此而下桂枝承氣瓜蒂四逆用之無不取瘥惟其應汗而下為痞為結胸為懊憹應下而汗為亡陽為譫語為厥竭又有當下反吐療熱以溫變證百出無復紀律擾擾萬緒矣健曰能得原治箇中之理所向無謬自然為傑出之士節庵治傷寒誠為重寄死生在乎反掌雜證緩可取裁傷寒急於措置原傷寒論中有有論缺方者有方失論者有脈無證者有證無法者不一而足即活人書明理論指掌圖皆未能縷浙也是以庸俗之治一二日不問虛實便用麻桂之類汗之三四日不問經腑便用柴胡之類和之五六日不問表裡便用承氣類下之以致內外皆虛變證蜂起殊不知人之表裡虛實不同邪之傳變寒熱各異豈可以日數為準蓋風寒之初中人也無常或入於陰或入於陽本無定體非但始太陽終厥陰也或有自太陽始日傳一經六日傳至厥陰邪氣自衰不傳而愈者余與前文同或有證變者有脈變者或有取證不取脈者有取脈不取證者緣經無明文未免有妄治之失前人立法既差後世蒙害者多矣夫桂枝麻黃二湯仲景原為冬時正傷寒立也今人乃以通治非時暴寒溫暑又將傳經陰證與直中陰經陰證混同立論豈不誤乎暴寒溫暑必別有方直中傳陰必各有法今皆亡失而無徵也古人之書引領後進說其大概者多要在學者心領神會耳見太陽證宜直攻太陽見少陰證直攻少陰此活法也仲景云日數雖多但有表證而脈浮者猶宜汗之日數雖少但有里證而脈沉者猶宜下之此先聖之大旨是不可執定一二日發汗三四日和解五六日攻下者矣要於審脈驗證辨名定經一一親切無疑真知為表邪而汗之真知為里邪而下之真知為直中而溫之則桂枝承氣投之不差薑附理中發而必當七劑少差死證立見可不深思而熟慮哉仲景取方立論甚嚴曰可溫曰可汗曰可下曰和解曰少與曰急下與夫溫其里乃攻其表先解其表乃攻其里得其綱領者如響應聲則不難也嗟乎常病用常法其誰不知設有感冒非時暴寒而誤作正傷寒者非時四時不正之氣傷寒冬月殺厲之氣有勞力感寒而誤作真傷寒者勞力內傷原氣傷寒外感賊邪有雜證類傷寒而誤作傷寒治者有直中陰經真寒證而誤作傳經熱證者有溫熱病而誤作正傷寒者溫熱晚發病正傷寒即病有夾陰中寒誤作正傷寒者夾陰因房勞腎虛必有足冷脈沉之異有內傷食陰誤作外傷寒者生冷宜溫中傷寒須發表有如狂誤作發狂者如狂乃畜血發狂乃邪熱有畜發黃誤作濕熱發黃者腹滿小便利畜血也色如煙燻一身盡痛小便不利濕黃也有蚊跡誤作發斑者蚊跡者非蚊叮也乃腎虛服涼藥逼其無根之火熏肺而然斑者胃經熱毒或失下或下之太早或服熱藥所致有動少陰血誤作鼻衄者有譫語誤作狂言者譫語數數更端狂言叫號怒罵有獨語誤作鄭聲者獨語無人則言鄭聲頻頻諄復有女勞復誤作易病者有短氣誤作發喘者有邪氣痞滿誤作結胸者有噦逆誤作乾嘔者噦者呢也乾嘔者空嘔無物也有結熱硬痛下純清水誤作清穀寒利者有並病誤作合病者有正陽明腑病誤作經病者腑在裡宜下經在表宜汗有陰躁誤作陽狂者陰躁脈沉足冷飲水不得下咽陽狂脈實大渴飲水有太陽證無脈而便認為死證者有里惡寒而誤作表惡寒者有表熱而誤作裡熱者有少陰病發熱而誤作太陽者有標本全不曉者此數者倘一妄治猶殺人不用刃耳非惟誤人事大且關自己陰騭余老於傷寒補得仲景大旨雖無萬全之功十中可活八九曾撰瑣言語錄諸書逐一告誡苟能依吾方論而行萬不失一自不與俗工伍矣健曰傷寒始於仲景精於節庵自漢至明雖名家代出無如節庵之專且工也當時有陶一帖之稱則知其壽世之功良不淺也其言切直中款振作後人讀者心領神會自可出人頭地矣予謂初學之士先熟藥性次明經絡次識病名然後講求脈理以證其所生之病病證脈相同藥無不應矣病起發熱惡寒頭項痛腰脊強則知病在太陽經也身熱目痛鼻乾不得眠則知病在陽明經也胸脅痛耳聾口苦舌乾往來寒熱而嘔則知病在少陽經也腹滿咽乾手足自溫或自利不渴或腹滿時痛則知病在太陰經也引衣蜷臥惡寒舌乾口燥則知病在少陰經也煩滿囊縮則知病在厥陰經也潮熱自汗譫語發渴不惡寒反惡熱揭去衣被揚手擲足或斑黃狂亂不大便則知病在正陽明胃腑也設若脈證不明誤用麻黃令人汗多亡陽誤用承氣令人大便不禁誤用薑附令人失血發狂所謂寒涼耗其胃氣辛熱損其津液燥熱助其邪熱害人莫甚夫傷寒之邪初無定體或入陽經氣分則太陽為首其脈必浮輕手便得或入陰經血分則少陰為先其脈必沉重手方得浮而有力無力是知表之虛實沉而有力無力是知里之寒熱中而有力無力是知表裡緩急健曰如此體察始得至理正是細針密線脈有浮沉遲數證有傳變不常治之之法先分表裡寒熱陰陽虛實標本後先病在標者先治其急此為上工也問證以知其外察脈以知其內全在活潑潑地若同而異者明之似是而非者辨之在表者汗之散之在裡者下之利之在上者因而越之下陷者升而舉之從乎中者和解之直中陰經者溫補之陰證似陽者溫之陽證似陰者下之陽毒分輕重下之陰毒分緩急溫之陽狂者下之陰厥者溫之濕熱發黃者利之下之畜血發黃者清之下之發斑者清之化之譫語者下之溫之痞滿者消之瀉之結胸者解之下之太陽似少陰者溫之少陰似太陽者汗之衄血者解之止之發喘者汗之下之咳嗽者利之解之正傷寒者大汗之大下之感冒暴寒者微汗之微下之勞力感寒者溫散之溫熱病微解之大下之此經常之大法也有病一經已用熱藥而又用寒藥如少陰證用白虎湯四逆散寒藥又有用四逆湯真武湯熱藥者昧者狐疑炬能措手嗚呼能察傷寒之正名得傷寒之方脈一一親切斯謂良醫又須分輕重緩急老少虛實久病新發婦人胎產室女經水凡有胎產而傷寒者不與男子同法無者治相同也婦女經水適來適斷寒熱似瘧者即熱入血室當和解表裡久病者過經不解壞病也新發者始病也老者氣血衰少者氣血盛緩者病之輕急者病之重寒藥熱服熱藥冷服中和之劑溫而服之戰汗分為四證要知邪正盛衰類傷寒數證照常法則治之雖云發蒙實登仲景之階梯也健曰此篇備悉條治深詳仲景大法當熟湧之則化機自現傷寒汗下溫之法最不可忽據脈以驗證問證而對脈太陽者陽證之表陽明者陽證之裡少陽者二陽三陰之間太陰少陰厥陰又居於里而謂之陰證也發於外則太陽為首發於內則少陰為先太陽惡寒而少陰亦惡寒但太陽之脈浮緊少陰之脈沉細與他經證狀異也發熱惡寒身體疼痛或自汗或無汗是為表證可汗不惡寒反惡熱口燥咽乾壯熱腹滿小便如常大便秘結是為里證可下厥冷囊拳自利煩躁而無身熱頭疼是為陰證可溫在表者邪傳於營衛之間在裡者邪入於胃腑之下少陽居焉若傳三陰則為邪氣入臟矣營衛固為表也胃腑亦可為表也然以臟腑而分表裡則在腑為表在臟為里胃取諸腑可以表言若合營衛臟腑而分之則表者營衛之所行里者胃腑之所主而臟則又深於里矣故古人立法之嚴而汗下溫之不可忽也如此士材發表之藥用溫者表有邪陽虛陰盛也攻裡之藥用寒者里有邪陰虛陽盛也溫里之藥用熱者臟有病陽不足而陰有餘也傷寒無出於仲景但文字深奧非淺學可悟況殘缺頗多晉人作全書詮次其中不可曉處十有四五苟未能統之有宗會之有源未易窺測臨病之際不能無惑必須破的而後用又恐病危有所不逮既不可不救又不可苟且今具此數事以備緩急之用傷寒言證不言病者厥有旨哉證之一字有明證見證對證之義無所遁情人之心肝脾肺腎藏而不見口鼻耳目則露而共見者也故五臟受病人難測度然有諸內必形諸外肝病則目不能視心病則舌不能言脾病則口不知味肺病則鼻不聞香腎病則耳不聽聲以此言之證亦親切矣況邪中於人必分經絡而本經之證見矣更以脈參之豈有差忒哉吾故曰傷寒言證耳健曰上皆節庵法語頭頭是道不啻耳提面命即起仲景而質之不逾於是也已復庵論中有稱太陽經病者太陰經病者又稱傷寒者中風者有但稱厥者下利者有但稱病人者凡稱某經者蓋以邪中其經故以經名之非特謂傷寒之候兼可以謂雜證也凡云傷寒而不云經者非雜病也謂六經俱有之證難以一經拘之中風者亦然凡云下利及厥與夫稱病人等證者謂六經傷寒中風雜病等候俱有是病也叔和類次編入各經故有所未當如下利有譫語者有燥屎也宜小承氣湯叔和編入厥陰下利條內若以證言之正當屬陽明也似此者非一致令後人拘於六經妄分寒熱有乖聖道夫善治病者須詳辨太陽傳經之邪各經直中之邪曾無汗吐下之證火逆水噴之證結胸發黃血諦痞利厥逆之證如中風傷寒雜病之候一切之疾不拘六經但分表裡蓋六經懼有表裡二證但有表證即宜汗但有里證即下表裡俱見則宜以攻裡之藥發汗分表裡證多少用之病在半表半裡者和解之此傳經之治也雜病寒證在表者辛溫汗之寒中里者大熱之劑救之亦不過明其表裡而矣傳經海藏陽中之陽水太陽是也為三陽之首能循經傳亦能越經傳陽中之陽土陽明是也陽明為中州之主主納而不出如太陽傳至此名曰循經傳也陽中之陽木少陽是也上傳陽明下傳太陰如太陽傳至此為越經傳也陰中之陰土太陰是也上傳少陽為順下傳少陰為逆如傳少陰為上下傳也太陽傳至此為誤下傳也陰中之陽水少陰是也上傳太陰為順下傳厥陰為逆如太陽傳此乃表傳裡也陰中之陰木厥陰是也上傳少陰為實再傳太陰為自安也太陽巨陽也為諸陽之首渴者自入於膀胱也名曰傳本傳陽明胃為循經傳傳少陽膽為越經傳傳少陰腎為表傳裡傳太陰脾為誤下傳傳厥陰肝為循經得度傳蓋三陰不至於頭惟督脈與厥陰上行與太陽相接於巔故曰得度是為太陽六傳也仁齋夫傷寒六經為病陰陽虛實或冷或熱者無非客邪之所為也其陽邪傳者常也陰邪傳者變也陽邪以日數次第而傳者如一二日太陽至五六日厥陰也七日經盡當汗出而解七日不解謂之再經二七日不解謂之過經過經不解則為壞病華佗云傷寒一日在皮二日在膚三日在肌四日在胸五日在腹六日入胃乃傳裡也其在皮膚者汗之在肌肉者和之在胸者吐之在腹入里者下之又傷寒賦曰一二日可發表而散三四日可和解而痊五六日便實方可議下其治例頗同也殊不知此皆大約之法言常而不言變也蓋寒之中人初無定體或中於陰或中於陽經言一二日發熱脈沉者少陰病又一二日口中和背惡寒者少陰病此皆直中陰經之寒非常而為變也活人書曰凡寒邪自背而入者或中太陽或中少陰自面而入者則中陽明之類亦不專主太陽也又曰寒邪首尾只在一經而不傳者有之有間傳一二經者有傳過一二經不再傳者亦有足經冤熱而傳入手經者有誤服藥而致傳變者多矣故經曰太陽經脈浮緊身疼痛發熱七八日不解此表證仍在當發其汗又少陰脈得之二三日口燥咽乾者急下之此皆不以日數言也守真曰誰敢二三日便以承氣下之蓋聖人書不盡言言不盡意說其大概而已不幾其言之執也太陽諸陽之首傳變居多且熱邪乘虛則傳若經實則不受邪而不傳太陽水傳陽明土乃妻傳夫謂之微邪陽明土傳少陽木亦妻傳夫微邪也少陽木傳太陰土乃夫傳妻謂之賊邪太陰土傳少陰水亦夫傳妻賊邪也少陰水傳厥陰木乃母傳子謂之虛邪太陽水間傳少陽木亦曰母傳子虛邪也太陽水越經傳太陰土為微邪又曰誤下傳也太陽水傳少陰水乃陰陽雙傳即兩感也太陽水傳厥陰木亦曰母傳子虛邪又曰首尾傳也夫傷寒傳至厥陰為尾厥者盡也正氣將復而邪氣將解水升火降寒熱已而大汗解也若正氣不復邪無從解陰氣勝極則四脈厥逆舌卷耳聾囊縮不知人而死矣趙氏曰傷寒邪在陽經則易治傳入陰經則危殆蓋陽微陰盛正虛而邪實也況誤下內陷汗虛別經則變易傾危可立而待凡治之要須求仲景立法之意不然則疑信相雜未免通此而礙彼也熟讀揣摩其例自見而治無差矣不得其例而執論專方膠柱鼓瑟其誤不免許氏曰讀仲景書用仲景法未嘗守仲景方可謂得其旨矣復庵傷寒先犯太陽以次而傳此特言其概耳然其中變證不一有發於陽即少陰受之者有夾食傷寒食動於脾脾太陰之經一得病即腹滿痛者亦有不循經而入如初得病徑犯陽明胃腑之類不皆始太陽也亦有首尾止在一經不傳他經者如一月半月後內無里證但頭疼發熱體痛惡寒者亦有止傳一二經而止者不必盡傳諸經也至如病之逾越不可泥於次序當隨證施治所以傷寒得外證為多仲景曰日數雖多有表證者猶宜汗日數雖少有里證者即宜下宇泰曰凡三陽三陰皆能自受邪不專自太陽始如經於三陰內各有中風中寒之證是也至若感冒時行傳變雖與傷寒相同而治法不同蓋不似傷寒殺厲之邪無直中陰經之證耳而夾陰夾食為病亦皆危險虛實寒熱之治須從脈象舌法循理至當雖有不救問心無愧東垣傷寒受病之始皆出熱論一篇獨傳足而不傳手何也蓋傷寒病冬月得之惟傷北方與東方蓋足之六經皆在東北之方也仲景云無奇經則無傷寒緣奇經皆附足經不附手經是以寒邪只傷足經也然大意如此至於傷手經者間亦有之海藏傷寒傳至五六日漸變神昏不語或睡中獨語一二句目赤唇黑口乾不飲水與稀粥則咽不與不思六脈細數不洪大心下不痞腹中不滿大小便如常或十日以來形貌如醉醫見神昏不已多用承氣下之誤矣蓋不知此熱傳手少陰心經也然未知自何經而來曰本太陽傷風風力陽邪陽邪傷衛陰血自燥熱歸膀胱壬病逆傳於丙丙丁兄妹由是傳心心火上熏熱迫肺金所以神昏也肺為清虛之臟內有火邪致令神昏宜梔子黃連黃芩湯若脈在丙者導赤散在丁者瀉心湯若右寸沉滑有力則可用涼膈散乃氣中之血藥也若脈浮沉俱有力是丙丁俱有熱也可導赤瀉心各半服之此證膀胱傳丙足傳手下傳上表傳裡也云傷寒不傳手此言未盡然也與食則咽者邪不在胃也不與不思者神昏也邪熱既不在胃誤與承氣下之死也必矣損庵傷寒本只傳足經今又例手經之義可謂發病機之秘矣蓋只是邪蘊日久因足經實手經虛故冤熱耳有因汗下差誤而傳有因七情或勞倦而致大抵傳手經必有所因所以古人有救逆復脈等法豈但切中病情實啟後人無窮義例也觀子傷寒但傳足經之旨昔人已各窮其義矣然有終未洞然者竊嘗推之猶有二義焉一者外在天之陰陽即內在人之臟腑經所謂天有五行化寒暑燥濕風人有五氣為心肝脾肺腎及在天為風在臟為肝在天為寒在臟為腎之類蓋同出一原形與氣每相應相通者矣一者陰陽之異道即上下之定位經言清邪中上濁邪中下在上之病多風與熱在下之病多寒與濕又言燥熱在上風寒在下及身半以上天氣主之身半以下地氣主之蓋本乎天者親上本乎地者親下各從其類而歸之是矣故百病之生風必病肝膽暑必病心小腸濕必病脾胃燥火必病肺大腸則寒邪所侵有不病腎與膀胱而不入在下之經者乎然其病足之諸經何肝腎陰也脾陰中之至陰也膽之於肝膀胱之於腎胃之於脾表與里標與本一氣者也其臟象雖不盡在乎下而其經氣悉絡於下也風寒者陰屬其感必由陰臟非此六經奚人乎若心肺陽臟而處上者也大小腸心肺之表裡也三焦命門皆火之屬也匪獨在下之邪上侮不順諸陽熱自旺之臟其氣足以勝陰寒邪之所入既淺終不至其病如風寒傷肺雖有頭疼發熱止成咳嗽類則手六經者焉得而傳之乎三陰之邪少陰甚於太陰而厥陰復甚於少陰者其位愈下其寒愈深則上下之不侔益可見矣至病之既久傳之殆遍而並見手各經證者非遞傳至手也淫邪泮衍彼經又虛從而侵入故見彼經之證非徑傳其經之謂也健曰此篇論情達理源源本本更覺至當玄妙入神宜三複之嘗觀成氏之釋傳經次第也曰傷寒前三日傳遍三陽後三日傳遍三陰為傳經盡當解不解者傳為再經至九日又遍三陽十二日又遍三陰十三日為再經盡當解不解者謂之過經噫斯言也有不能無疑者矣夫傷寒之邪由淺入深從表傳裡既入於裡豈能復出之表再始於皮毛肌腠耶況傳至三陰多屬入腑入腑則無所復傳非下不可也今日曆一經而至厥陰傳深勢危亟下奪之猶三死一生之候焉有煩滿囊縮於今日而復頭疼發熱項強體痛於明日者乎既脈已沉細微緩豈更能作浮緊洪長之診乎熱極傳盡之厥陰能無變故而復返於太陽陽明少陽乎理之所必無證之所未有也反復詳繹再經過經之惑皆成氏謬解之故後人不察所以紛紛其說矣蓋一日一經六日六經者熱論始之序例述之此傳經之常道亦傳經之一端也若語其詳窮其變財東垣之間經越經子母首尾等傳尚文之不從太陽始各經皆可始而可傳一二經而止不必遍傳六經是皆必然之勢無定體之常也然此猶自後人推求仲景已明言之而人未之察耳日傳一經之外七日一經之傳兩句無遺蘊矣考之經云一日太陽受之煩躁數急者傳脈靜者不傳二三日陽明少陽證不見者不傳傷寒三日三陽為盡是日傳一經之旨皎然分別矣況經又云太陽病頭痛七日行其經盡者自愈欲作再經者針足陽明使不傳則愈再經二字原出太陽病七日以上行其經盡之下則與一日一傳者本無涉十三日過經不解如首篇十三日以上不間之類是經雖有再經過經之文非再遍六經之說也六七日無大熱躁煩者陽去入陰也何耶曰太陽七日行其經盡再經者為陽明則非二日陽明三日少陽可知矣曰六七日陽去入陰則又非三日三陽為盡三陰受邪可知矣何其若同而異有如此哉惟是日傳一經之外復有但在一經不再傳之傷寒也序例於一二日太陽二三日陽明之後別列一章曰更不傳經者七日太陽病衰八日陽明病衰以至十二日厥陰病衰是與六日遍六經者明屬兩途也至其皆以七日自愈者蓋日過一經則諸經之氣皆病傳速而陷深故其候傾危七日一經則一經之氣獨虛不再侵他經故病可自己然此七日經盡之證或不罷再傳一經者有之斯則謂之再經或七日太陽當衰而不衰八日陽明當愈而不愈者斯則謂之過經成氏不達此義以經盡欲解之餘邪混之臟腑遞窮之暴診病可忽里忽表藥豈當下而復當汗乎郢書燕說莫此為甚然即傳與不即傳傳一經之與傳六經其端甚微而相去霄壤安得不詳言而辨之哉健曰傷寒大要全在據經定證夫傳經之道猶進退焉日傳一經者進也至七日遞衰十二日而愈者退也若七日經盡不愈已見厥陰之危候安有再傳至表之理乎所謂再經者乃七日一傳之證而太陽當衰不衰二七日次傳陽明是為再經若陽明又不解而至三七日者是為過經然皆是進也觀子深明其理歷舉前人之異同而詳辨之言言珠玉已無遺蘊學者可無他歧之惑矣士材傷寒傳經自表入里由淺入深故六經以次受之六經傳盡無出而再傳之理也太陽為三陽最在於外陽明為二陽在太陽內少陽為一陽在陽明內此三陽為表也太陰為三陰在少陽內少陰為二陰在太陰內厥陰為一陰在少陰內此三陰為里也內經一二日始太陽五六日終厥陰此語其常耳若論其變或間經或越經或始終一經不以次第拘不以日數限也但傳至厥陰為傳經已盡不復再傳矣成氏乃云六日厥陰為傳經盡七日當愈不愈者再自太陽傳至十二日復至厥陰為再傳經盡十三日不愈者謂之過經其說謬矣善夫馬仲化曰自太陽至厥陰猶人從戶外而升堂而入室也厥陰復出而傳太陽奈有少陰太陰少陽陽明之隔豈有遽出而傳太陽之理乎仲景云太陽病頭痛七日以上自愈者以行其經盡故也若欲作再經者針足陽明迎而奪之使經不傳則愈此言始終只在太陽一經者也又曰發於陽者七日愈以陽數七故也試玩行其經盡不曰傳其經盡則仲景之意顯然矣成氏誤認行其經盡為傳遍六經故有再傳之說矣
