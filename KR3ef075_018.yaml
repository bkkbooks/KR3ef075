body:
  text: 傷寒直指卷十六名論二察脈節庵傷寒治法得其綱領者如拾芥若求之多歧猶涉海問津矣蓋脈證與理而已傷寒之脈以浮大動數滑為陽沉澀弱弦微為陰然脈理玄微今人何能識透夫脈者非血非氣天真之委和營衛之道路而實先後天之造化無方體也古人云胸中了了指下難明真言也余治傷寒專以浮中沉三候察陰陽表裡虛實寒熱亦無遁情矣夫傷寒者寒邪自外入內而傷之其入也有淺深次第自表達里先入皮膚肌肉次入筋骨腸胃以此推之亦不難也蓋風寒初得先入太陽寒水之經此經本寒標熱便有惡風惡寒頭疼發熱之證是寒鬱皮毛而為表證也若在他經則無此矣脈若浮緊無汗為傷寒當表取汗為解脈若浮緩有汗為傷風當實表汗止為解若無頭疼惡寒脈又不浮此為表證罷而在中中者半表半裡之間乃陽明少陽之分脈不浮不沉在乎肌肉之間皮膚之下然亦有二焉若微洪而長陽明脈也外證目痛鼻乾不臥微惡寒頭疼見此者宜解肌脈弦而數少陽脈也其證胸脅痛耳聾寒熱嘔而口苦見此者宜和解表裡蓋二經不從標本從乎中治也過此邪傳入里為熱實脈不浮而沉沉則按至筋骨之間若寸口沉實有力外證不惡寒而反惡熱譫語大渴或潮熱自汗或揚手擲足揭去衣被或腹滿硬痛五六日不大便乃傳陽明之本其熱入里而腸胃燥實也宜下之大便通而熱愈矣若沉遲無力此為直中陰經真寒之脈其證無頭疼身熱初起便怕寒手足厥冷或戰栗蜷臥不渴或兼腹痛嘔吐泄瀉或口出涎沫面如刀刮者乃陰經自中之寒不從陽經傳入不同陽經熱證治當看輕重以溫之若更面赤微熱脈沉足冷夾陰傷寒也面青小腹痛無熱脈沉足冷舌卷囊縮夾陰中寒也宜溫經散寒其中緊要關節再表而出之太陽者陽證之表陽明者陽證之裡少陽者二陽三陰之間太陰少陰厥陰又居於里總謂之陰證三陰俱是沉脈在指下有力無力中分有力者為陽為實為熱無力者為陰為虛為寒最為切當有力熱邪傳裡也宜下無力寒邪中里也宜溫傳經之邪必沉重有力分輕重下之直中寒證必沉遲無力救里溫之其三陰傳經熱證如腹滿咽乾屬太陰舌乾口燥屬少陰煩滿囊縮屬厥陰三者俱從陽經傳入脈見沉實有力急當攻裡下之如下後利不止身疼痛脈沉細無力又當救里溫之此權變之法也今將浮中沉脈法主病細列於左浮者初排指皮膚之上輕手按之便得曰浮此寒邪初入足太陽經病在表之標可發而去之然有二焉寒傷營脈浮緊有力惡寒頭痛項強無汗發熱者為表實宜發散風傷衛脈浮緩無力惡風頭項痛腰脊強有汗發熱者為表虛宜解肌中者在皮膚之下肌肉之間略重按之乃得謂之半表半裡亦有二焉長而有力即微洪脈也為陽明在經外證微頭疼眼眶痛鼻乾不眠發熱宜葛根以解肌渴而有汗不解或汗過渴不解白虎加人參脈弦而數此少陽經脈外證胸脅痛耳聾寒熱嘔口苦小柴胡加減或兩經合病脈弦而長宜小柴胡葛根芍藥治之沉者重手按至肌肉之下筋骨之間方得亦有二焉沉數有力為陽明入腑表證解而熱入於裡沉遲無力則為寒系直中真寒之證或溫或下俱分輕重施治健曰節庵言脈辨證言證核脈不失仲景大旨其生平本事足以獎進後學但文理瑣屑辭句紊雜俱為節録以成章耳或問持脈之要陰陽表裡虛實何以別之曰持脈之要曰舉曰按曰尋輕手循之日舉重手取之曰按不輕不重委曲求之曰尋初持脈輕手得之於皮膚之間曰浮是太陽經脈也若附於肌肉之下筋骨之間重手方得曰沉是三陰經脈也三陰俱屬於里若不輕不重中而取之是應於血氣之間陰陽相平也陰陽表裡虛實寒熱俱在浮中沉三候有力無力中分有力者為陽為實為熱無力者為陰為虛為寒若浮中沉不見則陰陽伏匿之脈也或曰三候中有進退焉有伏脈焉有可解不可解焉有歇止焉有躁亂焉請備言之曰脈大力病進大則邪氣勝而正氣無權也脈緩為病退緩則胃氣和而邪氣無權也何謂伏一手無脈曰單伏兩手無脈曰雙伏若病初起頭痛發熱惡寒而脈伏者乃陰邪陷於陽中不得發越此有邪汗也當攻之使邪氣退而正氣復脈自至而病自除如天欲雨必鬱熱晴霽反涼爽也若八九日以來別無刑剋證候或昏冒不知人或脈伏全無此欲作正汗也勿攻之如六合陰晦一雨而庶物咸蘇換陽之吉兆也何謂可解脈浮緩在表者以汗解之沉實在裡者以下解之沉遲在裡以溫解之夫浮汗沉下宜也然浮有宜下者大便難沉有宜汗者表有熱也何謂歇止寒邪直中陰經溫之脈當漸出而反斷續者為歇止何謂躁亂汗下後脈當安靜反盛者為躁亂皆大凶之兆也此經常之大法也脈貴有力為有神神者氣血之先也無脈曰伏必有正汗也寸口陽脈中或見沉細無力為陽中伏陰尺部陰脈中或見沉數為陰中伏陽寸口數大有力為重陽尺部微細無力為重陰寸口微細如絲為脫陽尺部濡弱無力為脫陰寸脈浮而有力主寒邪表實宜汗浮而無力主風邪表虛宜實表尺脈沉而有力主陽邪在裡為實宜下沉而無力主陰邪在裡為虛宜溫寸脈弱而無力忌發吐尺脈弱而無力忌汗下初按來疾去遲曰內虛外實去疾來遲曰內實外虛尺寸俱同曰緩緩者和而生汗下後脈躁亂身熱者死邪氣勝也溫里後脈來歇止正氣脫不復生也純弦之脈曰負負者死按之如解索曰陰陽離離者死陰寒證溫後手足溫和脈漸至者生反沉重不省人事脈歇止者死仁齋脈乃天真之氣人命之根故多從脈而少從證若能憑脈驗證以施治豈有差哉如傷寒表證欲發其汗必脈浮有力者乃可汗之若浮而無力或尺中細澀遲軟者皆真氣內虛不可汗也誤汗則死傷寒里證已具大便不通欲下之必脈沉實有力或沉滑有力乃可下之若沉細無力或浮而虛皆真氣內虛不可下下之則死仲景治少陰病一二日發熱脈沉者用麻黃附子細辛湯此證治之奇脈法之妙不可不知也凡尺寸俱浮太陽也浮大有力為洪為熱甚可汗之浮大無力為散為虛不可汗也浮而長太陽合陽明浮而弦太陽合少陽凡浮脈主表不可攻裡也凡尺寸俱長者陽明也浮長有力則兼太陽表未解也無汗者宜發汗若長大有力為熱甚當解肌長數有力為熱實當平熱若長滑實大有力此胃中實熱可攻之凡尺寸俱弦者少陽也宜和之浮弦有力者兼太陽表未解可發汗若弦遲弦小弦微皆內虛有寒宜溫之若弦大弦長弦滑弦數有力者為熱甚宜解之凡弦脈只可和不可汗下不可利小便也凡尺寸俱沉細太陰也俱沉少陰也俱微緩厥陰也若沉微沉細沉遲沉伏無力為無神陰盛陽微宜急生脈回陽若沉疾沉滑沉實有力為熱實為陽盛陰微宜扶陰以退陽夫沉診之脈最為緊要以決陰陽冷熱用藥生死在於毫髮之間不可不仔細謹察活人治傷寒先須識脈若不識脈則表裡不分虛實不辨仲景謂當時之士按寸不及尺握手不及足必欲診衝陽按太溪而後無歉況於寸關尺耶問而知之以觀其外切而知之以察其內證與脈不可偏廢也如傷寒脈緊中風脈緩熱病脈盛中暑脈虛人迎緊盛傷於寒氣口緊盛傷於食非特此也病人心下緊滿按之硬痛結胸也於法當下雖三尺之童皆知之然仲景云結胸脈浮者不可下下則死以此推之若憑外證便用陷胸湯則誤矣故傷寒要辨表裡為主脈浮為在表脈沉為在裡陽動則有汗陰動則發熱得汗而脈靜者生汗已而脈躁者死陰病陽脈不成陽病陰脈則不永吉凶生死如合龜鑑然古人以切脈為下者良由脈理精微其體難辨而傷寒得外證為多也外證易見切脈難明弦緊之混淆遲緩之稍異沉與伏相類濡與弱相似非得之於心超然領悟孰能較疑似於銖黍哉全生左脈緊盛右脈平和為傷寒外感右脈緊盛左脈平和為飲食內傷左右俱緊盛為夾食傷寒亦為飲食內傷兼外感左脈空大右脈緊盛為勞力感寒左右脈沉細或沉伏面青手足冷小腹痛甚則吐利舌卷囊縮為夾陰中寒真陰證左右脈沉細面赤身熱足冷為夾陰傷寒即為房欲內傷外感若加煩躁欲飲水脈沉吐利即為陰極發躁左右脈浮大無力身熱足冷燥渴為虛陽伏陰左脈緊盛右脈洪滑或寸脈沉伏身熱惡寒隱隱頭痛喘咳煩悶胸脅疼痛者為夾痰傷寒左脈緊盛右脈沉弦身熱惡寒脅痛脹滿頭痛體痛氣鬱不舒者為夾氣傷寒左脈緊澀右脈沉數心胸脅下少腹有痛處不移身熱惡寒頭疼煩渴為血鬱傷寒仁齋衝陽脈在足面上去指縫陷骨三寸動脈是也此陽明胃經先天之動脈見於此夫胃為水穀之主人之所本也若胃氣已憊水穀不進穀神已去其脈不動而死矣故傷寒診衝陽者以察胃氣之有無也仲景又謂之趺陽即衝陽雖有脈而微少進食者亦不治活人四時皆以胃氣為本是死生之要會故必診此鶴皋病重診此以決死生蓋土者萬物之母衝陽脈不衰則母氣猶在雖危可生也然又忌弦急為賊邪相剋不治見和緩者生太溪脈在足內跟後踝骨下動脈是也此少陰腎經先天之動脈見於此腎者人命之根蒂真氣之所主其脈動而不息真氣在也若真氣已憊腎氣已絶則其脈不動而死故傷寒必診之健曰先天腎氣旺者其脈可按而得若先天不足後天斷削者其脈微細而難察也辨證節庵太陽經發於陽則太陽為首見證頭疼身熱惡寒脊強體痛是足太陽膀胱經受邪為表證先起惡寒者本病以後發熱者標病念莪惡寒發熱頭痛項強者為表證標病傳入膀胱見太陽里證者為本病但見太陽證在直攻太陽如有一毫頭痛身熱惡寒未除不拘日數還用表藥發散自然熱退身涼脈浮緩無力有汗為風傷衛為表虛宜實之浮緊有力無汗為寒傷營為表實宜發之冬月為正傷寒無汗升陽發表湯春夏秋為時行為感冒春秋羌活沖和湯夏神朮散冬月傷風自汗疏邪實表湯春夏秋加減沖和湯本經鼻衄雖為欲解須分點滴成流成流者表邪已解不必服藥自解或與水解點滴者邪猶在經還宜散邪脈浮緊麻黃湯浮緩桂枝湯成流不止者芩連湯止之如耳目口鼻俱出血手足逆又為不治矣健曰雖為紅汗如多甚不止則陽邪熱迫陰血清邪方須兼涼血之品本經頭疼惡寒體痛腹滿脈浮微喘因表邪未解者升陽發表湯本經發汗不出脈弱者曰無陽及汗出不至足者難治回陽返本湯尺脈遲為血少黃耆建中湯本經發汗汗不止為亡陽又曰漏風調榮養胃湯去升麻若汗出如綴珠不流曰絶汗死凡冷汗曰柔汗本經發渴小便赤色脈浮者為太陽傳本熱結膀胱其人如狂疏邪實表湯小水短者加味五苓散小水自利大便黑小腹硬痛或目黃為畜血如狂用桃仁承氣對子下盡黑物則愈本經大汗後身熱不退脈愈躁者難治若頭痛惡寒尚在者還宜發表羌活沖和湯無頭疼惡寒但身熱未除柴胡雙解飲大便實燥渴者六一順氣湯去芒硝下後熱反盛脈浮亂者死本經頭疼身熱惡寒脊強或一手兩手脈伏必作戰汗也當發散助之冬日升陽發表湯三時羌活沖和湯本經頭疼身熱惡寒無汗脈雖浮大便難而渴當用大柴胡下之大便不難者不可下本經頭疼身熱惡風有汗宜桂枝湯實表若誤用承氣下之反成結胸硬痛手不可近大便實口渴譫語者宜六一順氣湯下之然沉實者可下脈浮清便自調不渴微惡寒者未可下宜以小柴胡對陷胸湯加蔞仁枳實黃連本經頭疼身熱惡寒無汗當麻黃湯發表若誤用承氣下之早成痞滿不痛者宜小柴胡加枳桔治之未效亦以本湯加蔞仁枳桔黃連如大便實脈沉有力而渴六一順氣湯去芒硝本經頭疼身熱脈沉似少陰者回陽返本湯溫之以里屬虛寒故當救里發熱為輕脈沉為重矣本經腹痛小建中湯痛甚桂枝大黃湯此痛隨利減法陽明經見證目痛鼻於不眠是足陽明胃經受邪標病在經以後傳裡渴而譫語發狂斑黃潮熱自汗大便實反惡熱為正陽陽明本病在腑目痛鼻乾不眠者標病身熱渴而引飲惡熱脈洪數者本病便實譫渴者腑病凡目痛鼻乾身熱不眠無汗者宜解肌大便實而潮熱或自汗譫語燥渴者宜下之脈見微洪無力病在經宜解肌沉實有力病在腑宜下之本經目痛鼻乾微惡寒身熱無汗柴葛解肌湯渴而有汗不解或經汗過渴不止宜如神白虎湯本經發渴潮熱自汗譫語揚手擲足揭去衣被大便閉實三一承氣湯去芒硝甚者六一順氣湯更衣者止後服如不更衣轉失氣大便未通者宜再服以利為愈本經渴而漱水不欲咽為畜血宜犀角地黃湯本經但頭汗劑頸而還身目俱黃燥渴小便不利為濕熱發黃宜茵陳大黃湯其黃未盡除者茵陳五苓散利之本經陽毒發斑狂躁兩目如火大渴叫喊登高罵詈大便閉實者當急下之六一順氣湯如不大狂止面赤譫語斑黃身如錦紋手指俱青者三黃石膏湯又小水自利大便黑小腹滿硬發斑而狂者畜血也宜桃仁承氣對子本經陽毒咽痛發斑用升麻元參湯本經自汗潮熱喘滿而不惡寒者內實也六乙順氣湯去厚朴渴而飲水過多發喘胸滿水停心下宜豬苓湯本經潮熱自汗多而胃汁干宜急下以存津液恐承氣愈竭其內宜蜜導法不得不下者六一順氣湯本經喜忌善飢必有畜血在內宜桃仁承氣對子少陽經見證耳聾脅痛寒熱嘔而口苦足少陽膽經受邪為半表半裡證發熱者標病惡寒者本病止有小柴胡湯隨證加減以和解之更無別藥膽無出入有三禁焉不可汗汗之犯太陽不可下下之犯陽明不可利利之犯少陰脈見弦數病在中中者即表裡之間本經嘔而胸滿者乃邪在本經未入於腑故滿悶而嘔裡氣上逆宜小柴胡加枳桔以治其悶未效以前湯對小陷胸一服如神本經往來寒熱似瘧非瘧柴胡雙解飲加桂枝雖有寒熱若不嘔清便自可脈緩者自愈本經自汗出者屬半表半裡證知膽家有熱也宜柴胡雙解飲加桂枝太陰經見證腹滿自利津不到咽者是足太陰脾經受邪身目發黃者標病腹滿咽乾者本病身熱腹滿咽乾或自利不渴者標病腹滿痛渴小便赤大便閉者本病須分寒熱治勿令誤也腹滿痛自利清穀不渴屬寒者宜溫之腹滿咽乾而渴或身目黃大便實者宜下之脈沉遲無力為裡寒沉實有力為裡熱本經腹滿自利不渴屬臟寒加味理中飲士材初起身不熱頭疼畏寒腹痛吐瀉手足冷小便白或嘔厄者本經直中寒也理中湯若不熱不疼手足冷氣口脈沉細內傷生冷也治中湯本經腹硬滿燥渴或腹痛大便實桂枝大黃湯本經身目黃口乾燥小便赤茵陳五苓散其黃不退者茵陳將軍湯少陰經發於陰則少陰為先六經惟此難治見證舌乾口燥是足少陰腎經受邪指甲青而身冷者標病口燥而渴者本病初起身熱脈沉麻黃附子湯證為標本俱病又身熱煩躁面赤足冷虛陽發躁者亦標本俱病口燥咽乾譫渴熱邪傳入者本病無熱惡寒面青肢冷脈沉吐利腹脹不受藥直中寒者本病須分直中傳經可溫可下不必拘於日數但見少陰證在直攻少陰但見真寒直攻真寒是為活法若見口燥咽乾而渴手足乍冷乍溫內實腹滿譫語便閉反惡熱者皆為熱證急當下之或見腹滿泄瀉清穀不渴或嘔吐惡寒引衣蜷臥四肢厥冷或下利身痛手指甲唇青或乾嘔小便清白皆為寒證急當溫之脈沉實有力而渴知其熱沉遲無力不渴知其寒諸脈沉無力者為裡虛可溫沉而有力緊實為裡實可下本經口乾咽燥急當下之六一順氣湯以救腎家將絶之水以存津液本經自利純清水心下硬痛譫語燥渴者急當下之六一順氣湯胃中自有燥屎結熱於內雖利清水乃旁流非內寒也故下之本經繞臍硬痛燥渴不大便內有燥屎也急下之本經先起頭疼惡寒發熱方除以後變出四肢厥冷乍溫大便閉燥渴譫語者乃因邪氣傳裡陽極似陰反兼水化謂之陽厥譬如物極而反急用六一順氣下之正謂亢則害其物承以制其極也以上皆傳經熱證本經初起惡寒或腹痛或吐瀉不渴引衣自蓋蜷臥沉重小便清白厥冷戰栗面如刀刮脈沉細無力無身熱頭痛者急溫之輕則加味理中飲重則回陽救急湯此少陰直中寒邪本經初起無熱惡寒四肢厥冷過乎肘膝兼之瀉利昏沉或腹痛此為陰厥急當溫之四逆湯或面青小腹絞痛蜷臥不渴腹脹不受藥脈沉者此夾陰傷寒也人參四逆湯本經不煩便作躁悶身冷脈來沉遲無力飲水不得入口此陰盛格陽回陽救急湯冷服其躁便止或陰躁欲坐泥水中與水飲不受面赤足冷脈雖大按之如無陰極發躁也宜四逆湯合生脈若身熱煩躁面赤足冷脈數大無力陽虛伏陰也五積散加減本經初起手指甲唇青腹痛嘔吐身如被杖脈細沉重怕寒謂之陰毒急用回陽救急湯溫之外灸關元氣海以復陽氣不效即死本經身發熱脈微沉亦有可汗者宜小辛之藥微汗之麻黃附子細辛甘草湯以其無頭痛故曰少陰證似太陽設若身不發熱豈可輕汗之乎本經證真寒至極煩躁面赤身微熱脈沉遲無力欲坐泥水中名陰極發躁即陰證似陽也用熱藥溫之回陽返本湯若誤用涼藥渴愈甚而躁愈急難治矣厥陰經見證煩滿囊拳者是足厥陰肝經受邪口吐涎沫者本病煩滿囊拳者標病雖從中治亦分寒熱二辨寒熱似瘧者標病熱邪傳入者本病直中寒邪者本病煩滿囊拳譫語而渴者當下之口吐涎沫厥冷小腹疼不渴者當溫之脈沉實有力知其熱沉遲無力知其寒浮緩不嘔清便者自愈仁齋病在太陰則手足漸冷脈漸沉在少陰雖發熱手足必冷脈必沉細在厥陰手足厥冷脈微而緩甚則唇青舌卷囊縮也本經先起頭疼惡寒發熱方除已後邪熱傳入肝經囊拳煩滿四肢乍冷乍溫譫語發狂消渴煩躁舌卷便閉此因毒氣入臟故囊縮急當下之六一順氣湯本經初起便四肢厥冷惡寒引衣蜷臥筋急唇青囊縮腹痛口吐涎沫不渴沉重脈沉遲無力急當溫之茱萸四逆湯即回陽救急湯加吳萊萸外灸關元氣海不效即死或小腹至陰痛面唇手足指甲俱青厥陰脈浮為欲愈不浮為未愈小建中湯脈沉短者囊必縮為毒氣入臟承氣湯下之利不止者四逆湯凡治傷寒須看舌上有無胎色見有白胎者是丹田有熱胸中有寒也宜小柴胡和解之此屬半表半裡證若舌上黃胎者胸中有邪熱也宜調胃承氣湯下之如舌上生黑胎芒刺者必死蓋舌乃心苗此水剋火也又曰舌上胎白色滑者邪未入腑屬半表裡宜和解舌胎黃色者熱邪已在胃腑宜下之必大便燥實脈沉有力大渴者方可下反此者不可下只宜涼瀉舌黑胎芒刺裡熱已極十有九死急用大承氣下之得法亦可不死凡治傷寒見渴欲飲水宜少少與之微和胃氣若不與胃中乾燥津液枯竭必然喘急而死如多與或不當與而與強與之則成水結胸水停心下為喘為咳為癃閉為瀉利等證宜五苓散加減分利小水為主凡治傷寒見吐蛔者因胃中虛寒蛔無穀食以養故上逆入膈雖有大熱忌下涼藥服之必死宜先以炮薑理中湯加烏梅二個川椒十粒服之待蛔定後以小柴胡退熱蓋蛔聞酸則靜見苦則安得辛則伏矣胸中有寒蛔上入膈大凶之兆健曰陽明腑證食熱傷蛔或斑毒傷蛔皆有吐蛔便蛔者又當以清涼解熱安之未可概視也凡交霜降後至春分前發者為正傷寒表證見用辛溫之藥發汗里證見用寒涼之藥攻下此與非時傷寒不同交春分後至夏至前有頭疼發熱不惡寒而渴者為溫病宜辛涼之藥解肌不可辛溫發汗里證見用寒涼之藥攻下若誤下之猶可無害誤汗之變不可言至三月後得此者為晚發治法同但與傷寒表證不同里證同交夏至後頭疼發熱不惡寒而渴為暑病即名熱病比溫病加熱矣亦止用辛涼之藥解肌不宜大發汗里證見用大寒之藥急攻下此與正傷寒表證不同里證同春夏秋三時亦有頭疼身熱惡寒而非傷寒者為感冒非時暴寒之類俱用辛涼之劑小發汗里證見者用寒涼之藥急攻下表證亦不與正傷寒同里證同凡四時有頭疼發熱惡寒身體倦痛骨節痠疼自汗微渴脈空浮大而無力為勞役感寒宜溫涼之劑溫經散寒切禁大發汗里證見者中和之劑加轉藥微下之不可急攻利四時有頭疼身熱惡寒老幼相傳者為時疫宜辛涼之藥解表里證見者急攻下從病制宜不與正傷寒同治法也一傷寒初得病無表裡證但狂言煩躁精彩不與人相當此熱結膀胱其人如狂太陽經之裡證自有太陽里藥不與陽狂同治一傷寒失於汗下使邪熱傳裡燥渴譫語小水自利大便黑小腹硬痛或身黃此下焦畜血如狂證也與陽狂不同治一傷寒小水不利大便實小腹滿燥渴譫語畏熱身目黃此濕熱發黃輕則疏利重則大下與血證發黃不同治一傷寒失於汗下血熱不散以致發斑不宜發汗輕者化重則下之一傷寒失於汗下邪熱傳裡水涸屎燥必發譫語或心下硬痛下利清水燥渴出語無倫此皆實證當寒涼之劑下之又有汗多亡陽或下後利不止身疼痛或自利清穀譫語者此皆虛證當辛熱之劑溫之此與狂言不同治一傷寒少陰證惡寒發熱無頭疼誤以大發汗使血從耳目口鼻中出者名陰血多不治此與衄血不同治一傷寒餘熱不除蘊在心胞精神短少冒昧昏沉睡中言語一二句名獨語宜涼劑清之此與譫語不相同一傷寒差後交接淫欲無病人反得病者名陰陽易宜清涼解毒治之與女勞復不同一傷寒失於汗下或因汗下後虛令人氣逆不相接續者為短氣分虛實治之此與喘證不同治一傷寒失於汗下或因飲水過多令人抬肩擷肚氣逆上者為喘分表裡水氣治之與短氣不同治一傷寒汗下太過或恣飲冷水水寒相傳虛逆聲濁惡而長為噦病輕則和解疏利重則溫散此與乾嘔不同治一傷寒熱在胃口與穀氣並上熏而為乾嘔分寒熱水氣治之此與噦不同一傷寒二陽或三陽經同病不傳者為合病分在經過經治之與並病不同治一傷寒一陽經先病未盡又過一經之傳者為並病分在經在腑治之與合病不同治復庵少陰脈沉始病反發熱似乎太陽有不同者其熱不翕翕然無頭疼可別少陰腹痛下利與太陰相似有不同者太陰不渴少陰則渴手足有厥溫之殊溫病與痙證皆與太陽相似有不同者痙證脈沉細溫病不惡風寒而渴傷寒與中暍相似其不同者傷寒不渴中暍則渴傷寒與冬溫相似其不同者傷寒脈浮緊冬溫脈不浮時行傳染與傷寒相似其不同者時行傳染脈不浮傷寒脈浮健曰冬溫與時行其邪亦風寒所襲豈無浮脈之診不必過於刻畫太陰中濕與太陽傷寒相似有不同者濕脈沉而細也暑脈虛細又曰微弱又曰弦細芤遲諸如此者與痙脈濕脈相似然證不同暑自汗面垢而渴濕則不渴身疼痙則身不疼也太陽中風見寒脈用大青龍證與太陽傷寒相似有不同者中風見寒脈有煩躁也麻黃證則無煩躁太陽傷寒見風脈用大青龍其證與中寒濕相似有不同者其脈浮緩寒濕則脈沉細微經云無少陰里證者蓋太陽與少陰為表裡今脈證俱屬太陽表故云無少陰里證也小青龍證與小柴胡證相似有不同者小青龍無往來寒熱胸脅滿痛之證但有乾嘔發熱而咳此為表不解水停心下也雖有或為之證與小柴胡相似終無半表裡證為異耳表裡海藏治傷寒須分表裡若表裡不分汗下差誤豈為上工如均是發熱身熱不渴為表有熱小柴胡加桂枝主之厥而脈滑為里有熱白虎加人參主之均是水氣乾嘔微利發熱而咳為表有水小青龍加芫花主之身涼表證罷咳而脅下痛為里有水十棗湯主之均是惡寒有熱而惡寒者發於陽也麻黃桂枝小柴胡主之無熱而惡寒者發於陰也附子四逆主之均是體痛脈浮發熱頭痛身體痛者為表未解麻黃湯主之脈沉自利身體痛者為里不和四逆湯主之以此觀之仲景表裡之法甚詳學者宜究心焉活人傷寒有表證有里證有半表半裡證有表裡兩兼證但見有無表裡證在表宜汗在裡宜下半在表半在裡宜和解表裡俱見隨證滲泄無表裡證用大小柴胡和之下之四逆湯證有先溫里乃發表桂枝湯證有先解表乃攻裡傷寒六七日目中不了了無表裡證脈雖浮亦有下之者少陰二三日無陽證亦有發汗者則又非表裡之所能拘不可不知也傷寒表證當汗里證當下不易之法也發表攻裡本自不同桂枝承氣安可並進然假令病人脈浮而大是表證當汗其人發熱煩渴小便赤卻當下是表裡證俱見五苓散之類假令傷寒不大便六七日頭痛有熱者是里證當下其小便清者知不在裡乃在表也當鬚髮汗是兩證俱見未可即下宜桂枝湯假令病人心下滿口不欲食大便硬脈沉細是里證當下其人頭汗出微惡寒手足冷卻當汗此亦兩證俱見者仲景所謂半在表半在裡也小柴胡湯主之又如太陽病表證未除而數下之遂協熱自利利不止心下痞硬謂表裡不解桂枝人參湯本太陽病醫反下之因而腹痛亦有表復有里桂枝加芍藥湯痛甚桂枝加大黃湯此皆仲景治有表復有里之法當以意推之無表裡證者傷寒四五日後以至過經不解無表證又於裡證無可下者皆以小柴胡隨證加減用之至十餘日外用之而不愈大便硬者可下乃用大柴胡下之以過經其人稍虛恐承氣大利耳仲景云病人無表裡證發熱七八日脈雖浮數可大柴胡下之陰陽復庵三陽證有合陽有純陽三陰證有盛陰有純陰合陽者經所謂合病是也純陽者經所謂脈陰陽俱盛大汗出不解者死又曰凡發汗服湯藥有不得汗者死謂陽熱甚而陰氣絶也故不能作汗二者俱是有陽無陰故曰純陽也盛陰者如少陰病身體痛手足寒骨節痛脈沉者附子湯主之謂手足寒身體痛脈沉寒盛於陰也純陰者如少陰病惡寒身蜷而利手足逆冷者不治謂無陽也又有寒客三陰極而生熱則傳陽明者有邪初中三陰則寒故宜溫藥發汗及寒極變熱則宜寒藥下之蓋三陰三陽皆能自受邪不止自太陽經傳也其三陽入腑之外三陰變熱入腑者往往有之不可不察耳有經之陰陽以臟腑言臟為陰腑為陽也有病之陰陽乃外邪之陰陽陰氣陽氣是也陰陽二氣皆能犯臟腑故陽氣犯太陽則為傷風惡寒而有汗陰氣犯太陽則為傷寒惡寒而無汗在太陽未得解轉入陽明少陽二經則純乎陽然不如太陽之易治若未能罷以次傳入陰經則為陰中之陽蓋陽經之陽氣來入陰經雖有自利欲寐唇青手足厥冷舌卷囊縮等證亦不可妄投熱藥惟宜瀉其陽之在陰經者若陽病下之太過陽氣已脫遂變為陰所謂害熱未已寒病復起或初得病便是陰證此陰中之陰蓋陰氣攻陰經陰自得傳非陽經傳來只當以溫藥回其陽故陽入陰者變陽以救陰陰入陽者用陽以救陽二者不可不辨原是陽證因汗下太過遂變成陰便當作陰證治卻不可謂其初先是陽拘於陽傳陰之説乃是三陽壞證轉為陰也此為陽之反而非陽之傳初病是陽經見頭疼以次陽傳入陰頭略不疼不可便謂不疼為陰證須問其得病之初頭疼與否傷寒有陰證而頭或疼未有正陽證而頭略不疼者有陰證而反發熱未有正陽證而身不熱者有陰證而或小便自赤未有正陽證而小便不赤者此正法也仁齋傷寒治法陽有此證陰亦有此證似陽而陰似陰而陽最難分別毫釐之差千里之謬如陽毒陰毒風溫濕溫吐血吐蛔兩感百合等證當並遵南陽書用藥不再具陳其餘大綱不出陰陽雖纖悉未能即盡不妨於活人書參考如胃中冷必吐蛔大概知為陰也然亦有陽證吐蛔者必兼看別證如何不可專以胃冷為説也曾記一人陽黃吐蛔又大發斑陽毒證口瘡咽痛皆以冷劑取效豈非有陽證乎健曰此即胃熱嘔甚則長蟲出已於前條注明仁齋可謂先得我心之同然者矣陽證者面紅光彩唇紅口乾舌燥能飲涼湯冷水其人身輕易為轉動常開眼見人目睛了了喜語言其聲響亮口鼻之氣往來自然小便或赤或黃大便或祕或硬手足自溫爪甲俱紅活陰證者面青黑或有虛陽泛上雖亦赤色而不紅活光彩其人身重難以轉側或喜向壁臥或蜷臥欲寐或閉目不欲見人目睛不了了懶言語語無聲或氣難布息鼻中呼不出吸不入或往來氣俱冷或時躁熱煩渴不能飲水面上有如刀刮惡寒唇口俱青或紫舌色或青紫或白胎鋪滿而滑不見紅色手足自冷爪甲或青或紫血不紅活小便清白或淡黃大便不實或瀉雖肌表有熱以手按之不甚熱陰甚者則冷透手不可便以面紫赤煩渴為論也健曰陰陽證象仁齋此段最明可稱醫林冰鑑陽證似陰者乃火極似水也蓋傷寒熱甚失於汗下陽氣亢極鬱伏於內反見勝已之化於外故身寒逆冷神氣昏沉狀若陰證也大抵唇焦舌燥能飲水大便閉硬小便赤澀設有旁流內必燥屎結聚再審有失氣極臭者是也其脈雖沉切之必滑而有力或時躁熱不欲衣被揚手擲足或譫語此陽證也輕者人參白虎或小柴胡合解毒湯內實者下之以調胃承氣湯有潮熱者大柴胡加芒硝大實大滿閉而不通者大承氣下之必須審察輕重酌而用之蓋此與陽盛拒陰同王太僕所謂身寒厥冷其脈滑數按之鼓擊於指下者是陽盛拒陰非寒也陰證似陽者乃水極似火也蓋傷寒傳變或誤服涼藥攻熱太速其人素本腎氣虛寒遂變陰證冷甚於內逼其浮陽之火發外必面赤發躁身有微熱渴欲飲水復不能咽大便閉結不通小便淡黃或嘔逆或氣促或鄭聲或咽痛或鼻血點滴所以狀似陽證或者不識妄投寒涼下咽立斃如切其脈沉細微遲者急以通脈四逆湯倍人參附子以接其真陽之氣設或稍遲雖參附亦不能救矣此與陰盛格陽同王太僕所謂身熱脈數按之不鼓擊於指下者此名陰盛格陽非熱也東垣又謂面紅目赤煩渴引飲脈來七八至按之則散者此無根之脈用薑附湯加人參而愈是也健曰此二節辨陰極陽極昭然較之諸説覺仁齋本領不凡夫陰毒者其人腎虛素有積寒在下或因欲事之後著寒或誤服涼藥或食生冷內既伏陰復加外寒內外皆寒遂成陰毒也蓋積寒伏於下微陽消於上趙氏所謂陰氣極盛陽氣極微則成毒宋迪云陰毒傷寒則額上手背冷汗出不止其毒漸深則鼻如煙煤舌上胎黑而滑其候目睛疼頭重身重背強體痛小腹裡急或臍下痛或咽喉不利或心下堅硬或氣促脹悶或嘔咳不止甚者唇青面黑舌卷囊縮四肢厥冷脈沉細而遲或伏而不出海藏謂二三日間或可起行不覺甚重或時陰火上衝頭面烘熱色赤煩躁狀似陽證若誤投涼藥則渴轉甚躁轉急而難矣宜於氣海關元速灸二三百壯以手足和暖為度仍進正陽散返陰丹類令內外通達陽氣復而大汗解矣若病勢困重六脈附骨按之即無或一息八至以上至此則難治矣但於臍中用蔥尉法或艾灸三五百以來手足不溫者不治矣溫者以前藥助之若陰氣散陽氣復漸減熱藥而治之海藏急用還陽退陰之藥則安惟補虛和氣而已凡陰病不宜發汗如氣旺脈大身熱未差汗之無妨或寸口小而尺脈微大亦是積陰感於下則微陽消於上陽氣不守耳劉氏活人謂陰毒為陰氣獨盛陽氣暴絶此言不守稍與義有間矣然又不若趙氏云陰氣極盛陽氣極微為陰毒陽氣極盛陰氣極微為陽毒視竭絶之語尤明矣健按陰陽二毒群公但以陰極陽極立言而未達其為毒之義也觀仲景書本旨陰毒者其人平素陽虛陰盛復外感於寒內傷生冷一塊純寒標本皆陰邪成病故名陰毒陽毒者其人平素陰虛陽亢復外感於熱又傷辛熱結為純熱標本皆陽邪成病故名陽毒陰毒以溫熱救之陽毒以寒涼解之為毒之義詳矣又何必拘泥穿鑿以滋惑哉活人夫手足逆冷而大便閉小便赤或大便黑脈沉而滑者陽證似陰也重陽必陰重陰必陽水火之變也得此證者輕者白虎湯甚者承氣湯傷寒失下氣血不通令四肢逆冷此是伏熱深故厥亦深速用大承氣下之汗出立瘥仲景所謂厥應下之者此也傷寒若遇陽獨盛陰氣暴絶者必發躁狂走妄言面赤咽痛身斑斑若錦紋或下利赤黃脈洪實或滑促宜酸苦之藥令陰氣復而大汗解矣陽毒升麻湯梔子仁湯黑奴丸類選用身微熱煩躁面赤脈沉而微者名陰證似陽也陰發躁熱發厥物極則反也大率以脈為主諸數為熱諸遲為寒無如此驗也身微熱者裡寒故也煩躁者陰盛故也面戴陽者下虛故也若不看脈以虛陽上膈之躁誤為實熱反與涼藥則氣消成大病矣外臺云陰盛發躁名曰陰躁欲坐井中宜以熱藥治之故仲景以陰證面赤者四逆加蔥白主之健曰近習不明此理者多如遇此陰躁面赤者非用寒涼即以滋陰為事其不死者幾希東垣寒涼之藥入腹周身之火得水則升走陰躁之極故欲坐井中是陽已先亡醫猶不悟復認為熱重以寒藥投之其死何疑焉或因吐因嘔因嗽而發躁蒸蒸身熱如坐甑中欲得去衣居寒處或飲寒水則便如故振寒復至氣逆短促胸中滿悶欲絶甚則口開目瞪聲聞於外涕淚涎痰大作其發躁須臾而已如前六脈弦細而澀按之虛此大寒證也以辛甘溫之劑大瀉南方北方則愈節庵凡初病無熱便四肢厥冷或胸腹中滿或嘔吐腹痛下利脈細無力此即真陰證非從陽經傳來便宜溫之不可少緩四逆湯類凡腹痛腹滿皆是陰證而有微甚不同治難一概自利腹痛小便清白宜溫之理中四逆者微甚用輕者五積散無脈者通脈四逆湯使陰退而陽復也傷寒惟陰證最難識自然陰證人皆可曉及至反常則不能知矣如病起頭不疼身不熱手足厥冷好靜沉默不渴吐利腹痛脈沉細遲人共知為陰證矣若發熱面赤煩躁不安揭去衣被飲冷脈大人皆不識認作陽證誤投寒藥死者多矣必須憑脈下藥為當不問浮沉大小但指下無力或按至筋骨全無力者便是伏陰不可與涼劑服之必死急與五積散一服通解表裡之寒隨手而愈若更有沉寒之甚必用薑附以溫之切忌發泄脈雖洪大但按之無力與重按全無者便是陰證也河間或裡熱內盛陽厥極深皆因失下而成以致身冷脈微昏饋而死切不得以寒藥下之誤下即死俗工妄認陰厥便欲換真武四逆溫熱之劑投之下咽立斃殊不知此證乃陰耗陽竭陰氣極弱謂之耗陽厥極深謂之竭畜熱怫鬱欲絶者當此之際寒劑熱劑俱不可投但進涼膈解毒以養陰退陽宣散畜熱脈氣漸生必得大汗而愈亦有無汗氣和而愈者未愈宜解毒合承氣下之次以解毒涼膈天水合而為一調和陰陽洗滌臟腑則其他別證自不生矣有大下後熱不退再三下之熱愈甚脈微氣虛力弱不加以法則無可生之理若輟而不下則邪熱極甚而其陰氣極衰脈息斷絶必不可救此證是下之亦死不下亦死醫者到此活人殺人一彈指間其不至手足失措者幾希矣經云三下而熱不退者即死後人有四五下及十數行而生者此幸中耳活者未一二死者及千百切不可以此為法但依前法用解毒合涼膈調之使陽徐退陰漸生庶不失人生命通一子傷寒説景嶽按傷寒一證感天地陰厲之氣變態不測最為凶候治有一差死生反掌在古人垂訓之多何止百家千卷其中立法之善無出仲景用藥之妙須遜節庵凡於曲折精微靡不詳盡余復何言然猶有不能已者在於條目之浩繁而後學求之不易也觀陶氏家祕的本曰傷寒治法得其綱領如拾芥若求之多歧則支離破碎如涉海問津矣蓋脈症與理而已斯言也豫殊佩之然求其所謂綱領者謂操其權要切於時用者也所謂多歧者謂檢遍方書無方可用者也所謂詳證者謂表裡陰陽寒熱虛實之辨也所謂理者謂見之真法之要也得其理則治無一失矣是以法必貴詳用當知約詳而不約徒詳何益誠若望洋無所用之地矣豫請約之曰凡治傷寒其法有六曰汗吐下溫清補也蓋吐中有發散之意可去胸中之實可舉下陷之氣若是實邪在下者不可用之故所用既少法亦無多至於舍吐之外而切於用者唯汗下溫清補五法而已所謂汗者治表法也寒邪在表不汗從何而解然汗法有三曰溫散曰涼解曰平解溫散者如寒勝之時陰勝之臟陽氣不充則表不易解雖身有大熱亦必用辛溫勿以寒涼為佐即寒無犯寒之謂也涼解者如炎熱熾盛表裡枯涸則陰氣不榮亦不能有汗宜用辛涼勿以溫熱為佐即熱無犯熱之謂也若病在陰陽之間既不可溫又不可涼則但宜平用求其解表而已然無表證者不可汗似表非表者不可汗咽中閉塞者不可汗諸動氣者不可汗淋家不可汗諸亡血者不可汗脈微弱者無陽也不可汗脈微惡寒者陰陽俱虛也不可汗吐下其可汗者如仲景云凡發汗溫服湯藥其方雖云日三服若病劇不解當促之半日中盡三服又云凡作湯藥不可避晨夜覺病須臾即宜便治不等早晚則易愈此所以汗不嫌早也所謂下者攻其內也實邪內結不下何從而去然表未解者不可下諸虛者不可下陽微者不可下諸外實者不可下咽中閉塞者不可下動氣者不可下脈弱者不可下脈浮而大者不可下病嘔吐者不可下大便先硬後溏者不可下非有大滿實燥堅者不可下此所以下不嫌遲也所謂溫者溫其中也臟有寒氣不溫之何自而除有客寒者寒自外入者也有主寒者氣虛者也蓋氣為陽陽不足則寒生於中寒即陰證之屬溫即兼乎補也所謂清者清其熱也有熱無結本非大實不清之何由而散表熱者宜於清解裡熱者宜於清降熱即陽氣之屬清即類乎瀉也若此四者古人發明已盡余不過述其要耳學者仍當由博而約勿謂止於是也惟補之一字則所繫由切而人多不易知夫用補之法豈止因於中氣蓋實兼乎表裡如表邪不解屢散之而汗不出者陰氣不能達也蓋汗即水也水既不足汗自何來人知汗屬陽分升陽可以解表而不知汗生於陰補陰最能發汗今有飲水而汗出者即其義也又如內熱不解屢清之而火不退者陰不足也人知惟寒可以去熱而不知壯水方能息火也健按前篇行文言順理切至此節以汗為水其注意在乙癸同源而説也然精血到底兩途況傷寒法重陰陽治分表裡別經腑而施汗下尤在氣血虛實邪正盛衰為本若表汗不出有陽氣不能鼓動者當補陽而汗泄有陰血不能輸化者當補陰而汗至是汗為血化無人不知也汗多亡陽古今所語也蓋汗為心之液心為陽臟液去舍空故曰亡陽汗多則腠理疏而皮毛之氣泄皮毛為表為陽因名亡陽理也豫以為汗實血化應曰亡陰亦理也但只與血言未嘗與水言也夫水即精化腎主之而腎藏之北方天乙之精生化之根非相火吸之不出各有當行之路豈邪熱迫之而能作汗乎所喻飲水得汗者此暑熱為病炎帝行令之時涼水可以消暑飲之而得汗解是即一回雨後庶物咸蘇之義非傷寒表汗不出之比也壯水息火者此陰虛勞病之法更非傷寒治分表裡汗下者可同語景嶽本系名家長言廣論筆氣勝人於此以汗為水之説失之惜哉又如正氣不足邪氣有餘正不勝邪病必留連不解有如是者不可攻邪但當實其中氣使正氣內強則根底無害逼邪外出則營衛漸平所謂溫中自有散寒之意此不散表而表自解不攻邪而邪自退不治之治而非人之所知也唯是用溫之法則臟有陰陽藥有宜否宜陽者必先於氣宜陰者必先乎精陽以人參為主而耆朮升柴之類可佐之陰以熟地為主而茱萸山藥歸杞之類佐之然人參隨熟地則直入三陰熟地隨耆術亦上歸陽分故用藥當如盤珠勿刻舟求劍且人傷於寒而傳為熱則陽勝傷陰者多故利於補陰者十之七八利於補陽者十之二三然陰中非無陽氣佐以桂附則其陽復於命門佐以薑草則元氣達於脾胃藥不及病與不藥同故當隨病輕重以為增減此余之百戰百勝者所活已多非謬説也或曰古人治傷寒皆重在汗吐下三法而後於補今子所言則是諄諄在補而後於攻者何也余曰三法已悉無待再言獨於用補殊未盡善故不得不詳明其義以補古人之未備試以傷寒論觀之曰陰證得陽脈者生陽證得陰脈者死迄今説者無不以為然愚謂陽證陽脈陰證陰脈本為順證可以無慮惟陽證陰脈則逆疾也為傷寒之最難故古人直謂之死則其無及於此也可知矣余所謂切於補者正在此也今以余所經驗是正虛感邪者多見陰脈蓋證之陽者假實也脈之陰者真虛也陽證陰脈即陰證也觀陶節庵曰凡察陰證不分熱與不熱須憑脈下藥至為切當不問脈之大小浮沉但指下無力重按全無便是伏陰不可與涼藥服之然則脈之沉小者人知其為陰脈矣而浮大亦有陰脈則人所不知也治以涼藥猶且不可況其他乎故余於此證必舍證從脈所以十全其九然所用之法多非本門正方隨手而應見者無不異之夫亦何異之有藥對證而已余請再悉其義夫傷寒之千態萬狀只虛實二字足以盡之一實一虛則邪正相為勝負正勝則愈邪勝則死死生之要在虛實間耳若正氣實者即感大邪其病亦輕正氣虛者即感微邪其病亦甚凡氣實而病者但去其邪則愈矣放膽攻之何難之有此而當余亦不過吹灰拉朽耳無足齒也雖付之庸手自無難愈即不治之俟其經盡氣復亦無不愈矣何患之有此譬如兩敵相持主強則客不能勝必自解散而去故凡正氣實者治與不治皆無慮也所可慮者唯挾虛傷寒耳凡疾病相加未有正氣不竭而致死者強弱相攻未有根本不傷而敗者此理勢之必然者傷寒之難止於此耳奈何庸淺之輩初不識人虛實但見發熱動手便攻夫不可攻而攻之必元氣不足而強攻其邪則邪氣未去而正氣因先敗矣如此殺人罪將誰委又其最可怪者則有曰傷寒無補法惑亂人心莫此為甚獨不觀仲景立三百九十七法而脈證之虛寒者一百有餘定一百一十三方而用人參者三十用桂附者五十有餘此下如李東垣朱丹溪陶節庵輩所用補中益氣回陽返本溫經益元等湯皆未嘗不用補也孰謂傷寒無補法耶然此等之法固為不少但在余則猶以為未盡在人則目以為異常不唯異常而且曰無之高明者豈其然哉矧今人之患挾虛傷寒者十常六七傳誦傷寒無補法者十之八九虛而不補且復攻之余目觀其受害者蓋不可勝紀矣心竊悲之故力辨於此欲以救時弊耳非好補也觀者唯加詳察則蒼生大幸健觀景嶽全書其所學原可力敵古人然其道行壯地善論先天偏於溫補故於傷寒亦醉心於補而以汗為水以氣精為陰陽乃大夫經旨矣夫陰陽有先後天之別先天之陰為腎中之水先天之陽為腎中之火若患勞怯水衰火旺宜壯水之主以制陽光所當究也後天之陽為氣陰為血百病之所關死生之所繫誰不知養氣血以為生乎故人身陰陽專論後天氣血而以脾胃為本不究先天之腎與精也且五臟各有陰陽是物物一太極也而精者特腎之陰天乙之水耳唯氣血能貫注經絡循環無端其虛實關乎性命傷寒之邪入營與衛而傳經腑分表裡以治於腎精有何涉乎凡三陰三陽六經傳變之證陽病主氣與熱陰病主血與寒此萬古不易之法也烏可謂宜陽者氣虛而以人參耆術為治宜陰者精虛而以熟地萸杞為功不分邪正盛衰概用溫補並非傷寒家藥籲仲景立論以來群賢發揮盡致未聞此説就景嶽所舉一百十二方中用參用附者若干獨無熟地萸杞等物其自言亦曰非本經正藥在人目以為異夫乃盾辭之窮只可道其可道而不可與人為法者也嗚呼醫理淵微豈能一轍但寒成法毫釐之差千里之謬若精宜傳少陰之承氣證即直入少陰之麻黃附子細辛證及真寒厥冷之回陽四逆證也止有鹹寒清熱以存陰辛熱溫經以救逆從未有熟地輩沉陰膩滯以滋陰者以陰濟陰是於水益深於火益烈不免迷悶脈沉口噤而死者衆矣反曰能十全其九足見其言之誇書之誕不脫術家口氣歷代方書所無而敢倡此以啓近習滋陰之弊殺人甚速作俑之罪安所逃乎蓋仲景方法原可變通未嘗或離發的而經腑陰陽理自天然孰敢背遠若是方者乃六味火料此錢仲陽為調理小兒真陰未旺而設不能兼治他病況傷寒乎景嶽往往恃為心印則其偏有素矣要知傷寒時氣大忌滋陰犯之莫救俗工不知利害每至技窮以此卸咎殊不知毒勝於砒而醫家病家終不醒悟然識者見之實可哀也此當今害人之大患豫歷久見多作書本意因此而起故直指其非以告學者勿循俗習毋入迷途庶不誤人性命而為特達之士矣
