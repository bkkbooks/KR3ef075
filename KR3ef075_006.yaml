body:
  text: 傷寒直指卷五辨陽明病脈讓治第八問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也陽明胃也邪自太陽經傳之入腑者謂之太陽陽明經曰太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯即是太陽陽明脾約證也正陽陽明者胃家實是也邪自陽明傳入腑者謂之正陽陽明經曰陽明病脈遲雖汗出不惡寒其身必重短氣腹滿而喘有微熱者欲解可攻裡也手足濈濈然汗出者此大便已硬也大承氣湯主之即是正陽陽明胃家實也少陽陽明者發汗利小便已胃中燥煩實大便難是也邪自少陽傳入腑者謂之少陽陽明經曰傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃即是少陽陽明也宇泰太陽陽明當用調胃承氣故附證於太陽篇中正陽陽明當用大承氣少陽陽明當用小承氣但少陽禁汗下故去芒硝之峻劑當少少與之也又須識太陽陽明可脾約丸少陽陽明又可用大柴胡也觀子三陽明均為胃實便結然所入之經不同故分之有三當太陽病時脾苟能為胃行其津液則陰陽和營衛通汗出邪解而病已矣其致入腑者脾失約制不能無過也故亦曰脾約非麻仁丸之脾約耳正陽者病在本經入腑而成胃實三陽明獨於此言冒實者政見與經病之有殊也三陽本為三禁乃妄汗利以奪其津液內熱躁煩轉屬陽明明矣夫當其在各經之時實有三者之不同及其既已入腑一熱實不大便而已豈可因是而分三治經於敘列其由之下蓋入腑而猶有他經未盡之證則太陽篇中桂枝柴胡諸條已詳言之若止屬入腑而有上中下微甚之分則當如後所列三承氣以分別施治故不重言湯劑政見未可以一法擬也陽明之為病胃家實也邪入陽明熱毒留結則胃家為實華佗曰熱毒入胃要須下之不可留於胃中是知邪在陽明為胃家實也健曰陽明有在經在腑之分邪傳入經即曰胃實猶當解肌以泄之元化所云要須下去者此邪已入腑必譫語舌焦燥矢結聚腹實拒按之證方可下也若下早多變問曰何緣得陽明病答曰太陽病發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者此名陽明也本太陽病不解因汗利小便亡津液胃中乾燥太陽之邪入腑轉屬陽明古人登廁必更衣不更衣者謂不大便則胃中物不得泄故內實胃無津液加之畜熱大便則難為陽明裡實健曰此在不更衣三字為裡實屎燥與調胃承氣湯下之以轉其燥問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也陽明病為邪入腑也邪在表身熱汗出而惡寒邪既入腑則表證已罷故不惡寒但身熱汗出而惡熱也健曰陽明為半里汗出不惡寒必辨其經腑經宜解而腑宜下若治差必有下陷之禍矣問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也邪客陽明當發熱而不惡寒今得之一日不發熱而惡寒者邪未全入腑尚帶表邪若表邪全入則更無惡寒必自汗出而惡熱也健按病得一日不發熱而惡寒是未歸定經惡寒已而自汗惡熱乃屬陽明初起證將自罷者有之成氏稱邪全入是在腑矣誤甚問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也胃為水穀之海主養四旁四旁病皆能傳入於胃入胃則不復傳如太陽傳之入胃則更不傳陽明陽明傳之入胃則更不傳少陽少陽病傳之入胃則更不傳三陰復庵陽明居中萬物所歸無所復傳如太陽入胃則不傳陽明云云其三陰又有自受邪變熱入胃者如傷寒脈浮而緩手足自溫者系太陰此太陰之邪入陽明也少陰病六七日腹脹不大便者急下之此少陰之邪入腑也下利有譫語者燥矢也小承氣湯此厥陰之邪入腑也三陰變熱入腑者往往有之是六經皆入腑為止極也觀子厥應下之厥深熱深大承氣政厥入腑者又腹滿咽乾舌卷囊縮亦系入腑證下不嫌遲何以二日隨屬陽明急下之證亦多雖病方起而陽明熱邪已深非下奪之不可然在得之一日或帶太陽證者良有之不知其邪已全在腑惡寒即自罷而裡熱證大作矣陽明居中以下又發明入腑無復他傳之理既見已入腑安得復有他經之證哉舉一太陽之證而諸經俱在言表矣健按成注傳之入胃句即萬物所歸之義也入胃是入腑也不然何太陽傳陽明而復有陽明傳之入胃句令人似有疑竇蓋傳者傳陽明之經入胃者入陽明之腑知此則經腑自明而表裡俱均判矣經邪應解而腑邪應下又各顯然不獨三陽之邪實入腑三陰之邪亦終入腑故曰萬物所歸因陽明居中為水穀之海氣血之總司爾但入腑之邪輕重不一當察脈舌而以三承氣酌下則愈故曰無所復傳本太陽初得病時發其汗汗先出不徹因轉屬陽明也傷寒傳經一日太陽二日陽明此太陽傳及故曰轉屬陽明觀子上發汗是汗之太過故液亡胃燥而穀食結聚及未當下而誤下之不當利小便而妄利之皆是矣此發汗是汗之不及全在不徹字面既不徹則邪仍在故為傳經是二者入腑雖同而致病之由不同健曰汗不徹則太陽之邪未解而傳陽明當與柴葛解肌為事傷寒發熱無汗嘔不能食而反汗出濈濈音七然者是轉屬陽明也傷寒發熱無汗嘔不能食者太陽受病也若反汗出濈濈然者太陽之邪轉屬陽明也經曰陽明病法多汗傷寒三日陽明脈大三日邪傳陽明之時經曰尺寸俱長陽明受病當二三發陽明氣血俱多又邪並於經是以脈大為陽明證傷寒脈浮而緩手足自溫者是為系在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也浮為陽邪緩為脾脈傷寒脈浮緩太陰客熱邪在三陽則手足熱邪在三陰則手足寒今手足自溫知系在太陰也太陰土也為邪蒸之則色現於外當發身黃小便自利者熱不內畜不能發黃至七八日大便硬者即太陰之邪入腑轉屬陽明也觀子三陰各有本經受邪但病經絡者如此條類也雖不從三陽來其感邪同在經又同故皆化熱皆傳入腑如復庵所云是矣浮者表邪緩者脾診手足溫者脾證曰是為系在者政見病止本經與傳自他經者不同也邪熱蒸陰之濕多見身黃不發黃小便利者脾濕猶行也濕去熱獨留胃汁必干而便結矣三陽云傳邪既無入腑三陰經邪又皆入腑者胃為水穀之海土之位萬物始於土終於土故皆以入腑為極又須知熱必入腑寒但入臟也健曰脾主四肢熱客於太陰脾經則脈浮緩是為系在脾主肌肉色按中央熱鬱發黃小便利者熱邪已泄不作黃已至大便硬屬陽明腑證當下矣但此言太陰本經受邪不因太陽之邪傳入故列於陽明篇中若太陽傳入之證經言尺寸俱沉腹滿嗌乾而為裡熱矣此脈浮為太陰表脈緩為太陰本象脈經言脾脈緩是也豈同太陽傳入之邪乎林氏謂不同三陽來其感邪民二句甚當傷寒轉系陽明者其人濈濈然汗出也傷寒則無汗陽明法多汗此傷寒之邪轉系陽明故濈濈然微汗出觀子夫陽明有入胃在經之殊此所言止入腑之證耳若經病則序例言之本篇未之及也又葛根白虎俱陽明要劑本篇亦不之列則知仲景書不傳者多矣陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之則腹滿小便難也脈浮在表緊為在裡此陽明中風口苦咽乾腹滿微喘者熱傳於裡也發熱惡寒者表仍未解也若下之里邪雖去表邪復入於裡又亡津液故使腹滿而小便難也婁氏陽明宜下先列在經與裡虛不宜下者於前仲景慎重之意可見宇泰誤下則亡陰無陰則陽無以化故腹滿小便難許學士云此小柴胡湯觀子既為陽明中風當如前法與桂枝失與而至風邪日熾與陽明之經邪相壅結是以內有口咽之熱證外復發熱惡寒表仍未解也然此中風之邪與陽明經氣交病耳豈陽明內實之比其腹滿喘者熱蘊於裡裡氣不通也若誤以喘滿為可下而下之邪轉陷入腹滿不為解且津液亡而小便難矣當照脈浮而緊者弦也句看宜小柴胡加葛根健曰柴胡加葛根但能解陽明之表熱不能除陽明之裡熱須加入石膏則表裡之熱俱解矣陽明病若能食名中風不能食名中寒陽明病以飲食別風寒者以胃為水穀之海風為陽邪陽殺穀故中風者能食寒為陰邪陰不殺穀故傷寒者不能食陽明病若中寒不能食小便不利手足濈然汗出此欲作固瘕必大便初硬後溏所以然者以胃中冷水穀不別故也陽明中寒不能食者寒不殺穀也小便不利者津液不化也陽明病法多汗則周身汗出此手足濈然汗出而身無汗陽明中寒也固瘕者寒氣結積也胸中寒甚欲留結而為固瘕津液不得通行大便必硬若汗出小便自利者為實也此小便不利水穀不別雖大便初硬後必溏也宇泰厚朴生薑甘草半夏人參湯理中湯類觀子胃熱固結胃冷亦結所謂有熱秘冷秘也以不能食之中寒小便不利之津液虛少虛陽復隨四末而妄泄於外大便有不幹燥者乎然此豈是實熱在腑之比名曰固瘕瘕者氣寒而有物假之結聚皆由胃冷不能制水穀之故大便初雖硬後必溏未可妄攻也陽明病欲食小便反不利大便自調其人骨節疼翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝谷與汗共並脈緊則愈陽病客熱初傳入冒胃熱則消穀而欲食陽明病熱為實者則小便當數大便當硬今小便反不利大便自調者熱氣散漫不為實也欲食則胃中谷多內經曰食入於陰長氣於陽谷多則陽氣勝熱消津液則水少經曰水入於經其血乃成水少則陰血弱要略曰陰氣不通即骨疼其人骨節疼者陰氣不足也熱甚於表者翕翕發熱熱甚於里者蒸蒸發熱此熱氣散漫不專著於表裡故翕翕如有熱狀奄忽也忽然發狂者陰不勝陽也內經曰陰不勝其陽則脈流薄疾並乃狂陽明蘊熱為實須下之愈熱氣散漫不為實者必待汗出而愈故云濈然汗出解也水穀之等者陰陽氣平也水不勝穀氣是陰不勝陽也汗出則陽氣衰脈緊則陰氣生陰陽氣平而無偏勝則愈故云與汗共並脈緊則愈宇泰桂枝湯羌活湯類石山水陰氣谷陽氣傷寒以陽為主水不勝谷乃陰勝陽病漸向安故陰氣與汗共並而散因見脈緊緊者陰寒脈也此則變熱入腑何以脈緊蓋由陰氣與汗共並而然也且緊與長相類長為陽明本脈耳健曰此證乃風中陽明熱傷陰血故骨節失養而疼自汗不解故忽發狂是風與熱並陰不勝陽而作宇泰設桂枝羌活二湯此太陽表劑雖能散風不能除熱方內須重加石膏以涼散之於狂庶有當而易已陽明病欲解時從申至戌上四月為陽土旺於申酉戌向旺時是為欲解陽明病不能食攻其熱必噦所以然者胃中虛冷故也以其人本虛故攻熱必噦不能食胃中本寒攻其熱復虛其胃虛寒相搏故令噦也經曰關脈弱胃氣虛有熱不可大攻之熱去寒起此之謂也觀子陽明譫語潮熱不能食者須詳別之未可便以不能食為實證也若誤攻之熱去噦作矣噦者呢逆也妄下後胃中虛冷即致之然則烏可以陽明概為宜下哉健曰陽明病不欲食當按其胃中虛實察其舌色有無則表裡寒熱自見虛則舌淡無胎實則舌燥黃焦虛者經邪實者腑熱虛宜溫經以鼓胃實宜瀉熱以回津惜文之殘缺未備耳陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作谷疸雖下之腹滿如故所以然者脈遲故也陽明脈遲則邪方入里未為實也食入於陰長氣於陽胃中有熱食難用飽飽則微煩而頭眩者穀氣與熱氣相持也兩熱相合消摶津液必小便難利者不能發黃言熱得泄也小便不利則熱不得泄身必發黃疸者黃也以其發於穀氣之熱故曰谷疸熱實者下之則愈脈遲為熱氣未實雖下之腹滿亦不減也經曰脈遲尚未可攻卿子此條同愈後損谷則愈證由胃虛食鬱致熱故曰谷疸成注先云胃中有熱食難用飽脈遲故也句似失之觀子脈遲則陽明之氣虛虛則下而不運所以食入反助邪而煩且眩也小便難者濕熱之氣下瘀也是穀氣與疸氣交病矣攻可去實豈腹滿脈遲之所宜乎健曰此因陽明冒有濕熱停畜故脈遲而食不宜飽濕氣之脈濡滯近乎遲象食氣與濕熱相摶反煩而眩矣小便利則濕氣下化而不為疸小便不利則濕熱畜聚與所食之穀氣並而為疸矣宜胃苓合茵陳湯治之陽明病法多汗反無汗其身如蟲行皮中狀者此以久虛故也胃為津液之腑氣虛者津液少病則反無汗胃候身之肌肉其身如蟲行皮中者知胃久虛也健曰陽明病應有汗此反無汗身如蟲行皮中乃邪氣在經經氣虛不能作汗故留連攻刺於皮肉之間也當與升陽益胃湯以解其肌令汗可泄而愈陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛陽明病法多汗反無汗而小便利者陽明傷寒而寒氣內攻也至二三日嘔咳而支厥者寒邪發於外也苦頭痛不咳不嘔手足厥者是寒邪但攻裡而不外發其頭亦不痛也叔微小便利者寒邪內攻肢厥頭痛者寒邪外攻也觀子須識陽明亦有手足厥證胃主四末中虛氣寒即致也然頭苦痛而咳自與陰寒但厥者異矣此類數條最為難解缺疑以俟明者未敢妄為穿鑿也健曰無汗而小便利者邪猶在經而未入於裡因無汗故小便利也二三日邪熱入胃則嘔上衝於肺則咳陽明主乎四末手足厥者邪熱結而上衝正氣不能外衛於四末故頭痛作而手足厥矣上無頭痛咳嘔則手足亦和而不厥經文直達其理明系邪熱內郁皆因無汗之故成氏反言寒氣內攻又言寒邪外達二說盡謬叔微從而附和觀子云自與陰寒但厥者異已明知不是寒厥而欲言不逮耳若不表而出之則後學墮迷無底矣此亦解肌湯證何用拘泥如厥甚者加石膏得涼而汗泄可愈下條竟是石膏湯證加薄荷甘桔即瘥也陽明病但頭眩不惡寒故能食而咳其人必咽痛若不咳者咽不痛陽明病身不重但頭眩不惡寒者陽明中風而風氣內攻也經曰陽明病若能食名中風風邪攻胃胃氣上逆則咳咽門者胃之系咳甚咽傷故必咽痛若胃氣不逆則不咳其咽亦不痛也宇泰胃氣主嘔肺氣主咳成氏以胃氣上逆則咳恐非蓋風邪傷肺也肺雖不為足經然肺主氣風為氣類陽明病無汗小便不利心中懊憹者身必發黃陽明病無汗而小便不利此熱蘊於內不得發越心中懊憹者熱氣鬱蒸欲發於外而為黃也觀子懊憹為邪客心胸間加之無汗小便不利熱不得越己甚有不侵入陽明者乎然亦失治使然如前證不結胸但頭汗時能以梔子豉湯早投之何至成身黃耶陽明病被火額上微汗出小便不利者必發黃陽明病則為內熱被火則火熱相合而甚若遍身汗出而小便利者熱得泄越不發黃今額上微汗出而小不利則熱不得越鬱蒸於胃必發黃也觀子此火劫發黃也額汗便難皆火氣所傷陽明已作內熱而又以火迫之政經所謂兩陽熏灼其身必發黃健曰上二證皆茵陳蒿湯主之可愈陽明病脈浮而緊必潮熱發作有時但浮者必盜汗出浮為在經緊為裡實脈浮而緊者表熱也必盜汗出盜汗者睡中汗出也陽明病裡熱者自汗表熱者盜汗活人脈浮盜汗黃芩湯或柴胡桂薑湯或桂枝茯苓白朮湯陽明病口燥但欲漱水不欲咽者此必衄陽明之脈起於鼻絡於口陽明裡熱則渴欲飲水此口燥但欲漱水不欲咽者是熱在經而里無熱也陽明氣血俱多經中熱甚迫血妄行必作衄也健曰口燥不欲咽水此陽明經熱非裡熱可知矣陽明病本自汗出醫更重發汗病已差尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還人胃中故知不久必大便也先亡津液使大便硬小便數少津液分別大便必自下觀子不必汗下利小便亡損津液因轉屬陽明即如病已差先曾亡津液者尚微煩不了了能作大便硬也然此非病邪不解之故故當測其小便以俟津液還入自通耳傷寒嘔多雖有陽明證不可攻之嘔多者熱猶在上焦未全入腑故不可下健曰嘔多是半表裡證防其發斑須柴葛解肌如舌胎粉白加石膏豆豉兼托兼化而嘔可止非攻證也陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈陽明病腹滿者為邪氣入腑可下之心下硬滿則邪氣尚淺未全入腑不可便下之下之得利止者為邪氣去正氣安則愈若因下利不止者為正氣脫而死健曰心下硬非腹滿硬之比故不可攻攻之則利不止死陽明病面合赤色不可攻之必發熱色黃小便不利也合通也陽明病面色通赤者熱在經也不可下下之虛其胃氣耗其津液經中之熱乘虛入胃必髮色黃小便不利也兼善陽明病多近於下但以面赤其熱猶在經故云不可攻若攻之則經中必熱悉入於胃郁畜而發黃色譬如下之早成結胸之類陽明病不吐不下心煩者可與調胃承氣湯吐後心煩謂之內煩下後心煩謂之虛煩今陽明病不吐不下心煩者是胃有鬱熱也與調胃承氣以下鬱熱觀子不吐不下而心煩固為邪實然心煩而腹不脹滿亦非大實之比與調胃承氣宜矣陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下陽明病脈遲若汗出久微發熱惡寒者表未解也若脈遲雖汗出而不惡寒者表證罷也身重短氣腹滿而喘有潮熱者熱入腑也四肢諸陽之本津液足為熱蒸之則周身汗出津液不足為熱蒸之其手足濈然而汗出知大便已硬也與大承氣湯以下胃熱經曰潮熱者實也其熱不潮是未成實故不可與大承氣雖云腹大滿不通之急亦不可與大承氣與小承氣微和胃氣黃氏若汗多微發熱以下蓋謂陽明亦有在經者未全入胃猶宜解外縱有大滿大腑不通亦不過小承氣微下之入胃在經宜兩審也觀子此節辨脈遲內結之證或宜大承氣攻之或但小承氣微和也陽明病其脈遲為邪已營於裡證復兼汗出雖不惡寒必身重必腹滿且短氣而喘何也熱氣內甚者身始重結而不通者腹始滿短喘是證屬可攻矣然必再以他證決之如有潮熱者為外證已解里證已具手足濈然汗者為津液不足大便已硬主大承氣攻之奚疑若汗出雖多猶微發熱惡寒則表尚在也其熱既非潮熱汗亦非手足濈然之汗安可與承氣以攻乎夫汗出身重腹滿短氣之證大滿不通者亦有之然雖腹大滿不通亦但可與小承氣微和非大承氣大泄之證也何以故脈遲非必下之脈雖內結豈大承氣所宜哉健按陽明病脈遲汗出不惡寒腹滿喘而身重者蓋表已解而俱里證矣然尚未入腑猶當作在經之裡證者故未可下待手足汗大便硬乃可與大承氣若汗多微惡寒此表邪未解而更不可下直至腹大滿不通方與小承氣微利之總歸一脈遲邪雖結而熱尚輕無燥實堅三字故黃氏叮嚀在經之象多入腑之證少須細審之觀子亦曰非必下之證二公辨之熟矣夫脈遲似澀滯之象汗出不惡寒似濕熱內蒸之象故身重腹滿而喘以南方人較之此非太陽傷寒傳經所來乃陽明本經濕熱為病每多是證以仲景半夏茯苓湯施之其效亦捷陽明病潮熱大便微硬者可與大承氣湯不硬者不與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎乃可攻之若不轉失氣者此但初硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉失氣者慎不可攻也潮熱者實也得大便微硬者便可攻之若便不硬者熱未成實微有潮熱亦未可攻若不大便六七日恐有燥屎當先與小承氣湯漬之如有燥屎小承氣湯藥勢緩不能宣泄必轉失氣下若不轉失氣是胃中無燥屎但腸間少硬前止初硬後必溏攻之則虛其胃氣致腹脹滿不能食也胃中乾燥則欲飲水水入胃中虛寒相搏氣逆則噦其後卻發熱者則熱氣乘虛還復聚於胃中胃燥得熱必大便復硬而少與小承氣湯微利以和之故重云不轉失氣不可攻慎之至也活人大便溏者古人云歲火不及寒乃大行民病鶩溏蓋溏者胃中冷水穀不別也華佗云寒即溏熱即垢仲景初硬後溏者二證一言小便不利一言小便少皆水穀不分耳觀子此辨潮熱之或大便硬有燥屎或止初硬後溏者有之故必與小承氣轉失氣者方與大承氣毋致誤下成脹滿不食也飲水噦以下皆是誤下後之證和以小承氣又所以救噦後之大便復硬也健曰此節同上文之意復申明之以慎誤下也欲水而水入反噦者知其假熱不為實也後熱實便硬乃可與小承氣微下之夫實則譫語虛則鄭聲鄭聲重語也內經曰邪氣盛則實精氣奪則虛譫語由邪氣盛而神識昏也鄭聲由精氣奪而聲不全也譫語者言語不次也鄭聲者鄭音不正也論語惡鄭聲亂雅樂如新差氣虛人聲轉者是所謂重語者也宇泰譫語謂亂言無次數更端也鄭聲謂鄭重頻頻也只將一事一句重疊言之數日不換他聲也蓋神有餘則能機變亂語神不足則無機變而只守一聲也全善譫語者氣虛獨語也素問云脫陽者見鬼余用參耆溫補活者數十人不可概以譫語為實健曰婁氏言譫語為氣虛脫陽未可盡信譫而舌焦黑腹滿堅者是陽明腑證當下譫而身熱舌乾白是陽明經邪必發斑當解肌若虛熱神衰乃是呢喃獨語舌無胎色神氣恍惚脈虛微庶可補也直視譫語喘滿者死下利者亦死直視譫語邪勝也喘滿為氣上脫下利者為氣下脫皆死候也發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死亡陽胃燥譫語者脈短津液己絕不可復治脈自和為正未衰而猶可生也觀子按發狂衄血譫語鄭聲盜汗無汗類皆陽明緊要之證今但略具一二語而未詳言之且治法亦不之及則是書散亡之多蓋可見矣健曰觀子知書之散亡而為道破非有得於中者不能言也傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之若一服利止後服若吐若下皆傷胃氣不大便五六日上至十餘日者亡津液胃氣虛邪熱內結也陽明旺於申酉時日晡所發潮熱者陽明熱甚也不惡寒者表證罷也獨語如見鬼狀者陽明實熱以為熱氣有餘若劇者是熱氣甚也熱大甚於內昏冒正氣使不識人至於循衣摸床惕而不安微喘直視傷寒陽勝而陰絕者死陰勝而陽絕者亦死熱劇者為陽勝脈弦為陰有餘澀為陰不足陽熱雖劇脈弦知陰未絕而猶可生脈澀則絕陰故不可治其邪熱微而未至於劇者但發熱譫語可與大承氣湯以下胃中熱經曰凡服下藥中病即止不必盡劑此以熱未劇故云若一服利則止後服嗣真此段當分三截看自傷寒若吐至如見鬼狀為一截是將潮熱譫語不惡寒不大便對為現證下文又分二截以辨劇者微者之殊微者但發熱譫語但字為義以發熱譫語之外別無他證其用承氣一服利止後服見其熱輕猶恐下之太過也至於劇者發則不識人循衣摸床惕而不安微喘直視如此熱極危候不可不決死生以斷之以脈弦者生澀者死此陽熱已極若脈弦為陰未絕猶可下之以復其陰若脈澀為陰絕不可救藥而死矣叔微予觀錢仲陽小兒直訣云手循衣領及捻物者肝熱也此證在玉函列於陽明部中蓋肝有熱邪淫於胃經故以承氣瀉之且得弦脈則肝平而胃不受克所以有生之理讀仲景書不能博通諸家以發明其隱奧專守一書吾未見其能也觀子此入腑之深熱結之最重者當辨其劇且脈澀必死劇而脈弦與微而未劇猶可生也健按叔微仲陽之說雖是而實非蓋凡血熱生風津耗傷筋有撮捻搐揚之勢將成驚象者俱稱肝熱或從風熱外襲或因本弱內虛而然非比傷寒邪熱入腑胃亡津液熱迫四末所致必從下劑以轉其燥也若泥於肝熱二字則證屬厥陰不當列於陽明篇矣是仲景仲陽二說分明兩途未可同日語也因其脈弦而諸家皆以肝熱為解殊不思胃燥津枯脈失榮養而見弦者多何也緣肝主疏泄燥屎結聚不泄則肝脈形也下之則弦退故曰可生非得弦反曰肝平胃不受克此悖於理矣如弦而硬且躁疾無胃氣者比澀脈之死更暴速也陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服亡津液胃燥大便硬而譫語雖無大熱內結亦當與小承氣湯和其胃氣得一服譫語止則胃燥已潤匆復與承氣以胃本無熱故也觀子譫語宜下然多汗之津液內竭再下之稍過陰氣復傷其表裡之存者幾何故致謹於一服即止也健曰服後若屎未去譫未止舌胎焦黑者乃燥屎結實必須大承氣矣陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣一升腹中轉失氣者更服一升若不轉失氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也陽明病譫語潮熱若脈沉實者內實也可下若脈滑疾為里未實則未可下先與小承氣湯和之得轉失氣者中有燥屎可更與一升以除之若不轉失氣是無燥矢不可更與也至明日邪氣傳時脈得沉實堅牢之類是為裡實反得微澀者裡氣大虛也若大便利後脈微澀者止為裡虛而猶可此不曾大便脈反微澀是正氣內衰為邪氣所勝故云難治觀子譫語且潮熱為熱實內結之證必得熱實內結之脈乃脈反滑疾非大承氣證矣故宜小承氣以微和之得轉失氣燥矢未出再與必出矣其不大便脈反微澀者正氣已脫雖與承氣無益矣何也始之脈滑而疾政以裡虛脈不應病故終有此難治之患也健按與小承氣不但不大便且無轉失氣則非應下之證矣況脈反微澀謂為裡虛難治不復言他法豈仲景無可救之道歟若果裡虛潮熱譫語腹無堅滯舌不幹焦者此人參白虎可與也陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬爾宜大承氣湯下之譫語潮熱為胃熱當消穀引食不能食者胃中有燥屎而胃實也若能食者胃中虛熱雖硬不得為燥屎雜病虛為不食實為欲食傷寒則胃實熱甚者不食胃虛熱不甚者能食與雜病異也大承氣湯以下燥屎逐結氣觀子此又以能食不能食辨譫語潮熱之或燥屎或但初硬後溏也能食者胃必虛故但初硬後溏宜大承氣句是指有燥矢者言非下但硬者也健曰胃虛能食是胃中空而無物非胃氣虛也不可認錯陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈陽明病熱入血室迫血妄行使下血譫語陽明病法多汗以奪血者無汗故但頭汗出也刺期門以散血室之熱隨其實而瀉之以除陽明之邪熱散邪除熱營衛得通津液得復濈然汗出而解明理血室即衝脈也衝起於腎下出於氣衝並足陽明夾臍上行至胸中而散為十二經脈之海男子則運行生精女子則上為乳汁下為月經傷寒之邪婦人則隨經而入男子則由陽明而傳陽明內熱傳入之也衝脈得熱血必妄行故亦有下血譫語既邪氣留結不去是以刺而瀉之觀子男女均有此精血道路故男子亦有熱入血室之證下血而譫似屬胃實當下然但頭汗出陽氣上蒸津液不足也不宜下之以奪內液故刺期門以瀉其熱邪而已健曰不善刺者當依丹溪法柴胡地黃湯汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛里實故也下之則愈宜大承氣湯胃中有燥矢則譫語以汗出為表未罷故云風也燥屎在胃則當下以表未和則未可下須過太陽經無表證乃可下之若下之早燥矢雖除則表邪乘虛復陷於裡為表虛里實胃虛熱甚語言必亂與大承氣湯下胃中邪熱則止三陽云陽明多汗況有譫語似可下矣但風家多汗恐汗出則表未罷故須過經乃可下若下早燥矢雖除表邪乘虛復陷又將為表虛里實矣下之則愈二句又申明可下之之句耳觀子此辨因風汗出雖有燥矢譫語而未可便下必過經表罷方除裡實也健曰陽明熱盛而譫者不一有經熱而譫有腑實而譫此言汗出譫語以有燥矢是經腑俱熱內經曰病從外之內者先治其外後治其內故曰過經乃可下之文雖言此為風而不言風之脈候愚以風雖有汗之證然不言身熱未可以風擬議明系胃熱自汗耗散津液則燥矢結而譫矣當與調胃承氣湯微下之正合病狀究無痞滿燥實堅證非大承氣可行也傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛里實久則譫語邪氣入內之時得脈沉而喘滿里證具也則當下之反發其汗令津液越出胃中乾燥大便必難久則矢燥胃實必發譫語觀子此正宜下而反發汗之逆也便難大便不通也津傷胃實譫語自相因而至矣健曰須調胃承氣湯下之三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之譫語身重難以轉側口不仁譫語陽明也針經曰少陽病甚則面塵此面垢者少陽也遺尿者太陽也三者以陽明證多故出陽明篇中三陽合病為表裡有邪若發汗攻表則燥熱益甚必愈譫語若下之則表熱乘虛內陷必額上汗出手足逆冷其汗自出者三陽經熱甚也內經曰熱則腠理開汗大泄與白虎湯以解內外之熱亮宸雖曰三陽合病而陽明為多故止陽明之熱而三陽之病自己健曰陽明居中為三陽之裡邪合陽明無他合矣故但瀉陽明可知白虎能除三陽表裡之邪不專功於陽明也陽明本經之證尚未述完而忽入三陽合病足見叔和之誤也二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯本太陽病並於陽明名曰並病太陽證罷是無表證但發潮熱是熱並陽明一身汗出為熱越今手足漐漐汗出者必大便已硬也與大承氣湯以下胃中實熱觀子太陽證罷則邪已去太陽之經見證潮熱汗出便難譫語為入腑悉具是始焉並病而今已轉屬胃實非下不可者也故與大承氣湯陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重觀子此宜柴葛解肌若發汗則燥心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之脈浮發熱為邪在表咽燥口苦為熱在經脈緊腹滿而喘汗出不惡寒反惡熱身重為邪在裡此表裡俱有邪猶當雙解之若發汗攻表表熱雖除而內熱益甚故燥而憒憒反譫語憒憒者心亂經曰營氣微者加燒針則血不行更發熱而躁煩此表裡有熱若加燒針損動陰氣故怵惕煩躁不得眠也若下之裡熱雖去則胃中空虛表中客邪陷於上焦煩動於膈使心中懊憹而不了了舌上胎黃者熱氣客於胃中舌上胎白知熱氣客於胸中與梔子豉湯以吐胸中之邪全善梔子豉湯專指下後心中懊憹者設觀子陽明多氣多血之經故在經即有目痛鼻乾身大熱脈洪長之證其與太陽寒水之病本不同也此以中風之陽邪合有餘之經氣至日久而表裡俱病安得不熱甚乎使能兩治其邪亦何難內外悉安單汗則遺內單下則遺外燒針則助陽病所以不除也然不直言其湯治而惟詳誤下後之三法者此屬常證之外圓機活法仲景欲人思而得之不以一言印定也健按此證當作三段看上段已經熱傷津液故肢體不和身重矣中段若再發汗加燒針則更增煩躁不眠下段若下之則胃虛懊憹客氣反動矣然總表邪入里之熱乃無形之氣非有形垢滯可下之比宜葛根白虎湯均可解之若渴欲飲水口乾舌燥者白虎加人參湯主之若下後邪熱客於上焦者為虛煩此下後邪熱不客於上焦者為乾燥煩渴與白虎加人參湯散熱潤燥健曰此但言口乾渴欲飲水雖不連上文貫下然看若字似從上文若下後所致若脈浮發熱渴欲飲水小便不利者豬苓湯主之此下後熱客下焦者也邪氣自表入里客於下焦三焦俱帶熱也脈浮發熱者上焦熱也渴欲飲水者中焦熱也小便不利者下焦熱也邪客下焦津液不得下通也與豬苓湯利小便以瀉下焦之熱兼善邪熱客於下焦則津液不得上升故亦有作渴者瀉下焦之熱熱不得阻塞於中焦肺與膀胱津液流通而病自愈矣觀子此之熱容於下小便不利既屬三焦俱病則太陽五苓之獨不利溺必兼致津液更可知矣此發熱不再用表藥則太陽五苓之非屬桂枝發汗又可知矣健按下後脈浮發熱乃津液內亡邪熱上炎胃虛燥渴而欲水萬不可因脈浮而擬表劑脈經言虛合四形浮大遲軟故仲景用豬苓湯妙在阿膠一味益陰利便青色使脈浮發熱退也陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯複利其小便故也針經曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺天熱衣厚則為汗是汗溺一液也汗多為津液外泄胃中乾燥故不可與豬苓湯利小便也兼善既陽明汗多屬陽明病未解渴者胃中津液乾燥若與豬苓湯複利小便是為虛虛矣健曰胃燥津干與人參白虎湯最妙脈浮而遲表熱裡寒下利清穀者四逆湯主之浮為表熱遲為裡寒下利清穀者裡寒甚也與四逆湯溫里散寒觀子下利請谷裡寒外熱本陰經之證然外熱之熱乃格陽之假熱耳不同猶有表也其脈非沉而遲即緩欲絕安得猶有浮也此證曰裡熱者必外證仍未罷靖谷者必寒毒已入胃是證雖陽而內寒已甚故表熱裡寒脈浮者熱之在表也遲者寒之在裡也蓋與太陽頭痛發熱脈反沉證絕相類彼以頭痛身疼故屬太陽此以大腑有寒下利清穀自當屬陽明也雖猶有陽經之表證而當救裡寒為急是以主四逆略同耳健曰脈浮表熱之外證輕脈遲裡寒下利之裡證重故當從重論治理也若胃中虛冷不能食者飲水則噦噦者咳逆也千金曰咳逆者噦逆之名胃中虛冷得水則水寒相搏胃氣逆而噦觀子胃中虛冷誤下者噦若非誤下與水亦噦者一為去其熱一為益以寒故也是治雖殊而致病則頗同脈浮發熱口乾鼻燥能食者則衄脈浮發熱口乾鼻燥熱在經也能食里和也熱甚於經迫血妄行而為衄胃中虛冷陰勝也水入於經其血乃成飲水者助陰氣逆為噦發熱口乾陽勝也食入於陰長氣於陽能食者助陽血妄為衄二者偏陰偏陽之疾也三陽云上二條是中陰腑之疾此條以下又是陽經傳來之證也陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之表未罷而下者應邪熱內陷也熱內陷者則外熱而無手足寒今外有熱而手足溫者則熱內陷而不深故不作結胸也心中懊憹飢不能食者熱客胸中為虛煩也熱自胸中蒸蒸於上故但頭汗出而身無汗與梔子豉湯以吐中之虛煩觀子陽明病者陽明經或中風中寒下之皆得內陷成懊憹也不結胸者猶有外熱未全收斂入內也手足溫但頭汗出者邪客胸中諦也故主梔子豉湯健曰此經邪在表居多而下亦輕故不致成結胸惟心中懊憹胃熱盛則飢而不食熱上蒸則頭汗出但梔豉為吐劑只能去在上之邪不能除內陷之熱應合石膏湯同進庶乎表裡肅清陽明病發潮熱大便溏不便自可胸脅滿不去者小柴胡湯主之陽明病潮熱為胃實大便硬而小便數今大便溏小便自可則胃熱未實而水穀不別也大便溏應氣降而胸滿去今反不去者邪氣猶在表裡之間也與小柴胡以去半表半裡之邪吳氏邪在半表半裡雖潮熱不得為里大實故仍在半表裡治之何也便溏脅滿故也健曰潮熱雖屬陽明胸脅滿系少陽故與小柴胡治半表半裡之法陽明病脅下硬滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也陽明病腹滿不大便舌上胎黃者為邪熱入腑可下若脅下硬滿雖不大便而嘔舌上白胎者為邪未入腑在表裡之間與小柴胡湯以和解之上焦得通則嘔止津液得下則胃氣因和汗出而解吳氏且有脅下硬滿在柴胡證猶未除也戴氏陽明下證已具其人喘嗽或微惡寒為太陽陽明往來寒熱為少陽陽明於陽明證中而太陽少陽證未罷此非正陽明也慎未可遽下所以古注陽明有三常須識此全善陽明宜下而先在經與裡虛不宜攻下者於前仲景慎重之意可見觀子潮熱為陽明病大便溏小便自可即非冒實裡熱矣況有脅滿者乎不大便亦陽明病脅下硬而嘔舌上又白胎知非腑證也是二者皆半表裡之邪為重非小柴胡其誰與歸陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦宇泰宜小柴胡加茯苓耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治浮大為陽風在表也弦則為陰風在裡也短氣腹滿脅下及心痛風熱壅於腹中而不通若寒客於內痛者按之則寒氣散而痛止此風熱內壅故雖久按之而氣亦不通陽明病鼻乾不得臥自汗出邪在表也此鼻於不得汗而嗜臥者風熱內攻不幹表也一身面目悉黃小便難者潮熱時時噦風熱攻於胃也陽明之脈出大迎循頰車上耳前過客主人熱勝則腫此風熱在經故耳前後腫刺之經氣通腫則小差如此者外證罷則可攻若外證不解雖過十日脈續浮者邪氣猶在半表半裡與小柴胡湯以和解之若其脈但浮而不弦大無諸里證者是邪但在表也可與麻黃湯以發其汗若不尿腹滿加噦者關格之疾也故云不治難經曰關格者不得盡其命而死亮宸此屬三陽經氣壅遏邪閉不通之證腹滿短氣按之不通鼻乾不得汗嗜臥發黃小便難潮熱時噦皆邪壅陽明也脅下及心痛耳前後腫邪在少陽然脈弦為少陽大為陽明浮則又為太陽矣蓋三陽外閉譬之注水之器外竅閉則裡氣不通故先以小柴胡通少陽之塞而兼用麻黃解太陽之閉也健按脈弦浮大正是三陽中風之診因腹滿身黃而歸陽明為重外閉風邪內壅濕熱故作潮熱時噦等證宇泰謂小柴胡加茯苓予以為大柴胡微利之以通其否塞不為過當脅下及心痛句疑似倒裝就其表裡之邪壅塞中焦而上下不通則應心下及脅痛耳未可稱為心痛心可痛乎哉痛則以何治之故凡讀書必須字斟句酌能知其是否則近道矣陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導津液內竭腸胃乾燥大便因硬此非結熱故不可攻宜以藥外治而導引之觀子自汗或發汗之後小便又自利津液不固而兩竭矣再與瀉陽明是重伐津液之源也故法但可導不可攻陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯陽明脈遲汗出多當責邪在裡以微惡寒知表未解與桂枝湯和表觀子雖屬陽明病而猶有微惡寒是邪仍在表矣雖汗多亦非熱越之汗矣脈遲者脈緩之類也與桂枝以解肌政所以治陽明之中風也陽明病脈浮無汗而喘者發汗則愈宜麻黃湯陽明傷寒表實脈浮無汗而喘與麻黃湯以發汗觀子陽明法多汗此無汗而喘脈且浮安得為陽明裡證乎與麻黃湯發之政以治陽明之中寒者得汗則愈陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳湯主之但頭汗出身無汗劑頸而還者熱不得越也小便不利渴引水漿者熱甚於胃津液內竭也胃為土而色黃胃為熱蒸則色奪於外必發黃也與茵陳湯逐熱退黃亮宸陽明法多汗汗則外越即不越亦或燥熱不發黃矣今但頭汗而身無汗小便又不利上下之濕無從而去又渴飲水漿水濕之氣與熱相持所以瘀熱在裡也瘀熱熏蒸外發黃色非大黃無以蕩胸中之熱非茵陳無以瀉胸中之濕梔子之苦引熱曲下行從小便中去也此為陽明裡實故下之陽明證其人喜忘者必有畜血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之內經曰血並於下亂而喜忘此下本有久瘀血所以喜忘也津液少大便硬以畜血在內屎雖硬大便反易其色黑也與抵當湯以下瘀血海藏初便褐色者重再便深褐色者愈重三便黑色者為尤重色變者以其火燥也觀子太陽隨經瘀熱膀肽者固畜血陽明隨經瘀熱在胃者亦畜故古人有在上在下之分在下者必少腹硬滿小便自利及發黃如狂之證在上者則喜忘屎黑而已健曰陽明畜血在胃太陽畜血在膀胱即上下之分而色有黃黑之異陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯下後心中懊憹而煩者虛煩也當與梔子豉湯若冒中有燥屎者非虛煩也可與大承氣湯其腹微滿初硬後溏是無燥屎此熱不在冒而在上也故不可攻觀子此辨懊憹之有燥屎或無燥屎也懊憹本屬虛邪煩為內實知有燥屎也故大承氣湯攻之微滿者邪猶未全入腑不過初硬後溏故不可攻健曰欲辨燥屎之有無在按之拒與不拒舌上胎與不胎不拒按而胎白者不可攻拒按而胎焦者方可下病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也不大便五六日者則大便必結為燥屎也胃中燥實氣不得通故繞臍痛煩躁發作有時也觀子是證乃燥屎之明驗病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯雖得陽明證未可便為裡實審看脈候以別內外其脈實者熱已入腑為實可與大承氣湯下之其脈浮虛者是熱未入腑猶在表也可與桂枝湯發汗則愈觀子煩熱得汗解矣何以又如瘧狀解而復熱屢作屢止則里有邪實未可知也況得之日晡潮熱故曰屬陽明也然是證猶恐在疑似之間必再以脈察之其脈果實即屬下證若脈浮虛即邪氣徘徊於營衛間而不得解宜桂枝湯以發之大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯大下後則胃弱不能消穀至六七日不大便則宿食已結不消故煩熱不解而腹滿痛是知燥矢也與大承氣湯除之全善此大下之後復下之也反用大承氣者以津液漸竭故也須審虛實用之不如梔子枳實穩當觀子此大下之後邪熱未實徒耗津液邪反乘虛而結故必再下乃除見證煩不解腹滿痛大承氣攻之當矣病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯小便利則大便硬此以有燥屎故小便不利大便乍難乍易胃熱者發熱喘冒無時及不得臥也此燥屎在胃故時有微熱喘冒不得臥也與大承氣以下燥屎三陽云此證必以手按之果大便硬結喘冒不能臥方可攻之何也乍難乍易故也觀子熱氣內畜故水道為之不利小便不得利則大便亦不硬而乍難乍易矣然微熱者裡熱也冒者熱甚神昏也喘而不臥者邪實內燥也皆以燥矢未去故上下否隔如此宜大承氣以除之既微熱時作喘冒不臥則有燥屎矣是宜下以逐裡實為急安可復以小便利定硬始可攻之常法為拘哉食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也上焦主內胃為之市食谷欲嘔者胃不受也與吳茱萸湯以溫胃氣得湯反劇者上焦不納也以治上焦法治之仁齋宜葛根半夏生薑湯觀子胃寒則嘔胃熱亦嘔大抵脾胃之證非熱中即寒中耳然此與少陽之嘔不同少陽邪初傳裡則嘔多作於病之始陽明則多作於病之後當是腑實通後胃寒不安穀故嘔吐若溫之反劇必上焦遺熱未盡也宜清陽明以理之須味食谷二字其為傷寒後可知故不能一法取必若陽明之邪未罷可漫無成見而以寒熱二藥互試乎健曰食谷欲嘔得湯反劇煮必陽明有熱豈是胃中寒哉中寒則宜辛熱何服茱萸而反劇者其為胃熱明甚須竹茹橘皮湯或二陳白虎均可與之愚嘗遇此而治之屢效太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散太陽病脈陽浮陰弱為邪在表今寸緩關浮尺弱邪氣漸傳裡則發熱汗出復惡寒者表未解也傳經之邪入里里不和者必嘔此不嘔但心下痞者醫下之早邪氣留於心下也如其不下者必漸不惡寒而渴太陽之邪轉屬陽明也若吐若下若發汗小便數大便硬者當與小承氣和之此不因吐下發汗後小便數大便硬者是無滿實雖不更衣十日無所苦也候津液還入胃中小便數少大便必自出也渴欲飲水者少少與之以潤胃氣但審邪氣所在以法救之如渴不止與五苓散是也兼善十日不更衣而不用攻伐何也曰此非結熱乃津液不足夫不大便而有潮熱譫語可下之證者然後可以攻之其不大便而無諸下證者此津液不足當須審慎勿以日數久而轍為攻下也三陽云此處五苓散難用不然經文渴字上當有闕文也觀子太陽病尚有發熱惡寒汗出表證之時而脈已得寸緩尺弱者裡氣不足也關浮者客熱虛邪也如不發熱而但痞此屬醫之所傷宜以痞證治之若不經醫下又惡寒罷而渴此虛熱已下陽明必顯小便數大便硬之證矣然此與熱實入腑者不同治也既有里弱之脈復津虛之證惟以客熱熏灼若再為攻除變證起矣故必俟其津回邪可解也渴欲飲水者陽氣得復也故可與水渴不己者邪仍結太陽之裡不轉屬陽明也故五苓散解之健按此條寸緩關浮發熱惡寒明是太陽中風傳陽明半表裡之證因醫誤下而致痞如不下不惡寒而見渴是陽明之邪變熱矣故小便數大便硬雖不更衣無所苦者是但有經邪之熱而無入腑之實耳只當清解經邪而已既云渴欲飲水何以五苓為哉夫五苓利寒水之劑乃脾腎之藥也此非太陽傳本又非濕盛反渴投之必更增燥故王三陽云此處五苓難用疑有闕文真見道之言觀子注論未瑩於末句亦認邪結太陽之裡歸到五苓收局謬矣此當以葛根白虎湯加蔞仁枳實治之則經熱解而痞自除脈陽微而汗出少者為自和也汗出多者為太過陽微者邪氣少汗出少者為適當故自和汗出多反損正氣是汗出太過也陽脈實因發其汗出多者亦為太過太過為陽絕於里亡津液大便因硬也脈陽浮者表熱甚也因發汗熱乘虛蒸津液外泄致汗出太過汗多者亡其陽陽絕於里腸胃乾燥大便因硬也觀子陽脈實則表邪盛法應汗然亦不可太過太過則內外兩竭何也胃者津液之源陽氣之根過汗則外亡其陽其根源內竭之虞更深也經於可汗之中凡尺微弱遲者復戒以不可汗固矣此又以陽脈微者亦不可過汗蓋甚者汗各有殊兩也至脈實者似可大汗矣然多出太過即陽絕於里矣蓋人身之得汗即天地之得雨也致雨必由陰陽和通津液有不由營衛合度哉使如水淋漓大汗出其氣暴皆非矣雖然風寒營衛之傷可從汗解者不過一太陽病耳惟汗之非宜即歸陽明傷寒以入腑為極乃必由過損津液即致此經於汗下失當處每每舉而深切著明之不曰轉屬即曰亡津液不厭診縷其辭也趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之趺陽脾胃之脈浮為陽知胃氣和澀為陰知脾為約約者儉約之約又約束之約內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾主為胃行其津液者也今胃強脾弱約束津液不得四布但輸膀胱致小便數大便難與脾約丸通腸潤燥觀子胃實不大便者主承氣類以通之若非陽明內結而由胃強脾弱約束津液者其大便亦硬此病不在腑而在他臟也下之津液轉涸轉秘矣故立麻仁丸以治之厚朴以瀉胃之強芍藥除脾之仇雖曰脾不能行津液然大腸傳道之腑肺與之表裡氣不降於大腸水液所以偏滲於膀胱也杏仁枳實以疏脾肺之氣燥澀者麻仁潤之堅結者大黃逐之閉證有不愈者乎脈浮者胃有邪熱客之脈澀者脾陰不足陽強而陰不能化由是脾不能散津於肺肺不能通調水道大腸失傳道之常膀胱有頻數之滲而內液日就乾涸矣然診趺陽病由脾胃非傷寒之邪內傳入腑與亡津液胃燥轉屬之比出於陽明篇中者必其人或胃火素盛或津液本少如瘡家淋家亡血家之類因傷寒而轉得脾約之證亦未可知故立麻仁丸以補承氣之所不及治耳健按趺陽即衝陽又曰太衝其脈在足背上大筋之旁乃胃經先天之脈故小兒初生即能吮乳而知食是胃氣之根也至手部六脈待三歲得谷之後始現全也人如大病手部將絕而趺陽根氣之脈不失尚可治也關係後天為胃氣之驗非細此脈浮為胃有邪熱脈澀則脾陰不足不能為胃行其津液故小便數而大便硬矣名為脾約也太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之蒸蒸如熱熏蒸言甚熱也太陽病三日發汗不解則表邪已罷蒸蒸發熱為甚與調胃承氣湯下胃熱觀子發汗而不解邪不在表矣蒸蒸發熱為裡熱日雖淺屬腑已明故下之然太陽病之三日其熱結亦非大實大堅之比遂以輕緩之調胃承氣行之健按太陽三日已傳陽明其熱蒸蒸不同太陽之壯熱可知未便即為腑熱而驟下以調胃承氣此當與柴葛解肌為是如已現入腑之脈舌始可與下也成氏以蒸蒸為甚熱又言發汗不解為表邪已罷皆謬矣表既已罷何復有陽明之盛熱耶智者審之傷寒吐後腹脹滿者與調胃承氣湯內經曰諸脹腹大皆屬於熱熱在上焦則吐吐後不解復腹脹滿者邪熱入胃也與調胃承氣湯下其胃熱太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈吐下發汗皆損津液表邪乘虛傳裡大煩者邪在表也微煩者邪入里也小便數大便硬者其脾為約也小承氣湯和之愈觀子太陽病既汗吐下後損其津液而內煩之證作轉屬陽明明矣然小便數大便硬者則裡氣亦不足非小便利屎定硬之比故與小承氣和之而已得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與大承氣一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯針經曰脈軟者病將下弱為陰脈當責邪在裡得病二三日脈弱是日數雖淺而邪已入里也無太陽證為表證已罷無柴胡證為無半表半裡之證煩躁心下硬者邪氣內甚也胃實熱甚則不能食冒虛熱甚至四五日雖能食亦當與小承氣湯微和之至六日則熱甚與大承氣一升若不大便六七日小便多者為津液內竭大便必硬則可下之小便少者則胃中水穀不別必初硬後信雖是能食為冒實以小便少則未定成硬亦不可攻須小便利屎定硬乃可攻之觀子此節分兩證看第一證言二三日病初起時外則無表證並半表裡證內則煩躁心下硬是日數淺邪已內結矣至四五日復能食能食者胃必虛似不當議下然既已結於裡雖能食非下之不可但先有脈弱之裡虛次有能食之胃弱亦非大承氣證也小承氣少少微和可耳若至五六日裡實已堅方與大承氣一升宜矣第二證言若得如是之證又未經與小承氣微和至不大便者六七日似可直與大承氣矣不知若小便少者必水穀不別雖不能食有似實證然必初硬後溏亦非大承氣所宜須小便利津液走屎定成硬者方為大承氣證也健曰此脈弱乃無浮弦之象非太陽柴胡證而已傳陽明裡矣故煩躁心下硬乃邪氣結於中也能食者胃無停滯林氏曰胃必虛虛者但有熱邪而無實邪內著故不可大承氣只小承氣微去之待小便利屎定硬方與大承氣除之但不可偏認脈弱胃虛二說為本虛耳所謂弱與虛是邪未實之稱須當識此傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯內經曰諸脈皆屬於目傷寒六七日邪入里之時目中不了了睛不和者邪熱內甚上熏於目也無表裡證大便難者裡實也身大熱者表熱也身微熱者裡熱也針經熱病目不明熱不已者死此目中不了了睛不和則證危惡矣須急與大承氣下之觀子大便難但六七日耳又無表裡確然之證何遽議攻曰此冒已極而移克腎水之候也目不了了晴不和者微陰欲絕也熱反微者邪深欲變也非急瀉其實易救之健按仲景急下之證惟少陰與此少陰二條理應急下而此條實有疑焉目中不了了睛不和雖屬陰虧然無表裡證競大便難身微熱何以為實而有急下之文夫傷寒六七日未見煩滿躁實之象不便即攻況無表裡證四字豈可急下之乎非闕文誤次必其人素虛所致陽明為氣血總司目得血而能視陽明熱則血耗不能輸精於目故目不了了而晴不和矣大便難者亦血燥腸枯不得潤下也否則病不多日無表裡證者不當現此危象若急下之是犯虛虛之誤矣定須察脈驗舌以決之如脈微弱舌無胎滯者直與養榮湯補陰退熱使還其晴則睛必和便亦潤未可信為實邪而從急下之文悔之無及要知無應下之據特申管見以發明之陽明發熱汗多者急下之宜大承氣湯邪熱入腑外發熱汗多者熱迫津液將竭急與大承氣以下其腑熱健曰陽明法多汗此發熱汗多未入腑者乃經邪應解之候已入腑者為汗多液耗或有燥屎而無腹滿堅實舌黑譫語等象亦未便遽下此無諸見證豈可以大承氣急下之乎只可葛根白虎加蔞仁以涼瀉之否則必有貽誤也發汗不解腹滿痛者急下之宜大承氣湯發汗不解邪熱入腑而成腹滿痛者傳之迅也是須急下之健曰此亦應察舌胎焦黑腹拒按者方可急下否則尚須酌量腹滿不減減不足言當下之宜大承氣湯腹滿不減邪氣實也經曰大滿大實自可除之大承氣湯下其滿實若腹滿時減非內實也則不可下要略曰腹滿時減復如故此為寒當與溫藥是減不足言也兼善或謂減不足言復曰當下之何也此古之文法如是也言腹滿不減當下之宜大承氣湯此滿而不減之謂若時滿時減者不可以當下論是減不足言也然承氣湯句當綴於腹滿不減處不當出於減不足言之下也如太陽篇中傷寒不大便六七日云云緣桂枝當發汗而設非謂治衄而用以其文法所拘致令後世治衄者有麻黃桂枝之誤其減不足言之說亦不外乎是觀子既滿而不減自當承氣下之其減不足言之句專指時減者言則此節尚或有脫文也健曰此條明系倒置脫文成氏引要略之說已情現乎辭矣兼善又舉而明之並辨太陽治衄之誤大有功於仲景而澤及乎後世陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯陽明土少陽木二經合病氣不和則必下利少陽不勝陽明不負是不相剋為順也若少陽脈勝陽明負者是鬼賊相剋為正氣失也脈經曰脈滑者為病食也又曰脈滑數則胃氣實下利者脈當微厥今脈滑數知胃有宿食與大承氣湯以下除之宇泰脈弦者木乘陽明已衰也故負者死不弦者土猶未敗也故不負不死若滑而數有宿食非負也故宜下脈純弦為負是弦直緊急之象中無胃氣真臟傷也故死不負猶未失而順也故生觀子此證是三證在內大承氣只治脈滑而數有宿食之證非並治上兩證也其脈負者雖下利而脈未至純弦也不言治法節庵謂以小柴胡加葛根芍藥治之負者純弦也土敗但見賊脈不必治矣蓋雖同是陽明少陽之合而有入腑在經之殊安可以在經之際概歸之承氣乎明理論合病家皆作下利太陽與陽明葛根湯太陽與少陽黃芩湯陽明與少陽大承氣湯三者皆合病下利一發表一攻裡一和解所以不同者蓋六經以太陽陽明為在表雖曰下利必發散經中邪氣而後己故與葛根湯以汗之太陽少陽為半表裡雖曰下利必和解表裡之邪而後已故與黃芩湯以和之陽明少陽為在裡邪氣已入腑雖曰下利必逐去胃中之實而後已故與承氣下之三者所以有異也兼善凡合病皆下利各從外證以別焉夫太陽病頭項痛腰脊強陽明病目痛鼻乾不得臥少陽病胸脅痛而耳聾凡遇兩證齊見而下利合病也雖然但見一證便是不必悉具仲景不言脈證止言太陽與陽明合病云云者以前所論包含以上之證也況各經之見證不一難為定論觀子人身之陰陽平則治偏則病然復有此盛彼衰此衰彼盛之機者蓋必致之勢自然之理也故邪方並熾於外而熟知下利嘔逆之已從內生哉然病兩經雖與病一經者迥殊其邪之所湊則一也故非表即里非里即表非表裡即半表半裡而在表者仍投表劑汗之在裡者仍以里藥除之在半表半裡者仍和解以安之變證有無窮治法無多歧也若三陽之合經氣更雜出矣乃不越夫白虎柴胡等法也是知合病一證雖所舉不過數端諸不盡之義例皆於此概見矣健曰觀子復以叮嚀之意開示後人厥功偉矣病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血宜抵當湯七八日邪入腑之時病人無表裡證但發熱雖脈浮數亦可與大承氣湯下之浮為熱客於氣數為熱客於血下之邪熱去而浮數之脈俱當解若下之後數脈去而脈但浮則是營血間熱並於衛氣間也當為邪氣獨留心中則飢邪熱不殺穀潮熱發渴之證此下之後浮脈去而數不解則是衛氣間熱合營血間也熱氣合併迫血下行胃虛協熱消穀善飢血至下若大便利者下血乃愈若六七日不大便則血不得行畜血下焦為瘀與抵當湯以下去之兼善攻下之法須外無表證里有下證然後可攻上言無表裡證況脈更浮數何言可下之曰此非風寒之所病是由內傷而致也若外惡寒里無譫語但七八日發熱消爍津液乃陽盛陰虛之時苟不攻之其熱不已而變生焉故不待沉實而後攻之叔微凡傷寒當下之證皆從太陽陽明在經之邪入腑故下之今不言陽明病而云病人無表裡證此非自表之裡而病也但為可下故編入陽明篇中明理當不大便六七日之際又無喜忘如狂之證亦無少腹硬滿之候則處承氣下者多矣何以知其有畜血而以抵當湯下之蓋以其脈浮數也浮則熱客於氣數則熱客於血下後浮數俱去則病已若下後數去而浮在則營血中熱去而衛氣中熱在為邪氣獨留若下後浮去而數不去則衛氣中熱去而營血中熱在血熱合並迫血下焦若下焦下利不止則熱泄必便膿血若不大便六七日血不得泄則畜在下焦為瘀血故須抵當湯下之此證之奇異治法之玄微也健按諸家言之概詳而叔微謂其不言陽明止言病人無表裡證似不從傷寒傳經所來因其可下故入此篇即如前章目不了了之證竊以其人素虛而然非急下證也但浮數之脈邪在表裡之間故下後不遲未必便是畜血應與解肌兼涼血清熱紫草茜根之類暫緩抵當以俟之若脈數不解而下不止必協熱而便膿血也下後脈數不解而不大便者是熱不得泄畜血於下為瘀血也若下後脈數不解而下利不止者為熱得下泄迫血下行必便膿血亮宸喜忘黑矢者畜血之證具也脈數合熱消穀善飢者畜血之因耳內經曰血並於上亂而善忘蓋陰陽不交故畜血而昏瞀又心主血血畜而閉則神不清也大便色黑者血混至也血本潤故反易也發熱六七日里成熱矣脈數消穀善飢則胃熱甚矣胃熱迫血血溢於冒故不大便而成瘀也脈數而言則為瘀血若下而不止又為便膿血者總一熱所成行止有異故證不同也健按畜血必現喜忘黑矢若前言善飢六七日不大便未可即為畜血如此條脈數不解而下不止乃協熱自利也當用葛根白虎加茯苓以分利之若早服辛溫動傷血分致便膿血者白頭翁湯最妙傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之要略曰黃家所起從寒濕得之汗出熱去則不能發黃發汗已身目為黃者風氣去濕氣在也脾惡濕濕氣內著脾色外奪者身目為黃若瘀熱在裡發黃者則可下此以寒在裡故不可下當從仲景寒濕法治之觀子此從風濕發黃也風濕相搏者若汗之非法風去而濕內留遂為寒濕發黃也曰寒與瘀熱者迥別矣陽明之黃屬熱屬實故宜下此既挾寒溫解斯可下則氣轉寒濕轉入里矣豈其治哉故曰於寒濕中求之健曰傷寒在表為寒在裡成熱既發汗過而身目為黃則表寒已往裡熱鬱蒸明矣譬之冬月以物置濕處未即發黴若夏熱之令稍沾濕氣無物不黴黃為土色土主濕而又惡濕如受濕蒸無不發黃乃濕必生熱之理也未有寒濕而能發黃者即或有寒亦從濕而變熱矣何諸注之隨文也此當以四苓散加茵陳治之燥濕靖熱豈事寒濕以求哉傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之當熱甚之時身黃如橘子色是熱毒發泄於外內經曰膀胱者津液藏焉氣化則能出小便不利小腹滿者熱氣甚而津液不得下行也與茵陳蒿湯利小便退黃逐熱海藏熏黃濕證也一身盡痛橘子黃黃病也一身不痛不巖熏黃陰黃也橘子黃陽黃也亮宸陽黃色明而亮且淺陰黃色黑而黯且深觀子熱不得越瘀郁在裡而發黃豈獨濕熱之氣不得疏泄其陽明亦必有物為滯矣故茵梔去濕除熱之外必佐將軍以盪滌也腹字成注作小腹按經文言小腹無去少字稱腹之例恐未是傷寒身黃髮熱者桅子柏皮湯主之傷寒身黃胃有瘀熱當須下去之此發熱為熱未實與梔子柏皮湯解散之傷寒瘀熱在裡身必發黃麻黃連招赤小豆湯主之濕熱相交民多病癉癉黃也傷寒為寒濕在表發黃為瘀熱在裡與麻黃連軺赤小豆湯除熱散濕觀子身黃而內不言小便不利渴滿之證外則猶有表熱里無甚邪可法矣故但以梔柏勝熱除黃也若麻黃連軺一證雖曰瘀熱在裡必由邪氣在表之際有失解散今雖發黃猶兼汗解以治也麻黃杏仁俱澈表利衛之藥同生姜大棗以行津助汗連軺赤小豆梓白皮除熱而善通氣則邪從外得者復從外解而鬱熱有不即散者乎健曰經既言瘀熱在裡則但清熱退黃可已何主乎麻黃連軺表裡兼施之劑耶觀子謂其在表之際有失解散故以是湯為主然當味瘀熱在裡四字則知病在陽明而不在太陽故身發黃與以升麻葛根合四苓茵陳參用其瘀熱即能解散而愈矣辨少陽病脈證治第九少陽之病口苦咽乾目眩也足少陽膽經也內經曰有病口苦者名曰膽癉甲乙經曰膽者中清之腑五臟取決於膽咽為之使少陽之脈起目銳眥少陽受邪故口苦咽乾目眩觀子少陽病胸脅痛而耳聾少陽病往來寒熱心煩喜嘔胸脅硬半表裡之證矣此何以別主口苦咽乾目眩也大抵病於經絡者此篇及太陽諸條已悉之若膽熱腑自病之證則賴有此條及之耳膽雖清淨之腑然邪入於內未有不作熱者如太陽之有熱傳膀胱也蓋一經之內為病多端先聖各就其一而言之未可執此而礙彼也又按雜病有竹茹溫膽郁李酒解膽繫結之類皆膽自病非由經絡所致也少陽中風兩耳無聞目赤胸中滿而煩者不可吐下吐下則悸而驚少陽之脈起目銳眥老耳中其支者下胸中貫膈風傷氣壅則為熱少陽中風氣壅而熱故耳聾目赤胸滿而煩邪在少陽為半表半裡以吐除煩吐則傷氣氣虛者悸以下除滿下則亡血血虛者驚健曰少陽為病惟和解不宜吐下傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸經曰脈三部俱弦少陽受病脈細者邪漸傳裡雖頭痛發熱為表未解以邪客少陽為半在表半在裡則不可發汗亡津液冒中乾燥少陽之邪因傳入胃必發譫語當與調胃承氣湯下之胃和則愈不下則胃為少陽木邪干之故煩而悸宇泰凡頭痛俱為在表惟此頭痛為少陽者何也以脈弦細不可汗當以此為法海藏少陽半表裡用小柴胡名三禁湯然亦須辨表裡證孰多假令頭痛往來寒熱脈浮但有其一即為表也口失滋味渴脅下滿但有其一即為里也如無上下表里證余皆虛熱也是病在中矣觀子上二條雖有中風傷寒之不同然少陽三禁正治只小柴胡和解而已中風內熱氣壅故多滿而煩煩似可吐滿似可下傷寒頭痛發熱又似可汗不知在少陽汗吐下俱所忌也故均為戒之然雖三法分言在中風之不可汗傷寒之不可吐下又言見之矣譫語乃誤汗後之證故必微和胃實斯愈不和則煩且悸矣誤吐下得悸驚誤汗亦悸作者匪獨虛其經氣也少陽多挾飲在內悸與驚每由飲致耳膽者清淨之腑無出無入故汗之吐下之皆非其經所宜內經曰凡十一臟皆取決於膽也膽後之職並心君而統理一身之表裡者惟膽為然若但與解表里邪必不除但與攻裡表邪仍內陷是失其統理之義矣小柴胡以表裡雙解始為得宜至入腑欲去者亦必以大柴胡之兼方可安也健按少陽脈弦細頭痛發熱不可發汗發汗則譫語因傷胃之津液法以和胃為主成氏謂調胃承氣宇泰謂大柴胡重則小承氣此三者果和胃之藥乎抑利下之劑乎既不可汗而可下之乎若此則干誤下之禁矣此因誤下而譫少陽邪熱並於陽明之經並非入腑之譫中病之劑惟小柴胡白虎最得和解之妙重與之則悸煩亦定矣本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯太陽轉入少陽是表邪入於裡脅下硬滿不食往來寒熱者邪在半表半裡之間若已經吐下脈沉緊者邪氣入腑為裡實邪雖入腑外猶未解也與小柴胡湯以和解之亮宸脈沉緊有入里之勢然見證皆屬少陽故用小柴胡也觀子夫六經皆有中風傷寒之證為邪直傷本經而不從他經傳來者也此節之首曰本太陽不解轉少陽傳經之邪明甚則上二節之不從他經入益瞭然言外矣脅硬滿嘔不能食往來寒熱為半表裡證悉具尚未吐下為無誤治不致成壞證此一句又與下節相照應脈雖沉緊證純半表裡不得為陰病也故小柴胡主之經文於太陽內曰脈雖沉緊不為少陰病則斯之沉緊當同此義看黃氏少陰法雖悉屬和解然有誤汗譫語屬胃一證宜調胃承氣下之少陽雖無汗解之法然有小柴胡加薑桂者亦溫解微汗之意又此經本證脅痛耳聾往來寒熱乾嘔或嘔苦水宜小柴胡和解之倘不解者宜大柴胡下之若胸脅多痰瓜蒂散吐之斯皆仲景之微旨也若已吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之少陽之邪在表裡之間若妄吐下發汗溫針損耗津液胃中乾燥木邪干胃必發譫語若柴胡證未罷者則不為逆柴胡證罷壞病也詳其因何治之逆以法救之宇泰救壞病助營衛生津液桂枝湯類求之觀子即經所謂本柴胡證誤治之柴胡不中與也是矣健曰既云柴胡證罷為壞病應獨以譫語為治白虎湯主之若尚有燥矢而舌胎黃厚者調胃承氣與之可也三陽合病脈浮大上關上但欲眠睡目合則汗關脈以候少陽之氣太陽之脈浮陽明脈浮大上關上知三陽合病也膽熱則睡目合則汗知三陽合病膽有熱也兼善或謂此既屬少陽篇中亦可用小柴胡否曰可用夫三陽合病其邪發見於脈浮者太陽也大者陽明也上關上者少陽也但欲眠睡目合則汗此膽有熱脈證相符故出於少陽篇中蓋浮脈無證不可汗大脈無證不可下浮大之脈俱上關上知三陽合病而熱在膽也膽居半表半裡故用小柴胡亦當健曰脈分部位有主象主病之往分察合察所犯各可據也夫浮為太陽本象主表大為陽明本象主裡浮大兼至而上於關上者其象在關上更浮大耳關為少陽之部主半表裡故知三陽合病也據此脈證宜溫膽湯治之傷寒六七日無大熱其人躁煩者此為陽去入陰故也表為陽里為陰邪在表則外有熱六七日邪氣傳裡也故曰陽去入陰煩躁者謂先煩漸至躁也躁煩謂發躁而迤復煩也蓋內熱曰煩謂心中郁煩也外熱曰躁謂氣外熱躁也但熱為有根之火故但煩不躁及先煩後躁者皆可治觀子既曰三日三陰當受邪何又云六七日陽去入陰蓋三日三陽盡者是日傳一經之證六七日入陰者則又七日始傳一經之證如太陽篇末所云頗同也然七日一經盡即能去而入陰則六經之常必定傳遍又於言外見之矣健曰傳經無定期觀子之言詳矣然此陽去入陰者乃表邪入於裡之陰非傳入三陰經之陰是即入腑之下證耳故外無邪熱之甚而微熱仍在也內發躁煩則裡熱迫其津液應下之勢居多如舌無焦色腹不拒按者仍作半表裡論治與柴胡白虎清熱生津而病可已也傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也傷寒四日表邪傳裡里不和則不能食而嘔今反能食而不嘔是邪不傳陰當在陽也健曰此言三日三陽應盡而不傳三陰之驗不言他證是將解也傷寒三日少陽脈小者欲已也內經曰大則邪至小則平傷寒三日邪傳少陽脈當弦緊今脈小是邪氣微而欲解矣少陽病欲解時從寅至辰上寅卯辰少陽木旺之時也
