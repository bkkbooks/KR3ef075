body:
  text: 傷寒直指後序仲景傷寒論與素難相鼎足素難發天地人三才之祕明陰陽消長之微分經絡以貫穴俞別臟腑以通脈候推氣運以核年時辨主客以徵病象八風五氣之交加六淫七情之常變極天人之理五行生剋之道五味調燮之法以療民疾施諸針砭飲諸湯液此大聖賢啓教之經莫可得而名者夫上古之世民淳俗朴秉體充實而所患亦輕略投針砭隨手可愈泊乎後世形氣日漓病來猛厲非古法卒是仲景感發而起撰論立方救傷寒之危篤為萬世之醫祖其書與素難相表裡而素難言其常仲景窮其變亦莫可得而名也惜乎書遭散佚叔和編次紊亂以致學者難明易誤雖經歷代名家考辨而是是非非未得豁然無疵降至近習人澆俗薄病更變遷醫更荒謬即時行外感猶不能分經別證盛盛虛虛動手便錯何況傷寒誰其悟此無不視為文誠安道所云然也反覆思維傷寒險急之證最關性命世皆畏難而不能參究不惟掩沒仲景之大法寧忍群生之顛沛行見傷寒一門必致無可問矣於是不揣空疏因將林氏舊本校補闕漏五經寒暑七易其稿而纂此直指嗟夫傷寒論治本自顯然如三陽之桂枝麻黃大青龍葛根白虎柴胡承氣三陰之理中四逆附子回陽諸湯證言清理直何藉他人贅辭至今用之輒應及經傳變互相加減病情不無舛錯方劑不無峻利難於師法不得不闡解推詳斟酌損益而變通其用焉夫群賢條辨可云備矣但其間或欲言而不逮或阿順以隨文不能徹底果決即有決者終未能開通出路傳示後人使之進步以人仲景之室豫故曰自古以來注傷寒者夥矣有腿無足焉能走乎有足無路亦莫能行必有足有路方可向往足者何引今證古以理達權釋其疑而明其奧也路者何下咽疾病之方藥耳凡治病之要須識古今氣候之不同形質證勢之迥異古人未見今人之病今人焉能服古之方當設因時制宜之法以授之是為出路庶可度迷善後乃成傷寒佳本不致仍視畏途置之高閣慨乎前賢計未及此若之所以處心積慮廢寢忘餐專在是也至諸議論非不通也然文理未免多晦多復或於承上接下字面徑有可西可東之處方藥亦多夾雜昧者不察反有下喬入谷之差豫實不文匪敢點竄前輩第念源之不潔流何以清故將條注方藥通盤討勘晦者顯之復者節之方不合證者明辨之藥不對經者指正之更易之或刪去之並俗之混行非法以戕人者直折之善導之一字一句無不深研洗別終歸切當而平仄文情亦皆磨礱結構白香山云能使老嫗皆知不落術家氣味以補前人遺蘊以垂後世時宜惟願天生特達悟道排瀾春生大地豫實有厚望焉奈因力綿未能即付剖劂姑待機緣倘遂斯志則幸甚矣不然我之子孫當謹守勿失即不能有之刊刻行世以志我生平心血在是也旨乾隆二十八年歲在癸未春仲書於致蘇書屋易窗道人強健撰時年六十
