body:
  text: 傷寒直指卷十二類證三振戰栗振者身微動正氣虛寒也戰者身大動邪正相爭也栗者心戰動邪氣勝也振為輕戰為重戰在外而栗在內戰重於振而栗重於戰也吐下後心下逆滿氣上衝胸頭眩脈沉緊發汗則動經身振振搖茯苓桂枝白朮甘草湯太陽汗後不解仍發熱心悸頭眩身瞤動振振欲劈地真武湯下後復汗必振寒脈微細以內外俱虛也亡血家不可發汗發汗則寒栗而振諸乘寒者則為厥鬱冒不仁口急不能言戰而栗也陰中於邪必內栗也士材按經云下後復發汗及亡血家誤汗必為寒振內外俱虛也又曰表氣微虛裡氣不守邪中於陰則栗乃知振搖之證屬氣血俱虛不能榮養筋骨故為之振而不能主持須大補氣血則可用人參養榮湯屢效素問曰寒邪傷人使人毫毛畢直鼓頷戰栗此表有邪當發其汗仲景云脈浮而緊按之反芤此為本虛當戰汗而解又三部脈浮沉遲數同等必戰汗而解外不戰但內栗者陰中於邪也凡傷寒欲解則戰而汗出者此邪不勝正也若正不勝邪雖戰無汗不可治矣節庵戰栗者陰陽相爭故體動搖也邪氣外豫正氣爭則戰內與正氣爭則栗戰者正氣勝得汗而解者栗則不戰而但鼓頷遂成寒逆此陰氣內中正不勝邪宜姜附四逆加艾火灼之經曰陰中於邪必內栗又云邪中下焦陰氣為栗足膝逆冷便溺妄出皆由此矣若復躁不得臥者死在表者沖和湯在裡人參理中湯此陰經自中寒者用之若傳經戰栗者大柴胡治之祗和凡汗下後戰者與救逆湯再與羊肉湯而解若陰氣內盛氣大虛心栗鼓頷者遂成寒逆宜灸之或大建中湯或理中湯筋惕肉瞤汗多亡陽津液枯而筋肉失養故筋惕而跳肉瞤而動也宜溫經益陽脈微弱汗出惡風誤服大青龍湯厥逆筋惕肉瞤真武湯太陽發汗不解仍發熱心悸頭眩身瞤動振振欲劈地真武湯或人參養榮湯倍人參當歸吐下後復發汗虛煩脈甚微心下痞硬脅痛氣衝咽喉眩冒經脈動惕久而成痿桂枝茯苓白朮甘草湯真武湯發汗復下表裡俱虛陰陽並竭復加燒針因胸煩面青黃膚瞤者難治色微黃手足溫者易愈節庵發汗過多或虛弱人發汗後或傷風自汗妄用大青龍致筋惕肉瞤者並屬真武湯羸者去芍藥有熱者去附子應發汗而復有動氣汗之筋惕肉瞤或頭眩汗出不止者其候最逆先宜防風白朮牡蠣湯次服小建中可十救一二士材此證因於汗者十有七八不因汗者素稟血虛邪熱摶血而致又有未嘗發汗七八日筋惕而肉不瞤潮熱大便祕小便澀臍旁硬痛此燥矢也大柴胡下之一虛一實治法相懸可不慎乎驚悸心主神神依血心血一虛神失所守而舍空痰水客之此驚悸之所作也驚者惕然不寧觸事易驚氣鬱生痰也悸者築然跳動蓋以心虛則停水水居火位心實畏之故怔忡也太陽汗出不解仍發熱心悸頭眩身瞤動振振欲劈地真武湯發汗過多其人叉手自冒心心下悸欲得按桂枝甘草湯汗後臍下悸欲作奔豚茯苓桂枝甘草大棗湯八九日下之胸滿煩驚小便不利譫語一身盡重柴胡加龍骨牡蠣湯以火劫汗亡陽驚狂桂枝去芍藥加蜀漆龍骨牡蠣救逆湯二三日悸而煩小建中湯脈結代心動悸炙甘草湯少陽耳聾目赤煩滿不可吐下吐下則悸而驚小柴胡去黃芩加茯苓五六日往來寒熱胸脅滿默默不欲飲食心煩喜嘔或心下悸上方脈弦細頭痛發熱屬少陽誤汗則譫語胃不和煩而悸大柴胡湯調胃承氣湯少陰四逆而悸四逆散加桂枝厥而悸者宜先治水茯苓甘草湯霍亂心悸理中湯加茯苓念莪按驚與悸雖有分別總皆心受病也因陽氣內弱法當鎮固水飲停畜法當疏通心之為患甚於他邪雖有餘邪必先治水蓋以水停心下無所不入侵於肺為喘傳於冒為嘔溢於皮為腫漬於腸為利故治不可緩也經曰厥而悸者宜先治水夫病莫重於厥猶先治水況其他乎節庵悸有氣虛有停飲氣虛者陽氣內怯心下空虛正氣內動而悸或汗下後正氣虛亦悸法當先定其氣停飲者因飲水過多水停心下心不自安而悸小便利者茯苓桂枝白朮湯小便少者必裡急豬苓湯明理論少陰四逆或悸四逆散加桂五分是氣虛而悸也損庵傷寒證屬驚者皆壞病也由誤下火逆溫針所致仲景法各隨其逆而調之悸者或汗下後或氣虛或飲多俱如各條所說也兼言驚與悸者少陽吐下一證也其故逆則小柴胡去黃芩加茯苓瘛瘲瘛者筋脈急而縮瘲者筋脈緩而伸一伸一縮手足牽引俗謂之搐搦風主動搖乃風熱盛也宜以祛風滌熱之涼劑治之或有可生若妄加的火及發表之藥則禍不旋踵瘛瘲音翅縱汗下後日久瘛瘲此虛極生風小續命湯加減不因汗下瘛瘲羌活芩連天麻四物湯汗出露風汗不流通手足搐搦牛蒡根散風溫被火劫發汗微黃色瘛瘲萎蕤湯仁齊駱龍吉言心主脈肝主筋心屬火肝屬木火生熱木生風風火相扇則瘛瘲也若夫不因汗下後所生者當平肝木制心火佐以和血脈之藥有痰者加痰藥挾風者加風藥若經汗下後日久傳變而得此者為病勢已過多難治也蓋因虛極生風所致須用小續命或大建中增損治之若瘛瘲戴眼反折絶汗出如貫珠不流者太陽終也不治又有四肢漐習動而不止似瘛瘲而無力抽搐此為肝絶死矣凡用續命有汗去麻黃無汗去黃芩要在變通而已拘急蜷手足不能自如屈伸不便蜷臥拘急陰寒所致也四肢諸陽之本因發汗亡陽陽虛而有此證蜷者陰寒之極屈縮不伸少陰惡寒身蜷四逆救之若有陰無陽者不治太陽自汗脈浮小便數心煩微惡寒腳攣急芍藥甘草湯發汗漏不止惡風小便難四肢微急難屈伸桂枝加附子湯大汗出熱不去內拘急四肢疼下利厥冷惡寒四逆湯少陰下利自止惡寒而蜷手足溫者可治惡寒而蜷時有煩欲去衣被者可治惡寒身蜷而利手足逆冷不治四逆惡寒身蜷脈不至不煩而蜷者死風濕相傳骨節煩疼不得屈伸汗出短氣小便不利惡風或微腫甘草附子湯不仁仁柔也不仁身不柔和痛癢不覺針火不知也經曰諸虛乘寒則為鬱冒不仁蓋氣血虛少不能流行於身正氣為邪氣所伏故肢體頑麻不仁厥如死尸也若脈浮而洪身汗如油喘而不休水漿不下形體不仁此命絶也鬱冒不仁厥如死尸桂枝麻黃各半湯或補中益氣湯入薑汁少陰脈不至寒氣上奔血結心下熱歸陰股與陰相動身不仁亦曰尸厥甘草乾薑湯桂枝芍藥湯加姜明理不仁由邪氣壅盛正氣閉伏鬱而不發營衛氣血虛少不能通行致然內經曰營氣虛則不仁針經曰衛氣不行則不仁經曰營衛不能相將三焦無所仰身體痹不仁由是言之不仁為營衛氣血虛少明矣經又曰諸乘寒者則為厥鬱冒不仁此厥者言正氣為寒所乘非四肢逆冷之厥也何也蓋以鬱冒為昏冒不仁為不知痛癢得不為尸厥之厥耶經曰少陰脈不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸陰股與陰相動令身不仁此為尸厥其乘寒之厥鬱冒不仁即此尸厥可知也昔越人入虢診太子尸厥不仁刺之而痊此可治也若脈浮而洪身汗如油形體不仁者雖越人其能起歟肉疴出內經謂頑痹不知痛癢也汗出太多營與衛俱虛血氣不和肌肉失養故也汗後雖近衣絮猶尚肉疴羌活沖和湯加桂枝木香當歸仁齊傷寒發汗過多亡其血者多變此證又氣血俱虛復為寒邪所襲則血凝脈泣而不仁身重有風溫有風寒有火逆有易病有三陽合病雖所由不一然悉屬三陽經非若身疼兼有三陰也壞病有之寒則必無矣風寒兩傷身不疼但重乍有輕時無少陰證大青龍湯八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側柴胡加龍骨牡蠣湯陽明脈遲汗出不惡寒身重短氣腹滿而喘潮熱手足濈然汗出大便已硬大承氣湯脈浮緊咽燥口苦腹滿而喘發熱汗出反惡熱身重柴葛解肌湯或小柴胡加葛根三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿自汗出白虎湯少陰腹痛四肢沉重疼痛下利小便不利真武湯陰陽易身重少氣少腹急引陰中熱上衝胸眼花燒褌散風溫發汗已猶灼熱汗出身重多眠萎蕤湯脈浮汗出惡風身重防己黃芩湯健曰病人身重無論外感內傷最為不吉如自知肢體重著疼痛難以轉側者此屬三陽經證乃風寒濕氣未散或發汗或解肌祛風利濕可愈也如身重不知痛楚腰軟昏沉不論老少久新皆屬陰盛陽衰正不勝邪大為危候若裡實或結胸難解或燥屎堅閉者均為難治終致者多學者須留意焉面赤怫鬱者即面赤也陽氣蒸越在表故面色赤雖由於熱然六經俱無可下之證亦有陰寒水極似火者須兼他證別之太陽如瘧狀脈微惡寒面反有熱色身癢桂枝麻黃各半湯太陽初得病發汗不徹並於陽明續自微汗面色緣緣正赤解肌湯陽明病面合赤色不可攻葛根湯少陰下利清穀裡寒外熱厥逆脈微欲絶反不惡寒面色赤通脈四逆湯加蔥白厥陰下利清穀脈沉遲面少赤微熱必鬱冒汗出而解戴陽下虛者必微厥四逆湯面赤如錦紋咽痛吐膿血陽毒也陽毒升麻湯陶氏怫鬱如大便硬而短氣燥渴者實也大柴胡湯小便不利時有微熱大便乍難怫鬱不得臥者燥屎作實也大小承氣湯汗下後有此證飲水而噦者胃虛也桂枝人參湯加茯苓目直視視物而不轉睛為直視也五臟六腑之脈皆上注於目邪氣壅盛冒其正氣則神識不慧臟精之氣不能上榮於目故直視此邪氣已極正氣已壞吉少凶多者也故曰狂言直視為腎絶直視搖頭為心絶直視譫語喘滿者死直視下利者死又戴眼反折者是為上視絶汗如珠不流膀胱絶也不治衄家不可發汗汗則額陷脈緊急直視不能眴目受血而能視亡血則肝虛發汗又亡陽則陰陽俱虛此證雖逆尚可以補劑救十之一二陽明吐下後不大便潮熱不惡寒獨語如見鬼劇者不識人循衣摸床惕而不安微喘直視死脈弦者生澀者死微者但發熱譫語大承氣湯傷寒目中不了了睛不和無表裡證大便難微熱此為實急下之上方風溫被下小便不利直視失溲詳風溫不了了猶為可治之候若直視為不治者多矣不能言默默不欲言者陰主靜也熱者喑啞者火傷肺也風溫語言難出少陰咽瘡者傳邪所傷也及風熱入肺風邪伏肺俱令聲嘎各別而治之少陰咽中生瘡不能語言聲不出苦酒湯太陽發汗已身猶灼熱為風溫脈尺寸俱浮自汗身重多眠鼻鼾語言難出萎蕤湯惑病蟲蝕咽喉上唇有瘡則聲嘎甘草瀉心湯痙病口噤不能言剛痙葛根湯柔痙桂枝湯加栝蔞根火邪刑金聲嘎芩連知母黃柏麥冬桔梗五味甘草風熱壅盛咳嗽聲啞桔梗甘草荊防薄荷知母花粉熱病喑啞不言三四日不得汗者死健按不能言而舌滑無胎者乃真陰為寒直中陽氣不得上通為難治其或熱上壅於肺或瀉利脾憊不能行其津液舌本強口禁不能言者尚為可治若邪實胃腑濁垢內結穢濁上衝陽明昏憒而舌焦短縮芒刺者乃大承氣急下之豫嘗治此屎去即能言矣漱水不欲咽內有熱必喜水今欲飲而不欲咽是熱在經而里無熱也屬在陽明此經氣血俱多經中熱甚逼血妄行必將衄也凡在表者是邪熱在經也無表證加之胸腹滿如狂者畜血也亦多燥而不渴又陰證發躁煩渴不能飲水或勉強下咽頃即吐出或飲下即嘔噦皆內真寒而外假熱也蓋無根失守之火遊於咽嗌之間假燥渴故其證欲飲而不能飲也宜分別之陽明身熱頭痛口燥漱水不欲咽必衄血脈微犀角地黃湯茅花湯無表證不寒熱胸腹滿唇口燥漱水不欲咽小便多此為瘀血必發狂輕者桃仁承氣湯甚者抵當湯少陰脈沉細厥逆漱水不欲咽四逆湯下利厥逆無脈乾嘔煩漱水不欲咽白通湯加膽汁人尿吐蛔口燥舌於但欲涼水浸舌及唇不得咽理中湯加烏梅衄血衄者鼻中出血也雜病衄者責熱在裡傷寒衄血責熱在表夫心主血肺主氣肺開竅於鼻血得熱則隨火上逆故雜病以衄為裡熱經曰傷寒不發汗因致衄者與麻黃湯六七日不大便頭痛有熱與小承氣湯小便清者知不在裡仍在表也當發其汗若頭痛者必衄蓋經絡熱甚則迫血上行邪解則不壅盛上迫故傷寒衄為表熱也古人以衄為紅汗曰奪血者無汗奪汗者無血成流者不須服藥當與水解即止點滴者邪猶在經當散其邪衄血雖為欲解若衄不止而頭面汗出其身無汗及發汗不至足者難治太陽脈浮緊不發汗因致衄麻黃湯陽明脈浮發熱口乾鼻燥能食者必衄黃芩湯陽明口燥但漱水不欲咽者必衄黃芩芍藥湯衄後脈猶浮麻黃湯衄後脈已微黃芩芍藥湯或犀角地黃湯衄多不止茅花湯加黃芩黃連墨汁衄忌寒藥涼水過多必成畜血結胸輕犀角地黃湯重桃仁承氣湯少陰但厥無汗強發之血從口鼻目出為下厥上竭難治活人太陽證衄血乃解陽氣重故也仲景所謂陽盛則衄是也凡小衄而脈尚浮緊者宜再與麻黃湯脈浮緩自汗者再與桂枝湯言衄家不可發汗者蓋為脈微也既二藥不可用犀角地黃湯主之衄而心煩飲水則吐者先服五苓散次服竹葉石膏湯復庵鼻衄屬太陽經風寒皆有之既衄而表證仍在者於寒再用麻黃湯於風再用桂枝湯及謂發煩目瞑劇者必衄既發煩目瞑豈純是太陽經夫陽明之脈循鼻是太陽侵入陽明汗下俱難若衄已而熱不退惟升麻葛根湯敗毒散陽旦湯為穩若少陰初得病誤以正發汗之法致迫其血動經妄行而衄非獨出於鼻或從口中或從耳目又有陽陷入陰四肢厥醫誤為寒邪在表從而汗之當下反汗以致動血是為下厥上渴難治先哲云桂枝下咽陽盛則斃正謂此也要知汗出不徹為陽之衄誤發其汗為陰之衄二者大不同也節庵以麻黃桂枝治衄非治衄也散其經中邪氣耳衄家不可汗汗出額上陷直視不眴不眠芍藥地黃湯陽明自利加衄者麻黃升麻湯少陰強汗下厥上竭者當歸四逆湯仍灸太豁三陰交湧泉穴江瓘仲景言衄家不可汗亡血家不可汗而此用麻黃湯何也蓋既衄之人亡血已多故不可再汗此則當汗不汗熱毒蘊結無由解散故仲景又云傷寒脈浮緊不發汗因致衄者麻黃湯主之蓋發其汗則熱越而出血自止也健曰衄而可汗者衄惟點滴非表劑汗之則邪熱不解此活人所謂小衄也衄而不可汗者衄已成流若再發汗則額陷而致直視不眴不眠之患總宜確審吐血雜病吐血咯血責為熱邪傷寒吐咯血者皆由誤於汗下併火逆所致或失汗下血熱而成是為壞病當隨其逆而調之惟少陰厥竭為強動陰血難治凡服桂枝湯吐者其後必唾膿血黃芩湯脈浮發熱反灸之必咽燥吐血救逆湯咽喉閉塞不可發汗汗則吐血氣欲絶厥冷蜷臥當歸四逆湯大下後寸脈沉遲尺脈不至咽喉不利唾膿血有兩證陽毒麻黃升麻湯陰毒甘桔湯加半夏生薑陽毒咽痛吐血面赤斑斑如錦紋升麻鱉甲湯燥渴吐鮮血黃連解毒湯加丹皮生地吞四生丸不渴吐血如豬肝理中湯加墨汁仁齊凡吐血衄血無表證脈不浮者不可發汗東垣云脈微者宜黃芩芍藥湯脈滑若數者犀角地黃湯如熱甚血不止者河間地黃散古方四生丸血虛者東垣麥冬飲子三黃補血湯大抵脈滑小者生實大者死或吐或衄後脈微者易治熱反盛脈數急者死凡血得熱則行得冷則凝得黑則止所以犀角地黃湯加京墨一二匙最效昔陶尚文治一傷寒四五日吐血不止醫以犀角地黃等湯治之反劇陶公切其脈浮緊而數遂用麻黃湯一劑汗出而愈可謂得仲景之法者矣若脈非浮緊而數此法安可施乎節庵吐血者諸陽受熱其邪在表當汗不汗致使熱毒入臟積瘀於內遂成吐血若見眼紅目閉神昏語短眩冒迷妄煩躁漱水驚狂譫語鼻衄唾紅手冷足寒四肢厥冷胸腹急滿大便黑小便數見一二證皆瘀血也初得此病急宜治之若陸續不已經數時而腹痛則難愈矣健曰凡人脾胃虛弱內熱偏盛者外傷於寒內伏其熱火邪不得伸泄而血出於口當從東垣醫案所立麻黃人參芍藥湯治之觀子謂此方足以為範模也畜血當汗不汗則為畜血血結胸腹硬滿手按則痛若小便不利乃水與氣也小便自利為有畜血許學士云畜血在上其人喜忘畜血在下其人如狂凡尿血身黃必畜血者多太陽六七日表證仍在脈微而沉不結胸發狂少腹硬滿小便自利下血者愈若不下血瘀熱在裡抵當湯身黃脈沉結少腹硬小便自利如狂上方太陽病不解熱結膀胱少腹急結其人如狂桃仁承氣湯陽明病喜忘大便黑為畜血在上犀角地黃湯在中桃仁承氣湯在下抵當湯胸滿痞痿舌青口燥但漱水不欲咽無寒熱脈微大來遲腹不滿其人言我滿有瘀血也桃仁承氣湯如熱狀煩滿口燥渴脈反無熱陰伏瘀血也當下之明理畜血者血在上焦結聚畜而不散也由傷寒失汗畜血在裡太陽之邪隨經內瘀血為熱轉結而不行畜於下焦也凡診傷寒先看面目次觀口舌及心下至少腹以手按之若少腹硬滿便當問其小便小便不利者是津液留結可利小便若小便自利者是畜血也可下其瘀血經曰傷寒有熱少腹滿小便不利今反利者有畜血也又曰太陽身黃脈沉結少腹硬小便不利為無血也小便自利其人如狂血證諦也然畜之中又有輕重如狂也喜忘也皆證之甚也抵當湯外已解但少腹結證之輕也桃仁承氣湯五法少腹急者邪在下焦無頭痛惡寒發熱者外證已解大便黑者瘀血漬之小便利者血病而氣不病上焦主陽下焦主陰陽邪居上為重陽重陽則狂今瘀血客於下焦下焦不行則幹上部清陽之分而天君弗寧矣故如狂海藏血證古人用藥雖有輕重之殊而無上下之別今分作上中下三等以衄血嘔血唾血吐血為上部血結胸中為中部畜血下焦為下部夫既有三部之分藥當隨之輕重也失血多為衄血脈浮灸之咽燥為唾血當汗不汗熱入於裡為嘔血吐血此在上也犀角地黃湯主之涼膈散加生地亦可大凡血證皆不飲水惟氣證則飲之此證乃足太陰所主脾所不里越而上行實者犀角地黃湯虛者黃芩芍藥湯凡病嘔吐者皆脾所主故咸用芍藥主之是知太陰藥也頭痛身痛漱水不欲咽者衄胸滿漱水不欲咽喜忘昏迷其人如狂心下手不可近者血結在胸中也桃仁承氣湯其人發狂小腹硬滿小便自利大便反黑及臍下疼者畜血下焦也抵當湯丸主之如狂者在中發狂者在下便膿血便膿血者乃傳經熱邪或與微涼或用疏導可愈若誤投辛熱則難痊矣世以此為難療之證而仲景著便膿血別無死證也然又有陰寒為病下利膿血者病人無表裡證發熱七八日雖脈浮數可下之若下後脈數不解而利不止必協熱便膿血黃芩湯柏皮湯少陰下利便膿血桃花湯色紫黑理中湯少陰下利便膿血者可利腹滿身熱下如魚腦溫毒也桃花湯地榆散黃連阿膠湯先厥後發熱下利必自止不止必便膿血厥少熱多病當愈至七日熱不除者必便膿血下利脈數而渴者自愈不愈者必清膿血清即固也下利寸脈反浮尺中自澀必清膿血熱少厥微煩躁小便利色白欲食為欲愈若厥而嘔胸脅滿煩後必便血少陰八九日一身手足盡熱以熱在膀胱必便血太陽以火熏之不得汗其人必躁再到太陽不解必清血太陽下之脈浮滑者必下血淋家不可發汗發汗必便膿血仁齊凡下血便膿血有陰陽冷熱之不同古人云見血無寒血得熱則行此大概之言然屬熱者常八九屬寒者常一二不可拘泥於無寒也要略曰陽證內熱則下鮮血陰證內寒則下紫黑如豚肝也且陽證脈數而有力者為實熱苦寒之藥可救若數而無力者虛熱也當甘溫養血中少佐寒藥若陰證脈遲而有力者為有神可治無力者難治也凡下利膿血身熱脈大者難治身涼脈小易治下血脈洪大急硬不和者死脈雖大而和者可治也損庵太陽火熏再到太陽必清血是火邪迫血而下也淋家發汗必便膿血此壞病也由小便淋瀝所致與豬苓湯利其小便而愈陽明下血譫語熱入血室也刺期門散其熱無表裡證脈浮數下之協熱便膿血熱勢下流也陶氏陰寒為病下利膿血者乃下焦虛寒腸胃不固清濁不分而便膿血二者一為血熱一為血寒也熱入血室衝脈為血之海即血室也男女均有此血海衝脈得熱血必妄行在男子則為下血譫語邪熱傳入陽明腑也在婦人則為寒熱如瘧邪隨經入皆為熱入血室逼血下行挾熱而利是熱入血室男女皆有之也挾熱之脈乍澀乍數或伏或沉血熱交併則脈洪盛男子於左手見女子右手見也男子熱人血室下血譫語但頭汗出刺期門婦人熱入血室經水適斷寒熱如瘧發作有時小柴胡湯或加生地當歸丹皮經水適來熱除身涼脈遲胸脅滿如結胸狀譫語刺期門經水適來晝日明瞭暮譫語如見鬼狀不須治自愈尚文婦人熱入血室有三一條不言藥者以經血方來熱氣乘虛而入經血止則熱亦止矣故不可汗下如胸滿譫語此由實也宜刺而瀉之蓋經水適斷續得寒熱其血必結矣故用小柴胡湯無汗有寒邪在表而無汗者有邪氣行於里而無汗者有水飲內畜而無汗者有陽虛無汗者太陽傷寒無汗而喘麻黃湯中風無汗煩躁大青龍湯太陽項背強𠘧𠘧無汁惡寒葛根湯傷寒無汗渴欲飲水無表證者白虎加人參湯如瘧發熱惡寒面反有熱色不得小汗出身必癢桂枝麻黃各半湯服桂枝湯或下仍頭項強痛發熱無汁心下滿微痛小便不利桂枝去桂加茯苓白朮湯陽明中風脈弦浮大短氣腹滿脅及心痛鼻乾不得汗嗜臥發黃小便難潮熱噦小柴胡湯脈但浮無餘證者麻黃湯陽明脈浮無汗而喘麻黃湯陽明無汗小便不利心中懊憹必發黃五苓散加茵陳但頭汗身無汗小便不利而渴必發黃茵陳蒿湯陽明法多汗反無汗身如蟲行皮中久虛敵也朮附湯黃耆建中湯少陰脈沉發熱無汗麻黃附子細辛湯少陰但厥無汗強發之血從口鼻目出名上竭下厥難治脈浮而遲遲為無陽不能作汗身必癢各半湯脈弱無力難作汗血虛也黃耆建中加朮附湯投麻黃湯三大劑而不得汗者死汗雖出不至足者死熱病脈躁盛而不得汗者死是為陽脈之極然有當和解之證汗之不得汗者和解之力到汗自出而解矣慎勿誤以為死證頭汗諸陽經絡皆循於頭頭者諸陽之會邪持諸陽津液上湊乃為頭汗三陰經不上於頭故陰經無頭汗也遍身有汗謂之熱越但頭汗出熱不得越而上蒸也故或吐或下以除之濕家但頭汗出者寒濕相搏不通之逆若小便不利而成關格但頭汗出者陽脫也故曰頭無汗者生有汗者死又濕家下後頭額汗出微喘亦陽脫也濕家下之額上汗出小便不利者死下利不止者亦死皆為逆也太陽水結胸無大熱頭微汗大陷胸湯孫兆水結胸脅頭必有汗治以半夏茯苓湯已汗復下胸脅微結小便不利渴而不嘔頭汗出往來寒熱心煩柴胡桂枝幹薑湯五六日頭汗出微惡寒手足冷心下滿便硬脈細為陽微結有表復有里也頭汗出者為陽微小柴胡湯陽明下後外有熱不結胸懊憹頭汗出梔子豉湯陽明但頭汗出劑頸而還小便不利而渴瘀血在裡身必發黃茵陳五苓散陽明被火額上微汗出小便不利發黃五苓散或梔子加茵陳柏皮湯熱入血室下血譫語但頭汗出刺期門發黃頭汗出小便難而渴濕也茵陳五苓散或茵陳大黃湯頭汗額上偏多者屬心部為血證四物湯加桃仁紅花白朮甘草以益脾土嗣真頭汗出有數種如發黃頭汗出者熱不得越而上泄也背強惡寒頭汗出寒濕摶經絡也下血譫語頭汗出熱入血室也虛煩懊憹頭汗出邪客胸中熏發於上也水結胸頭汗者水氣停結不得外行也陽微結與往來寒熱頭汗者邪在半表半裡也發黃鼻衄小便難頭汗出者邪風火熱熏灼上炎也此數者皆為邪所幹而致若關格不通頭汗者死濕家下之額汗微喘小便利者死既皆陽氣上脫為逆也活人病人表實裡虛玄府不開則陽氣上出汗見於頭凡頭汗者五臟乾枯胸中空虛津液少也慎不可下下之為重虛節庵夫裡虛不可下內涸不可汗既頭有汗不可再汗或實熱在內小便利而大便黑為畜血頭汗出者輕則犀角地黃湯重則桃仁承氣湯熱入血室半表半裡頭汗出者小柴胡湯海藏頭汗出劑頸而還血證也額上偏多者屬心部獨益中州脾土以血藥治之其法無以加矣宋迪凡額上手背冷汗者陰毒傷寒也宜四逆湯急溫之焉得謂陰證必無汗手足汗胃主四末為津液之主手足汗出為熱聚於胃是津液之旁達也經曰手足濈然汗出者大便已硬又曰手足漐漐汗出大便難而譫語二者便宜下之若陽明中寒不能食小便不利手足濈然汗出此欲作痼瘕不宜下之二者俱手足汗一為初硬後溏胃中冷水穀不別故不可下一便難譫語為陽明證具故宜下陽明脈遲汗出不惡寒身重短氣腹滿喘潮熱此外欲解可攻裡也手足濈然汗出大便已硬大承氣湯陽明中寒不能食水穀不別小便不利手足濈然汗出厚朴生薑甘草半夏人參湯吳茱萸理中湯二陽並病太陽證罷潮熱手足漐漐汗出大便硬譫語大承氣湯盜汗睡而汗出覺即汗止也睡則熱氣行於里乘表中陽氣不致故津液泄覺則氣行於表故止矣雜病盜汗主陰虛傷寒盜汗由邪氣在半表半裡也蓋邪在表則自汗經曰微盜汗出反惡寒者表未解也陽明當作裡實而脈浮者必盜汗出猶有表邪也又三陽合病目合則汗是知盜汗邪在表裡之間悉屬和解明矣非若自汗有表裡虛實之分陽明潮熱脈但浮必盜汗出黃芩湯或桂枝茯苓白朮湯三陽合病脈浮大上關上但欲眠睡目合則汗小柴胡湯表熱裡寒表寒裡熱表熱裡寒陰證脈沉遲手足微厥下利清穀而反發熱也表寒裡熱少陰惡寒而蜷表寒也時時自欲去衣被裡熱也脈必滑身厥舌乾者是也陽明脈浮而遲表熱裡寒下利清穀四逆湯少陰下利清穀裡寒外熱手足厥逆脈微反不惡寒面赤或腹痛或嘔或咽痛或利止脈不出通脈四逆湯下利清穀裡寒外熱汗出而厥上方既吐且利小便復利大汗出下利清穀內寒外熱脈微欲絶四逆湯大熱惡寒大寒惡熱健曰熱邪鬱結外必惡寒寒邪鬱結內必惡熱皆宜和解身大熱反欲近衣熱在皮膚寒在骨髓身大寒反不欲近衣寒在皮膚熱在骨髓節庵趙嗣真曰明理論云往來寒熱者邪正分爭也邪氣之入人正氣不與之爭則但熱而無寒若正邪分爭於是寒熱交作蓋寒邪為陰熱邪為陽里分為陰表分為陽邪之客於表也為寒邪與陽爭則寒邪之入於裡也為熱邪與陰爭則熱若在表裡之間外與陽爭內與陰爭由是寒熱且往且來日數度發也若以陰陽二氣相勝論陽不足則先寒後熱陰不足則先熱後寒此則雜病陰陽二氣自相爭勝然也非可以語傷寒斯論精切深合仲景之旨蓋不惟釋疑活人書而已也又按河間言惡寒為寒在表或身熱惡寒為熱在皮膚寒在骨髓者皆誤也而活人以此為表裡言之故趙氏曰詳仲景論止分皮膚骨髓而不曰表裡者蓋以皮膚肉脈筋骨五者素問以為五臟之合主於外而充於身者也惟曰臟曰腑方可信表裡可見皮膚即骨髓之上外部浮淺之分骨髓即皮膚之下內部深沉之分與經絡屬表臟腑屬裡之例不同況仲景出此於太陽篇首其為表證明矣是知虛弱表寒之人感邪發熱熱邪浮淺不勝沉寒故外怯而欲近衣此所謂熱在皮膚寒在骨髓也藥用辛溫至於壯盛素熱之人或酒客輩感邪之初寒未變熱陰邪閉其伏熱陰凝於外熱畜於內故煩而不得近衣此所謂寒在皮膚熱在骨髓也藥用溫涼一發之餘表解里和此仲景不言之妙若以皮膚為表骨髓為里則麻黃證骨節疼痛其可謂有表復有里那仲景傷寒一書人但知為方家之祖而未解作秦漢文字觀故於大經大法處反生疑似而後世之人類輯方書往往失其本義並加穿鑿引以雜病為類特引其例者爾如瘧熱多寒少如瘧者作止有時非若寒熱往來之無定時也有太陽有陽明有婦人熱入血室之不同熱多寒少亦有三證其用藥各不同也太陽八九日如瘧發熱惡寒熱多寒少不嘔清便自可日二三度發脈微緩為欲愈脈微惡寒陰陽俱虛不可更汗吐下面反有熱色不得小汗身必癢桂枝麻黃各半湯服桂枝湯大汗出後如瘧日再發汗出必解桂枝二麻黃一湯發熱惡寒熱多寒少脈微弱無陽也不可更汗桂枝二越婢一湯病人煩熱汗出則解又如瘧狀日晡發熱陽明也脈浮虛桂枝湯脈實大承氣湯婦人熱人血室其血必結故使如瘧狀小柴胡湯節庵熱多寒少陽乘陰也若脈遲為血少先以黃耆建中湯養其營衛候尺脈不遲卻以小柴胡桂枝二越婢一湯選用厥陰脈浮緩囊不縮發熱惡寒似瘧為欲愈桂枝麻黃各半湯溫瘧脈和平身無寒熱骨節煩疼時嘔白虎加桂枝渴者柴胡加人參栝蔞根湯小便不利小便難因汗而小便不利者津液亡於外也因下而小便不利者津液耗於內也痞證或發黃或熱病而小便不利者皆熱鬱所致也風溫相摶與陽明中寒小便不利者寒邪所乘也其小便難者亦由汗下所致也傷寒表不解心下有水氣乾嘔發熱而咳小便不利少腹滿小青龍去麻黃加茯苓大汗後胃干煩躁不眠欲飲水少少與之愈若脈浮小便不利微熱消渴脈浮者五苓散不浮者豬苓湯服桂枝湯或下後仍頭項強痛發熱無汗心下滿微痛小便不利桂枝去桂加茯苓白朮湯心下痞與瀉心湯痞不解渴而躁煩小便不利五苓散往來寒熱胸脅滿不欲飲食心煩喜嘔或心下悸小便不利小柴胡湯去黃芩加茯苓已汗復下胸脅滿微結小便不利渴而不嘔但頭汗寒熱心煩柴胡桂枝幹薑湯下之胸滿煩驚小便不利譫語一身盡重不可轉側柴胡加龍骨牡蠣湯陽明中風誤下後脈浮發熱渴欲飲水小便不利豬苓湯小便不利大便乍難乍易微熱喘冒不能臥有燥屎也大承氣湯但頭汗小便不利渴飲水漿熱不得越必發黃茵陳蒿湯身黃如橘小便不利腹微滿上方無汗小便不利心中懊憹必發黃五苓散加茵陳陽明被火額上微汗小便不利發黃五苓散加茵陳山梔中寒不能食小便不利手足汗出欲作痼瘕建中湯少陰小便不利大便自利腹痛四肢沉重痛有水氣也真武湯四逆或小便不利四逆散加茯苓腹痛小便不利下利不止便膿血桃花湯噦而腹滿前部小便不利脈浮五苓散不浮豬苓湯陰證小便不利手足厥冷脈微細不宜復利小便藥惟四逆救陰或灸氣海或行蔥灸法發汗遂漏不止惡風小便難四肢急難屈伸桂枝加附子湯小便少必裡急豬苓湯陽明中風脈弦浮大短氣胸滿脅及心痛鼻乾不得汗嗜臥發黃小便難潮熱噦外不解小柴胡加茯苓脈但浮無餘證者麻黃湯念莪仲景大法太陽證脈浮五苓散不浮豬苓湯二方皆以豬苓茯苓澤瀉為主也但五苓散加白朮桂枝辛甘為陽也豬苓湯加阿膠滑石甘寒為陰也陽明熱黃與梔子柏皮湯脅痛身黃與小柴胡少陰有水則行真武厥陰寒閉則行四逆其汗多亡陽者以桂枝加附子湯後世以熱盛赤澀不通者與八正散陰虛火動赤澀不利者與生地木通黃柏知母不渴小便不利赤熱者血分亦知柏生地類皆補仲景之未備也膀胱為津液之府汗多則津液外泄小便因難不可利之恐重亡其津液待汗止小便自行也又有熱甚而小便不利者勿妄利之恐引熱入於膀胱往往變為畜血也活人發汗後汗出多亡津液冒中干故小便不利醫不知遂利小便誤矣類纂云胃中干則無小便仲景云下之後復發汗小便不利亡津液也若引飲下焦有熱小便不通者可利脈浮五苓散脈沉豬苓湯利之小便難者陰虛也陰虛者陽必湊之由膀胱受熱故小便赤澀而不利也宜瞿麥滑石類若太陽漏不止小便難桂枝加附子陽明中風小便難則柴胡加茯苓節庵邪氣聚於下焦結而不散甚則小腹硬滿而痛此小便所以不通大便亦有不利者行之取其滲泄也若引飲過多下焦畜熱或中濕發黃小便停畜皆以利小便為先惟汗亡津液胃汁干與陽明汗多者則以利小便為戒仁齊太陰腹滿自利小便不利無熱脈沉者理中合五苓更加厚朴木香分利其小便而大便自止厥陰寒閉厥逆脈伏囊縮入腹小便不利四逆通草茯苓或灸氣海石門並蔥尉法小便自利小便數小便自利有在表者有在裡者有因熱者有因寒者六經俱有此證難以醫治也數者頻欲去而不多也在三陽經有在表在裡之分若三陰並無數證矣太陽六七日表證仍在脈數而沉反不結胸其人發狂以熱在下焦少腹硬滿小便自利抵當湯身黃脈沉結少腹硬小便自利其人如狂上方傷寒有熱少腹滿小便反利為有血也抵當丸十三日過經譫語小便利反下利脈調和調胃承氣湯太陽小便自利飲水多必心下悸茯苓桂枝白朮甘草湯不大便六七日小便少必初硬後溏未可攻如小便已利大承氣湯陽明自汗或發汗小便自利為津液內竭屎雖硬不可攻蜜膽導發熱惡寒大渴腹滿自汗小便利肝乘肺也名曰橫刺期門少陰四逆小便自利或色白四逆湯小便不利大便自利四肢沉重痛腹痛有水氣也或小便利真武湯去茯苓既吐且利小便復利大汗出下利清穀裡寒外熱脈微欲絶四逆湯此屬霍亂嘔而脈弱小便復利微熱見厥難治上方熱少厥微煩躁數日後小便自利色白熱除也欲得食其病為愈脈浮自汗小便數心煩微惡寒腳攣急誤與桂枝必厥太陽寸緩關浮脈弱發熱汗出惡寒罷而渴屬陽明也小便數者大便必硬不更衣十日無所苦也渴欲飲水少少與之渴不止五苓散趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相摶大便則難脾約也麻仁丸汗吐下微煩小便數大便因硬和之則愈小承氣湯士材凡小便不利者初硬後必溏不可下也已利而汗多津液已竭不可下也小便不利而少腹硬者溺也當滲泄之小便利而少腹硬者非血即屎也當通利之發黃而小便利則為可治若腹滿而小便利則為欲解濕熱而小便利則不能發黃譫語至循衣摸床而小便利為可治是小便之當察也審矣小便數者本太陽陽明治各有條若腎虛有熱者清心蓮子飲生脈散加知柏麥冬蓮子類脾腎俱虛者補中益氣加生脈知柏而法亦可用也節庵小便自利為津液偏滲大便小硬宜微下之陽明自汗復發汗津液內竭故不可攻若自汗而小便難雖有表證不可用桂枝謂重亡其津液也故厥活人小便數者腎與膀胱俱虛而客熱乘之虛則不能制水熱則水道行澀故小便不快而頻數也遺溺遺溺者小水自出而不知也夫膀胱所以瀦水者也下焦虛不能約束故遺也三陽合病腹滿身重口中不仁面垢遺尿譫語自汗出白虎湯邪中下焦陰氣為栗足膝逆冷便溺妄出四逆湯風溫誤下小便不利直視失溲詳風溫太陽火尉其背大汗出譫語振栗下利欲小便不得反嘔而失溲此為欲解遺溺狂言目反直視此為腎絶仁齊陽證熱甚神昏而遺溺者易治陰證逆冷脈沉微而遺溺者難治宜附子湯加乾薑益智仁以溫其下若厥陰囊縮逆冷脈微遺溺者四逆加吳茱萸陽不回者死汗下後陰虛火動而遺溺者宜人參三白湯加知柏或參朮芍藥甘草知柏經曰水泉不止膀胱不藏也腎虛則膀胱之氣不能約束要在滋補膀胱之氣東垣又謂遺溺屬肺金氣陷當補肺氣宜補中益氣湯合生脈知柏更以他證及色脈詳之而自無遁情矣別為一證合病並病合病者或二陽經或三陽經同受病病之不傳者也並病者一陽經先病未盡又過一經而前後之邪猶在病之傳經也三陰經無合病三陽若與三陰合即為兩感矣太陽陽明合病喘而胸滿麻黃湯太陽陽明合病自利葛根湯必下利而頭痛腹痛發熱目疼鼻乾脈浮大而長太陽陽明合病不下利但嘔葛根加半夏湯太陽少陽合病自利黃芩湯必下利而頭疼脅滿或口苦咽乾或往來寒熱而嘔脈浮而弦長若嘔者黃芩加半夏生薑湯陽明少陽合病脈純弦者死脈未至純弦者小柴胡加黃芩芍藥脈滑而數者有宿食大承氣湯必下利而身熱脅滿痛乾嘔或往來寒熱脈長大而弦三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿若自汗者白虎湯三陽合病脈浮大上關上但欲眠睡目合則汗小柴胡白虎湯二陽並病太陽初得病時汗出不徹因轉屬陽明微汗出不惡寒當下若表證不罷者不可下可小發汗設面色緣緣正赤陽氣怫鬱在表也當解之熏之若發汗不徹其人煩躁不知痛處乍在四肢乍在腹中短氣但坐脈澀更發汗則愈下之大小承氣汗之麻黃湯類二陽並病太陽證罷潮熱汗出便難譫語大承氣湯太陽少陽並病頭項強痛或眩冒時如結胸心下痞硬刺大椎第一間肝俞肺俞若發汗譫語脈弦刺期門太陽少陽並病反下之或結胸心下硬下利不止心煩生薑瀉心湯小陷胸湯念莪並病者如太陽先病後傳陽明太陽之證猶未盡故曰並何以見之概前云二陽並病太陽初得時汗之不徹轉屬陽明自微汗不惡寒大柴胡湯是以知二陽之證有先後之傳同見面病者為並病也嗣真且如太陽陽明若並而未盡傳未過尚有表證猶當汗之以各半湯若並之已盡是為傳過法當下之以承氣湯是知傳則入腑不傳則不入腑所以仲景論太陽陽明合病止此三證於太陽陽明並病則言其有傳變如此也損庵太陽陽明合病有三證其邪有淺深之分故用藥有汗下和解之異三陽合病有二證一用白虎一無治法後人用小柴胡白虎類蓋此二證俱有三陽之候故不可汗下也二陽並病有二證表未解者汗之表已解有里證者下之太陽少陽並病有三證一由誤下成結胸一項強如柔痓狀心下硬如結胸不可發汗一心下硬項強而眩不可下俱宜分別仁齊既二經同病用藥亦必以二經之藥合而治之三經同病亦必以三經之藥合而治之如人參羌活散乃三陽經藥神術湯沖和湯皆太陽經藥葛根湯白虎湯乃陽明經藥小柴胡乃少陽經藥也凡表證未解太陽病尚在者宜先解表表已解內不消大滿大實者方可攻下之兩感臟腑俱受邪而病謂之兩感龐安常云脈沉大者太陽少陰沉長者陽明太陰沉弦者少陽厥陰諸方書不載兩感而活人書稱龐安常之言以示人素問熱病論云兩寒於寒而病者必不免於死法不過六七日仲景亦無治法但云兩感病俱作治有先後證治論謂如下利清穀身體痛急當救里後身疼痛清便自調急當救表蓋先救里內才溫則可醫矣然救表亦不可緩也然此止論得先里後表若不下利身體疼痛者宜先救表此亦是先後之法不可拘也然則兩感亦有可治之理死可必乎哉嗣真仲景論感必死之證而復以治有先後發表攻裡之說繼之者蓋不忍坐視而欲挽其萬一也活人書云先救里以四逆湯後救表以桂枝湯殊不知仲景云太陽與少陰俱病則頭痛為太陽邪盛於表口乾而渴為少陰邪盛於裡也陽明與太陰俱病則身熱譫語為陽明邪盛於表不欲食腹滿為太陰邪盛於裡也少陽與厥陰俱病則耳聾為少陽邪盛於表囊縮而厥為厥陰邪盛於裡也三陽之頭痛身熱耳聾脅痛救表已自不可三陰之腹滿口乾囊縮而厥不下可治乎活人書引下利身疼痛虛寒救里之例而欲施於煩渴腹滿囊縮譫語實熱之證然乎否乎蓋仲景所謂發表者葛根麻黃是也所謂攻裡者調胃承氣是也活人所謂救里四逆救表桂枝則是以救為攻豈不肖輩尤而效之以火濟火死可立待也其兩感固不治之證而用藥之法毋實實毋虛虛學者不可執一定之說於胸中也東垣問兩感從何道而入曰經云兩感病死不治一日太陽與少陰俱病云云太陽腑自背俞而入人所共知少陰臟自鼻息而入人所不知也鼻氣通天寒邪無形之氣從鼻而入腎為水水流濕故腎受之同氣相求也又曰天之邪氣感則害人五臟以是知內外兩感臟腑俱病欲表之則有里欲下之則有表表裡既不能一治故死矣然所稟有虛實所感有淺深虛而感之深者必死實而感之淺者可治治之而不救者有之未有不治而獲生也豫嘗用大羌活湯間有生者十得二三故立此法以待好生君子仁齊兩感必死不治者乃一日傳二經陰陽俱病也欲治其陽而有陰急欲治其陰而有陽急表裡不可並攻陰陽難同一法故不治也活人書有先後之法乃表裡皆寒急救之法非日傳二經之法也東垣之大羌活湯此內傷外感之法亦非日傳二經之法也保命集曰內傷於寒外感於風或內傷於風外感於寒或先傷於濕後感於風或先傷於風後傷於濕或先傷於寒而後傷於食之類此亦內外俱病表裡俱傷乃大羌活湯所能治者不然易老丹溪豈賢於仲景哉景嶽按門人錢禎曰兩感者表裡同病人皆以外邪而言實有未盡然者蓋內外俱傷便是兩感凡見少陰先潰於內而太陽繼之於外者即縱情肆欲之兩感也太陰受傷於裡而陽明重感於表者即勞倦竭力飲食失調之兩感也厥陰氣逆於臟少陽復病於腑者必七情不慎筋疲血乏之兩感也大概以兩感為傷寒而不知傷寒之兩感內外俱困病斯為劇但傷有重輕醫有賢否死生系之豈可忽乎或謂兩感之證不多見者蓋推廣之未盡耳斯言最切誠發人之所未發信足指迷者也健按兩感之證必其人平素本虛陰陽不固而寒邪殺厲之氣兼乘其表裡病及乎臟腑而曰兩感猝急之勢救表不及救里不及多為死證仲景雖曰治有先後而無方劑者想因證急難處非成法所能懸斷以待隨機斟酌爾後賢圖維壽世各推情理多方設法皆屬婆心然核之總未得內經大旨欲明其要須在兩感於寒四字上參悟則知寒邪所感於臟於腑孰輕孰重後重先治大抵以溫散陰寒為急始得內經大旨而合仲景先後之法庶幾挽救一二嗣真非活人四逆桂枝為以火濟火是認作兩感於寒為傷寒傳邪論誤矣東垣大羌活湯即保命集所云內傷外感之法與兩感於寒之證無相涉也若真兩感於寒當審三陰三陽臟腑表裡之邪正盛衰而以救陰散寒為務宗活人書而酌之為良是內經云邪之所湊其氣必虛寒邪乘虛兼入臟腑故曰兩感而非經病明矣其致病之由觀錢氏論則知其根抵而無稍失之矣百合病無分經絡百脈一宗悉致病也嘗默默然欲食不能食欲臥不能臥欲行不能行如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則吐利而劇如有神靈身形雖如和其脈微數無溺時頭痛者六十日愈溺時頭不痛漸漸然者四十日愈若溺時快然但頭眩者二十日愈體證或未病而預見或病四五日而出或病二十日一月而微見各隨證治之百合病汗後者百合知母湯下後者滑石代赭湯吐後者百合雞子湯不經吐汗下者百合地黃湯一月不解變成渴者百合洗湯不差者栝蔞牡蠣湯百合病變發熱者百合滑石湯百合病見於陰者以陽法救之見於陽者以陰法救之見陽救陰復發其汗此為逆見陰救陽乃復下之亦為逆也活人百合病多因傷寒虛勞大病之後臟腑不平變成奇病也狐惑初得狀如傷寒或因傷寒而變斯證其狀默默欲眠目牽不得閉臥起不安蟲蝕於喉為惑蟲蝕於陰肛為狐不欲飲食惡聞食臭面目乍赤乍黑乍白蝕於上部聲嘎甘草瀉心湯蝕於下部咽乾苦參湯洗蝕於肛雄黃末艾肭拌勻以二瓦合燒向肛門熏之節庵狐惑濕慝皆蟲證也蓋腹中有熱食入無多腸胃空虛故三蟲求食而食人之五臟也其候四肢沉重惡聞食氣默默欲眠目不能閉齧齒晦面眉間赤白黑色變易無常蟲食上部為惑上唇有瘡聲啞食下部為狐下唇有瘡咽乾通用桃仁湯黃連犀角湯雄黃鋭散無陽者金液丹活人其喉齒無色舌上盡白唇黑有瘡嘗數看其上下唇上唇有瘡蟲蝕其臟也下唇有瘡蟲蝕其肛也爛見五臟則死殺人甚急多因下利而得目赤黑健曰肝開竅於目白珠與兩眥又屬心肺二臟若病後目赤黑必餘熱上乘法當涼瀉脈數無熱微煩但默默欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤豆當歸散士材此病乃目瘍也當其未成膿時毒氣未出故腹滿不欲食及膿成膿出則腹舒故能食也然此證後賢多遺而不論及或混雜於狐惑證中尤可笑也陰毒陽毒陽毒感天地惡毒之氣入於陽經則為陽毒入於陰經則為陰毒又一種病陰毒者面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒陽毒者面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯凡後賢所謂陰毒陽毒證悉刪士材嘗讀要略第三論乃以陰陽二毒證附於百合狐惑目赤黑之尾反復玩之而知斯五證者皆奇證也百合之狀欲食不食欲臥不臥欲行不行如寒無寒如熱無熱狀若神靈何其奇也狐惑之狀默默欲眠不得眠蝕喉為惑蝕陰為狐面目乍赤乍黑乍白又何其奇也目赤黑之狀則不熱而煩默默欲臥三四日目赤七八日眺黑又何其奇也陽毒則面赤如錦咽痛吐膿血陰毒則面目俱青咽痛身如被杖俱以五日可治七日不可治及其施治則俱用升麻鱉甲湯更不可解矣在陽毒之熱反加椒黃在陰毒之寒反去椒黃玩其敘陽毒不過曰面赤咽痛吐膿血而已並不言元陽極熱之狀也其敘陰毒不過曰面青咽痛身如被杖而已並不言至陰極寒之狀也其所用藥不過升麻甘草鱉甲當歸而已並不用大熱大寒之劑也乃知仲景所謂陽毒者感天地惡毒之氣入於陽經則為陽毒入於陰經則為陰毒故其立方但用解毒之品未嘗以桂附薑茱治陰芩連硝黃治陽也後人不深察仲景之旨遂以陽毒為陽證之甚者而用寒涼陰毒為陰證之甚者而用溫熱殊不知仲景論治陽證狀極其熱而藥極其寒陰證狀極其寒而藥極其熱已無餘蘊而何必別出名色乎至其治陽毒反投蜀椒者椒本解毒之物從其類而治之也陰毒反去蜀椒者為升麻鱉甲既屬清涼覺蜀椒為贅矣若以陽毒為熱極何不投涼劑而反入蜀椒耶若以陰毒為寒極何不投溫劑而反去蜀椒耶是知上五證皆奇異罕見者故金匱總論於一條之中必深思明辨庶入仲景之室耳王氏後人所敘陰毒與仲景所敘陰毒自是兩般豈可混論後人所謂陰毒只是內傷冷物或不正暴寒所中或過服冷藥所變或內外俱傷於寒而成非若仲景所敘天地惡毒異氣所中者也陰陽易傷寒未全瘥因於交合而無病之人反得病也易者邪毒之氣交相換易也男子病新瘥婦人與之交而得病名曰陽易婦人病新瘥男子與之交而得病名曰陰易所以呼為易者以陰陽相感動其毒氣著人如換易也其候身重氣怯百節解散頭重不舉目中生花熱上衝胸火浮頭面憎寒壯熱在男子則陰腫少腹絞痛在婦人則裡急連腰胯內痛甚者手足冷蜷攣男子卵陷入腹婦人痛引陰中皆難治也其有不即死者筋脈緩弱氣血虛骨髓竭恍恍惚惚氣力轉小著床不能動搖起止仰人或牽引歲月方死節庵曰夫外感六氣內傷七情其為害若是可籲可畏焉易病陽證燒褌散竹皮湯陰證豭鼠糞湯當歸白朮湯大便不通昏亂驚惕妙香丸醫林陰陽易病得離經脈者死夫脈太過而一呼三至曰至不及一呼一至曰損此離於經常之脈也惟易病有之海藏陰陽易得陰脈當隨證用之脈在厥陰當歸四逆湯送燒褌散脈在太陰四順理中丸送燒褌散脈在少陰通脈四逆湯送燒褌散各隨其經而效自速若有熱者豭鼠糞竹茹湯類送燒褌散損庵不病人與病新瘥人交合陰陽而不病人因病者曰易病若新瘥人自病則曰房勞復其治亦可同易病用燒褌散以誘安其氣夫易病者由合陰陽而動餘邪其人正氣本虛故能染著觀小腹絞痛引陰道病後房欲而入非有外邪感之也仁齊侯國華病傷寒四五日身微斑渴欲飲診之脈弦欲絶厥陰脈也脈湯藥數日不已又以薑附等藥覺陽微回脈生因渴私飲水一杯脈復退頭不舉目不開問之先犯陰易若只與燒褌散則寒不濟矣遂用吳茱萸湯一大服調燒褌散連進二劑大汗兩晝夜而愈房勞復瘥後犯房事而病名房勞復其候頭重眼花腰背痛小腹裡急絞痛或時陰人上衝頭面烘熱心胸煩悶房勞復頭重眼花小腹絞痛豭鼠糞湯赤衣散燒褌散竹皮湯選用虛弱脈微四君子送燒褌散或人參三白湯調赤衣散小腹急痛脈沉逆冷當歸四逆湯加附子吳茱萸送赤衣散仍以吳茱萸一升酒炒尉小腹若卵縮入腹手足拳離經脈見者不可治也千金魏督郵顧子獻傷寒瘥後詣華他視脈曰雖瘥尚虛未得復陽氣不足慎勿勞事餘事尚可女勞則死當吐舌數寸其婦聞其夫瘥百里來省經宿交接三日發熱口噤臨死舌出數寸凡大病新瘥未滿百日氣力未平復而房室者略無不死龐安常曰新瘥精髓枯燥故犯房事必死海藏李氏子太陽證愈後復犯房過垂頭不語神氣不舒頭重目眩與大建中三四服外陽由收脈反沉小始見陰候與已寒加芍藥茴香等丸三日約服六七百丸脈復生再以大建中接之大汗作而解全善嘗治傷寒未平復犯房室命在須臾用獨參湯調燒褌散凡服參一二斤余得愈者亦三四人信哉藥不可執一也勞復大病新瘥氣血津液俱耗最忌思慮傷神多言耗氣梳浴行動太早則因勞發熱復病如初孫真人曰新瘥後當靜臥慎勿早起梳浴以勞其體亦不可多言語用心使意勞煩凡此皆令勞復勞復發熱脈浮汗解脈沉下解勞復不可汗下小柴胡隨證增損和之或濈然汗出而解或戰而汗解勞神歸脾湯氣弱脈細補中益氣湯一切勞復鱉甲為末炒黃米湯送下海藏大凡勞者動也動非一種有內外氣血之別若勞乎氣則無力與精神法宜微舉之勞乎血與筋骨以四物之類補之若勞在脾內調中可已此為有形病也若見外證謂之復病非但勞也如再感風寒是矣仁齊千金治勞復以麥門冬湯主之易老加人參以益元氣若身熱食少無力以參胡三白湯或補中益氣增損治之食復凡病瘥後先進清粥湯次進濃粥湯次進糜粥亦須少少與之切勿任意過食至於酒肉必當禁忌若不謹便復發熱名為食復大抵強人足兩月虛人足百日則無復病矣食復輕者香砂枳朮湯重者枳實梔子豉湯酒復酒味辛而大熱傷寒前熱未已而又飲酒則熱轉甚而增劇矣小柴胡加葛根黃連烏梅脈洪大者人參白虎湯加葛根黃連或竹葉石膏湯多加雞距子千金大病痙後食豬肉及羊血肥魚油膩等物必大下利食餅餌粢黍飴哺膾炙脯修棗栗諸果堅實難消之物胃氣虛弱不能消化必更結熱不下必死下之復危皆難治也瘥後食一切肉面者病更發飲酒及食蒜韭菜者病更發食生魚鮓下利不止食生菜及瓜令顏色終身不復食生棗羊肉膈上作熱蒸食大羊等肉作骨蒸新汗解後飲冷水者損心包令人虛雖補不復金匱時證新瘥食生菜者手足必腫仁齊經言食復發熱不解以柴胡湯加減主之若食少胃弱痞悶四君子為主有表熱加柴胡內外有熱加黃芩心下悶心煩內熱加枳實黃連不眠加棗仁有痰加橘紅半夏嘔吐亦加之米食不化加曲糵肉食不化加生山楂炒青皮瘥後各證瘥者病痊病愈之謂瘥後昏沉已愈數日後漸覺昏昏不醒或錯語呻吟如見鬼狀皆因餘熱蘊於心包絡也節庵或十餘日半月後終不惺惺者皆因發汗不盡餘熱蘊結也脈浮者微汗之小柴胡加紫蘇虛弱人歸脾湯加黃連竹茹或十味溫膽湯加黃連不得眠梔子烏梅湯熱氣與諸陽並陰氣未復所以不眠虛煩不得眠參胡溫膽湯加棗仁瘥後發腫水氣浮發腫壯實者商陸根少許煮粥食之愈脾虛發腫四君子湯五苓散合服足腫苡仁大米茯苓煎湯代茶腰以下有水氣為腫由脾胃氣虛不能約制腎水歸於隧道當利小便牡蠣澤瀉湯瘥後虛煩陰陽未復時發煩熱竹葉石膏湯痰多睡不寧溫膽湯嘔者橘皮湯虛羸少氣氣逆欲嘔竹葉石膏湯虛熱燥渴上湯去半夏瘥後喜睡胃中虛寒不納津液也理中湯加益智仁瘥後餘毒發豌豆瘡黃連甘草荊芥防風連翹煎服外用赤小豆為末入青黛以雞子清調塗神效遺毒汗下不徹餘邪熱毒結於耳後名曰發頤此為遺熱成毒之所致宜速消散稍緩則成膿矣餘毒發頤可消者連翹敗毒飲不可消者不問已破未破俱用內托消毒散健曰傷寒溫疫時氣發汗不透請火不盡皆有餘毒壅結不但發於耳後隨處有之何以獨稱發頤按發頤乃時行風熱為病俗名痄腮非瘥後餘毒之證豈前輩未之悉而有此同名耶凡瘥後餘毒若耳後發及穿腮注胸三證乃少陽陽明經蘊熱所致如潰爛至甚每多不治瘥後進食通便法健曰古云病加於小愈若新瘥後須調停飲食勿使復傷為主陳氏傷寒進食一節為最難如胃中有一毫未清而進食早則邪熱必復若胃已清熱已定不與飲食使幾微元氣一脫從何處續命耶此際以驗舌胎為主如胃有積熱者舌必有胎胎必乾燥重者焦槁甚則芒刺此等止可與滾湯頻頻潤之禁止穀氣全要使胃脘空虛則邪熱易退為父母骨肉者不知傷寒利害過於姑息止記傷寒所忌粥飯而床頭果品枕底酸甜一概不廢豈知此等滋味一入腸胃則稠膩膠結反助胃火里邪其害甚於穀氣如果舌胎漸淨滋潤方為裡熱將清宜漸進穀食以扶正氣其法用荷葉擦洗構器次用竹葉帶水一滾取湯一碗入蘆根數寸煎滾去蘆根將水飛陳米粉入湯中熬數沸作稀糊飲之清香可以開胃回清氣退濁氣降火清痰行滯潤燥為迸食之良法如未得大便者因腸胃津枯調理藥中多用當歸紅花紫菀黃芩使大腸液足燥糞自行不可卒用硝黃耗損氣血仲景法便硬無所苦者俟之盡有熱退食進十餘日而便始通無害者勿急攻逐也又曰傷寒舌胎未淨其大便雖解後胃口原不曾清飲食一進便有反復之虞邪在上中二焦既宜清之解之邪歸二腸中官既開米飲可進病輕者數日大便自通邪解而病除矣重者鬱蒸久燥糞結難出然無所苦勿急攻下但於藥中入濡潤之品漸使自行如紫菀乃清肺潤大腸之藥佐以當歸紅花養血潤燥桃仁蔞仁蘇子杏酪清熱降氣麻仁松子溫甘而滑黃芩石膏清火而瀉合酌用之有承氣之能而無承氣之猛為肺部宣治節之令助脾胃開窒塞之關三焦和而小便長幽門通大圊順凡勞怯久病老羸幼弱勞力內傷胎前産後不可攻下者諸品相濟為宜健曰脾胃乃後天之本百病以胃氣為先病家無論初終須察胃口為要胃空知餓者量與米穀以養之陳大麥粉陳風米漿調飲最妙如稍見壅塞並有舌胎當禁飲食藥以化之胃和而與之若應與不與反傷其正而有邪乘虛入之患未可概勿與也若不應食而強進之停滯變遷為害甚大所謂禍從口入調護病人非易事也
