body:
  text: 傷寒直指卷九上望色篇健曰仲景傷寒病證脈治既列諸篇獨於察色間論之而未詳載竊念望聞問切為醫要務而望先之寓神明之鑑燭照百病其應如響傷寒重證而可不講者乎因採內經要旨及前賢名論而集是篇雖未能盡悉其詳然臨病大綱晦明之象頗見一斑矣夫精明五色者氣之華也內經曰精明者所以視萬物別黑白審長短以長為短以黑為白如是則精衰矣赤欲如白裹朱不欲如稱去聲詩經魴魚尾其色如赭也白欲如羽孟子如白羽之白不欲如鹽鹽色枯而不潤也青欲如蒼壁之澤蒼壁青色玉玉色潤而有寶光不欲如藍藍即靛也靛色黯黃欲如羅裹雄黃羅裹雄黃寶色內藏而未達乎毛膚不欲如黃土黃土色燥也黑欲如重平聲漆色重漆退光漆也不欲如地蒼地蒼即蒼苔黴黯之色也五色精微象見矣吉凶夭壽可判也靈樞五色篇曰五色之見也各出其色部五臟之脈分配面部各隨部位以定五行生剋時令變現制化之道皆當按部位推測能知病之吉凶大有奇驗所以稱望而知之謂之神色部骨陷者必不免於病矣人之氣色有未病而至者有病至而至有病而不至者有浮泛者有沉著者骨陷乃不正晦色著骨而起從外視之其色如陷入骨故知其必病矣其色部承襲者雖病不死也承者上承也如水之承金應黑而反白為不甚襲者下襲也如火之刑金應赤而反白為不甚如此類推則知本部病之正色不變為不死也其色上行者病益甚其色下行如雲徹散者病方已就面部上為天庭下為地閣地氣上為云天氣下為雨五臟病氣之色如從下現而如雲上騰者病益日甚如從下現而如雲徹散者病日輕而已五色各有臟部五色青黃赤白黑按五行金木水火土以應五臟心肝脾肺腎也臟部者五臟所主之部位如額屬心火而本色赤鼻屬脾土而本色黃左顴屬肝木而本色青右顴屬肺金而本色白額屬腎水而本色黑有外部有內部也外部六腑也內部五臟也色從外部走內部者其病從外傳內也色從內部走外部者其病從內出外也病生於內者先治其陰後治其陽反者益甚病生於陽者先治其外後治其內反者益甚外部六腑之表六腑挾其兩側也內部五臟之裡五臟次於中央也外部走內部者乃表傳裡外為本而內為標內部走外部者乃里出表陰為本而陽為標反之者則病甚此即傷寒表裡陰陽之象有其證而現其色可審察焉常候闕中闕中印堂也薄澤為風薄澤晃亮也沖濁為痹沖濁混黯也在地為厥此其常也黯然之色出於地閣則知其為下寒而厥矣各以其色言其病各以本部所現不正之色察其承襲則知其病之輕重矣大氣入於臟腑者不病而卒死大氣大邪大毒之氣也如水色見火部火色見金部此原氣大虛賊邪已至雖不病而有卒死之虞赤色出於顴大如拇指者雖少愈而卒死形如拇指最為凶象顴者應背為肺部見赤色乃火剋金也是為負色黑色出於庭大如拇指者必不病而卒死庭天庭最高處黑色干之乃水乘火也雖不病而當卒死亦是負色最凶庭者首面也闕上咽喉也闕中者肺也下極者心也下極山根部位直下者肝也直下年壽部位肝左者膽也膽居肝之短葉故見於左下者脾也下者即準頭名土星曰面王又曰明堂居面之中央故屬脾方上者胃也方上者鼻之兩旁鼻隧是也相書謂之蘭臺廷尉中央者大腸也人中外五分迎香穴也挾大腸者腎也頰之上也五臟皆一故居中腎獨兩臟故見於兩頰當腎者臍也當腎部頰之下也面王以上者小腸也準頭以上兩顴以內也面王以下者膀胱子處也人中應膀胱子戶之分凡人中平淺而無髭者無子顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也頰之外曰繩亦曰邊城身之後曰背應挾繩之上位也循牙車以上者股也牙車以上近耳耽也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也口旁大紋處名法令股里股之內側也巨闕者膝臏也頰車曲骨即腮骨也膝臏即膝蓋骨也此五臟六腑肢節之部位也沉濁為內浮澤為外黃赤為熱青黑為痛白為寒黃為膏潤為膿赤甚者為血痛甚為攣寒甚為痹不仁五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散傳以知遠近視色上下以知病處色明不粗沉夭為甚不明不澤其病不甚雖不明澤而不沉夭病必不甚其色上行者病益甚其色下行如雲徹散者病方已其色散駒駒然未有聚其病散其氣痛聚未成也腎乘心心先病腎為應色皆如是言一臟以例其餘故曰皆如是男子在於面王為小腹痛下為卵痛其圜澤為莖痛莖玉莖也高為本下為首狐疝㿉音頽陰之屬也疝有七種㿉其一也女子色在面王為膀胱子處之病散為痛傳為聚方圓左右各如其形色其隨而下至胝為淫淫即白沃帶類也有潤如膏狀為暴食不潔色者赤白青黃黑皆端滿有別鄉鄉向也別鄉赤者其色亦大如榆莢在面王為不日其色上鋭首空上向下鋭下向在左右如法邪色之見各有向其尖鋭之處乃所犯之方故首虛則上向下鋭亦然其左右同法五臟生成論曰面黃目青面黃目赤面黃目白面黃目黑者皆不死面青目赤面赤目白面青目黑面黑目白面赤目青皆死也五臟未病有相生相成之理已病亦有相生相剋之機故五色之奇脈現也奇脈與五色不相偶合也凡色現黃皆為胃氣故不死黃者中央之色五行以土為本故色黃猶存胃氣無色黃則胃氣絶而死矣凡視證必先察色然後切脈審證核參表裡虛實陰陽寒熱以決吉凶內經曰聲合五音色合五行聲色符同然後可知五臟之病難經曰望而知之之謂神聞而知之之謂聖問而知之之謂工切而知之之謂巧具此識力斯為明醫夫色皆現於面部皮膚之上氣有如亂絲亂髮之狀常隱於皮里者亦當察之蓋五臟有五色六腑從之以應五行相生者吉相剋者凶滋榮者生枯夭者死自準頭年壽命宮法令人中最宜潤澤明亮若晦黯枯燥此為凶象再參以四時生克之理而通察之無論傷寒外感內傷雜證瞭然心目而必有當矣仁齋肝色青其聲呼肺色白其聲哭心色赤其聲笑脾色黃其聲歌腎色黑其聲呻此五臟本音本色也如青赤見於春赤黃見於夏黃白見於長夏白黑見於秋黑青見於冬此四時相生之色也吉若肝病色青而自心病色赤而黑脾病色黃而青肺病色白而赤腎病色黑而黃此五行相剋之色也難治矣且五臟有熱皆現於面肝熱左頰先赤肺熱右頰先赤心熱額先赤脾熱鼻先赤腎熱頤先赤至於面黑者為陰寒面青者為風寒青而黑主寒主痛黃而白為濕為熱力氣不調青而白為風為氣滯為寒痛大抵黑氣見於面者多凶為病最重若黑氣暗中明準頭年壽亮而滋潤者生黑而枯夭者死此皆參素難而言簡切青色屬木主風主寒主痛乃足厥陰肝之色也凡面青唇青者陰極也若舌卷囊縮急溫之如夾陰傷寒小腹痛則面青也內經青如翠羽者生青如草滋者死青而紅青而黑相生者生青白而枯燥相剋乃死凡脾病見青氣多難治赤色屬火主熱乃手少陰心之色也在傷寒見之則有三陽一陰之火如足太陽寒水本黑熱則紅也經曰面色緑緑正赤者陽氣怫鬱在表汗不徹故也當發其汗若脈浮數面熱汗不出者面必紅赤而光彩也陽明病面合赤色者不可攻之謂表邪未解不可攻裡也若陽明內實惡熱不惡寒或蒸蒸發熱潮熱大便閉譫語面赤者可攻之如表裡俱熱口燥舌乾飲水脈洪面赤者宜人參白虎湯和之也少陽病在半表半裡脈弦面紅者小柴胡和之也少陰病下利清穀裡寒外熱面赤者四逆加蔥白湯此陰寒內極格逆其浮火上行於面故赤色非熱也又夾陰傷寒虛陽泛上者亦面赤也又煩躁面赤足冷脈沉不能飲水諸陰極也宜溫之若久病虛人午後兩顴頰赤者陰火也不可作傷寒治又三陽之氣皆會於頭額其有赤氣或赤腫大頭類者各就部分別之內經赤如雞冠者生如衄血者死赤而青赤而黃相生者吉赤而黑相剋者凶準頭印堂有赤氣明潤者生枯夭者死凡肺病見赤氣者難治黃色屬土主濕乃足太陰脾之色也黃如橘子明者熱也如熏黃暗者濕也內經黃如蟹膏者生如枳實者死黃而白黃而紅相生者吉黃而青相剋者凶準頭年壽印堂有黃氣明潤者病退有喜兆枯燥而夭者死凡病欲愈者目眥黃長夏見黃白吉若青黑者凶白色屬金主血氣不足乃手太陰肺之色也傷寒面白無神者發汗過多或脫血所致內經白如脂膏者生如枯骨者死白而黑白而黃相生者吉白而赤相剋者凶印堂年壽白而光潤者吉白而枯夭者凶凡肝病見白色難治黑色屬水主寒主痛乃足少陰腎之色也內經黑欲如烏羽者生如炭炲者死黑而白黑而青相生者吉黑而黃相剋者凶黑氣自魚尾相連入太陰者死自法令人中入口者死耳目口鼻黑氣枯夭者死凡心病見黑氣者難治心病見黑氣在頭者死察目仁齋凡目睛明能識見者可治睛昏不識人或反目上視或瞪目直視或目睛正圓或戴陽反折或眼胞忽然陷下皆不治凡開目欲見人陽證也閉目不欲見人陰證也目中不了了睛不和熱甚於內也目疼痛者陽明之熱也目赤者亦熱甚也目瞑者必將衄血目睛黃者將發身黃凡病欲愈目眥黃鼻準明山根亮也目白珠青者肝虛熱也睡臥露睛者元神虛也察鼻仁齋鼻頭色青腹中痛若冷者死微黑者水氣黃者小便難白者氣虛赤者肺熱鮮明者有留飲鼻孔乾燥者邪熱在陽明肌肉之中必衄血也鼻孔乾燥色如煙煤陽毒熱深也鼻孔出冷氣滑黑陰毒冷極也鼻息鼾睡者風溫鼻塞濁涕者風熱鼻孔煽張者肺風肺絶而不治矣察口唇舌仁齋凡口唇焦乾為脾熱為邪在肌肉焦而紅吉焦而黑凶唇口俱赤腫若熱甚唇口俱青黑者冷極口苦者膽熱口甜者脾熱口淡者胃熱口酸者肝熱口辛者肺熱口咸者腎熱口燥咽乾亦腎熱口乾舌燥而欲飲水者陽明之熱口噤難言者痙風上唇有瘡狐蟲蝕臟下屑有瘡惑蟲蝕肛若唇青舌卷唇反吻青環口黧黑口張氣直開如魚口口唇顫搖不止氣出不返皆不治唇口色淡者脾虛淡而白虛更寒治應溫補鉗緊口不能張此陽明熱極津液不濡關節不利也當清胃添津以治之熱退則張矣仁齋凡舌鮮紅者吉青為冷青而紫為陰為寒赤而紫為陽為熱黑者亢極難治舌胎白而滑表有寒白而干里有熱也黃而燥渴者熱盛黑而燥渴者亢極若不燥渴胎黑而滑者為陰為寒舌卷而焦黑而燥裂舌芒刺皆熱極也凡舌強舌硬舌短縮邪氣昏亂語言不清皆死也陰陽易舌出數寸者死舌乃心苗屬火色紅者吉黑者水剋火故難治全生集云夏月舌胎黑燥渴者時火與邪熱內外相灼故易生胎刺未在必死之例冬月見之為重健曰舌胎灰色而燥乃宿食停滯未化當涼以消之若灰色而滑乃腎熱水色上泛宜益腎滋陰若油緑胎醬胎黃熟胎皆屬宿食垢膩痰火濕熱壅聚當消之清之察耳仁齋凡耳輪紅潤者生或黃或白或黑或青而枯焦者死薄而白薄而黑或焦或燥如炭色皆腎敗凶耳聾目中疼乃少陽之熱可和解之若耳聾舌卷唇青厥陰證也難治矣耳為腎竅平日素聰而病至危急忽聾而絶無應響此為腎絶其病不治非少陽重聽者比是即陽陷入陰也察身仁齋凡病人身輕能自轉側者易治體重不能轉動者難治蓋陰證則身重必足冷而蜷臥常好向壁閉目不欲嚮明懶見人也陰毒宛如被杖之疼身重如山不能轉側中濕風溫三陽合病皆身重疼痛不可轉移大抵陽證皆身輕手足和暖也又頭重視傾天柱倒者元氣已敗傷寒至循衣摸床兩手撮空者神已去而魂亂身汗如油喘而不休形體不仁乍靜乍亂者命絶凡病人皮膚潤澤者生枯燥者死有瘟疫熱病昏沉四肢不收仰臥如大字者危證也又伏暑泄瀉等證常欲俯臥如大字者有頻易涼處者當清熱消暑救之不可認為陰證又傷寒時疫醫誤壞證至肉脫印瘡形色惟悴口噤直視絶汗如油者不治傷寒直指卷九下舌法篇金鏡録序凡傷寒熱病傳經之邪比雜病不同必辨其脈證舌胎表裡汗下之庶不有誤況脈者血之府屬陰當其得病之邪與正氣相傳若真氣未衰脈必滑數而有力病久熱甚真氣衰脈必微細而無力方數甚也但可究陰退陽此識脈之要也或初病即惡寒發熱後必有渴水燥熱之證或逆厥而利此熱證傳經之邪也若始終皆熱證惟熱而不惡寒故傷寒為病初則頭痛必無發熱惡寒渴水之證一病便有逆厥泄利或但惡寒而無發熱此寒證也此識證之妙也如舌本者乃心之苗竅於舌心屬火主熱象離明人得病初在表則舌自紅無白胎等色表邪入於半表半里之間其舌色變為白胎而滑見矣切不可不明表證故邪傳於裡里未罷則舌必見黃胎乃邪入於胃急宜下之胎黃自去而疾安矣至此醫之不依次惟用湯丸失於遲下其胎必黑變證蜂起此為難治若見舌胎如漆黑之光者十無一生此心火自炎與邪熱相乘熱極則反兼水象故色從黑而應水化也若乃臟腑皆受邪日深必作熱證須下之乃去胃中之熱否則熱人絡臟之中鮮有不死者譬如火之自炎初則紅過則薪為黑炭矣此亢則害承乃制今以前十二舌明著猶恐未盡諸證復作二十四圖並方治列於左則區區推源尋流實可決生死之妙也時至正元年學士杜清碧撰舊有敖氏金鏡録一篇專以舌色視病既圖其狀復著其情而後別其方藥開卷昭然一覽具在雖不期乎仲景之書而悉合乎仲景之道昔嘗刻之留都官舍本皆繪以五彩恐其久而色渝因致謬誤乃分注其色於上使人得以意會焉夫人之一身皆受於天心名天君故獨為此身之主舌乃心苗凡身之病豈有不見於此者哉嘉靖丙辰院使姑蘇薛己立齋序舌法金鏡録元敖氏著杜學士增定薛立齋圖申鬥垣輯觀舌心法推廣至一百三十七圖長洲張誕先復正其錯誤汰其無與於傷寒者定為一百二十圖名傷寒舌鑑今更刪其重出者余悉圖綴於左白胎圖舌見白胎者邪初人里也丹田有熱胸中有寒乃少陽半表半裡之證宜小柴胡湯梔子豉湯治之舌見尖白根黃其表證未罷須解表然後方可攻之如大便閉用涼膈散加硝黃泡服小便濫用五苓散加木通合益元散加薑汁少許以白滾湯調服舌見沿白心黑而脈沉微者難治脈浮滑者可汗沉實者可下始病即發此色乃危殆之甚也速進調胃承氣湯下之健按舌心黑滑白邊亦滑乃陰邪內甚非下證也須真武等溫里故必察其滑燥而分寒熱舌尖白胎二分根黑一分必有身痛惡寒好飲水不至甚者五苓散自汗渴者白虎湯下利甚者解毒湯此亦危證也舌見白胎中有小黑點亂生者尚有表證其病之來雖惡宜涼膈散微表之表退當用調胃承氣湯下之或黃胎與黑點舌亦同舌中見白胎外有微黃者必作泄宜服解毒湯惡寒者五苓散舌左半白胎而自汗者不可下宜白虎湯加人參三錢服舌右半白胎滑者病在肌肉為邪在半表半裡為往來寒熱宜小柴胡湯和解之舌左半見白胎滑此臟結之證邪併入臟難治舌見四圍白而中黃者必作煩渴嘔吐之證兼有表者五苓散益元散兼服須待黃遍方可下也舌見黃而尖白者表少里多宜天水散一服涼膈散二服合進之脈弦者宜防風通聖散以上金鏡録法
