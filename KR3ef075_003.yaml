body:
  text: 傷寒直指卷二傷寒序例篇第三陰陽大論曰春氣溫和夏氣暑熱秋氣清涼冬氣凜冽此則四時正氣之序也春夏為陽春溫夏熱者陽之動始於溫盛於暑秋冬為陰秋涼而冬寒陰之動始於涼盛於寒觀子天地之道陰陽而已春為陽中之陰夏為陽中之陽秋為陰中之陽冬為陰中之陰由是四序以成溫涼寒熱各正一氣之候此將言時行之變故先四時之正氣言之冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳冬三月純陰用事陽乃伏藏水冰地拆寒氣嚴凝當是之時善攝生者出處固密去寒就溫則不傷於寒其涉寒冷觸冒霜雪為病者謂之傷寒也其傷於四時之氣皆能為病春風夏暑秋濕冬寒謂四時之氣以傷寒為毒者以其最成殺厲之氣也熱為陽陽主生寒為陰陰主殺陰寒為病最成肅殺毒厲之氣觀子四時為病春傷於風夏必飧泄之類也唯獨冬傷於寒為最毒者以陽主生而陰主殺冬時陰寒用事萬物遭之靡不殞落故其氣尤殺厲而暴速也中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也內經曰先夏至日為溫病後夏至日為暑病溫暑之病本傷於寒而得之故太醫均謂之傷寒仁齋傷寒者冬月著寒即病之稱溫暑皆因伏寒所變則不得為傷寒明矣觀子同是傷於寒何以有即病不即病之殊大抵元氣衰邪客猶淺者即病是也元氣衰邪氣留連內伏者不即病是也內經又曰冬不藏精春必溫病少陰真氣既虧邪必深入是不即病之致病不為不重於即病者也即病始於肌膚不即病極於骨髓即病寒猶未變不離於表不即病郁久化熱自內而出其治自不同矣曰熱極重於溫不言溫重於傷寒者舉一以該之也曰暑病不曰熱病者內經有後夏至日為暑病之文因推本言其實熱病也下文春夏句甚明肌膚千金作肌骨是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也觀子辛苦之人腠理易開裡氣不守最易中邪得傷寒者多後云小人觸冒即此義也此節又重明溫熱病之由傷寒不即病之變非如應寒反溫應暖復寒時行之比蓋序例一篇是反復得病名之不同由病因之各異耳名正因別而投治自不謬矣凡時行者春時應暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也四時氣候不正為病謂之時行之氣時氣所行非傷寒殺厲之比其氣感受略同是以一歲之中長幼之病多相似也宇泰以上辨傷寒時氣之異觀子陰陽常順則為四時正氣陰陽常反則為非時疫厲既應暖復大寒應熱復大涼氣之乖戾極矣故其邪最能傷人而莫不感受之也謂之時行者乃天行疫氣也以非時不正之氣托厲於人所以境邑之內長幼盡傷矣然此氣復有重輕累百年一作者往往非常而多不治數十年一作者不過疾困而猶可生是又五運六氣勝復之所致未可一例視也夫欲候知四時正氣為病及時行疫氣之法皆當按鬥占之四時正氣春風夏暑秋濕冬寒是也時行者時行之氣是也溫者冬時感寒至春發者是也疫者暴厲之氣是也占前鬥建審其時候寒溫察其邪氣輕重而治之故下文云云觀子此結上二節而又起下數節之綱者也鬥者月建斗柄所指節氣由此分也一歲之序四分之為溫涼寒熱細分之為二十四節氣豈獨三月之久為一時之變哉其間節異而氣不同氣之正與不正皆可於鬥見之故曰審其時候之寒溫以察邪氣之輕重如下文所云也九月霜降節後宜漸寒向冬大寒至正月雨水節後宜解也所以謂之雨水者以冰雪解而為雨水故也至驚蟄二月節後氣漸和暖向夏大熱至秋便涼冬寒春溫夏熱秋涼四時之正氣也觀子此先備言四時正氣之序從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒也九月十月寒氣尚微為病則輕十一十二月寒冽已嚴為病則重正月二月寒漸將解為病亦輕此以冬時不調適有傷寒之人即為病也此為四時正氣中而即病者也觀子此言得之霜降後春分前即病者為正傷寒一歲之寒唯九月節至二月中最為殺厲之氣故特分別言之然其間亦有輕重如成氏所推言是也其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同證如後章此為時行之氣前云冬應寒而溫者是也觀子此言得之冬月非時之暖者為時行冬溫也冬不傷於寒反傷於暖所云冬應寒而反大溫是已故曰冬溫所傷之氣既不同則其主治自大異矣然所謂後先輕重更相重沓之法則皆佚而無考也健曰傷寒感冬寒冬溫感冬暖氣既殊而治各異傷寒宜溫散冬溫宜涼解乃已從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病此為溫病也內經曰冬傷於寒春必溫病觀子此言得之立春後無新受寒邪而壯熱者由不即病之傷寒至春溫病也春時既無暴寒卒感之邪乃壯熱為病者即必冬傷於寒不即病至春而發耳既伏寒所變其治自殊矣獨不言暑熱者義可類推也暑熱者又過一時而發重於溫者是也從春分以後至秋分以前天有暴寒者皆為時行寒疫也觀子此以三時之傷於暴寒俱為寒疫也凡傷於寒必為病熱是內外證亦多同矣然所感致病之氣大不同者則以冬月之寒非他時之可並而春夏秋陽氣用事之時其寒邪外薄必傷淺而病輕也既邪由各異寒疫一證治亦懸殊矣味此則桂枝麻黃不可通治三時之病仲景言之甚明後人復紛紛臆說何歟三四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五六月陽氣已盛為寒所折病熱則重七八月陽氣已衰為寒所折病熱亦微其病與溫及暑病相似但治有殊耳此為疫氣也是數條以前鬥之法占其隨時氣候發病之寒熱輕重不同耳觀子此復言寒疫之中又有輕重也寒之因於時既有微甚則病亦不同然五六月重而春秋輕者夏大熱之時反為寒折是以其邪尤重也寒疫亦謂之四時傷寒故證相似既日治與溫暑病殊則更與傷寒殊不言可知矣寒疫既不可同溫暑治則溫暑不可同傷寒治又不言可知矣宇泰傷寒即發於冬令寒冷之時而寒邪在表閉其腠理故非辛甘溫之劑不足以散之此仲景桂枝麻黃等湯之所必用也溫病熱病後發於天令暄熱之時怫熱自內而達於外郁其腠理無寒在表故非辛涼或苦寒或酸苦之劑不足以解之十五日得一氣於四時之中一時有六氣四六名為二十四氣也節氣十二中氣十二共二十四內經曰五日謂之候三候謂之氣六氣謂之時四時謂之歲觀子此即鬥之義因下文將言化氣不及亦致病故先申言之然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也疑漏或有至而不去者一句按要略曰有未至而至有至而不至有至而不去有至而太過何故也師曰冬至後甲子夜半少陽起少陽之時陽始生天得溫和以未得甲子天因溫和此為未至而至已得甲子而天未溫和此為至而不至已得甲子天大寒不解此為至而不去已得甲子而天溫如盛夏此為至而太過內經曰至而和則平至而甚則病至而反者病至而不至者病未至而至者病即是觀之脫漏明矣觀子一歲之化氣必始於冬至後者以其為陰陽絕而復續死而復生之界限也然致病有歲多歲少者皆平氣與太過不及之故也如未至而至至而不去是為太過應至不至是為不及皆於冬至後所得甲子夜半起少陽推之而知病氣矣君子於此際觀天道之盈虛而節宣之焉有實實虛虛之患哉然此匪獨傷寒也凡一歲六氣之邪胥於此定之矣但天地動靜陰陽鼓擊者各正一氣耳內經曰陰陽者天地之道清陽為天動而不息濁陰為地靜而不移天地陰陽之氣鼓擊而生春夏秋冬寒熱溫涼各正一氣也是以彼春之暖為夏之暑彼秋之忿為冬之怒春暖為夏暑從生而至長也秋忿為冬怒從肅而至殺也是故冬至之後一陽爻升一陰爻降也夏至之後一陽氣下一陰氣上也十月六爻皆陰坤卦為用陰極陽來陽生於子冬至之後一陽爻升一陰爻降於卦用復言陽氣得復也四月六爻皆陽乾卦用事陽極陰來陰生於午夏至之後一陽氣下一陰氣上於卦為垢言陰得遇陽也內經曰冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下此陰陽升降之常道也斯則冬夏二至陰陽合也春秋二分陰陽離也二至陽生於子陰生於午是陰陽相接故曰合二分陽退於酉陰退於卯是陰陽相背故曰離內經氣至之謂至氣分之謂分至則氣同分則氣異陰陽交易人變病焉天地陰陽之氣既變錯而不正人隨氣易所以病生內經曰陰陽相錯而變由生也此君子春夏養陽秋冬養陰順天地之剛柔也內經曰養生者必順於時春夏養陽以涼以寒秋冬養陰以溫以熱所以然者從其根故也健曰君子能循天理慎起居適寒暖而常患病至即成氏從根之謂根者保養根本以順時令之剛柔也小人觸冒必嬰暴疹須知毒烈之氣留在何經而發何病詳而取之不能順四時調養觸冒寒溫者必成暴病醫者當在意審詳而治之觀子夫由鬥推之豈特正氣為病與時行為病可明彼傷寒溫暑非時寒疫靡不由此辨矣其或氣候太過不及而病或陰陽升降離合而病惟君子順其道而養之從之小人則觸其疹而嬰之留之凡累乎氣交之間者可不審而用調之歟疹應作殄解是以春傷於風夏必飧泄夏傷於暑秋必病瘧秋傷於濕冬必咳嗽冬傷於寒春必溫病此必然之道可不審明之當春之時風氣大行春傷於風風氣通於肝肝以春適旺風雖入之不能即發至夏肝衰然後始動風淫末疾則發於四肢夏以陽氣外盛風不能外發故攻內而飧泄飧泄者下利米穀不化而色黃夏之時暑氣大行夏傷於暑夏以陰主內暑雖入之勢未能動及秋秋陰出而陽為主內然後暑動傳陰而為痎瘧痎者二日一發瘧者一日一發當秋之時濕氣大行秋傷於濕濕則干肺肺以秋適旺濕雖入之不能即發至冬肺衰然後始動兩淫腹疾則當發為下利冬以陽氣為內固濕氣不能下行故上逆而為咳嗽當冬之時寒氣大行冬傷於寒冬以陽為主內寒雖入之勢未能動及春陽出而陰為主內然後寒動傳陽而為溫病是感冒四時正氣為病必然之道也景岳春傷於風木氣通於肝膽即病者乃為外感若不即病而留連於夏脾土當令木邪相侮變為飧泄夏傷於暑金氣受邪即病者乃為暑病若不即病而暑汗不出延至於秋新涼外束邪郁成熱金火相拒寒熱交爭故病為瘧夏秋之交土金用事秋傷於濕其即病者濕氣通脾為濡泄等證若不即病而濕畜金臟久之變熱至冬則外寒內熱相搏於肺病為咳嗽冬傷於寒不即病者至春陽氣發越營氣漸虛所藏寒毒外合陽邪而變為溫病然多從足太陽始者正以腎與膀胱為表裡受於陰而發於陽也然四時為病春夏以木火傷人而病反寒秋冬以寒濕傷人而病反熱此正內經重陰必陽重陽必陰之義歟觀子若不能順四時以養陰陽則豈獨傷於寒者之必病哉凡四時不正之氣皆能為病特冬寒之傷證變無窮為最鉅耳健曰注說皆從素難發明無復疑議是知傷寒由正氣為病而時行疫氣由不正之氣為病自別矣傷寒之病逐日淺深以施方治內經曰未滿三日者可汗而已其滿三日者可泄而已今世人傷寒或始不早治或治不對病或日數久淹困乃告醫醫又不依次第而治之則不中病皆宜臨時消息制方無不效也健曰處方施治之要總在臨時消息因病制宜仲景己將心印付人無事刻舟求劍學者醒諸叔和今搜採仲景舊論錄其證候診脈聲色對病真方有神驗者擬防世急也仲景之書逮今千年而顯用於世者王叔和之力也觀子世以此二十八字遂疑例篇俱為叔和所作夫叔和果屬序述仲景經義亦必指陳明白豈以是數語了卻發揮之意耶且叔和乃表章先聖之人豈故為疑似以作僭竊之人哉此數語本叔和註腳因向之傳書者混錄為一令人莫辨今觀通篇文字無一筆間空何雜此數字與上下文義絕不相屬曰臨時消息制方者仲景意處療語也曰錄其真方有神驗者叔和意中編集語也即此判兩人胸臆焉得誤合為一又土地溫涼高下不同物性剛柔餐居亦異是黃帝與四方之間岐伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也東方地氣溫南方地氣熱西方地氣涼北方地氣寒西北方高東南方下是土地溫涼高下不同也東方安居食魚西方陵居華食南方濕處嗜酸北方野處食乳是餐居之異也東方治宜砭石西方治宜毒藥南方治宜微針北方治宜灸焫是四方醫治之不同也醫治當審其地土所宜龐氏非圓機之士孰能臻此一州之內有山居者為居積陰之所盛夏冰雪其氣寒腠理閉難傷於邪其人壽其有病者多中風中寒之疾有平澤居者積陰之所嚴冬生草其氣溫腠理疏易傷於邪其人夭其有病者多中溫中暑之疾觀子四方之問四治之能俱詳內經觀此則風氣厚薄時令寒暖方土甫北種種不同當分別施治仲景垂訓臨病酌劑隨地置宜是為兩審健曰西方治宜毒藥毒藥者非藥品之毒乃劑之重耳焫音納松節問蔓也凡傷於寒則為病熱熱雖甚不死內經曰風寒客於人使人毫毛畢直皮膚閉而為熱是傷寒為病也針經曰多熱者易己多寒者難已是熱雖甚不死觀子邪留營衛間則張弛之機窒正氣欲周膚腠而邪固閉之不通於外而內郁所以熱大作也熱雖甚不死者正氣猶能與邪相持一汗一下遂可除也不比陰陽偏勝離絕之謂若兩感於寒而病者必死表裡俱病者謂之兩感觀子兩感則臟腑交病內外並傷矣故不治下數節皆由此三語發其綱而各分別言之健曰表裡俱病為兩感當辨孰輕孰重間有治之可生者必死二字慎重之謂但犯之死者多耳尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強太陽為三陽之長其氣浮於外故尺寸俱浮是邪氣初入皮膚外在表也故當一二日發風府穴名在項中央太陽之脈從巔入絡腦還出別下項是以上連風府其經循肩膊內挾脊抵腰中故頭項痛腰脊強耳景岳邪之中人必自外而內如皮部論等篇曰邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟此所以邪必先於皮毛經必始於太陽而後三陰三陽五臟六腑皆病尺寸俱長者陽明受病也當二三日發以其脈挾鼻絡於目故身熱目疼鼻乾不得臥陽明氣血俱多尺寸俱長者邪並陽明而氣血淖溢也太陽受邪不已薄於陽明是當二三日發其脈挾鼻者陽明脈起於鼻交額中絡於目陽明之脈正上䪼頞還出系目系身熱者陽明主身肌肉針經曰陽明氣盛則身前熱目疼鼻乾者經中客邪也不得臥者胃氣逆不得其道也內經曰胃不和則臥不安景岳傷寒多發熱而此獨云身熱者陽明主肌肉身熱猶甚也不得臥者邪熱在胃也健曰發熱身熱同一熱也而有別發熱者熱始發軔達於皮膚之上輕手按之即覺壯熱此為在表屬太陽而脈浮法當辛甘發散身熱者邪漸入里熱在肌肉之間輕按未覺略重按之而得此為表傳裡熱屬陽明而脈長法當甘寒解肌熱在表則舌無胎而口和知味熱在裡則舌有胎而口乾失味矣䪼音拙頞音遏尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾內經曰陽中之少陽通於春氣春脈弦尺寸俱弦者知少陽受邪也陽明之邪不已傳於少陽是當三四日發胸脅痛而耳聾經壅而不利也宇泰查少陽有胸脅滿而無痛證觀子太陽篇中則有邪高痛下之文健曰痛者甚於滿也滿則邪氣已盛凝結胸脅痛則必兼停滯或肝氣橫其人必血虛性躁也此三經皆受病未入於腑者可汗而已三陽受邪為病在表法當汗解然三陽亦有便入腑者入腑則宜下故云未入於腑者可汗而已觀子按未入於腑內經作未入於臟謂未入三陰之臟故可從汗散健曰此以上仲景俱宗內經而言致病之由邪傳各經應乎脈象明矣然未及治法令讀者如飢思食而不得直待後篇始言各經之方法頭緒繁多應接不暇矣如太陽傷寒主麻黃中風主桂枝陽明應主柴葛解肌而後文陽明家證大半列於太陽篇中乃主麻桂者多蓋因經文遺佚誤次之故萬難信用如或信之恐有取禍之患學者先須知此而展玩後篇則是非易悟若少陽法惟小柴胡和解為主此三陽正病之概未言併合傳變之旨既變則推後章而詳繹之尺寸俱細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾陽極則陰受之邪傳三陽已遍次乃傳陰經在陽為表在陰為里邪在表則見陽脈在裡則見陰脈陽邪傳陰邪氣內陷故太陰受病而尺寸俱沉細也自三陽傳於太陰是當四五日發邪入於陰則里漸成熱腹滿咽乾者脾經壅而成熱也亮宸熱邪傳裡脈當見洪大而長今反沉細者以太陰主內邪熱傷之邪雖陽而臟則陰故見陰脈也邪壅於腹故腹滿太陰脈挾咽裡熱甚而水乾不得上行故咽乾也宜小承氣以下之尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴少陰腎水也性趨下故少陰受病尺寸俱沉太陰之邪不已至五六日則傳少陰少陰為病口燥舌乾而渴者邪傳入里熱氣漸深也景岳腎經屬水而邪熱涸之故口舌為之於渴健曰傷寒至少陰最為難治此言脈沉腎在下之義不可以沉為寒而與熱劑則更助其燥將致舌縮昏迷而告窮矣茲系傳入之邪熱極在腎法惟以下為事其一二日不從三陽所傳即病少陰但惡寒而不發熱者乃為直中少陰之證始可溫熱治之尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮緩者風脈也厥陰微緩者邪傳厥陰熱氣已劇近於風也當六七日發少陰邪傳於厥陰煩滿囊縮者熱氣聚內也全善煩滿少腹煩滿也觀下云少腹微下可見活人厥陰脈浮緩者囊不縮外證必發熱惡寒似瘧為欲愈宜桂枝麻黃各半湯著尺寸俱沉緩者囊必縮毒氣入臟宜承氣湯三陽云厥陰風脈固當緩但緩為胃氣和似欲愈之候病傳厥陰亦危篤矣豈有胃氣乎必緩中帶弦直而無神方是邪傳厥陰之惡候若只是緩脈傳經己盡火氣已去吉兆矣健曰傷寒傳至厥陰是經盡應解之候脈得微緩乃和軟有胃之象似無凶兆諒與大柴胡下之則腹減囊縱可愈矣王三陽深於辨脈理論極是厥陰惡證見於後篇此三經皆受病已入於腑者可下而已三陰受邪為病在裡於法當下然三陰亦有在經者在經則宜汗故云已入於腑者可下而已經曰臨病之工須宜兩審三陽云成云三陰亦有在經正陰證亦有在經在腑之謂也經不云三經皆受病可下而已而必增已入於腑四字亦以別直中陰經者則當發汗非謂陽證傳到陰經有可汗者在也若陽證傳到陰經縱有未盡入腑者當用大柴胡湯之時也豈可再言發汗哉觀子此以上是申言傷於寒則病熱熱雖甚不死之義病熱者傳邪也傳邪在表當汗在裡當下故以未入腑已入腑別之若兩感於寒者一日太陽受之即與少陰俱病則頭痛太陽口乾煩滿而渴少陰二日陽明受之即與太陰俱病則腹滿大陰身熱陽明不欲食太陰譫語陽明三日少陽受之即與厥陰俱病則耳聾少陽囊縮而厥厥陰水漿不入不知人者六日死若三陰三陽五臟六腑皆受病則營衛不行腑臟不通則死矣陰陽俱病表裡俱傷為兩感以其陰陽兩感病則兩證俱現至於傳經則亦陰陽兩經俱傳也一日太陽少陰同病者膀胱與腎為表裡也二日陽明太陰同病者胃與脾為表裡也三日少陽厥陰同病者膽與肝為表裡也然一日至二日太陽傳陽明而少陰則傳太陰二日三日陽明傳少陽而太陰則傳厥陰矣水漿不入不知人胃氣不通也內經五臟已傷六腑不通營衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故云不知人三日血氣乃盡故死矣謂三日六經俱病營衛之氣不得行於內外臟腑之氣不得通於上下至六日臟腑營衛之氣俱絕則死矣三陽曰二三日內譫語囊縮水漿不入不知人者真兩感也其死必矣太陽少陰俱病頭痛口千煩滿而有似暑病熱病宜細辨之且太陽入本亦渴不可便斷為兩感也兩感證先少陰而傳經證先太陰者兩感表裡同病傳經陽邪內陷脾胃為倉廩之官且木來剋土勢易侵也此申言兩感於寒而病必死之義其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈也八日陽明病衰身熱少歇也九日少陽病衰耳聾微聞也十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止舌乾己而嚏也十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也六日傳遍三陰三陽之氣皆和大邪之氣皆去病人精神爽慧也士材夫六經以次受病其愈皆以七日為期此論原本素問而從來註解不能無誤故請疏之不兩感者非表裡雙傳也更不傳經者邪但在此經而不傳他經也如是則可期六經病愈之日矣太陽篇云發於陽者七日愈乃知六經之病自一日受者第七日當衰二日受者八日當衰故一日邪在太陽不傳陽明更無他證則七日頭痛少愈二日傳陽明更不傳變至八日陽明病衰身熱少歇以此類推至十二日六經病盡邪氣皆去而可起矣觀子此節首句結前兩感節之義第二句結前病熱傳經節之義不加異氣句則承上而喝起下文遞衰邪去之謂也若過十三日以上不間尺寸陷者大危間瘳也十二日傳經盡則當愈若過十三日以上不瘳更尺寸沉陷則正氣內衰邪氣獨勝故云大危元禮傷寒先犯太陽以次而傳此特言其概爾其中變證不一兼證亦多有發於陽即少陰受之者有夾食傷寒食動太陰之經一得病腹滿痛者亦有不循經而入如初得病徑犯陽明身熱譫語發斑之類皆不始於太陽也亦有首尾止在一經不傳他經亦有止傳一經而止者不必盡傳諸經也至如病之逾越不可泥於次序當隨證施治所以傷寒得外證為多活人凡寒邪自背而入者或中太陽或中少陰自面而入者則中陽明之類亦不專始於太陽也宇泰有寒客三陰極而生熱則逆入陽明之腑凡邪初中三陰則寒故宜溫藥發汗及寒極變熱則復寒藥下之蓋三陰三陽皆能自受邪不止自太陽傳經也若更感異氣變為他病者當依舊壞證病而治之若脈陰陽俱盛重感於寒者變為溫瘧異氣者為先病未已又感彆氣也兩邪相合為他病脈陰陽俱盛者傷寒之脈也難經曰傷寒之脈俱盛而緊滿經曰脈盛身寒得之傷寒則為前病熱未已再感於寒寒熱相搏變為溫瘧嗣真更感異氣為他病者即索矩所謂二氣三氣雜合為病是也是為變病雖曰當依壞證與醫壞病各別三陽曰陰陽俱盛者傷寒脈也十三日以上病已傳裡變為熱矣脈當沉數今復見傷寒之脈豈非重感於外寒乎寒熱相搏故變為溫瘧健曰脈陰陽俱盛乃指人迎氣口而言此節引更感異氣而變他病之由以接下文諸證陽脈浮滑陰脈濡弱者更遇於風變為風溫此前熱未歇又感於風者也難經曰中風之脈陽浮而滑陰濡而弱風來乘熱故變風溫陽脈洪數陰脈實大者更遇溫熱變為溫毒溫毒為病最重也此前熱未已又感溫熱者也陽主表陰主裡洪數實大皆熱也兩熱相合變為溫毒以其表裡俱熱故為病最重陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如說此前熱未已又感溫氣者也溫熱相合變為溫疫宇泰按活人云溫病有二其用升麻解肌者乃正傷寒太陽證惡寒而不渴者特以其發於溫暖之時故謂之溫病爾其用竹葉石膏湯者乃仲景所謂渴不惡寒之溫病也要須細別勿令誤也然不惡寒而渴之溫病四時皆有之不獨春時而已觀子竊謂此皆不即病而加感異氣為病者也嚴寒之毒伏藏至春變為溫氣以溫氣之在內而或重感於寒則為溫瘧重感於風則為風溫重感於熱則為溫毒重感疫氣則為溫疫雖感遇不同而在內之溫氣無異也故皆謂之溫且曰是皆冬傷於寒至春發為溫病所致者也然既屬變病脈證方治可不各隨其異氣而求之健曰此三節言更感異氣於春溫之時而變諸證也曰當依壞證而治者是不得同傷寒例治也因其有重感之時氣故脈見陰陽俱盛耳下節義亦同古溫字即瘟同凡人有疾不時即病隱忍莫差以成痼疾凡覺少苦急須早說求治隱忍苟延則邪氣入深而為痼疾難以處制小兒女子益以滋甚小兒氣血未旺女子血室多病凡所受邪易於滋甚觀子小兒幼而無知女子柔而多諱故其求治尤遲時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈者腠理者津液腠泄之所文理縫合之中也要略曰三焦會通元真之處為氣血所注理者皮膚臟腑之文理也邪客皮膚則邪氣浮淺易為發散若以時治之罕有不愈者矣玉函曰主候常存形色未病未入腠理針藥及時服將調節委以良醫病無不愈健曰病無大小失治悉關性命病人忍之數日乃說邪氣入臟則難可制此為家有患備慮之要邪在皮膚則外屬陽而易治邪傳裡則內屬陰而難治內經曰善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也昔桓侯怠於皮膚之疾以致骨髓之病家有患者可不備慮乎千金扁鵲曰病在腠理湯熨之所及病在血脈針石之所及病在骨髓無可奈何而凡醫治病或言且待使病成乃去之此為妄矣當預約束家中及所部曲語解此意使有病者得悉其害為要凡作湯藥不可避晨夜覺病須臾即宜便治不等早晚則易愈矣千金曰凡始覺不佳即須治療迄至於病湯食競進折其毒勢庶可自然而差矣若或差遲病即傳變雖欲除治必難為力傳有常也變無常也傳謂循經而傳如太陽傳陽明是也變為不常之變如陽證變陰是也邪既傳變病勢深也本草曰病勢已成可得半愈病勢己過命將難全矣服藥不如方法縱意違師不須治之內經曰拘於鬼神者不可與言至德惡於針石者不可與言至巧病必不治治之無功觀子昔淳于氏有六不治驕恣不論於理者一不治即縱意違師之謂是不可以與治矣凡傷寒之病多從風寒得之凡中風與傷寒為病自古通謂之傷寒千金曰傷寒病者起自風寒入於腠理與精氣分爭營衛偏傷周身不通而病始表中風寒入里則不消矣始自皮膚入於經絡傳於臟腑是也未有溫覆而當不消散者風寒初客於皮膚便投湯藥溫暖發散而當者則無不消散之邪不在證治擬欲攻之尤當先解表乃可下之先解表而後下之則無復傳之邪觀子不在證治者證在兩可疑似之間也擬欲攻之尤當解表者傷寒表不解則不可攻裡必先解表乃可攻內也如陽明病當下若發熱惡寒脈浮緊猝下之表邪陷入必腹滿小便難也若表已解而內不消非大滿尤生寒熱則病不除表證雖罷里不至大堅滿者亦未可下是邪未收斂成實下之則裡虛而邪復不除猶生寒熱也若表已解而內不消大滿大實堅有燥屎自可除下之雖四五日不能為禍也表無外證里有堅滿為下證悉具外臺云表和里病下之則愈下證既具則不必拘於日數若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者因篤重者必死矣下之不當輕者尤難治矧重者乎華氏傷寒六日入胃乃可下也若熱毒在表未入於胃而先下之者其乘虛入胃即爛胃也熱既入胃須下去之不可留於胃中也若胃有實熱三死一生矣健曰以上言表裡不得混治之要夫陽盛陰虛汗之則死下之則愈陽虛陰盛汗之則愈下之則死表為陽里為陰陰虛者陽必湊之陽盛之邪乘其裡虛而入於腑者為陽盛陰虛也經曰尺脈弱名曰陰不足陽氣下陷入陰中則發熱者是矣下之除其內熱而愈若反汗之則竭其津液而死陰脈不足陽往從之陽脈不足陰往乘之陰邪乘其表虛客於營衛之中為陽虛陰盛也經曰假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒者是矣汗之散其表邪而愈若反下之則脫其正氣而死經曰本發汗而復下之此為逆本先下之而反汗之為逆嗣真內經曰邪氣盛則實精氣奪則虛蓋實者指邪氣而言虛者指正氣而言正氣在人陽主表而陰主裡邪氣中人表為陰而里為陽夫表之真陽先虛故邪氣乘之而盛實表受邪者陽虛也脈浮緊者陰邪盛於外也是謂陽虛陰盛所以用桂枝辛甘溫之劑汗之則陰邪消溫之則真陽長使邪去正安而愈又若里之真陰先虛故陽邪入之而成盛實里受邪者陰虛也脈沉實者陽邪盛於內也是謂陰虛陽盛所以用承氣酸苦寒之劑下之則陽邪消寒之則真陰長邪去正安故愈如其不然陽盛而用桂枝下咽即斃陰盛而用承氣入胃即亡是皆盛盛虛虛而致邪失正也活人所引素問陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒四證皆雜病也難經所謂陽虛陰盛汗出而愈下之即死陽盛陰虛汗出則死下之即愈者說脈也外臺所謂表病里和汗之則愈表和里病下之則愈者說陰陽表裡也皆非仲景之意夫仲景所論陰陽虛實者邪正消長之機也其義深矣且和者無病也以和字訓虛字恐礙理安道所謂陽盛則斃者是表證已罷而里證熱盛可攻而不可汗所謂陰盛以亡者是里證未形表證熱盛可汗而不可下也由此觀之仲景本旨庶暢然矣健曰陰陽虛實表裡汗下八者乃傷寒家大關鍵學者最要著力領悟觀嗣真之論安道之言明白而無餘蘊矣夫如是則神丹安可以誤發甘遂何可以妄攻虛實之治相背千里吉凶之機應若影響豈容易哉神丹汗藥也甘遂下藥也汗下當則吉汗下不當則凶其應如影隨形如響應聲況桂枝下咽陽盛則斃承氣入胃陰盛以亡桂枝湯發汗藥也承氣湯下藥玉函曰不當汗而強與汗之者令人奪其津液枯槁而死不當下而強與下之者令人開腸洞泄便溺不禁而死節菴方其風寒初客皮毛之間陰氣閉塞腠理身中陽氣已虛不能外御當此之時用桂枝辛甘溫之藥助陽抑陰而發之陰邪既散表氣衝和而愈不知出此而以承氣苦寒之藥下之表裡俱傷不亡何待若表邪既罷寒作為熱陽陷入深而盛於裡則津液消耗腸胃燥澀而臟腑之真陰虛矣當此之時宜用承氣苦寒之劑扶陰抑陽而泄去熱氣陽邪既退胃中真陰來復裡氣和平而愈不知出此而以桂枝辛熱之藥助邪伐正安有不斃者乎故越人仲景所以深致意而有下咽云云之誡全善陽盛則陽並於陰故宜下陰盛則陰並於陽故宜汗陽並於陰脈沉而實陰並於陽脈浮而實也總之陽盛陰虛是病在裡陽虛陰盛是病在表更易明矣觀子此數節前後反復言之只是發汗吐下不可相反之義陽盛陰虛四字言邪已入里也故下愈汗死陽虛陰盛四字言邪猶在表也故汗愈下死又繼之曰陽盛則斃者入里則陽邪盛矣而乃誤以桂枝陽藥反攻表也陰盛以亡者在表則陰邪盛矣而乃誤以承氣陰藥反攻裡也有不速其死乎滑伯仁注難經謂受病為虛不受病為盛與外臺之表和里和和字義同此陽盛陰盛不可作本氣論仲景已明言於桂枝下咽四句之內矣健曰節菴論詳且精深得仲景汗下之秘而善全人命為傷寒名家全善兼脈言之倘有脈證不相合者以此推求觀子之辨更進一層然其揆一也死生之要在乎須臾視身之盡不暇計日投劑不當則災禍立見豈暇計其日數哉此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃誤使病者殞歿自謂其分至今冤魂塞於冥路死屍盈於曠野仁者鑑此豈不痛與凡兩感病俱作治有先後發表攻裡本是不同而執迷妄意者乃云神丹甘遂合而飲之且解其表又除其里言巧似是其理實違夫智者之舉錯也常審以慎愚者之動作也必果而速安危之變豈可詭哉世上之士但務彼翕習之榮而莫見此傾危之敗惟明者居然能護其本近取諸身夫何遠之有焉兩感病俱作欲成不治之疾醫者大宜消息審其先後次第而治之若妄意攻治以求速效者必致傾危之敗矣觀子蓋嘗讀此而有感焉神丹甘遂合而飲之似乎後世為必無之事然近人發表兼消導之說藥雖不同而意實一轍何哉彼意以外既感邪內必停物藉口於夾食傷寒之治遂以芎蘇羌防類解其外枳樸楂蔔類消其中一舉兩得豈不有理殊不知傷寒之初邪只在腠理肌表並未深入只一汗可除焉事兼求裡實昧者施此其罪有三本太陽表病妄攻陽明之裡則誅伐無故以犯經禁其失一也邪在皮毛必從汗而解胃主津液內奪其氣得汗反數其失二也邪未入腑胃本無實可除先事削伐令邪乘虛內陷其失三也夫表不解者不可攻裡仲景法也病在外反以兼內誤之是表邪方欲從汗而去而裡虛奪之內陷矣汗之非法雖解表奚用乎所以裡氣未甚敗者不過侵入陽明而血弱氣盡者變端其可數乎夫傷寒惟患傳裡何為速之使入庸工習為常勝之兵是傷寒非必死之病而昧者操必殺之機也言巧似是其理實非可不深省歟健曰林氏三失之咎勘破時人積習近來雜病尚多妄治何況傷寒孰能窺仲景之奧哉苟讀其書而未得其要亦不濟事往往溺於三失而不能醒悟且終身不知傷寒書為何物即或知之而涵以傷寒方法概施雜病雜病湯劑反治傷寒而兩誤俱敗者亦復不少皆因無良師指授少善本力學爾舉今之世奚止三失而已哉無論傷寒時氣疫毒一至入腑而現譫語狂躁舌燥焦黑耳聾昏悶之象不分虛實寒熱輒指歸陰總以地黃湯為事寓意於養陰退熱為前賢所未到之巧思甚至以六味丸料壯水之主而麥冬五味枸杞石斛知柏龜板任意妄投遂致腹硬屎結脈沉口噤而斃者此常事耳又或瘟疫發斑傷寒時氣脈微汗泄舌濕無胎或獨語神昏羞明怕日或食填太陰或陽虛陰弱之證而反以羌防發散膏連清熱元參知母生地丹皮之屬並進以致身冷痰升而殞者比比尤多正仲景所謂冤魂塞於冥路仁者鑑之能無憫惕而若輩懵然寧受病家之辱毫不自返一掉同風其禍蔓延而道日浸離可勝嘆與或曰此時勢使然人命有數耳夫天固有運人固有數運有盛衰數有修短誠難測也然聖人之道承製之理無可或失豈容妄事非法不特誤世殃人且恐釀成貽患若不表而出之則健亦為仲景之罪人矣叔和此以前是傷寒熱病證候也凡發汗服湯藥其方雖言日三服若病劇不解當促其間可半日中盡三服若與病相阻即便有所覺重病者一日一夜當晬時觀之如服一劑病證猶在故當復作本湯服之至有不肯汗出服三劑乃解若汗不出者死病也發汗藥須溫服者易發散也日三服藥勢續也病勢稍重當促急服之以折盛熱不可拘於本方設藥病不相對湯入即便知之如陰多者投以寒涼即寒逆遂生陽多者飲以溫劑則熱毒即起是便有所覺晬時者周時也一日一夜服湯藥盡劑更看其傳病證猶在當復作本湯以發其汗若服三劑不解汗不出邪氣大盛渴不能勝必成大疾千金曰熱病脈躁盛而不得汗此陽脈之極也死三陽曰有黃耆建中補之而後汗出者若服三劑發汗藥汗復不出其死必矣宜仔細候脈消息之毋妄治也觀子作湯至三劑是九服汗藥矣此亦古人稟賦厚腠理堅且非邪熱盛極不至於此後人無此氣血當消息用之況有津液竭而不得汗者須助元氣而汗出非一概強發其汗也凡得時氣病五六日而渴欲飲水飲不能多不當與也何者以腹中熱尚少不能消之便更與人作病也至七八日大渴欲飲水者猶當依證與之與之常令不足勿極意也言能飲一斗與五升若飲而腹滿小便不利若喘若噦不可與之忽然大汗出是為自愈也熱在上焦則為消渴言熱消津液上焦乾燥則生渴也大熱則能消水熱少不能消之若強飲則停飲變為諸病至七八日陽勝氣溫向解之時多生大渴亦須少少與之以潤胃氣不可極意飲也若飲而腹滿小便不利若喘若噦者為水飲內停而不散不可更與之忽然陽氣通水氣散先發於外作大汗而解凡得病反能飲水此為欲愈之病其不曉病者但聞病飲水自愈小渴者亦強與飲之因成其禍不可複數小渴者為腹中熱少若強與水水飲不消復為諸飲病也千金久病非大渴不可與水能飲一斗者與五升飲之若全不與則乾燥無由作汗多發喘死小渴劇飲致心下痞結喘死者當以五苓散或陷胸丸與之又水停心下者氣上乘心則為悸為喘結於胸脅則為水結胸胃中虛冷則為嘔為噦冷氣相搏則喘上迫於肺則為咳漬於腸中則為利邪熱所薄畜於下焦則為小便不利小腹滿或裡急溢於皮膚則為腫若小渴咽乾者少少呷之潤其胃中和乃解凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜此皆愈證也動數之脈邪在陽也湯入而變遲者陽邪愈也浮大之脈邪在表也復減小者表邪散也病初躁亂者邪所煩也湯入而安靜者皆為愈證也凡治溫病可刺五十九穴五十九穴以瀉諸經之溫熱針經曰熱病取之諸陽五十九穴刺以瀉其熱而出其汗實其陰而補其不足所謂五十九兩手內外側各三凡十二痏五指各一凡八痏足亦如是頭入髮際一寸旁三分各三凡六痏更入發三寸邊五凡十痏耳前後口下各一項中一穴凡六痏巔上一囟會一髮際一廉泉一風池二天柱二又內經曰熱俞五十九頭上五行行五者以瀉諸陽之熱逆也大抒膺俞缺盆背俞此八者以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四支之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆取之左右也痏音委人身之穴三百六十有五其三十九穴灸之有害也十九穴刺之有災並中髓也穴有三百六十五以應一歲其灸刺之禁皆肉薄骨解之處血脈虛少之分針灸並中髓也仁齋針法近失真傳不可輕用恐反惹禍惟灸法極虛寒者可行之凡脈四損三日死平人四息病人脈一至名曰四損脈五損一日死平人五息病人脈一至名曰五損脈六損一時死平人六息病人脈一至名曰六損四臟氣絕者脈四損五臟氣絕者脈五損五臟六腑氣俱絕者脈六損也脈盛身寒得之傷寒脈虛身熱得之傷暑內經曰脈實血實脈虛血虛寒則傷血邪並於血則血盛而氣虛故傷寒者脈盛而身寒熱則傷氣邪並於氣則氣盛而血虛故傷暑者脈虛而身熱南陽大抵中暑與熱病外證頗相似而熱病脈盛中暑脈虛以此別之蓋寒傷形而不傷氣所以脈盛熱傷氣而不傷形所以脈虛觀子雖曰身寒實指發熱言也要以意得之又劉從周曰盛夏發熱有進退者為冒暑一直熱而不止者為傷寒脈陰陽俱盛大汗出不解者死陰陽俱盛當汗出而解不解者邪氣勝正氣脫也內經曰汗出而脈尚躁盛者死千金曰熱病已得汗脈尚躁盛此陽脈之極也死脈陰陽俱虛熱不止者死陰陽俱虛者真氣弱也熱不止者邪氣勝也內經曰病溫虛甚者死脈至乍疏乍數者死天真營衛之氣斷絕也脈至如轉索者其日死為緊急而不軟是中無胃氣故不出其日而死譫言妄語身微熱脈浮大手足溫者生逆冷脈沉細者不過一日死矣譫言妄語陽病也身微熱脈浮大手足溫為脈病相應若身逆冷脈沉細為陽見陰脈之病不相應故不過一日即死矣健曰此篇條理錯雜豈是仲景原書如刺穴下復入辨脈數條何不列於前篇益見編次之失其脫漏多矣讀者須體會之叔和此以前是為傷寒熱病證候也辨痓濕暍脈證第四痓音熾暍音歇傷寒所致太陽痓濕暍三種宜應別論以為與傷寒相似故此見之痓當作痙傳寫之誤也痓者惡也非強也內經曰肺移熱於腎傳為柔痓柔謂筋柔而無力痙謂骨痙而不隨痙者強也千金以強直為痙經曰頸項強急口噤背反張者痓即是觀之痓為痙字明矣健曰太陽風濕為病項背強急名曰痙有剛柔之分以有汗無汗別之痓者惡候也其證口噤昏迷角弓反張痰塞時作亦有剛柔之別與痙為甚三日不解過七日則死矣痙則不然惟項背強無反張迷悶等勢而尚可治有汗者應和解無汗應發散然必俱兼逐濕養血為主此不言痙而名痓者蓋古人之通稱耳太陽病發熱無汗反惡寒者名曰剛痓千金曰太陽中風重感寒濕則變痓太陽病發熱無汗為表實則不當惡寒今反惡寒者則重感於寒為痓病也以表實感寒故名岡痓太陽病發熱汗出不惡寒者名曰柔痓太陽病發熱汗出為表虛則當惡寒其不惡寒者為陽明病今發熱汗出而不惡寒者非陽明證則是太陽中風重感於濕為柔痓也表虛感濕故曰柔痓宇泰濕勝者自多汗出觀子痓病以無汗惡寒汗出不惡寒分別剛柔則可以此辨與否非也痓必先具項背強直之狀而後別其孰為剛痓也由表實感寒孰為柔痓也由表虛感濕太陽病發熱脈沉而細者名曰痓太陽主表表病發熱脈當浮大今脈反沉細既不愈則太陽中風重感於濕而為痓也要略曰太陽病其證備身體強𠘧𠘧然脈反沉遲此為痓栝蔞桂枝湯主之可也幾音如太陽病發汗太多因致痓太陽病發汗太多則亡陽內經曰陽氣者精則養神柔則養筋陽微不能養筋則脈急而成痓也卿子可見亦不必重感寒濕觀子有由傷寒致痓之處如太陽中風成痓太陽發汗太多成痓者是也有痓病似傷寒之處如發熱惡寒汗出是也仲景既曰傷寒所致太陽痓又曰以為與傷寒相似二意是殊矣太陽痓雖證近傷寒其脈沉細及浛浛如蛇必項背強直或反張其不佯自可判矣中風重感寒濕者屬外因有餘汗多亡陽去血太過者屬內因不足病雖同而治可同乎太陽痙外復有陽明痓與少陽痓雖經言來之及尤當推廣分別以施治之病身熱足寒頸強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痓病也太陽中風為純中風也太陽傷寒為傷寒也皆不作痓惟是太陽中風重感於濕乃變為痓也身熱足寒者寒濕傷於下也時頭面赤者風傷於上也頭為諸陽之首風傷陽風主動故目脈赤而頭面搖也若純傷風者身亦為之動搖手足為之搐搦此惟內挾寒濕故但頭面搖也口噤者寒主急也卒口噤者不常噤也若風寒相搏則口噤不能時開此加之風濕故卒口噤而有時緩也足太陽之脈起於目內眥上額交巔其支者從巔入絡腦還出別下項循肩膊夾脊抵腰中下貫臀以至足風寒客於經中則筋拘急故頸項強急而背反張也活人痙病發熱惡寒外證與傷寒相似但其脈沉遲弦細項背反張為異耳健曰前條雖皆稱痓或重感寒或重感濕及汗多亡陽而未至於反張口噤者此是痙證非痓也如此條方是痓病因其本原消耗津液內亡不能榮養百骸又值外感風濕痰火相搏筋脈槁而拘急肢體強而反張昏迷口噤卒縱卒收已成不治後賢雖有栝蔞根湯小續命之設亦十難救一真惡候也然必因久病後虛極所致者多若傷寒猝病不應見此故余當作痙太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候其人小便不利大便反快但當利其小便要略曰霧傷皮腠濕流關節疼痛而煩者濕氣內流也濕同水也脈沉而細者水性趨下也痹痛也因其關節煩疼而名濕痹非腳氣之痹也內經曰濕勝則濡泄小便不利大便反快者濕氣內勝也但當利其小便以宣泄腹中之濕氣古云治濕不利小便非其治也或云甘草附子湯麻黃赤小豆湯健曰不若四苓散合胃風湯或羌活勝濕湯濕家之為病一身盡疼發熱身色如似熏黃身黃如橘子色者陽明瘀熱此如熏黃知非瘀熱也身黃髮熱者梔子柏皮湯為表裡有熱故身不痛此一身盡痛知非傷寒客熱也由濕邪在經使然脾惡濕濕傷則脾病而色現身黃如煙燻者非正黃色也徐氏此本濕熱證而論不言熱且無治法或治以白朮附子湯甘草附子湯桂枝加桂湯等恐與濕熱病不宜觀子此痛與痹痛不同濕在關節而疼故曰痹今一身盡疼而復表熱故曰在經熏黃與橘子黃同是濕熱彼以熱勝者黃而明此以濕勝者黃而暗治法小便不利茵陳五苓散小便利者朮附湯海藏曰熏黃者陰黃蓋既濕勝則次傳寒中者有之健曰黃乃中央土色脾為濕困而本色外現凡物受濕氣必化熱而蒸黃如醃醬然雖驗明暗以分陰陽然身既黃而發熱且疼是濕已變熱只宜清熱利濕茵陳四苓最妙附子桂枝非所宜也次傳寒中之說亦未必然濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如胎者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也濕家有風濕寒濕此寒濕相搏者也濕勝則多汗傷寒則無汗寒濕相搏雖有汗不及周身故但頭汗出也背陽也腹陰也太陽之脈夾脊抵腰寒濕客之則表氣不利而背強也里有邪者外不惡寒表有邪者則惡寒欲得向火寒濕在表而惡寒也若下之早傷動胃氣損其津液故噦而胸滿小便不利者下后里虛上焦陽氣因虛而陷於下焦為丹田有熱表中寒乘而入於胸中為胸中有寒使舌上生白胎而滑也臟燥則欲飲水以胸上客寒濕故不能飲而但口燥煩也宇泰此寒濕相搏於表不可妄下者也小陷胸湯甘草附子湯小便不利四苓散理中去姜加朮小便利者桂枝加附子理中加茯苓茯苓白朮湯類選用健曰此證必先感於濕而復感風寒三氣同經相搏故頭汗背強欲被向火何也風傷於上而挾濕則頭汗寒傷於表而挾濕則脊強怕冷法當表散則三氣皆去若反下之則三氣內陷而噦此噦不比久病之噦是嘔逆有聲而氣上胸滿氣不下化則小便不利濕則下先受之其邪內畜則舌上白滑而現丹田有熱胸中有寒之象渴欲得水者嘔則津干口燥煩也又不能飲者因內陷之寒在胸而濕未化熱原非可下之證故云下早考損菴所舉諸方亦難取法莫如海藏神術局方羌活勝濕二者能散風寒化濕氣生津利便不必求傷寒方治而可消弭於無事矣濕家下之額上汗出微喘小便利者死若下利不止者亦死濕家發汗則愈要略曰濕家身須疼可與麻黃加朮四兩發其汗為宜若妄下則大逆額上汗出而微喘者乃陽氣上逆也小便自利或下利者陰氣下流也陰陽相離故云死內經曰陰陽離缺精氣乃絕問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也值天陰雨不止明其濕勝也內經曰陽受風氣陰受濕氣又曰傷於風者上先受之傷於濕者下先受之風濕相搏則風在外而濕在內汗大出者其氣暴暴則外邪出而里邪不能出故風去而濕在汗微微而出者其氣緩緩則內外之邪出故風濕俱去也宇泰云麻黃白朮湯桂枝附子湯風濕宜汗桂枝加白朮黃耆防己湯卿子風濕相搏法當汗出而解正如前條麻黃加白朮使微微蒸發表裡氣和風濕俱去若成注似以表言風以裡言濕則不可健曰風濕為值陰雨致者非傷寒家證明甚損庵卿子豈不知此而仍事傷寒方法謬矣只須海藏神術為妙少加羌活可去一身之痛亦風能勝溫之法濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內讀納藥鼻中則愈病有淺深證有中外此則濕氣淺者也何以言之濕家不云關節煩疼而云身上疼痛是濕不流關節而外客肌表也不云發熱身似熏黃復云發熱面黃而喘是濕不幹於脾而薄於上焦也陰受濕氣則濕邪為深今頭痛鼻塞而煩是濕客於陽也濕家之脈當沉細為濕氣內流今脈大者陽也則濕不內流而外在表也又以自能飲食胸腹別無痞滿為腹中和無病知其濕微淺納藥鼻中以宣泄頭中寒濕仁齋按此以瓜蒂散搐鼻下黃水則愈嗣真頭疼發熱背強身痛與傷寒相似其不同者脈沉而細頭汗面黃能飲食所以為異也夫太陽傷寒脈必浮盛今脈沉細苟非濕家即陽證陰脈也蓋有面黃頭汗其為濕也無疑其能飲食者為病在經而不幹里也然大便反快小便滯亦經絡澀滯不能施化所致也病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也一身盡疼者濕也發熱日晡所劇者風也若汗出當風而得之者則先傷風而後中濕可與麻黃杏仁薏苡仁甘草湯方見金匱黃氏太陽濕家病與太陽傷寒相似其不同者濕脈沉細故也濕脈與痙脈亦相似而證不同濕則身疼痊則身不疼也健曰上諸濕證雖列於傷寒序例之後觀其現病概非冬令所主故與痓暍同論其不與傷寒同法明矣不列方劑者亦闕文耳太陽中熱者暍是也其人汗出惡寒身熱而渴也汗出惡寒身熱而不渴者中風也汗出惡寒身熱而渴者中暍也白虎加人參湯主之方見金匱太陽中暍者身熱疼重而脈微弱此亦夏月傷冷水水行皮中所致也經曰脈虛身熱得之傷暑身熱脈微弱者暍也身體疼重者水也夏時暑熱以水灌洗而得之要略以一物瓜蒂散主之宇泰或云五苓散健曰暍為陽邪曝毒中人即不傷水冷而夏暑氣兼濕熱故病必身熱疼重而煩渴應與葛根湯加白虎藿香六一散內外雙解之太陽中喝者發熱惡寒身重而疼痛其脈弦細芤遲小便已洒洒然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚病有在表者有在裡者有表裡俱病者此則表裡俱病者也發熱惡寒身重疼痛者表中暍也脈弦細芤遲者中暑脈虛也小便已洒洒然毛聳手足逆冷者太陽經氣不足也小有勞身即熱者謂勞動其陽而暍即發也口開前板齒燥者里有熱也內經曰因於暑汗煩則喘喝口開謂喘喝也以喘喝不止故前板齒燥也若發汗以去表邪則外虛陽氣故惡寒甚若以溫針助陽則火熱內攻故發熱甚若下之以除裡熱則內虛而膀胱燥故淋甚徐氏此條無治法東垣以清暑益氣湯主之所謂發千古之秘也宇泰中暍中暑中熱名雖不同實一病也若冬傷於寒至夏至後而變為熱病者此過時而發自內達表之證俗謂晚發是也又非暴中暑熱新病之可比或曰新中暑病脈虛晚發熱證脈盛張氏清邪中上濁邪中下風寒濕者地之氣為濁邪所以俱中足經惟暑乃天之氣系清邪所以中手少陰心經也其病多與傷寒相似但證與脈不同耳傷寒雖惡寒發熱初病未至於煩渴中暍不然初病即渴傷寒之脈浮中暑之脈虛弱或弦細芤遲者有之經曰脈盛身寒得之傷寒脈虛身熱得之傷暑此之謂也汪氏以證言之傷寒惡寒傷熱惡熱以脈言之傷寒脈盛傷暑脈虛且暑脈虛細與濕痓之脈有相似者而證則不同暑則自汗而渴濕則渴而不能飲痓則身不疼也健曰此篇痓濕暍三證理當列於六經變證之後不當先列於前蓋叔和之誤次也
