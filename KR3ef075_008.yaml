body:
  text: 傷寒直指卷七辨霍亂病脈證治第十三問曰病有霍亂者何答曰嘔吐而利名曰霍亂三焦者水穀之道路邪在上焦則吐而不利邪在下焦則利而不吐邪在中焦則既吐且利以飲食不節寒熱不調清濁相干陰陽乖隔遂成霍亂輕者止曰吐利重者揮霍撩亂也健曰平陳合藿香正氣散治之宜問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也發熱頭痛身惡寒者本是傷寒因邪入里傷於脾胃上吐下利令為霍亂利止里和復更發熱者還是傷寒必汗出而解明理傷寒吐利者邪氣所傷霍亂吐利者飲食所傷其有兼傷寒之邪內外不和加之頭痛發熱而吐利如此條云云者是霍亂兼傷寒者也傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反失氣仍不利者屬陽明也便必硬十三日愈所以然者經盡故也微為亡陽澀為亡血傷寒脈微澀則本是霍亂吐利亡陽亡血吐利止傷寒之邪未已還是傷寒也卻四五日邪傳陰經之時裡虛遇邪必作自利本嘔者邪湛於上又利者邪甚於下先霍亂裡氣大虛又傷寒之邪再傳為吐利是重虛也故為不治若欲似大便而反失氣裡氣熱也此屬陽明便必硬也十三日愈者傷寒六日傳遍三陽三陰後六日再傳經盡則陰陽和大邪已去而愈也下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也下利後亡津液當便硬能食為胃和必自愈不能食者胃氣方和過一日當愈不愈者暴熱使之能食非陽明氣和也惡寒脈微而復利利止亡血也四逆加人參湯主之惡寒脈微而利者陽虛陰勝也利止則津液內竭故云亡血金匱曰水竭則無血與四逆湯溫經助陽加人參生津液而益血仁齋霍亂要審察冷熱而治若夏月暑霍亂脈虛小便少不可用附子乾薑細辨之又曰中暑霍亂只宜五苓散加香藿扁豆葛根薑汁炒黃連類治之觀子東南之氣多暑熱霍亂作於夏秋者衆故治宜五苓藿香正氣西北之氣多陰寒霍亂兼於傷寒者衆甚者且清穀脈微裡寒外熱厥作格陽故治非理中四逆不可是知地宜不同寒熱頓異施治之殊又不獨傷寒為然也霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之頭痛發熱則邪自風寒而來中焦為寒熱相半之分邪稍高者居陽分則為熱熱多欲飲水者與五苓散以散之邪稍下者居陰分則為寒寒多不用水者與理中丸以溫之吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利止里和也身痛不休表未解也與桂枝湯小和之者外臺云里和表病汗之則愈是已吐利汗出發熱惡寒四肢拘急手足逆冷者四逆湯主之上吐下利裡虛汗出發熱惡寒表未解也四肢拘急手足逆冷陽虛陰勝也與四逆湯助陽退陰既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之吐利亡津液則小便當少小便復利而大汗出津液不禁陽氣大虛也脈微為亡陽若無外熱但內寒下利清穀為純陰此以外為陽未絶猶可與四逆湯救之吐已下斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之吐已下斷津液內竭則不當汗出汗出者不當厥今汗出而厥四肢拘急不解脈微欲絶者陰氣欲勝也若能與湯藥恐陰為拒格或嘔或躁不得復入也與通脈四逆加膽汁膽苦入心而通脈膽寒補肝而和陰引置湯藥不被拒格內經曰微者逆之甚者從之此之謂也吐利發汗脈平小煩者以新虛不勝穀氣故也內經曰食入於陰長氣於陽新虛不勝穀氣是以小煩辨陰陽易瘥後勞復病脈證治第十四傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒褌散主之大病新差氣血未復餘熱未盡強合陰陽得病者名曰易男子新病差未平復而婦人與之交得病名曰陽易婦人新病差未平復男子與之交得病名曰陰易以陰陽相感動其餘毒相染著如換易也其人病身體重少氣者損動真氣也少腹裡急引陰中拘攣膝脛拘急陰氣極也熱上衝胸頭重不欲舉眼中生花者感動之毒所易之氣熏蒸於上也與燒揮散以通陰氣大病差後勞復者枳實梔子湯主之若有宿食者加大黃如博棋子大五六枚病有勞復有食復傷寒新差血氣未平餘熱未盡早作勞動病者名曰勞復病熱少愈而強食之熱有所藏因其穀氣留傳兩陽相合而病者名曰食復勞復則熱氣浮越與枳實梔子豉湯以解之食復則胃有宿積加大黃以下之健曰病差而復必因本原未旺稍勞即復須調養氣血為主何以因消克表托之枳實梔子湯耶若食復如無陳垢在內必因脾不健運偶食即停或腹滿發熱亦當助脾運化為事未便通用大黃損其津氣二者俱要審察脈舌而制其宜庶不犯虛虛之誡傷寒差已後更發熱者小柴胡湯主之脈浮者以汗解之脈實者以下解之差後餘熱未盡更發熱者與小柴胡湯以和解之脈浮者熱在表也故以汗解之沉者熱在裡也故以下解之大病差後從腰以下有水氣者牡蠣澤瀉散主之大病差後脾胃氣虛不能制約腎水水溢下焦腰以下為腫也要略曰腰以下腫當利小便與牡蠣澤瀉散利小便而散水大病差後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸汗後陽氣不足胃中虛寒不內津液故喜唾不了了與理中丸以溫其胃傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之傷寒解後津液不足而虛羸餘熱未盡熱則傷氣故少氣氣逆欲吐與竹葉石膏湯調胃散熱病人脈已解而日暮微煩以病新差人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈陽明旺於申酉戌宿食在胃故曰暮微煩當下之以損宿食健曰此亦未可驟下只宜助脾運化為妥辨不可發汗病脈證治第十五叔和夫以為疾病至急倉卒尋按要者難得故重集諸可與不可方治比之三陰三陽篇中此易見也又時有不止是三陰三陽出在諸可與不可中也諸不可汗不可下病證前三陰三陽篇中經注已具者更不復出其餘無者於此以後經注備見脈澀而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中鳳汗出而反躁煩澀則無血厥而且寒陽微發汗躁不得眠寸關為陽脈當浮盛弱反在關則裡氣不及澀反在巔則表氣不逮衛行脈外浮為在上以候衛微反在上是陽氣不足榮行脈中沉為在下以候營澀反在下是無血陽微不能固外相順接故厥而且寒陽微無津液故不能作汗若發汗必亡陽而躁經曰汗多亡陽遂虛惡寒煩躁不得眠也動氣在右不可發汗發汗則衄而渴心苦煩飲即吐水動氣者築築然氣動也在右者在臍之右也難經曰肺內證臍右有動氣按之牢若痛者肺氣不治正氣內虛氣動於臍之右也發汗則動肺氣肺主氣開竅於鼻氣虛則不能衛血血溢妄行隨氣出於鼻為衄亡津液胃燥則煩渴而心苦煩肺惡寒飲冷則傷於肺故飲即吐水活人先服五苓散三服次服竹葉湯動氣在左不可發汗發汗則頭眩汗出不止筋惕肉瞤難經曰肝內證臍左有動氣按之牢若痛肝氣不治正氣內虛氣動於臍左也肝為陰之主發汗汗出不止則亡陽外虛故頭眩筋惕肉瞤針經曰上虛則眩活人先服防風白朮牡蠣汗止次服建中湯動氣在上不可發汗發汗則氣上衝正在心端難經曰心內證臍上有動氣按之牢若痛心氣不治正氣內虛動蒸在臍之上也心為陽發汗亡陽則愈損心氣腎乘心虛欲上凌心故氣上衝正在心端活人宜服李根湯動氣在下不可發汗發汗則無汗心中大煩骨節苦疼目暈惡寒食則反吐谷不得前難經曰腎內證臍下有動氣按之牢若痛者氣不治正氣內虛動氣發於臍之下也腎者主水無汗者水不足也心中大煩者腎虛不能制心火也骨節苦疼者腎主骨也目暈腎病目䀮䀮如無所見也惡寒者腎主寒也食則反吐谷不得前者腎水乾也王冰曰病嘔吐食久反出是無水也活人先服大橘皮湯吐止後服小建中湯咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得蠟臥不能自溫咽者胃之系胃經不和則咽內不利發汗攻陽血隨發散而上必吐血也胃經不和而反攻表則陽虛於外故氣欲絶手足冷欲蜷臥而不能自溫諸脈得數動微弱者不可發汗發汗則大便硬腹中乾胃燥而煩其形相像根本異源動數之脈為熱在表微弱之脈為熱在裡發汗亡津液則熱氣愈甚胃中乾燥故大便難腹中乾胃中燥故煩根本雖有表裡之異逆治之後熱傳則一是以病形相像也脈微而弱弱反在關濡反在巔弦反在上微反在下弦為陽運數為陰寒上實下虛意欲得溫微弦為虛不可發汗發汗則寒栗不能自還弦在上則風傷氣風勝者陽為之運動微在下為寒傷血血傷者里為之陰寒氣怫鬱為上實里有陰寒為下虛表熱裡寒意欲得溫若反發汗亡陽陰獨故寒栗不能自還咳者則劇數吐涎沫咽中必干小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒栗咳而發汗蜷而苦滿腹中復堅肺寒氣逆咳者則劇吐涎沫亡津液咽中干小便不利膈中陽氣虛心中飢而煩也一日一夜氣大會於肺邪上相擊晬時而發形如寒瘧但寒無熱虛而寒栗發汗攻陽則陽氣愈虛陰氣愈甚故蜷而苦滿腹中復堅者也厥脈緊不可發汗發汗則聲亂咽嘶舌痿聲不得前厥而脈緊少陽傷寒也法當溫里而反發汗則損少陰之氣少陰之脈入肺中循喉嚨挾舌本腎為之本肺為之標本虛則標弱故聲亂而咽嘶舌痿聲不得前諸逆發汗病微者難瘥劇者言亂目眩者死命將難全不可發汗而強發之輕者因發汗而重而難瘥重者脫去其陰陽之氣言亂目眩而死經曰脫陽者見鬼是此言亂也脫陰者目盲是此目眩也眩非玄而見玄是近於盲也咳而小便利若失小便者不可發汗汗出則四肢厥逆冷肺虛冷上虛不能治下者咳而小便利或失小便上虛發汗則陽氣外亡四肢者諸陽之本陽虛不能與陰相接故四肢厥逆冷傷寒頭痛翕翕發熱形象中風常微汗出自嘔者下之益煩心中懊憹如飢發汗則致痙身強難以屈伸熏之則發黃不得小便灸則發咳唾傷寒當無汗惡寒今頭痛發熱微汗出自嘔則邪傳為熱欲行於里若反下之邪熱乘虛流於胃中為虛煩為心中懊憹如飢若發汗則虛其表熱歸經絡熱甚生風故身強直而成痙若熏之則火熱相合消爍津液故小便不利而發黃肺惡火灸則火氣傷肺必發咳嗽而唾膿互考大陽病八九日如瘧發熱惡寒熱多寒少脈微而惡風陰陽俱虛也不可發汗吐下太陽病發熱惡寒熱多寒少脈微弱無陽也不可發汗太陽發汗太多因致痙汗家重發汗必恍惚心亂小便已陰疼陽明傷寒脈沉喘滿不可發汗傷寒脈弦細頭痛發熱者為少陽不可發汗少陰脈沉細數為在裡不可發汗少陰脈微為亡陽不可發汗少陰但厥無汗強發之血從口鼻出為下厥上竭難治一二日至四五日厥而發熱不可發汗汗則口傷爛赤下利清穀不可發汗汗出脹滿南陽壞病不可發汗風溫不可汗濕溫不可汗虛煩者不可汗婦人經水適來不可汗云岐太陽證非頭痛項強不可發汗非身熱惡寒不可發汗非脈浮不可發汗仁齋大便瀉利者不可汗內傷勞倦者不可發汗房勞陰虛者不可汗夢泄遺精者不可汗金瘡流血者不可汗癰腫初破者不可汗新産者不可汗永類傷寒發汗有四難凡發熱頭痛而有汗惡風者例發其汗汗不止為漏風或有發痙者一難也發熱頭痛尺脈遲發熱頭痛脈弦細俱不可汗二難也動氣在臍左右上下不可汗三難也春宜汗不可大發以陽氣尚微冬大汗以陽氣在臟四難也健曰氣虛脈微者不可發汗汗則亡陽血虛脈弱者不可發汗汗則消陰里證具而便結溺利者不可發汗汗則津液外耗而屎更燥舌黃胎乾焦刺者不可發汗汗則津枯火熾而昏冒譫妄見斑不可發汗汗藥辛溫搏血而斑毒內潰淋家不可發汗瘡家不可汗辨可發汗證漢第十六大法春夏宜發汗春夏陽氣在外邪氣亦在外故可發汗南陽春不可大發汗以陽氣尚弱冬不可汗者以陽氣伏藏當以輕藥解利之或得少汗而解或無汗而自解又云若病勢甚者亦不拘此凡發汗欲令手足俱周時出以漐漐然一時間許亦佳不可令如水流漓若病不解當重發汗汗多必亡陽陽虛不得重發汗也汗緩緩出則表裡之邪悉去汗大出則邪氣不除但亡陽也陽虛為無津液故不可重發汗觀子時出言緩出也凡服湯發汗中病便止不必盡劑汗多則亡陽凡云可發汗無湯者丸散亦可要以汗出為解然不如湯隨證良驗聖濟云湯液主治本乎腠理壅鬱除邪氣者於湯為宜玉函曰水能淨萬物故用湯也夫病脈浮大問病者言但便硬爾設利者為大逆硬為實汗出而解何以故脈浮當以汗解經曰脈浮大應發汗醫反下之為大逆便硬難雖為裡實亦當先解其外若下利藥為大逆結胸雖急脈浮大猶不可下下之即死況此便難乎經曰本發汗而復下之此為逆若先發汗治不為逆觀子脈浮大病本在表也病者果纍日未圊便結自苦耳設不如者因而利之病外責內非大逆乎硬為實以下是設為問難以悉其説也便硬雖為內實然亦有汗出而解者奚故乎政以脈之浮大表邪甚盛非汗不可也故下復足其意曰脈浮當以汗解下利後身疼痛清便自調者急當救表宜桂枝湯發汗外臺云里和表病汗之則愈互考太陽外證未解脈浮弱可發汗脈浮數者可發汗脈浮者病在表可發汗脈浮緊發熱無汗頭痛體痛惡風寒可發汗不發汗因致衄不成流者可發汗熱結膀胱如狂外未解可發汗不大便六七日頭痛有熱小便清可發汗太陽病十日已去脈但浮可發汗陽明脈遲汗多微惡寒可發汗陽明脈浮無汗而喘可發汗陽明中風脈但浮無餘證可發汗太陽陽明合病喘而胸滿不可下可發汗太陽病脈浮可發汗少陰始得之反發熱脈沉二三日無里證微發汗活人有咽乾鼻衄等證不當發汗已經發汗不得重汗無忌證雖經發汗邪氣未盡亦當重汗當汗不汗生黃者風寒所傷陽氣下陷入內與寒水行於經絡之間不得外徹與脾土寒熱相合故生黃也不當汗而汗畜血者邪氣隨經內瘀與血相搏結有上中下之殊也又曰燥火當益津液而反汗以亡之其毒擾陽之極則侵陰故燥血畜於胸中也當汗而發之太過腠理開漏不止故惡風便難四肢難屈伸或心下悸身振瞤動恍惚心亂與表虛而大發汗必厥逆肉瞤筋傷也傷寒發來須當隨證輕重而汗之故仲景有發汗者和解者發汗以麻黃湯桂枝湯大青龍湯是也和解如小青龍湯桂枝麻黃各半湯白虎湯桂枝二越脾一湯柴胡桂枝湯類是也後人不能深究寒邪淺深藥性緊慢一概用藥以致夭傷其間縱獲生全往往汗後虛乏遂致勞復或變成百病淹引歲月仍至不救皆由汗下過度陰陽並竭氣血羸損以致此禍如遇輕病但當和解所謂和其營衛以通津液令其自解可也婁氏丹溪治傷寒表證有用補中益氣湯發散海藏用神術湯九味羌活湯發散皆和解之意不使真氣散失也亮宸傷寒汗解正法然亦有治不對證或汗之不盡或汗之太過或不當汗而汗或當汗反下又人之經絡臟腑陰陽虛實不同遂有汗之不解當復汗者有汗後變熱當清者有汗後亡陽當溫救者有汗後元氣虛當補者有汗后里虛不和當補且和有汗後仍兼表裡者有汗後兼寒兼熱者有汗後邪在上焦當吐者有當汗妄下或結胸與痞挾熱利當清當溫當下者有傳入膀胱或成畜血有傳入三陰成實熱者有亡陽驚狂者有但汗成發黃者變證多端總緣太陽為諸陽之首四通八達之衢故傳變最多而仲景論甚悉非細心精別使藥病分銖相應未有不全人長命者矣辨發汗後證治第十七發汗多亡陽譫語者不可下與柴胡桂枝湯和其營衛以通津液後自愈胃為水穀之海津液之主發汗多亡津液胃中燥必發譫語此非實熱則不可下與柴胡桂枝湯和其營衛通行津液津液生則胃潤譫語自止觀子譫語多屬胃實宜下若汗多亡陽之後胃中虛亦譫語者此非下證比矣惟柴胡桂枝湯和其營衛陰陽則津液行而胃氣復譫語亦自除耳叔和此一卷第十七篇凡三十一證前有詳説辨不可吐第十八合四證已具太陽篇中互考太陽病自汗出不惡寒發熱不可吐少陽中風胃中滿而煩不可吐少陰膈上有寒飲乾嘔手足寒脈弦遲不可吐宇泰四肢厥逆虛家脈微新産皆不可吐辨可吐第十九大法春宜吐春時陽氣在上邪氣亦在上故宜吐千金三日以上氣浮上部填塞胸心故頭痛胸中滿當吐之則愈凡用吐藥中病即止不必盡劑也要在適當不欲過也病胸上諸實胸中鬱郁而痛不能食欲使人按之而反有涎唾下利日十餘行其脈反遲寸口脈微滑此可吐之吐之利則止胸上諸實或痰實或熱鬱或寒結胸中鬱而痛不能食欲使人按之反有涎唾者邪在下按之氣下而無涎唾此按之反有涎唾者知邪在胸中經曰下利脈遲而滑者內實也今下利日十餘行其脈反遲寸口脈微滑是上實也故可吐之玉函曰上盛不已吐而奪之宿食在上脘者當吐之宿食在中下脘者則宜下宿食在上脘者當吐內經曰其高者因而越之下者引而竭之要略此下有宜瓜蒂散四字病人手足厥冷脈乍結以客氣在胸中心下滿而煩欲食不能食者病在胸中當吐之此與厥陰篇瓜蒂散證同彼云脈乍緊此云脈乍結惟此有異緊為內實乍緊則實未深結為結實乍結則結未深是皆邪在胸中所以證治俱同也吳氏凡病在膈上者脈大胸滿多痰食在胸中脈滑者俱宜吐之華元化謂傷寒三四日邪在胸中宜吐之用瓜蒂散淡鹽湯或溫茶與之如人弱者以參蘆湯吐之亦可若痰多者以二陳湯一毆乘熱與之以探吐之凡老人怯弱與病勢內傷虛人並婦人胎前産後血虛脈弱小者皆不可吐凡藥發吐者如防風桔梗山梔只用一味煎湯溫服之則吐蓋誤吐則損上焦元氣為患非輕可不慎歟觀子傷寒不離三法汗之者以邪在營衛也下之者以邪入腑凝結也吐之者以邪止在胃上脘也蓋痰涎與寒邪但結於冒之上而未入胃故胸以上閉塞而不通其病既不在表不入里又不在半表裡非湧而越之曷去哉雖可吐之證甚少然法在必吐者今世亦罕能用之矣互考病如桂枝證頭不痛項不強寸微浮胸中痞硬氣上衝喉不得息宜吐之少陰飲食入口則吐復不能吐宜吐之辨不可下病脈證治第二十脈濡而弱弱反在關濡反在巔微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而反躁煩澀則無血厥而且寒陽微不可下下之則心下痞硬陽微下之陽氣以虛陰氣內甚故心下痞硬動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也動氣在右肺之動也下之傷胃動肺津液內竭咽燥鼻乾者邪屬金主燥也頭腦心悸者肺主氣而虛也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲蜷動氣在左肝之動也下之損脾而肝氣益騰復行於脾故脾內拘急食不下動氣更劇雖有身熱以裡氣不足臥則欲蜷動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在上心之動也下之傷胃內動心氣心為火主熱針經曰心所生病掌中熱肝為臟中之陰病則雖有身熱臥則欲蜷心為臟中之陽病則身上浮冷熱汗自泄欲得水自救皆作表裡寒熱二臟陰陽寒熱可見矣動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也動氣在下腎之動也下之傷脾腎氣則動腎寒乘脾故有腹滿頭眩下清穀心下痞之證也咽中閉塞不可下下之則上輕下重水漿不下臥則欲蜷身急痛下利日數十行咽中閉塞胃已不利也下之則閉塞之邪雖上輕復傷胃氣為下重至水漿不下蜷臥身痛下利日數十行知虛寒也諸外實者不可下下之則發微熱若亡脈厥者當臍渥熱外實者表熱也汗之則愈下之為逆下后里虛表熱內陷故發微熱厥深者熱亦深亡脈厥者陽氣深陷客於下焦故當臍握熱諸虛者不可下下之則大渴求水者欲愈惡水者劇玉函曰虛者十補勿一瀉之虛家下之為重虛內竭津液令大渴求水者陽氣未竭猶可愈惡水者陽氣已竭則難制脈濡而弱弱反在關濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得溫微弦為虛虛者不可下也虛家下之是為重虛難經曰實實虛虛損不足益有餘此中工所害也觀子此條與上條俱已見不可汗內乃復言不可下者陽陰俱虛非有實邪之當逐也微則為咳咳則吐涎下之則咳止而利因不休利不休則胃中如蟲齧粥入則出小便不利兩脅拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若冰眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前內經曰感於寒則受病微則為咳甚則為泄為痛肺感微寒為咳則脈亦微也下之氣下咳雖止而利因不休利不休則奪正氣而成危惡胸中如蟲齧粥入則吐小便不利兩脅拘急喘息為難者裡氣損也頸背相引臂不仁極寒反汗出身冷如冰者表氣損也表裡損極陰陽俱脫眼睛不慧語言不休難經曰脫陽者見鬼脫陰者目盲陰陽脫者應不能食而穀氣多入者此為除中是胃氣除去也口雖欲言舌不得前氣已衰脫不能運也健曰病咳吐涎感風所致當疏表而誤下之則邪陷入里咳雖止則利不休肺移熱於大腸也邪氣可以下移而風涎不能自化窒於胸中及於兩脅頸臂如齧拘急相引不仁諸經皆受病矣上之粥入則吐風涎惡濕也下之小便不利肺氣不化也脅背拘急涎痰凝滯氣道故喘息生而身體冷似極寒而反汗出者何也蓋傷風者自汗外雖不發熱而裡熱必甚欲解不能自解故晴不慧言不休乃邪郁上冒則目不了了似譫非譫而胃亦漬熱偏能多谷謂為除中實非除中之證欲言舌不得前者此涎痰滯遏其絡經脈不能上通故也以理論之總非絶證雖屬誤下其象似凶而猶假也成注謂陰陽俱脫而經文無必死之句未可偏信當以六君子合溫膽湯加生薑殭蠶薄荷南星扶元氣益脾胃清肺平肝化風涎調水道和陰陽諒亦可療也脈濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虛數為亡血浮為虛數為熱浮為虛自汗出而惡寒數為痛振寒而栗微弱在關胸下為急喘汗而不得呼吸呼吸之中痛在於脅振寒相搏形如瘧狀醫反下之故令脈數發熱狂走見鬼心下為痞小便淋瀝小腹甚硬小便則尿血也弱在關則陰氣內弱濡在巔則陽氣外弱浮為虛浮在上則衛不足故云陽虛陽虛不固故腠自汗惡寒數亦為虛數在下則營不及故云亡血血亡則不能溫潤邪傳裡也裡虛遇邪胸下為急喘而汗出脅下引痛振寒如瘧此里邪未入表邪未解醫反下之裡氣益虛邪熱內陷故脈數熱狂走見鬼心下為痞此虛陷於中焦者也若熱氣深邪客於下焦使小便淋瀝小腹甚硬小便尿血也脈濡而緊濡則胃氣微緊則營中寒陽微衛中風發熱而惡寒營緊胃氣冷微嘔心內煩醫為有大熱解肌而發汗亡陽虛煩躁心下苦痞堅表裡俱虛竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱應時罷栗栗而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清穀不容間嘔變反腸出顛倒不得安手足為微逆身冷而內煩遲欲從後救安可復追還胃冷營寒陽微中風發熱惡寒微嘔心煩醫不溫胃反為有熱解肌發汗則表虛亡陽煩躁心下痞堅先里不足發汗又虛其表表裡俱虛卒起頭眩客熱在表悵怏不眠醫不救里但責表熱汲水灌洗以卻熱客熱易罷裡寒益增栗而振寒復以重被覆之表虛遂汗愈使陽虛也巔頂也顛冒而體振寒小便難者亡陽也寒因水發下為清穀上為嘔吐外有厥逆內為煩躁顛倒不安雖欲拯救不可得也本草曰病熱已過命將難全觀子平脈一節如頌如銘讀此則又一篇五言古詩矣因知古人不獨意義深遠文章亦卓邁也漢魏之風於此可見衛濡營緊明屬外雖有熱內已寒冷醫反誤為大熱發汗以亡其陽是以表裡俱虛客熱雖在皮膚緊寒深於關元也及復汲水灌之去客熱有不寒證四起而可救療乎卿子除脈濡而緊四字為題自是一首漢人古詩為清涼解利之針孫思邈所謂傷寒於大毒諸寒藥誤者比比脈浮而大浮為氣實大為血虛血虛為無陰孤陽獨下陰部者小便當赤而難胞中當虛今反小便不利而大汗出法應衛家當微今反更實津液四射營竭血盡干煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虛客陽去有期必下如汙泥而死衛為陽營為陰衛氣強實營血虛弱陽乘陰虛下至陰部陰部下焦也陽為熱則消津液當小便赤而難今反小便不利而大汗出者陰氣內弱也經曰陰弱者汗自出是以衛家不微而反更實營竭血盡干煩而不眠血薄則肉消而成暴液者津液四射也醫復下之反虛其里是為重虛孤陽因下而脫氣血皆竭胃氣內盡必下如汙泥而死也脈數者久數不止止則邪結正氣不能復正氣卻結於臟故邪氣浮之與皮毛相得脈數者不可下下之則必煩利不止數為熱止則邪氣結於經絡之間正氣不能復行於表則邪結於臟邪氣獨浮於皮毛下之虛其里邪氣乘虛而入裡虛協熱必煩利不止脈浮大應發汗醫反下之此為大逆浮大屬表故不可下病欲吐者不可下嘔多雖有陽明證不可攻之為邪在胸中也觀子欲吐則邪猶在膈以上乃吐證非下證也太陽病外證未解不可下下之為逆表未解者雖有里證亦不可下當先解外為順若反下之則為逆也經曰本發汗而反下之此為逆也若先發汗治不為逆夫病陽多者熱下之則硬陽熱證多則津液少下之雖除熱復損津液必便難也或謂陽多者表熱也下之則心下硬元禮陽明下證已具其人喘嗽或微惡寒為太陽陽明或往來寒熱為少陽陽明於陽明證中而有太陽少陽證未罷此非正陽明也慎未可遽下所以古注陽明有三當須識此無陽陰強大便硬者下之則必清穀腹滿無陽者亡津液也陰強者寒多也大便硬則為陰結下之虛胃陰寒內甚必清穀腹滿傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背強加溫針則衄傷寒則無汗發熱頭痛微汗出者寒邪變熱欲傳裡也虐汗則亡陽增熱故不識人若熏之則火熱傷氣內消津液結為裡實故喘不得小便心腹滿若反下之則內虛津液邪欲入里外動經絡故短氣小便難頭痛背強若加溫針益陽則熱必動血而為衄也傷寒脈陰陽俱緊惡寒發熱則脈欲厥厥者脈初來大漸漸小更來漸漸大是其傍也如此者惡寒甚者翕翕汗出喉中痛熱多者目赤脈多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多者便清穀熱多者便膿血若熏之則發黃若尉之則咽燥若小便利者可救之小便難者為危殆脈陰陽俱緊則清邪中上濁邪中下太陽少陰俱感邪也惡寒者少陰發熱者太陽脈欲厥者表邪欲傳裡也惡寒甚者則變熱翕翕汗出喉中痛以少陰之脈循喉嚨也熱多者太陽多也目赤脈多則睛不慧以太陽之脈起於目故也發汗攻陽則少陰之熱因發而上行故咽中傷若復下之則太陽之邪因虛而內陷故兩目閉陰邪下行為寒多必便清穀陽邪下行為熱多必便膿血熏之則火熱甚身必發黃尉之則火熱輕必為咽燥小便利者為津液未竭猶可救之小便難者津液己竭則難可制而危殆矣傷寒發熱口中勃勃氣出頭痛目黃衄不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足溫者必下重便膿血頭痛目黃者若下之則兩目閉貪水者脈必厥其聲嚶咽喉塞若發汗則戰栗陰陽俱虛惡水者若下之則里冷不嗜食大便完穀出若發汗則口中傷舌上白胎煩躁脈數實不大便六七日後必便血若發汗則小便自利也傷寒發熱寒變熱也口中勃勃氣出熱客上膈也頭痛目黃血不可制熱蒸於上也千金曰無陽即厥無陰即嘔貪水者必嘔則陰虛也惡水者厥則陽虛也發熱口中勃勃氣出咽中已熱也若下之亡津液則咽中生瘡熱因裡虛而下若熱氣內結則手足必厥設手足溫者熱氣不結而下行作協熱利下重便膿血也頭痛目黃者下之熱氣內伏則目閉也貪水為陰虛下之又虛其里陽氣內陷故脈厥聲嚶咽喉閉塞陰虛發汗又虛其陽陰陽俱虛而戰栗也惡水為陽虛下之又虛胃氣虛寒內甚故里冷不嗜食大便完穀若發汗則上焦虛燥故口中傷爛舌上白胎而煩躁也經曰脈數不解令熱則消穀善飢至六七日不大便者此有瘀血故脈數實不大便熱畜血於內也七日之後邪氣漸解迫血下行必便血也便血發汗陰陽俱虛故小便利下利脈大者虛也以其強下之故也設脈浮革因爾腸鳴者屬當歸四逆湯主之脈大為虛未應下而下之利因不休也浮者按之不足也革者實大而長微弦也浮為虛革為寒虛寒相搏則腸鳴與當歸四逆湯補虛散寒活人云虛者十補勿一瀉之強實者瀉之虛實等者雖瀉勿大泄之此金匱語也吳氏凡有惡風寒者腹滿時減時滿者凡腹脹滿可揉可按虛軟者凡陰虛勞倦凡手足逆冷尺脈弱者凡脈在表俱不可下凡脈沉不實不疾按之無力者凡亡血家及婦人經水適來適斷或熱入血室與夫胎前産後崩漏等證及小便頻數小便清而大便祕者俱不可下辨可下病脈證治第二十一大法秋宜下秋時陽氣下行則邪亦在下故宜下凡服下藥用湯勝丸中病即止不必盡劑也湯之為言蕩也滌薄腸胃灌溉臟腑推陳逐結卻熱下寒破散邪疫潤澤枯稿悅人皮膚益人氣血水能淨萬物故勝丸散中病即止者如承氣湯證一服利止後服若一服譫語止更莫復服也互考十餘日熱結在裡復往來寒熱發熱汗出不解心下痞硬嘔吐下利無表裡證發熱七八日脈雖浮數可下之傷寒後脈沉以上俱大柴胡湯太陽未解但尺脈實發汗後不惡寒但惡熱發汗不解蒸蒸發熱陽明不吐不下心煩差後腹脹滿以上俱調胃承氣湯陽明汗多津液外出大便硬譫語下利譫語有燥屎以上俱小承氣二陽並病太陽證罷但潮熱不能食小便不利大便乍難乍易微熱喘冒不能除不大便五六日繞臍痛煩躁大下後六七日不大便煩不解腹滿痛以上俱大承氣六七日目睛不了了便難身疼熱陽明發熱汗出多發汗不解腹滿痛少陰二三日口燥咽乾少陰利清水色純青心下痛口乾燥少陰六七日腹脹不大便以上俱大承氣急下之成氏傷寒始發熱惡寒今汗後不惡寒但倍熱而燥始脈浮今洪實或沉數細始惺靜今狂語此為胃實陽盛再汗則死下之即愈亦有始得病便變陽盛之證須下之不可拘以日數更有心胸連臍腹大段注悶腹中疼坐臥不安喘悶急極者不必他證便下之若失下則氣血不通四肢便厥醫不知此疑是厥陰反進熱藥禍如反掌不可不察也三陰大約可溫然有積證者必下之如太陰腹滿時痛少陰口燥咽乾下利純清水腹滿不大便皆積證也下後慎不可服補藥熱氣得補覆成積更復下之是重困也宜消息安養之南陽里證須看熱氣淺深故仲景有直下之者如大小承氣十棗大柴胡類是也有微和其冒氣者如調胃承氣脾約少與小承氣微和之類是也仁齋大抵下藥須切脈沉實或沉滑沉數疾有力者可下再以手按之臍腹硬或叫痛不可按者則下之無疑也下後不解再按臍腹有無硬處如有手不可近必未盡也須再下之若下後腹中虛軟脈無力此為虛也以參胡三白和之若發潮熱寒熱往來不解者宜小柴胡增損和之若煩熱不得眠者宜竹葉石膏湯或十味溫膽湯健曰仁齋據脈按病之辨方是實地功夫然須更驗舌胎如干黃焦黑或醬色油緑俱為可下之證按舌法金鏡玩之虛實寒熱皆有徵驗南陽未滿三日可汗而已滿三日者可泄而已此大略言之耳凡病人有虛有實邪氣傳變遲速不同豈可拘以日數仲景云日數雖多但有表證而脈浮者猶宜發汗日數雖少若有里證而脈沉者即下之俱當隨脈治之況六氣之邪乘於經虛自背得之則入太陽或入少陰自面得之則入陽明之類不必皆始太陽也大抵傷寒為日雖多脈大浮數按之不足者當責太陽也可汗而愈按之實者汗之必死須下之而愈若脈沉細數外證腹滿咽乾或口燥舌乾渴者為正屬裡可下之愈也若無此證但發熱脈沉者誤下必死須麻黃附子甘草湯小發汗此皆仲景之確論也河間難經謂未滿三日可汗而已滿三日可泄而已仲景曰脈浮緊無汗身疼痛八九日不解表證仍在者當發其汗麻黃湯主之少陰病二三日口燥咽乾者大承氣湯急下之孰敢執於三四日分汗泄之定法哉是以辨傷寒者須得其大旨也復庵傷寒要緊處在分表裡而為汗下有病人自汗自下者有用藥汗之下之者中間節目頗多汗藥宜早下藥宜遲此其大綱耳且如失血家不可發汗淋家不可發汗如此等類豈宜遽用表劑當徐徐解散之苟或不當汗而強汗則津液耗竭變生百病因茲夭傷豈可概以汗藥宜早為説乎陽明汗出多宜急下少陰下利而渴宜急下厥陰舌卷囊縮宜急下如此等證俱當速用利藥下之苟或當下不下則熱毒轉深遂致失下而不可救療豈可一以下藥宜遲為説乎下利三部脈皆平按之心下硬者急下之宜大承氣湯下利者脈當微厥今反和者此為內實也下利三部脈平者已為實而又按之心下硬者則邪甚也故宜大承氣下之下利脈遲而滑者內實也利未欲止當下之宜大承氣湯經曰脈遲者食乾物得之要略曰滑則穀氣實下利脈遲而滑胃有宿食也脾冒傷不消水穀下利者為內實若溫中厚腸之藥利必不止可與大承氣湯下去宿食利自止矣宇泰脈沉而有力方可用此法若無力而外證無所據者恐虛寒不宜妄投大承氣問曰人病有宿食何以別之師曰寸口脈滑而大按之反澀尺中亦微而澀故知有宿食當下之宜大承氣湯寸以候外尺以候內浮以候表沉以候里寸口脈浮大者氣實血虛也按之反澀尺中亦微而澀者胃有宿食裡氣不和也與大承氣湯以下宿食三陽曰尺澀亦有血虛者須審外證食氣否及胸膈飽悶否方是下利不欲食者以有宿食故也當下之與大承氣湯傷食則惡食故不欲食如傷風惡風傷寒惡寒之類是也三陽曰亦有熱在胃口不能食者不宜下健按此二條當察舌有灰焦否胸胃拒按否如果食實在胸胃亦只應小陷胸化之使下非驟與承氣者也下利差後至其年月日復發者以病不盡故也當下之宜大承氣湯乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘秋則肺先受之假令春時受病氣必傷肝治之雖愈邪有不盡者至春時原受月日內外相感邪必復動而病也下利為腸胃病宿積不盡故當下去之下利脈反滑當有所去下之乃愈宜大承氣湯脈經曰脈滑者為宿食也下利脈滑則內有宿食故云當有所去與大承氣湯以下宿食病腹中滿痛者此為實也當下之宜大承氣湯要略病者腹滿按之不痛者為虛痛者為實可下之腹中滿痛裡氣壅實也故可下之觀子滿而且痛此大實之極而不通者故宜曰當下之傷寒後脈沉沉者內實也下解之宜大柴胡湯傷寒後為表已解脈沉為里未和與大柴胡湯以下內實經曰傷寒差以後更發熱脈沉實者以下解之脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可以下之宜大承氣湯要略曰脈雙弦者寒也經曰遲為在臟脈雙弦而遲者陰中伏陽也必心下硬大則為陽緊則為寒脈大而緊者陽中伏陰也與大承氣湯以分陰陽觀子以上並金匱要略中之雜病言也後人誤入傷寒論耳未敢隨文附會而別明之健曰脈雙弦而遲大而緊心下硬皆寒實在裡之象豈可以大承氣苦寒下之脈訣云單絃飲癖雙弦寒痼而況遲乎大為胃實緊為寒束蓋傷寒停食之勢明矣法當辛溫消散始合脈證莫謂傷寒論之不全即金匱之語亦復爾爾不知悟此據以治人不能無誤也刺灸凡治溫病可刺五十九穴五十九穴者以瀉諸經之溫熱也針經曰熱病取之諸陽五十九穴刺以瀉其熱而出其汗實其陰而補其不足所謂五十九刺兩手內外側各三凡十二痏五指間各一凡八痏足亦如是頭入髮際一寸旁三分各三凡六痏更入發三寸邊各五凡十痏耳前後口下各一項中一凡六痏巔上一囟會一髮際一廉泉一風池二天柱二又內經曰熱俞五十九頭上五行行五者以瀉諸陽之熱也大杼膺俞缺盆背俞此八者以瀉胞中之熱也氣衝三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁各五此十者以瀉五臟之熱也凡此五十九穴者皆取之左右也人身之穴三百六十有五其三十九穴灸之有害七十九穴刺之有災並中髓也穴有三百六十五以應一歲其灸刺之禁皆肉薄骨解之處血脈虛少之分針灸並中髓也仁齋針法近時少得其真不可輕用恐反貽誤惟灸法極虛寒者可行之互考太陽初服桂枝湯反煩不解刺風池風府卻與桂枝湯愈傷寒腹滿譫語脈浮緊肝乘脾曰縱刺期門發熱惡寒大渴腹滿自汗小便利肝乘肺曰橫刺期門陽明熱入血室但頭汗出刺期門太陽少陽並病頭項強痛眩冒心下痞硬刺大椎第一間肺俞肝俞發汗譫語不止刺期門婦人中風熱入血室刺期門少陰脈不至尸厥刺期門巨闕少陰便膿血可刺少陰一二日口中和背惡寒當灸之少陰吐利脈不至灸少陰七壯少陰下利嘔而吐出更衣反少當溫其上灸之傷寒脈促手足厥逆可灸痏音委附百臺狐惑陰陽毒篇載金匱要略今補入百合病者百脈一宗悉致其病也意欲食復不能食常默默欲臥不能臥欲行不能行飲食或有美時或有不用聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月微見者各隨證治之千金百合病者謂無經絡百脈一宗悉致病也皆因傷寒虛乏大病後未平復變成斯證其狀惡寒而嘔者病在上焦也二十三日當愈腹滿微喘大便堅三四日一大便時復小溏者病在中焦也六十三日當愈小便淋瀝難者病在下焦也三十三日當愈各隨其證以治之百合為病令人欲食復不能食或有美時或不用聞飲食臭或如有寒其實無寒如有熱其實無熱常默默欲臥復不得眠至朝口苦小便赤澀欲行復不能行諸藥不能治治之即劇吐利如有神靈所為也百合病身形如和其脈微數其候每溺時即頭覺痛者六十日愈溺時頭不痛淅然寒者四十日愈溺時覺快然但頭眩者二十日愈其人或未病而預見或已病四五日而出或一月二十日後見其候者治之勿誤也依證治之百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆其病難治千金百合病見在於陰而攻其陽則陰不得解也復發其汗為逆見在於陽而攻其陰則陽不能解也復下之其病不愈醫案一人得傷寒病經汗下後不愈延至月餘耳聾食藥入口即吐此誤劑已多脾胃受傷故食藥俱不納也證百合病乃以陳皮白朮百合乾薑煎飲一服即能食不吐漸增減服之而安健按此因傷寒後失調脾胃虛而氣血不復證似蜂起故名百合欲行懶行似寒似熱總合一虛字耳虛則內火空發故小便赤口苦頭眩服藥稍差反增其劇玩醫案以健脾開胃誠為大法然恐未盡其妙此當用歸脾湯加黃芩治之可愈何論其日數之多少哉百合病發汗後者百合知母湯主之千金已經發汗後更發病者百合病下之後者滑石代赭湯主之已經下後更發病者百合病吐之後者百合雞子湯主之已經吐後更發病者百合病不經吐下發汗病如初者百合地黃湯主之百合病一月不解變成渴者百合洗方主之百合病渴不差者栝蔞牡蠣散主之百合病變發熱一作寒熱者百合滑石散主之狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食嗅其面目乍赤乍黑乍白蝕於上部則聲嘎甘草瀉心湯主之蝕於下部則咽乾苦參湯洗之蝕於肛者雄黃熏之千金其毒在咽喉為惑病在陰肛為狐病狐惑之病並惡飲食不欲聞食嗅為面目翕赤翕黑翕白溫毒氣所為也脈經病人或從呼吸上蝕其咽或從下焦蝕其陰肛蝕上為惑蝕下為狐豬苓散主之叔微一婦人病狐惑聲嗄多眠目不閉惡聞食嗅不省人事者半月又手足拘強脈數微細先與竹瀝薑汁一盞服之忽胸有汗腹鳴即目閉省人事遂用參陳歸芍加竹瀝薑汁服之五六劑而愈謙甫常參議赴大都路感傷寒至真定不差兩手脈沉數外卻身涼厥逆發斑微紫唇及齒齦破裂咽乾聲啞默默欲眠目不閉鬱冒反側不安此證乃熱深厥深變成狐惑其勢甚急詢之自內邱感冒以百解散發汗每經郡邑治法多同遂至於此豫謂平昔膏粱積熱於內已燥津液又發汗太過津液重竭因轉屬陽明故大便難也與大承氣下之得更衣再以黃連解毒湯病減半復與黃連犀角湯而安健曰凡蟲蝕之證必從風濕化熱而致故脈多數急法以清熱殺蟲燥其脾胃則濕退病愈病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑一本作眥黃黑若能食者膿已成也赤小豆當歸散主之健曰此證無定名至膿已成而用赤小豆當歸散大約亦是狐惑所致一塊濕熱為病脾為濕困故欲臥汗出而煩且默茵陳四苓加黃連治之陽毒之為病面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治升麻鱉甲湯主之千金治傷寒一二日便成陽毒或服藥吐下之後變成陽毒身重腰痛煩悶不安狂言或走或見鬼或吐血下利其脈浮大數面赤斑斑仲景云云陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之千金治傷寒初病一二日便成陰毒或服藥六七日已上至十日變成陰毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細急數仲景云云時後千金俱用甘草湯即上方去雄黃余各方俱備載類證中
