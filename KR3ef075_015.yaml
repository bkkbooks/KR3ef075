body:
  text: 傷寒直指卷十三類證四汗吐下後去傷寒之邪不過汗吐下三法三法得當病勢易衰三法失宜病變危惡誠可慮也或邪氣未盡或熱邪傳裡或乘虛壅塞或正氣已乖先賢謂能知邪氣之虛實發汗吐下之不差溫清補針艾之適當則萬全之功其收必矣慎之哉發汗已解復煩脈浮數桂枝湯更發汗發汗後不可更行桂枝汗出而喘無大熱麻黃杏仁甘草石膏湯服桂枝湯大汗出脈洪大與桂枝湯如前法此與已解半日復煩脈浮數證同為表證猶在故當再表之若如瘧日再發汗出必解桂技二麻黃一湯服桂枝湯大汗出後大煩渴不解脈洪大白虎加人參湯發熱汗出不解心中痞硬嘔吐下利大柴胡湯太陽發汗不解蒸蒸發熱胃實也調胃承氣湯發汗後但惡熱者同煩熱汗出則解又如瘧狀日晡發熱陽明也脈浮虛桂枝湯脈實大承氣湯發汗後大汗出欲飲水少少與之令胃氣和則愈汗後脈浮小便不利微熱消渴五苓散汗解後胃中不和心下痞硬乾嘔食臭腹中雷鳴下利生薑瀉心湯發汗後腹脹滿厚朴生薑人參湯發汗後身疼痛脈沉遲桂枝芍藥生薑人參湯發汗後臍下悸欲作奔豚茯苓桂枝甘草大棗湯發汗漏不止惡風小便難四肢急難屈伸桂枝加附子湯發汗多亡陽譫語者不可下和營衛以通津液自愈柴胡桂枝湯發汗過多叉手冒心心下悸桂枝甘草湯發汗病不解反惡寒虛也芍藥甘草附子湯發汗不解仍發熱心悸頭眩身瞤動振振欲劈地真武湯汗家重發汗必先恍惚心亂小便已陰疼禹餘糧湯陽明發汗不解腹滿痛急下之大承氣湯太陰病脈浮可發汗桂枝湯大汗出熱不去內拘急四肢疼下利厥逆惡寒四逆湯大汗若大下利而厥冷四逆湯太陽外證未解不可下下之為逆桂枝湯太陽下後微喘表未解桂枝加厚朴杏仁湯下後脈促胸滿桂枝去芍藥湯若微惡寒去芍藥方中加附子湯不大便六七日頭痛有熱下之小便清仍在表也桂枝湯先發汗不解復下之不愈脈猶浮桂技湯太陽下後氣上衝桂枝湯下後汗出而喘無大熱麻黃杏仁甘草石膏湯桂枝證反下之利不止脈促喘而汗出表未解也葛根黃芩黃連湯外證未除數下之協熱利不止心下痞硬表裡未解桂枝人參湯下之胸滿煩驚小便不利譫語一身盡重不可反側柴胡加龍骨牡蠣湯傷寒誤下下利清穀不止身疼痛急救里四逆湯後身疼痛清便自調救表桂枝湯五六日大下後身熱不去心中結痛梔子豉湯下後心腹煩滿臥起不安梔子厚朴湯傷寒丸藥大下之身熱不去微煩梔子乾薑湯太陽過經十餘日二三下之後四五日嘔不止心下急鬱郁微煩大柴胡湯太陽表不解反下之膈內拒痛心中懊憹心下因硬短氣躁煩則為結胸大陷胸丸傷寒中風反下之其人下利心下痞硬滿乾嘔煩甘草盡心湯陽明下之不結胸外有熱懊憹頭汗出梔子豉湯下後若心中懊憹而煩胃中尚有燥屎也大承氣湯大下後六七日不大便煩不解腹滿痛有燥屎也大承氣湯五六日嘔而發熱柴胡證具而他藥下之柴胡證仍在雖下不為逆必蒸蒸發熱發汗而解六七日大下後寸脈沉遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止為難治麻黃升麻湯太陽先發汗不解而復下之脈浮者病猶在表當須解外桂枝湯發汗若下煩熱胸中窒梔子豉湯已發汗復下胸脅滿微結小便不利渴頭汗出往來寒熱心煩柴胡桂枝幹薑湯服桂枝湯或下之仍頭項強痛發熱無汗心下滿微痛小便不利屬飲家桂枝湯去桂加茯苓白木湯太陽重發汗復下不大便五六日舌上燥而渴日晡小潮熱從心下至少腹硬滿痛大陷胸湯發汗若下病仍不解煩躁茯苓四逆湯下後復汗晝日煩躁不眠夜安靜不嘔渴無表證脈沉微身無大熱乾薑附子湯下後復發汗必振寒脈微細內外俱虛也大下後復汗心下痞惡寒表未解也桂枝湯先解表大黃黃連瀉心湯攻痞發汗吐下後虛煩不得眠劇者反復顛倒心中懊憹梔子豉湯發汗吐下解後心下痞硬噫氣不除旋覆代赭石湯吐下後七八日不解熱結在裡表裡俱熱大渴躁煩白虎加人參湯吐下後不大便至十餘日日晡潮熱不惡寒獨語如見鬼劇者不識人循衣摸床微喘直視脈弦者生澀者死微者但發熱譫語大承氣湯吐下發汗後微煩小便數大便因硬小承氣湯太陽過經十餘日溫溫欲吐胸中痛大便反溏腹微滿微煩先曾極吐下者調胃承氣湯傷寒吐後腹脹滿調胃承氣湯若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身振振搖茯苓桂枝白朮甘草湯吐下後發汗虛煩脈甚微心下痞硬脅痛氣上衝咽喉眩冒經脈動惕久而成痿上湯或真武湯傷寒本寒下復吐下之寒格食入即吐乾薑黃連黃芩人參湯大吐大下之極虛復極汗出其人外氣怫鬱復與之水因得噦胃中寒冷也橘紅乾薑湯羌活附子散退陰散壞病壞病者太陽誤汗吐下後虛煩結胸痞氣內煩腹脹滿等證是也或不當汗而汗不當下而下或汗下過甚皆是也一為桂枝不中與一為柴胡證罷各隨所犯而治之太陽病已發汗吐下溫針仍不解者名壞病桂枝不中與也審其脈證知犯何逆隨證治之太陽病不解轉入少陽已發汗吐下溫針後譫語柴胡證罷此為壞病知犯何逆以法治之戴氏傷寒有壞病者緣太陽少陽病已發汗吐下仍不解是為壞病當依證而治又如病中復感異氣若重感於寒則先熱後寒而為溫瘧之類其證脈既變方治自不同及過經日久即留臟腑不已至此則經候傳變無復紀綱皆名壞傷寒俱當於活人書中考本病而治之念莪傷寒既久汗吐下後邪氣漸平正氣漸虛陽亡於外陰竭於內自當大補寧有生機蘇韜光云好參一兩作一服鼻梁上滑滑微汗是其候也未效當更與之古人治壞病欲效必以人參為主真良法也是齊云傷寒陰陽二證不明或投藥錯誤致病重困垂死服此於不失一勉學昔張子和治一傷寒壞病用獨參湯救一人垂死手足俱冷氣息將絶口張不能言以人參一兩附子一錢煎一盞新汲水浸冷一服而盡少頃病人汗從鼻上滑滑如水蓋鼻梁應脾位居中土能全萬物致津液者也故鼻端有汗者可救宇泰余治傷寒溫熱等證每為庸醫妄汗誤下已成壞病死在旦夕者以人參一二兩童子小便煎之浸冷飲之立起健按壞病者乃誤治醫壞之證非病之憊壞不治也故曰知犯何逆以法治之逆即誤也如應汗反下應下反汗病在表而治其里病在裡而治其表或應溫反涼應寒而反熱應瀉而反補應補而反攻瀉病久淹留有垂死之象皆為壞病豈特太陽少陽兩證而已然亦未必盡屬乎虛諸家用補之法不可拘執總宜審確病情來歷現在邪正虛實兼察色脈以療之竟有汗之不盡表邪內伏以致乍寒乍熱神智昏沉肢體不仁有似乎虛而實非虛也或以駸駸汗泄而解或復現斑疹而愈者不少又有下之未盡腸胃枯槁一二燥矢留存於屈曲之處潮熱譫語口燥舌焦飲食不思肌肉日削有似乎虛而實非虛也或沾滋潤而津回自解或投滑脫而氣化滯下邪去正復者恆多豫嘗遇而治之得起者數矣是知壞病無定狀治亦無定法識其所犯撥亂返正以救之愈證健曰愈者痊也解也瘥也安也寸口關上尺中三部脈大小浮沉遲數同等為陰陽和平雖劇當愈得病服湯藥後脈動數更遲浮大減小初躁後靜皆愈傷寒三日脈浮數而微身涼和解也六七日手足三部脈皆至大煩口噤不能言躁擾必解也脈和大煩目內際黃欲解也病若發汗若吐若下若亡津液陰陽自和者必自愈太陽病脈陰陽俱停必振栗汗出而解但陽脈微者汗出而解陰脈微者下之而解太陽病十日已去脈浮細嗜臥外已解也脈浮先煩欲自解也當汗出而解立夏得洪大脈是其本位時脈更汗濈濈自出明日便解他時仿此凡得病反能飲水欲愈也七日太陽病衰頭痛少愈八日陽明病衰身熱少歇九日少陽病衰耳聾微聞十日太陽病衰腹減如故思飲食十一日少陰病衰渴止舌於已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去精神慧爽傷寒三日少陽脈小欲愈太陰中風四肢煩疼脈陽微陰澀而長欲愈少陰中風脈陽微陰浮欲愈少陰脈緊自利脈暴微手足反溫脈緊反去雖煩欲解也少陰惡寒而蜷時自煩欲去衣被可治厥陰中風脈微浮欲愈不浮未愈厥陰病渴欲飲水少少與之愈下利微熱而渴脈弱者自愈下利脈微有微熱汗出自愈復緊未解太陽欲解從已至未陽明欲解從申至戌少陽欲解從寅至辰太陰欲解從亥至醜少陰欲解從子至寅厥陰欲解從醜至卯海藏太陽證知可解者頭不痛項不強肢節不疼知表已解也陽明證知可解者無發熱惡熱知表已解也太陽傳陽明其中或有下證陽明病反退而無熱與不渴卻顯少陽證知可解也少陽知可解者寒熱不移時而作邪未解若用柴胡而早移於晏晏移於早乃氣移於血血移於氣是邪無可容之地知可解也可解之脈浮而虛不解之脈浮而實浮而虛者只在表浮而實者已在裡也死證健曰死者人之終順受其正也若病至危篤而絶款畢具者雖神仙亦卻走矣發汗多重發汗亡其陽譫語脈短死結胸脈浮大者下之死結胸證悉具煩躁者死脅下素有痞連在臍旁痛引少腹入陰筋者死陽明心下硬滿攻之利不止死直視譫語喘滿者死下利亦死吐下不解不大便至十餘日日晡潮熱不惡寒獨語如見鬼狀發則不識人循衣摸床微喘直視脈澀者死少陰但厥無汗強發之血從口鼻或從目出名曰下厥上竭難治少陰惡寒蜷而利手足逆冷不治少陰四逆惡寒身蜷脈不至不煩而蜷死少陰吐利躁煩四逆死少陰下利止而頭眩時時冒死少陰脈微細沉但欲臥汗出不煩自欲吐五六日自利復煩躁不得寤寐死少陰六七日息高死少陰下利止厥逆無脈乾嘔煩服湯藥脈暴出死微細生六七日大下後寸脈沉遲手足厥逆下部脈不至咽喉不利唾膿血利不止難治脈微而厥七八日膚冷其人躁無暫安時為臟厥死傷寒脈遲為寒反與黃芩湯徹其熱當不能食反能食者為除中必死傷寒發熱下利厥逆蜷不得臥死傷寒發熱下利至甚厥不止死傷寒六七日不下利後發熱而利汗出不止死傷寒下利日十餘行脈反實者死發熱而厥七日反下利難治五六日不結胸腹濡脈實復厥為亡血下之死傷寒脈微手足厥冷煩躁灸厥陰灸不還死下利手足厥冷無脈灸之不溫脈不還反微喘死下利後脈絶手足厥冷晬時脈還手足溫生脈不還死嘔而脈弱小便利身微熱見厥難治濕家下之額上汗出微喘小便利死下利不止亦死脈浮而洪身汗如油喘而不休水漿不下體形不仁乍靜乍亂者死若汗出發潤喘不休者肺絶陽反獨留形如煙燻直視搖頭者心絶唇吻反青四肢漿習者肝絶環口黧黑柔汗發黃者脾絶溲便遺失狂言目反直視者腎絶脈陰陽俱盛大汗出不解者死脈陰陽俱虛熱不止者死脈至乍疏乍數者死脈至如轉索者死譫言妄語身微熱脈浮大手足溫者生逆冷脈沉細不過一日死脈四損三日死平人四息病人脈一至也脈五損一日死平人五息病人脈一至也脈六損一時死平人六息病人脈一至也傷寒咳逆上氣脈散者死浮滑之脈數疾發熱汗出者不治寸脈下不至關為陽絶尺脈上不至關為陰絶皆不治二月得毛浮脈金來剋木至秋當死所謂見鬼賊之脈十死不治也余時仿此赤斑五死一生黑斑十死一生女勞復者死六七日大汗出不止如貫珠者死傷寒八日以上大發熱者死脈經診傷寒熱盛脈浮大者生沉小者死傷寒已得汗脈沉小者生浮大者死熱病未得汗脈盛躁疾得汗者生不得汗者難差熱病已得汗脈靜安者生躁者難治熱病已得汗嘗大熱不去者亦死熱病已得汗熱未去脈微躁者慎不得刺治熱病發熱熱甚者其脈陰陽皆竭慎勿刺不汗出必下利熱病已得汗而脈尚躁厥此陽脈之極也死其得汗而脈靜者生也熱病脈尚躁盛而不得汗者此陽脈之極也死脈躁盛得汗者生也熱病陰陽交者死太陽病汗出脈反躁盛者是陰陽交死復得汗脈靜者生熱病陰陽交者熱煩身躁太陰寸口兩衝脈尚躁盛是陰陽交死得汗脈靜者生熱病陽進陰退頭獨汗出死陰進陽退腰以下至足獨汗出亦死陰陽俱進汗出已熱如故亦死陰陽俱退汗出已寒栗不止鼻口氣冷亦死熱病所謂陽附陰者腰以下至足熱腰以上寒陰氣下爭還心腹滿者死所謂陰附陽者腰以上至頭熱腰以下寒陽氣上爭還得汗者生熱病已得汗而脈尚躁喘且復熱勿刺膚喘甚者死熱病不知所痛不能自收口乾陽熱甚陰頗有寒者熱在髓死不治熱病在腎令人渴口乾舌焦黃赤晝夜欲飲不止腹脹而大尚不厭飲目無精光死不治熱病七八日脈不軟不散一作不喘不數者嘗瘖瘖後三日溫汗不出者死熱病七八日其脈微細小便不利加暴口燥脈代舌焦乾黑者死熱病七八日脈微小病者溲血口中乾一日半而死脈代者一日死熱病七八日脈不躁喘不數後三日中有汗三日不汗四日死未曾汗勿膚一作庸刺熱病身面盡黃而腫心熱口乾舌卷焦黃黑身麻臭伏毒傷肺中脾者死熱病瘛瘲狂言不得汗瘛瘲不止伏毒傷肝中膽者死熱病汗不出出不至足嘔膽嘔苦也吐血善驚不得臥伏毒在肝腑足少陽者死熱病脈四至三日死脈四至者平人一至病人四至也可見急疾之至矣脈五至一日死此與損脈正相反對脈六至半日死時一大至半日死忽忽悶亂者死忽急疾大至有頃死若絶不至或久乃至立死十逆死證熱病腹滿瞑脹身熱不得大小便脈澀小疾一逆見死熱病腸鳴腹滿四肢清泄注脈浮大而洪不已二逆見死熱病大衄不止腹中痛喘而短氣脈浮大絶三逆見死熱病嘔且便血奪形肉身熱甚脈絶重疾四逆見死熱病咳喘悸眩身熱脈小疾奪形肉五逆見死熱病腹大而脹四肢清奪形肉短氣六逆見一旬內死熱病腹脹便血脈大時時小絶汗出而喘口乾舌焦視不見人七逆見一旬死熱病身熱甚脈轉小咳而便血目眶陷妄言手循衣縫口乾躁擾不得臥八逆見一時死熱病瘛瘲狂走不能食腹滿胸痛引腰臍背嘔血九逆見一時死熱病嘔血喘咳煩滿身黃其腹鼓脹泄不止脈絶十逆見一時死五臟絶熱病肺氣絶喘逆咳唾血手足腹腫面黃振栗不能言語死魄與皮毛俱去故脈先死丙日篤丁日死熱病脾氣絶頭痛嘔宿汁不得食嘔逆吐血水漿不得入狂言譫語腹大滿四肢不收意不樂死脈與肉氣俱去故脾先死甲日篤乙日死熱病心主氣絶煩滿骨痛嗌腫不可咽欲咳不能咳歌哭而笑死神與營脈俱去故心先死壬日篤癸日死熱病肝氣絶僵仆足不安地嘔血恐懼灑淅惡寒血妄出遺屎溺死魂與筋血俱去故肝先死庚日篤辛日死熱病腎氣絶喘悸吐逆腫疽尻癱目視不明骨痛短氣喘滿汗出如珠死精與骨髓俱去故腎先死戊日篤己日死上俱叔和集仲景平脈論靈樞熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰瘛瘲齒噤齘者死溫病冬傷於寒病不即發寒毒藏於肌膚至春而病曰溫病又傷寒汗下不愈過經而其證尚在亦曰溫病治溫不宜發汗蓋過時而發不在表也已經汗下不在表也經曰不惡寒而反渴者溫病則其熱自內達外無表證明矣汪氏曰有不因冬傷寒但只於春時感溫暖之氣而病外感亦曰溫病宇泰內經曰冬傷於寒春必病溫東垣曰冬傷於寒者冬行秋令也當寒而溫火勝而水虧矣水既已虧則所勝妄行土有餘也所生受病金不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病所以不病於冬而病於春者以其寒水居卯之分方得其權大寒之令復行於春腠理開泄少陰不藏房室勞傷辛苦之人陽氣泄於外腎水虧於內當春之月木當發生陽已外泄孰為鼓舞腎水內竭孰為滋養此兩者同為生化之源源既已絶木何賴以生乎身之所存者熱也時強木長故為溫病論曰太陽病發熱而渴不惡寒者為溫病釋曰太陽病者脈浮頭項痛而腰脊強也傷於寒者當惡寒若不惡寒而渴者轉屬陽明則表邪已罷傳於裡矣今不惡寒則非傷寒證似陽明而與太陽兼見則非傷寒之陽明也故決其為溫病啓蒙冬傷於寒不即病者寒毒藏於肌膚至春變為溫病由身中陽氣為冬時伏藏之寒所郁不得順其行運變為邪熱而發於春令則為溫病也然亦始太陽者何也邪熱自內達外反郁其腠理不得外泄乃見表證也但無寒在表故不惡寒熱自內出已傷津液鮮有不渴故太陽篇曰太陽病發熱而渴不惡寒者為溫病夫熱自內出表邪雖見而熱氣在內其脈浮數斯時也法當治里為主解表兼之用辛涼以解表邪苦寒以除濕熱羌活沖和湯加知母石膏若仲景桂枝麻黃必不可用也表邪不解必復還里其分六經亦若傷寒如傳陽明脈必尺寸俱長而大發熱無汗者清熱解肌湯升麻葛根湯渴者白虎加人參湯少陽脈必弦數或往來寒熱或心煩喜嘔諸半表半裡證小柴胡加減如漸傳裡與傷寒治法同惟發表與傷寒不同也陶氏溫病者發於春三月夏至前是也發熱咳嗽頭疼身痛口燥渴脈浮弦熱甚者小柴胡湯微熱者升麻葛根湯解肌湯微熱不渴小柴胡加桂枝湯去半夏加五味子栝蔞人參脈實煩渴大柴胡微利之虛煩者竹葉石膏湯然不若用羌活湯解之穩當活人春月傷寒謂之溫病由冬傷於寒輕者夏至前發為溫病蓋因春溫暖之氣而發也又非溫疫也治溫病與冬月傷寒夏日熱病不同蓋熱輕故也春初秋末陽氣在裡其病稍輕治直升麻湯解肌湯柴胡桂枝湯熱多者小柴胡湯不渴外有微熱小柴胡加桂枝嗽者小柴胡加五味子或煩渴發熱不惡寒者並竹葉石膏湯次第服之麻黃桂枝大青龍惟西北二方四時行之若江淮間地偏暖處惟冬月及春初乃可用正方他時非加減不可也損庵按活人所云溫病有二其用升麻解肌等者乃正傷寒太陽證惡寒而不渴者以其發於溫暖之時故謂之溫病其用竹葉石膏湯者乃仲景所謂渴不惡寒之溫病也要須細別勿令誤也然不惡寒而渴之溫病四時皆有之不獨春時而已仁齊天道和暖有人壯熱口渴而不惡寒者乃溫病也難經言溫病之脈散在諸經各隨其經而取之如尺寸俱浮數者發於太陽也宜人參羌活散加葛根蔥白生薑紫蘇以汗之或自汗者九味羌活湯增損之脈尺寸俱長者發於陽明也葛根解肌湯或十味芍蘇飲汗之尺寸俱弦數者發於少陽也十味芎蘇飲或小柴胡加減之若無太陽者羌活散加黃芩兼陽明者加葛根升麻類大法治溫病發表不與傷寒同者此病因春時溫氣而發非寒初傷於表也其怫鬱之熱自內而發於外故宜辛平之劑發散之況時令和暖亦非麻黃湯所宜也如天道尚寒少佐麻黃亦可要在隨時審察不可執一也凡溫病發於三陽者多發於三陰者少若發於陰必有他故或飲寒食冷內傷太陰而得之或先因房欲傷於少陰而得之凡治例俱與傷寒傳變同惟發表不與傷寒同也蓋溫病壯熱脈浮大有力者可治若沉澀細小者難治所以溫病大熱穰穰脈小足冷者死矣觀子溫病之名雖一致病之由有三昔人言之詳矣其間再為區別復有寒熱之殊如曰寒毒藏於肌膚至春而病曰伏寒所變皆以寒因言也如曰冬行秋令當寒反熱感而為濕曰冬不傷寒亦不傷熱但感春時溫暖之氣而病溫曰感於四時溫熱之氣亦為溫病皆以熱因言也然致病之由雖不同及其初病之日則無二過時而病者寒鬱既已化熱感於非時者則四時無非溫氣所以證狀相似病名不殊一從熱邪以治之而不可復同即病之傷寒論矣脈經溫病穰穰大熱其脈細小者死穰穰千金作時行健曰此即是陽證陰脈溫病三四日以下不得汗脈大疾者生脈細小難得者死溫病汗不出出不至足者死厥逆汗出脈堅強急者生虛緩者死溫病二三日身體熱腹滿頭痛食飲如故脈直而疾者八日死四五日頭痛腹痛而吐脈來細強十二日死八九日頭不疼身不痛目不赤色不變而反利脈來牒牒按之不彈手時大心下堅十七日死溫病下利腹中痛甚者死溫病已汗出而復熱脈躁疾不為汗衰狂言不能食名曰陰陽交死人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝精勝則當能食而不復熱熱者邪氣也汗者精氣也汗出復熱邪勝也不能食者精無俾也汗出而熱留者壽可立而傾也汗出脈尚躁盛者脈不與汗相應不勝其病也狂言失志者死有三死不見一生雖愈必死矣難經溫病之脈行在諸經不知何經之動也各隨其經所主而取之人一呼脈三動一吸脈三動而躁尺熱者曰病溫尺膚熱甚脈盛躁者病溫健曰尺膚乃尺脈後之膚也此處熱則通身皆熱熱病亦曰暑病冬傷於寒不即病至春亦不病鬱而至夏始發者曰暑病經曰暑病者熱極重於溫也為夏火當權而言故曰暑病內經曰先夏至曰為溫病後夏至日為暑病暑病即熱病是也啓蒙暑病雖熱極重於溫然其原既與溫病不殊治法亦與溫病相類矣素問熱論篇曰暑當與汗皆出勿止謂暑病既見於表證則當解表而令其熱邪與汗皆出勿反止之馬玄臺注此為感暑非也凡溫暑始見之時邪熱自內達表表證少而里證多者誠有如溯洄集所云法當治裡熱兼解表宜防風通聖散涼膈散之類夫溯洄集謂傷寒論之方法專為即病之傷寒設不兼為過時之溫暑設誠足破千古之惑宇泰冬傷於寒至夏而變為熱病者此則過時而發自內達表之病俗謂之晚發也雖病於夏名曰暑病與中暑中暍中熱暴病者不同凡新中暑病脈虛晚發熱病脈盛傷寒雖發熱惡寒初病未至於煩渴惟暑病則不然一病即渴且脈亦不同所以與傷寒異也陶氏夏月熱病頭疼發熱身體痛不惡寒而惡熱其脈洪藥不可溫宜羌活湯加石膏知母三月至夏謂之晚發梔子升麻湯有少陽證小柴胡湯若有惡風惡寒證類傷寒者乃當時暴中風寒之證非冬時所受也通用羌活湯治之活人夏月發熱惡寒頭痛身體肢節重痛其脈洪盛者熱病也冬傷於寒因暑氣而發為熱病治與傷寒不同夏月藥性須帶涼不可太溫桂枝麻黃大青龍須用加減夏至前加黃芩半兩夏至後加知母一兩石膏二兩或升麻半兩蓋桂枝麻黃性熱又暖處非西北之比夏月服之必有發黃斑出之失熱病三日外與前湯不瘥脈勢仍數邪氣猶在經絡未入臟腑桂枝石膏湯主之若三月至夏為晚發傷寒梔子升麻湯選用仁齊夏至以後時令炎暑人有壯熱煩渴而不惡寒者乃熱病也脈浮洪者發於太陽也洪而長者陽明也弦而數者少陽也此發在三陽為可治若脈沉細微小足冷者發在三陰為難治也大法熱病身大熱須脈洪大有力或滑數有力乃脈證相應可治若弱小無力難治人虛脈弱者且以人參湯與之扶其元氣不可便攻其熱如脈洪身疼壯熱無汗煩亂者六神通解散發汗則愈人參羌活散加葛根淡豆豉生薑亦可輕者只十味芎蘇散汗之亦佳如夾暑加香薷雙解之兼內傷生冷飲食停滯或嘔吐噁心中脘痞悶或惡風憎寒拘急宜藿香正氣散加香薷葛根以發汗名二香湯若發散熱不解者在太陽經人參羌活散加黃芩陽明經升麻葛根湯加黃芩熱甚燥渴脈大者白虎湯加人參少陽經小柴胡湯隨證增損夾暑加黃連香薷熱而大便自利小便不利煩渴五苓散去桂加葛根黃連香薷滑石類若表裡俱熱自利脈浮數小便不利小柴胡合四苓散不解或傳經變證或裡實可下或陰寒可溫或斑黃等證皆從正傷寒條例治之凡熱病一二日泄利腹滿熱甚者死三四日目昏譫語熱甚脈小者死四五日脈小足冷者死五六日汗不出譫語昏沉脈急促者死六七日舌本焦黑燥者死七八日衄吐血躁熱脈大者死九日發痙搐搦昏亂者死熱病脈促結代沉小者皆難治宇泰傷寒即發於天令寒冷之時寒邪在表閉其腠理故非辛甘溫之劑不足以散之此仲景桂枝麻黃等湯之必用也溫病熱病後發於天令暄熱之時怫然自內而達於外郁其腠理無寒在表故非辛涼或苦寒酸苦不足以解之風溫傷寒陽脈浮滑陰脈濡弱更遇於風變為風溫此前熱未已更感異氣而變者也又太陽病發汗已身猶灼熱者亦曰風溫活人風溫者脈尺寸俱浮頭疼身熱常自汗出體重其息必喘四肢不收默默但欲眠治在少陰厥陰不可發汗發汗即譫語獨語內煩躁不得臥若驚癇目亂無精宜萎蕤湯身灼熱者知母葛根湯渴甚者栝蔞根湯脈沉身重汗出者漢防己湯叔微大抵溫氣大行更感風邪則有是證每於春夏病此者多醫作傷寒漏風治之不知不可火不可下不可大發汗而仲景無方藥古法謂當取手少陰足厥陰隨經所在而取之如麻黃薏苡湯萎蕤湯輩豫以為敗毒獨活續命減麻黃去附子益佳風溫誤汗防己黃耆湯救之啓蒙風溫者傷寒之熱未已更遇於風變為風溫由風來乘熱治宜辛涼疏風解熱為主按太陽篇曰若發汗已身灼熱者曰風溫此則脈陰陽俱浮自汗多眠睡息鼾語言難出此非冬傷於寒復感異氣而成之證也乃冬傷於寒至春病溫太陽證兼有風邪者也風與溫相合而傷衛邪氣外盛故有是證宜辛涼疏解不可汗下火熏誤治則死冬溫健曰冬應寒而反溫人感不正之氣而病者謂之冬溫丹溪冬溫為病此非其時而有其氣者冬時嚴寒君子固密閉藏而反發泄於外得之脈必左手浮大右手浮緩而盛按之無力宜補藥帶表藥啓蒙冬溫者冬感溫氣而成時行為病之一也傷寒例曰其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異蓋溫則氣泄寒則氣收二氣本相反也丹溪治用補藥帶表如補中益氣之類愚謂冬溫為病亦自不一當隨時制宜活人冬應寒而反大溫折之責邪在腎宜萎蕤湯仲景云冬溫之毒與傷寒大異蓋傷寒者傷寒氣而作冬溫者感溫氣而作寒疫者暴寒折人而作其治法不同寒熱溫涼亦異不可拘以日數發汗吐下隨證而施以平為期不可以過此為大法溫毒健曰此病溫之際更感溫熱異氣名為溫毒活人初春發斑咳嗽為溫毒仁齊經曰冬有非節之暖曰冬溫蓋此即時行之氣也若發斑者又曰溫毒亦為時氣發斑也又傷寒壞病陽脈洪數陰脈實大更遇溫熱變為溫毒者其病最重也蓋因前熱多日不解更感溫熱之氣而為病故曰重也若無汗者三黃石膏湯汗之自汗者人參白虎湯煩熱錯語不眠睡者白虎合黃連解毒湯表熱又盛者更加柴胡內實大便不通者三黃盡心湯下之或大柴胡加芒硝若斑出如錦紋者多難治宜人參化斑元參升麻湯黑膏大青四物湯選用汪氏溫與熱有輕重之分故仲景云若遇溫氣則為溫病更遇溫熱則為溫毒熱比溫為尤重也但冬傷於寒至春而發不感異氣名曰溫病此病之稍輕者溫病未已更遇溫氣變為溫毒亦曰溫病此病之稍重者也傷寒例以再遇異氣名曰溫疫又有不曾冬月傷寒至春而病溫者此特感春溫之氣不名曰春溫猶如冬之傷寒夏之中暑秋之傷濕也以此觀之是春之病溫有三種焉有冬傷於寒至春發為溫病者有溫病未已更遇溫氣則為溫毒與重感溫氣相雜而為溫病者又不因冬傷於寒不因更感溫氣只感春溫之氣而病者若此三者皆可名為溫病不必更名矣但要知其病源之不同耳啓蒙論例曰陽脈濡弱陰脈弦緊更遇異氣變為溫病此傷寒之熱未已更遇溫氣而變斯證由溫熱相合而成治宜寒涼解熱為主較之溫毒稍輕蓋再感溫熱而變溫毒再感溫氣而變溫疫不過微甚之分溫氣比溫熱為輕也然以溫氣而加於傷寒成熱之體後人不察既指為時行溫疫非矣經不云到冬傷於寒發為溫病乎故列於更感異氣變為他病之後非時疫比也溫瘧健曰此值病溫之候復感異氣寒熱交作名曰溫瘧其病寒少熱多陽明為甚亦時行之氣也仁齊凡傷寒壞病前熱未除其脈陰陽俱盛重感寒邪變為溫瘧寒熱往來口苦胸脅滿者小柴胡加芍藥少加桂枝主之若熱多倍柴胡寒多倍桂枝熱甚而煩渴人參白虎湯有寒者必少加薄桂單熱者不用如熱多小柴胡合白虎痰多而熱小柴胡合二陳食少胃弱加白朮心下痞加黃連枳實脈虛者加入參口渴去半夏加栝蔞根邪熱蘊結於裡者大便必實脈滑大有力大柴胡下之若變瘧已正於雜病中求之啓蒙此前熱未已再感於寒變為溫瘧是由寒熱相摶而成治當散寒解熱為主其狀先熱後寒以其先有熱而復感寒也作止有時小柴胡加減之熱甚者小柴胡合白虎柴胡葛根之類散其寒石膏知母之類解其熱仲景曰脈陰陽俱盛者蓋指熱時而言也若一熱一寒則當隨時而變矣熱則弦數而盛寒則弦遲而弱若單熱無寒則陰陽俱盛也觀子按傷寒例曰若更感異氣變為他證者當依後壞病治之以兩邪相合病既變則治亦當變也故溫瘧風溫之類不可復以傷寒六經方混治素問注證改風溫溫瘧諸溫字作瘟謂時行疫癘使然噫謬矣健曰經論以溫瘧類由更感異氣而成是為傷寒壞病啓蒙謂其不可復以傷寒六經諸方混治合古所謂溫疫之發不同傷寒而可大汗大下也只宜治少陽陽明二經其說至當至謂不可以溫作瘟而非時行厲氣之比斯言未盡然也如乾隆巳已盛夏吳中風雨連旬暴寒伏其溫暑遂致疫證大行十病七八寒熱如瘧實時行異氣所感病在少陽陽明若照活人書而投柴胡桂枝法者三五日間多昏迷口噤而劇必須升麻柴胡合葛根石膏豆豉解肌清熱則斑發汗泄而解或以荊防辛溫發汗者即狂亂而死或以連梔苦寒涼瀉者斑凝汗閉亦死惟小柴胡出入和解之庶可保全然亦有成結胸畜血發黃變痢者證皆相似斯非溫瘧之尤而屬瘟者歟凡瘧由於夏月傷署感寒伏食所致亦有未交暑令及春冬寒熱似瘧者此四時感染所成雖從雜證論治其間亦不可必其無溫瘧來因也然則所感異氣諸證不得與傷寒法同例治也濕溫先傷於濕後傷於暑或先受暑後受溫或病熱未已復感濕淫皆曰濕溫其證一身盡痛不能轉側或微自汗四肢沉重活人濕溫者其人當傷於濕又中於暑濕熱相搏則發濕溫病兩脛逆冷胸腹滿頭目痛苦妄言多汗其脈陽濡而弱陰小而急治在太陰屬土主濕也宜茯苓白朮湯白虎加蒼朮湯慎勿發汗汗之名重暍必死又曰發汗必不能言耳聾不知痛所在身青面色變嗣真活人云嘗傷於濕因而中暑濕熱傳則發濕溫許學士云先受暑後受濕雖所言感受先後不同其證治則一也又論脈曰陽濡而弱陰小而急許學士以關前為陽關後為陰紀氏則以浮為陽沉為陰雖所言部位不同其脈狀則一也要之二說皆不可偏廢而於用藥則白虎加蒼朮為至當但活人前兼言朮附湯此但言白虎何耶龐氏云庸醫昧於冷熱之脈但見足脛冷多行四逆輩如此死者醫殺之耳夫濕溫脈小緊有類傷寒脈但證候有異數進白虎則脛自溫而瘥活人之言豈以朮附與四逆藥性相類惡犯龐氏之戒而此不載與設若濕氣勝臟腑虛大便滑朮附其可廢乎啓蒙病機曰此傷寒之熱未已立夏後立秋前處暑之時濕淫方盛更感其氣濕來乘熱變為濕溫身多微涼或微自汗四肢沉重為濕熱內作又謂之濕淫多不欲飲水宜蒼朮白虎湯如身熱脈洪無汗多渴是熱在上焦積於胃中也桔梗散如大便祕結加大黃微利之海藏濕溫汗少者白虎加蒼朮汗多者白虎加桂枝時疫此時行疫癘也衆人病相同轉相傳染者按說文民皆疾為疫從疒加役今省文作受癘礪也疫氣流行中人如磨礪之傷物也疫者役也有鬼彡行役所為也癘者災厲也周禮季冬大儺旁磔以穰厲鬼之氣懼其害之大也後人有溫疫時氣天行大頭蝦蟆疙瘩之名而俗通謂之瘟疫蓋訛溫為瘟也或曰疫者天之氣癘者地之氣司天之氣變則為疫司地之氣變則為癘彡音衫仁齊時氣者乃天疫暴厲之氣流行凡四時之令不正乃有此氣行也若人感之則長幼相同而病及能傳染於人者也其作雖與傷寒相似然傷寒因寒而得此則得於疫氣不可與傷寒同論也治法當闢散疫氣扶持正氣為主若多日不解邪熱傳變當從傷寒變證條目詳而用之惟發散之藥則不同也凡發散湯劑宜藿香正氣散十神湯人參敗毒散十味芍蘇飲類可選而用之活人若春應暖而清氣折之當責邪在於肝夏應暑而寒氣折之則責邪在於心秋應涼而反大熱抑之則責邪在於肺冬應寒而反大溫抑之則責邪在於腎冷氏衆人病一般乃天行時疫也悉由運氣鬱發遷正退位之所致也如冬應寒而反溫春發溫疫敗毒散主之春應溫而清涼夏發燥疫大柴胡湯主之夏應熱而反寒秋髮寒疫五積散主之秋應涼而反淫雨冬發濕疫五苓散主之凡此疫病切不可作傷寒證治而大汗大下也但當從乎中治而用少陽陽明二經之藥少陽小柴胡湯陽明升麻葛根湯又曰看所中陰陽以上二方加減治之或人參敗毒散主之治四時疫氣通用羌活沖和湯初感一二日間服之取汗其效最速蘭谷瘟疫者渾身壯熱昏昏不爽遞相傳染盛於春夏間也雖因時氣而得然所觸者惡毒異氣非如春應暖而反寒夏應熱而反涼之類也蓋天地之氣升於春浮於夏不無有惡毒者在焉人在是氣之中莫之知也正氣虛者感而受之邪從口鼻而入由是正被邪侵怫鬱煩擾行運失常壯熱作矣雖由感受外邪而其熱自內出熱達於表表證見焉及其熱鬱腠理不能外泄復還人里里證見焉大勢與春溫夏暑病相似所以獨相傳染者因天地之異氣而病氣亦異故也病氣蒸越於外正氣虛者從而感之其傳染莫能自遏也感天地之邪者在春夏間感病人之邪者無分四時也是以獄中每多此病以其病氣團聚易於傳染也饑饉之歲中虛者衆傳染流行雖秋冬不休者因勢而致也其富貴之人亦有病此者必正氣少充耳故素問曰不相染者正氣存內邪不能幹也其感受之因異於傷寒溫暑異於非時感冒則治法亦不容不異也丹溪人中黃丸補散降三法並施明醫雜著清熱解毒湯內外兼治斯二者乃治瘟疫之大法所以用人參者以其本於中氣不足而補之防邪之人里也蘊要曰當闢散疫氣扶持正氣理勢然也然瘟疫之補亦自其初發而言若多日不解壞證見而里證具者則當隨證為可否以傷寒法治之也丹溪瘟疫衆人一般病者是也又謂之天行時疫治有三法宜補宜散宜降人中黃丸為主分氣血與痰作湯使氣虛四君子湯下血虛四物湯下痰多二陳湯下熱甚童便下當推歲運及三因治法可用叔微疫病當分天時寒暖燥濕病者虛實勞逸因時制宜不可拘執如久旱多燥熱疫流行忌用燥劑宜解毒潤燥天久淫雨濕令大行脾土受傷民多寒疫必兼瀉利忌用潤劑宜滲濕理脾饑荒之歲多疫乃因水旱氣候失和偏寒偏燥飲食失節以身之虛逢天之疫而病作歲在萬曆壬午久旱民飢熱疫流行起於寒熱拘攣變斑黃狂躁死者相繼大都渴燥發斑者多右氣口脈多大皆飢飽不時所致先用人參敗毒散發表次用人參柴胡湯和解右脈太於左自汗無表裡證見者補中益氣湯活者甚衆皆因中氣先曾飢餒受傷已屬內虛之證若不明此而大汗大下寧不殺人五法人與天地本同一體天地之氣變則人身之氣亦變故一方老幼大率受之無遺者曰疫證也內經曰蒼天之氣不得無常反常則災害至矣治法必先觀歲氣之盛衰與客氣之勝復如此則不伐天和矣全生正傷寒須依傷寒法看脈用藥無有不應若瘟疫時證不須論脈但無怪脈即不妨也切不可大發汗此病一七或二七三七自然汗出身涼而愈只須小柴胡治之熱甚者合解毒湯扶之使正而已蓋發汗汗雖出而熱不退益增其虛矣故戒之丹溪大頭天行乃濕氣在高巔之上宜羌活黃芩酒大黃等隨證加減切勿用降藥泰和二年東垣監濟源稅時四月民多疫癘初覺憎寒體重次傳面目腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問如染之多不能救張縣丞侄亦得此證五六日醫以承氣加藍根下之稍緩翌日其病如故下之又緩終不能愈漸致危篤或曰李明之存心於醫可請治之遂與診視具說其由東垣曰身半以上天之氣也身半以下地之氣也此雖熱邪客於心肺之間上攻頭目而為腫盛以承氣下之瀉胃腑之實熱是誅伐無故殊不知適其病所為過遂處方用黃連黃芩味苦瀉心肺之熱以為君橘紅味辛元參苦寒生甘草甘平瀉火補氣以為臣連翹鼠黏子薄荷苦辛平板藍根味甘寒馬屁渤白殭蠶苦平散腫消毒以為佐升麻柴胡苦平行少陽陽明二經之不得伸桔梗辛溫為舟楫不令下行共為末半用湯調時時服之半用蜜為丸噙化之服盡良愈因嘆曰往者不可追來者猶可及凡他所有病者皆書方以貼全活甚衆人曰此方天人所制遂刻石以傳即普濟消毒飲也海藏大頭病者雖在身半以上熱伏於經又感天地四時非節瘟疫之氣所成至於潰裂膿出則又染他人所以謂之疫癘也蓋因足陽明邪熱大盛與少陽相火而為熾二經邪甚則逆攻於上視其腫勢在何部分隨其經而取之濕熱為腫火盛為痛此邪發於首多在兩耳前後以先見者為主為根治之宜早藥不宜速恐過其病所謂上熱未除中寒復起有傷人命矣此疾自內而之外者是為血病況頭面受邪至高之分當先緩而後急邪氣在上既著無形頭面空虛之分既著無形則無所不至矣健曰血陰而有形氣陽而無形頭為六陽之首邪攻於氣故曰著無形所傳無定若用大劑重瀉之則其邪不去反過其病所矣故用緩藥而又急服之或食前或頓服失緩體則藥不能除病當徐徐漬無形之邪藥性味形體據象服餌皆須不離緩意及寒藥必酒浸炒焙之類皆是也先緩者且與清熱解毒如虛人兼益元氣胃虛食少者兼助胃氣待其內實熱甚大便結方以酒浸大黃下之後急者謂前投緩劑已瀉高分之邪氣入於中或到陰部著於有形之所若不速去反損陰也此邪為客邪是治客以急也凡陽分受陽邪陰分受陰邪主也治主宜緩陰分受陽邪陽分受陰邪客也治客必急去之少陽為邪者出於耳前後也陽明為邪者首面大腫也仁齊若發於鼻額及兩目腫盛不開並面掀赤而腫者陽明也壯熱氣喘口乾舌燥或咽痛不利脈數大普濟消毒飲內實熱甚防風通聖散增損若發耳上前後並頭角紅腫者少陽也肌熱日晡潮熱往來寒熱口苦咽乾目疼胸脅滿悶小柴胡加消毒藥若發於頭上腦海下項並目後赤腫者太陽也荊防敗毒散若三陽俱受邪併發於頭面耳鼻者普濟消毒飲或通聖散增損之外用清涼救苦散塗之此毒從鼻先腫次腫於目又次腫於耳從耳至頭上絡後腦結塊則止不散必作膿而愈健按疫證有時疫瘟疫二種皆天時流行不正之氣時疫輕於瘟疫雖亦比戶傳染然按方而發因年而起為病非一或作溫熱斑疹或疫瘧疫痢至於瘟疫每從災荒兵革之後大地牽連流行廣闊死殤猝暴甚至滅門最可危也豈特窮黎而富貴之家亦嘗不免乃劫數也如雍正壬子潮災癸丑大疫發於春夏江浙兩省大半及之死亡無算乾隆乙亥秋水災丙子夏江浙沿海大疫斃者甚衆大抵正虛而邪易侵人惡而天不宥者雖有良藥亦難療也苟其正氣不衰吉人天相禍不及之即或沾染得遇明醫乃能獲救每從戰汗而生戰而無汗邪勝正敗者死俗工不明傷寒時氣疫毒之各別謬以雜病方藥混投往往害事皆因未究陰陽表裡寒熱虛實之八要汗吐下和清補之六法故動手便錯非草果檳榔大黃枳朴桂枝芍藥之辛溫攻劫而熱逢燥熏虛招下陷遂致昏冒而死者多矣此皆誤信吳又可達原飲之故也又可之瘟疫論是病皆疫有是理乎非其證而用其藥安有不誤者耶更有應下不下應清不清以致狂熱譫妄唇焦舌黑循衣模床厥逆等象而世咸指為歸陰動輒養陰退熱為巧治而將地黃湯亂施且入麥冬枸杞萸肉羚角鱉甲等沉陰膩膈之物投之而屎滯熱伏無不口噤昏迷而死益衆病家孰知就里付之曰數醫家誰能自醒曰同乎俗然識者見之能無警惕而願以一言以破迷陳要知溫熱時氣疫癘諸證其初在表不可用傷寒法治及其入里又必從傷寒法而究陽明之腑夫仲景直中陰證法當溫散救逆至於傳陰法惟三承氣下之從未有歸陰之說並無養陰之法豈可妄事倡禍效尤成習以誤舉世此因少讀經書不考前賢名論未識傷寒時氣疫癘六字耳姑述其詳以告後之君子並核諸家精要而設正氣丹以救溫疫等證無論初終輕重表裡雙解其效如神方附變通方後寒疫健曰非時暴寒感之而病也仁齊寒疫乃天之暴寒為病也凡四時之中天令或有暴風寒之作感冒而即病者曰寒疫也其證與正傷寒即病者同但暴寒為輕耳初作頭疼憎寒拘急或嘔逆噁心痞悶飲食停滯或腹中作痛未發熱者藿香正氣散增損之已發熱者十味芍蘇飲身痛骨節疼發熱者人參羌活散加蔥白葛根生薑或神木散自汗者不宜再汗九味羌活湯若熱不解變別證者宜從正傷寒條內治蘭谷寒役者非時感冒之暴寒亦為時行者傷寒例曰從春分以後夏至以前天有暴寒皆為時行寒疫也三月四月其時陽氣尚弱云云夫溫暑之熱自內而出寒疫則寒折陽氣自外感受只須解表故其治法不同與溫暑兼表裡者異矣況感於寒與傷於寒有輕重之不同其病多不傳經又其寒亦非冬時殺厲之氣故不可以傷寒法治也其證亦惡風惡寒頭痛身痛脈浮緊宜參蘇飲敗毒散通解散百解散類看微甚加減之仁齊寒疫乃四時暴寒之邪與冬月之嚴寒自有輕重不同然與溫暑諸病通稱傷寒者謂其發熱傳變一皆狀似傷寒耳至用藥則迥不同腎傷寒健曰此即是伏氣病也活人伏氣之病謂非時有異寒中人伏氣於少陰經始不覺病旬月乃發脈微弱先發咽痛似傷寒仲景但云似傷無寒字非喉痹之病次必下利此病只一二日便瘥古方謂之腎傷寒是也始用半夏桂枝甘草湯次以四逆散主之趙氏活人書近見四樣印本皆作四逆散夫四逆散不主咽痛恐刊者之誤不能無疑仲景論云四逆散治少陰病傳邪作熱四肢逆而不溫者今此證是伏寒於少陰而脈微弱法當溫散既先用半夏桂甘溫劑何復用柴胡寒劑繼之乎此必是四逆湯也何也按通脈四逆湯後有咽痛加桔梗之例節庵咽痛用半夏桂甘湯即半夏湯下利用四逆湯健按此證據活人所云暴寒中人伏於少陰旬月乃發先發咽痛似傷寒而仲景但云似傷無寒字則知寒已變熱上越於少陰之經少陰脈循喉嚨故咽痛似傷其脈應見沉數若脈微弱勢必下利而無咽痛矣如咽痛者豈可用半夏桂枝四逆等耶趙氏稱仲景論四逆散治少陰傳邪作熱夫四逆蓋四肢不溫乃厥深熱深之象當從涼瀉或用下法則四逆散可也又日此必是四逆湯其說更不可用矣既以腎傷寒為伏氣之病蓋伏者郁久不發之謂寒鬱變熱凡病皆然治宜辛涼以散如上等方是蹈以熱濟熱之禍桂枝辛溫半夏辛燥非咽痛家藥用之必致自治伊戚夾陰傷寒此食陰也若房室後飲冷致孤陽飛越者多為陰盛隔陽證谷如傷寒一證純陰純陽無別證混淆者人所易辨也至於外感頭痛發熱口乾身痛惡風等證其中有夾陰一二分者有二三分者從古至今無人議論及此亦不見於方書也余遇此等夾陰證候察其六脈毫釐之間明知夾陰之淺深投暖劑之輕重一藥而愈矣夫陰有三陰足太陰脾足厥陰肝足少陰腎然此陰非少陰厥陰之陰也乃陰寒之陰正當感冒風寒而誤食冷物或先食冷物而又感冒風寒此冷物入於胃邪傳於脾而為太陰之夾陰是名夾陰傷寒疏解中少加溫暖品味陰寒既退元陽復而愈矣又或飲食之時恣意一飽傷陽明胃及太陰脾此為夾食傷寒須兼消導之藥腸胃流通其病即去又有咳嗽痰喘傷食夾陰者有咳嗽痰喘傷寒夾陰者有感寒夾陰者有傷風夾陰者有傷食腹痛夾陰者有腹痛嘔惡傷寒夾陰者有人問何以知外感夾陰曰脈得浮大而軟浮大主外感濡軟主陰寒若純陰證脈當沉遲而微若純外感脈當浮大而緊俗工安知之活人問胸膈䐜滿閉塞唇青手足冷脈沉細或腹痛此太陰也近人多不識此見胸膈不快便投食藥非也大抵此陰證者飲食不節冷物傷脾陰經受之故胸膈䐜滿腹脹閉塞面目及唇皆無色澤手足冷脈沉細少情緒亦不因嗜欲但因冷物損動胃氣而成若誤投巴豆類必愈不快或吐而利一二日後遂致不救蓋不知寒中太陰也宜急作理中湯加青皮陳皮或枳實理中丸及五積散尤良健按夾陰傷寒者非正傷寒陰證之名上論只言食填太陰也亦有頭痛身熱法當溫暖消散是身雖熱而胸胃䐜滿脈必濡遲沉細舌必淡滑唇青若脈浮洪緊數舌現焦黃而渴者又屬陽明實熱當行清涼消導內外兼解者矣故同一停食而有寒熱之殊非一例以陰為治須寒無犯寒熱無犯熱始為良工豫曾視夾陰時氣一證斑現緊黑身熱脈緩胎白胃間如石手不可近具食填太陰之危證若以化斑為治則所停膠韌之物如何得化況已堅滿藥不能運乃用陷胸法除去苦寒兼柴葛楂曲二陳二梗加芒硝以軟其堅生薑辛溫以散其食冷之氣一劑而濈濈汗泄身涼食消其半二劑而胃軟食化進谷三劑加大黃以下之然後用紫草石膏連翹花粉等化其班毒遂愈要知黑斑書稱不治此不從化斑以活者乃時氣之毒盛於陽明之經而未入於腑故先消其食胃之正氣得復而經邪自化若先進寒涼化斑則所食冷飯魚膠堅韌之物何由得消必致合邪入腑成不治矣故夾陰不特傷寒有之時氣發斑亦有夾陰者此證為甚也古書所未載故識之類傷寒六證健曰類似也有似傷寒實非傷寒也一曰痰證停痰留飲則自汗胸滿憎寒發熱氣上衝咽不得息但頭不痛項不強或有時頭痛而作止無常其脈痰在上焦者寸口滑在中焦者關滑大或沉者有伏痰有氣鬱者脈亦沉而滑夾食者短而滑有飲者弦而滑或左右關上伏而大滑而大者膈上有伏痰皆狀似傷寒而證脈實與傷寒異也二曰食積飲食停滯不化則胸腹滿悶發熱頭痛但身不痛左脈平和惟氣口脈盛或右關短滑為異傷食者必惡聞食臭中脘痞膈噫氣作酸或欲吐不吐或嘔之不盡或胃口作疼亦皆狀似傷寒而脈證與傷寒異亦有停食又感寒者脈左右手俱大所謂夾食傷寒也不可先攻其食俟寒邪發散後次消導以除之食在胃之上口未入於胃者可吐而去之三曰虛煩熱氣血俱虛煩躁發熱但身不疼頭不痛不惡寒脈不浮緊或煩時頭痛煩止而頭痛亦止雖狀似傷寒其脈證亦與傷寒異此內傷不足所致勿誤作外感治之四曰腳氣頭痛憎寒身熱肢節作痛便閉嘔逆有似傷寒然腳腫痛或兩脛枯細證脈與傷寒異五曰瘀血跌觸傷損極怒叫呼瘀血內停者胸脅下及小腹必有痛處按之手不可近其證寒熱齊作有似傷寒然頭不疼脈不浮緊小便自利口不渴與傷寒異仁齊凡瘀血停言之處則腫痛手不可近脈多芤澀可辨蓋肝為血海故瘀血多畜於脅下或小腹之部作痛乃肝分也又瘀血上衝多昏迷不醒如死狀者有之損庵飢飽勞後七情房室所傷皆能畜血不止一途也如一人服滋補藥日多至數兩忽發熱不止他藥治之殆不受矣急作畜血治之方煎病人聞其氣香飲已熱退明日下黑糞鬥許而安六曰內癰發熱惡寒咳而胸中隱痛心胸甲錯振寒咽乾不渴時去濁唾腥臭久則吐膿如米粥右寸數大者肺癰也小腹重強按之痛便數如淋時汗出惡寒皮膚甲錯腹皮腫急脈滑數者腸癰也胃脘痛手不可近胃脈沉細人迎脈逆而盛胃癰也雖皆發熱惡寒有似傷寒然頭不痛項不強證脈自與傷寒異仁齊經曰諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常畜積有膿也又曰脈數不時則生惡瘡故惡瘡初生必寒熱交作不可便以傷寒治之須視病人頭面背脊有無形跡若有小紅白膿頭瘡多為發背初起二三日後即發大瘡又療瘡初作全與傷寒相似不可妄投他藥傷濕濕有數種有濕痹痹者痛也濕中關節則疼當利小便是也有寒濕相搏但頭汗出皆強欲得被覆向火是也有風濕相搏一身盡痛當汗出而解是也有頭中寒濕此中之淺者鼻塞納藥鼻中是也有先濕而後感風者身痛發熱日晡熱是也濕家病與太陽相似其不同者脈沉而細痓家脈亦沉而細濕家身疼痓家則身不疼也宇泰濕證有類傷寒者故痓濕暍篇為與傷寒相似如濕痹之候關節疼痛而煩小便不利大便反快脈沉細外證雖與太陽傷寒相類若太陽身疼骨痛脈浮緊不沉細此濕流關節疼痛煩者濕氣內勝也五苓散或加羌活濕家為病一身盡疼發熱身色如熏黃黃如橘子色者陽明瘀熱此如熏黃與陽明自不同也蓋濕邪在經而身盡疼脾傷而色外見濕鬱成熱熱鬱發黃與瘀熱異也小便不利者茵陳五苓散濕家但頭汗出背強欲得被覆向火下之早則噦胸滿小便不利舌上如胎渴欲飲水而不能飲躁煩此寒濕相摶於表不可妄下者也濕勝則多汗傷寒則無汗寒濕相拎雖有汗不能周身故但頭汗出太陽經中寒濕故背強惡寒傷寒脊強惡寒則無頭汗見汗則不脊強惡寒矣麻黃加朮湯濕家身疼痛發熱面黃而喘頭痛鼻塞脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈瓜蒂散入鼻去黃水觀子關節不疼身不黃脈不沉細而大則濕不內流而外在表也又自能飲食別無痞悶腹中和知為寒濕之淺者也惟身疼發熱頭痛而喘有似太陽傷寒然不惡寒脈不緊可辨風濕亦有類傷寒者如風濕相摶一身盡痛法當汗出而解值天陰雨不止且大發汗但風氣去濕氣不去當微微似欲汗者風濕俱去也風濕相摶則風在外而濕在內汗大出者其氣暴暴者外邪出而里邪不能出微汗出者其氣緩緩則內外之邪去矣要略曰黃家所起從濕得之汗出濕去則不發黃今汗已黃者風氣去濕氣在也脾惡濕濕氣內著脾色外奪為黃若瘀熱在裡發黃者當下此以寒濕在裡不可下也又病者一身盡疼日晡所劇者風濕也傷寒日晡潮熱為陽明實熱則身不疼太陽身疼發熱則無分日晡也麻黃杏仁薏苡仁甘草湯去濕之法或以羌活愈風湯類勝之或以蒼朮白朮類燥之或以茯苓澤瀉類滲之或以附子類溫之察所挾風寒熱有無微甚上中下參用諸無不瘳也仁齊傷濕者濕傷太陽經也中濕者濕中太陰脾經或少陰腎經也暑暍健曰暑為陰邪其傷入心脾經面垢汗出身熱須渴暍為陽邪其傷中太陽經汗出身熱而渴應分二證為治各異蘭谷中暍中熱中暑一也但其脈證有虛實耳類於傷寒時又同乎熱病故傷寒論恐以太陽中暍誤為夏月傷寒特舉三經以明之曰太陽中熱者暍是也其人汗出惡寒身熱而渴此暑邪由表外入表裡俱熱熱氣散漫不離乎表非純入里故屬太陽要略以白虎加人參湯主之此證雖不言脈吾知其脈當洪大也如系太陽中風汗出惡寒身熱不渴如系溫熱病發熱而渴不惡寒而無汗故知其各異也又太陽中暍者身熱疼重而脈微弱此夏月必傷冷水水行皮中所致疼重者水也脈微弱者暍要略以瓜蒂散主之如傷寒身熱而疼則脈必盛而不微弱故知其各異也又太陽中暍者發熱惡寒身重疼痛脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥傷寒發熱惡寒則身疼脈盛而不弦細芤遲溫熱則不惡寒而脈亦盛故知其各異也觀子發汗則惡寒甚之句知未發汗之前不過因熱而腠理開不任風寒或用扇當風則惡耳非若傷寒之欲得衣被也若居帷帳之中便增煩悶故東垣曰大惡熱以熱傷氣愈熱則氣愈傷傷熱惡熱自然之理也然則豈可以溫針助熱乎大凡暑之傷也有二或暑邪中太陽外開腠理奪正氣使隨汗大泄邪不深入於裡是素問所謂精氣奪則虛也其發熱者虛故也脈乃弦細芤遲宜扶正氣以去暑邪香薷生脈散清暑益氣湯十味香薷飲類正勝而邪自除或暑邪中太陽外開腠理奪正氣而汗大泄邪又深入於裡是素問所謂邪氣盛則實也其發熱者實邪也脈必洪大而盛宜祛邪以帶扶正黃連香薷飲白虎湯白虎加人參湯辨其脈證虛實然後參以治暑諸方可也又有飢困勞役肌膚躁熱大渴引飲目赤面紅晝夜不息脈洪大而虛重按全無者此血虛發熱證似白虎惟脈不長實為辨耳須服當歸補血湯若誤服白虎則死此又似中暑而非中暑也籲暑證類傷寒又有類暑證者可不明辨哉潔古清邪中上濁邪中下風寒濕皆地之氣系濁邪所以俱中足經惟暑乃天之氣系清邪所以中手少陰心經也其證與傷寒相似但渴與傷寒異脈亦不同耳夫傷寒雖發熱惡寒初病未至於煩渴暑則不然初病即渴且傷寒之脈必浮盛中暑之脈虛弱或弦細芤遲經曰脈盛身寒得之傷寒脈虛身熱得之傷暑是也仁齊中暍者即中熱也其邪中太陽經與傷寒相似中暑者熱傷於心脾經而不在太陽中熱者其人汗出身熱而渴白虎湯倍人參若身重而疼人參敗毒散加黃連香薷中暑者面垢汗出身熱煩渴脈虛或背微惡寒蓋暑喜傷心心不受邪其包絡本相火以火投火則熱甚而昏不省治法清心利小便最妙黃連香薷飲煩渴熱甚自汗白虎湯倍人參或竹葉石膏湯煩渴小便不利香薷飲合四苓加木通滑石大便瀉小便少上方內熱心煩加薑汁炒黃連脈虛加人參大法不可作傷寒例治妄施汗下則誤矣活人謂夏月有四證傷寒傷風脈證互見中暑雜病疑似難明當細別之健曰暑家為病不一此但言暑暍二者發熱惡寒身疼自汗諸象與傷寒相似而治不同陰陽各別暍屬陽邪得之道途烈日炎酷之氣所中暑屬陰邪得之家居廣廈貪涼少汗暑氣襲之為病如右故治暍以清涼解毒治暑當辛涼發散其他冒暑伏暑中暑暑風暑厥暑瘧暑瀉暑濕等絶與傷寒別者茲不盡載當考雜證書詳之痙傷寒有變痙證者項背強是也經曰病身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭面搖卒口噤背反張者痙病夫仲景所謂剛柔二痙者並屬太陽以太陽行身之後故頸項徑急而反張也要略曰痙為病脅滿口噤臥不著席腳攣急必齘齒此屬陽明蓋陽明行身之前不作反張之證與太陽痙是兩般也此事難知曰頭低視下手足牽引肘膝相構陽明痙也然欲行大承氣必須察其內實脈沉有力方可下之若往來寒熱或左右一目斜牽或左右一手搐搦脈弦數者少陽痙也又有傷寒結胸證項亦強如柔痙狀此似痙而非痙也不可以風藥誤治之痓作痙按說文痙強直也無痓字廣韻痓惡也其非痙明矣是皆誤書作痓也今並正之太陽中風重感寒濕則變痙或太陽發汗大多因致痙若發熱無汗反惡寒者曰剛痙其脈浮緊者屬中風重感於寒葛根湯或加獨活防風發熱汗出不惡寒者曰柔痙其脈沉細者屬中風重感於濕栝蔞桂枝湯或桂枝加葛根獨活防風湯表有風邪未解為寒所襲者宜風藥解散風寒為濕所襲者則風藥亦能勝濕故二證主方如此陽明痙胸滿口噤臥不著席攣急齘齒大承氣湯或防風通聖散去麻黃下之要察脈有力可下無力不可下少陽痙往來寒熱或一目斜牽或一手搐搦小柴胡加防風湯汗下太過已失血液致筋脈失養不柔和而痙無外邪可解者惟宜補養氣血為主八珍湯加減脈小虛甚者加熟附子或大建中加羌防産後金瘡一切去血過多之證皆能成痙亦當補養之仁齊太陽無汗小便少氣上衝口噤欲作剛痙麻黃加葛根湯一方加川芎獨活防風太陽病𠘧𠘧身體強脈反沉細栝蔞湯若自汗惡風不可汗桂枝湯加羌防如胃弱加人參白朮渴加乾葛陰痙脈沉細附子散桂心白朮散附子防風湯選用血虛發熱當歸防風湯士材活人云痙病者外證發熱惡寒與傷寒相似但其脈沉遲弦細而項背強為異也吳仁齊謂仰面臥開目者為陽合面臥閉目者為陰脈浮緊數者屬陽脈沉細澀者屬陰口燥渴者為陽口中和者為陰屬陽易治屬陰難治脈浛浛如蛇者汗虛致痙也脈緊急如弦直上下行者痙也風濕者為實血枯者為虛故傷風頭痛當自汗出而嘔者若汗之必發痙大發濕家汗亦致痙瘡家而汗之亦致痙新産脈虛汗出傷風者亦致痙若其脈沉弦而遲或帶緊或散於指外者皆惡候也健曰痙與痓兩證也同一項背強而有輕重虛實之殊痙因外感風濕於太陽剛痙無汗應發表祛濕柔痙有汗應祛風利濕遂可治療若痓證則角弓反張痰迷口噤昏冒不省時作時止亦有剛柔之分蓋因本原精血衰憊外為風濕襲之而致古方雖有小續命栝蔞根湯等法然終用之無效不能一挽真惡候也如上文是但言痙耳未可與痓比浛音含霍亂健曰此寒霍亂乃傷寒之變證也發熱頭痛身疼惡寒吐利者霍亂兼傷寒吐利止更發熱者還是傷寒霍亂後還是傷寒脈微澀四五日至陰經復下利者轉入陰也不可治欲大便反失氣仍不利者屬陽明也便必硬十三日經儘自愈霍亂頭痛發熱身疼熱多欲飲水五苓散寒多不用水理中圓吐利止身痛不休桂枝湯小和之吐利汗出發熱惡寒四肢拘急手足厥冷四逆湯既吐且利小便復利大汗出清穀內外寒熱脈微欲絶通脈四逆加豬膽汁湯惡寒脈微復利利止後四逆加人參湯健曰此霍亂乃傷寒門證名寒霍亂非夏秋暑濕相因時行之霍亂也故寒霍亂用溫治者多暑霍亂用涼治者多若投劑稍差其害叵測中寒健曰中寒為急證又非傷寒直中之比仁齊傷寒者寒邪傷於三陽諸經也中寒者寒邪直中三陰之裡也中寒比傷寒尤甚不急治者死如寒中太陰者中脘疼痛脈必遲緩宜理中湯或藿香正氣散對理中湯寒甚脈沉細足冷必加附子為附子理中湯中少陰者臍腹疼痛宜五積散加吳茱萸寒甚脈沉足冷四逆湯加吳萸中厥陰者小腸小腹至陰疼痛當歸四逆加吳萸甚者必倍附子冷極唇青厥逆無脈囊縮者仍用蔥尉法或炒吳萸尉之或著艾灸臍中或灸關元氣海最妙一時無藥以涼水搭手足四腕視其筋青紫處用三稜針挑出其血愈或刺十指尖出血亦可或一味吳茱湯與之亦妙觀子傷寒者寒從經絡得之而病雖曰即病猶以漸至中寒暴受大寒直入於裡而即病且口噤體僵或僕或厥冷昏不知人其狀自與傷寒異也蓋寒邪從表徹里又絶非三陰直中之比恐其與陰證混淆故並録之中寒輕者只五積散良重者姜附湯及理中湯果兼臍腹等疼上吳氏分三經治法不口噤體僵厥冷但腹痛寒入於裡邪正相激而不得解也宜從絞腸痧治溫補兼發散婁氏此篇集丹溪海藏諸賢治傷寒皆有補養兼發散之法實本經成敗倚伏生動動而不已則變作及風雨寒暑不乘其虛不能獨傷於人之旨也蓋凡外傷風寒者必先因動作煩勞內傷體虛然後外邪得以入之故一家之中有病有不病者焉由體虛則邪入而病體實者邪無隙可乘而不病也故傷寒為病屬內虛者十居八九舉世無知咸謂傷寒無補法但見發熱不分虛實一例汗下而致夭橫者滔滔皆是此實醫門之罪人也今集此法於仲景書後其應如向以俾來者不犯虛虛實實之戒也丹溪外感無內傷者用仲景法傷寒挾內傷者十居八九經曰邪之所湊其氣必虛宜補中益氣湯從六經所見之證出入加減用之氣虛甚者少加附子以行參耆之功加減法如見太陽證則項痛腰脊強加羌活藁本桂枝陽明身熱目痛鼻乾不得眠加葛根升麻少陽胸脅痛耳聾加黃芩半夏木通柴胡太陰腹滿自利加枳實厚朴少陰口燥舌乾而謁加甘草桔梗厥陰煩滿囊縮加川芎變證發斑加乾葛元參升麻東垣謂內傷者極多外傷者間有此發前人所未發欲辨內外傷之證東垣詳之矣後人徇俗不見真切雷同指為外感極謬其或可者蓋亦因其不敢放肆而多用和平藥散之若粗率者必致殺人或感冒輕病不可便認為傷寒西北二方極寒蕭殺之氣外傷甚多東南二方溫和之地外傷甚少雜病亦有六經所見之證與傷寒相類者極多故世俗混而無別立齊或元氣虛弱感冒風寒不勝發表或入房酒後感冒或感冒後入房皆宜補中益氣湯不應者急加附子健曰此雖前賢究本之論然亦不可偏信而既施之必有所誤視證總要得陰陽表裡虛實寒熱之明驗察脈證之合否內外之重輕標本之先後形色舌胎之顯晦起居服食便尿之何如能逐一瞭然而後因時制宜自然應手何憚其東南西北之殊途內傷外感之兼致未嘗不左右逢原者矣前輩心切度人多方開示亦足以發但學者毋固執耳雜合邪健曰謂非一經所定之病故為雜合邪丹溪絮矩新書謂有雜合邪者當以雜合法治之譬如惡寒發熱得之感冒明是外合之邪已得浮數之脈而氣口又緊盛明為食所傷病者又倦怠脈重按俱有豁意而胸膈痞滿間引兩脅其脈輕取似乎弦此又平昔多怒肝邪之所為也細取左尺數大沉弱此又平昔房勞之故也治法以感冒一節放後先視其形色強弱厚薄且與補中化食行滯清涼胃火而以薑辣行之則中氣稍回傷滯稍去津液得和通體得汗外感之邪自解醫者不能詳審求之只顧表散外邪又不推究兼見之邪勝亦不窮問所得之病因與性情之執著巧施雜合治法將見正氣日虛邪氣愈固皆拙工之過也健曰萬物總歸於土人之脾胃乃後天之本所病之邪雜合則知非六經專主之邪矣而人自倦怠理當從脾胃究藥氣血痰食俱賴以運行即有外感之微邪亦必從宣泄而愈矣婦人傷寒天地陰陽各有分位婦人傷寒與男子不同治難一例也況婦人情志嗜欲倍於男子又有胎産經血之證雜於其間凡婦人傷寒及諸寒熱氣滯須問經産若何有孕當安胎為急産必問惡露多少方可用藥雖汗吐下溫清補之法頗同藥味須當分別不可混投也慎之哉節庵婦人經水適來適斷而傷寒者晝則明瞭暮則譫語如見鬼狀為熱入血室無犯胃氣及上中二焦小柴胡湯無犯胃氣不可下也無犯上焦不可汗也無犯中焦不可下也若行湯遲則熱入胃令津液燥上焦中焦不榮成血結胸須刺期門婦人傷寒發熱惡寒四肢拘急口燥舌乾經水凝滯不得往來桂枝紅花湯口燥舌乾不思飲食黃芩芍藥湯喘急煩躁戰而作寒陰陽俱虛不可下也小柴胡湯瘥後餘熱不去謂之遺血久則成虛勞生地黃連湯士材婦人傷寒治法皆與男子同但熱入血室與胎前産後則不同耳熱入血室小柴胡加生地丹皮歸尾枳殼妊孕傷寒安胎為主不可過於汗下有表者四物湯加羌活蘇葉蔥頭蒼朮燥渴便閉四物加枳殼酒炒大黃厚朴汗下太過遂變鬱冒昏迷瞤惕八珍湯加乾薑仁齊凡妊娠傷寒六經治例皆同但要安胎為主藥有犯胎者則不可用如藿香正氣散十味芎蘇飲小柴胡湯皆有半夏犯胎用須去之若痰多嘔逆必用者以半夏曲代之如無以沸湯泡七次薑汁拌制乃可又川烏附子天雄側子肉桂乾薑大黃芒硝蕪花甘遂大戟蜀漆水蛭虹蟲丹皮桃仁乾漆代赭瞿麥牛膝滑石等皆動胎忌用凡制湯劑須加黃芩白朮二味或以四物佐之庶可保胎除熱健曰婦人之病無論傷寒雜證凡遇妊身必安胎為先藥中犯胎之品何止上件猛利如斑蝥麝香輩人所共知也其平淡隨常之味人易忽略信手用之竟有失錯而致隕墜者醫家病家恬不之覺而識者旁觀明知其犯以戕人命豈不哀哉曾見一醫治一胎氣腹滿少食誤認為傷暑停食連進枳朴山楂藿香木香滑石等三四劑而五月男胎墜下其家世代單傳從此遂斬其宗其婦鬱郁而成黃病年餘而逝其醫亦絶後嗣可勿畏哉蓋因未明妊娠證脈未能深悉藥性故耳間有藥性難忌而病在必須者用之不礙內經云有故無隕也然必察其本原寧可換味而投方是良工妙用如川芎香附赤芍枳殼枳實厚朴山楂檳榔神麯蘇梗木通苡仁貝母丹參紅花歸尾蘇木鬱金薑黃三稜莪蒁蒲黃五靈脂益母草延胡索澤蘭茜根大小薊等皆屬破氣破血損孕下胎之藥世人往往用之而無妨者此證之當用或本原之堪受也有用之而陰受其害者是證之不宜用或人之體弱而難受也要知應用則宜輕宜暫尤在生熟多少之間斟酌盡善中病即止毋使過之傷其胎矣蘭谷妊婦傷寒仲景書散落而無治法要其發表攻裡溫經和解與男子略同不可因其胎而緩治之若邪熱內攻則反傷胎矣內經曰有故無殞亦無殞也所謂母安子亦安也但當佐以安胎之藥是其法也自明傷寒者時令嚴寒或非時暴寒而成輕者灑淅惡寒翕翕發熱微咳鼻塞重者頭痛惡寒體疼發熱久而不愈必傷胎矣白朮散白朮黃芩炒各二錢薑棗煎妊娠傷寒熱病宜先以此散安胎後隨經施治護胎法井底泥青黛伏龍肝等分加面少許井花水調塗臍下二寸許干則易之節庵妊娠傷寒保胎阿膠散散寒邪白朮湯憎寒壯熱宜發其汗芍藥湯或中時行灑淅寒熱振栗而悸加噦蘇術湯或傷熱默默欲眠不欲食脅痛嘔逆痰氣及産後傷鳳熱入胞宮寒熱如瘧及經水適來適斷病後勞復餘熱不解並用黃龍湯妊婦頭目眩運壯熱心煩旋覆花湯妊婦發斑梔子大青湯陳氏凡證候危急非毒藥不能攻之又值懷孕當如之何夫危急者病之變也變則死在須臾宜權變救母不救子若必救胎並母亦不全矣經曰有故無殞亦無殞也又大積大聚衰其大半而止有故母病也無殞無損母也亦無殞子亦無損也言毒藥止攻去邪氣邪去病愈子亦安故曰不損也衰其大半止者如發表不宜盡汗攻裡不宜盡下不然胎氣亦損矣可見孕婦之藥難用如此蘊要新産後傷寒不可輕易發汗有生産勞傷發熱去血過多發熱惡露不去發熱三日蒸乳發熱早起勞動飲食停滯一切發熱皆狀類傷寒要在細審詳辨不可便發散也況産後大血空虛若汗之變筋惕肉瞤或鬱冒昏迷不醒或抽搐不定或大便閉塞其害非輕也凡有發熱且與四物湯以芎歸最多為君酒炒芍藥酒浸地黃為佐或加軟苗柴胡人參乾薑為使如惡露未淨者益母丸黑神散兼用胃虛食少者加茯苓白朮有痰嘔逆者加半夏陳皮其餘六經治例斟酌損益而用産後才見身熱不可即與發表並一切苦寒之藥必用乾薑治大發熱輕者茯苓淡滲其熱乾薑之辛熱能引血藥入血分氣藥入氣分且能去惡養新有陽生陰長之道以熱治熱溫能除大熱又深合內經之旨用之則效也又云藥中必加四物為養血務生之主新産傷寒氣血兩虧不可尋常視之如當汗下必佐以調養氣血之藥凡産後憎寒壯熱之證與傷寒壞病同看知是何逆用小柴胡加減以鱉甲佐之良方産後天行從增損柴胡雜病從增損四物同傷寒壞證而治産後傷風數日不解頭痛惡寒時時熱心下堅乾嘔汗出桂枝湯加黃芩産後傷風發熱面赤而喘頭痛竹葉防風湯産婦亡津大便多祕或譫語煩躁神功丸産後頭疼身熱腹內急疼痛桂心牡蠣湯良方産後發熱頭疼身如傷寒時氣雖當用發表亦不可輕易如早起勞動為寒所傷則淅淅惡寒翕翕發熱頭項肩背骨節皆痛至七八日乃瘥若大便堅作嘔不能食小柴胡加乾薑地黃凡産後頭疼發熱身痛不可便作感冒治或是血虛或是敗血作梗宜以平和之劑治之如玉露散或四物加柴胡等分若便以小柴胡竹葉石膏之類致不救者多矣審系産罷外感風寒頭疼發熱體痛自汗無汗輕則治産藥中人防風天麻重則四物兼仲景本證方一二味合而治之海藏治妊娠傷寒亦合諸湯皆具此意立齊産後遍身疼痛發熱頭疼兼感寒傷食五積散若誤作傷寒發汗後抽搐厥冷發痙者大補氣血為主産後頭痛由風寒所傷補中益氣湯加川芎健按諸家所論皆諄誡之辭無論傷寒雜證臨於胎前産後經來經止之際必察其本原果邪輕而正虛者方可帶養血之藥兼治若邪重而正不虛先以去邪為急未可以乾薑地黃為務及補中四物往往誤人若産後時行或感溫熱病少陽陽明耳聾譫語斑疹並現齒燥舌焦者非小柴胡加乾葛石膏紫草輩何以制化其邪若胸滿胃實便結者非小陷胸調胃承氣等何以消導其垢所謂有是病肌是藥去邪即所以保正也若泥於舊說産後百病從末治之句而專務滋補不治外邪則邪反結滯壅塞惡露以致昏亂潰憊者不少也曾見兩醫治兩婦居相近而病同時皆産後外感身熱咳嗽嘔惡欲發痧疹者一醫用鼠黏子湯加前胡杏仁木通蟬蛻甘枯柳柳發其疹而一婦愈一醫起手即投四物並炮薑茯苓等而嘔甚熱盛面腫惡露閉塞煩躁復用羌防發散無汗不解仍用地黃丹皮歸尾香附等滋陰破血惡露不通疹伏不發熱甚一日反復半月遂致昏悶而死可知産後感冒風寒乃天地六淫之氣必從外達量其輕重宣泄之則應手可愈如依前人之說先事滋補勢必反助其邪益加熾橫留連不退無有不失誤盡天下蒼生而莫之挽也觀斯二者即知治病用藥之誤與不誤皎然矣産後百病從未治而以乾薑地黃補中四物為妙者只可與雜證血虛發熱言未可與傷寒時氣言也小兒傷寒健曰小兒乃十六歲前之稱若已成丁不在小兒之列矣仁齊嬰兒傷寒六經皆同但有胎熱驚熱血熱客熱潮熱痰熱食熱變蒸熱痘疹發熱傷鳳發熱一皆狀似傷寒不可不明辨之況肌體嫩弱血氣未定有脈法不同藥劑輕小之別其詳另具凡傷寒發熱則畏寒拘急其熱翕然在表晝夜不止直待汗出方解錢氏曰男子則面黃體重女子則面赤喘急憎寒口中氣熱呵缺頓悶項急也又手背熱而手心不熱左人迎脈緊盛為異立齊錢仲陽云小兒正傷寒者謂感冒寒邪壯熱頭疼鼻塞流涕畏寒拘急是也夾驚者因驚而又感寒邪或因傷寒熱極生風熱乘於心心神易動故發搐也用薄荷散人參羌活散類解之甚者抱龍丸夾食者或先傷於風寒後停滯飲食或先停飲食而後傷風寒以致發熱氣粗噯氣壯熱頭疼腹脹作痛大便酸臭先用解散次與消導不解者大柴胡湯周歲以前傷寒熱輕者剁惺惺散周歲以後須解表微汗若五六日不除邪入於經絡傳變多端不可枚舉若夫營衛俱傷者羌活沖和湯主之過此則少陽陽明二經在於半表半裡肌肉之間脈不浮沉外證在陽明則目痛鼻乾不得眠脈洪而長以葛根解肌升麻等湯治之在少陽則耳聾脈弦數小柴胡湯加減和之若少陽陽明俱病小柴胡加葛根芍藥傳入陽明為里脈沉實譫妄惡熱六七日不大便口燥咽乾而渴用大柴胡湯重則三一承氣湯若兼三焦俱病則痞滿燥實宜大承氣湯三陽之邪在裡為患不頭疼惡寒而反渴此為溫病當從溫病論治其正傷寒證治有專方不復贅論其兼驚兼食者各從本證論治傷寒熱者十指稍冷鼻流清涕發熱無汗面燥凜振右腮有紫紋若發熱惡寒脈浮數者此溫病也
