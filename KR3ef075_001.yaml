front:
  text: 傷寒直指序醫乃性命之學而不易精病於傷寒之證為難治以其邪既殺厲而傳變迅疾也始太陽終厥陰六經病狀出自內經未有方法蓋上古以針砭為工耳逮漢張仲景撰傷寒論而三陽三陰傳經直中兩感正病合病並病之旨始備設三百九十七法一百一十三方條晰病情區畫經絡候察色脈分別陰陽邪正虛實表裡昭然以垂萬世為立法制方之祖惜其書值喪亂散佚至晉王叔和搜輯成編失其次第精義不能貫串後賢引伸索解恆嘆遺珠是傷寒書顯而猶晦矣窺其一句之內隻字之間仲景力具史筆豈肯忽略以負後人核其原論可想見諸篇條理之斷續紛壇者乃遺文脫漏也顧一經之中病象多端而主方只一最可疑也如太陽傷寒主麻黃中風主桂枝治表之劑也在裡者亦可主於是乎或謂從太陽所傳故以二湯為主然表裡懸殊烏能概治至三陽並病厥陰及瘦暍霍亂等篇文情舛錯有論無方昧者不察動口稱之舉手法之往往貽誤內經曰人之傷於寒也則為病熱初則應表次則應和終則應清應下應溫應補各有隨時調度凡病層次大法皆然古今一理麻桂辛溫表藥混行直任能無偏弊者乎況仲景諄誡執方明示禁條經雖同而表裡異豈事一方以該六法之後先乎夫法者體也方者用也相須而不相悖也且三百九十七法考之終未合數王安道溯洄集辨之甚詳即所引內經分敘六經形證如陽明篇無目痛少陽篇言胸脅滿而不言痛太陰篇無嗌乾厥陰篇無囊縮若此者非無是證而勿論也實有以脫之耳書非仲景全壁明矣讀仲景書要知病情傳變乃所患之經也不可不循理推求治法方藥乃救病之權也不可不隨機活變抑或人地不同風俗偏尚邪氣為患則一傳經變病則一勿作印定始有見道之日健於此備嘗辛苦稍知滋味不得不為仲景辨前輩發揮傷寒奚止汗牛充棟然能道其所以然未盡所以然之妙致後來之士猶豫趑趄毫釐千里道日遠而日離矣健後學匪敢尚論古今竊念人生疾苦惟傷寒變幻叵測故不惜心力願求根抵以究差失幸得林觀子傷寒折衷彙集諸家議論參閲之久不覺神遊象現奈板燼書少未克流通宇宙冀圖復刻尚乏其人雖然傷寒注疏觀子搜羅殆遍但未釐剔是否恐學者泥於趨向因不揣荒陋選精節約而復編之凡有疑竇悉補管見以發前賢未盡之蘊方之不合於證有誤於人者更參脈舌之顯晦取先哲變通良法斟酌損益以體仲景大旨而軌傷寒之實際質諸高明務期有濟於世耳許學士云余讀仲景書師仲景法未嘗守仲景方古今以為善得仲景之心者即健校補直指之意雖未能具見仲景面目然以仲景之心為心補偏救弊非摘前人之疵實補前人之闕為學者因時制宜之助云時乾隆二十四年歲次己卯春正上浣之吉後學上海強健順之撰傷寒論序夫前聖有作後必有繼而述之者則其教乃得著於世矣醫之道源自炎黃以至神之妙始興經方繼而伊尹以元聖之才撰成湯液俾黎庶之疾疢咸遂蠲除使萬代之生靈普蒙拯濟後漢張仲景又廣湯液為傷寒卒病論十卷然後醫方大備茲先聖後聖若合符節至晉太醫令王叔和以仲景之書撰次成敘得為完帙昔人以仲景方一部為衆方之祖蓋能繼述先聖之所作迄今千有餘年不墜於地者又得王氏闡明之力也傷寒十卷其言精而奧其法簡而詳非寡聞淺見所能頤究後雖有學者又各自名家未見發明僕喬業醫自幼徂老耽味仲景之書五十餘年矣雖粗得其門而近升乎堂然未入於室常為慊然昨者邂逅聊攝成公議論該博術業精通而有家學注成傷寒十卷出以示僕其三百九十七法之內分析異同彰明隱奧候陳脈理區別陰陽使表裡昭然俾汗下而灼見百一十二方之後通明名號之由彰顯藥性之主十劑輕重之攸分七精製用之斯見彆氣味之所宜明補瀉之所適文皆引內經旁牽衆說方法之辨莫不允當實前賢所未言後學所未識是得仲景之深意者也昔所謂慊然者今悉達其奧矣親覿其書誠難默默不揆荒蕪聊序其略時甲子仲秋日洛陽嚴器之序傷寒論序夫傷寒論蓋祖述大聖人之意諸家莫其倫擬故晉皇甫謐序甲乙針經云伊尹以元聖之才撰用神農本草以為湯液漢張仲景論廣湯液為十數卷用之多驗近世太醫令王叔和撰次仲景遺論甚精皆可施用是仲景本伊尹之法伊尹本神農之經得不謂祖述大聖人之意乎張仲景漢書無傳見名醫録云南陽人名機仲景乃其字也舉孝廉官至長沙太守始受術於同郡張伯祖時人言識用精微過其師所著論其言精而奧其法簡而詳非淺聞寡見者所能及自仲景於今八百餘年惟王叔和能學之其間如葛洪陶弘景胡洽徐之才孫思邈輩非不才也但各自名家而不能修明之開寶中節度使高繼沖曾編録進上其文理舛錯未嘗考正歷代雖藏之書府亦闕於讎校是使治病之流舉天下無或知者國家詔儒臣校正醫書臣奇續被其選以為百病之急無急於傷寒今先校定張仲景傷寒論十卷總二十二篇證外合三百九十七法除復重定有一百一十二方今請頒行太子右贊善大夫臣高保衡尚書屯田員外郎臣孫奇尚書司封郎中祕閣校理臣林億等謹上
