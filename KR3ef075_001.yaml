body:
  text: 傷寒卒病論集論曰余每覽越人人虢之診望齊侯之色未嘗不慨然嘆其才秀也怪當今居世之士曾不留神醫藥精究方術上以療君親之疾下以救貧賤之厄中以保身長全以養其生但競逐榮勢企踵權豪孜孜汲汲惟名利是務崇怖其末忽棄其本華其外而悴其內皮之不存毛將安附焉卒然遭邪風之氣嬰非常之疾患及禍至而方震栗降志屈節欽望巫祝告窮歸天束手受敗齎百年之壽命持至寶之重器委付凡醫恣其所措咄嗟嗚呼厥身已斃神明消滅變為異物幽潛重泉徒為啼泣痛夫舉世昏迷莫能覺悟不惜其命若是輕生彼何榮勢之云哉而進不能愛人知人退不能愛身知己遇災值禍身居厄地濛濛昧昧蠢若遊魂哀乎趨世之士馳竟浮華不固根本忘軀徇物危若冰谷至於是也余宗族素多向餘二百建安紀年以來猶未十稔其死亡者三分有二傷寒十居其七感往昔之淪喪傷橫夭之莫救乃勤求古訓博採衆方撰用素問九卷八十一難陰陽大論胎臚藥録並平脈辨證為傷寒卒病論合十六卷雖未能盡愈諸病庶可以見病知源若能尋余所集思過半矣夫天布五行以運萬數人稟五常以有五臟經絡腑俞陰陽會通玄冥幽微變化難極自非才高議妙豈能探其理致哉上古有神農黃帝岐伯伯高雷公少俞少師仲文中世有長桑扁鵲漢有公乘陽慶及倉公下此以往未之聞也觀今之醫不念思求經旨以演其所知各承家技終始順舊省疾問病務在口給相對斯須便處湯藥按寸不及尺握手不及足人迎趺陽三部不參動數發息不滿五十短期未知決診九候曾無倣佛明堂闕庭盡不見察所謂管窺而已夫欲視死別生實為難矣孔子云生而知之者上學則亞之多聞博識知之次也余宿尚方術請事斯語長沙守南陽張機著傷寒論讀法讀傷寒書須識仲景以史行文有綱有目如六經篇起句稱傷寒者因傷於寒稱中鳳者因中於風為病之總名耳或在三陽或在三陰傳經入腑表裡寒熱汗下攻補之法俱在下句分別一節一條類如此也其在三陽稱太陽病云云者乃太陽初受邪本經之表證也其傳者曰傳某經云云也若傳陽明則曰傷寒二三日陽明病此即太陽傳經之裡證也竟稱陽明病起者乃陽明本經受邪之表證也若傳少陽則曰傷寒三四日少陽病此是陽明遞傳之半表半裡證也竟稱少陽病者乃少陽本經受邪之證也其在三陰稱太陰病起者乃邪入太陰本經自病也曰傷寒四五日太陰病者此屬三陽遞傳之裡證也稱少陰病起者乃直中少陰本經之陰證也曰傷寒五六日少陰病者此太陰遞傳少陰之裡證也稱厥陰病者乃寒中本經之陰證也曰傷寒六七日厥陰病者此遞傳三陰經盡而多入腑之下證也但稱傷寒病而散見於諸經者陰陽寒熱表裡無定非本經自病必他經傳來或表裡兼行或經腑兼見或陰陽錯雜或寒熱備具蓋非一種而治亦不同其並病則曰某經與某經並病其合病則曰某經與某經合病類如此也其過經證瘥後證及痓暍風濕溫疫等證婦人傷寒俱各綱舉目張總要得其起句之綱然後能知下文之目明此大旨始易讀仲景書而可悟傷寒之奧義但其文法不一有倒插有影射有遺漏有誤次遙遙千古終不是仲景全壁矣然傷寒大法必遵仲景循其繩墨以審證處治即不能盡對針鋒亦不失法家分寸俾自信而人能信之毋自誤而更誤人噓枯吹生舍仲景何以救傷寒之危急哉奈書因散佚辭不達意所賴歷代名家見解後人得以趨向運用之妙存乎其人孟子曰說詩者不以文害辭不以辭害志以意逆志是為得之讀仲景書當如孟子所云讀仲景傷寒論而不以意逆志未得為善讀仲景書烏足明傷寒之道哉強健述傷寒直指總論竊惟傷寒證多傳變非仲景著論以始之後世孰能開此法門人但知宗內經病熱一語罔識三陰直中之候而麻附細辛之溫經散寒理中四逆白通通脈之回陽救陰有斡旋造化之功垂萬世不易之法無仲景則傷寒何所據惜其書遭散佚叔和編次失序未免難明易誤歷代名醫參互考訂是是非非大抵隨文釋義者多抉疑補漏者少欲求全壁實難得焉固非潛心會悟閲歷揣摩則傷寒深奧豈容易言何怪乎學者視為畏途無人能破千載之弊以人仲景之室雖然精傷寒者代不乏人其間非無名言至論但未通盤了徹觀林氏折衷則牝牡判然健稔悉箇中可否不自揣量纂此直指志在開門見山一望可即然必讀之有法庶用之有效讀傷寒者要識仲景綱目始知旨趣之攸歸辨傷寒者能味諸家精義乃悟是非之迥別縱千門萬戶亦不覺頭頭是道矣夫邪之輕重在乎陰陽病之淺深在乎虛實治之緩急在乎表裡方之出入在乎寒熱八要明而六法備任其異同極其傳變不越情理二字意見得到則亢害承製無遁情逆從正反無偏弊奈前賢議論散見諸書未得摯其綱領以示進步之階故特舉而論之俾趨向不致多歧是書也精義在於注中注有未盡又當著眼於名論如王安道之分晰異同明傷寒即病溫暑晚發時行寒疫風瘧風溫溫疫等證之不得與傷寒同法闢活人書原病式之謬論至切也陶節庵之審證辨脈別陰陽盛衰悉傳經直中之旨再經過經之惑摘成聊攝朱奉議之誤解處方用藥之要斟今酌古至當也王海藏吳仁齊王宇泰李士材輩之陰陽偏勝標本後先察色驗舌方土異宜李東垣朱丹溪之除邪養正根柢脾胃皆至精也此等文字羽翼仲景大道透達傷寒神髓可謂取之無盡用之不竭者矣熟玩而精思之不患道之不明而患人之不自悟爾嗟夫傷寒疑竇集此諸家精粹健又補其閥略已足發明唯是方劑乃下咽救病之物死生系之群賢獨少指迷因循附和所謂無人能破千載之弊者在是可不為之區別乎夫醫在於識病去病全在處方病識則決斷無差方對則治療不誤其或決斷雖是而方不中病病之死生猶反掌焉務當切理得法不事刻畫仍合古人心印始為高手仲景書既不全證論與方恆多相悖而難用者若不窮究而詳繹之何以慰仲景以度後世之人因表而出之如太陽篇中下後脈促胸滿桂枝去芍藥微惡寒者加附子湯脈浮微熱表未解小便不利五苓散邪陷胸中之桅豉湯脈浮自汗小便數腳攣急加燒針之柴胡龍骨牡蠣湯燒針令汗針處核起必發奔豚之桂枝加桂湯半表半裡證而咳之人參薑棗加五味子乾薑之小柴胡陽明篇中大便硬渴欲飲水之五苓散傷寒六七日目中不了了無表裡證大便難者之大承氣少陰篇中下利不止便膿血之桃花湯咽中痛之半夏散厥陰篇中傷寒脈促手足厥逆者之可灸諸如此類不勝枚舉皆證不合方方與證礙極難信任者不得不逐一釐剔酌詮變通良法以療之籲仲景法祖原為萬世準則其書之扞格難通者蓋因殘缺失次注解未瑩是以千百年來疑信相半前賢縱有發揮猶未悟仲景當日著書因感觸而發擬議之作雖與靈素相表裡究非經驗成案獨丹溪識此來歷而序格致論云夫假說問答仲景之書也能知其如此則從事傷寒思過半矣乃今世澆質薄證變異常古方今病豈盡宜然所以動轍得咎裹足於傷寒之門莫之能讀莫之能治即或治之無非循牆捫壁混以雜病方藥浪施殊失仲景大法積習相沿貽人夭枉而莫之醒也古人云欲流之清必潔其源既感林觀子彙集之難健復淘洗黑白直指是非庶幾有濟於世無誤於醫可以相忘乎畏途矣強健撰傷寒直指凡例一凡古聖賢載道之書辭雖簡而意義深不以錯雜為體仲景醫方法祖立言豈肯如棼絲斷梗者乎乃傷寒論緣散佚之餘叔和編次失序故奧旨難明學者艱於措手蓋條理既差則病象迥異世降智卑更多以訛傳誤浙西林觀子討究有得立心濟世將仲景書彙集諸家注論纂折衷二十卷為傷寒善本仲景之功臣也不謂板毀祝融世未盡窺其要以識仲景之微徒嘆望洋健不揣譾陋凜承師訓先業師姓李字揆文明太醫與參先生之孫修之先生之子本籍浙寧流寓上海世為名醫家著證治匯補舊德堂醫案行世感切向往閲歷之久稍知箇中底蘊乃校林本去浮取實而補輯之以政有道素怪術家著作類多隱晦或因假手於人或系坊間剿襲最足誤世茲皆出自心裁言則必窮根抵直指是非故名書曰直指一林氏折衷意在分門別類將叔和原本移前掇後聚證就方未嘗無當然念仲景書既散怯賴叔和編輯成帙以垂不朽即有舛錯其來已舊比之儒書錯簡朱子尚不敢易此亦法祖遺經安可任意更張倘百世而下再有變動則傷寒論不可問矣茲仍宗叔和條目存古制也一成氏注乃傷寒論之嚆矢引經據證辭意雖未盡當然亦十得六七悉載原注略節其間字貴簡練耳一林本集解最備未免雷同重復恐反滋惑今補其精而刪其謬俾讀者一往即詣毋事旁羅貽隙也一傷寒最難發明前輩論言充棟後學安能遍較短長試觀儒理尚有齟齬況乎醫道更可標異大率自欲翻案不難放倒前人而穿鑿不遺餘力如喻嘉言之以禪說醫幾成魔録又限以法律非膠柱鼓瑟乎先哲云醫者意也理也若證論悖理烏足以發是本取意理之當者集之少有不逮補直指以決之倘未盡淵微將俟後之君子一傷寒原方一百一十有三而失其一古本即列病條之下與證論互見恐妨讀法因檢出另匯一卷冀便覽焉一望色寓神明之鑑醫道第一層功夫傷寒書略而未備今遵內經大旨採集一篇以便參究至舌法圖象乃傷寒之指南表裡虛實陰陽寒熱死生明驗在是悉依金鏡繪注合為一卷一類證創自活人書而備於準繩為帙既廣則難研究若傷寒括要等又覺太簡坊本雖多未必盡善茲宗林本選集諸家證治繁簡適中而變通之法頗備堪與仲景書相表裡倘遇證變錯雜之際提綱挈領多所裨益此傷寒頭緒所宜究也一傷寒諸家名論玉石不同今擇其善者集之最能資助見識羽翼大道一附方乃諸先哲治傷寒變通良法從類證及增補條注録出匯成一卷以備因時制宜有裨運用一六經形證文情互出不逐一結束學者難窺頭項如上下文病象不相涉者另起段界之句法前用空格緊要精切處用空格諸家注述亦用空格以標出各有眉目易覽一仲景序傷寒論合十六卷因遇散失叔和編為十卷後世諸家增注分卷不一先後詳略皆非仲景之舊今從叔和原本編次辨平脈法一卷傷寒序例一卷六經形證五卷原方一卷望色舌法一卷類證四卷附方一卷諸家名論二卷共合一十六卷
